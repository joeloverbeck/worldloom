id: SEC-INS-005
file_class: INSTITUTIONS
order: 5
heading: Military / Defense
heading_level: 2
body: |-
  - **Function**: defend polity, project force where chartered, enforce charters, suppress banditry.
  - **Legitimacy source**: chartered authority; mercenary contract in some polities and in private use.
  - **Material base**: arms, armor, training grounds, supply lines (canals decisive here), drill yards.
  - **Violence capacity**: high.
  - **Recruitment**: levy, volunteer, hereditary martial families, mercenary contract.
  - **Succession**: rank by service or appointment.
  - **Internal contradictions**:
    - species-typical fighting capacities raise arguments over equal pay versus hazard pay;
    - veterans-for-hire compete with militia traditions and often dominate the upper end of risky private work;
    - mercenary professionalization tugs against levy traditions, especially in older charter polities;
    - taboo against deploying artifacts on the battlefield is widely held but rumors of breach by particular polities or commanders persist.
    - <!-- added by CF-0024 --> mercenary-band licensure variation (CF-0024): some polities license mercenary companies under tight charter; some tolerate ad-hoc band formation at skirmish-season; some restrict; some ban outright. Inter-polity licensure mismatch generates novel extradition questions. Levy traditions face cannibalization pressure where named adventurer-contractors draw upper-tier veterans away from militia reserves; polities with weak chartered-military monopoly feel this acutely.
    - <!-- added by CF-0024 --> noble private retinue formation (CF-0024): landholding estates (per Landholding/Resource Control) form named adventurer-contractor bands on quiet retainer, re-creating pre-Charter martial clientage in contract language; Charter-Era anti-monopoly-of-force norms strain against this, periodically invoked by civic watch and bardic political commentary.
    - <!-- added by CF-0028 --> ruin-levy mobilization (CF-0028): when two or more patron-funded ruin-expeditions contest the same site and escalation reaches polity-level, levies are mobilized under ruin-defense or ruin-protection civic duty. This is a new quasi-regular-military category with its own veteran subtype ("ruin-levy veterans"). Inter-group competition escalating to regional armed conflict is the first current-layer pressure to approach Charter-Era rupture in regions of weak charter — exceeds the CF-0024 "strains rarely breaks" framing. Civic magistrates build precedent with visible anxiety. The battlefield-artifact taboo (CF-0008) is under strain here parallel to but distinct from the CF-0021 mercenary-commission strain: the ruin-conflict context is about recovering material, not deploying it, which keeps the taboo technically intact — but the proximity is uncomfortable.
    - <!-- added by CF-0033 --> canal-corridor quarantine dragoon force (CF-0033): a chartered civic perimeter force standing in some larger heartland polities (instituted in the past decade as contested Charter-Era anti-monopoly-of-force concession). Dragoons are categorically distinct from chartered watch (CF-0020 derived; general civic policing), militia (civilian levy), mercenary companies (CF-0024 contract-bands), adventurer-contractors (CF-0024 hireable veterans), chartered extraction guild personnel (CF-0008 chartered functions), and CF-0028 ruin-levy mobilization. The load-bearing mission-scope commitment is normative: dragoons perform ward-breach perimeter enforcement and sealed-quarter evacuation support ONLY. Dragoons do NOT extract artifacts (SOC-4/CF-0008 preserved), inscribe or speak ward specifics (CAU-3/CF-0007 preserved), contain or neutralize artifacts, perform routine civic policing, or deploy in external inter-polity conflict; <!-- added by CF-0034 --> nor pursue bandits qua-banditry (CF-0034; hunter-contractors are the civic bandit-response institution); the battlefield-artifact taboo (CF-0008) is structurally reinforced by dragoon mission scope. Operations are predicated on ward-breach declaration and magistrate chain-of-command. Dragoons draw pay from civic treasury (not contract retainer); recruitment is from ward-resident rolls (not open labor market); units cannot be hired out. Adoption is contested Charter-Era concession with four adoption-gates (see §Subtype below); mission-creep pressure toward routine policing or external-conflict deployment is blocked by charter-court challenge brought primarily by principled-refuser clergy (CF-0026) — the charter-court challenge is the load-bearing procedural countergate. Ruin-adjacent polities face a distinct three-force convergence vector where dragoon perimeter response, CF-0028 ruin-levy mobilization, and expedition-band skirmish may co-deploy at the same ruin-mouth; the three forces remain structurally distinct and magistrates build jurisdictional-primacy precedent slowly.
    - <!-- added by CF-0034 --> endemic-banditry suppression as contractor-stratum civic function (CF-0034): bandit-hunting is a CF-0024 adventurer-contractor subtype (new 5th named subtype joining caravan-escort / wildlife / extraction-escort / mercenary-band / occult-fallout), commissioned via bounty-contract by affected settlements, merchant coalitions, chartered-estate tenants, and artifact-extraction guilds where bandits operate near extraction sites. Bandit-hunter pay tier is upper copper to mid silver, risk-loaded, with ransom-recovery bonus clauses distinguishing it from caravan-escort (preventive) and from CF-0028 expedition-share bimodality (which is partial-coin-advance plus haul-share). Bandit-hunters do NOT operate as chartered militia or chartered watch — they are contract-hired veterans under SOC-3 coin-contract sacredness. **Hunter-contractor ≠ dragoon** is load-bearing in adopting polities: CF-0033 dragoon engagement with bandits occurs only via the narrow ward-breach perimeter or black-market artifact-traffic predicate, and magistrate predicate-declaration is required at cross-predicate pursuit when a bandit group also traffics artifacts (M-13 boundary defense). The ad hoc bandit-hunting-party composition spans civic-watch (where chartered authority reaches), militia (where called up), noble retinue (where estate tenant land is threatened — charter-sound per Landholding extension above), chartered extraction-guild contractor-auxiliary roster (where extraction-site proximity), and CF-0024 posted-contract contractor-bands (the primary force in most suppressions).
    - <!-- added by CF-0038 --> Brinewick civic canal-warden corps (CF-0038): in canal-heartland charter-polities generally, and at Brinewick's scale exemplarily, a chartered-watch subtype — **civic canal-wardens** — handles tariff-and-traffic authority on canals, lock-usage-manifests, cargo-audit at confluence locks, and pursuit of unlicensed canal-traffic. Canal-wardens are categorically distinct from (i) **ward-inspectors** (extraction-guild, artifact-hazard scope under SOC-4/CAU-3 chartered authority — artifact-hazard inspection remains guild function, preserved); (ii) chartered-watch-proper (general civic policing); (iii) CF-0033 dragoons in adopting polities (ward-breach perimeter + sealed-quarter evacuation ONLY, cross-border black-market-artifact pursuit within home polity — NOT canal-cargo-audit); (iv) CF-0024 adventurer-contractors; (v) CF-0024 mercenary companies. The decomposition is load-bearing per CF-0038: estate-to-canal-warden backchannels for smuggling compromise tariff-and-traffic integrity (which the Charter-Era civic frame tolerates as continuous-but-incomplete audit — the integrity is never complete, the turnover is the stabilizer); estate-to-ward-inspector backchannels would compromise artifact-hazard integrity (which CAU-3/SOC-4 firewall categorically forbids — extraction-guild response would prevent this class of corruption). Canal-wardens draw pay from civic treasury (funded by canal-transit levy); recruitment is from ward-resident rolls with civic-registry citizenship; unit captains are magistrate-appointed. In Brinewick specifically the canal-warden corps is the heartland's largest, inspector-turnover is frequent (a feature not a bug), and the civic-advisory council's standing audit-committee runs biannual charter-audit cycles rather than the standard decennial cycle per CF-0038 commitment. Canal-warden inspection-logs constitute a dedicated archival stream (see Recordkeeping extension below).

    - <!-- added by CF-0042 --> status-artifact bodyguard commission as CF-0024 extraction-escort sub-specialty (CF-0042): notable-owner bodyguard work for households displaying chartered safe-class artifacts is a NAMED SUB-SPECIALTY within the CF-0024 extraction-escort contractor subtype (NOT a sixth CF-0024 subtype; NOT a new stratum per Rule 3 specialness-inflation firewall). Commissioned via victim-house direct hire, estate-steward retainer, or chartered-broker referral; pay tier mid-silver to upper-silver, risk-loaded (assassination-risk on named owners is recognized magistrate-docket-backed predicate). Contractors perform perimeter, shadow, and transit-escort work at estate halls, guildhall galleries, and civic-registry bureau-ornamental display contexts; they do NOT perform ward-inspection, extraction, containment, or authentication (chartered functions preserved per CF-0006/CF-0007/CF-0008/CF-0021). **Bodyguard sub-specialty stresses veteran pool as ELEVENTH concurrent-claim** (per ECONOMY Breakage Points §Veteran-pool multi-claim cannibalization extension): the CF-0024 veteran pool was tracked as 7-10 concurrent claims across polities before CH-0014; display-protection labor adds an eleventh. No new wage row — absorbed into existing extraction-escort sub-specialty scale; widow-of-the-job cadence preserved (AES-1 laborer-register: the contractor dies quietly and the widow's pension posts as scheduled).

    - <!-- added by CF-0035 --> mutated-beast response as contractor-stratum civic function (CF-0035): legendary-beast hunt is a NAMED SUB-SPECIALTY within the CF-0024 wildlife contractor subtype (NOT a sixth CF-0024 subtype; NOT a new stratum per Rule 3 specialness-inflation firewall). Commissioned via settlement-hire bounty-contract by wildland-adjacent villages, estate-owners whose tenant land is threatened (charter-sound per Landholding extension), caravan coalitions along corridors where mutated beasts have strayed, and occasionally by chartered extraction-guild contractor-auxiliary rosters when the mutated-beast kill is diagnostic of upstream uncontained contamination. Pay tier stays within the existing wildlife sub-bucket (mid-copper to low-silver routine wildlife; upper-silver on successful legendary-beast return with bounty-clerk-certified trophy) — risk-loaded and contamination-risk-gated, NOT a new wage row. Hunter-contractors perform carcass-delivery under bounty-clerk certification; they do NOT perform ward-inspection, ceramic-vessel containment, artifact extraction, or neutralization (chartered functions preserved per CF-0006/CF-0007/CF-0008). **Hunter-contractor ≠ dragoon** extends (load-bearing in adopting polities): CF-0033 dragoon engagement with mutated-beast activity occurs ONLY via narrow ward-breach perimeter predicate when the mutated-beast kill is diagnostic of upstream uncontained contamination source; magistrate predicate-declaration is required at cross-predicate hunter-contractor entry across adopting-polity dragoon-active ward perimeter, paralleling CF-0034 bandit-who-also-traffics-artifacts handling (M-13 boundary defense). **Hunter-contractor ≠ CF-0034 bandit-hunter** sub-specialty boundary: both are CF-0024 subtypes; bandit-hunter is 5th-named subtype in its own right per CF-0034; legendary-beast-hunt is wildlife sub-specialty within the wildlife subtype. They share veteran pool (cannibalization flagged in ECONOMY §Breakage Points extension) but categorize distinctly at contract level — a bandit-contract and a beast-bounty cannot be substituted by the bounty-clerk. Widow-of-the-hunt absorbed into CF-0024 widow-of-the-job (Rule 3 firewall).
    - <!-- added by CF-0046 --> drylands runner-reached village militia informal emergency-response (CF-0046): drylands corridor villages operate an informal emergency-response folk-practice — a village-designated runner (a tenant with good-leg reputation, NOT a chartered militiaman; selection by village consensus and typically rotating across able villagers) is dispatched on bandit-sighting at the well-approach or corridor-node to the nearest neighbor-village or gate-stop, triggering convergent village-militia mobilization under ordinary civilian self-defense convention. **NOT a new standing-militia subtype** (CF-0020 militia-standing unchanged; civilian levy tradition preserved); **NOT a CF-0024 mercenary-company or contractor subtype** (no contract, no posting-wall, no tavern-board hire; runner-militia is ad hoc village emergency-response, not posted-contract labor); **NOT a CF-0033 dragoon or dragoon-precursor** (drylands structurally does NOT adopt dragoon institutional form per CF-0033 non-adoption; runner-militia is regional folk-practice paralleling fenland amphibian-folk canary vigilance relay pattern at CF-0025 scale, not the chartered civic-perimeter-force category); **NOT a chartered watch** (no chartered-watch infrastructure in drylands institutional thinness per CF-0046 / GEOGRAPHY §Regional Asymmetry). Response-capacity is proportional to village population and drought-year traffic compression (thin drought-year villages have thinner emergency-response capacity); pursuit beyond village jurisdiction defaults to CF-0034 hunter-contractor institutional response if a bandit corridor justifies commissioned bounty-contract. Runner-reached village militia is a drylands-specific adaptation of ordinary civilian self-defense pattern, not a new institutional category; its visibility is register-level (a named villager with good-leg reputation; a sighting-call tradition; a village-council militia-roster) rather than chartered-institution level.

  ### Subtype: Canal-Corridor Quarantine Dragoons (called out for centrality)

  <!-- added by CF-0033 -->
  - **Function**: rapid ward-breach perimeter cordon; sealed-quarter evacuation support; pursuit of black-market artifact traffic within home-polity jurisdiction. Dragoons arrive within minutes of ward-breach declaration where the prior chartered-watch-plus-guild-extractor ad hoc arrangement took hours.
  - **Legitimacy source**: civic charter under ward-breach-declaration predicate; central-council authority with magistrate chain-of-command; chartered extraction guild concurrent consent or override.
  - **Material base**: dragoon barrack and drill yard in adopting-polity civic quarter; uniform stores, turnout-kit arms (longsword, shortbow or crossbow, polearm per regional norm), whistle signals, cordon-marker gear; civic armory under magistrate oversight.
  - **Violence capacity**: high within mission scope (perimeter enforcement, evacuation coercion, pursuit of artifact traffickers); categorically zero outside mission scope (no routine policing authority; no external-conflict deployment).
  - **Recruitment**: ward-resident rolls; veteran pool (competes with CF-0024 contractor stratum and militia reserves); species-mixed per SOC-1 with no species-coding. Recruitment-gate includes civic-registry citizenship and ward-resident status.
  - **Succession**: rank-by-service within civic-treasury pay structure; magistrate appointment for unit-captain roles; no hereditary mastership; no hire-out. Retirement at pensionable-service threshold yields charter-backed pension (new value-store class; see ECONOMY §Value Stores).
  - **Four adoption-gates** (stabilizers preventing universalization):
    - (1) Charter-Era anti-monopoly-of-force political cost — only polities with acute Incident Wave exposure AND strong central-council authority absorb the founding cost;
    - (2) chartered extraction guild concurrent consent or override — guilds can veto in practice by withholding consent, and dragoons cannot be stood up over guild objection;
    - (3) dedicated funding stream — canal-transit levy or ward-economy draw available only to larger polities with canal-choke-point revenues; funding-stream specificity (additive vs displacing from containment upkeep) is deferred to OPEN_QUESTIONS;
    - (4) principled-refuser clergy (CF-0026) and progenitor-cult sectarian refusal-on-principle caps adoption in polities with strong refuser presence.
  - **Transition-cost in small adopting polities**: dragoon corps buildout in small adopting polities produces a 3-7 year ward-breach severity spike as veteran recruitment cannibalizes militia and contractor pools before the institution matures. Larger heartland polities with deep veteran pools absorb the transition cost more easily.
  - **Mission-creep countergate**: charter-court challenge by principled-refuser clergy (CF-0026) is the primary procedural check against dragoon scope expansion. Adopting polities that permit dragoon mission expansion beyond ward-breach perimeter and sealed-quarter evacuation forfeit the anti-monopoly-of-force concession and face council-authority crisis. Mission-creep countergate effectiveness depends on charter-court precedent robustness and refuser-clergy influence per polity; M-13 tracks this as bounded-unknown.
  - **Reputation**: respected, feared, and quietly avoided in the same register that extractors are (AES-1/AES-3). Dragoons are treated as paid laborers with a hazardous civic commission, not as heroic figures. Turnout is work-kit, not ceremonial uniform. Named-officer heroism is out-of-register; rank is job-title, not honorific. Ballads about dragoon work stratify into three layers: patron-commissioned ward-saved-the-quarter ballads (institution-competence inflated, NOT individual gallantry); tavern-veteran dragoon accounts (dry, numerical, pensionable-service cadence, in AES-1 scarred register); anti-dragoon charter-court opposition broadsides (procedural grievance, cited precedent, litigious register NOT revolutionary pulp).
  - **Retired-dragoon subtype**: distinct from mercenary veteran (CF-0024), occult-fallout specialist (CF-0025), ruin-expedition veteran (CF-0028), and extractor veteran. Charter-backed pension; civic-advisory role eligibility; some retired dragoons enter magistrate-adjacent clerical roles; retired-dragoon kit (uniform, crest, escutcheon) is retained personally and supplies the impersonation-of-dragoon offense's counterfeit market.
  - **Cross-border pursuit**: dragoons have NO chartered authority outside their home polity. Pursuit of black-market artifact traffickers across a charter line is legally fraught; extradition disputes form a growing magistrate docket class (see Law §internal-contradictions above).
  - **Boundary with extraction-guild chartered functions (load-bearing)**: dragoons do NOT perform extraction, inscription, containment, neutralization, or brokerage. Any extraction-adjacent dragoon act under perimeter cover risks converting guild consent into guild opposition and has triggered named jurisdictional disputes in documented recent cases. The perimeter/extraction boundary is the safety rail.
  - **Boundary with CF-0028 ruin-levy**: dragoon perimeter response and ruin-levy mobilization are structurally distinct forces; both may co-deploy at ruin-mouths where a chartered-polity ward-breach declaration overlaps a ruin-expedition-conflict escalation zone. The forces do NOT merge; magistrates adjudicate jurisdictional primacy on a per-incident basis.
  - **Boundary with CF-0024 mercenary / contractor / noble retinue**: dragoons are civic-chartered, civic-treasury-paid, ward-resident-recruited, and cannot be hired out. These operational features distinguish dragoons from mercenary-company members (CF-0024) who are contract-retainer paid and licensed polity-by-polity, from adventurer-contractors (CF-0024) who are hired per-job, and from noble-retinue members (CF-0024) who are private-estate paid under adventurer-contract language.

