id: SEC-INS-008
file_class: INSTITUTIONS
order: 8
heading: Burial / Death Management
heading_level: 2
body: |-
  - **Function**: dispose of dead per custom and law; comfort survivors; settle estate handover with the civic registry.
  - **Legitimacy source**: religious tradition (common pantheon and progenitor cult both have burial rites); civic confirmation for property transfer.
  - **Material base**: cemeteries (multispecies in most cities, sectioned by tradition), charnel houses, pyre fields, river-burial wharves, sky-burial platforms (raptor-folk regions), cairn fields (highlands), dry-tomb complexes (drylands).
  - **Violence capacity**: zero.
  - **Recruitment**: hereditary in some traditions, sworn officiant in others, ordained in monastic burial orders.
  - **Succession**: lineage and ordination.
  - **Internal contradictions**:
    - multispecies cemeteries must coordinate species-typical preferences (sky-burial for some bird-folk, river-release for some otter-folk, earth-burial for humans, fire for some hyena-folk traditions, dry-tomb for drylands traditions);
    - sectarian progenitor cults sometimes refuse common-pantheon burial rites;
    - charnel-house and pyre-field neighbors periodically petition relocation, especially during plague years.
    - <!-- added by CF-0036 --> mixed-cemetery sectional tensions (CF-0036): contested burial-plot cases emerge where a noble dowager's family demands species-separation from adjacent laborer sections (ermine-folk dowager contesting plot-proximity to beaver-folk canal-labor section; cat-folk estate-family demanding separation from rat-folk artisan quarter sections); civic cemetery-master adjudicates under existing multispecies-coordination framework, generally refusing species-separation requests as charter-adjacent hierarchy-speech; dowager-gossip circuit tracks refusals as charter-sound-vs-charter-adjacent reputation signals; cemetery-master "sectioning-pressure" emerges as minor bribe-exposure pattern paralleling other sectioning decisions. Victim-remains from sealed-cannibal-case prosecutions receive SEALED-DOCKET burial with magistrate-warrant-gated record; burial-officiants operate under civic-oath to preserve silence-protocol; public ceremony absent, family-only rites permitted; cemetery-master notes euphemistic classification ("grave-violation-of-person victim") on the plot-ledger. Restoration-rite for survivors of cannibal-camp liberation parallels CF-0034 liberated-slave restoration-rite register: common-pantheon hearth-god and judgment-god pairings, reform-current clergy pastoral specialty, regional ritual variation; specific restoration-rite canonical form deferred per polity (OPEN_QUESTIONS LB-3).

  ---
