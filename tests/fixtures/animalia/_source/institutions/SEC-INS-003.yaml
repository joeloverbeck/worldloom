id: SEC-INS-003
file_class: INSTITUTIONS
order: 3
heading: Religion / Ritual Authority
heading_level: 2
body: |-
  Animalia carries **two intersecting religious systems** that share most adherents. They are not in formal opposition but their authority claims overlap and sometimes friction.

  ### Common Pantheon

  - A pantheon of named gods worshipped across species and regions. Approximate roles: hearth, harvest, water, road, judgment, the dead, and others (specific names and full rosters deferred to OPEN_QUESTIONS).
  - **Function**: legitimation, life-cycle rites, intercession, community identity.
  - **Legitimacy source**: tradition, clerical succession, popular acclaim.
  - **Material base**: temple lands, tithes, donations, processions, regional pilgrimage sites.
  - **Violence capacity**: low directly; can mobilize crowds and shape opinion.
  - **Recruitment**: novitiate, vocation, sometimes hereditary succession.
  - **Succession**: ordination, conclave; regionally varied.

  ### Species-Progenitor Cults

  - Each major species honors a mythic progenitor figure (the First Beaver, the First Hyena, the First Aurochs, etc.). These cults predate the Charter Era; the Charter-Era settlement folded most of them into civic religious life by treating progenitors as **aspects** rather than competitors of the common pantheon — though this compromise is contested in some sects.
  - **Function**: species identity, life-cycle rites that incorporate species-typical embodiment, community memory.
  - **Legitimacy source**: ancestral tradition, lineage-keepers, oral chronicles.
  - **Material base**: shrines, ancestral sites, feast traditions, song-cycles.
  - **Recruitment**: vocation, sometimes hereditary lineage-keepers.
  - **Internal contradictions**:
    - progenitor sectarians who reject the Charter-Era aspectual compromise and assert progenitor-supremacy;
    - cross-species marriages where each spouse honors a different progenitor and the children are raised in one tradition or both;
    - common-pantheon clergy who deplore progenitor enthusiasm as factional;
    - ward-breach response often blurs religious and artifact-guild jurisdiction (priests insist on rite, guild insists on protocol).
    - <!-- added by CF-0021 --> doctrinal crisis over modern artifact crafters (CF-0021): common-pantheon clergy must decide whether crafter-attempts are blasphemy (claiming Maker-power), legitimate craft (no different from any other craft), or moral hazard (regardless of cosmology); Maker-mystic sectarians celebrate the practice as recovery of sacred craft; progenitor-cult lineage-keepers split, with some treating crafter-attempts as Maker-imitation (heretical) and others as progenitor-empowered (validating supremacy claims); exorcism rites performed on possessed artifacts (CF-0022) are performative since the world-level commitment is non-sentience, but the rite outcomes remain interpretively contested between sects.
    - <!-- added by CF-0024 --> clergy-contractor hiring (CF-0024): common-pantheon clergy hire adventurer-contractors for pilgrimage safety and for intercession at contaminated sites where civic watch declines jurisdiction; road-god framing provides the theological warrant. Sectarian progenitor-cult lineages sometimes recruit veteran adventurers for armed lineage-guard roles; common-pantheon clergy in mixed cities deplore this but lack effective counter-institutions.
    - <!-- added by CF-0026 --> principled-refuser tradition (CF-0026): a reform current within common-pantheon clergy and a doctrinal strand in some progenitor-cult lineages treats refusal-on-principle of artifact-fallout work as moral witness. Refusers form a visible moral category; their refusal is ethical rather than metaphysical, and carries weight in inheritance disputes, civic advisory roles, and bardic-circuit reputation. The tradition creates theological friction with common-pantheon clergy who accept hazard-commission payment from chartered guilds, and it provides an organized moral stance distinct from sectarian progenitor-supremacy.
    - <!-- added by CF-0028 --> ruin-expedition doctrinal split (CF-0027, CF-0028): enterable Maker-Age ruin sites as expeditionable ground generates a doctrinal crisis that EXCEEDS the CF-0021 aspectualization compromise. Progenitor-cult lineage-keepers who treat Makers as ancestral (or as existential threat) condemn ruin-entry as desecration-for-profit; Maker-mystic sectarians celebrate ruin-entry as sacred recovery and sometimes mount sectarian-funded expeditions as proxy for their cosmological position; common-pantheon clergy cannot aspectualize this as they did crafter-attempts (CF-0021) because the ruins are LITERAL cosmological battleground — a Maker site is either sacred or desecrated, and "both at once under charter compromise" strains past plausibility. Reform-current clergy (CF-0026) extend principled-refusal to cover expedition work specifically; hazard-commission clergy accept patron-funded pilgrimage-safety and contaminated-site intercession commissions. Sectarian pilgrimage to known ruin sites is a real strain on civic containment. Exorcism rites performed on guardian-construction remnants parallel CF-0022 rites on possessed artifacts — performative under world-level non-sentience (CH-0004 clarification), but in-world contested.
    - <!-- added by CF-0031 --> contamination-lineage ledger-mark doctrinal response (CF-0031): in adopting polities, reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between mandatory-enrollment-with-protection reformers and three-generation-mark abolitionists. Common-pantheon clergy have a plausible aspectualizing path — framing the registry as a civic-ritual-of-witness that acknowledges contamination-cost without doctrinal implication — or a reform-aligned condemn-as-stigmatizing path; celebration is implausible since the mark records injury, not virtue. Sectarian progenitor-supremacy movements oppose the registry on the grounds that occupational-lineage civic inscription occludes species-lineage witness, reading the registry as a Charter-Era instrument that dilutes progenitor authority. Aspectualizing progenitor-cult lineage-keepers accept the registry as civic-adjacent welfare without doctrinal implication. Clergy who accept hazard-commission payment from chartered guilds face compounded reform-current pressure when the registry institutionalizes the welfare claim their commission-traffic had been blamed for neglecting.
    - <!-- added by CF-0032 --> oversize-saddlery subsection doctrinal response (CF-0032): progenitor-cult lineage-keepers in Cluster C ancestral polities may integrate subsection journeymen-lineages into cultural-continuity claims, but this is sectarian activity, not chartered endorsement; aspectualizing progenitor-cult lineage-keepers treat the subsection as civic-craft-adjacent with no doctrinal implication (the common-pantheon clergy aspectualizing path applies here cleanly, unlike CF-0028 where literal cosmological ground strained the compromise). Sectarian progenitor-supremacy movements attempt to read subsection mastery as material evidence of "older bloods" species-lineage witness; civic registry refuses this reading. M-4 firewall (CH-0006 extension): the subsection does NOT adjudicate whether species-progenitor figures are historical / mythical / pantheon-aspects. Common-pantheon clergy, Maker-mystic sectarians, and reform-current clergy (CF-0026) have no specific hook (this is neither contamination work nor expedition work nor crafter-attempt). The subsection's doctrinal load is lighter than CF-0021 / CF-0028 / CF-0031; the Rule 3 pressure is concentrated in the progenitor-supremacist reading and the "older bloods" self-conception firewall.
    - <!-- added by CF-0033 --> canal-corridor quarantine dragoon doctrinal response (CF-0033): in adopting polities, reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between charter-court-challenge-with-protection reformers (accept dragoons with strict sunset clauses and perimeter-scope discipline; charter-court challenges target mission creep not institution) and civic-militarization-abolitionists (oppose dragoon adoption as Charter-Era rupture regardless of scope). The pattern follows the CF-0031 bifurcation template (reform-with-protection vs abolition) more closely than the CF-0021 aspectualization path (no doctrinal substrate to aspectualize) or the CF-0028 no-aspectualization-possible path (dragoon work is civic-hazard labor, not cosmological-site engagement). Aspectualizing common-pantheon clergy in adopting polities treat dragoon work as civic-hazard-commission labor without doctrinal implication, paralleling their treatment of chartered-extraction work. Sectarian progenitor-supremacy movements oppose dragoon adoption on species-lineage-occlusion grounds parallel to their CF-0031 registry opposition — civic-chartered militarization is read as Charter-Era instrument diluting progenitor-authority. Progenitor-cult lineage-keepers split: some treat dragoon service as civic-hazard-labor compatible with lineage virtue, others treat it as desecration-for-profit (compounded in ruin-adjacent polities where dragoon perimeter work intersects CF-0028 expedition territory). Common-pantheon clergy who accept hazard-commission payment from chartered guilds face compounded reform-current pressure when dragoon charter-backed pensions highlight the welfare-gap their commission-traffic has been blamed for neglecting — the pension-differential becomes visible political leverage for reform campaigns paralleling CF-0031 registry-reform dynamics.
    - <!-- added by CF-0034 --> endemic-banditry doctrinal response (CF-0034): reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between bounty-commission-accepting wing (treat bounty-hunting as civic-hazard commission in the same register as chartered-extraction hazard work — moral, though hazardous to soul and body) and bounty-execution-abolitionist wing (campaign against summary killing of captured bandits, demanding trial and appeal procedure; pressure is concentrated in the highest-charter polities where magistrate-courts have capacity). The bifurcation follows the CF-0031 / CF-0033 bifurcation template (reform-with-protection vs abolition) rather than the CF-0021 aspectualization path, because the moral load attaches to the killing-act, not to the institutional form. Aspectualizing common-pantheon clergy treat bandit-hunting as civic-hazard-commission labor without doctrinal implication. Fallout-ministry to raid-victim survivors and liberated slaves is a recognized aspectualizing-clergy pastoral specialty paralleling CF-0025 fallout-specialist hazard-ministry: common-pantheon clergy minister to raid-widows and raped survivors under the hearth-god and judgment-god pairings, with regional restoration-rite variants where local custom supports them. Sectarian progenitor-supremacy movements exploit banditry rhetoric for species-specific retinue authority (parallel to CF-0024 recruitment pattern) — *"the clan can defend itself, the charter cannot"* is a standing supremacist refrain in highland and fenland sectarian recruiting that civic magistrates in mixed polities watch closely. Progenitor-cult lineage-keepers split as under CF-0024 outland-band cleansing rites, but with a sharper edge for the raid-and-enslave subset: a clan-member who returns from an outland band that committed enslave-acts faces CLEANSING-RITE REFUSAL in most highland clans — the rite is categorically unavailable, the returnee remains under permanent exile or must undertake extended atonement that many clans do not offer. The cleansing-rite refusal is the sharpest doctrinal commitment around CF-0034; it is heavier than the standard CF-0024 rite and categorically distinct from the CF-0028 ruin-silence-oath. Bards hired by reform-clergy compose bounty-ethics material that argues for trial; bards hired by settlements compose bounty-coin ballads that celebrate the retrieval of captives and the payout of the hunter; both subgenres exist in the contracted-bard narrative-custody register (CF-0024 extension), and civic magistrates read them as weather-vanes of reform-current mobilization strength.
    - <!-- added by CF-0035 --> mutated-beast doctrinal response (CF-0035): minor surface — these are non-sentient fauna, not cosmological ground. Common-pantheon clergy have no aspectualization crisis (parallel to the CF-0032 subsection-craft pattern); clergy who hire hunter-contractors for pilgrimage safety in wildland-adjacent corridors treat the commission under existing CF-0024 pilgrimage-safety warrant with the road-god framing. Principled-refuser clergy (CF-0026) extend hunter-ministry to cover widow-of-the-hunt (absorbed into CF-0024 widow-of-the-job; NOT a new stratum per Rule 3) and carcass-sited restoration rites where local custom supports them. Sectarian Maker-mystic reading that mutated beasts are Maker-residue remains DIFFUSE / INDIVIDUAL reading — firewalled against ORGANIZED sectarian pilgrimage to known mutated-beast territories; organized pilgrimage-to-a-zone as a doctrinal program would face the Cross-Cluster firewall scrutiny applied to CF-0028 ruin-pilgrimage strain (but unlike ruins, mutated-beast zones are not cosmological ground — the firewall is on organized doctrine, not on individual readings). Sectarian progenitor-supremacy movements exploit the trophy-display complaint register (carnivore-folk cousin-beast trophy-display taboo; see PEOPLES_AND_SPECIES extension) for species-specific civic-complaint mobilization, paralleling the CF-0034 *"the clan can defend itself"* refrain in wildland-adjacent highland and drylands recruiting — civic magistrates in mixed polities watch closely. Progenitor-cult lineage-keepers with carnivore-predator-reverence traditions refuse cousin-lineage trophy display; this is a minor embodiment-respect commitment, not a sharp doctrinal register like the CF-0034 cleansing-rite refusal. M-1 firewall (CH-0009 extension): mutated-beast evidence does NOT yield Maker-cause-of-fall resolution; Maker-mystic readings that mutated-beast prevalence in deep strata indicates Maker-Age-contamination-cascade as cause-of-fall are contested canon, NOT world-truth.
    - <!-- added by CF-0036 --> endemic-interspecies-friction doctrinal response (CF-0036): THIRD CF-0026 bifurcation instance (after CH-0005 contamination-lineage and CH-0007 dragoon-scope). Reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between **charter-defense-anti-supremacism wing** (invokes civic-charter anti-hierarchy clauses; campaigns for prosecution of cannibal-bands WITHOUT silence-protocol; mounts charter-court challenges against magistrate toleration of exclusionary-settlement extradition refusal; organizes cross-species moral witness against supremacist-doctrine recruitment) and **civic-restraint-pragmatic wing** (accepts silence-protocol on rebellion-prevention grounds; focuses moral witness on hate-speech reform and survivor ministry; ministers to silenced-contractor-bitterness households and to survivors of cannibal-camp attacks under the fallout-ministry pastoral register paralleling CF-0025/CF-0034). The two wings hold within reform-current without schism; the bifurcation tracks CF-0031/CF-0033 template (reform-with-protection vs abolition) rather than CF-0021 aspectualization path — supremacist doctrine is NOT aspectualizable, it is REFUTABLE. Aspectualizing common-pantheon clergy (the MAINSTREAM position) refute supremacist doctrine under judgment-god and charter-covenant framing; this is the primary stabilizer against supremacist-doctrine normalization. Aspectualizing progenitor-cult lineage-keepers extend refutation via "progenitor-as-civic-covenant-witness" framing — the progenitor is read as a witness to mixed-species civic compact, not as a lineage-supremacy warrant. Progenitor-cult sectarian supremacy wing is the MINORITY CONTESTED position; its recruitment window is the exclusionary-settlement + bitter-silenced-witness + failed-reputation-contractor feeder stratum; civic magistrates in mixed polities watch closely. Maker-mystic fringe has no specific hook (cannibalism is neither Maker-residue nor cosmological ground). Cleansing-rite refusal for clan-member returned from a cannibal-band is CATEGORICALLY WORLD-WIDE — heavier than CF-0034 raid-and-enslave refusal (which was previously the heaviest precedent), universal across highland clan-custom, common-pantheon clergy mainstream, and progenitor-cult mainstream; no atonement path in most clans. Bards hired by charter-defense clergy compose refutation broadsides in litigious-procedural register (cited precedent, named concessions breached, NOT revolutionary pulp); bards hired by civic-restraint clergy compose survivor-ministry material in hearth-god and judgment-god pairings; both subgenres exist in the contracted-bard narrative-custody register (CF-0017/CF-0024 extension), and civic magistrates read them as reform-current mobilization weather-vanes paralleling the CF-0034 bounty-ethics-vs-bounty-coin subgenre pair. M-4 firewall (CH-0010 extension): supremacist doctrine does NOT partial-validate any progenitor-position; supremacist-progenitor-reading is NEVER world-truth. M-5 firewall FIFTH cross-application (CH-0010): sectarian "mere beasts" register applied to sentient victims is PATHOLOGICAL CATEGORY ERROR, NOT sentience-boundary revision.
    - <!-- added by CF-0041 --> Maker-Age deliberate-burial doctrinal response (CF-0041): CF-0041 commits that the Maker-Age peoples had hazard-awareness and deliberately sealed, entombed, or flooded some of their own artifacts and buildings. This commitment IS cosmologically loaded (parallel to CF-0028 ruin-entry) but is more bounded — the commitment is hazard-awareness-and-response-practice only, NOT Maker-cause-of-fall (M-1 anti-evidence firewall, CH-0014). Progenitor-cult lineage-keepers SPLIT doctrinally: **penitent-Makers reading** (the Makers regretted what they made and buried what they could reach; reform-current-adjacent framing; compatible with aspectualization) versus **calculating-Makers reading** (the Makers made hazards deliberately and buried only what they could not otherwise control; heritage-partisan framing; compatible with "older bloods" self-conception firewall tension). Neither reading is world-truth. Common-pantheon clergy offer aspectualization via civic-ritual-of-witness at unsealing — an institutional pressure-release valve where the chartered multi-guild unsealing-triage protocol can carry a formal rite-of-witness component in adopting polities. Maker-mystic sectarians celebrate deliberate-burial as evidence of Maker-Age wisdom (the Makers responded to their own hazards) and mount pilgrimage pressure at discovered sites, parallel to CF-0028 ruin-pilgrimage; civic containment strains. Maker-skeptic sectarians read deliberate-burial as evidence of Maker-Age malpractice (they made what they could not handle and tried to hide it); the reading is contested-canon, not world-truth. Reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between **aspectualization-with-civic-rite wing** (accept unsealing-triage rite-of-witness participation) and **archaeological-restraint wing** (oppose excavation of Maker-deliberately-buried buildings on the grounds that the Makers' burial intent deserves ritual-respect across cosmological lines — categorically forbidden advocacy of "burial-technique recovery" is NOT this wing's position, which focuses on excavation-restraint not technique-reproduction). Principled-refuser clergy (CF-0026) extend refusal to cover Maker-buried-building excavation work where the refusal is on respect-for-burial-intent grounds. M-1 anti-evidence firewall holds: no doctrinal position on Maker-burial-intent resolves Maker-cause-of-fall at world-level; all positions are contested canon.
    - <!-- added by CF-0039 --> artifact-permanence doctrinal response (CF-0039): CF-0039 destruction-resistance commits Maker-Age artifacts as unmakeable within current-age capability. Reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between **Maker-debt-permanence-acceptance wing** (accept the permanence as consequence of Maker debt; frame the civic ward-reserve monotonic accretion as ordinary-world-texture rather than cause for radical reform) and **burial-technique-recovery-advocacy wing** (campaign for research programs to relearn Maker-sealing-or-destruction technique; this wing is DIEGETIC position only — M-20 firewall forbids technique-recovery as world-achievable goal; the advocacy is doctrinal posture that generates political material, never world-success). Aspectualizing common-pantheon clergy read artifact-permanence under existing Maker-debt framing without doctrinal crisis. Maker-mystic sectarians celebrate permanence as Maker-wisdom; Maker-skeptics read it as Maker-failure. Progenitor-cult lineage-keepers have no specific hook (artifact-permanence is not progenitor-adjacent). M-20 firewall holds: the destruction-resistance mechanism is bounded-unknown; no doctrinal reading resolves it at world-level.
    - <!-- added by CF-0044 --> drylands hospitality-poetry religious adjacency (CF-0044): drylands short-poetry stranger-hospitality verse (CF-0044) may take progenitor figures and common-pantheon household-gods as verse-subject matter AS GENRE-REGISTER CONVENTION, NOT as doctrinal assertion. Aspectualizing common-pantheon clergy read the register as civic-adjacent genre aligned with the CF-0016 aspectualization compromise — hospitality-verse invoking household-gods inherits the aspectualization posture without doctrinal crisis (no aspectualization-strain parallel to CF-0028 ruin-entry cosmological ground; this is cultural register, not cosmological engagement). Aspectualizing progenitor-cult lineage-keepers treat verse-matter-about-progenitors as civic-covenant-witness register compatible with mainstream aspectualization. Sectarian progenitor-supremacy wing MAY attempt recruitment via "hospitality-verse as progenitor-lineage-witness" reading — a minor recruitment-margin pressure paralleling CF-0036 supremacist-doctrine recruitment pattern at lower acuity; civic magistrates in mixed drylands-adjacent polities watch tea-house-scribe and caravan-master reports for doctrine-propagation via protected hospitality-register. M-4 firewall (CH-0016 cross-application): no hospitality-verse tradition resolves M-4 progenitor-historicity at world level; sectarian-supremacist reading of hospitality-verse is NOT partial-validation of any progenitor-position. Reform-current principled-refuser clergy (CF-0026) have no specific hook (no cosmological substrate; no hazard-labor; no sectarian-doctrine aspectualization path since supremacist co-option is refutable not aspectualizable). Maker-mystic sectarians have no specific hook (hospitality-verse is cultural-linguistic, not Maker-residue).
    - <!-- added by CF-0046 --> drylands caravan-corridor water-rite adjacency (CF-0046 / CF-0047): water-rites at qanat-cleaning and well-approach (already present in EVERYDAY_LIFE §(d) progenitor-cult southern flavor + water-rites at qanat-cleaning and in CF-0041 drylands qanat-cleaning-rite convention-register) extend to the well-keeper's ordinary hospitality practice without new doctrinal commitment — common-pantheon water-god (road-god adjacent) aspectualization covers well-stop hospitality rites cleanly; progenitor-cult southern flavor covers clan-adjacent well-stop households' ancestor-invocation during keeping-book audits. NO new cosmological ground; NO new aspectualization crisis; NO new sectarian recruitment surface beyond the CF-0044 hospitality-verse recruitment-margin pressure already tracked. Reform-current principled-refuser clergy (CF-0026) have no specific hook (no hazard-labor, no artifact-adjacent work; well-keeping is ordinary hospitality commerce). Maker-mystic sectarians have no specific hook. Progenitor-cult lineage-keepers extend the CF-0044 verse-matter-about-progenitor genre-register into well-keeper keeping-book tradition (some well-keeper lineages invoke species-progenitor at keeping-book-audit open) without doctrinal crisis — the register is cultural, not doctrinal.

