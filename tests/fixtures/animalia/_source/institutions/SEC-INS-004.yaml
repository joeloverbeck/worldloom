id: SEC-INS-004
file_class: INSTITUTIONS
order: 4
heading: Landholding / Resource Control
heading_level: 2
body: |-
  - **Function**: agrarian productivity, taxation, succession of place, mineral and timber extraction.
  - **Legitimacy source**: title (granted, purchased, inherited), confirmed by civic registry; in some polities also confirmed by noble grant or charter.
  - **Material base**: estates, manor halls, tenant cottages, livestock, mines, quarries, forest lots.
  - **Violence capacity**: estate guards; some larger estates field small private retinues.
  - **Recruitment**: marriage in, birth, sale, ennoblement.
  - **Succession**: testamentary or by custom; species-mixed estates use civic registry as arbiter; disputes are common and famously slow.
  - **Internal contradictions**:
    - animal-folk noble lineages versus human-folk noble lineages with old-blood claims on the same lands;
    - sectarian progenitor-supremacy movements pressing for species-specific landholding privileges;
    - tenant-versus-landlord pressure intensified in regions where ward-zone exclusions have removed habitable land.
    - <!-- added by CF-0024 --> named adventurer-retinue formation (CF-0024): larger estates retain adventurer-contractor bands on quiet retainer, framed as caravan escort or wildlife-control contracts but functioning as private martial retinues. The pattern re-creates pre-Charter martial clientage under modern contract language; Charter-Era anti-monopoly-of-force norms strain but rarely break outright. Civic watch periodically tests the boundary, especially when a retinue is deployed against rival estate tenants or during inter-community skirmishes.
    - <!-- added by CF-0028 --> patron-funder of ruin expeditions (CF-0028) is an estate-level role that re-creates pre-Charter clientage at LARGER scale than CF-0024 retinue patronage — funds full expeditions (dozens of professionals) rather than escort bands (handfuls). Estate-steward ledger distinguishes caravan-contractor hires (low charter risk) from ruin-expedition patronage (high charter risk, artifact-keep clause, civic-audit exposure). Dowager-gossip circuit tracks which estates funded which expeditions and the squad-wipe outcomes; a cousin or heir signing an expedition contract under family seal without steward approval is a recognized charter-risk scandal. Landholding disputes sometimes name expedition-sponsorship as relevant character evidence.
    - <!-- added by CF-0031 --> contamination-lineage ledger-mark tenant exposure (CF-0031): in adopting polities, estate-owners whose tenant cottages contain CF-0025-eligible or extractor/containment-wright lineages gain visibility into tenant contamination-status via civic-registry coordination. Estate-steward ledger-check now includes tenant-registration status before tenancy renewal; a registered tenant patriarch gains monastic-clinic priority that affects household service-rota planning. Dowager-gossip circuits track which tenant-cottage lineages registered and which resisted, treating the pattern as charter-sound or desperate-signaling by context. Older noble houses tend to prize tenant-discretion (opposing registry penetration of estate cottages); newer merchant-adjacent houses see vetting value in registry-coordinated tenant records. The distinction becomes a dowager-idiom before it becomes a magistrate's concern.
    - <!-- added by CF-0033 --> canal-corridor quarantine dragoon bidirectional anti-monopoly stress (CF-0033): the existing CF-0024 noble-retinue friction strains Charter-Era anti-monopoly-of-force norms from ABOVE (private-force accreting under adventurer-contract language); in adopting polities, CF-0033 dragoons invert the stress direction, accreting civic-chartered force from BELOW. Estate political positioning shifts accordingly — in an adopting polity, the estate that maintains a named adventurer-retinue is NOT the estate that accepts dragoon civic presence on its outlying tenant land; in a non-adopting polity, the estate retinue remains the local answer to ward-breach response and estate-steward hiring retains its pre-dragoon shape. Dowager-gossip distinguishes "estates whose patrons sit on the dragoon-funding council" (civic-adjacent, reform-aligned) from "estates that have never had a dragoon posting cross their tenant line" (charter-sound, refuser-aligned, often older-house). Estate-steward correspondence burden expands in adopting polities to include dragoon-charter magistrate liaison; a dragoon unit entering estate tenant land under ward-breach declaration requires immediate steward ledger-check and magistrate notification.
    - <!-- added by CF-0034 --> bandit-defense-of-tenant-land as charter-sound retinue deployment (CF-0034): estate-owner deployment of CF-0024 noble-retinue bands against bandit-raid on tenant cottages is THE MOST CHARTER-SOUND retinue deployment available — civic watch does NOT routinely challenge it, and the deployment STRENGTHENS the CF-0024 retinue pattern within Charter-Era anti-monopoly-of-force bounds rather than straining it. The distinction that matters: retinue repelling bandits on the estate's tenant land is charter-sound; retinue pursuing bandits beyond the estate's chartered jurisdiction into another polity's or another estate's land triggers the standard CF-0024 friction. Retinue deploying against rival estate tenants under bandit-pretext is a charter-scandal — civic watch scrutinizes, dowager-gossip remembers. Estate-steward ledger distinguishes raid-response (low charter risk, routine) from pursuit (moderate charter risk, magistrate liaison required) from rival-tenant-action-under-bandit-pretext (scandal, charter-audit exposure). A raid-widow-stratum from tenant cottages joins the existing CF-0024 widow-of-the-job category (NOT a separate raid-widow stratum per Rule 3 firewall); dowager-gossip tracks which estates lost tenant-cottage households to raid and which retinue-deployments arrived in time.
    - <!-- added by CF-0035 --> mutated-beast defense-of-tenant-land as charter-sound retinue deployment (CF-0035): in wildland-adjacent estates, deployment of CF-0024 noble-retinue bands against an approaching mutated beast threatening tenant cottages or estate livestock parallels the CF-0034 bandit-defense-of-tenant-land pattern — charter-sound under the estate's chartered jurisdiction. Pursuit beyond estate land into wilderness chasing a mutated beast requires magistrate liaison parallel to bandit-pursuit (moderate charter risk). **Habitat-cultivation charter-scandal (load-bearing)**: any estate-owner or civic-adjacent actor DELIBERATELY cultivating or preserving mutated-beast habitat near tenant land for prestige-hunt tourism is CHARTER-SCANDAL — parallel in severity to retinue-against-rival-tenants-under-bandit-pretext. Civic-watch scrutiny expected; charter-audit exposure follows; dowager-gossip circuits remember. The scandal-definition holds because deliberate habitat-cultivation converts incidental environmental hazard (CAU-1 leakage) into near-deployment of artifact effect against an own-tenant-land constituency — adjacent to the CF-0008 battlefield-artifact taboo pressure. Estate-steward ledger distinguishes: incidental beast-approach (routine; retinue response charter-sound), in-pursuit-beyond-land (moderate risk; magistrate liaison required), habitat-cultivation-for-tourism (scandal; potential civic-watch action). A beast-hunt-widow stratum from tenant cottages or hunter-contractor households is absorbed into CF-0024 widow-of-the-job (NOT a separate stratum per Rule 3 firewall).
    - <!-- added by CF-0037 --> waystation tenure-mix on estate land (CF-0037): family-handled waystations (CF-0037) sit on a tenure-mix — freehold (heartland connector-route villages where charter-town civic-registry confirms title); chartered-polity civic-registered tenancy (heartland and selected mountain-east); estate-tenant lease (where the connector-route crosses noble-estate land — common pattern in heartland outskirts and in mountain-east valley-pass approaches); clan-elder-sanctioned customary tenure (highland clan-territory). Estate-steward ledger gains a waystation-tenancy entry-class distinct from ordinary tenant-cottage entries — waystation-tenancy carries supply-quota obligations to feeder settlement, traveler-service stipulations, and renewal-cycle terms reflecting the multi-generational household-enterprise pattern. Dowager-gossip distinguishes "the Corlyhaugh waystation has kept three generations" (charter-sound, estate-prestige) from "the Thurrow station turned over twice this decade" (instability, charter-risk-adjacent if turnover exceeds estate-steward tolerance). Bandit-defense-of-waystation deployment by CF-0024 noble-retinue against bandit-raid on estate-tenant waystation is THE MOST CHARTER-SOUND retinue activity available — directly parallel to CF-0034 §bandit-defense-of-tenant-land precedent; civic watch does NOT routinely challenge it. Pursuit beyond estate jurisdiction triggers magistrate liaison per ordinary CF-0034 framework. Habitat-cultivation-style scandal (CF-0035) does NOT extend to waystations — waystations are NOT contaminated-fauna habitat and the CF-0035 scandal-pattern is ecology-specific. The CF-0037 specific scandal is BANDIT-FRONTING (Law §(c) above) — an estate-owner who knowingly tolerates a bandit-fronting waystation on tenant land faces charter-scandal parallel to harboring-and-fencing under CF-0034 §(f).
    - <!-- added by CF-0038 --> Brinewick outskirts ancestral-estate dense cluster (CF-0038): Brinewick's outskirts ring concentrates ancestral-estate households at the highest density in the heartland, accumulating estate-class wealth and civic-adjacent influence across Charter-Era-depth generations. The estates exercise **lateral informal power** — economic weight, social capital, backchannel influence, civic-advisory-council seating, dowager-gossip network reach — within the Charter-Era civic frame, which formally holds (civic registry as default arbiter, magistrate courts for dispute, chartered watch for violence, guild charters for licensure). Estates do NOT exercise vertical power that displaces civic authority; "true seats of power" user-language is reframed as lateral-accretion per CF-0038 Phase 6b Politics/Institution critic finding. The scandal-tug-of-war pattern (CF-0038 dramatic-intent) routes through civic-advisory-council advisory-notes, magistrate-clerk docket-material, and charter-audit subpoena mechanisms — procedural, slow, paid out in ledger-corrections and canal-license revocations, NOT in ballroom-drama register. Estate backchannels to **civic canal-wardens** (chartered-watch subtype, tariff-and-traffic; see Trade/Guilds §canal-warden-institutional-decomposition below) for smuggling purposes are a real standing pattern; backchannels to **ward-inspectors** (extraction-guild, artifact-hazard scope; CAU-3/SOC-4 preserved) are NOT a pattern — corrupting ward-inspectors would trigger extraction-guild response and the authentication-cartel cascade. Canal-warden corruption is continuous-but-incomplete — audit-cycles catch some, inspector turnover is a feature (replacing exposed backchannel-operators), shadow-wage flows through inspector-kin intermediary rather than direct estate-to-inspector payment. Estate-outskirts proximity to canal infrastructure + underground tunnel networks crossing multiple estates (CF-0038; tunnel origin civic-mainstream reading is pre-Charter ancestral smuggling infrastructure, contested in-world per Mystery Reserve M-19) + aquatic-folk-guided canal-underwater smuggling niche together constitute Brinewick's canal-corridor illegitimate-service rail hub geometry per ECONOMY §Trade Flows CF-0038 extension. Dowager-gossip circuit at Brinewick density tracks charter-sound-vs-canal-patronage axis (new Brinewick-specific idiom), *"cleared the Fourth Bend"* (passed audit via backchannel — pejorative), *"walked the Weir"* (completed bardic circuit — prestige-adjacent), *"came back with the coin-for-shame"* (migrant-churned-returned) — paralleling CF-0031 charter-sound-vs-parvenu, CF-0033 dragoon-funding-council, CF-0034 exposed-district, CF-0036 mix-sound-vs-single-species, CF-0037 kept-stop-vs-turned-over axes.

    - <!-- added by CF-0036 --> interspecies-friction estate-steward tenant-composition scrutiny (CF-0036): estate-steward ledger practice extends to include tenant-cottage species-composition sorting as informal preference signal in exclusionary-polity-adjacent estates; CHARTER-RISK attaches to estates whose tenant-sorting crosses civic-charter-relevant lines (species-gated eviction, charter-relevant refusal of charter-sound mixed-species marriage recognition). SOC-1 firewall holds at civic-charter level: no estate may species-gate tenancy at chartered-claim level, though informal preference-signals exist and dowager-gossip tracks them. Dowager-gossip distinguishes "mix-sound house" (tenant-composition that matches local mixed-species baseline; charter-sound; reform-current-aligned) from "quietly single-species house" (tenant-composition drift toward single-species sorting; charter-risk-adjacent; refuser-aligned or supremacy-adjacent per household repute) — the distinction parallels CF-0031 charter-sound-vs-parvenu axis and CF-0033 dragoon-funding-council axis. Exclusionary-settlement-adjacent estates face compounded pressure: a noble-house situated near or deriving rental-income-flow from a single-species exclusionary settlement gains charter-risk visibility proportional to the arrangement's depth; estate-steward ledger-check includes exclusionary-settlement-contract disclosure at inheritance and civic-audit moments. **Cannibal-camp tenant-risk exposure**: wildland-adjacent estates whose tenant-cottage abandonment register includes interspecies-predation attribution face compounded charter-risk under the sealed-cannibal-case procedure (civic-watch evidentiary-hold at the sealed-docket classification level; estate-steward ledger-check records the attribution); the pattern parallels CF-0031 welfare-visibility arc. Retinue deployment against a known cannibal-band threatening tenant land is charter-sound parallel to CF-0034 bandit-defense; retinue pursuit into sealed-case-jurisdictional territory requires magistrate liaison and CF-0033 dragoon-scope firewall awareness (civic-magistrate handles; dragoons do NOT acquire cannibal-case role under any estate-retinue-adjacent pretext). **Harboring-or-provisioning-supremacist-band** scandal-tier: any estate found to harbor, provision, or fence for a cannibal-band or supremacist-doctrine camp faces charter-scandal parallel to habitat-cultivation (CF-0035), dragoon-kit counterfeit (CF-0033), or rival-tenant-action-under-bandit-pretext (CF-0034); civic-watch action expected; dowager-gossip circuits remember generations.

  ---
