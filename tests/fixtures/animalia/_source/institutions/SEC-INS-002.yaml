id: SEC-INS-002
file_class: INSTITUTIONS
order: 2
heading: Law / Custom / Judgment
heading_level: 2
body: |-
  - **Function**: dispute resolution, contract enforcement, criminal punishment, charter interpretation.
  - **Legitimacy source**: civic charter plus customary precedent; in some polities also noble grant or ecclesiastical confirmation.
  - **Material base**: courthouses, magistrates' offices, civic registry archives, watchhouses, gaols.
  - **Violence capacity**: chartered watch in cities; militias in towns and rural districts; mercenary contract in some polities.
  - **Recruitment**: appointment by the polity's chartered authority; some positions filled by examination, some by election within guild or estate, some by hereditary traditions in noble courts.
  - **Succession**: appointment cycles; inheritance in noble courts; rotation in some elective offices.
  - **Internal contradictions**:
    - civic charter versus species tradition (the structural Charter-Era tension);
    - codified law versus species-typical biological needs (e.g., obligate-carnivore butchery rights in vegetarian-clan-dominant towns);
    - watch authority versus guild private enforcement (especially artifact-extraction guilds);
    - fenland and highland communities sometimes ignore civic registry in favor of clan custom, and the courts must decide which to recognize.
    - <!-- added by CF-0021 --> regional divergence on artifact creation (CF-0021): polities accept, tolerate, fine, or jail; crafter-mobility creates novel extradition case law for which civic registry has no schema; civic registry refuses sectarian "personhood" claims about possessed artifacts (CF-0022) but the procedural mechanism for these refusals is still being worked out case by case.
    - <!-- added by CF-0024 --> contractor-contract case law (CF-0024): hazard-pay disputes, liability for contractor-caused collateral damage (especially during occult-fallout response), and extradition of named reputable contractors across polity lines form a growing docket. Mercenary-company licensure varies sharply by polity (license / tolerate / restrict / ban), mirroring the CF-0021 pattern. Noble-retinue-under-adventurer-contract creates Charter-Era anti-monopoly-of-force friction that civic watch periodically tests against estate guards.
    - <!-- added by CF-0028 --> ruin-expedition case law (CF-0028, CF-0030): four new docket classes — (a) funder-primacy disputes (patron asserts CF-0030 convention; guild or civic watch invokes CF-0008 chartered monopoly; magistrate adjudicates polity-asymmetric), (b) knowledge-killing prosecutions (ruin-entrance-information murder; CF-0019 qualification subcategory; killing-by-rival is primary enforcement in practice, civic prosecution is reactive), (c) inter-group skirmish prosecutions (two or more expeditions contesting one site; escalation has reached regional armed conflict in documented cases — see TIMELINE Layer 4), (d) resealing-authority disputes (which institution holds sealing authority over catastrophic ruin-sites — guild, civic watch, crown, or hybrid; "at least officially" formulations signal unresolved jurisdiction). Extradition case law extends further: expedition-sponsor extradition across polities with incompatible funder-primacy statutes adds to the CF-0021 / CF-0024 pattern already on the docket.
    - <!-- added by CF-0031 --> contamination-lineage ledger-mark case law (CF-0031): docket now includes registry-evasion prosecutions, fraudulent-registration cases, purge-convention disputes at generation-three expiry, inheritance-subcategory cases over registry-marked-estate asset-class recognition, and the migration-gap extradition dispute class — a fourth axis of Charter-Era regional-variation friction alongside CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, and CF-0028/CF-0030 funder-primacy. <!-- clarified by CH-0011 (inherited CH-0005 counting-drift; original prose omitted CF-0028/CF-0030) --> Charter-clause protection restricting civic-watch subpoena to welfare-purpose is continuously contested; magistrate precedent on welfare-vs-surveillance access is an active and evolving register. Magistrate-court docket-clerks gossip registry-fraud cases by household name in adopting-polity taverns; clerical testimony in contested cases is occasionally challenged on the same "corvid-clerk bias" grounds flagged under CF-0024's contracted-bard entry.
    - <!-- added by CF-0032 --> oversize-saddlery subsection case law (CF-0032): a new docket class, categorically DISTINCT from the three polity-asymmetric extradition patterns (CF-0021, CF-0024, CF-0031). Subsection disputes are cross-polity GUILD-INTERNAL DISCIPLINE, not Charter-asymmetry extradition — a journeyman who abandons reciprocity mid-circuit is a guild-disciplinary matter with civic-watch handoff only where charter monopoly is invoked. Docket includes: subsection-seal fraud and counterfeit-seal prosecutions (parallel to artifact-seal authentication), competing-polity seal-recognition disputes (when two ancestral polities issue seals and a third polity is asked to recognize an estate-commission), subsection-apprenticeship placement-breach cases (placement-right as inheritance/dowry asset generates inheritance-docket pressure at master-craftsman death), and long-lead-time export-commission breach suits. Both Subsection-Seal Fraud Precedent and Reciprocal-Travel Case Law are deferred to OPEN_QUESTIONS pending story-demand.
    - <!-- added by CF-0033 --> canal-corridor quarantine dragoon case law (CF-0033): a fifth polity-asymmetric disagreement-axis docket class joining CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028/CF-0030 funder-primacy, and CF-0031 contamination-registry. In adopting heartland polities, magistrate dockets now include: (a) dragoon cross-border pursuit extradition disputes — a dragoon unit pursuing black-market artifact traffic across a charter line into a non-adopting polity raises jurisdiction questions with no Charter-Era schema; (b) dragoon mission-creep charter-court challenges — principled-refuser clergy (CF-0026) and civic-reformist petitioners invoke charter-concession limits against scope expansion beyond ward-breach perimeter and sealed-quarter evacuation; (c) impersonation-of-dragoon civic prosecutions — a new named offense with retired-dragoon kit (uniform, crest, escutcheon) black-market prosecution pattern; (d) dragoon-guild jurisdictional disputes — where a dragoon perimeter action touches extraction-adjacent territory, chartered extraction guilds invoke the load-bearing perimeter/extraction boundary; (e) ruin-mouth three-force convergence jurisdictional-primacy disputes — where dragoon perimeter response, CF-0028 ruin-levy mobilization, and expedition-band skirmish converge at the same site, magistrates build slow precedent on which force holds primacy with visible anxiety. Charter-clause concession-limit jurisprudence is an evolving register; precedent is thinnest on (a) and (e).
    - <!-- added by CF-0034 --> endemic-banditry case law (CF-0034): a MINOR operational docket line — NOT a sixth structural Charter-Era asymmetry axis, because every polity agrees bandits should be suppressed; disagreement is only operational. Docket includes: (a) bounty-contract liability — what if a hunter-contractor kills an ordinary traveler mistaken for a bandit, or fails to deliver a captured bandit alive for trial, or damages estate tenant land in pursuit; SOC-3 coin-contract sacredness applies to the settlement-to-hunter contract as a bounty/suppression contract class with Charter-Era precedent in the "suppress banditry" military function; (b) cross-polity bandit-extradition — minor pursuit-cooperation disputes under uncontested-suppression-consensus, NOT the polity-structural disagreement that the five existing asymmetries produce; (c) captured-bandit trial-vs-summary-killing — principled-refuser clergy (CF-0026 extension) bring charter-court challenges for due-process in some polities; summary-killing-by-bounty-warrant remains the norm in others; precedent is uneven and evolving; (d) liberated-slave civic-registry reintegration — what status does a recovered captive take on return; common-pantheon restoration rite in some polities aligns civic-registry re-entry with ritual closure, most polities have no schema and rely on informal community acceptance; (e) ransom-prisoner status — a bandit-held captive awaiting ransom has ambiguous civic-registry standing (transactional proxy via kin; estate-steward-as-agent in noble cases; coin-contract doesn't naturally govern coerced negotiation); (f) harboring-and-fencing prosecutions — aiding bandits is criminal, evidentiary standards for "knowing provisioner" vs "honest tavern-keeper" are contested; (g) unchartered ransom-broker matchmaking is a legal gray zone (SOC-3 non-application); (h) bounty-hunter liability for collateral damage to third parties, especially tenant land. Potential sixth-axis watch: if polities develop structurally divergent bandit-extradition conventions (safe-harbor-for-reformed-bandits vs automatic-death-penalty), the current MINOR docket status could harden into a sixth polity-asymmetric disagreement axis — this is a latent burden tracked per CH-0008, not a current structural reality.
    - <!-- added by CF-0035 --> mutated-beast case law (CF-0035): a MINOR operational docket line paralleling CF-0034 — NOT a sixth structural Charter-Era asymmetry axis (uncontested-suppression-consensus holds: every polity wants the approach of a mutated beast dealt with). Docket includes: (a) bounty-contract liability for misattribution — ordinary wolf-strike or bear-strike claimed as mutated-beast for bounty purposes; authentication thin at village level, magistrate dockets absorb disputes through herb-wife / tavern-keeper / bounty-clerk testimony rather than through chartered-authentication procedure; (b) hunter collateral damage to tenant land during pursuit — estate-to-hunter contract liability under SOC-3; (c) trophy-provenance fraud and uncertified-trophy civic-refusal prosecutions — polity-asymmetric trophy legality (trophy-legal in some polities, contamination-prosecuted in others); (d) carnivore-folk progenitor-cult trophy-display complaint registers — sectarian-progenitor civic-complaint against lineage-blind cousin-beast trophy display in mixed neighborhoods, adjudicated informally via hearth-elder or dowager discretion, rarely reaching magistrate court; (e) cross-predicate hunter-contractor pursuit into adopting-polity dragoon-active ward perimeter — magistrate predicate-declaration required paralleling CF-0034 bandit-who-also-traffics-artifacts handling (M-13 boundary defense); (f) habitat-cultivation-for-prestige-hunt CHARTER-SCANDAL prosecutions (per Landholding extension below) — civic-watch scrutiny and charter-audit exposure where an estate-owner is alleged to have cultivated mutated-beast habitat for tourism. Latent-burden watch: if polities develop structurally divergent trophy-legality conventions (trophy-legal vs contamination-prosecuted, with incompatible extradition postures), the current MINOR docket status could harden into a sixth polity-asymmetric disagreement axis — tracked per CH-0009, not a current structural reality; compounds the CF-0034 latent-burden watch.
    - <!-- added by CF-0037 --> family-handled waystation case law (CF-0037): a MINOR operational docket line paralleling CF-0034 / CF-0035 / CF-0036 — NOT a sixth structural Charter-Era asymmetry axis (uncontested-tradition-consensus on waystation legitimacy and uncontested-suppression-consensus on bandit-fronting hold; polity disagreement is operational only, in per-polity tenancy/licensing regime variation deferred to OPEN_QUESTIONS). Docket includes: (a) waystation-succession disputes — multi-heir succession claims, inheritor-refusal cases, partition-of-placement-right adjudication; (b) estate-vs-family tenancy disputes — where a waystation sits on noble-estate tenant land, friction between estate-steward ledger-claim and stationkeeper-family inheritance-claim reaches civic court (or clan-elder-sanction in highland); (c) bandit-fronting prosecutions — where a stationkeeper-family or inheritor self-exiles into banditry and the station turns to corridor-betrayal (provisioning a raid-band, signaling traveler arrival for kickback), prosecution proceeds under CF-0034 §(f) harboring-and-fencing standards, but with a sharper-than-ordinary evidentiary register because the fronting station weaponizes ordinary commerce against the travelers it is meant to serve; (d) civic-registry tenancy-recordation disputes — clerical or ledger-error cases under existing chartered-tenant register (Family/Clan/Household line 14 civic-registry mediation extends to waystation tenancy without new archival category); (e) waystation-defense charter-sound retinue parallel to CF-0034 §bandit-defense-of-tenant-land — estate-owner deployment of CF-0024 noble-retinue against bandit-raid on estate-tenant waystation is charter-sound; pursuit beyond estate jurisdiction triggers magistrate liaison parallel to ordinary CF-0034 framework; (f) inn-guild charter friction — heartland canal-town charter-inn proprietors occasionally invoke charter-monopoly claims against family-waystation revenue on connector-routes, but no chartered polity has upheld such a claim (waystations are NON-CHARTERED household-enterprises operating on connector-routes the canal-town inn-network does not reach); (g) child-labor-vs-charter-school friction — chartered-polity charter-school enrollment is expected for waystation-children, and chore-from-young pattern at the family stop is informally tolerated where enrollment is maintained; mandatory-enrollment vs station-labor adjudication is unevenly emerging across adopting polities. Latent-burden watch: if polities develop structurally divergent CHILD-CONSCRIPTION-PROTECTION conventions (mandatory charter-school-vs-station-labor adjudication), the MINOR docket could harden into a sixth polity-asymmetric disagreement axis — tracked per CH-0012, NOT current structural reality; FOURTH parallel sixth-axis watch-item now in the register (alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing).
    - <!-- added by CF-0036 --> endemic-interspecies-friction case law (CF-0036): a MINOR operational docket line paralleling CF-0034 and CF-0035 — NOT a sixth structural Charter-Era asymmetry axis (uncontested-suppression-consensus holds at PROSECUTION level: every chartered polity agrees cannibalism is prosecutable, hate-speech is magistrate-reachable, exclusionary refusal is extradition-dispute-subject; polity disagreement is operational only in silence-protocol-unsealing convention and exclusionary-settlement extradition precedent). Docket includes: (a) hate-speech and public-mockery magistrate cases — extending PEOPLES "public mockery of species drives is poor form" into formal magistrate docket where the tavern joke-threshold is crossed in charter-relevant contexts (guild-hall, civic-watch barracks, magistrate-court, charter-school, civic-registry counter); evidentiary standards track standard slander-and-defamation procedure; penalty escalates where supremacist-doctrine recruitment register is present; (b) exclusionary-settlement extradition disputes — spurned-migrant magistrate docket where a naga-folk bargemaster, a cat-folk traveler, a beaver-folk stonemason is refused inn or charter-work in a single-species enclave with no civic-registry polity-status; Charter-Era emerging precedent is thin but extradition-complaint-receivable; (c) interspecies-cannibalism SEALED prosecutions — closed-court procedure under euphemistic "grave-violation-of-person" classification (see Recordkeeping extension below); magistrate-warrant-gated access; prosecution continues (silence-protocol is SCANDAL-CONTAINMENT, not prosecutorial refusal — civic registry that declines to prosecute would implicitly recognize the supremacist "lesser sentients" reading, breaching the Charter-Era settlement); evidentiary standards track standard homicide with a sealed-register classification overlay; (d) silenced-witness retaliation and reprisal magistrate cases — contractor or adventurer witness who breaks silence faces civic-watch-initiated reprisal-complaint or estate-initiated civil suit; reform-current principled-refuser clergy (CF-0026 CH-0010 bifurcation) organize charter-court defense in adopting polities; precedent is emerging, asymmetrically across polities; (e) cross-species predation charging-tier disputes — whether interspecies-cannibal prosecution carries aggravated-homicide tier or same-tier-as-ordinary-homicide treatment is an evolving precedent register; charging-tier asymmetry would flirt with recognizing a species-distinction civic-law category, which SOC-1 firewall forbids; most polities currently charge at same-tier with sealed-register classification; (f) CF-0033 dragoon-scope firewall defense — civic-suppression and cannibal-case investigation are NOT dragoon chartered functions; magistrate/civic-watch reserved; any dragoon evidentiary or enforcement role triggers CF-0033 CH-0010 mission-creep charter-court challenge. Latent-burden watch: if polities develop structurally divergent silence-protocol unsealing conventions (never-unseal vs reform-unsealing-on-petition) or exclusionary-settlement extradition conventions (safe-harbor vs enforced-admission), the current MINOR docket status could harden into a sixth polity-asymmetric disagreement axis — tracked per CH-0010, not a current structural reality; compounds the CF-0034 and CF-0035 latent-burden watches (three parallel sixth-axis watch-items now in the register).
    - <!-- added by CF-0043 --> Ash-Seal civic-commercial concordat case law (CF-0043): a MINOR operational Brinewick-local docket line paralleling CF-0034 / CF-0035 / CF-0036 / CF-0037 watch-item registers — NOT a sixth Charter-Era polity-asymmetric structural axis (Ash-Seal is Brinewick-unique; non-transferable civic charter; no other polity has an equivalent arrangement to disagree about). Docket includes: (a) Ash-Seal-guild concordat-boundary disputes — where Ash-Seal containment action touches extraction-adjacent territory or where chartered-extraction-guild ward-inspection touches containment-adjacent territory, magistrate adjudicates on the load-bearing extraction/containment boundary; precedent is slow, generally preserving the guild's extraction monopoly under SOC-4 and Ash-Seal's containment monopoly under civic-charter terms; (b) trade-secret facility-location litigation — theft-attempt prosecution under Brinewick sedition-libel-adjacent statute; unauthorized entry / observation / disclosure civil-penalty tier paralleling ward-specifics restricted-speech per CAU-3; (c) Ash-Seal-to-officials backchannel corruption prosecutions — commercial-corruption magistrate-docket category where an Ash-Seal employee sells safe-class / moderate-tier declared-inventory artifacts to wealthy Brinewick parties in contravention of hold-for-study / disposal mandate; sealed-docket classification under existing CF-0036 "grave-violation-of-civic-duty" adjacent register where buyer is named civic-council member acting in private capacity; prosecution-difficulty reliably high (chain-of-custody documentation is trade-secret-protected at Ash-Seal's end; civic-council member buyers have charter-audit protection on their private transactions unless the buy is at catastrophic-tier, which Ash-Seal's own concordat forbids routing through backchannel); (d) defector-covenant-breach civil suits — Ash-Seal pursues defecting employees in civic court on trade-secret covenant-breach grounds (publication of specific procedural-protocol text; carrying archive content across polity lines); magistrate precedent distinguishes EMPIRICAL CRAFT knowledge (defector may carry; parallel to journeyman-migration register) from SPECIFIC PROTOCOL TEXT / ARCHIVE CONTENT (defector may not carry; covenant-breach); evolving register; (e) biannual charter-audit cycle challenges — reform-current clergy (CF-0026) and civic-reformist petitioners bring charter-court petitions for audit-access to Ash-Seal research archive; Ash-Seal resists; magistrate grants are exceptional-not-routine; precedent is emerging slowly; (f) Ash-Seal commercial property-protection guards beyond-perimeter deployment friction — CF-0024 civic-watch complaint register when Ash-Seal guards pursue alleged theft beyond facility perimeter; eleventh CF-0024 concurrent-claim absorbed into extraction-escort sub-specialty per Rule 3 firewall; magistrate precedent protects perimeter-bounded deployment and sanctions beyond-perimeter action. Latent-burden watch: Ash-Seal trade-secret-extradition framework (what happens when an Ash-Seal defector carries trade-secrets to a competing heartland polity's chartered-extraction-guild roster) is a TENTH-LATENT sixth-axis watch-item candidate — currently minor operational docket, could harden into a polity-asymmetric structural axis if defector-migration-to-competing-polity cases accumulate substantial extradition caseload; tracked per CH-0015, NOT current structural reality. Charter-Era settlement STRAINS at Brinewick-local density but does not break.

    - <!-- added by CF-0042 --> artifact-as-status-object economy case law (CF-0042): a FIFTH PARALLEL SIXTH-AXIS LATENT-BURDEN WATCH-ITEM — NOT a new sixth Charter-Era structural axis. Docket includes: (a) declared-inventory display-registration compliance — polity-asymmetric regimes on what constitutes declared vs undeclared display; some polities require guild-stamp + civic-registry entry prior to any guest-reception showing, some treat display as de-minimis below-threshold, some impose fines-only, some do not regulate; extradition friction where a traveler brings a displayed artifact across a declared-vs-undeclared charter line; (b) artifact-theft civic-watch vs guild-broker-reclaim jurisdiction — chartered extraction-guild brokers claim first-purchase right on recovered stolen artifacts; civic-watch wants evidentiary chain; pursuit contracts from victim-household to CF-0024 contractor stratum are standard; CF-0033 dragoon scope applies ONLY under cross-border black-market artifact-traffic predicate, not routine theft response; (c) assassination-on-artifact-owner homicide docket — artifact-adjacent homicide as recognizable tier, with bodyguard-retinue-liability sub-register parallel to CF-0024 contractor-collateral-damage; (d) state-security concealment dissident-publishing prosecutions — broadsides naming specific catastrophic incidents prosecuted under seditious-libel registers in some polities, under civic-scandal-prior-restraint in others; the diffuse-rumor register itself is not prosecutable (nothing specific said), but specific-named-incident publication is — M-2 anti-evidence firewall defends the diffuse boundary; (e) authentication-cartel formation prosecutions — if chartered-broker houses coordinate to restrict authentication services or blacklist unapproved provenance-claimants, charter-audit anti-monopoly provisions apply; eighth cartel-pressure vector per ECONOMY extension; (f) stolen-status-artifact fencing via CF-0034 bandit-stolen-goods rail is prosecutable under existing CF-0034 harboring-and-fencing standards with no new offense category (Rule 3 absorption per CH-0014); (g) bodyguard-contract liability is prosecutable under existing CF-0024 contractor-liability standards with no new offense category (Rule 3 absorption per CH-0014; eleventh concurrent-claim on veteran pool). Latent-burden watch: if polities develop structurally divergent display-registration stringency conventions (punitive-undeclared vs permissive-registration vs full-exemption), the current FIFTH parallel sixth-axis latent-burden watch-item could harden into a sixth polity-asymmetric disagreement axis — tracked per CH-0014, NOT current structural reality. Charter-Era settlement STRAINS under compounding watch-item load but does not break.

    - <!-- added by CF-0044 --> drylands hospitality-literacy case law (CF-0044): a MINOR operational docket line — NOT a sixth polity-asymmetric structural axis, NOT a parallel latent-burden watch-item. Drylands short-poetry stranger-hospitality protocol (CF-0044) is non-chartered folk-practice and does NOT reach magistrate case-law at Charter-Era level. If hospitality-literacy-non-transferability is raised in a canal-heartland migrant-dispute (a drylands-origin migrant's prior-verse-competence or a canal-heartland-origin migrant's inability-to-turn-a-verse-at-the-drylands-gate cited in a character-evidence capacity), it functions as ordinary cultural-fit character evidence — NOT as a chartered-standard gate, NOT as a new civic-registry category, NOT as a magistrate-adjudicated competence-test. The convention is ordinary cultural-literacy register paralleling tavern-vouch cadence at the social-friction level rather than at the chartered-institutional level. Rule 4 globalization firewall: hospitality-literacy does NOT travel out of drylands as chartered case-law; no magistrate extradition question arises; no sixth-axis accretion. Not on the sixth-axis latent-burden watch-item register.
    - <!-- added by CF-0046 --> drylands caravan-master corridor-internal customary-adjudication (CF-0046): a MINOR operational non-docket line — NOT a sixth polity-asymmetric structural axis, NOT a parallel latent-burden watch-item. Caravan-master corridor-internal customary-adjudication handles minor disputes arising within a caravan rotation or at corridor nodes (intra-caravan labor, supply-share, rest-stop grievance, well-stop hosting friction, verse-turn etiquette breach) under reputation-enforced convention rather than magistrate-enforced charter. Scope firewall: **NOT magistrate-reachable** (caravan-master rulings carry no extradition weight across polity lines; drylander disputing a well-stop inheritance whose case reaches canal-heartland magistrate court is handled under canal-heartland civic-court default with caravan-master prior ruling as ordinary character-evidence only); **NOT chartered** (no caravan-master guild-body, no seal, no master-rank progression); **NOT sixth-axis** (drylands polities AGREE on the thin-institution equilibrium; GEOGRAPHY §Regional Asymmetry on Drylands Institutional Thinness makes this explicit). **Graft/coercion stabilizer**: multi-caravan-master network cross-corridor reputation-boycott — a caravan-master who sells rulings accrues corridor-reputation-damage at the multi-master-network scale and loses rotation standing; a caravan-master whose adjudication is consistently unreasonable at the well-stop network level loses the well-keepers' willingness to host the rotation; the reputation-network is the structural brake, paralleling CF-0034 waiting-wolves judgment and CF-0036 mix-sound judgment reputation registers. Disputes that exceed corridor-internal scope (cross-polity contract breach, serious violence, artifact-adjacent or registered-household cases) default to magistrate-court jurisdiction at the nearest chartered polity — which is typically four days' ride away from deep-corridor nodes. Drylander who accepts caravan-master ruling and goes home is the common case; drylander who rides north to contest the case is the rare case; neither is dishonored. Rule 4 globalization firewall: caravan-master adjudication is drylands-corridor-scoped and does NOT travel into canal-heartland civic-court default procedure. Runner-reached village militia emergency-response (CF-0046): informal folk-practice, NOT a new CF-0020 standing-militia subtype, NOT dragoon-precursor (CF-0033 non-adoption preserved in drylands per existing Regional Asymmetry); response-capacity proportional to village population and drought-year traffic compression; ordinary village self-defense convention paralleling fenland amphibian-folk canary-vigilance relay pattern at CF-0025 scale.

