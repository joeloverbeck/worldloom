id: SEC-INS-010
file_class: INSTITUTIONS
order: 10
heading: Recordkeeping / Archives / Myth Transmission
heading_level: 2
body: |-
  - **Function**: preserve contracts, deeds, chronicles, songs, occult fragments.
  - **Legitimacy source**: charter plus custodial reputation.
  - **Material base**: scriptoria, civic-registry archives, wax-tablet halls, monastic libraries, bardic memory tradition.
  - **Violence capacity**: low.
  - **Recruitment**: scribes, bards, archivists, monks, charter-clerks.
  - **Succession**: training and appointment.
  - **Internal contradictions**:
    - occult-fragment custody is contested between civic archive, artifact-guild, and theological authority — three competing claims, never fully resolved; <!-- added by CF-0023 --> a fourth, illegitimate custodian (the black market) now circulates the operationally usable subset (artifact-creation grimoires, CF-0021); civic archives in tolerant polities effectively become safe-harbors; punitive polities demand extradition of fragments; bardic oral transmission becomes a deniable workaround;
    - bards (oral) and scribes (written) compete over authoritative narrative — the same Charter-Era event often has a Charter Hall version, a temple version, and a tavern-cycle version, and they do not agree;
    - corvid-folk are disproportionately represented in scribal and archival professions; this is empirical but politically sensitive in some polities.
    - <!-- added by CF-0024 --> contracted-bard narrative-custody (CF-0024): bards engaged as contracted agents (extending CF-0017) produce narrative material — songs, tales, reports — under patron payment. This creates a fifth, economically-incentivized narrative-custody channel whose custodianship follows payment rather than charter. Noble patrons, sectarian sponsors, and wealthy crafters commission narrative custody that bypasses civic archive entirely. Scribal guilds (corvid-folk disproportionate) resent the competition; civic-registry attempts to require contracted-bard performance registration in charter polities largely fail. The famous occult-fallout specialist's reputation is often a contracted-bard artifact (see Mystery Reserve M-7).
    - <!-- added by CF-0028 --> ruin-cartography custody (CF-0028): entrance-knowledge of enterable ruins constitutes a fifth illegitimate custody category in addition to the fourth (black-market grimoires per CF-0023) and the three legitimate ones (civic archive, artifact-guild, theological authority). Ruin-cartography is maintained outside formal archive by patron-syndicates, chartered expedition-venture companies in polities that license them, veteran expedition-contractors, and black-market brokers. Enforcement is primarily killing-by-rival rather than civic prosecution — a distinct pattern from CF-0019 grimoire enforcement. Bardic-oral deniability operates as a workaround parallel to the CF-0023 grimoire workaround: a song about an expedition route is not a ledger entry. Contracted bards (CF-0024 extension of CF-0017) sometimes carry entrance-knowledge as coded performance-material; patron-commissioned expedition-reports are partisan-canon, not archival-canonical (CF-0028 anti-propaganda clause). Civic archives in tolerant polities become safe-harbors for cartographic fragments; punitive polities demand extradition. This sharpens the pattern CH-0002 established for grimoires — two parallel illegitimate custody streams, sharing mechanics but distinct in content.
    - <!-- added by CF-0031 --> contamination-lineage ledger-mark archive (CF-0031): the civic-registry subsidiary archive holds ledger-mark enrollments, purge-convention records, dispute adjudications, and guild-pension-supplement coordination ledgers in adopting polities. This is a welfare-administrative category categorically distinct from occult-fragment (CF-0019 / CF-0023) and ruin-cartography (CF-0028) custody streams — NO strain on those three legitimate / two illegitimate occult-custody channels. It constitutes a sixth archival category alongside contract, deed, chronicle, occult-fragment, and ruin-cartography streams, with novel access-politics: welfare-purpose access is charter-protected, civic-watch subpoena requires magistrate warrant, and principled-refuser clergy (CF-0026) in some polities have secured witness-access for reform-current oversight. Corvid-folk overrepresentation in scribal professions extends into registry-clerkship; registry-clerk testimony in magistrate cases is occasionally contested on "corvid-clerk bias" grounds, compounding the sensitivity already flagged under CF-0024's contracted-bard annotation.
    - <!-- added by CF-0032 --> reciprocal-journey verification archive (CF-0032): subsection master-rank progression requires inter-polity verification of completed reciprocal-journey segments. Custody is guild-internal within the ancestral-polity wainwright/saddlery guilds, with charter-clerk civic-copy deposit in charter-polities where reciprocity is civically recognized. This is a seventh archival category distinct from contract, deed, chronicle, occult-fragment, ruin-cartography, and contamination-ledger streams — a guild-discipline/civic-hybrid custody with no analog in the existing archival taxonomy. Authentication of genuine subsection-seal vs imitation sits near-inspector-adjacent but is NOT inspector work (inspectors are artifact-guild per Trade/Guilds §Subtype); authentication is its own guild-internal sub-specialty with cartel-formation pressure flagged parallel to CF-0028 authentication-specialists. Corvid-folk overrepresentation in scribal professions extends into reciprocal-journey clerkship; cross-polity Cluster C guild records passing through predominantly corvid-folk scribal hands is politically sensitive on the same "corvid-clerk bias" grounds already flagged under CF-0024 and CF-0031.
    - <!-- added by CF-0034 --> bandit-related bardic narrative-custody subgenre (CF-0034): bandit-ballads, raid-lament songs, hunter-contractor-return accounts, and named-bandit-captain bardic-cycle material form a recognizable subgenre within the contracted-bard narrative-custody register (CF-0024 extension of CF-0017). The subgenre stratifies into four layers for adopting-polity audiences to discriminate — (i) raid-lament songs about named destroyed settlements and their widow-counts (aftermath-register, AES-1 scarred cadence); (ii) hunter-contractor return accounts (dry, numerical, pensionable-service register — parallel to CF-0033 tavern-veteran dragoon account layer; *"we hunted the corridor in the wet month; two of four came back, one won't say"*); (iii) named-bandit-captain bardic cycles (civic-mobilization propaganda register whose historicity is contested per Mystery Reserve M-14 — bandit-captain historicity is a bounded-unknown spanning historical-individuals / composite-figures / pure-invention / mixed readings; bardic moral-witness-refusal threshold applies — **no ballad for a captain whose camp held slaves beyond threshold** in most bardic traditions, though sectarian-commissioned bards violate this threshold for pro-supremacist recruitment purposes); (iv) bounty-ethics reform broadsides (patron-commissioned by reform-current clergy [CF-0026] arguing for trial-not-summary-killing; litigious register, cited precedent, NOT revolutionary pulp). Corvid-folk overrepresentation in scribal professions extends into bandit-ballad transcription and named-captain genealogy bardry; the same "corvid-clerk bias" political sensitivity flagged under CF-0024 / CF-0031 / CF-0032 / CF-0033 compounds a fifth time, especially where contested named-captain historicity (M-14) interacts with civic-mobilization propaganda register. Civic-watch incident reporting for bandit-raids and captured-bandit processing is absorbed into existing civic-watch incident reporting streams — this is NOT a new numbered archival category, and dragoon civic-evidence archives (CF-0033 eighth category) do NOT acquire a bandit-incident sub-ledger.
    - <!-- added by CF-0033 --> canal-corridor quarantine dragoon civic-evidence archive (CF-0033): in adopting polities, dragoon unit records — muster rolls, drill-day rotas, turnout-call logs, ward-breach incident reports, evacuation rosters, confiscated-material disposition ledgers, pensionable-service records, retired-dragoon civic-advisory appointment trails — constitute an eighth archival category distinct from the seven existing streams. Custody is civic-registry-held with magistrate-oversight access protocol; reform-current clergy (CF-0026) have in some adopting polities secured witness-access for mission-creep oversight, paralleling their CF-0031 welfare-purpose access. M-9 firewall (load-bearing): dragoon civic-evidence archives of confiscated broker-material do NOT constitute a Maker-knowledge custody channel. Disposition of confiscated artifacts follows chartered-guild handoff protocols per CF-0008 CH-0004 funder-primacy framework (chartered-broker purchase channel for legal disposition; civic seizure under SOC-4 for unlicensed catastrophic-class); civic retention of artifact-material beyond evidentiary-hold is forbidden. Dragoon incident reports describing confiscated artifact behavior must be written in civic-procedural language (seizure, manifest, transfer) without characterizing artifact behavior in agency-attributive terms (M-6 firewall). M-11 firewall: dragoon pensioner-health longitudinal records are occupational-epidemiological NOT contamination-heritability-evidentiary; the three-generation interval in CF-0031 is scrivener's convention and does NOT carry over as parallel data substrate via dragoon records. Corvid-folk overrepresentation in scribal professions extends into dragoon civic-evidence clerkship; the same "corvid-clerk bias" political sensitivity flagged under CF-0024 / CF-0031 / CF-0032 compounds a fourth time.
    - <!-- added by CF-0038 --> Brinewick civic-registry density + canal-warden inspection-log archive (CF-0038): Brinewick's civic-registry archive is near-continental density by Charter-Era depth, migration volume, commerce density, and scandal caseload. The registry's subsidiary-record capability (per CF-0031 precedent) in Brinewick supports the CF-0031 contamination-lineage ledger-mark enrollment stream + CF-0033 dragoon civic-evidence archive + CF-0036 sealed-docket interspecies-predation archive + ordinary contract / deed / chronicle / tenancy / charter streams at exemplar volume. Brinewick's **canal-warden inspection-log archive** constitutes a tenth archival category distinct from the existing nine streams (contract, deed, chronicle, occult-fragment, ruin-cartography, contamination-ledger, reciprocal-journey, dragoon-civic-evidence, sealed-docket) — chartered-watch-subtype archive containing lock-usage-manifests, cargo-audit entries, tariff-collection ledgers, pursuit-of-unlicensed-canal-traffic incident reports, and backchannel-exposure investigation case-entries. Custody: civic-registry-held under magistrate oversight; access protocol: routine-civic-watch investigative access for ordinary tariff disputes, magistrate-warrant-gated access for backchannel-exposure investigation cases, reform-current clergy (CF-0026) witness-access for charter-audit-cycle review per CF-0038 biannual-cycle commitment. M-9 firewall: canal-warden inspection-logs do NOT constitute a Maker-knowledge custody channel (even where logs describe lock-bed dredge-find artifact material handed off to extraction-guild under CF-0038 pre-dredge certification protocol; archival entries are civic-procedural manifest records, not Maker-research material). M-11 firewall: canal-warden pensioner-health longitudinal records (where kept) are occupational-epidemiological regarding canal-contamination exposure, NOT contamination-heritability-evidentiary regarding CF-0031 three-generation-mark convention. Corvid-folk overrepresentation in scribal professions extends into canal-warden inspection-log clerkship; the "corvid-clerk bias" political sensitivity flagged under CF-0024 / CF-0031 / CF-0032 / CF-0033 / CF-0034 / CF-0036 compounds a SEVENTH time — Brinewick canal-warden clerkship-access concentration is a named reform-current charter-audit-cycle focus.

    - <!-- added by CF-0036 --> interspecies-predation sealed-docket archive (CF-0036): in mixed-species chartered polities, magistrate-court sealed prosecutions of interspecies-cannibalism and sealed magistrate rulings on interspecies-predation-adjacent evidence-suppression cases are filed under a euphemistic **"grave-violation-of-person"** subsidiary-docket classification — Charter-Era subsidiary-record capability per CF-0031 precedent extends into criminal-adjudication territory here. Custody is civic-magistrate-held; access is MAGISTRATE-WARRANT-GATED ONLY (distinct from CF-0031 welfare-access protocol — NO clergy-witness access, NO reform-current-witness-access, NO civic-adjacent witness pathway; sealed is sealed at the criminal-adjudication level). The sealed-docket protocol is SCANDAL-CONTAINMENT, NOT prosecutorial refusal: prosecution proceeds, burial of victim-remains is arranged, contractor-witness testimony is heard, verdict is entered, sentence is executed — all under euphemistic classification. Bureaucratic-drift register per CF-0033 template: *"the case was re-classified, the roster was redacted, the inspector was reassigned"* — NOT conspiracy-thriller cadence. Sealed-docket magistrate-clerk bribery for case-leak is an emerging corruption category paralleling occult-fragment sealed-custody streams (CF-0023, CF-0028); civic-watch flags. Contractor-witness-silencing is done through civic-watch intake-interview, charter-restriction on public-speech-of-sealed-case content, and penal-consequence for breach; silenced contractor is ABSORBED into CF-0024 failed-reputation-contractor feeder (Rule 3 firewall; NOT a separate stratum). Access-politics: reform-current principled-refuser clergy (CF-0026 CH-0010 charter-defense wing) campaign for MAGISTRATE-REVIEW unsealing procedure under named predicates (retaliation-complaint; estate-boundary-dispute; inter-polity extradition); civic-restraint wing accepts silence-protocol as stabilizer. This is a NINTH archival category distinct from the eight existing streams (contract, deed, chronicle, occult-fragment, ruin-cartography, contamination-ledger, reciprocal-journey, dragoon civic-evidence) — criminal-adjudication sealed-subsidiary-docket with NO welfare-access analog; magistrate-warrant-gated access only. Corvid-folk overrepresentation in scribal professions extends into sealed-docket magistrate-clerkship; the "corvid-clerk bias" political sensitivity flagged under CF-0024 / CF-0031 / CF-0032 / CF-0033 / CF-0034 compounds a SIXTH time — sealed-cannibal-case clerk bias is the heaviest political-sensitivity compounding yet, and reform-current clergy civic-review campaigns explicitly name clerkship-access concentration as charter-audit concern. M-14 firewall cross-application: named interspecies-cannibal captains accruing bardic mythography sit WITHIN the existing M-14 antagorinen-mythography register (sub-cohort parallel to CF-0034 named-bandit-captain historicity contestation), NOT a new M-register.
    - <!-- added by CF-0040 --> mundane-find civic-scribe intake register (CF-0040): mundane-tier artifact intake at chartered extraction-guild inspector-offices and lock-master-offices generates a new sub-ledger under the existing **civic-registry subsidiary-record capability** (per CF-0031 precedent) — NOT a new numbered archival category (eleventh), but an extension of the existing civic-registry contract/deed/chronicle stream with mundane-find classification, finder-identification, disposition outcome (registered/confiscated/released-to-guild), and per-polity finder-fee schedule reference. In Brinewick the volume is exemplar-high per CF-0038 dredge-find-registry pressure. Custody is civic-registry-held; access is routine. M-9 firewall holds — mundane-find classification is civic-procedural manifest record, NOT Maker-knowledge material.
    - <!-- added by CF-0043 --> Ash-Seal commercial trade-secret research archive (CF-0043): in Brinewick specifically, the Ash-Seal company's internal research archive (containment-procedure documentation, vessel-design technique notes, disposal-site selection logs, incident-response case files, empirical classification vocabulary development) constitutes an ELEVENTH archival category in the expanded taxonomy — commercial-trade-secret custody, categorically distinct from the ten existing civic-held or guild-held streams. Custody: company-internal under trade-secret covenant; civic-legally PROTECTED against civic-registry subpoena except under charter-audit predicate per Ash-Seal civic-charter terms (OPEN_QUESTIONS §Ash-Seal Civic-Charter Terms deferred). Access-politics: reform-current clergy (CF-0026 CH-0010 charter-defense wing) standing charter-audit-access campaign is ELEVENTH audit-pressure target; biannual charter-audit cycle (CF-0038) nominally covers Ash-Seal audit-access but company-resistance is reliable and access-grant is exceptional-not-routine. **M-1 firewall LOAD-BEARING**: Ash-Seal research archive is EMPIRICAL CONTAINMENT/CRAFT knowledge ONLY (handling protocols, vessel-design empirical notes, disposal-site selection, incident-response patterns); NOT Maker-cognitive content, NOT civilization-identity findings, NOT cause-of-fall evidence. **M-9 firewall LOAD-BEARING**: Ash-Seal trade-secret archive is NOT a seventh (eighth) Maker-knowledge custody channel — it lives in the civic-archive taxonomy as commercial-empirical-craft custody, structurally parallel to guild-internal craft archives (paralleling chartered-extraction-guild's internal containment-wright training archive, which is guild-internal custody also outside civic-registry subpoena) but with the civic-charter trade-secret-protection clause as additional barrier. Defector-specialist portable reputation is EMPIRICAL CRAFT knowledge (CF-0006 ONT-2 family), NOT proprietary covenant-breach material — defectors carry craft-know-how under standard journeyman-migration register; carrying Ash-Seal specific procedural-protocol text or the trade-secret-classified archive content constitutes covenant-breach prosecutable under Brinewick civil-penalty statute. Sectarian Maker-mystic readings that Ash-Seal's trade-secret archive is "recovered Maker research" are CONTESTED-SECTARIAN PROJECTION (paralleling CF-0023 grimoire-as-Maker-research sectarian register), NOT world-truth; the archive's contents are post-Charter empirical-craft accumulation, not Maker-Age knowledge recovery. Corvid-folk overrepresentation in scribal professions MINIMALLY extends here — Ash-Seal employs in-house scriveners under trade-secret covenant who tend NOT to rotate through civic-registry scribal guild labor-pool (covenant prohibits publication and rotation), so the "corvid-clerk bias" political sensitivity compounds a NINTH time but at reduced pressure (in-house covenant-bound clerkship is relatively isolated from civic-registry scribal circulation). M-N firewall holds; SOC-4 chartered-guild-monopoly over chartered-guild-internal research archives preserved (Ash-Seal's civic-commercial archive is structurally parallel but civic-chartered, not guild-chartered).

    - <!-- added by CF-0042 --> sealed-catastrophic-rumor docket (CF-0042): rumor-register on state-security concealment of specific catastrophic-class artifact discoveries generates a subsidiary dissident-publishing-and-broadside docket in some polities under sedition-libel or civic-scandal-prior-restraint statutes. The docket is structurally parallel to the CF-0036 sealed-cannibal-case docket in SCANDAL-CONTAINMENT procedural register (re-classification, roster redaction, inspector reassignment) but is categorically distinct in both subject-matter and evidentiary burden: CF-0036 docket prosecutes confirmed crimes with sealed classification; CF-0042 docket prosecutes PUBLICATION of specific-named-incident content that would breach the M-2 anti-evidence firewall. The docket PRESUPPOSES that no named-incident has been confirmed at world-level; prosecution targets the PUBLICATION-BREACH, not the underlying incident. This is a TENTH archival category in the expanded taxonomy (contract, deed, chronicle, occult-fragment, ruin-cartography, contamination-ledger, reciprocal-journey, dragoon-civic-evidence, sealed-docket, now sealed-catastrophic-rumor) — OR, alternatively, an operational sub-classification under the CF-0036 sealed-docket stream; polities vary on filing convention. Reform-current clergy (CF-0026 CH-0010 charter-defense wing) campaign for magistrate-review-under-predicate unsealing procedure paralleling their CF-0036 campaign. Corvid-folk overrepresentation in scribal professions extends into sealed-catastrophic-rumor clerkship; the "corvid-clerk bias" political sensitivity compounds an EIGHTH time (after CF-0024 / CF-0031 / CF-0032 / CF-0033 / CF-0034 / CF-0036 / CF-0038). M-2 firewall LOAD-BEARING: the docket must never accumulate named-incident content; any prosecution material that would verify a named catastrophic-class incident at world-level is categorically out-of-canon and requires explicit canon-addition run with user approval.

    - <!-- added by CF-0044 --> drylands hospitality-poetry non-archival commitment (CF-0044): drylands short-poetry stranger-hospitality verse (CF-0044) generates NO archival register — oral-only, performance-ephemeral. No tea-house-scribe transcription convention (tea-house scribes in drylands traditions witness contracts per CF-0024 / CF-0028 / CF-0034 / CF-0036, but do NOT transcribe hospitality-verse — the convention's ephemerality is load-bearing for its status as hospitality-protocol rather than archival institution). No caravan-master ledger entry. No civic-registry trace. No new archival category added to the expanded taxonomy — explicitly NOT an eleventh or twelfth category beyond the current (contract, deed, chronicle, occult-fragment, ruin-cartography, contamination-ledger, reciprocal-journey, dragoon-civic-evidence, sealed-docket, sealed-catastrophic-rumor, Ash-Seal-trade-secret). Circuit-bard (CF-0017) absorption of verse-fragments into bardic-tavern material operates in the existing CF-0017 narrative-custody channel downstream of the performance-moment — this is bardic-repertoire transmission, NOT a new custody institution. Corvid-folk scribal-profession overrepresentation has no extension here (nothing is scribed). M-7 holding clause (CH-0016 cross-application) governs the absence-of-authority register for drylands verse-competence reputation.
    - <!-- added by CF-0046 --> drylands corridor station-log household-held non-archival commitment (CF-0046 / CF-0047): drylands well-keeper station-log kept at the well-stop in DIS-2 trade-tongue (CF-0046 corridor substrate; CF-0047 keeper competence) is **NOT a new numbered archival category** in the expanded taxonomy — explicitly NOT a twelfth category beyond the current eleven (contract, deed, chronicle, occult-fragment, ruin-cartography, contamination-ledger, reciprocal-journey, dragoon-civic-evidence, sealed-docket, sealed-catastrophic-rumor, Ash-Seal-trade-secret). Station-logs are household-held informal corridor-commercial records (traveler counts, supply-run entries, caravan-rotation timing notes, water-share ledger, occasional contract summary) kept by the well-keeper lineage as family-property paralleling CF-0037 waystation household-ledger NON-ARCHIVAL posture. Custody: household-held under customary family-property; no civic-registry trace; no chartered-guild deposit; no magistrate-warrant access procedure. Sparse by convention — the drylands oral-primary partial-literacy register (CH-0018 DIS-2 clarification) keeps the log as light-notation supplement to dominant oral transmission. Corvid-folk overrepresentation in scribal professions has NO extension into station-log clerkship (well-keeper keeps her own log; no civic-registry scribal rotation). **M-9 firewall LOAD-BEARING** (per CH-0018 MYSTERY_RESERVE M-9 extension): station-log is commercial-mundane caravan-corridor record, NOT a Maker-knowledge custody channel under ANY reading — station-log entries describing qanat-cleaning-rite unsealing finds (per CF-0041 drylands convention) are civic-procedural manifest records of find-and-disposition, NOT Maker-research material; sectarian Maker-mystic readings that station-log tradition preserves proto-archaeological Maker-knowledge are CONTESTED-SECTARIAN PROJECTION (paralleling CF-0023 grimoire-as-Maker-research sectarian register and CF-0043 Ash-Seal-research-as-Maker-recovery sectarian register), NOT world-truth. **M-1 firewall**: station-log cannot aggregate into civilization-identity-findings at world level (household-custody ceiling preserves the firewall; no aggregation institution exists). Tea-house-scribe witness tradition (CF-0024/0028/0033/0034/0036/0044) remains the drylands documentary-custody register of record for contract-binding; well-keeper station-log is adjacent informal-household-record that does NOT substitute for tea-house-scribe witness on contract-witnessing matters.
