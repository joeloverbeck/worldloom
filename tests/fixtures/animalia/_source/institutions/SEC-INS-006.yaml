body: |-
  - **Function**: economic coordination, quality control, training, monopoly defense, inter-polity commerce.
  - **Legitimacy source**: charter plus reputation plus chartered or customary monopoly.
  - **Material base**: guildhalls, warehouses, barges, tools, training shops, charters in archive.
  - **Violence capacity**: hired enforcement; some guilds command small private guards (artifact-extraction guilds notably; others when transporting valuable cargo through bandit corridors).
  - **Recruitment**: apprenticeship; some guilds species-affiliated by historical concentration (canal beaver-folk dominate engineering guild boards in many heartland polities) without species-exclusive membership.
  - **Succession**: master-rank progression; guild-internal politics; in some old guilds, hereditary lineage of mastership.
  - **Internal contradictions**:
    - <!-- added by CF-0035 --> trophy-provenance authentication niche extension (CF-0035): distinguishing mutated-beast trophy from artifact-adjacent mundane-taxidermy fraud becomes a minor sub-specialty paralleling the CF-0021 authentication-specialist niche and CF-0028 magical-find / CF-0032 subsection-seal authentication patterns. Compounds the canal-corridor illegitimate-service cartel-formation pressure: trophy-provenance authentication joins CF-0023 grimoire, CF-0028 ruin-cartography, CF-0031 registry-scrubber, CF-0033 dragoon-kit, and CF-0034 stolen-goods-provenance as a SIXTH revenue-stream on the shared infrastructure. The regulatory-capture incentive is now the strongest in the current Layer-4 stress register (six overlapping streams, shared unchartered-broker roster, shared cartel-authentication pressure). Contaminated-trophy handling follows existing guild-contamination protocol: bounty-clerk certification at settlement intake; caravan-master trophy-cargo refusal register in transit; chartered-extraction-guild handoff if trophy registers as contamination-active at transit inspection; uncertified-trophy civic-refusal category in polities where the register holds.
    - artifact-extraction guilds straddle commerce and emergency-response, with periodic friction with civic watch over jurisdiction;
    - small artisans periodically coalition against entrenched guild charters;
    - monopoly defenses frequently run up against Charter-Era anti-monopoly clauses;
    - smuggling is a permanent shadow on chartered trade.
    - <!-- added by CF-0032 --> oversize-saddlery guild-subsection (CF-0032): in ancestral Cluster C polities, wainwright and saddlery guilds host a named subsection specializing in oversize harness, reinforced wagon-bed, barge-deck modification, and chair-for-estate work for mammoth-folk, ground-sloth-folk, and other large-body-plan Cluster C species. Master-rank progression includes body-plan-variant instructional lineage as a hereditary-mastership subtype (per the existing Trade/Guilds succession clause) and a reciprocal cross-polity journeyman circuit to acquire variants. The subsection is species-concentrated by ancestral-region presence, NOT species-gated at apprenticeship intake — a human or Cluster A journeyman who completes the reciprocal circuit receives the same seal. The reciprocal circuit is an AGREEMENT pattern (cross-polity guild-internal coordination, mirror image of the four disagreement-asymmetries CF-0021 / CF-0024 / CF-0028+CF-0030 / CF-0031); it does NOT constitute a fifth instance of the polity-asymmetric stress register. <!-- clarified by CH-0011 (inherited CH-0006 counting-drift; original prose enumerated four but called them 'three'; 'fourth instance' consequentially updated to 'fifth instance' for ordinal-math consistency) --> Authentication of genuine subsection-seal vs imitation is a minor sub-specialty with cartel-formation pressure flagged parallel to CF-0028 authentication-specialists.
    - <!-- added by CF-0033 --> chartered extraction guild perimeter/extraction boundary defense (CF-0033): the load-bearing boundary that preserves SOC-4 chartered monopoly over extraction, containment, neutralization, inscription, and brokerage in dragoon-adopting polities. Dragoons absorb perimeter enforcement under ward-breach declaration; extraction-guild functions remain chartered. Any extraction-adjacent dragoon act under perimeter cover risks converting guild consent into guild opposition and has triggered named jurisdictional disputes in documented recent cases. Containment-wright faction is predominantly dragoon-resistant (sharpening the CH-0002/CH-0004/CH-0005 containment-wright fault-line into a fourth surveillance-adjacent concern — dragoon presence in ward-breach zones means civic-force proximity to just-extracted artifacts during guild extraction response). Broker faction is predominantly dragoon-accommodationist (perimeter cordon reduces extraction-site interruption by black-market brokers, marginally improving broker channel efficiency) but opposes any dragoon authority to seize confiscated black-market material into civic custody (disposition must flow through chartered-broker channel per CF-0008 CH-0004 funder-primacy framework). Inspector faction is stretched between new coordination burden (dragoon perimeter coordination with guild extraction protocol) and welcomes reduced black-market interference near guild operations.
    - <!-- added by CF-0034 --> contractor-auxiliary roster absorbs bandit-hunter commissions (CF-0034): chartered extraction-guild contractor-auxiliary rosters (established under CF-0024) accommodate bandit-hunter commissions as an EXTENSION of existing escort-duty work, NOT as a new roster class. The absorption is muted in faction terms compared with CF-0028 expedition pressure: containment-wright faction is largely indifferent (bandits are not contamination-adjacent, except where they traffic artifacts — then the concern rises to CF-0033-parallel surveillance-wedge unease about civic prosecution reaching into guild supply-chains via trafficker-pursuit-predicate creep); broker faction is welcoming (bandit-suppression reduces caravan losses, lowers escort-hire insurance-adjacent premiums, stabilizes chartered-broker shipment reliability); inspector faction is ambivalent (additional vetting burden on roster, offset by lower black-market interference near guild operations).
    - <!-- added by CF-0037 --> family-handled waystation NON-CHARTERED status reaffirmation (CF-0037): the family-handled waystation tradition (CF-0037) operating in heartland, highland, and mountain east is EXPLICITLY NON-CHARTERED — there is no waystation-keepers' guild, no master-rank progression, no chartered association, no SOC-4-class chartered monopoly, no seal. Coalition-among-stationkeepers pressure (parallel to "small artisans periodically coalition against entrenched guild charters" per existing line above) operates as low-grade background social register but does NOT canonize as institutional form. Waystation-keeping is a household-enterprise household-trade pattern adjacent-to but structurally outside the chartered guild network. Caravan-guilds (where chartered), mercenary-bands (CF-0024), chartered extraction-guild contractor-auxiliary rosters (CF-0024 / CF-0025), bardic-circuit performers, hunter-contractors (CF-0034 / CF-0035 sub-specialty), and ordinary travelers are CUSTOMERS of waystation services under SOC-3 coin-contract sacredness; NO chartering relationship to the waystation tradition itself. Inn-guild charter friction in heartland canal-town charter-inn proprietors arises occasionally (chartered-inn proprietors resent untaxed waystation revenue on connector-routes outside canal-town reach) but no chartered polity has upheld a charter-monopoly claim against the non-chartered family-enterprise pattern; the geometry is structurally cooperative — chartered inns serve canal-bound traveler stops, family waystations serve overland-connector traveler stops, and the markets are complementary not competing.
    - <!-- added by CF-0038 --> Brinewick canal-engineering and lock-keeper guild concentration (CF-0038): Brinewick's trunk-canal confluence geography concentrates canal-engineering guild presence at the heartland's highest density; lock-keeper guild (a canal-engineering-adjacent non-extraction chartered-trade guild specializing in lock-mechanism maintenance, weir-operation, and canal-bed depth certification) is disproportionately beaver-folk per PEOPLES_AND_SPECIES §Cluster A embodiment-fit commitment, **without species-exclusive membership** (SOC-1 firewall holds). Apprenticeship pipeline is species-concentrated by embodiment-fit, NOT species-gated at intake; human, amphibian-folk, otter-folk, and occasional cluster C apprentices complete the pipeline. Lock-keeper guild is categorically distinct from the canal-engineering guild (which handles canal construction / expansion / structural repair) and from the civic canal-warden corps (which handles tariff-and-traffic authority per Military/Defense §canal-warden extension above). Brinewick's lock-keeper guild-hall faces the civic-quarter canal-bend at Lock Four; its master-rank apprenticeship is a named heartland aspiration per CF-0038 EVERYDAY_LIFE §(a) extension. Canal-engineering guild authentication niche extends — beaver-folk canal-engineering apprentice-records authenticate generational seal-work against forgery; cartel-formation pressure parallel to CF-0028 authentication-specialist niche but in a non-artifact-adjacent domain, offset by guild-internal master-competition.

    - <!-- added by CF-0045 --> Canal-corridor lock-night performance-occasion (CF-0045): in canal-heartland and selected canal-adjacent heartland towns with working canal-lock infrastructure, "lock-night" is a named bardic-performance occasion distinct from ordinary tavern-night — performance around lock-closure hour at the nearest tavern, with canal-labor-heavy audience composition (lockmaster-crew, barge-layover travelers, wharf-traders) and customary silver-differential pay above a middling tavern-night rate. Lock-night is a named sub-occasion within CF-0017's bardic-tavern institutional frame (Rule 3 specialness-inflation firewall — NOT a separate chartered performance institution with its own licensure or oversight) and is distinct from CF-0038's Brinewick canal-circuit quarter-year rotation (orthogonal scheduling dimensions: rotation specifies which taverns a bard works across a year; lock-night specifies a named night-type within canal-corridor tavern performance). Informal lockmaster / tavern-keeper coordination on lock-closure-hour scheduling is routine; no civic-charter licensure or guild-body attaches. Lock-night advertising uses CF-0024 posting-wall or tavern-keeper word-of-mouth. Lock-night-specific material accretes as a named sub-genre within CF-0017 bardic repertoire (lockside-labor ballads, canal-route work-songs, barge-traveler goodbyes); canal-labor oral idiom enters the broader circuit-bard catalog via lock-night audience composition.

    - <!-- added by CF-0036 --> SOC-1 no-species-exclusion guild-intake reaffirmation (CF-0036): the "without species-exclusive membership" clause of the recruitment line above is reaffirmed under CF-0036 pressure. Historical species-concentration by regional embodiment-fit (canal beaver-folk engineering, ancestral Cluster C oversize-saddlery subsection, raptor-folk archery) REMAINS compatible with no-species-exclusion guild-seal charter at intake. Informal crew-composition sorting pressure (CF-0036 crew-master mix-sound judgment in hire-catechism; foreman species-mix preference) MUST NOT harden into guild-charter-level species-gating; the hardening is a Rule 4 globalization-by-accident drift that civic-charter audit is expected to catch. Apprentice-master species-compatibility friction is an ORDINARY WORKPLACE TEXTURE (see §Education/Apprenticeship CF-0036 extension below) that does NOT reach guild-charter intake discipline. Sectarian supremacist-doctrine recruitment into guild-adjacent artisan communities is guild-disciplinary matter: a master or journeyman publicly adopting supremacist doctrine faces seal-review under "charter-sound conduct" clauses where those exist. False-cannibal-bounty authentication-cartel pressure extends the CF-0035 authentication-specialist niche to include bounty-clerk-certification fraud detection; sixth-to-seventh authentication-specialist product-line compounding on the canal-corridor illegitimate-service rail (joining CF-0023 grimoire, CF-0028 ruin-cartography, CF-0031 registry-scrubber, CF-0033 dragoon-kit, CF-0034 stolen-goods, CF-0035 trophy-forgery) sharpens regulatory-capture pressure to its strongest Layer-4 stress-register posture.

    - <!-- added by CF-0046 --> drylands caravan-corridor institutional-cultural complex NON-CHARTERED reaffirmation (CF-0046 / CF-0047): the drylands caravan-corridor complex (CF-0046) and the drylands well-keeper customary-authority role (CF-0047) are EXPLICITLY NON-CHARTERED paralleling CF-0037 waystation NON-CHARTERED reaffirmation clause above — no well-keepers' guild, no caravan-masters' guild, no master-rank progression, no seal, no SOC-4-class chartered monopoly. Caravan-rotation social form (CF-0024) is the institutional substrate; corridor-internal customary adjudication (caravan-master) and lineage-inheritable household-enterprise (well-keeper) are regional custom-register, structurally outside the chartered guild network. Caravan-guilds (where chartered, typically in chartered-polity trade-corridors at the drylands-heartland border) are CUSTOMERS of drylands corridor hospitality under SOC-3 coin-contract at the coin-at-edges contact surface; no charter-relationship to the drylands corridor complex itself. Chartered-extraction-guild rarely touches the drylands corridor (CF-0041 drylands qanat-cleaning-rite convention-register handles occasional unsealing-finds per CH-0014 existing framework; chartered-extraction-guild dispatch is discretionary-not-routine per CF-0035 wilderness-distal framework); no charter-monopoly claim against drylands corridor institutions has been upheld by any chartered polity. Inn-guild charter friction: chartered-inn proprietors in canal-heartland do not reach drylands corridor (geographic non-transportability per CF-0046 stabilizer); the markets are categorically non-overlapping, not competing. Coalition-among-well-keepers or coalition-among-caravan-masters pressure (parallel to "small artisans periodically coalition against entrenched guild charters" line and CF-0037 coalition-stationkeepers paragraph) would operate as low-grade regional-custom reputation-network behavior, NOT as guild-form drift — reputation-network IS the existing caravan-master and well-keeper adjudication-enforcement form and functions without chartering. Rule 3 / Rule 4 firewalls: NO caravan-corridor authentication-cartel (station-logs are household-held, non-authenticable, not on illegitimate-service rail per ECONOMY §Trade Flows CH-0018 annotation); station-log custody is NOT a new tenth / eleventh authentication-specialist cartel product-line on the canal-corridor illegitimate-service rail; the drylands corridor structurally participates in heartland illegitimate-service rails only insofar as caravan-corridor transit carries other-product-line contraband (existing CF-0021 grimoire-transit, CF-0028 ruin-cartography, etc.) — the drylands corridor institutional complex itself adds no new product-line.

  ### Subtype: Artifact-Extraction Guilds (called out for centrality)

  - **Specialties**: extractor (recovery from soil), containment-wright (build and maintain ceramic and ward apparatus), neutralizer (<!-- added by CF-0039 --> CH-0014 re-scoped: **render-inert / seal-and-contain only; destruction is OFF-TABLE as a disposal route because CF-0039 commits Maker-Age artifacts resist destruction and destruction-attempts bind the effect more deeply**; the subtype-name is retained for continuity with charter-language, but operationally the work is inert-state procurement, not unmaking), broker (buy/sell to declared collectors and scholars), inspector (civic ward inspection on contract). <!-- added by CF-0021 --> Crafter (artifact-creation) — contested status: chartered in a few polities under tight license, outlawed in many, tolerated in some, fined in others. Charter status varies sharply by polity (CF-0008). <!-- added by CF-0040 --> **Mundane-find intake-tier (CH-0014)**: CF-0040 commits mundane-tier artifacts as ordinary routine in canal-heartland contexts. Most polities operate an intake-tier at the inspector-office and at the lock-master's office for dredger-crew handoff of silt-bar finds; finder-fee wage-schedule is per-polity variable (OPEN_QUESTIONS §Mundane-Tier Finder-Fee Wage Schedule deferred). Mundane intake is distinct from chartered-broker commerce (high-tier chartered items); the intake-tier registers, classifies, and disposes without formal brokerage. Polity-asymmetric treatment: punitive-confiscation in some polities, register-low-floor-and-release in some, de-minimis exemption in some, no regulation in highland / fen-village / drylands-caravan contexts. Authentication-specialist cheap-end work (CF-0021 niche extension) performs the classification layer.
  - **Charter conditions** vary by polity but typically include: declared inventory, scheduled inspection, civic right of seizure, capital penalty for unlicensed possession.
  - **Reputation**: respected and quietly avoided. Apprenticeship is dangerous; old extractors often display contamination injuries. Family lineage within the guilds is common because few outsiders take the work. <!-- added by CF-0043 --> **Brinewick-specific variant (CH-0015)**: in Brinewick (CF-0038), the "respected and quietly avoided" register extends to Ash-Seal technicians (CF-0043) at parallel social-weight but in commercial-company rather than chartered-guild register; the fed-up-technician register ("It's a procedure. There's a checklist. Quality control, not a seance") is distinctive Brinewick-local variant of the broader extraction-guild laborer-register cadence; long-career Ash-Seal technician contamination-injury displays match chartered-containment-wright patterns and enter CF-0031 ledger-mark eligibility under containment-wright-specialist clause; family lineage within Ash-Seal exists but is less multi-generationally consolidated than chartered-guild lineage patterns — the company is younger (Charter-Era-consolidated rather than pre-Charter) and defector-migration churn is historically continuous, so Ash-Seal's family-lineage density is moderate rather than the dense pattern of chartered-guild lineages in non-Brinewick heartland polities.
  - <!-- added by CF-0021 --> **Internal schism (Incident Wave era origin)**: The artifact-creation knowledge that now circulates outside guild custody (CF-0021, CF-0023) originated within the guilds themselves — research conducted on contained Maker-Age artifacts during professionalization. The leak occurred via three contested vectors (containment-wright defectors who broke charter; brokers who distributed translation material to "scholars" who later defected; polity-sponsored research subsequently inherited by inter-state espionage). The guilds blame each other; outside observers blame the guilds collectively. The schism between containment-wrights (predominantly punitive toward crafters) and brokers (predominantly opportunistic — see crafter-licensing as new market) is durable and politically loaded. Inspectors are stretched between artifact-site inspection and walk-throughs of suspect workshops.
  - <!-- added by CF-0024 --> **Contractor-auxiliary rosters (CF-0024)**: Extraction guilds maintain vetted rosters of adventurer-contractors engaged under commission for security/muscle work on extraction sites, dredger crews, and escort duty for broker-moved artifacts. Contractors do NOT perform extraction, ward inscription, ceramic-vessel containment, or neutralization — those remain chartered functions. The containment-wright vs. broker schism maps cleanly onto contractor-auxiliary policy: brokers welcome the market-widening, containment-wrights resist (contractors outside charter discipline near contained artifacts is their worst case). Inspectors insist on contractor vetting.
  - <!-- added by CF-0025 --> **Occult-fallout specialists (CF-0025)** are a scarce subtype of contractor-auxiliary; they handle mundane containment of fallout consequences (rage animals, toxic-breath victims) under civic or guild commission. They are reputational/occupational, not practitioner-magical; ONT-2 firewall holds. Empirical field-lore accumulated by these specialists is contested canon, not world-level authority on Maker-Age questions (see Mystery Reserve M-7).
  - <!-- added by CF-0028 --> **Expedition-venture syndicates (CF-0028)** are a new institutional form operating OUTSIDE guild-charter legitimacy in most polities — capital-pooling structures that fund multi-professional ruin expeditions and hold funder-primacy claims (CF-0030) over recovered artifacts. Extraction-guild response is schismatic: containment-wrights resist (unvetted contractors near just-extracted artifacts is the containment-wright worst case, exceeding their CF-0024 posture); brokers welcome the market-widening (chartered-broker purchase channel is the funder-primacy disposition mechanism and produces a revenue spike); inspectors are stretched thinner and insist on contractor vetting and declared-inventory discipline. Authentication specialists (originally a small niche per CF-0021) have grown into a critical market-infrastructure role — fees on both sides of expedition-recovered magical-find disposition; cartel-formation incentive is high (regulatory-capture risk flagged by Systems critic). The containment-wright / broker schism that CH-0002 logged for crafter-tolerance has sharpened under expedition pressure: brokers now have a concrete revenue stream aligned with funder-primacy, containment-wrights have a concrete threat aligned with unchartered contractor proximity. Civic centralization debates intensify — polities push to nationalize expedition custody under civic-observer regimes; guilds and patron-syndicates resist in different directions.
  - <!-- added by CF-0031 --> **Contamination-lineage ledger-mark coordination (CF-0031)**: In adopting chartered polities, guild pension committees coordinate the guild-internal pension disbursement formula with civic-registry ledger-mark supplement distribution. The containment-wright vs. broker schism already sharpened under crafter-tolerance (CH-0002) and expedition-funder-primacy (CH-0004) acquires a third fault-line: containment-wright faction treats civic-registry custody of contamination data as a surveillance-wedge threat (the civic gaze reaching inside the guild's lineages); broker faction treats civic-registry as market-legibility asset (formalized contractor-lineage risk assessment aiding broker-muscle hire decisions). Inspector faction is institutionally ambivalent — stretched paperwork and clearer welfare-dispute jurisdiction pull in opposite directions. Guild-internal pension remains distinct and is NOT displaced by civic-registry supplement; the two coordinate on formula but preserve separate custody. Historical motivation: civic-centralization advocates in recent Layer-4 debates used pension-welfare framing as the wedge to lever into guild-adjacent autonomy; larger heartland polities adopted, containment-wright-dominated polities declined.
  - <!-- added by CF-0039 --> **Artifact-permanence-as-civic-liability schism sharpening (CH-0014)**: CF-0039 destruction-resistance converts sealed-quarter maintenance from cyclic-amortizable to monotonic-accretion liability across generations. The containment-wright vs broker schism sharpens further: containment-wright faction demands larger sealed-quarter allocation (permanent-containment is their specialty; more sealed-quarter = more work + more political weight); broker faction resists the civic ward-reserve expansion (ward-reserve funding comes from transit levies that compete with broker commerce revenue); inspector faction is stretched thinner still. Centralization-fight advocates cite artifact-permanence as additional argument for crown-or-city-council custody nationalization (guilds lose another rhetorical position). Principled-refuser clergy (CF-0026) reform-current bifurcates on artifact-permanence framing (acceptance-register vs burial-technique-recovery-advocacy — the latter is categorically forbidden under M-20 firewall as world-achievable goal).
  - <!-- added by CF-0041 --> **Unsealing-triage multi-guild convergence protocol (CH-0014)**: CF-0041 commits Maker-Age deliberate-burial and sealed-inert activation-on-opening. The chartered response protocol at sealed-container or sealed-building discovery is multi-guild convergence: chartered extraction-guild ward-inspector + civic-watch + containment-wright + excavation-or-dredger foreman, in that order of dispatch, followed by broker assessment after disposition is resolved. The protocol is Charter-Era-consolidated (per TIMELINE Layer 2 extension CH-0014). It is FORMAL in canal-heartland polities; semi-formal in estate-outskirts (steward-coordinated); CONVENTION-REGISTER in highland (clan-elder sanction + civic-registry where available); CONVENTION-REGISTER in drylands (caravan-master sealed-cargo-refusal); MARKER-REED-RELAY in fenlands (institutional-absence-acknowledged-in-silence per CF-0037 register preserved; amphibian-folk bog-diagnosis informs escalation). Jurisdiction on Maker-deliberately-buried-building excavation (as distinct from individual sealed-container finds) is contested: chartered extraction-guild claims extraction-primacy; CF-0028 patron-funded expedition syndicates claim patron-funder-primacy; civic-archaeological-license frameworks pressed by civic-reformists argue for civic custody. OPEN_QUESTIONS §Ruin Ownership and Jurisdiction is pressured (CH-0014 annotation); resolution deferred until story requires.
  - <!-- added by CF-0043 --> **Brinewick non-guild civic-chartered commercial-company concordat (CH-0015)**: **Ash-Seal (CF-0043)** — a Brinewick-specific CIVIC-CHARTERED NON-GUILD COMMERCIAL COMPANY holding effective monopoly over CONTAINMENT, RESEARCH, and SEALED-INERT DISPOSAL in Brinewick and its carriage-distance heartland radius, under grandfathered Charter-Era concordat with the chartered-extraction-guild. **Concordat structure**: chartered-extraction-guild retains EXTRACTION (at the site; dredger / canal-warden / estate / contractor-auxiliary handoffs), WARD-INSCRIPTION, WARD-INSPECTION (CAU-3 preserved), and CHARTERED-BROKERAGE (chartered-broker bench unchanged). Ash-Seal absorbs CONTAINMENT (at company facility), RESEARCH (trade-secret internal research archive; M-1/M-9 firewall load-bearing — empirical-containment-craft only, NOT Maker-cognitive content custody channel), and SEALED-INERT DISPOSAL (company facility moderate-tier permanent inventory; catastrophic-tier routed to civic sealed-quarter Ash-Seal-billed per-artifact). **Faction alignment within guild**: broker-faction OPPORTUNISTIC-ACCOMMODATIONIST (Ash-Seal provides efficient disposal-channel clearing declared-inventory; revenue-stream preserved via chartered-broker bench); containment-wright-faction BIFURCATED (master-level defection into Ash-Seal is historical pattern; in-guild remainder resentful and reform-current-aligned; Brinewick guild containment-wright bench is politically STUNTED relative to other heartland polities where the faction is full-power); inspector-faction handles concordat-interface (concordat-friction audits, handoff documentation, sealed-docket cross-reference). The containment-wright-faction BIFURCATION is Brinewick-specific; containment-wright faction in Mossdown, Havenreach, and other heartland polities retains full-power guild membership and holds standard CH-0002/0004/0014 schism positions. **Charter terms**: Ash-Seal civic charter granted during the late Charter-Era consolidation period in response to a local competence-precedent event (grant-event details deferred to OPEN_QUESTIONS §Ash-Seal Civic-Charter Terms); charter is NON-TRANSFERABLE (Brinewick-specific; civic-charter-grant requires century-plus precedent-lock with chartered-guild concurrence; four-stabilizer CF-0038 primacy compound underwrites artifact-throughput volume exceeding chartered-guild capacity at grant-time). Biannual charter-audit cycle (CF-0038 civic-advisory-council standing convention) covers Ash-Seal explicitly — company-resistance to audit-access is reliable; reform-current clergy (CF-0026) standing charter-audit-access campaign is ELEVENTH audit-pressure target alongside CF-0031 welfare-access, CF-0033 mission-creep, CF-0038 biannual-cycle, and seven existing. **Trade-secret facility protection**: Ash-Seal facility locations (warehouses, research laboratories, catastrophic-tier pass-through holding, moderate-tier permanent inventory facility) are CIVIC-LEGALLY PROTECTED TRADE SECRETS — specific addresses not entered on civic-registry normal real-property ledger under charter's trade-secret-protection clause; civic-watch knows locations under sealed-docket procedure paralleling CF-0036 sealed-docket category; trade-secret-facility-breach prosecutable under Brinewick sedition-libel-adjacent statute. Ash-Seal commercial property-protection guards perimeter-bounded; beyond-perimeter deployment triggers CF-0024 civic-watch friction (ELEVENTH CF-0024 veteran-pool concurrent claim, absorbed into extraction-escort sub-specialty per Rule 3 firewall — NOT a new twelfth CF-0024 subtype). **Corporate mystique as marketing-performance**: Ash-Seal cultivates trade-jargon ("Standard Class-C containment with moderate environmental spread") as information-asymmetry rent-extraction strategy; the "hundreds of years" antiquity claim is CORPORATE MYTHMAKING in-world-contested-register paralleling M-19 canal-age contested register — world-level institutional age is post-Charter-Era-consolidation (Incident-Wave-era likely); "patented method to destroy wooden artifacts 100% of the time" is CORPORATE MARKETING / CONTESTED DIEGETIC CLAIM (parallel to antiquity claim), NOT world-truth — actual practice is CF-0039-compliant specialized render-inert / seal-and-contain per CF-0008 CH-0014 neutralizer re-scoping; fed-up-technician plain-speaking admission ("checklist, not a seance") is the in-world revealer of the marketing-as-performance register. **Backchannel-purchase channel (commercial corruption, NOT civic-watch corruption)**: Ash-Seal sometimes sells safe-class and moderate-tier declared-inventory artifacts discreetly to wealthy Brinewick parties (estate-dowagers, civic-council members acting in private capacity) in contravention of official hold-for-study / disposal mandate; this is COMMERCIAL CORRUPTION prosecutable under magistrate-docket corruption-prosecution category; does NOT cross into CAU-3/SOC-4 ward-inspector integrity (CF-0038 C6 firewall preserved — ward-inspector integrity UNAFFECTED; backchannel targets Ash-Seal commercial personnel and canal-wardens per CF-0038 existing pattern, NOT ward-inspectors); catastrophic-tier NEVER flows through backchannel (routes to civic sealed-quarter per concordat); corruption-exposure cascade is named "Ash-Seal-backchannel-cascade" slow-rolling Breakage-Points vector per ECONOMY §Breakage Points CH-0015. **Defector-specialist emigration**: disillusioned technicians leave Ash-Seal and become INDIVIDUAL leading containment-specialists WORLDWIDE, carrying Brinewick-trained portable reputation fee-for-service into chartered-extraction-guild labor markets; institution itself does NOT expand outside Brinewick (SOC-4 chartered-guild-monopoly holds everywhere else; civic-charter non-transferable). Defector-specialist reputation-genealogy is SUB-SPECIALTY within existing M-7 containment-wright / occult-fallout sub-specialty holding clause (NOT sixth M-7 cohort per Rule 3); their upper-silver fee-for-service rates anchor ceiling on chartered-containment-wright wages heartland-wide (wage-compression pattern per ECONOMY §Breakage Points CH-0015). **Ash-Seal technician social role**: distinct self-identifying register — "Here's the Ash-Seal technician" (paralleling "Here's the canal-warden"); commercial-employee under trade-secret covenant; no guild pension; CF-0031 ledger-mark eligibility in Brinewick-adopting polity under containment-wright-specialist clause (FOURTH lineage-source category: extractor / containment-wright / CF-0025 occult-fallout specialist / Ash-Seal technician); AES-3 contamination-signature over long careers (scrapers' shake, wasting, long cough, ward-rot) canonical not optional.

  - <!-- added by CF-0042 --> **Declared-inventory display-registration regime (CH-0014)**: CF-0042 commits artifact-as-status-object economy. In polities with robust SOC-4 chartered extraction-guild infrastructure, declared-inventory items approved for guest-reception display are registered under a display-registration stringency convention (stamp + civic-registry entry + inspection cycle + insurance requirement). Polity-asymmetric treatment: larger heartland polities (Brinewick exemplar per CF-0038) maintain strict declared-inventory registration with magistrate-court theft-prosecution precedent; some polities treat display as de-minimis below-threshold and skip registration; some impose fines-only for undeclared display; highland clans, fen-villages, drylands-caravan contexts do not regulate (convention-register only). Display-registration stringency joins the Charter-Era stress register as FIFTH PARALLEL SIXTH-AXIS LATENT-BURDEN WATCH-ITEM (alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing, CF-0037 child-conscription-protection); if polities develop structurally divergent stringency conventions, the watch-item could harden into a sixth Charter-Era structural axis — tracked per CH-0014, NOT current structural reality.

  ---
extensions:
  - body: "CF-0039 destruction-resistance converts sealed-quarter maintenance from cyclic-amortizable to monotonic-accretion liability across generations. The containment-wright vs broker schism sharpens further: containment-wright faction demands larger sealed-quarter allocation (permanent-containment is their specialty; more sealed-quarter = more work + more political weight); broker faction resists the civic ward-reserve expansion (ward-reserve funding comes from transit levies that compete with broker commerce revenue); inspector faction is stretched thinner still. Centralization-fight advocates cite artifact-permanence as additional argument for crown-or-city-council custody nationalization (guilds lose another rhetorical position). Principled-refuser clergy (CF-0026) reform-current bifurcates on artifact-permanence framing (acceptance-register vs burial-technique-recovery-advocacy — the latter is categorically forbidden under M-20 firewall as world-achievable goal)."
    change_id: CH-0014
    date: 2026-04-20
    label: Artifact-permanence-as-civic-liability schism sharpening
    originating_cf: CF-0039
  - body: "CF-0041 commits Maker-Age deliberate-burial and sealed-inert activation-on-opening. The chartered response protocol at sealed-container or sealed-building discovery is multi-guild convergence: chartered extraction-guild ward-inspector + civic-watch + containment-wright + excavation-or-dredger foreman, in that order of dispatch, followed by broker assessment after disposition is resolved. The protocol is Charter-Era-consolidated (per TIMELINE Layer 2 extension CH-0014). It is FORMAL in canal-heartland polities; semi-formal in estate-outskirts (steward-coordinated); CONVENTION-REGISTER in highland (clan-elder sanction + civic-registry where available); CONVENTION-REGISTER in drylands (caravan-master sealed-cargo-refusal); MARKER-REED-RELAY in fenlands (institutional-absence-acknowledged-in-silence per CF-0037 register preserved; amphibian-folk bog-diagnosis informs escalation). Jurisdiction on Maker-deliberately-buried-building excavation (as distinct from individual sealed-container finds) is contested: chartered extraction-guild claims extraction-primacy; CF-0028 patron-funded expedition syndicates claim patron-funder-primacy; civic-archaeological-license frameworks pressed by civic-reformists argue for civic custody. OPEN_QUESTIONS §Ruin Ownership and Jurisdiction is pressured (CH-0014 annotation); resolution deferred until story requires."
    change_id: CH-0014
    date: 2026-04-20
    label: Unsealing-triage multi-guild convergence protocol
    originating_cf: CF-0041
  - body: "**Ash-Seal (CF-0043)** — a Brinewick-specific CIVIC-CHARTERED NON-GUILD COMMERCIAL COMPANY holding effective monopoly over CONTAINMENT, RESEARCH, and SEALED-INERT DISPOSAL in Brinewick and its carriage-distance heartland radius, under grandfathered Charter-Era concordat with the chartered-extraction-guild. **Concordat structure**: chartered-extraction-guild retains EXTRACTION (at the site; dredger / canal-warden / estate / contractor-auxiliary handoffs), WARD-INSCRIPTION, WARD-INSPECTION (CAU-3 preserved), and CHARTERED-BROKERAGE (chartered-broker bench unchanged). Ash-Seal absorbs CONTAINMENT (at company facility), RESEARCH (trade-secret internal research archive; M-1/M-9 firewall load-bearing — empirical-containment-craft only, NOT Maker-cognitive content custody channel), and SEALED-INERT DISPOSAL (company facility moderate-tier permanent inventory; catastrophic-tier routed to civic sealed-quarter Ash-Seal-billed per-artifact). **Faction alignment within guild**: broker-faction OPPORTUNISTIC-ACCOMMODATIONIST (Ash-Seal provides efficient disposal-channel clearing declared-inventory; revenue-stream preserved via chartered-broker bench); containment-wright-faction BIFURCATED (master-level defection into Ash-Seal is historical pattern; in-guild remainder resentful and reform-current-aligned; Brinewick guild containment-wright bench is politically STUNTED relative to other heartland polities where the faction is full-power); inspector-faction handles concordat-interface (concordat-friction audits, handoff documentation, sealed-docket cross-reference). The containment-wright-faction BIFURCATION is Brinewick-specific; containment-wright faction in Mossdown, Havenreach, and other heartland polities retains full-power guild membership and holds standard CH-0002/0004/0014 schism positions. **Charter terms**: Ash-Seal civic charter granted during the late Charter-Era consolidation period in response to a local competence-precedent event (grant-event details deferred to OPEN_QUESTIONS §Ash-Seal Civic-Charter Terms); charter is NON-TRANSFERABLE (Brinewick-specific; civic-charter-grant requires century-plus precedent-lock with chartered-guild concurrence; four-stabilizer CF-0038 primacy compound underwrites artifact-throughput volume exceeding chartered-guild capacity at grant-time). Biannual charter-audit cycle (CF-0038 civic-advisory-council standing convention) covers Ash-Seal explicitly — company-resistance to audit-access is reliable; reform-current clergy (CF-0026) standing charter-audit-access campaign is ELEVENTH audit-pressure target alongside CF-0031 welfare-access, CF-0033 mission-creep, CF-0038 biannual-cycle, and seven existing. **Trade-secret facility protection**: Ash-Seal facility locations (warehouses, research laboratories, catastrophic-tier pass-through holding, moderate-tier permanent inventory facility) are CIVIC-LEGALLY PROTECTED TRADE SECRETS — specific addresses not entered on civic-registry normal real-property ledger under charter's trade-secret-protection clause; civic-watch knows locations under sealed-docket procedure paralleling CF-0036 sealed-docket category; trade-secret-facility-breach prosecutable under Brinewick sedition-libel-adjacent statute. Ash-Seal commercial property-protection guards perimeter-bounded; beyond-perimeter deployment triggers CF-0024 civic-watch friction (ELEVENTH CF-0024 veteran-pool concurrent claim, absorbed into extraction-escort sub-specialty per Rule 3 firewall — NOT a new twelfth CF-0024 subtype). **Corporate mystique as marketing-performance**: Ash-Seal cultivates trade-jargon (\"Standard Class-C containment with moderate environmental spread\") as information-asymmetry rent-extraction strategy; the \"hundreds of years\" antiquity claim is CORPORATE MYTHMAKING in-world-contested-register paralleling M-19 canal-age contested register — world-level institutional age is post-Charter-Era-consolidation (Incident-Wave-era likely); \"patented method to destroy wooden artifacts 100% of the time\" is CORPORATE MARKETING / CONTESTED DIEGETIC CLAIM (parallel to antiquity claim), NOT world-truth — actual practice is CF-0039-compliant specialized render-inert / seal-and-contain per CF-0008 CH-0014 neutralizer re-scoping; fed-up-technician plain-speaking admission (\"checklist, not a seance\") is the in-world revealer of the marketing-as-performance register. **Backchannel-purchase channel (commercial corruption, NOT civic-watch corruption)**: Ash-Seal sometimes sells safe-class and moderate-tier declared-inventory artifacts discreetly to wealthy Brinewick parties (estate-dowagers, civic-council members acting in private capacity) in contravention of official hold-for-study / disposal mandate; this is COMMERCIAL CORRUPTION prosecutable under magistrate-docket corruption-prosecution category; does NOT cross into CAU-3/SOC-4 ward-inspector integrity (CF-0038 C6 firewall preserved — ward-inspector integrity UNAFFECTED; backchannel targets Ash-Seal commercial personnel and canal-wardens per CF-0038 existing pattern, NOT ward-inspectors); catastrophic-tier NEVER flows through backchannel (routes to civic sealed-quarter per concordat); corruption-exposure cascade is named \"Ash-Seal-backchannel-cascade\" slow-rolling Breakage-Points vector per ECONOMY §Breakage Points CH-0015. **Defector-specialist emigration**: disillusioned technicians leave Ash-Seal and become INDIVIDUAL leading containment-specialists WORLDWIDE, carrying Brinewick-trained portable reputation fee-for-service into chartered-extraction-guild labor markets; institution itself does NOT expand outside Brinewick (SOC-4 chartered-guild-monopoly holds everywhere else; civic-charter non-transferable). Defector-specialist reputation-genealogy is SUB-SPECIALTY within existing M-7 containment-wright / occult-fallout sub-specialty holding clause (NOT sixth M-7 cohort per Rule 3); their upper-silver fee-for-service rates anchor ceiling on chartered-containment-wright wages heartland-wide (wage-compression pattern per ECONOMY §Breakage Points CH-0015). **Ash-Seal technician social role**: distinct self-identifying register — \"Here's the Ash-Seal technician\" (paralleling \"Here's the canal-warden\"); commercial-employee under trade-secret covenant; no guild pension; CF-0031 ledger-mark eligibility in Brinewick-adopting polity under containment-wright-specialist clause (FOURTH lineage-source category: extractor / containment-wright / CF-0025 occult-fallout specialist / Ash-Seal technician); AES-3 contamination-signature over long careers (scrapers' shake, wasting, long cough, ward-rot) canonical not optional."
    change_id: CH-0015
    date: 2026-04-20
    label: Brinewick non-guild civic-chartered commercial-company concordat
    originating_cf: CF-0043
  - body: "CF-0042 commits artifact-as-status-object economy. In polities with robust SOC-4 chartered extraction-guild infrastructure, declared-inventory items approved for guest-reception display are registered under a display-registration stringency convention (stamp + civic-registry entry + inspection cycle + insurance requirement). Polity-asymmetric treatment: larger heartland polities (Brinewick exemplar per CF-0038) maintain strict declared-inventory registration with magistrate-court theft-prosecution precedent; some polities treat display as de-minimis below-threshold and skip registration; some impose fines-only for undeclared display; highland clans, fen-villages, drylands-caravan contexts do not regulate (convention-register only). Display-registration stringency joins the Charter-Era stress register as FIFTH PARALLEL SIXTH-AXIS LATENT-BURDEN WATCH-ITEM (alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing, CF-0037 child-conscription-protection); if polities develop structurally divergent stringency conventions, the watch-item could harden into a sixth Charter-Era structural axis — tracked per CH-0014, NOT current structural reality."
    change_id: CH-0014
    date: 2026-04-20
    label: Declared-inventory display-registration regime
    originating_cf: CF-0042
  - body: '**Canal-heartland contractor-auxiliary corner-share / serious-share pay-split register (CF-0048)**: The chartered extraction-guild contractor-auxiliary roster register (committed under CF-0024) on canal-heartland chartered-plus-auxiliary INFORMAL cellar-job configurations carries a named pay-bifurcation: the chartered professional takes the "serious share" and the contractor-auxiliary performing lantern-hold / door-keep / one-fetch role-scope takes the "corner-share" (copper-to-lower-silver tier). The register is canal-heartland oral-register only — NOT in civic-registry contract-template vocabulary in charter-audit-strict polities (Brinewick exemplar per CF-0038 + CF-0043 charter-audit discipline). Tavern-keeper vouch (CF-0024 social asset) extends with "corner-share-reliable" competence register at canal-heartland tavern-board posting venues. Rule 3 specialness-inflation firewall: the register names a sub-tier WITHIN existing CF-0024 contractor-auxiliary frame, NOT a new contractor-auxiliary subtype, NOT a new chartered-guild relationship; chartered-extraction-guild contractor-auxiliary roster discipline (vetted contractors under guild commission per existing CF-0024 contractor-auxiliary roster section above) is unchanged. Chartered-guild monopoly on extraction / ward-inscription / ceramic-vessel containment / neutralization preserved (SOC-4); the corner-share / serious-share bifurcation is purely a pay-split register on informal cellar-work configurations. Status soft_canon (partial-support pathway; DA-0001 sole pre-figuring source for the naming).'
    change_id: CH-0021
    date: 2026-04-26
    label: Corner-share / serious-share informal pay-split register on contractor-auxiliary roster (canal-heartland chartered-plus-auxiliary cellar-jobs)
    originating_cf: CF-0048
