statement: |
  In adopting chartered polities, the civic registry maintains a subsidiary ledger that inscribes — upon voluntary self-enrollment by the household — extractor, containment-wright, and post-career occult-fallout specialist (CF-0025) lineages whose members carry the empirical bodily signature of artifact-fallout (the wasting, the long cough, ward-rot, the scrapers' shake). The ledger-mark confers eligibility for a guild-pension supplement coordinated through the chartered extraction-guilds, and alms-priority placement at monastic-clinic houses. The mark runs three generations in the family ledger by scrivener's convention — an administrative interval, not a biological claim. Polities vary sharply: larger chartered heartland polities with robust civic-registry infrastructure and extraction-guild taxation streams have adopted; fen-villages and highland clans lack the civic infrastructure to adopt; polities that refuse civic centralization over guild-adjacent welfare decline. The institution is a welfare instrument; its stabilizers are load-bearing: voluntary enrollment, civic-registry subsidiary custody (not guild-internal), three-generation interval cap, charter-clause restricting civic-watch subpoena to welfare purpose, guild-internal pension preserved as distinct. The ledger-mark is a civic record of bodily injury suffered in artifact-adjacent labor; it makes no ontological claim about the body, the lineage, or the mechanism of harm. Registry status is NOT evidence of specialist oracle-reading validity (M-7 firewall), NOT evidence of heritable Maker-touching or sentience-as-artifact-effect (M-5 firewall), and NOT mechanistically related to civic-registry records of observed mythic-species births (M-3 firewall) — their shared "heritable" vocabulary is civic-registry-scope coincidence, not ontological parallel.
