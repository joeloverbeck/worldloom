notes: |
  Direct from proposals/PR-0002-heritable-contamination-registry.md. Scope soft_canon (per proposal) because regional adoption is load-bearing to the world's polity-asymmetric Charter-Era character; hard_canon would over-universalize, contested_canon would under-institutionalize. The proposal's original "Heritable Contamination Registry" title was struck at Phase 9 adjudication per Theme/Tone critic: "heritable" smuggles a 19th/20th-century eugenics-inflected register out-of-register for Animalia; "contamination registry" imports clinical-modern vocabulary. Replacement title "contamination-lineage ledger-mark" preserves administrative gravity while keeping the register scribal and earthy. In-register language committed to prose: "the mark," "ledger-named family," "marked stock," "the scrivener's hand across three generations," "ward-rot pension," "alms-priority at the Houses," "chartered ledger-subsidiary." Out-of-register language forbidden: "heritable contamination," "contamination injury," "generational health impact," "subsidiary record," "eligibility," "intake," "registry-case," "benefit," "subsidy." Historical motivation per Politics/Institution critic: registry arose from civic-centralization advocates winning over containment-wright guild faction resistance in larger heartland polities during recent Layer-4 current-layer debates — pension-welfare framing was the wedge civic-centralizers used to lever into guild-adjacent autonomy. Mystery Reserve firewalls per Mystery Curator critic: M-5 (body-ledger, not ontological claim; disallow registry-family patterns reinterpreted as Maker-lineage markers); M-7 (body-injury record, not knowledge-genealogy record; registry status is NOT evidence of oracle-reading validity); M-3 (civic-registry heritable-category coincidence, not mechanistic parallel with mythic-species observed-at-birth records). New Mystery Reserve entry M-11 committed — Empirical Basis of the Three-Generation Contamination-Lineage Marker — a bounded unknown about whether the interval reflects observed generational health pattern, folk-medical belief, or administrative mimesis of extractor-veteran pension precedent. Partial retcon of CF-0024 and CF-0025 pension-absence claims handled via notes-field modification trace plus modification_history array; dominant action is ADDITION (CH-0005 change_type: addition). OPEN_QUESTIONS Post-Career Contractor Pension and Stigma partially closes in adopting-polity branch; residual items (non-adopting polities, non-CF-0025 contractor widows, expedition-widows, purge-conventions, transfer protocol, surveillance precedent) remain deferred. Two new OPEN_QUESTIONS sections added (Ledger-Mark Funding Stream Specificity; Ledger-Mark Purge-Convention and Migration Gap). Six critic sub-agents dispatched at escalation gate (>3 of 13 domains touched); no dissent from accept recommendation; all flagged risks either repaired in Phase 9 or logged as latent burdens in CH-0005. Adjudication record: adjudications/PA-0004-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0015 (CF-0043): extension — FOURTH lineage-source category for CF-0031 ledger-mark eligibility in Brinewick-adopting polity added: Ash-Seal technicians (CF-0043) with long-career contamination signature (scrapers' shake, long cough, ward-rot, wasting) qualify under the containment-wright-specialist clause alongside the three prior lineage-source categories (extractor, chartered containment-wright, CF-0025 occult-fallout specialist). Ash-Seal-technician ledger-mark enrollment operates under standard CF-0031 mechanism (voluntary self-enrollment; three-generation administrative interval; charter-clause welfare-purpose protection; civic-registry subsidiary-record coordination with commercial-pension-formula instead of chartered-extraction-guild pension-formula). Ash-Seal commercial-pension-formula coordination is Brinewick-specific institutional variant; the voluntary-enrollment / three-generation / welfare-purpose stabilizers are unchanged. Ash-Seal family-lineage density is moderate rather than the dense multi-generational chartered-guild pattern (company is Charter-Era-consolidated, not pre-Charter; defector-migration churn historically continuous). Marriage-broker catechism extends with kin-of-Ash-Seal question *"does your kin take the work at the company?"* (Brinewick canal-heartland exposed artisan-quarter households). Non-Brinewick polities handle Ash-Seal-defector households under ordinary chartered-containment-wright CF-0031 eligibility if defector enlists on chartered-extraction-guild roster in post-defection career. Adjudication record: adjudications/PA-0014-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0018 (CF-0046): qualification — CF-0031 drylands-non-adoption posture (oasis-hamlet solidarity arrangements for contamination-injured caravan-kin without civic-registry coordination; *"coin-for-shame"* idiom for emigrant to adopting polity) now has a NAMED ALTERNATIVE-INSTITUTIONAL-SUBSTRATE REASON per CF-0046 drylands caravan-corridor institutional-cultural complex: the drylands institutional-thinness pattern (thin civic registry, no civic-court reach, caravan-master corridor-internal customary-adjudication, reciprocity-primary regional economy, geographic non-transportability of canal-infrastructure preventing heartland institutional-export) is the structural reason drylands polities cannot adopt CF-0031 registry — the reciprocity-primary regional economy would be destroyed rather than merely competed-with by civic-registry introduction, per CF-0046 Phase 4 stabilizer. This qualifies the CF-0031 drylands-non-adoption posture from "civic-registry infrastructure is absent" (procedural framing) to "civic-registry infrastructure would destroy the economic substrate" (structural framing) — the non-adoption is not capacity-limited but equilibrium-preserving. CF-0031 scope, distribution, and stabilizer structure unchanged; the commerce-hub immigration + canal-network artifact-turnup volume conditions that make Brinewick ADOPTING remain unchanged; the drylands-non-adoption posture is now grounded in CF-0046 structural rationale. Adjudication record: adjudications/PA-0017-accept_with_required_updates.md.
