contradiction_risk:
  hard: false
  soft: true
costs_and_limits:
  - registered status carries marriage-market stigma across three administrative generations that compounds rather than dissolves existing contamination-injury stigma
  - a visible artisan-quarter stratum ("registered stock" / "ledger-named") forms in adopting polities; cluster-adjacent drift over generations is a Rule 3 specialness-inflation pressure logged as Mystery Reserve M-11 bounded unknown
  - civic-watch subpoena-access pressure is continuous — the welfare-purpose stabilizer is institutionally contested, not static; registry-capture breakage is a slow-rolling risk
  - monastic-clinic priority intake crowds out non-registered contamination-injured patients (especially fen-village emigrants and highland emigrants seeking dry-edge monastic-clinic care) in capacity-scarce regions
  - unregistered-but-eligible extractor families become preferentially cheaper hires for unchartered patrons and brokers (perverse labor-market incentive the voluntary stabilizer does not contain)
  - registry-scrubber underground in punitive polities shares canal-corridor transit and broker matchmakers with CF-0023 grimoire-corridor and CF-0028 ruin-cartography streams — three illegitimate service product-lines on one infrastructure rail, lowering marginal cost of all three and sharpening authentication-cartel formation pressure
  - inter-polity migration gap — a registered household emigrating to a non-adopting polity loses supplement access; the mark may or may not travel with the household record depending on purge-conventions (deferred to OPEN_QUESTIONS)
  - funding-stream specificity under-defended — the extraction-guild taxation line supporting pension supplement is not canonized at ECONOMY level; deferred to OPEN_QUESTIONS (Systems critic)
  - registry resolves the CF-0024 widow-of-the-job and CF-0025 post-career pension gap ONLY in adopting polities and ONLY for CF-0025-eligible lineages; expedition-widow (CF-0028) and non-specialist contractor-widow gaps remain outside registry scope
  - three-generation administrative interval is scrivener's convention; whether it reflects observed generational health pattern, folk-medical belief, or mimesis of extractor-veteran pension precedent is diegetically contested and unresolved at world level (Mystery Reserve M-11)
distribution:
  who_can_do_it:
    - households in adopting chartered polities with at least one CF-0025-eligible or extractor / containment-wright lineage member
    - monastic-clinic administrators in adopting polities receiving registry-priority intake lists
    - chartered extraction-guild pension committees coordinating supplement formula with civic registry
    - civic-registry scriveners administering enrollment, purge, dispute-adjudication, and welfare-purpose subpoena restriction enforcement
  who_cannot_easily_do_it:
    - households in non-adopting polities (highland clans, fen-villages, polities rejecting civic centralization over guild-adjacent welfare)
    - non-chartered or outlawed-in-polity lineages (rogue-crafter assistants per CF-0021; black-market operatives)
    - contractor-auxiliaries outside the CF-0025 specialist subtype (most CF-0024 adventurer-contractors fall outside registry scope)
    - expedition-contractors suffering ruin-triage injury (CF-0028 per Healing/Medicine extension) — NO registry hook; the gap is a known institutional lacuna deferred to OPEN_QUESTIONS
  why_not_universal:
    - civic-registry infrastructure absent in highland clans and fen-villages (structural prerequisite failure)
    - voluntary-enrollment stigma-gating — many eligible households decline to register to preserve marriage prospects for grandchildren (household-level stabilizer)
    - chartered-polity-only institutional form — polities rejecting civic centralization over guild-adjacent welfare decline adoption
    - extraction-guild taxation funding requirement — polities without robust chartered-extraction economy cannot sustain the supplement (Systems critic flagged weakness; funding-mechanism specificity deferred to OPEN_QUESTIONS rather than hand-waved)
    - political gate — containment-wright guild faction resists civic custody of contamination data on surveillance-wedge grounds
    - narrow occupational band — registry directly reaches extractor / containment-wright / fallout-specialist families only (indirect ordinary-life reach is broader but direct enrollment is gated)
