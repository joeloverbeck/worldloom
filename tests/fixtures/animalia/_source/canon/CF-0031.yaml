visible_consequences:
  - registered and unregistered contamination-lineage households form a visible stratum in adopting-polity artisan quarters
  - artisan-quarter skip-rope rhymes ("one-mark, two-mark, three-mark gone / grandfather's ledger, don't read on") and charter-school offense-tier recitations name the ledger-mark among civic categories children learn
  - marriage-broker catechism in adopting-polity heartland households now includes "did your grandfather take the mark? show the ledger-leaf"
  - monastic-clinic intake-scribes ask the registry question at admission with deliberately procedural (not compassionate) cadence — priority line to the left, common bench to the right; absence of pity is itself a tonal signature
  - magistrate-court docket gains registry-evasion prosecutions, fraudulent-registration cases, and purge-dispute cases at generation-three expiry; inheritance docket picks up registry-marked-estate as an asset-class-adjacent subcategory
  - dowager-estate gossip tracks which tenant-cottage lineages registered; estate-steward ledger-checks tenant-registration status before renewals; older noble houses prize tenant-discretion, newer merchant-adjacent houses see vetting value
  - containment-wright faction and broker faction inside the extraction guilds acquire a new fault-line (civic-surveillance-wedge suspicion vs market-legibility opportunism) sharpening the schism already established under CH-0002 (crafter-tolerance) and CH-0004 (expedition-funder-primacy)
  - principled-refuser clergy (CF-0026) bifurcate into mandatory-enrollment-with-protection reformers and three-generation-mark abolitionists
  - registry-scrubber underground appears in punitive polities, sharing canal-corridor infrastructure with CF-0023 grimoire and CF-0028 ruin-cartography black-market streams
  - polity-asymmetry sharpens into a third axis — registry-adopting / registry-declining sits alongside CF-0021 crafter-tolerance and CF-0024 mercenary-licensure as a recognizable Charter-Era regional-variation pattern
  - highland clan-emigrant who registered in a heartland adopting polity becomes a saga-fragment of muted grief at cairn-day ("the one who took the southern mark")
  - fen-widow who walks to dry-edge for the mark becomes a ghost-story fragment in fen oral tradition ("the fen-widow who walked to dry-edge for the mark and came back with nothing")
  - drylands idiom "coin-for-shame" enters caravan-town vocabulary for a cousin who registered in a larger adopting polity
  - bardic tavern-veteran subgenre now sorts by "registered widow" vs "unregistered widow" succession-dispute material; magistrate-court docket-clerk gossip carries registry-fraud tales as a recurring supper subgenre
  - sectarian progenitor-supremacy movements organize opposition on grounds that occupational-lineage civic inscription occludes species-lineage progenitor-witness (Charter-Era-instrument-diluting-progenitor-authority framing)
  - common-pantheon reform-current clergy articulate the registry as civic-ritual-of-witness (aspectualizing path) or condemn as stigmatizing (reform path); celebrate path implausible since the mark records injury
  - aspectualizing progenitor-cult lineage-keepers accept the registry as civic-adjacent welfare without doctrinal implication
  - civic-registry subsidiary archive stream joins the welfare-administrative category as a sixth archival category alongside contract, deed, chronicle, occult-fragment (CF-0019 / CF-0023), ruin-cartography (CF-0028); does not strain the three legitimate + two illegitimate occult-custody streams
