costs_and_limits:
  - verse-inept migrants at caravanserai-gate are SLOWER-HOSTED, not denied-hospitality — caravan-master covers with a vouching-cadence, guest is seated at back of the receiving-hall, introduction-phase takes longer and feels awkward; SOC-3 coin-contract for lodging is honored (hospitality-protocol is co-register with SOC-3, not substitute). Parallels CF-0038 provincial-migrant-with-letter-of-vouch cadence.
  - returning-emigrant with register-fade (too long in canal-heartland) accrues mild pity-rebuke reputation — idiom *'he came in dumb at the gate'* in drylands cadence; parallels CF-0031 *'coin-for-shame'*, CF-0033 *'coin-for-service'*, CF-0036 *'one-fur talk now'* idiom register.
  - "non-chartered folk-practice: no civic-procedural gate, no chartered verse-keeper register, no magistrate-adjudicated verse-competence. If raised in canal-heartland migrant-dispute, functions as ordinary character evidence only, not as chartered-standard gate — parallels CF-0037 non-chartered commitment."
  - "Rule 3 absorption clauses (no specialness inflation): no new wage-table row, no new labor-role sub-stratum (no 'drylands hospitality-bard' stratum parallel to CF-0017 circuit-bards), no new value-store entry (verse-competence is cultural-prestige register, non-portable at border — distinct from CF-0024 portable contractor-reputation which travels inter-polity), no new archival register (oral-only, performance-ephemeral, no tea-house-scribe transcription convention)."
  - "M-4 firewall: verse-matter taking progenitor figures or common-pantheon household-gods as subject is GENRE-REGISTER CONVENTION, NOT doctrinal assertion; no hospitality-verse tradition resolves M-4 progenitor-historicity at world level. Sectarian-supremacy co-option of hospitality-verse for species-lineage-witness recruitment is a minor recruitment-margin pressure watched by mixed-polity magistrates, NOT a sanctioned register."
  - "M-7 sub-specialty holding clause: drylander verse-competence reputation (bards, caravan-masters, well-keepers with deep hospitality-verse repertoires) is ABSORBED WITHIN existing tradesperson / caravan-master / CF-0017 circuit-bard reputation register — NOT a sixth M-7 reputation-genealogy cohort (Rule 3 firewall; parallel to CF-0035, CF-0036, CF-0037, CF-0043 sub-specialty holding clause precedents). Same four contested readings (procedural-competence / oracle / bard-accretion / mixed) apply; same disallowed cheap answers hold."
  - "per-cluster accommodation preserves SOC-1: beak-folk phonetic-constrained species participate via mammalian-partner vouching-cadence OR short-line prose-turn under host-waiver convention; movement-constrained Cluster D species (naga-folk serpentine) receive host-side waiver paralleling stairs-adjacent register OR present short committal gesture-plus-verse. No species is silently excluded; multispecies AES-2 baseline held."
distribution:
  who_can_do_it:
    - resident drylanders of all clusters (humans, Cluster A heat-stress-fur-bearers, Cluster B scaled/warm-south, Cluster C heat-tolerant rare, Cluster D mythic travelers rare per DIS-3)
    - long-circuit caravan-apprenticed outland-born caravan-masters whose tenure has absorbed the register
  who_cannot_easily_do_it:
    - canal-heartland residents without drylands exposure
    - highland / fen / mountain-east residents (regional-practice unreachable)
    - short-exposure travelers (three-week-caravan-stint level produces observation, not full participation)
    - phonetic-constrained species (beak-folk corvid/raptor) participate through a mammalian caravan-partner vouching-cadence OR present short-line prose-turn under host-waiver convention; movement-constrained species (naga-folk serpentine lower-body) receive host-side waiver paralleling stairs-adjacent register OR present a short committal gesture-plus-verse
  why_not_universal:
    - "regional-cultural gate: drylands caravanserai sociality, DIS-2 partial-literacy drylands conditions, and oral-tradition density do NOT hold in canal-heartland (CF-0024 tavern-vouch + CF-0009 coin handles equivalent social work), fens (summon-not-post per CF-0024), highland (clan-hospitality register per CF-0037 clan-elder-sanction), or mountain east. A canal-heartland migrant in a drylands caravanserai must learn the convention; a drylander in canal-heartland finds no reciprocal protocol."
    - "venue-and-host binding: stranger-exchange register requires drylands caravanserai / wayhouse / well-side venue AND resident-drylander host; canal-heartland tavern + canal-heartland host does NOT produce the register. A drylander hosting in canal-heartland may recite verse in private or at family gathering, but no stranger-exchange register emerges because venue and guest's cultural-exposure are absent. Return-circuit bards cannot elicit the register from drylands hosts because the register is host-initiated hospitality, not guest-performance."
    - "one-way bardic-flow register-discipline: circuit-bards (CF-0017) transport verse-fragments in bardic-tavern performance register — canal-heartland audiences recognize 'drylands cadence' without knowing the source protocol. Verse-fragments travel, the stranger-exchange protocol stays."
    - "non-portable cultural-prestige: verse-competence is drylands-local cultural-prestige register ONLY; evaporates at the drylands-heartland border; CF-0024 portable-contractor-reputation mechanism does not pick it up."
