visible_consequences:
  - drylands caravanserai / wayhouse / well-side stranger encounters carry a named hospitality-protocol distinct from tavern-vouch
  - drylander children learn the verse-turn register by observation at household caravanserai-guesting before apprenticeship; formal drilling at caravan-apprenticeship age paralleling existing cargo-riddle pedagogy
  - match-maker notebooks record verse-turns heard at courtship-visits as modest match-evaluation register (parallel to caravan-master mix-sound judgment per CF-0036; not determinative)
  - well-keepers accumulate informal verse-repertoire over a keeping-career; retiring well-keeper's verse-book is a minor ordinary-life inheritance
  - caravan-masters with verse-competence gain tacit foreman-judgment preference in caravanserai rotation-hire (parallel to CF-0036 mix-sound judgment; explicitly NOT a charter-level or roster-level hiring criterion; outland caravan-masters without verse accrue reputation-softening not hire-blocking)
  - circuit-bards (CF-0017) traveling drylands corridors absorb verse-fragments for canal-heartland tavern performance in bardic cadence — canal-heartland audiences recognize 'drylands cadence' without knowing the source stranger-exchange protocol
  - returning-migrant idiom *'he came in dumb at the gate'* (pity-rebuke register) for drylands-emigrants whose register has faded from too-long canal-heartland residence
  - canal-heartland migrant arriving at drylands caravanserai without the register — caravan-master covers with vouching-cadence; six-week adaptation period paralleling CF-0038 provincial-migrant-at-Brinewick cadence
  - cross-regional cultural-borrowing pathway named (drylands short-poetry → canal-heartland bardic-fragment via circuit-bards), paralleling highland clan-song into canal-heartland via highland migrants and fen-marker-reed semantic register via monastic communication
