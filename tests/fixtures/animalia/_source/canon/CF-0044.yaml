statement: |
  A drylands-regional cultural convention: travelers and residents in drylands caravanserai sociality engage in a customary short-form oral-poetry exchange at stranger-encounters — brief verse-turns traded between host and guest as a hospitality-protocol register. Distinct from bardic performance (CF-0017) and canal-heartland tavern-vouch (CF-0024). Canonical encounter configurations include caravan-master-and-guest introductions, host-household-and-overnight- traveler threshold exchanges, and well-side or waystation stranger-pair encounters; these are exemplar contexts, not the only contexts. Verse-matter may take progenitor figures or common-pantheon household-gods as subject AS GENRE-REGISTER CONVENTION (not doctrinal assertion; M-4 firewall preserved). The convention stays drylands-scoped — circuit-bards (CF-0017) absorb verse- fragments and transport them to canal-heartland taverns as bardic-performance material; the stranger-exchange protocol itself does not travel.
