statement: |
  Most settled communities can field combatants. Veteran fighters — often with visible scars, longswords, and reputations — exist as a hireable resource for risky jobs (caravan escort, artifact-extraction security, debt enforcement). Danger is treated credibly; veterans are paid as labor, not glorified as heroes.
status: hard_canon
title: Local violent capability exists and is hireable
truth_scope:
  diegetic_status: objective
  world_level: true
type: capability
visible_consequences:
  - scarred veteran in tavern is an ordinary, hireable figure
  - militias muster for civic emergencies (ward breach, raid, plague-year enforcement)
  - bardic cycles distinguish romantic war-songs from veteran reality
  - veterans form the core of the CF-0024 adventurer-contractor stratum; named veterans accrue portable inter-polity reputation via the bardic circuit, and the occult-fallout specialty (CF-0025) is the mortality-limited sub-niche at the top of the hazard-pay ladder
