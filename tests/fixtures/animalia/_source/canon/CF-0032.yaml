id: CF-0032
title: Oversize Saddlery Guild-Subsection for Cluster C Body Plans (Ancestral-Polity)
status: soft_canon
type: institution
statement: |
  Within the wainwright and saddlery guilds of polities with ancestral Cluster C population bases, a named subsection specializes in oversize harness, reinforced wagon-bed, barge-deck modification, and chair-for-estate work for mammoth-folk, ground-sloth-folk, and other large-body-plan Cluster C species. Journeymen travel a reciprocal cross-polity circuit between ancestral polities to acquire body-plan-variant instructional competence; master-rank progression requires completed reciprocity, and a visible subsection guild-seal marks commissioned work as body-plan-verified. The subsection is priced at the estate-class tier because the customer base is narrow and the work is hard; it functions as a recognized occupational upward-mobility route for Cluster C community members in ancestral polities who would otherwise concentrate in haulage labor, while most Cluster C members continue to work haulage — the subsection is a minority path, not a class-wide uplift. Apprenticeship is species-concentrated by ancestral-region presence, NOT species-gated at intake: a human, Cluster A, or Cluster B apprentice who completes the reciprocal circuit receives the same seal.
scope:
  geographic: regional
  temporal: current
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - labor
  - economy
  - law
  - religion
  - status_signaling
  - kinship
  - architecture
  - mobility
  - language
  - memory_and_myth
  - settlement_life
prerequisites:
  - sustained ancestral Cluster C large-body-plan community presence
  - wainwright and saddlery guild continuity across multiple ancestral polities
  - body-plan-variant instructional lineage (multi-year apprenticeship)
  - reciprocal cross-polity journeyman circuit with inter-polity master-rank recognition
  - oversize materials supply (heavy leather, reinforced timber, larger metal fittings, bespoke cordage)
  - charter-clerk or guild-internal reciprocal-journey verification archive
distribution:
  who_can_do_it:
    - wainwright and saddlery guilds in ancestral Cluster C polities hosting the subsection
    - individual apprentices who complete the reciprocal circuit and receive the seal
  who_cannot_easily_do_it:
    - guilds in non-ancestral polities (no customer base, no reciprocal training lineage, no guild continuity)
    - individual apprentices without ancestral-polity guild access
    - extra-regional customers without long-lead-time export-contract patience
  why_not_universal:
    - requires sustained ancestral Cluster C community presence (mammoth-folk, ground-sloth-folk, etc.); rare outside Cluster C ancestral regions
    - bespoke pricing gates customer accessibility to estate-class households and wealthier Cluster C communities
    - reciprocal journeyman tradition requires institutional continuity within wainwright and saddlery guilds across Cluster C ancestral polities, sustained only by established polities
    - apprenticeship lineages with body-plan-variant instruction demand multi-year master-training that cannot easily be replicated outside ancestral regions
    - Rule-4 partial concession: consumption-locality does NOT fully track production-locality — estate-sizing norm migration to non-ancestral polities via mobile Cluster C residents is a named intended generational drift, but the CRAFT (production) remains ancestral-region-gated by guild continuity
costs_and_limits:
  - master-rank progression is multi-year and reciprocal-travel-dependent; a master cannot shortcut the circuit
  - bespoke pricing narrows the customer base; subsection masters are scarce per polity
  - Cluster C large-body-plan demographic ceiling limits both supply (apprenticeship pipeline) and demand
  - reciprocal tradition operates as craft-discipline coordination, NOT as rent-extraction cartel — authentication-specialist cartel-formation pressure (parallel to CF-0028) is a structural risk requiring ongoing discipline
  - subsection-seal authentication is a minor sub-specialty with cartel-adjacent pressure
  - barge-deck modification on live canals carries falls and crush-injury exposure (ordinary structural-labor hazard, not contamination register; non-hazard classification for CF-0031 eligibility purposes)
  - most Cluster C community members remain in haulage; subsection is minority upward-mobility path, not default
visible_consequences:
  - recognizable oversize-saddlery subsection shops in ancestral-polity artisan quarters (taller than ordinary workshops, wide double-door for reinforced wagon-beds, oversize-hide-curing smell)
  - barge-refit yards at canal-lock towns in canal-corridor ancestral polities
  - subsection-apprentice tenant-cottage as recognizable household category in ancestral-polity artisan quarters
  - guild-seal subsection fitments at Cluster C estates (oversize chairs, reinforced-floor wings, stair-ramps, barge-deck upper quarters)
  - dowager-gossip circuit tracks subsection commissions and cross-polity journeyman residencies in ancestral polities
  - ancestral-polity estate architecture migrates toward subsection-informed default sizing over generations
  - subsection-apprenticeship placement-right as inheritance/dowry-negotiable asset
  - reciprocal cross-polity journey tradition creates informal mobility network alongside bardic circuit
  - subsection-master reputation-bardic subgenre emerges (in AES-1 register of work-song, not heroic cycle; subject to M-7 firewall cross-application)
  - extra-regional long-lead-time export contracts flow from ancestral-polity masters to estate-class customers elsewhere
  - magistrate docket picks up subsection-seal fraud, placement-breach, reciprocal-travel-abandonment cases (fourth docket class distinct from three polity-asymmetric patterns)
  - progenitor-cult lineage-keeper doctrinal response bifurcates (aspectualizing vs supremacist); common-pantheon clergy aspectualize cleanly
  - '"chair-guild pricing" as cultural idiom for outrageously high but correctly specified quotes'
  - children's skip-rope rhyme in ancestral polities ("north for the horn, south for the hide, east for the fit")
  - subsection-seal recognition as charter-school civic literacy in ancestral-polity towns
  - failed-apprentice stratum (returned to haulage with partial skills) as minor recognizable category
  - intra-Cluster-C stratification (subsection-lineage vs haulage-lineage) as Rule 3 compounding pressure in ancestral polities, mitigated by firewall language; diaspora Cluster C remain outside both strata
  - new archival category (reciprocal-journey verification, guild-internal with civic-copy deposit at charter polities)
