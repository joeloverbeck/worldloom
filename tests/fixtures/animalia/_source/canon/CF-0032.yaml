notes: |
  Load-bearing firewalls carried here (per Phase 9 repair synthesis of six critic sub-agents dispatched at escalation gate): (1) Rule 3 "older bloods" disowning clause: the subsection is a body-plan accommodation craft; it does NOT constitute world-level validation of the Cluster C "older bloods" self-conception (PEOPLES_AND_SPECIES.md), which remains soft-canon at most. Progenitor-cult lineage-keeper integration of subsection journeymen-lineages into cultural-continuity claims is sectarian activity, not chartered endorsement. (2) M-4 firewall: the subsection does NOT adjudicate whether species- progenitor figures are historical, mythical, or pantheon-aspects. Subsection mastery is craft-competence, not progenitor-position evidence. (3) M-7 reputation-genealogy firewall cross-application: subsection-master reputations are subject to the four contested readings (procedural- competence / oracle / bard-accretion / mixed). No subsection-master holds world-level authority on Cluster C ancestry, Maker-Age adjacency, or progenitor-figure nature. Bardic accretion may outrun case-knowledge; the "master who said less and completed more circuits" is a bardic trope, not a world-level epistemic position. (4) SOC-1 non-species-gated apprenticeship clause: apprenticeship is species-concentrated by ancestral-region presence (pipeline flows from Cluster C families), NOT species-gated at intake — a human or non-Cluster-C apprentice who completes the reciprocal circuit receives the same seal. (5) Rule 4 partial concession: consumption-locality does NOT fully track production-locality; estate-sizing norm migration to non-ancestral polities via mobile Cluster C residents is a named intended generational drift, not accidental universalization. The CRAFT (production) remains ancestral- region-gated by guild continuity. (6) M-12 antiquity reservation: the historical origin of the craft and the reciprocal tradition is a bounded unknown (new Mystery Reserve entry added by CH-0006). Charter-Era-consolidated / pre-Charter-inherited / recent-innovation readings are all productive; no world-level resolution. Latent burdens introduced (tracked in CH-0006 latent_burdens_introduced): M-12 resolution; reciprocal-travel case law (OPEN_QUESTIONS); subsection- seal fraud precedent (OPEN_QUESTIONS); intra-Cluster-C stratification compounding; architectural sizing-norm drift to non-ancestral estates (Rule 4 partial concession); authentication-specialist cartel-formation pressure parallel to CF-0028. Specific guild names, charter terms, reciprocal-journey verification archive custody specifics deferred to OPEN_QUESTIONS Specific Guild Naming. Six critic sub-agents dispatched at escalation gate (11 of 13 domains touched); all flagged risks repaired in Phase 9 or logged as latent burdens. Adjudication record: adjudications/PA-0005-accept_with_required_updates.md.
