statement: |
  Animalia's coin economy is denominated primarily in copper and silver, with meaningful spreads between petty tasks (copper) and higher-risk work (silver and above). Compensation may also be contracted as in-kind transfer of livestock, grain, or other valuable goods, which can impose logistical burdens on the recipient.
status: hard_canon
title: Currency is copper-and-silver with in-kind livestock as contractual option
truth_scope:
  diegetic_status: objective
  world_level: true
type: resource_distribution
visible_consequences:
  - posted prices in copper at taverns, markets, ferries
  - silver wages for skilled craft and risky work
  - livestock-as-payment contracts common in rural areas
  - reputation ("oath-breaker") is durable economic harm (CF interacts with SOC-3)
