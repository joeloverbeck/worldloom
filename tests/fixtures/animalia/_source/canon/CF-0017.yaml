statement: |
  Traveling performers (bards, minstrels, story-tellers) work a customary bardic circuit through tavern venues across the heartland and into selected drylands and highland nodes. Tavern income is a known economic stream for these performers; their performance shapes the oral-narrative landscape of the world.
status: hard_canon
title: Bardic-circuit performers earn coin in taverns
truth_scope:
  diegetic_status: objective
  world_level: true
type: institution
visible_consequences:
  - tavern bard nights as ordinary event
  - bardic cycles transmit Charter-Era myth, recent-incident songs, work-songs
  - bards compete with scribes for authoritative narrative
  - contracted bards (per CF-0024) take patron commissions for material/intelligence gathering, hire-notice relay between towns, and narrative-custody production; this creates a fifth, economically-incentivized narrative-custody channel competing with scribes, civic archive, artifact-guild, and theological authority
