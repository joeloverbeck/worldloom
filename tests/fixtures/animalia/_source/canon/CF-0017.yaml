notes: |
  Direct from brief. Modified 2026-04-18 by CH-0003 (CF-0024): bards extended as contracted agents taking patron commissions for material/intelligence gathering and narrative-custody production. The tavern-performance and bardic-circuit economics of CF-0017 are preserved; the modification adds a second economic stream and names the consequent narrative-custody channel. See Mystery Reserve M-7 (reputation-genealogy of occult-fallout specialists) for the bounded unknown this creates. Modified 2026-04-19 by CH-0008 (CF-0034): bardic-circuit narrative- custody extended with bandit-related subgenres (raid-lament songs, hunter-contractor return accounts, named-bandit-captain bardic cycles, bounty-ethics reform broadsides); performer-martyr class named (bards killed while traveling corridors); bardic moral-witness-refusal threshold committed ("no ballad for a captain whose camp held slaves beyond threshold" in mainstream traditions; sectarian-commissioned bards violate this threshold for pro-supremacist recruitment and listeners mark the breach). Named-bandit-captain historicity is contested per new Mystery Reserve M-14 (bandit-captain mythography reliability). Modified 2026-04-19 by CH-0010 (CF-0036): sixth bardic subgenre register added — silenced-contractor ballad subgenre (witness-refusal songs in AES-1 scarred-veteran cadence; itinerant-bard-carried; patron-commissioned bards refuse; sectarian-commissioned bards inflate supremacist recruitment register and are marked-breach by listeners). Mainstream bardic moral-witness-refusal threshold extended — no ballad for a supremacist-doctrine preacher; no ballad for an interspecies- cannibal-band captain in mainstream traditions; interspecies-cannibal captains accrue mythography AS SUB-REGISTER within M-14 existing antagonist-mythography register (NOT a new M-entry). Hero-drift firewall: silenced contractor is the dredger who keeps singing at the tavern, NOT the protagonist who exposes the watch.
  Modified 2026-04-20 by CH-0016 (CF-0044): bardic-absorption directional firewall — circuit-bards traversing drylands corridors absorb drylands short-poetry stranger-hospitality verse-fragments (CF-0044) and transport them into canal-heartland tavern-performance in the bardic-tavern register only; the stranger-exchange PROTOCOL itself (turn-exchange, hospitality- register, host-initiated cadence) does NOT travel. Return-circuit bards cannot elicit the stranger-exchange register from drylands hosts because the register is host-initiated hospitality, not guest-performance. One-way cultural-borrowing pathway preserved; canal-heartland audiences recognize "drylands cadence" in absorbed verse-fragments without access to the source protocol. This is documentation of an existing-but-implicit bardic-absorption constraint on CF-0017's narrative-custody channel (the fifth economically- incentivized narrative-custody channel named at CH-0003 does NOT become a drylands-stranger-exchange custody channel via absorption; verse-fragments join existing bardic-repertoire transmission register, the protocol stays drylands-scoped).
  Modified 2026-04-20 by CH-0017 (CF-0045): extension — lock-night is a named bardic-performance occasion at canal-corridor lockside taverns, distinct from ordinary tavern-night by audience composition (canal-labor heavy: lockmaster-crew, barge-layover travelers, wharf-traders) and customary silver-differential pay register above a middling tavern-night rate. Performance is keyed to lock-closure hour at the nearest tavern to the lock; informal lockmaster / tavern-keeper coordination on scheduling is routine, no civic-charter licensure or guild-body attaches. Lock-night is a sub-occasion WITHIN CF-0017's bardic-tavern institutional frame (Rule 3 specialness-inflation firewall — NOT a new institution with its own licensure, oversight, guild body, or cohort), and is distinct from CF-0038's Brinewick canal-circuit quarter-year rotation (orthogonal dimensions: rotation = which-taverns-across-a-year; lock-night = which- night-type-within-a-week at a given canal-corridor tavern). Lock-night- specific material accretes as a named sub-genre within CF-0017 bardic repertoire — lockside-labor ballads, canal-route work-songs, barge- traveler goodbyes — and canal-labor oral idiom enters the broader circuit-bard catalog via lock-night audience composition. Regional scope (canal-heartland band plus selected canal-adjacent heartland nodes with working locks); stabilizers anchored to canal-lock infrastructure (CF-0015), CF-0017 parent-institution containment, and Rule 3 sub-occasion framing. Lock-night performer competence is absorbed within existing CF-0017 circuit-bard reputation register; no new M-7 cohort-class or sub-specialty holding clause introduced. M-7 and M-19 firewalls preserved without modification. DA-0001 (Vespera Nightwhisper, "a-season-on-the-circuit") pre-figures the lock-night occasion at diegetic level (claim_map canonically_true at cf_refs [CF-0017, CF-0009]); CF-0045 formalizes the diegetic precedent to world-level canon per Rule 6 audit-trail preservation.
