id: CF-0015
title: Canal network is the primary commercial spine
status: hard_canon
type: technology
statement: |
  A network of natural and constructed canals through the temperate heartland serves as the primary commercial transportation spine. Locks, weirs, and ferry crossings are choke points. Canal-side rural towns are a common settlement pattern; sprawling cities concentrate at confluences and ports.
scope:
  geographic: regional
  temporal: current
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - economy
  - settlement_life
  - warfare
  - architecture
prerequisites:
  - chartered polity capable of canal construction and maintenance
  - lock-and-weir engineering tradition
distribution:
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal:
    - terrain (highlands, drylands, fens) limits canal extent
costs_and_limits:
  - lock and weir maintenance is significant ongoing cost
  - canal contamination from artifact incidents can isolate towns
  - canal-rights and toll disputes are recurring inter-polity friction
visible_consequences:
  - canal-side row-cottages, lock-master offices, towpath traffic
  - canal-borne supply gives wealthy polities military logistics advantage
  - beaver-folk concentration in canal engineering
  - special canal-transit fees fund containment infrastructure in some polities
required_world_updates:
  - GEOGRAPHY
  - ECONOMY_AND_RESOURCES
  - INSTITUTIONS
  - EVERYDAY_LIFE
source_basis:
  direct_user_approval: true
  derived_from: []
contradiction_risk:
  hard: false
  soft: false
notes: |
  Brief specifies compact canal-side rural towns and sprawling cities with outskirts estates; this fact anchors that geography.
