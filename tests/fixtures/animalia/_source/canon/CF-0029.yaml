notes: |
  Direct from briefs/animalia-ruin-expeditions.md. Carries SEVEN explicit firewall commitments analogous to CF-0025's six: (1) world-level non-sentience (ONT-1 preservation); (2) M-2 scale cap (squad-wipe local only; catastrophic-class excluded); (3) M-5 firewall against animal-folk sentience cross-application; (4) M-6 non-conflation with modern-crafted vessel-hosted agencies (distinct origin class); (5) M-1 anti-evidence clause (guardian presence does NOT constitute evidence for Maker cause-of-fall); (6) M-8 bounded-unknown referral for mechanism; (7) careful-practitioner vocabulary discipline parallel to CF-0022. The "magically-animated" framing in the user proposal is preserved as in-world observation, not as ontological commitment to agency. Mystery Reserve M-10 governs the bounded-unknown of guardian-presence heterogeneity. Adjudication record: adjudications/PA-0003-accept_with_required_updates.md.
  Modified 2026-04-19 by CH-0009 (CF-0035): distinct-origin firewall extended bidirectionally — artifact-contaminated mutated non-sentient beasts (CF-0035) are SURFACE-SIMILAR to guardian constructions (both Maker-origin wilderness hazards with apparent-autonomy patterns) but CATEGORICALLY DISTINCT IN ORIGIN (guardian = intentional Maker craft with activation logic; mutated beast = incidental biological effect on untargeted fauna; authentication-specialist craft signatures do not cross-validate between the two categories). Three surface-similar Maker-origin apparent-autonomy phenomena (CF-0022 modern-crafted vessel-hosted agencies, CF-0029 guardian constructions, CF-0035 mutated non-sentient beasts) must each be held at distinct-origin status; M-6 / M-8 / new M-15 firewalls apply independently. Minority Maker-mystic position treating the three as continuous cosmological phenomena is contested canon, NOT world-truth. Parallels the CF-0022 ↔ CF-0029 reciprocity established in CH-0004.
