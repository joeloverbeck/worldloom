contradiction_risk:
  hard: false
  soft: false
costs_and_limits:
  - squad-wipe lethality during activation; entire expeditions lost
  - environmental bleed-through per CAU-2 signals activation
  - post-activation contamination extends sealed-quarter patterns
  - apparent autonomy is observational, not a sentience claim (ONT-1 firewall)
  - scale cap: squad-wipe local only; cascade / mass-mind-control / urban-scale effects are EXCLUDED and remain catastrophic-class (M-2)
  - NO conflation with modern-crafted vessel-hosted agencies (CF-0022); the phenomena are distinct-origin parallel, not identical
  - mechanism unknown in-world (Mystery Reserve M-8); apparent targeting and activation conditions are disputed
  - guardian-activation does NOT confirm Maker intentionality at world level; M-1 (cause of fall) does not gain evidence from guardian presence
  - 'careful-practitioner vocabulary discipline parallels CF-0022: "behaves as if," "appears to," avoid "thinks," "knows," "decides"'
distribution:
  who_can_do_it: []
  who_cannot_easily_do_it:
    - all living people (guardian constructions are Maker-Age autonomous artifacts; no one can make them)
    - modern crafters per CF-0021 (catastrophic-class boundary permanently unrecoverable; guardian-construction class is beyond leaked-corpus scope)
  why_not_universal:
    - guardian constructions are rare even within enterable ruins; most ruin sites yield mundane hauls
    - Maker-Age production is terminated (historical); guardians are finite surviving inventory
    - catastrophic encounters trigger resealing, reducing future encounter risk
    - guardian-activation conditions and targeting logic are empirically poorly-understood (see M-8)
