statement: |
  A rare subset of enterable Maker-Age ruin sites (CF-0027) contain magically-animated constructions — self-operating artifact-bearing defenses that respond to intrusion. Encountered at squad-wipe local scale, guardian constructions kill expeditions outright when activated and have caused catastrophic outcomes that trigger ruin resealing. They are WORLD-LEVEL NON-SENTIENT: Invariant ONT-1 is preserved without exception (CH-0004 clarification extends the CH-0002 ONT-1 clarification). Their apparent autonomy is behaviorally observed, empirically described, and in-world contested as to mechanism (Mystery Reserve M-8); the world does not commit a cognitive or intentional framing. Guardian constructions are LOCAL in lethality (squad-wipe scale, not cascade / mass-mind-control / urban-scale ward-collapse — those remain catastrophic-class per Mystery Reserve M-2 and are NOT within expedition recovery). Guardian constructions are DISTINCT in origin from modern-crafted vessel-hosted agencies (CF-0022); the phenomena are parallel but not conflated — no forced identification between Maker-Age guardian and modern crafted-artifact apparent-agency (M-6 firewall). The M-5 firewall against animal-folk sentience cross-application holds: nothing about guardian-construction apparent-autonomy transfers to claims about animal-folk sentience. Guardian presence at a ruin site does NOT constitute evidence for any Maker cause-of-fall hypothesis (M-1 anti-evidence firewall).
status: hard_canon
title: Magically-animated Maker-Age guardian constructions exist as a rare ruin-defense category
truth_scope:
  diegetic_status: objective
  world_level: true
type: artifact
visible_consequences:
  - bardic cycles name specific guardian-encountered sites and the dead they produced
  - expedition-veteran vocabulary distinguishes "the quiet ruin" from "the watching one"
  - ward-wright post-activation inspection becomes standard for catastrophic expedition aftermath
  - resealed quarter-towns attributed to guardian encounters form a distinct subcategory of sealed perimeter
  - authentication-specialist work includes distinguishing guardian-construction remains from other Maker-Age artifact types
  - sectarian interpretations proliferate (Maker-mystic sacred; progenitor-skeptic warnings; common-pantheon cautionary proof of Maker hubris); NONE is world-true
  - civic-registry refuses sectarian "personhood" claims about guardian constructions, parallel to CF-0022 refusals
  - guardian-construction encounter is a recognizable bardic catastrophe subgenre
  - expedition pre-entry protocols include guardian-indicator scouting (inscription patterns, residual bleed-through, animal-behavior at entrance)
