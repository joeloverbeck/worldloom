statement: |
  A small population of crafters across the Charter polities can attempt to create new magical artifacts using vessels of ordinary ceramic, metal, or wood and partial-translation grimoires (CF-0023) leaked from chartered artifact-research. Most attempts fail catastrophically — kiln explosions, forge accidents, or wood-vessel ignitions kill crafters and assistants. A small fraction succeed; their outputs are inferior in stability and power to Maker-Age artifacts, never reach catastrophic-class effect, and are recognizably distinguishable from Maker-Age artifacts by craft signature. Different polities respond differently — some accept, some tolerate, some fine, some jail. The originating research was conducted on contained Maker-Age artifacts within the artifact-extraction guilds during the Incident Wave era; partial knowledge subsequently leaked, was sold, or was carried out by defecting researchers.
status: hard_canon
title: Modern artifact creation exists as a marginal, lethal, unstable craft
truth_scope:
  diegetic_status: objective
  world_level: true
type: craft
visible_consequences:
  - occasional kiln explosions in artisan quarters across heartland canal towns
  - workshops with private kilns or unusual hours attract civic and guild suspicion
  - new criminal-statute categories in most polities; regional legal divergence (accept/tolerate/fine/jail)
  - inter-polity friction over crafters fleeing strict polities for permissive ones
  - new occupational niche — authentication specialists distinguishing modern from Maker-Age work
  - parallel small-scale shadow market alongside Maker-Age artifact trade
  - sectarian movements form around successful crafters; common-pantheon clergy mostly condemn; Maker-mystics celebrate
  - new bardic cycles about the crafter who made too much, the kiln that took the family, the possessed pot
  - childhood warnings about unstamped workshops in artisan quarters
  - herb-wives keep extra burn-salve stocked in artisan quarters
  - estate dowager-gossip tracks which families had kiln-yard scandals on tenant land
  - drylands water-rights tribunals add "occult firing" to well-misuse statutes
  - fenland villages quarantine suspect dry-edge potters when contamination drifts
  - highland clans burn grimoire-leaves found in trade goods and exile readers
  - civic ward-inspectors add walk-throughs of suspect workshops to their schedules
  - battlefield-artifact taboo under new strain — mercenary captains tempted by crafter commissions
  - crafter-hunting niche (per CF-0024) in punitive polities: civic watch contracts adventurer-investigators to locate unlicensed workshops and to surveil authentication-specialist competitors; the niche creates a new enforcement-contractor subeconomy and feeds CF-0023 custody-contest pressure
  - mercenary-band commission pathway (per CF-0024) formalized: the abstract battlefield-artifact-taboo strain becomes a concrete commission route — a mercenary captain commissioned to use crafted artifacts tactically is now a named risk, not merely a rumor
