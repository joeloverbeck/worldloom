notes: |
  Direct from briefs/animalia-artifact-creation.md. The proposal as written drifts toward "lone artificer protagonist" — early canon should keep crafters offstage or in supporting roles to protect AES-1 (heroism in coin and scars) and AES-2 (the ordinary keeps the world honest). Modern crafted artifacts must remain interpretively suggestive only with respect to Mystery Reserve M-1 — the modern parallel does NOT constitute evidence at world level for any M-1 hypothesis. Linked CF-0022 establishes the world-level non-sentience of vessel-hosted "agencies" (preserves ONT-1; maintains M-5 firewall). Linked CF-0023 commits the partial-translation existence forced by this proposal. Linked Mystery Reserve M-6 governs the bounded unknown of vessel-hosted-agency mechanism. Adjudication record: adjudications/PA-0001-accept_with_required_updates.md. Modified 2026-04-18 by CH-0003 (CF-0024): crafter-hunting niche in punitive polities formalized; mercenary-band commission pathway for tactical crafted-artifact use formalized. Both were flagged in CF-0021's original costs_and_limits but are now concretized as visible consequences with named contractor-stratum actors. See adjudication record adjudications/PA-0002-accept_with_required_updates.md.
