contradiction_risk:
  hard: false
  soft: true
costs_and_limits:
  - kiln explosions, forge accidents, and wood-vessel ignitions kill crafters and assistants
  - successful crafted artifacts are unstable, inferior to Maker-Age work, and produce unpredictable effects
  - modern artifacts cannot reach catastrophic-class effect (hard scope boundary; preserves Mystery Reserve M-2)
  - effects of successful artifacts may be random upon creation OR process-dependent (in-world researcher dispute, observationally unresolved)
  - vessels use ordinary ceramic, metal, or wood — NOT containment-grade clay (which remains guild-monopolized; the bottleneck is preparation technique, not material grade)
  - knowledge transfer is empirical and dangerous; apprenticeship turnover is brutal
  - guild seizure and civic prosecution in punitive polities; capital penalty in some for catastrophic-adjacent attempts
  - vessel-hosted apparent-agency outputs (CF-0022) are world-level non-sentient but in-world contested
distribution:
  who_can_do_it:
    - independent occult scholars willing to risk death
    - rogue current or former guild researchers
    - sectarian movements (Maker-mystic fringe; certain progenitor-cult radicals)
    - greedy or desperate crafters in trades adjacent to ceramics, metalwork, woodwork
    - chartered crafter-guilds in the few polities that license the practice
  who_cannot_easily_do_it:
    - illiterate, poor, or remote populations
    - communities without grimoire-fragment trade access
    - chartered guild members operating openly in punitive polities (license-revocation risk)
  why_not_universal:
    - extreme lethality of attempts (kiln explosions, forge accidents, wood-vessel ignitions)
    - knowledge fragmentariness (no complete recipe; vessel-preparation step is guild-internal and not in leaked grimoires)
    - capital cost of repeated failed attempts
    - civic and guild penalties in most polities
    - folk taboo in communities scarred by kiln explosions
    - unpredictable outputs even in successful attempts
    - cannot produce catastrophic-class artifacts (M-2 boundary; permanently unrecoverable from leaked corpus)
    - mundane substitutes preferred at institutional and household level (CF-0003 logic)
