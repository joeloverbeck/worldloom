contradiction_risk:
  hard: false
  soft: true
notes: |
  Proposed as part of CH-0014 four-CF bundle extending the artifact system per brief briefs/animalia-magical-artifacts.md. Scoped to Maker-Age artifacts only per Continuity Archivist critic's Phase 6b recommendation; modern crafter outputs (CF-0021) remain destructible by ordinary means, preserving the CF-0021 "inferior" stabilizer register. CAU-1 cost taxonomy extended in-place via modification_history entries on CF-0005 (destruction-attempt cost-transfer is a variant cost form); no new invariant introduced per Phase 6b convergent recommendation. Underlying mechanism is bounded-unknown per new Mystery Reserve M-20 (Rule 7 obligation). Recommend permanent atmospheric retention of M-20 mechanism; the unknowability IS the stabilizer. Adjudication record: adjudications/PA-0013-accept_with_required_updates.md.
