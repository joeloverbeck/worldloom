statement: |
  Brinewick is a canal-fed charter-polity city in the Temperate Canal Heartland band, sited at a convergence of canal trunks feeding a river-mouth system. World-renowned as among the foremost centers of commerce — clearing more canal-clearing volume in an ordinary week than three heartland market-towns in a fair-season combined — and among the most populated heartland cities (specific trunk-count, specific river-mouth-connection geometry, and the identity of the most-populated heartland city all deferred to OPEN_QUESTIONS). A bifurcated polity: a dense downtown civic core where ordinary working- household life concentrates, addressed by canal-bend-and-lock-number rather than street-name, ringed by artisan-guild quarters, and an outskirts ring of ancestral estates where economic and social weight accretes laterally (via wealth, backchannel influence, civic-advisory-council seating, and dowager- gossip network reach) within the Charter-Era civic frame, which formally holds — civic registry as default arbiter, magistrate courts for dispute, chartered watch for violence, guild charters for licensure. Famous for canal-side lamps, the characteristic "briny line" at saltwater-marsh-fed lock-to-freshwater-canal confluence (local Fourth-Bend geography), and frequent dawn fog; its named anchor taverns (The Copper Weir and The Lock- Keeper's Cat) anchor a six-tavern bardic "canal circuit" quarter-year rotation (four other rotation venues deferred). A generational migration attractor across decades-to-centuries; many provincial-born migrants are chewed-up-and-spat-out, forming a named regional-collector precarious stratum integrated with the existing refugees-from-sealed-quarters pattern (coin-for-shame return-idiom). Aquatic-gaited sentient peoples (cluster A otter-folk + beaver-folk; cluster B frog-folk + salamander-folk + waterfowl- folk; rarely cluster D naga-folk bargemaster under DIS-3 population-rarity) are the MAJORITY of Brinewick's legitimate canal-labor workforce (port, sluice, barge, fishery, lock-keeper guild apprenticeship) and are overrepresented — among multiple overrepresentations by embodiment-fit pattern — in the city's canal-underwater smuggling underworld niche; this is socioeconomic occupational-geography driven by embodiment-fit capability, NOT species-role civic assignment, NOT SOC-1 hierarchy, NOT world-level species-labor pattern.
