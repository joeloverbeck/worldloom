statement: |
  Wealthy patrons (estate-owners, nobility, prosperous communities, capital-pooling syndicates) arrange multi-professional expeditions into enterable Maker-Age ruin sites (CF-0027). Typical staffing includes adventurer-contractors (CF-0024) for martial security, scholars and researchers for artifact and inscription work, containment-wrights and ward-wrights on guild commission for procedural roles, authentication specialists, and ordinary labor (cooks, teamsters, porters, scribes, pack-handlers, boat-guides). Expedition outcomes range from inert-yield (pottery and precious metals, no magical finds) to catastrophic squad-wipe (guardian-construction encounters per CF-0029). Successful expeditions yield career-ending retirement payouts for surviving contractors; unsuccessful expeditions yield widows. Inter-group competition for contested sites has escalated in documented cases to skirmishes and regional armed conflicts involving levies and mercenary bands. Catastrophic sites are officially resealed (civic authority; enforcement variable). Bardic-circuit performers carry expedition tales real and fictional, often as contracted narrative-custody (CF-0017 extension per CF-0024). Expedition-reports are partisan-canon, not objective archival record (anti-propaganda clause).
status: hard_canon
title: Patron-funded ruin-expedition venture is a recognized institution
truth_scope:
  diegetic_status: objective
  world_level: true
type: institution
visible_consequences:
  - named expedition ventures under patron sponsorship; public at venture level, secret at entrance-detail level
  - tavern-board and lockmaster-wall postings for expedition hires; patron-agent scouts recruit at bard-nights
  - contract-posting variants in all five EVERYDAY_LIFE clusters with cluster-specific signatures
  - bardic subgenre of expedition cycles (real and fictional) circulating tavern circuit
  - civic-archive expedition-roster and disposition-inventory records
  - magistrate docket for funder-primacy vs guild disputes, knowledge-killing prosecutions, inter-group skirmish prosecutions, resealing-authority disputes
  - sectarian pilgrimage to ruin sites (per GEOGRAPHY §Sacred and Cursed Terrain)
  - estate-level artifact-vault architecture and dowager-gossip ledger of funded expeditions
  - ruin-levy as new polity-duty category in contested regions
  - inter-polity extradition cases for expedition-contractors crossing licensing lines
  - '"took the ruin job" cultural register; "dirt bit back" expedition-loss euphemism'
  - place-names and street-names commemorating regional armed conflicts over ruin disputes
  - ordinary-trade participation (cooks, teamsters, porters, scribes, pack-handlers, boat-guides) — expedition consumes ordinary labor, not only heroic
  - most hauls mundane (pottery, precious metals, inscribed shards); magical-find is the exception, not the rule
