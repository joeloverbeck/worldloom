notes: |
  Direct from briefs/animalia-ruin-expeditions.md. AES-1 guard clause: the expedition venture is HAZARD LABOR, not vocation-romance; bards narrate real-and-fictional exploits but veterans are dryly mocking of glory-talk per AES-1 precedent (CF-0020, CF-0024). Most retirements are "a middling purse and a scar," not jackpot fortune. In-register language: "expedition, contractor, extraction crew, funder, haul, resealed (officially), pension-bond, survivor's scrip, squad-wipe (dry), hazard-pay, bond-surety, broker, ruin-charter, inquest, widow's claim, Maker-era shard, inert fragment, crew-captain, veteran-for-hire, took the ruin job." Out-of-register language to AVOID: "adventurer's guild, quest, party, loot, dungeon, raid (heroic sense), chosen, destiny, legendary hero, epic, glory, magnificent treasure, ancient evil, defeating the dungeon, heroic last stand, legendary artifact (as self-description only — bardic inflation is in-register), chosen one, the call, glorious exploits (except in bardic irony)." Expedition-reports are partisan-canon; patron-commissioned bards write favorable accounts; civic-archive keeps prosaic records; guild records track disposition; black-market narratives sometimes closer to reality. Four-way narrative-custody contest (per CF-0024) is now five-way with expedition-reports as a distinct genre. Mystery Reserve M-7 extends to cover expedition-veteran reputation-genealogy. New M-9 governs the epistemic content of recovered Maker-knowledge. Adjudication record: adjudications/PA-0003-accept_with_required_updates.md. Modified 2026-04-18 by CH-0007 (CF-0033): clarification that dragoon perimeter response (CF-0033) and ruin-levy mobilization (CF-0028) are STRUCTURALLY DISTINCT forces in ruin-adjacent polities; the two forces do NOT merge. In adopting heartland polities with ruin-adjacent territory, dragoon perimeter response, CF-0028 ruin-levy mobilization, and expedition-band skirmish may co-deploy at the same ruin-mouth where a chartered-polity ward-breach declaration overlaps a ruin-expedition- conflict escalation zone. Magistrates adjudicate jurisdictional primacy on a per-incident basis with visible anxiety; the three forces remain categorically distinct in civic registry, chain-of-command, and compensation structure. Dragoon perimeter authority is civic-chartered with magistrate chain-of-command; ruin-levy mobilization is polity- duty-based with variable chain-of-command depending on the polity's adoption of CF-0028 levy framework; expedition-band skirmish is private-contract / patron-syndicate labor. This is the load-bearing structural distinction that prevents ruin-adjacent dragoon-adopting polities from collapsing the three forces into a single ruin-authority category (which would violate both CF-0028 expedition-venture scope boundary and CF-0033 dragoon mission-scope commitment). Expedition- competition regional armed conflict patterns (CF-0028 Layer 4 pressure) are NOT resolved by dragoon adoption; dragoons do not deploy into expedition-conflict contexts outside ward-breach declaration predicate within home polity. Adjudication record: adjudications/PA-0006-accept_with_required_updates.md. Modified 2026-04-19 by CH-0008 (CF-0034): expedition security faces a TWO-THREAT model in some corridors — guardian-wipe hazard (CF-0029) at the catastrophic-class end PLUS bandit-resistance hazard where endemic bandit groups (CF-0034) occupy non-guardian enterable ruin subsets as shelter. Bandit-occupied ruins are preferentially non-guardian-active (guardian-wipe eliminates occupying bandits per CF-0029); this is a survivor-bias selection pattern that DEEPENS rather than resolves M-10 guardian-presence heterogeneity. Expedition teams entering suspected- bandit-occupied ruin subsets face a categorically different threat profile from empty-ruin entry: armed bandit resistance is human-scale and negotiable-under-duress in ways guardian activation is not. Expedition-ventures accordingly rebalance security rosters in corridors where bandit-occupation intelligence is available (more CF-0024 contractor-stratum martial veterans, fewer scholar-contractors). Bandit-custody of incidentally-encountered Maker-material routes through existing CF-0023/CF-0028 illegitimate-custody channels per M-9 firewall — bandit-occupation does NOT create a seventh Maker- knowledge custody channel. The M-10 selection-bias deepening is LOAD-BEARING: any institution treating bandit-corridor-lore as guardian-predictor violates M-10's disallowed cheap answer. Mystery Reserve firewalls extended (M-1 shelter-scope, M-2 anti-catastrophic custody, M-10 selection-bias). Adjudication record: adjudications/PA-0007-accept_with_required_updates.md.
