contradiction_risk:
  hard: false
  soft: true
costs_and_limits:
  - squad-wipe mortality from guardian constructions (CF-0029); whole expeditions lost
  - inter-group ruin-competition escalating to skirmishes and regional armed conflict; levy and mercenary-band mobilization
  - knowledge-killings around ruin-entrance information (distinct enforcement from civic prosecution; parallels CF-0019 grimoire dynamics but with killing-by-rival as primary mechanism)
  - Charter-Era anti-monopoly-of-force norms under acute stress (exceeds CF-0024 "strains rarely breaks" in some regions)
  - widow-of-the-expedition category without charter pension (distinct from CF-0024 widow-of-the-job)
  - contamination drift from failed expeditions extending sealed-quarter perimeters
  - patron-funded expedition reports are partisan-canon; narrative-custody contest extends CF-0024 dynamic (fifth custody channel)
  - expedition-syndicate shares are volatile value-store without civic-registry recognition (shadow-equity market)
  - labor-market cannibalization — expedition demand pulls top-silver veterans from ward-breach response
  - authentication-specialist market susceptible to cartel formation (regulatory capture risk)
distribution:
  who_can_do_it:
    - estate-owners and nobility of any species (SOC-1) with sufficient capital
    - chartered polity-community syndicates
    - chartered artifact-extraction guilds within jurisdictional zones
    - sectarian Maker-mystic movements with capital (rarely)
    - speculator-collectives pooling capital
  who_cannot_easily_do_it:
    - ordinary households (wealth-gate)
    - highland clan communities (clan-elder sanction usually refused; Maker-site desecration taboo)
    - fen stilt-villages (no wealth-gate satisfied; participate only as specialist-responders to other expeditions' fallout)
    - principled-refuser lineages (CF-0026 extended)
    - poor polities (may sell civic permissions to outside funders, generating friction)
  why_not_universal:
    - high capital requirement for dozens of professionals, provisioning, transport, security, legal processing
    - squad-wipe lethality attrits the veteran pool
    - chartered-guild legal-disposition bottleneck raises the break-even threshold
    - entrance-knowledge killings and jurisdictional contests add friction costs
    - most hauls yield moderate returns (pottery, precious metals), not catastrophic-class wealth
    - institutional / cultural / religious opposition (containment-wrights, progenitor-cult, CF-0026 refusers)
    - contamination drift from failed expeditions punishes aggressive polities
