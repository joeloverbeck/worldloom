notes: |
  Composite fact per Phase 0 classification: primary type hazard with sub-types species (non-sentient fauna subcategory), local_anomaly, and historical_process. Structured as a single CF parallel to CF-0021, CF-0027+CF-0028, CF-0029, CF-0034 composite patterns.
  Six required firewalls committed (six-critic-convergence at Phase 6b): (1) M-2 scale cap; (2) M-5 non-sentience, fourth cross-application after CF-0022, CF-0029, CF-0031; (3) M-8 distinct-origin from CF-0029 guardian constructions (bidirectional — CF-0029 modification_history carries a parallel entry); (4) AES-1 hero-drift taboo list (full forbidden-framings inventory); (5) Rule 3 wildlife-sub-specialty-not-cohort and widow-of- the-hunt absorbed into widow-of-the-job; (6) not-a-sixth-Charter-Era-axis (five-axis stress register unchanged, MINOR operational docket parallel to CF-0034).
  Three additional cross-application firewalls adopted from Mystery Curator: M-1 (no Maker-cause-of-fall resolution from mutated-beast evidence or gargantuan-underground rumor); M-9 (mutated-beast remains NOT a seventh Maker-knowledge custody channel); M-10 (hunter-survivor wilderness-zone-folklore is selection-bias, second cross-application after CF-0034 bandit-survivor ruin-folklore firewall).
  Five operational firewalls from Politics/Institution critic: ward- inspector discretionary dispatch; habitat-cultivation charter-scandal; Maker-mystic veneration diffuse-only; contaminated-trophy guild-handoff; dragoon-perimeter predicate-declaration. One species-embodiment firewall from PEOPLES_AND_SPECIES extension: carnivore-folk progenitor-cult cousin-lineage trophy taboo partial.
  Sixth canal-corridor illegitimate-service product-line named (trophy- provenance authentication fraud) — compounds cartel pressure to six overlapping streams; Systems/Economy critic flagged regulatory-capture incentive now strongest in Layer-4 register.
  New Mystery Reserve entry M-15 manufactured for gargantuan-underground rumor-only subcategory per Rule 7 obligation. Four new OPEN_QUESTIONS items added: Hunter-Contractor Beast-Trophy Custody and Natural-History Register; Wilderness-Zone Hazard-Mapping Convention; Settlement Anti- Incursion Drills and Militia Standing; Bardic Register for Mutated-Beast Cycles vs Bandit-Captain Cycles (M-14 parallel).
  modification_history entries applied to: CF-0005 (CAU-1 cost taxonomy extension); CF-0006 (Visible Signs cross-reference annotation, no CF-field change); CF-0017 (bardic subgenre fifth register); CF-0024 (wildlife sub-specialty named; NOT a sixth subtype); CF-0029 (distinct- origin bidirectional firewall); CF-0034 (wilderness-selection-pressure annotation; M-10 second cross-application; bandit-hunter vs legendary- beast-hunt boundary clarified).
  Six critic sub-agents dispatched at escalation gate (all 13 FOUNDATIONS domains touched; invariant-clarification extensions to ONT-1/ONT-3/ CAU-1): Continuity Archivist, Systems/Economy, Politics/Institution, Everyday-Life, Theme/Tone, Mystery Curator. All six critics converged on ACCEPT_WITH_REQUIRED_UPDATES; no critic dissented.
  Latent burdens logged in CH-0009: trophy-legality polity-asymmetric risk as potential sixth Charter-Era axis; trophy contamination-category ambiguity; wildland contamination hazard-mapping convention; captured- alive mutated-beast collection scenarios; legendary-beast-hunter sixth- cohort risk (M-7 holding clause); gargantuan-underground upward pressure; bardic mutated-beast-figure mythography reliability register (M-14 parallel).
  Register-discipline commitments load-bearing per Theme/Tone critic: the CF-language cadence exemplar — *"We walked the deep wood three days; we brought back the head; the bounty-clerk paid; one of the four stayed in the wood. The ward-inspector came out the next morning."* — captures the AES-1 hunter-return register. Stories generated by this CF should hold this cadence and avoid the forbidden-framings inventory.
  Adjudication record: adjudications/PA-0008-accept_with_required_updates.md.
  Modified 2026-04-19 by CH-0010 (CF-0036): carnivore-folk progenitor- cult cousin-lineage trophy taboo (CH-0009 PEOPLES extension) and CF-0036 supremacist-cannibal doctrine are INVERSE-VALENCE sectarian registers within the same carnivore-folk progenitor-cult surface territory and MUST NOT be read as ends of a single carnivore- progenitor-cult spectrum. The trophy taboo is a mainstream respect- discipline (progenitor-cult mainstream current — wolf-folk, fox-folk, hyena-folk, bear-folk progenitor-cults in specific lineage-keeper currents refusing cousin-lineage mutated-beast trophy display); the supremacist-cannibal doctrine is a pathological cult-deviation (progenitor-cult sectarian supremacy wing asserting carnivore-species entitlement to hunt other sentient peoples). Conflation produces category error — inverted moral valences CANNOT be read as spectrum. This firewall is held PRIMARILY in CF-0036 notes field (see CF-0036); CF-0035 record receives this cross-reference to preserve audit-trail clarity for future readers. CF-0035 substantive content preserved. M-5 firewall FIFTH cross-application (CH-0010 extension) applies to CF-0035 sentience-boundary preservation: mutated beasts remain non- sentient; sectarian "mere beasts" register applied to SENTIENT VICTIMS by CF-0036 supremacist-cannibal doctrine is PATHOLOGICAL CATEGORY ERROR and does NOT destabilize CF-0035 non-sentience commitment for actual non-sentient fauna. Adjudication record: adjudications/PA-0009-accept_with_required_updates.md.
