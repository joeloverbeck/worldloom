id: CF-0035
title: Artifact-contaminated mutated non-sentient beasts as wilderness hazard
status: hard_canon
type: hazard
statement: |
  In wilderness-distal regions of Animalia, uncontained Maker-Age artifacts unearthed by earthquake, flood, burrowing animal, or slow soil-creep sometimes affect the non-sentient fauna that encounter them. Most such beasts die of artifact exposure (consistent with CAU-1 cost universality); a rare subset survive and exhibit morphological and capability alteration — increased size, supernumerary limbs, chimeric-seeming morphology where an already-contaminated individual bears fused or parallel features, altered sensory or predatory capability. The phenomenon operates on a 9-link common-to-extinct chain (common uncontained artifact in remote site → common beast encounter → most die → rare survival → rare-of-rare mutation → rare local persistence → rare viable niche → very rare heritable or breeding-mutated lineage → extinct-tail stable deep-wilderness population over generations). The scale-tail of the distribution is rumor-only: the gargantuan-underground beasts of deep cave and Maker-substructure-adjacent strata that no sentient eyewitness has ever returned to describe (Mystery Reserve M-15). Individual mutated beasts stray settlement-adjacent under hunger or habitat pressure, where settlement-hire hunter-contractors respond under CF-0024 wildlife subtype's legendary-beast-hunt sub-specialty; trophies enter narrow polity-asymmetric markets under bounty-clerk certification. Mutated beasts remain categorically NON-SENTIENT (ONT-1 / M-5 preserved without exception, fourth cross-application after CF-0022, CF-0029, CF-0031); chimeric morphology is artifact-effect on already- contaminated individuals, NOT cross-species reproductive hybridization (ONT-3 preserved); distinct-origin from Maker-Age guardian constructions (CF-0029 / M-8 preserved, bidirectional firewall). Scale cap: LOCAL effects only — NO cascade, NO mass-mind-control, NO urban-scale ward-collapse, NO civilization-killing capability. M-2 firewall without exception.
scope:
  geographic: global
  temporal: current
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - ecology
  - warfare
  - economy
  - trade
  - settlement_life
  - memory_and_myth
  - magic
  - religion
  - law
  - status_signaling
  - language
  - daily_routine
prerequisites:
  - uncontained Maker-Age artifact (dangerous or catastrophic class) in a wilderness location
  - location unreached by civic, guild, or chartered-watch detection over timescales sufficient for fauna exposure
  - encounter between non-sentient beast and activated artifact field
  - survival of encounter (rare; most beasts die per CAU-1)
  - morphological effect of survival (rare-of-rare)
  - persistence in local niche (rare; most die secondarily)
  - centuries of cumulative artifact exposure for scale-tail phenomena
distribution:
  who_can_do_it: []
  who_cannot_easily_do_it:
    - chartered extraction guilds (no extraction-pathway for live-fauna effect; captured specimens handled under contamination protocol and destroyed by chartered response)
    - modern crafters (CF-0021) — no leaked-grimoire protocol induces fauna mutation; parallels M-8 guardian-construction irreproducibility
    - noble estates (habitat-cultivation for prestige-hunt tourism is CHARTER-SCANDAL parallel to retinue-against-rival-tenants-under-bandit-pretext per CF-0034)
    - sectarian movements (Maker-mystic beast-veneration diffuse only; NO organized sectarian pilgrimage to known mutated-beast territory; firewalled against CF-0028 ruin-pilgrimage parallel)
  why_not_universal:
    - geographic isolation — wilderness-distal beyond civic/guild reach; inspector dispatch DISCRETIONARY not mandatory, gated by patron-funder or estate-commission or declared civic-watch predicate; wilderness reach and escort-cost preclude routine extension
    - lethal exposure — most beasts die of artifact effect before mutation (CAU-1 cost-universality extension); most hunter-contractor pursuits into known contaminated-fauna zones end in mortality (parallels CF-0028 expedition pattern)
    - non-reproducibility by any actor — no chartered guild, no crafter, no sectarian commands a repeatable induction pathway; parallels M-8 guardian-construction irreproducibility discipline; captured-alive mutated beasts in civic context are contamination hazards destroyed by chartered response
    - selection-bias against capture and predictive knowledge — mutated beasts that stray near settlements are killed by hunter-contractor or militia; those that persist are in locations sentients do not reach; hunter-survivor zone-folklore is SELECTION-BIAS FOLKLORE, not mutated-beast-presence empirical predictor (M-10 cross-application firewall, second after CF-0034 bandit-survivor ruin-folklore firewall)
    - civic-response contamination-protocol — captured-alive mutated beasts in civic context are contamination hazards and are destroyed by chartered response; contaminated trophies handled under guild-contamination protocol; uncertified trophies carry civic-refusal status in many polities via bounty-clerk certification and caravan-master trophy-cargo refusal register
costs_and_limits:
  - Legendary-beast hunt is a named SUB-SPECIALTY within the existing CF-0024 wildlife contractor subtype; NOT a sixth CF-0024 subtype; NOT a new contractor stratum or wage class. Widow-of-the-hunt is absorbed into CF-0024 widow-of-the-job per Rule 3 specialness-inflation firewall (parallel to CF-0034 widow-of-the-raid absorption).
  - Mutated-beast response is a MINOR operational magistrate docket line parallel to CF-0034 bandit-extradition; NOT a sixth polity-asymmetric Charter-Era disagreement axis. The five-axis stress register (CF-0021 crafter-tolerance / CF-0024 mercenary-licensure / CF-0028+CF-0030 funder-primacy / CF-0031 contamination-registry / CF-0033 dragoon-adoption) remains unchanged. Trophy-legality polity-asymmetric risk flagged as potential sixth-axis latent burden, tracked per CH-0009, NOT a current structural reality.
  - Mutated-beast remains are NOT a Maker-knowledge custody channel. Hunter-trophy / natural-history register is categorically distinct from the six established custody channels (civic archive, artifact-guild, theological authority, CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0033 dragoon civic-evidence archive). M-9 firewall cross-application.
  - Hunter-contractor ≠ dragoon boundary (CF-0033) preserved; dragoon engagement with mutated-beast activity occurs only via narrow ward-breach perimeter predicate when mutated-beast kill is diagnostic of upstream uncontained contamination source; magistrate predicate-declaration required at cross-predicate pursuit into adopting-polity dragoon-active ward perimeter, paralleling CF-0034 bandit-who-also-traffics-artifacts handling (M-13 boundary defense).
  - Trophy-provenance authentication joins the canal-corridor illegitimate-service cartel infrastructure as a SIXTH revenue-stream alongside CF-0023 grimoire, CF-0028 ruin-cartography, CF-0031 registry-scrubber, CF-0033 dragoon-kit, and CF-0034 stolen-goods-provenance; compounds cartel regulatory-capture pressure to six overlapping streams on shared infrastructure (strongest pressure in the current Layer-4 register).
  - "ONT-1 / M-5 firewall (FOURTH cross-application, after CF-0022, CF-0029, CF-0031): mutated beasts remain categorically non-sentient. Artifact exposure does NOT produce sentience, speech, tool-use, or proto-folk status. No sectarian 'proto-animal-folk' or 'beast-awakening' reading is world-truth; all such readings remain heretical contested-canon only. Mutated-beast morphological or predatory alteration is not a developmental arc toward animal-folk status."
  - "ONT-3 clarification: 'chimeric' morphology in a mutated beast is ARTIFACT-EFFECT on an already-contaminated individual — fused / parallel / supernumerary features — NOT cross-species reproductive hybridization. Species reproductive boundaries are preserved. No mutated-beast lineage results from sexual interbreeding across species."
  - "CAU-1 extension: every artifact exposure still costs. The rare survival-as-mutation outcome is a variant cost form (trauma that does not kill outright but reshapes the host), NOT a free effect. The beast's survival does not exempt the environment, the local ecology, or subsequent secondary hosts from cost; individual-level windfall (a dangerous predator in its niche) is embedded in a population-level cost catastrophe (most beasts died)."
  - "M-8 distinct-origin firewall (BIDIRECTIONAL with CF-0029): mutated-beast mechanism (incidental biological effect of artifact bleed-through on untargeted fauna over time) is categorically DISTINCT from CF-0029 Maker-Age guardian-construction mechanism (intentional Maker craft with activation logic). Surface-similar (both Maker-Age-origin wilderness hazards with apparent-autonomy patterns) but NOT the same phenomenon; must not be conflated by authentication specialists, civic archivists, sectarian interpreters, bardic commentators, or authors. Authentication-specialist craft signatures for CF-0029 guardian constructions are categorically distinct from any authentication protocol for CF-0035 mutated-beast trophies; the two niches do not cross-validate. Three surface-similar Maker-origin apparent-autonomy phenomena (CF-0022 modern-crafted vessel-hosted agencies, CF-0029 guardian constructions, CF-0035 mutated non-sentient beasts) must each be held at distinct-origin status; M-6 / M-8 / new M-15 firewalls apply independently. The near-consensus distinct-origin commitment parallels the CF-0022 ↔ CF-0029 distinct-origin commitment."
  - "M-1 firewall: mutated-beast evidence — including gargantuan-underground rumor material (M-15) — yields NO Maker-civilization-identity or cause-of-fall resolution. Maker-mystic readings that mutated-beast prevalence in deep strata indicates Maker-Age-contamination-cascade as cause-of-fall are contested canon, NOT world-truth. The M-1 firewall holds under this cross-application."
  - "M-2 scale cap: ALL mutated-beast effects — including rumored gargantuan-underground scale-tail — are LOCAL. Maximum squad-wipe scale at worst, parallel to CF-0029 guardian-construction scale cap. NO cascade-capable effects. NO mass-mind-control. NO urban-scale ward-collapse. NO civilization-killing capability. The gargantuan-underground subcategory is rumor-register only (M-15); any encountered effect at scales beyond squad-wipe-local is out-of-canon and requires a new canon-addition run with explicit user approval."
  - "AES-1 hero-drift taboo: the legendary-beast-hunter figure is AES-1 tavern-veteran register (scarred, dry, season-bound, paid-in-coin, widow-of-the-hunt), NOT chosen-one heroic register. Forbidden honorifics in bardic material: 'legendary' (as epithet, not descriptor), 'ancient evil,' 'apex predator,' 'mythic quarry,' 'epic hunt,' 'greatest prey.' Forbidden vocational frames: 'monster hunter,' 'beast-slayer,' 'witcher,' 'school of,' 'brotherhood of,' 'order of,' 'initiated,' 'chosen,' 'destined,' 'called,' 'calling.' Forbidden cosmic-horror frames: 'ancient evil,' 'awakening,' 'the thing that sleeps,' 'cosmic,' 'primordial horror,' 'elder thing,' 'end-of-days,' 'destroyer of worlds.' Forbidden kaiju frames: 'civilization-ending,' 'kingdom-destroying,' 'the threat civilization must one day face,' 'world-ender.' Forbidden quest frames: 'quest-giver,' 'bounty-board-for-named-beasts-that-draws-heroes,' 'hunt of a lifetime,' 'beast-king,' 'the prize the kingdom remembers.' Forbidden heroic cadence: 'the hero pursues,' 'the hunt that makes a name,' 'the legend the realm remembers,' 'the song the children will sing.' In-register language: dry-numerical hunter-return ('two of four came back, one won't say'); corridor-named-not-hunter-named ('the six-limbed boar the Erren brothers brought back from the Selk drainage'); pensionable-cadence for survivors; widow-of-the-hunt absorbed into widow-of-the-job. Bardic mainstream withholds heroic ballad-status from beast-hunt material; listener discrimination between register layers is part of cultural literacy in affected clusters; sectarian-commissioned bards who violate the threshold are marked as propaganda (parallel to CF-0034 pro-supremacist captain-cycle breach register)."
  - "Habitat-cultivation charter-scandal: any noble-estate or civic-adjacent actor deliberately cultivating mutated-beast habitat near tenant land for prestige-hunt tourism is a CHARTER-SCANDAL analog to retinue-against-rival-tenants-under-bandit-pretext (INSTITUTIONS §Landholding CF-0034 extension). Civic-watch scrutiny expected; dowager-gossip circuits track; charter-audit exposure follows."
  - "Maker-mystic beast-veneration firewall: sectarian Maker-mystic reading of mutated beasts as Maker-residue is DIFFUSE / INDIVIDUAL reading only. No ORGANIZED sectarian pilgrimage to known mutated-beast territories parallel to the CF-0028 sectarian ruin-pilgrimage pattern; any attempt at organized pilgrimage is sectarian innovation not established tradition and would face Cross-Cluster firewall scrutiny."
  - "Ward-inspector dispatch DISCRETIONARY: mutated-beast kill reports do NOT automatically trigger CAU-3 ward-inspector dispatch to suspected upstream zones. Dispatch requires patron-funder commission, estate-commission, or declared civic-watch predicate. Wilderness-distal inspection is gated by escort and expense; inspector-cohort scope-creep is forbidden by this discretionary-dispatch framing."
  - "Species-progenitor-cult trophy taboo (partial): carnivore-folk progenitor-cults with predator-reverence traditions refuse trophy-display of cousin-lineage beasts (the wolf-folk household will not hang a wolf-that-was-not-a-wolf skull even when provenance-verified); herbivore-folk households display freely; cross-cluster intermixed households negotiate case-by-case. A minor species-embodiment respect distinction, not a civic-law category; marked by dowager-gossip circuit where tact vs lineage-blind opportunism matters."
  - "NO zone-ledger maintained in adopting polities: contaminated-fauna zone location-knowledge travels as hunter-corridor reputation informal rather than cartographer-recorded civic intelligence; no polity maintains a systematic zone-ledger (load-bearing per OPEN_QUESTIONS deferral on Wilderness-Zone Hazard-Mapping Convention); this prevents the knowledge-sensitivity profile (zone-knowledge useful to hunters AND to would-be cultivators) from stabilizing into an institutional asset."
  - "Deep-wilderness expeditionary restraint increasing: as survivor rumors of gargantuan-underground phenomena (M-15) accumulate, deep-wilderness expedition activity (CF-0028 parallel structure) faces additional restraint; no sectarian or commercial expedition-venture targets the deepest strata in current canon, and any proposal to render such a venture requires new canon-addition run under the M-15 firewall discipline."
visible_consequences:
  - "Common fears in wildland-adjacent clusters (highland, cold-north, drylands corridor-adjacent, fen deep-village): the carcass at the pasture-edge with too many limbs; the track the old trapper will not name; the bear that is not a bear, met twice by the same drover and not the same size either time."
  - Settlement-bounty wall (CF-0034 innovation) extends with a fourth posting column for verified beast-bounties — specific sightings, coin-per-carcass-part, bounty-clerk certification conditions on delivery and trophy provenance. Canal-town heartland locals watch the beast-column less than the bandit-column; the cadence is the same.
  - "Oral storytelling subgenre (fifth alongside CF-0034 four bandit-subgenres): beast-hunter return account in AES-1 tavern-veteran register — dry-numerical, corridor-named-not-hunter-named ('we walked the deep wood three days; we brought back the head; the bounty-clerk paid; one of the four stayed in the wood'). Bardic mainstream withholds heroic ballad-status from beast-hunt material; listener discrimination between register layers is cultural literacy."
  - "Livestock-pen fortification in wildland-adjacent settlements: stone walls, night-watch rotation, ward-of-the-flock heightening. Canal-bound row-cottage settlements do not fortify (corridor safety holds per CF-0034); fortification register migrates to wilderness-edge."
  - "Trophy display register: noble-estate manor halls accept verified beast-trophies as prestige-adjacent display (dowager-discrimination: verified = tolerable, unverified = charter-adjacent exposure); canal-town market-workshops accept beast-parts for inlay-craft only with bounty-clerk receipt ('the clerk's mark, then the price')."
  - "Ward-inspector upstream engine: hunter-contractor carcass-delivery to a settlement triggers informal inspector-note; dispatch to upstream zone is DISCRETIONARY and commission-gated, not mandatory."
  - "Hunter-contractor ≠ dragoon boundary: in adopting polities, hunter-contractor pursuit across active ward-perimeter requires magistrate predicate-declaration; beast-pursuit does NOT license dragoon mission creep."
  - "Sixth canal-corridor illegitimate-service product-line: trophy-provenance authentication fraud and uncertified beast-parts trafficking share infrastructure with CF-0023 grimoire / CF-0028 ruin-cartography / CF-0031 registry-scrubber / CF-0033 dragoon-kit / CF-0034 stolen-goods streams. Authentication-cartel regulatory-capture pressure now at six overlapping revenue streams on shared unchartered-broker roster."
  - "Per-cluster signatures: heartland bounty-wall column + tavern-return cadence; big-city estate trophy-display dowager-discrimination + cousin-scandal charter-risk; highland clan cleansing-rite extension for contamination-haunt returnee + named idiom ('up-ridge the beast wears the wrong coat'); drylands caravan cargo-refusal extension for unvouched trophy-cargo + corridor night-watch beast-sign sentry; fen-village relay-summoning posture for inbound beast-specialist distinct from artifact-bleed summon + ghost-story subgenre of the fen-beast seen once by the reed-cutter at dusk."
  - "Children's skip-rope rhyme in wildland-adjacent clusters (alongside CF-0021 / CF-0024 / CF-0028 / CF-0031 / CF-0033 / CF-0034 rhymes): 'one-step, two-step, don't cross the ring / three-step, four-step, the deep wood has a thing.' Charter-school offense-tier in larger wildland-adjacent towns names unvouched trophy-sale, hunting in sanctioned-haunt without civic permit, harboring unverified-provenance beast-part."
  - "Gargantuan-underground rumor register: WORLD_KERNEL §What Is Wonder extends to include rumor-only legends of gargantuan beasts deep underground; never witnessed by any returning sentient; held as bardic rumor whose truth-value is deliberately unresolved (Mystery Reserve M-15)."
