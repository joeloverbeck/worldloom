id: CF-0030
notes: |
  Direct from briefs/animalia-ruin-expeditions.md. Operates as SOC-4 stress-fracture repair — preserves the invariant's charter-monopoly claim while explicitly acknowledging the funder-primacy convention that would otherwise silently override it. Polity-asymmetric framing matches the precedent set by CF-0021 (crafter-tolerance) and CF-0024 (mercenary-licensure); three parallel asymmetries now constitute a recognizable Charter-Era regional-variation pattern. Funder-primacy is economic-legal only, NOT epistemic — CF-0027 anti-accumulation and CF-0028 partisan-canon clauses prevent patron-funder epistemic claim over Maker-Age knowledge. Adjudication record: adjudications/PA-0003-accept_with_required_updates.md.
