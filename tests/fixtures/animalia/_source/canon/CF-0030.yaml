costs_and_limits:
  - broker disposition fees reduce funder net yield
  - punitive-polity expeditions carry prosecution risk; extradition cases arise when expeditions cross polity lines
  - funder-primacy does not grant interpretive authority over Maker-Age knowledge (epistemic limit per CF-0027 / CF-0028)
  - Charter-Era anti-monopoly-of-force norms strain when patron-funder armed retinues enforce claims
  - centralization fights parallel CF-0008 existing friction — polities push to nationalize artifact custody; guilds and funders resist variously
  - sealed-inventory requirements create civic-registry tracking burden
  - novel extradition case law (funder-primacy statute mismatch across polities) accumulates in magistrate courts
distribution:
  who_can_do_it:
    - patron-funders of ruin expeditions in tolerant polities under broker channel
    - patron-funders risking civic prosecution in punitive polities
  who_cannot_easily_do_it:
    - unfunded contractors attempting private retention (no chartered-broker cover; subject to civic seizure)
    - foreign patrons in punitive polities without local broker partnership
  why_not_universal:
    - polity asymmetry (tolerant / punitive / intermediate gradations; parallels CF-0021 and CF-0024)
    - chartered-broker processing requires declared inventory and disposition fees
    - catastrophic-class finds (if any were recoverable, which they are not per CF-0027 scope boundary) would be seized in all polities
    - unchartered recovery bypassing broker channel subject to civic prosecution
