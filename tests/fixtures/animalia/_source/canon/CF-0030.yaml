statement: |
  Magical artifacts recovered from patron-funded ruin expeditions (CF-0028) almost invariably end up in the hands of the funder, as a matter of convention operating in productive tension with CF-0008 chartered-guild monopoly. The convention is POLITY-ASYMMETRIC (parallel to CF-0021 crafter-tolerance asymmetry and CF-0024 mercenary-company licensure asymmetry — three parallel asymmetries now constitute a recognizable Charter-Era regional-variation pattern): in tolerant polities, funder-primacy operates through chartered-broker purchase channel under CF-0008's existing "declared collectors and scholars" clause, with the broker acting as legal custodian between extraction and funder-possession; in punitive polities, civic seizure under CF-0008 is enforced and funder-primacy is contested or prosecuted. Sealed-inventory declaration is required in most polities even where funder-primacy is tolerated. Funder-primacy is ECONOMIC and LEGAL, NOT EPISTEMIC: the funder retains the artifact but does NOT acquire interpretive authority over Maker-Age knowledge recovered alongside it; CF-0027's anti-accumulation clause and CF-0028's partisan-canon clause both limit epistemic claims. The convention is a Charter-Era stress-fracture — preserves paper charter while generating ongoing enforcement friction — and contributes to TIMELINE Layer 4 convergent pressures.
status: hard_canon
title: Funder primacy convention over magical-artifact recovery from ruin expeditions (polity-asymmetric)
truth_scope:
  diegetic_status: objective
  world_level: true
