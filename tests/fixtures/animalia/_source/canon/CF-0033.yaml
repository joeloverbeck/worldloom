costs_and_limits:
  - dragoon corps buildout in small adopting polities produces 3-7 year ward-breach severity spike as veteran recruitment cannibalizes militia and contractor pools before institution matures (transition-cost)
  - funding-stream competition with ward-maintenance containment upkeep creates zero-sum pressure in polities drawing on the same canal-transit levy; a polity choosing dragoons may REDUCE containment upkeep and thereby RAISE breach frequency (feedback loop; see ECONOMY §Breakage Points dragoon-containment funding squeeze)
  - chartered extraction guild boundary defense is continuous; any extraction-adjacent dragoon act under perimeter cover risks converting guild consent into guild opposition (see ECONOMY §Breakage Points dragoon-guild jurisdictional-conflict cascade)
  - mission-creep countergate; adopting polities that permit dragoon mission expansion beyond ward-breach perimeter and sealed-quarter evacuation forfeit the anti-monopoly-of-force concession; charter-court challenge by principled-refuser clergy (CF-0026) is the primary procedural check (see ECONOMY §Breakage Points mission-creep adoption rollback)
  - black-market artifact brokers re-route away from dragoon-active canal corridors toward non-adopting polities, sharpening adoption-asymmetric concentration; reactive-adoption pressure on non-adopting polities is real and may trigger defensive adoption that partially defeats Stabilizer-1 (logged as OPEN_QUESTIONS)
  - charter-backed dragoon pension creates preferred-marriage tier among hazard-labor families, drawing marriageable veterans from contractor, fallout-specialist, and mercenary pools; parallel assortative-sorting pattern to CF-0032 placement-right and CF-0031 registered-lineage intermarriage dynamics
  - inter-polity extradition docket grows around cross-border dragoon pursuit of artifact traffickers; dragoons have NO chartered authority outside their home polity, and pursuing beyond charter line is legally fraught
  - impersonation-of-dragoon is a named civic offense; black market in retired-dragoon kit (uniform, crest, escutcheon) operates as a fourth product-line on the CF-0023 grimoire / CF-0028 ruin-cartography / CF-0031 registry-scrubber illegitimate-service canal-corridor infrastructure, sharpening authentication-cartel formation pressure already flagged under CF-0028 and CF-0031
  - dragoon civic-evidence archives of confiscated broker-material DO NOT constitute a Maker-knowledge custody channel (M-9 firewall per this CF); disposition of confiscated material follows chartered-guild handoff protocols, not civic retention
  - battlefield-artifact taboo (CF-0008) preserved — dragoons do NOT deploy artifacts; the taboo is structurally reinforced by mission-scope commitment
  - inter-polity labor-market effect; adopting polities export cannibalization pressure to non-adopting polities as veterans emigrate to enlist in dragoon service, thinning non-adopting polities' contractor pools and raising non-adopting ward-breach severity indirectly
distribution:
  who_can_do_it:
    - larger heartland canal-choke-point polities with all four adoption-gates satisfied
    - adopting polities can stand up dragoon corps under ward-breach-declaration predicate
  who_cannot_easily_do_it:
    - smaller heartland polities without funding-stream access (Stabilizer-3 gated)
    - polities with strong progenitor-cult sectarian presence blocking adoption on principle (Stabilizer-4)
    - polities with principled-refuser clergy (CF-0026) influence sufficient to block or rescind charter (Stabilizer-4)
    - polities without chartered extraction guild consent or override (Stabilizer-2)
    - highland clans — no civic-registry infrastructure; clan-custom welfare handles ward-breach response
    - fenland stilt-villages — no civic infrastructure; demographic fragility precludes standing force
    - drylands caravan polities — too decentralized for standing civic force; caravan-rotation social form incompatible
    - mountain-east valley polities — seasonal isolation; sparse civic infrastructure; pass-closure renders standing force unsustainable
  why_not_universal:
    - Charter-Era anti-monopoly-of-force political cost gates founding to polities with acute Incident Wave exposure AND strong central-council authority; the political cost is load-bearing for adoption but NOT for mission-creep drift (scope-creep countergate required)
    - chartered-guild consent/override is fragile stabilizer — the first dragoon unit performing an extraction-adjacent act under perimeter cover converts guild consent into guild opposition; the perimeter/extraction boundary is load-bearing
    - dedicated funding stream (canal-transit levy or ward-economy draw) is a Stabilizer-3 adoption-gate but funding-stream specificity (additive vs displacing from containment upkeep) is deferred to OPEN_QUESTIONS
    - principled-refuser clergy (CF-0026) and progenitor-cult sectarian refusal-on-principle caps adoption-diversity; refusers lead charter-court challenges against mission creep in adopting polities
