statement: |
  Some larger heartland polities have, in the past decade, chartered a civic perimeter force — colloquially called "quarantine dragoons" or "canal- corridor dragoons" — for rapid ward-breach perimeter enforcement and sealed-quarter evacuation support. Dragoons are drilled, armed, uniformed, pensioned chartered-civic personnel drawn from ward-resident rolls and paid from civic treasury; they are NOT contractors (CF-0024), NOT mercenary-company members (CF-0024), NOT chartered extraction guild personnel (CF-0008), and NOT noble private retinue (CF-0024). Dragoon operations are predicated on ward-breach declaration and magistrate chain-of-command; they enforce perimeter and evacuate families, and they do NOT extract artifacts, inscribe or speak ward specifics (CAU-3/CF-0007 preserved), contain or neutralize artifacts (SOC-4/CF-0008 preserved), perform routine civic policing, or deploy in external inter-polity conflict. Adoption is contested Charter-Era anti-monopoly-of-force concession: some polities adopt, some refuse on principle (civic-charter, sectarian, or clergy grounds), some lack infrastructure. Inter-polity adoption asymmetry produces novel extradition disputes when a dragoon unit pursues black-market artifact traffic across a charter line, joining CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028 /CF-0030 funder-primacy, and CF-0031 contamination-registry as a fifth polity-asymmetric disagreement axis in the Charter-Era stress register.
