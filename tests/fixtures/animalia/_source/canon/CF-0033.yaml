visible_consequences:
  - named dragoon units uniformed and quartered in adopting polities; muster rolls visible at civic-registry archives
  - drill-day rota posted at civic barrack gates; three-note turnout-call whistle recognizable by children in adopting canal-towns
  - ward-breach response time drops sharply in adopting polities; sealed-quarter evacuation becomes faster and more coercive than the prior watch-plus-guild ad hoc arrangement
  - chartered extraction guilds renegotiate jurisdictional boundary with civic authority on a per-polity basis; perimeter/extraction boundary answer differs per polity
  - bardic circuit picks up dragoon subject matter within a season of adoption; three-layer stratification emerges (patron-commissioned ward-saved-the-quarter ballads inflated at institution-level NOT individual-level; tavern-veteran dragoon accounts in AES-1 scarred register; charter-court opposition broadsides in litigious-procedural register)
  - principled-refuser clergy (CF-0026) mount visible charter-court challenges against dragoon mission creep; some progenitor-cult lineages denounce adoption; common-pantheon clergy bifurcate between charter-court-challenge-with-protection reformers and civic-militarization-abolitionists per CF-0031 bifurcation template
  - retired dragoons form a new veteran-subtype distinct from mercenary veteran (CF-0024), occult-fallout specialist (CF-0025), ruin-expedition veteran (CF-0028), and extractor veteran; carries charter-backed pension and civic-advisory role eligibility
  - inter-polity extradition docket grows around cross-border dragoon pursuit; magistrate courts build precedent slowly alongside CF-0021, CF-0024, CF-0028/CF-0030, and CF-0031 precedent (five-axis stress register now recognized)
  - impersonation-of-dragoon civic offense appears in charter-school offense-tier lists in adopting polities; black market in retired-dragoon kit joins canal-corridor illegitimate-service infrastructure as fourth product-line
  - ruin-adjacent polity three-force convergence vector; dragoon perimeter response, CF-0028 ruin-levy mobilization, and expedition-band skirmish can co-deploy at the same ruin-mouth; three forces remain structurally distinct and magistrates build jurisdictional-primacy precedent with visible anxiety
  - in non-adopting polities, residents experience comparative insecurity and develop named idioms (*"we still run the old-walk"* in heartland; *"took the coin-for-service"* in drylands; *"walks the southern cordon"* / *"does not walk the southern cordon"* in highland); political pressure to adopt rises but anti-monopoly-of-force holdouts continue to refuse
  - dragoon widow with charter-backed pension stratum contrasts visibly with contractor-widow (CF-0024), fallout-specialist widow (CF-0025), and expedition-widow (CF-0028) strata without charter pension; pension-differential feeds reform-current clergy (CF-0026) campaigns paralleling CF-0031 reform dynamics
  - estate-steward ledger in adopting polities gains dragoon-charter magistrate liaison burden; dowager-gossip distinguishes "estates seated on dragoon-funding council" from "estates that have never had a dragoon posting cross their tenant line"
