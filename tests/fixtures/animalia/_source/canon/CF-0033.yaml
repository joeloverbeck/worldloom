notes: |
  Direct from worlds/animalia/proposals/PR-0003-canal-corridor-quarantine- dragoons.md (BATCH-0001). Load-bearing mission-scope normative commitment (dragoons do NOT extract, inscribe, contain, neutralize, police routinely, or deploy in external conflict) is the primary stabilizer; the perimeter/extraction jurisdictional boundary is inscribed in the statement itself as normative. Thirteen categories of Phase 9 repair applied at adjudication: (1) perimeter/extraction boundary promoted to normative CF clause; (2) Charter-Era tether clauses added (ward-breach declaration predicate; civic-treasury pay; ward-resident recruitment; no hire-out; magistrate chain-of-command per Politics/Institution critic); (3) mission- scope negative enumeration; (4) Mystery Reserve firewall extensions on M-6, M-7, M-8, M-9, M-11 plus new M-13 (institutional contingency of dragoon form) added to MYSTERY_RESERVE.md; (5) tonal discipline clauses (see below); (6) scope-creep countergate; (7) funding-stream deferral acknowledgement; (8) labor-market cannibalization modeling; (9) per- cluster EVERYDAY_LIFE patches for all five clusters with silent-absence in (c)(d)(e); (10) boundary reaffirmations via modification_history entries on CF-0008, CF-0020, CF-0024, CF-0026, CF-0028; (11) religious response CF-0031 bifurcation template; (12) three new ECONOMY Breakage Points; (13) kit-counterfeit black market fourth product-line commitment.
  AES-1 / AES-3 register-binding: Dragoons are paid laborers with a hazardous civic commission; they are "feared, respected, and quietly avoided in the same register that extractors are." Dragoon-veteran accounts follow CF-0024 / CF-0028 extractor-veteran register — dry, scarred, numerical, pensionable-service cadence. Ward-holding and seal- failure are narrated with the INSTITUTION as grammatical subject. Named-officer heroism is out-of-register. Rank is job-title, not honorific. Turnout is work-kit, not ceremonial uniform.
  In-register language (for writing in this setting): "ward-breach, perimeter, seal-line, sealed-quarter, evacuation-order, cordon, muster, turnout, drill-day, rota, shift-pay, hazard-stipend, pensionable-service, dragoon (lowercase, job-title register), quarter-roster, canal-post, posting, inspection, warrant, charter-concession, containment, decontamination detail, body-detail, salvage-escort, press-back, hold the line (procedural not heroic), the seal held / the seal failed, broke ward, drill-worn, turnout-boots, canal-mud, winter-rota, fever- month, plainclothes inspector, civic-watch auxiliary, pulled a family, walked the perimeter, took the posting, retired on the pension, took a breach and came home wrong."
  Out-of-register language to AVOID: - Military-romance: "regiment, the regiment, regimental pride, colors,
    standard, proud tradition, elite unit, finest, sharp end, tip of the
    spear, crack troops, the few, brothers/sisters-in-arms (heroic sense),
    band of, esprit de corps, gallant, dashing, the lieutenant rode,
    cavalry charge (even metaphorically), sabres out."
  - Heroic-sacrifice: "last stand, held to the last, fell defending,
    noble sacrifice, brave defense, to the man, valor, bravery (as
    epithet), heroism, fallen (as honorific), gave their lives."
  - Chosen-force: "the chosen, the called, sworn, oath-bound (mystical
    sense), standard-bearer, torch-bearer, vanguard, guardian (of anything
    abstract), shield of the city, bulwark."
  - Paramilitary-glamour: "steel-eyed, grim-faced, hardened, battle-scarred
    (as decoration), the uniform (with definite article reverence), wore
    it well, honor of, disciplined ranks (admiringly), the line
    (mythologized)."
  - Counter-register heroic-by-inversion (pulp-revolutionary): "jackbooted,
    thuggish, brutes in uniform, the boot, the fascist boot, state
    violence (sloganized), stormtroopers, the dragoons came for us
    (pulp register)." This register still myth-sizes dragoons and is
    out-of-register even when used against them.

  Bardic stratification (three layers): (a) patron-commissioned ward- saved-the-quarter ballads (institution-competence inflated, NOT individual gallantry; never a named lieutenant's charge, always "the perimeter held"); (b) tavern-veteran dragoon accounts (dry, numerical, pensionable-service cadence, mocking of ballad-register — "we pulled sixty out of that tenement; the registry says forty-three"); (c) anti-dragoon charter-court opposition broadsides (procedural grievance, cited precedent, named concessions breached — litigious register, NOT revolutionary pulp).
  Mission-creep register is BUREAUCRATIC DRIFT, not fascist slide: rota extended, warrant reinterpreted, charter-concession footnote cited then stretched, council subcommittee quietly widening remit between minutes. Dragoons are "posted, rotated, reassigned" — they never "march on" anything. Charter-court is the load-bearing counterweight; every creep clause cites the concession it tests.
  Five CFs qualified by modification_history entry under CH-0007: - CF-0008 (scope narrowing: perimeter enforcement split from chartered
    extraction monopoly in dragoon-adopting polities; extraction-guild
    monopoly on extraction preserved);
  - CF-0020 (qualification: dragoon subtype is chartered-civic, NOT
    hireable-veteran capability; CF-0020 scope preserved);
  - CF-0024 (qualification: perimeter enforcement exits the contractor-
    auxiliary niche in dragoon-adopting polities; stratum scope otherwise
    preserved; inter-polity labor-market cannibalization pattern extended);
  - CF-0026 (extension: named standing role in charter-court challenges
    against dragoon mission creep);
  - CF-0028 (clarification: dragoon perimeter response and ruin-levy
    mobilization are structurally distinct; both may co-deploy at ruin-
    mouths without merger).

  Religious response follows CF-0031 bifurcation template: reform-current common-pantheon clergy split between charter-court-challenge-with- protection (accept dragoons with sunset and strict perimeter scope) and abolitionist-civic-militarization-refusal. Progenitor-cult sectarians denounce adoption on species-lineage-occlusion grounds; aspectualizing clergy in common pantheon treat dragoons as civic- hazard-commission labor without doctrinal implication.
  Mystery Reserve firewall extensions added to M-6 (confiscation custody protocol), M-7 (retired-dragoon reputation-genealogy), M-8 (dragoon perimeter-lore is tactical not mechanistic), M-9 (dragoon civic- evidence archives do not constitute Maker-knowledge custody channel), M-11 (dragoon pensioner-health records are occupational-epidemiological not heritability-evidentiary). New M-13 entry (institutional contingency of dragoon form) added per Rule 7 obligation.
  Latent burdens logged: (LB-1) future dragoon-confiscation-procedure CFs must specify custody-disposition without triggering M-6; (LB-2) future dragoon-welfare CFs must not produce three-generation health datasets paralleling CF-0031 scrivener's convention; (LB-3) future famous-dragoon-commander CFs must constrain reputation to civic- tactical domain not ward-breach ontology; (LB-4) future extradition- resolution CFs must not retroactively adjudicate whether the four adoption-stabilizers are causally necessary (M-13 preservation). Plus four additional monitored exposures: funding-stream specificity deferral; transition-cost 3-7 year ward-breach severity spike; reactive- adoption pressure under smuggler escalation; mission-creep countergate fragility dependent on charter-court precedent robustness.
  Six critic sub-agents dispatched at escalation gate (approximately 10 of 13 FOUNDATIONS domains touched): Continuity Archivist, Systems/ Economy, Politics/Institution, Everyday-Life, Theme/Tone, Mystery Curator. No critic dissented from accept recommendation; five of six required repair before accept, all repairs applied in Phase 9.
  Adjudication record: adjudications/PA-0006-accept_with_required_updates.md. Modified 2026-04-19 by CH-0008 (CF-0034): negative-scope clause added to mission-scope commitment — dragoons do NOT pursue bandits qua-banditry (CF-0034 suppression is CF-0024 contractor-stratum civic function, NOT a dragoon chartered function). Dragoon engagement with bandit groups is permitted ONLY via the narrow ward-breach perimeter predicate (when a bandit group triggers or occupies a ward-breach zone) or via the black-market artifact-traffic predicate (when a bandit group is also trafficking artifacts), and magistrate predicate- declaration is REQUIRED at cross-predicate pursuit — a dragoon unit pursuing a bandit-group-qua-artifact-traffickers must file magistrate notice that the pursuit operates under the artifact-trafficking predicate, not the banditry predicate. This commitment is the load- bearing countergate against bandit-pursuit becoming a creep-vector for dragoon scope expansion; M-13 institutional-contingency firewall depends on its disposition. CF-0034 explicitly names settlement-hired hunter-contractors as the civic bandit-response institution. The negative-scope clause joins the existing mission-scope commitments (no extraction, no ward-specifics inscription/speech, no containment, no neutralization, no routine policing, no external-conflict deployment); it is categorically distinct because bandit-pursuit is a creep-vector RECOGNIZED AT THIS CANON STEP rather than originally- committed. Adjudication record: adjudications/PA-0007-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0018 (CF-0046): qualification — CF-0033 drylands-non-adoption posture (GEOGRAPHY §Regional Asymmetry on Dragoon-Adoption drylands-south caravan towns do NOT adopt; caravan-rotation social form structurally incompatible with ward-resident dragoon recruitment; "took the coin-for-service" idiom) now sits alongside CF-0046 drylands runner-reached village militia informal emergency-response folk-practice. The runner-militia is CATEGORICALLY DISTINCT from dragoon-corps and from dragoon-precursor — it is informal civilian self-defense convention (village-designated runner with good-leg reputation rotating across able villagers; NOT chartered militiaman; NOT civic-chartered perimeter force; NOT recruited from ward-resident rolls; NOT treasury-paid; NOT magistrate-appointed; NOT operating under ward-breach-declaration predicate; NOT coordinated with chartered extraction-guild consent). Runner-militia emergency-response mobilizes village-consensus volunteers under village-council direction for the duration of a specific bandit-sighting incident and then disbands; pursuit beyond village jurisdiction defaults to CF-0034 hunter-contractor commission. No dragoon-adoption under CF-0046 drylands corridor institutional-thinness — the runner-militia does NOT create a CF-0033 drylands-adopting posture; CF-0033 five-axis polity-asymmetric structural-disagreement pattern is unchanged; drylands remain NOT ADOPTING on dragoon-corps axis. CF-0033 scope, distribution, and stabilizer structure unchanged. Adjudication record: adjudications/PA-0017-accept_with_required_updates.md.
