  - Ash-Seal building-existence known in Brinewick civic-core but facility-locations are trade-secret; 10th skip-rope rhyme slot (*"one-box, two-box, don't lift the lid / three-box, four-box, Ash-Seal knows what the old world hid"*) per CF-0040 CH-0014 10-entry annotation; trade-secret-facility-breach as civic taboo (WORLD_KERNEL What Is Taboo CH-0015 extension)
  - Brinewick-specific dowager-gossip idioms extend existing seven axes with EIGHTH — *"the Mellivers called Ash-Seal at dusk — quiet disposition or late-log scandal?"* (display-inventory-routing register; interacts with CF-0042 display-registration seventh axis per CF-0038 × CF-0042 CH-0014 convergence)
  - biannual charter-audit cycle (CF-0038) covers Ash-Seal as ELEVENTH reform-current-clergy audit-pressure target; charter-audit scandal as Brinewick magistrate-docket slow-rolling genre
