id: CF-0043
title: Ash-Seal, Brinewick commercial containment company — civic-chartered non-guild anomaly with monopoly on containment / research / disposal in the city and carriage-distance heartland
status: hard_canon
type: institution
statement: |
  Ash-Seal is a civic-chartered non-guild commercial company in Brinewick (CF-0038) holding effective monopoly over magical-artifact containment, research, and sealed-inert disposal within the city and its carriage-distance heartland radius. The company operates under a Brinewick-specific civic charter granted in the Charter-Era / Incident-Wave-era consolidation period (specific grant-year and charter terms deferred to OPEN_QUESTIONS) in response to an early-Charter-Era local competence precedent, concordat- arranged with the chartered-extraction-guild: Ash-Seal absorbs the containment / research / disposal functions while extraction, ward- inscription, ward-inspection, and chartered-brokerage remain SOC-4 chartered-guild-licensed. "Retrieval is client responsibility" — extraction and transport-in are performed by chartered extractors, CF-0024 contractor- auxiliaries, CF-0033 dragoons (ward-breach perimeter only; CF-0033 firewall), dredger crews, canal-wardens, or estate-retained muscle; Ash-Seal receives incoming artifacts at the civic-quarter intake bench. Technicians self- identify as such (idiom "Here's the Ash-Seal technician"); the company cultivates corporate mystique and trade-jargon ("Standard Class-C containment with moderate environmental spread") as commercial information-asymmetry rent-extraction strategy — fed-up-technician admission ("It's a procedure. There's a checklist. Quality control, not a seance") is the in-world revealer of the marketing-as-performance register. Facility locations are civic-legally protected trade secrets; theft attempts are repelled by commercial property-protection guards bounded to facility perimeter (beyond- perimeter deployment triggers CF-0024 civic-watch friction; NOT a new private-army subtype per Rule 3). Disillusioned technicians defect and become INDIVIDUAL leading containment specialists worldwide (absorbed into existing M-7 containment-wright / occult-fallout sub-specialty holding clause per Rule 3), carrying Brinewick-trained portable reputation fee-for- service into chartered-extraction-guild labor markets outside Brinewick; the company itself does NOT expand outside Brinewick (civic-charter is Brinewick-specific and non-transferable; SOC-4 chartered-guild-monopoly prohibits unchartered company operations in other polities). "Ash-Seal deliberately maintains an air of ritual and mystique" — including the unevidenced company-existence-for-hundreds-of-years claim — which is CORPORATE MYTHMAKING in-world-contested-register (paralleling M-19 canal- age contested register); world-level institutional age is post-Charter-Era- consolidation (Incident-Wave-era most likely; specific grant-year deferred). Ash-Seal's "patented method to destroy wooden artifacts 100% of the time" is CORPORATE MARKETING CLAIM (diegetic, contested, NOT world-truth); actual practice is CF-0039-compliant specialized render-inert / seal-and-contain warded containment for wooden-substrate artifacts, functionally inert-in- storage but not destroyed (contributes to Brinewick's monotonic-accretion ward-reserve liability per CF-0038 × CF-0039 CH-0014 extension). The company handles moderate-tier and mundane-tier intake at company facility; catastrophic-tier finds flow through Ash-Seal to civic sealed-quarter (Ash-Seal-billed per-artifact to civic-treasury), NOT into Ash-Seal's own permanent inventory at scale.
