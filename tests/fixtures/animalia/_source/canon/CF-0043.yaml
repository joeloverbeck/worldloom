prerequisites:
  - Brinewick civic authority (CF-0038) with charter-grant capacity and civic-advisory council
  - chartered-extraction-guild concurrence for concordat (Brinewick-specific; guild retains extraction / ward-inscription / ward-inspection / chartered-brokerage per SOC-4)
  - historical competence-precedent (specific grant-event deferred to OPEN_QUESTIONS §Ash-Seal Civic-Charter Terms)
  - Brinewick's artifact-throughput volume exceeding chartered-guild capacity at grant-time (CF-0038 exemplar Layer-4 stress-register density; Incident-Wave-era consolidation period)
  - SOC-3 coin-contract sacredness governing civic-commercial payment
  - civic-legal infrastructure supporting trade-secret facility-location protection
  - CF-0006 ceramic containment technology + CF-0007 ward system + CF-0041 sealed-inert protocol as operational craft-base
distribution:
  who_can_do_it:
    - Ash-Seal commercial employees in Brinewick under civic-charter (technicians, ward-apprentices, in-house scriveners, company guards)
    - concordat handoffs — chartered extractors deliver to Ash-Seal intake bench; canal-wardens route dredge-finds; dragoons route post-perimeter material; CF-0024 contractor-auxiliaries handle transport-in; estate-retained muscle delivers private cellar-finds
    - Brinewick civic-advisory council approves biannual charter-audit cycle review (CF-0038 convention); magistrate courts hear Ash-Seal-guild jurisdictional disputes and trade-secret-facility-location litigation
    - wealthy backchannel purchasers in Brinewick (estate-dowagers, civic-council members acting in private capacity) buy safe-class / moderate-tier artifacts discreetly (economic backchannel only; catastrophic-tier NEVER flows through this channel)
  who_cannot_easily_do_it:
    - chartered-extraction-guild elsewhere (other polities maintain full-power SOC-4 chartered-guild-monopoly over containment / neutralization; Ash-Seal's non-guild civic-chartered form is Brinewick-specific and non-replicable in single-generation timescales)
    - defectors attempting to establish competing companies outside Brinewick (civic-charter is non-transferable; unchartered company operations criminalized under CF-0008 SOC-4 enforcement elsewhere; defectors operate as INDIVIDUAL fee-for-service consultants absorbed into existing chartered-extraction-guild labor pool)
    - unchartered Brinewick parties attempting containment/research/disposal without Ash-Seal commission (civic-magistrate prosecution under Brinewick statute; chartered-guild opposition)
    - highland clans, fen-villages, drylands-caravan contexts, mountain-east (institutional absence structurally preserved — Ash-Seal is Brinewick-local)
  why_not_universal:
    - Brinewick civic-charter is NON-TRANSFERABLE; civic-charter-grant requires century-plus precedent-lock with chartered-extraction-guild concurrence (political cost prohibitive for other polities)
    - four-stabilizer CF-0038 compound (canal-geometry singularity + path-dependence of Charter-Era commercial capital + migration-gravity flywheel + chartered-broker bench density) underwrites Brinewick's artifact-throughput volume exceeding chartered-guild capacity; other polities do not reach that threshold — chartered-guild capacity is sufficient
    - SOC-4 chartered-guild-monopoly holds EVERYWHERE ELSE; Ash-Seal's non-guild civic-charter form is Brinewick-specific structural anomaly, NOT replicable template
    - defector-diffusion is INDIVIDUAL-consultant-only (fee-for-service absorbed into M-7 sub-specialty holding clause); no institutional replication
costs_and_limits:
  - Ash-Seal monopoly pricing (upper-silver tier for technician-engagement; sealed-inert containment billed per-artifact to civic-treasury for chartered-party intake and to private-client rate for estate backchannel) extracts information-asymmetry rent via Class-C-containment trade-jargon classification vocabulary the civic cannot independently evaluate
  - Ash-Seal-trained defector-specialists compress chartered-containment-wright wages heartland-wide (Brinewick-trained upper-silver fee-for-service rate as ceiling on non-Brinewick chartered wages)
  - civic-treasury payment to Ash-Seal entrenches regulatory-capture; biannual charter-audit cycle (CF-0038) nominally covers Ash-Seal but company-resistance is reliable and reform-current clergy (CF-0026) charter-audit pressure is standing (eleventh charter-audit target)
  - backchannel-purchase leakage of moderate-tier and safe-class artifacts to wealthy Brinewick parties is COMMERCIAL CORRUPTION (magistrate-docket corruption-prosecution category); does NOT constitute civic-watch corruption (CF-0038 C6 firewall preserved — ward-inspector integrity under SOC-4/CAU-3 is UNAFFECTED; backchannel targets Ash-Seal commercial personnel and canal-wardens per CF-0038 existing pattern, NOT ward-inspectors); named slow-rolling exposure pattern in ECONOMY §Breakage Points — "Ash-Seal-backchannel-cascade" as compound-Breakage vector
  - monopoly-rupture cascade exposure (ECONOMY §Breakage Points) — massed defector-exit or charter-revocation creates multi-year containment-capacity gap in Brinewick; chartered-extraction-guild capacity recovery requires generational relearning of containment-wright roster
  - technicians carry AES-3 contamination signature over long careers (scrapers' shake, wasting, long cough, ward-rot); CF-0031 ledger-mark eligibility in Brinewick-adopting polity applies to Ash-Seal long-career technicians under containment-wright-specialist clause
  - trade-secret research archive is civic-legally protected against civic-registry subpoena except under charter-audit predicate; ELEVENTH civic-archive category (commercial-trade-secret custody) categorically distinct from civic-registry's ten existing streams; M-1/M-9 firewall holds (research is empirical-containment-craft only, NOT Maker-cognitive content, NOT civilization-identity findings, NOT cause-of-fall evidence)
  - assassination-risk on Ash-Seal senior technicians and company officers at CF-0042 broker-bench-adjacent tier (artifact-handling figure with public visibility; FOURTH concurrent CF-0042 assassination-exposure category alongside broker, guild-stamper, extraction-contractor)
  - ward-reserve allocation bifurcation — Ash-Seal handles moderate-tier containment at company facility; catastrophic-tier flows to civic sealed-quarter (Ash-Seal billed per-artifact for routing); Brinewick civic-treasury pays Ash-Seal AND funds sealed-quarter (compound exposure per CF-0038 (b) Breakage Points worsened)
  - civic-magistrate jurisdiction over Ash-Seal-guild concordat disputes evolves incrementally; trade-secret facility-location litigation (theft-attempt prosecution under sedition-libel-adjacent or specific Brinewick statute) generates distinct case-law
  - chartered-extraction-guild containment-wright faction at Brinewick is BIFURCATED — master-level defection into Ash-Seal is historical pattern; in-guild remainder is resentful and reform-current-aligned; containment-wright faction elsewhere (other heartland polities) is full-power and holds standard CH-0002/0004/0014 schism positions
  - reform-current clergy (CF-0026 CH-0010 charter-defense wing) standing charter-audit pressure on Ash-Seal corporate-mystique as opaque-to-civic-custody; eleventh charter-audit target alongside CF-0031 welfare-access, CF-0033 mission-creep, CF-0038 biannual-cycle
