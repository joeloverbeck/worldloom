  AES-1 / AES-2 / AES-3 register-binding: interspecies-friction ordinary- register leads with tavern-joke-threshold and crew-composition-catechism texture; cannibal and silenced-witness material appears ONLY in aftermath-household-vocabulary cadence per CF-0034 precedent; bardic- mainstream refuses heroic-investigator register on silenced-witness material (the witness is the dredger who keeps singing at the tavern, not the protagonist who exposes the watch). The silenced contractor keeps the coin and kept his mouth, and drinks alone in the winter-rota.
  In-register language (for writing in this setting): "species-composition (of a crew), crew-balance, mix-sound, scent-aversion (predator/prey biological), slimy matters (moisture-habitat joke about water work), slow-on-the-road (tortoise-folk literal metabolic), ermine's ledger / beaver's canal (labor-distancing register), single-stock village, single-stock hold, one-fur town, one-fur caravan, one-fur talk, won't seat (a recruiter), the recruiter was run off the porch, the case was re-classified, the roster was redacted, the inspector was reassigned, the magistrate docketed and filed, the clergy refused the blessing, cleansing-rite refusal, the remains were buried and not spoken of, the hunter-contractor delivered the heads and did not say from whose camp, silenced contractor, kept the coin and kept his mouth, took the pension and drank alone, bitterness in the veteran cadence, doctrinal pamphlet (contested speech carried by specific speakers, never ambient), the sectarian preacher at the tavern edge, ran out by closing time, eater-band (flat named fringe of CF-0034), the grave-violation-of- person docket, sealed-docket procedure, magistrate-warrant-gated, the camp ledger had kin-lists, his name came back in a bounty-posting."
