distribution:
  who_can_do_it:
    - any sentient household, cohort, or individual can express ordinary-register friction
    - sectarian movements of any species can recruit for supremacist doctrine (CONTESTED BELIEF, NEVER world-truth)
    - demographically isolated single-species settlements can maintain exclusionary immigration refusal
    - CF-0034 outlaw bands can contain a cannibal-fringe sub-subset (rare, corridor-local)
    - civic magistrate-court and civic-watch institutions can apply sealed-docket scandal-containment procedure for cannibal-case prosecution
  who_cannot_easily_do_it:
    - chartered polities cannot adopt supremacist doctrine as civic policy (Charter-Era anti-hierarchy firewall load-bearing)
    - cannibal-fringe subset cannot scale beyond CF-0034 band-size-and-duration limits (logistical, adjacent-outrage, bounty-premium, internal-collapse)
    - exclusionary single-species settlements cannot sustain Charter-Era economy (labor-starvation decline)
    - dragoons cannot perform cannibal-case investigation or civic-suppression enforcement (CF-0033 CH-0010 mission-scope firewall; magistrate/civic-watch reserved)
  why_not_universal:
    - SOC-1 Charter-Era firewall (civic charters explicitly suppress species-hierarchy-speech)
    - mainstream common-pantheon clergy aspectualizing position refutes supremacist doctrine under judgment-god framing
    - mainstream progenitor-cult aspectualizing wing refutes supremacist doctrine under civic-covenant-witness framing
    - adjacent-outrage across non-cannibal bandit bands (shelter/water/supply refusal to cannibal-fringe bands plus bounty-wall differential pricing) — WEAK within same-sect enclaves; mainstream-wide otherwise
    - triple bounty-premium for cannibal-fringe band neutralization (settlement, merchant-coalition, chartered-estate, and chartered-guild treasury coalition-funded) plus chartered bounty-clerk authentication discipline (parallel to CF-0035 trophy-provenance) prevents false-cannibal scam market capture
    - universal cleansing-rite refusal for cannibal-band returnees across clan custom AND common-pantheon clergy AND progenitor-cult mainstream (categorically heavier than CF-0034 raid-and-enslave refusal, which was previously the heaviest precedent)
    - mainstream bardic moral-witness-refusal threshold extends CF-0017/CF-0034 template to cannibal-band material and supremacist-recruitment speech; sectarian-commissioned bards who breach are marked by listeners
    - civic silence-protocol specification: euphemistic classification under existing "grave-violation-of-person" magistrate-docket category, SEALED sub-register with magistrate-warrant-gated access; PROSECUTION continues (silence is scandal-containment, NOT prosecutorial refusal — otherwise implicit recognition of "not-quite-persons" reading breaches Charter-Era settlement)
    - exclusionary single-species settlement economic self-limit: single-species enclaves cannot sustain Charter-Era multispecies economy at scale; trade with outside compromises exclusivity; generational labor-starvation decline
    - estate-steward ledger scrutiny and dowager-gossip reputation register mark households whose tavern-talk or tenant-sorting crosses the joke-threshold or civic-charter lines
costs_and_limits:
  - SOC-1 preservation is LOAD-BEARING AND CONTINUOUS — individual/sectarian friction and exclusionary settlements MUST NOT harden into civic hierarchy; charter-court challenge by principled-refuser clergy (CF-0026 CH-0010 charter-defense wing) is the primary procedural check against drift
  - silenced-adventurer-contractor stratum is ABSORBED INTO the existing CF-0024 failed-reputation-contractor feeder category (Rule 3 specialness-inflation firewall) — NOT a new stratum; the bitterness-register is a qualitative reputation-damage mechanism, not a new welfare/precarity stratum; bardic-circuit silenced-contractor ballad subgenre is moral-witness register, NOT protagonist-investigator register
  - interspecies-cannibal fringe sub-subset is geographically LOCAL to CF-0034 corridor-bounded subset (wildland drylands, bog causeway, mountain chokepoint, highland cold-pass, heartland wildland-road) — NOT continent-wide and NOT a civic presence in chartered cities (Rule 4 scope stabilizer, parallel to CF-0034 raid-and-enslave subset)
  - exclusionary single-species settlement subset is geographically LOCAL to isolated / weak-charter / demographically-fragile regions and to specific clan custom-enclaves — NOT a Charter-Era polity category; exclusionary settlements have no civic-registry polity-status recognition (OPEN_QUESTIONS watch-item)
  - supremacist sectarian doctrine is CONTESTED-CANON sectarian belief held by a fringe, NEVER world-truth; in-world supremacist "mere beasts" register applied to sentient victims is a PATHOLOGICAL CATEGORY ERROR, NOT a revision of the sentience boundary — the category error IS the crime; M-5 firewall FIFTH cross-application load-bearing (after CF-0022, CF-0029, CF-0031, CF-0035)
  - civic silence-protocol for cannibal-case scandal-containment MUST be held categorically distinct from PEOPLES Cross-Cluster hierarchy-speech civic suppression — the first is criminal-scandal containment, the second is charter-firewall speech discipline; the two suppressions coexist; neither subsumes the other
  - dragoons (CF-0033) have NO chartered role in cannibal-case investigation, evidence custody, silence-protocol enforcement, or criminal adjudication — civic-magistrate and civic-watch handle per existing charter; any dragoon acquisition of cannibal-case role is mission-creep breach and triggers charter-court challenge per CF-0033 load-bearing perimeter/extraction firewall (extended in CH-0010 to perimeter/criminal-adjudication firewall)
  - false-cannibal-bounty certification scam market appears as a SEVENTH product-line on the canal-corridor illegitimate-service rail (joining CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0031 registry-scrubber, CF-0033 dragoon-kit counterfeit, CF-0034 stolen-goods-fencing, CF-0035 trophy-forgery); authentication-cartel formation pressure compounds to its strongest posture in the Layer-4 stress register
  - crew-composition everyday-register friction generates ORDINARY workplace texture (hire-catechism, tavern joke-threshold, mix-sound crew judgment on par with waiting-wolves judgment) but MUST NOT become species-gated guild apprenticeship intake (SOC-1 firewall); charter-seal continues to forbid species-exclusion at guild charter level
  - hunter-contractor bandit-hunting sub-specialty (CF-0034 fifth CF-0024 subtype) and hunter-contractor cannibal-band neutralization sub-sub-specialty are NOT supremacist-vigilante formations; no polity licenses supremacist-mobilization hunter-contractor companies — the hunter-contractor-vs-supremacist-vigilante boundary parallels the hunter-contractor-vs-dragoon boundary per M-13 template
  - supremacist sectarian movements' recruitment window is the exclusionary-settlement + bitter-silenced-witness + failed-reputation-contractor feeder stratum; mainstream refutation is AMBIENT (household, tavern, magistrate, clergy all passively refute without speech-making — silent civic action, not spoken refutation)
  - CF-0035 carnivore-folk progenitor-cult cousin-lineage trophy taboo (CH-0009) and CF-0036 supremacist-cannibal doctrine are INVERSE-VALENCE sectarian registers within the same carnivore-folk progenitor-cult surface territory; they MUST NOT be read as ends of a single carnivore-progenitor-cult spectrum — the taboo is a respect-discipline within mainstream progenitor-cult current; the doctrine is a pathological cult-deviation; conflation produces category error
  - CF-0032 "older bloods" firewall (cultural-continuity claims are sectarian-not-civic) cross-applies: supremacist doctrine's cross-cluster rhetorical exploitation of Cluster C "older bloods" sectarian framing is sectarian-activity-not-world-truth — neither reading cross-validates the other; both remain contested-canon
  - 'Rule 4 globalization-by-accident firewall: "endemic interspecies friction" is GLOBAL; "supremacist cannibal fringe" is LOCAL (CF-0034 corridor-bounded); "exclusionary single-species settlements" is LOCAL (isolated/weak-charter); "civic silence-protocol" is POLITY-LOCAL (larger mixed-species chartered cities primarily); cohort-conflation across subsets is forbidden in CF-statement-adjacent prose'
  - register discipline LOAD-BEARING: FORBIDDEN framings include allegorical race-conflict-tract, grimdark-cannibal-feast-prose, chosen-truth-teller silenced-witness, conspiracy-thriller civic-suppression, pulp-cannibal-village, capitalized-proper-noun faction names ("the Eaters"), omniscient-supremacist-doctrine exposition; REQUIRED framings hold species-embodied-biological specificity (scent-aversion predator/prey BIOLOGICAL; moisture-habitat "slimy matters" about WATER WORK not skin-as-metaphor; tortoise-folk slowness is LITERAL metabolic) and render cannibal-material exclusively in AFTERMATH-HOUSEHOLD-VOCABULARY cadence (cleansing-rite refusal, magistrate-docket, village-buried-without-speaking, hunter-contractor-delivered-heads-did-not-say-from-whose-camp) — NEVER event-in-prose (CF-0034 precedent extended)
visible_consequences:
  - tavern joke-threshold codified across heartland/estate/drylands clusters ("never about the mother species; never about bodily needs in mixed company; never the mother's-mother rhyme after the third drink"), enforced by tavern-keeper vouch-withdrawal and civic-watch hate-speech docket
  - crew-master hire-catechism ("mix-sound crew?") at posting-wall or caravanserai before coin-exchange in canal-town heartland, big-city outskirts estate, and drylands caravan clusters; foreman mix-sound judgment is on par with waiting-wolves judgment and cargo-refusal judgment
  - children's skip-rope rhymes extend ("don't stop at the one-fur town / all the rows look the same") in exposed-district pedagogy; charter-school offense-tier lists add "progenitor-supremacist solicitation" and "canal-mud-refusal harassment" alongside existing offense categories; NO cannibal-material in child-register (aftermath-register only)
  - marriage-broker catechism extends in exposed-district households ("does your mother sit at a mixed hearth?"), paralleling CF-0031 ledger-mark and CF-0034 raid-widow questions; charter-sound mixed-species households answer quietly and at length
  - caravan-hiring practice integrates species-compatibility judgment as rotation-crew reputation asset; "one-fur caravan" is a caravan-master reputation-damage category paralleling cargo-refusal patterns
  - mixed-cemetery sectional tensions produce contested burial-plot adjudications by civic cemetery-master; named dowager-family separation requests paralleling CF-0032 estate-class gossip register
  - barber-surgeon cross-species practice disputes enter herb-wife registry and civic-watch malpractice-adjacent category ("he won't treat a toad-folk cut proper"); guild-seal charter preserves no-species-exclusion norm at intake level
  - hearth-prayer adjustments in mixed-species households: progenitor-cult enthusiast's supremacist-cadence rhyme is discouraged in mixed-marriage homes under hearth-elder arbitration; lineage-supremacist hearth cadence is contested-sectarian, not world-truth
  - returning-from-enclave idiom register: heartland worker back from single-species enclave speaks in new cadence his mother marks ("he's got the one-fur talk now") — paralleling "took the coin-for-shame" / "took the coin-for-service" cadence; dread-register, NOT adventure-hook
  - silenced-adventurer-contractor ballad subgenre on the bardic circuit as SIXTH named subgenre within CF-0017 / CF-0024 / CF-0033 / CF-0034 / CF-0035 narrative-custody register — itinerant bards sing; patron-commissioned bards refuse; sectarian-commissioned bards who inflate supremacist recruitment register are marked-breach by listeners; silenced contractor is the dredger who keeps singing at the tavern, NOT the detective who exposes the cover-up
  - mainstream bardic moral-witness-refusal threshold extends CF-0017/CF-0034 precedent: no ballad for a supremacist-doctrine preacher; no ballad for a cannibal-band captain in mainstream traditions; sectarian-commissioned bards who violate are marked by listeners
  - clan-elder sanction against outland sectarian preachers in highland clans (extending CF-0021 grimoire-burning cadence and CF-0026/CF-0034 clan-sanction precedent); clan-son who walked south to a supremacist-doctrine camp is named in saga-fragment with the particular cadence reserved for supremacist-doctrine-returnees
  - cleansing-rite refusal CATEGORICALLY WORLD-WIDE for clansmen returned from cannibal-bands (heavier than CF-0034 raid-and-enslave refusal, which was already the heaviest precedent) — no atonement path in most clans; common-pantheon clergy mainstream parallel refusal; progenitor-cult mainstream parallel refusal
  - magistrate-court docket class: (i) hate-speech/public-mockery magistrate cases (extending PEOPLES "public mockery is poor form" into formal docket); (ii) exclusionary-settlement extradition disputes (spurned-migrant docket line); (iii) interspecies-cannibalism SEALED prosecutions under closed-court procedure with magistrate-warrant-gated access; (iv) silenced-witness retaliation/reprisal cases; (v) cross-species predation charging-tier questions
  - civic-registry archival category: euphemistic "grave-violation-of-person" subsidiary-ledger with sealed-access sub-register (Charter-Era subsidiary-record capability per CF-0031 precedent); magistrate-warrant access only, NO clergy-witness access (distinguishing from CF-0031 welfare-access); corvid-folk clerical overrepresentation produces SIXTH political-sensitivity compounding (after CF-0024/CF-0031/CF-0032/CF-0033/CF-0034)
  - CF-0026 principled-refuser clergy bifurcation under CH-0010 (THIRD CF-0026 bifurcation, after CH-0005 contamination-lineage and CH-0007 dragoon-scope): reform-with-charter-defense-anti-supremacism wing (invokes civic-charter anti-supremacy, campaigns against exclusionary-settlement magistrate toleration, demands prosecution of cannibal-bands WITHOUT silence-protocol) vs civic-restraint-pragmatic wing (accepts silence-protocol on rebellion-prevention grounds, focuses moral witness on hate-speech reform and survivor ministry); both hold within the reform current without schism
  - progenitor-cult mainstream aspectualizing position refutes supremacist doctrine explicitly; progenitor-cult sectarian supremacy wing is the MINORITY contested position recruiting from exclusionary-settlement + bitter-silenced-witness + failed-reputation-contractor feeders
  - estate-steward ledger scrutiny extends to tenant-cottage species-composition sorting preference signals; charter-risk attaches to estates whose tenant-sorting crosses civic-charter-relevant lines; dowager-gossip tracks "mix-sound house" vs "quietly single-species house" distinction paralleling CF-0031 charter-sound-vs-parvenu and CF-0033 dragoon-funding-council axes
  - bounty-wall settlement postings extend to include cannibal-band verified-bounty column at triple standard bounty-premium with bounty-clerk authentication discipline parallel to CF-0035 trophy-provenance; settlement-bounty wall in exposed-corridor canal-town/highland/drylands/fen-dry-edge polities extends this posting-column
  - inter-polity magistrate docket absorbs interspecies-prejudice cases as OPERATIONAL (NOT a sixth Charter-Era structural polity-asymmetric axis — uncontested-suppression-consensus holds at PROSECUTION level per CF-0034 precedent); latent-burden-watched per CH-0010
  - silenced-adventurer-contractor bitterness as failed-reputation CF-0024 sub-feeder: contractor who saw cannibal-case proof and was silenced drinks alone in winter-rota, retains pension, may drift to CF-0034 bandit-recruitment feeder under sectarian-patronage pressure; kin-of-the-silenced register in marriage-broker catechism
  - drylands tea-house scribe witnessing-refusal extends to supremacist-doctrine contracts and to cannibal-band bounty-contracts (paralleling CF-0028 ruin-witness-refusal and CF-0034 ransom-witness-refusal); caravan-rotation scribes treat interspecies-predation-adjacent contracts as incompatible with rotation-witness practice
  - fen-village institutional-absence-acknowledged-in-silence discipline extends (parallel to CF-0028 sunken-ruin, CF-0031 ledger-mark, CF-0033 dragoon): supremacist-doctrine presence at dry-edge is not-spoken-of; fen emigrant who joined a supremacist-doctrine camp in dry-edge polity is spoken of only in the third person, in the past tense; ghost-story register gains "the village that turned one-fur and sank" (the fen-village that accepted supremacist doctrine from a dry-edge preacher, lost its canary-neighbors, and was ended by contamination-drift it could no longer detect)
  - TIMELINE Layer 4 "Rising progenitor-cult tension in mixed cities" intensifies with specific magistrate-docket evidence without structural rupture; Charter-Era settlement STRAINS, does not break; hate-speech case-law, exclusionary-settlement extradition precedent, and sealed-cannibal-case procedure accumulate on magistrate-archive dockets across adopting polities
