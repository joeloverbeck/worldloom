id: CF-0036
title: Endemic interspecies friction as historical-process
status: hard_canon
type: historical_process
statement: |
  Interspecies friction is an endemic, ongoing social pattern in Animalia, as old as multispecies civic coexistence. It ranges across a spectrum from ordinary slur-and-stereotype tavern banter, through labor-prejudice distancing (some households and cohorts treat other species as "meant for" lower-reputation labor), through isolated single-species enclave settlements that drive away other-species immigration, through supremacist sectarian doctrine holding one species' entitlement to violence against another (CONTESTED-CANON sectarian belief, NEVER world-truth), through an interspecies-cannibal fringe among CF-0034 outlaw bands (carnivore-folk bandits killing and treating other sentient peoples' remains as meat), to civic-authority scandal-containment of cannibal-evidence under sealed- magistrate-docket procedure and the silenced-adventurer-contractor stratum that scandal-containment produces. Across all points on this spectrum, NO species-hierarchy is world-truth (SOC-1 preserved without exception); civic charters continue to suppress hierarchy-speech per PEOPLES Cross- Cluster existing firewall. This CF formalizes the spectrum already implicit in WORLD_KERNEL §What Is Ordinary ("oral instinct-jokes about other species") and §What Is Taboo ("mocking another species' bodily needs in mixed company"), extending the pattern into labor-prejudice, exclusionary settlements, supremacist doctrine (contested-canon), cannibal-fringe, and civic-silencing strata — Rule 6 anti-silent-retcon framing, parallel to CF-0034's formalization of implicit banditry mentions.
scope:
  geographic: global
  temporal: cyclical
  social: public
