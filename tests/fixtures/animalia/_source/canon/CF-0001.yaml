id: CF-0001
title: Sentient animal-humanoid peoples coexist with humans across all classes
status: hard_canon
type: species
statement: |
  Animalia is populated by humans and many sentient animal-humanoid peoples who share work, kinship, civic life, and class hierarchy. Animal-folk are full civic participants, not allegorical or marginal. They can occupy any class up to and including landed nobility and chartered civic authority.
scope:
  geographic: global
  temporal: current
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - labor
  - settlement_life
  - kinship
  - religion
  - law
  - language
  - architecture
  - status_signaling
prerequisites: []
distribution:
  who_can_do_it:
    - humans and animal-folk of all clusters as civic participants
  who_cannot_easily_do_it: []
  why_not_universal: []
costs_and_limits:
  - sectarian movements (progenitor-supremacy) periodically contest the multispecies settlement
  - some highland and fenland communities prefer clan custom over civic registry
  - cross-species reproductive impossibility (CF-0002) constrains kinship structure
visible_consequences:
  - mixed-species estates, courts, guilds, and households are ordinary
  - civic registry is the default arbiter of cross-species disputes
  - architecture, clothing, tools, and law accommodate species-typical embodiment
  - civic-registry rituals (Charter-Day, registry visits) are part of ordinary life
required_world_updates:
  - PEOPLES_AND_SPECIES
  - INSTITUTIONS
  - EVERYDAY_LIFE
  - GEOGRAPHY
source_basis:
  direct_user_approval: true
  derived_from: []
contradiction_risk:
  hard: false
  soft: false
notes: |
  Foundational social fact. Derives Invariant SOC-1 and is upstream of CF-0011.
