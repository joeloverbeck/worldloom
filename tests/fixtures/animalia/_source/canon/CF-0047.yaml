notes: |
  Co-proposed with CF-0046 (drylands caravan-corridor institutional- cultural complex); the two CFs cross-reference tightly — CF-0047 operates within CF-0046's corridor-complex substrate as a named social-role within the institutional-complex institution. Primary type `social_role` with secondary attachments enumerated per CH-0018 ONTOLOGY composite annotation (social_role + institution + craft).
  CF-0037 soft-conflict resolution: water-node / road-rest-node firewall in costs_and_limits preserves CF-0037 drylands-exclusion stabilizer through categorical distinction (CF-0047 well-keeper is water-node- anchored customary-authority role drylands-present-only; CF-0037 family-handled stationkeeper is road-rest-anchored civic-backed role heartland/highland/mountain-east-present and drylands-structurally- absent). CF-0037 receives modification_history entry at CH-0018 documenting the firewall.
  Systems/Economy critic recommendation: well-stop placement-right named as FOURTH multi-generational tenancy asset-class rather than absorbed into CF-0037 waystation placement-right (categorically distinct along ANCHOR-TYPE, CIVIC BACKING, and REGIONAL PRESENCE axes; absorption would erase load-bearing differences). Named as fourth in ECONOMY §Value Stores CH-0018 addition.
  Hero-drift mitigation per Everyday-Life critic: 'ordinary well-keeper' register commitment alongside dramatic register — both coexist, the former stabilizing the latter; most well-keepers are middle-aged-to-old, most keeping-books sparse, most station-logs behind, most well-stops not on named corridors.
  Rule 3 absorption applies across multiple surfaces: well-keeper NOT sixth M-7 cohort (M-7 sub-specialty holding clause per CH-0018), runner-reached village militia NOT new CF-0020 subtype (per CH-0018 INSTITUTIONS §Military/Defense firewall), station-log NOT new archival category (per CH-0018 INSTITUTIONS §Recordkeeping firewall), well-keeper NOT new wage-row (absorbed into ECONOMY household-enterprise middle-stratum register per CH-0018 §Wage Spreads), walking-well inheritor sub-cohort ABSORBED into existing CF-0024 / CF-0034 / urban- poor precarious strata per Rule 3 firewall.
  Phase 12a modification_history scan axis-(a) pre-scan verification per SKILL.md discipline: derived_from pared to [CF-0046, CF-0044, DA-0001] — CF-0037 is a distinguish-firewall contrast reference (the categorical distinction lives in CF-0047 costs_and_limits rather than in derived_from parent-chain; CF-0037 gets mod_history under axis (b) Phase 8 soft-contradiction / axis (c) substantive extension via water-node/road-rest firewall addition); CF-0017 is parallel circuit-bard cross-reference (not substantively extended by CF-0047); only CF-0046 and CF-0044 qualify as genuine axis-(a) parents per the decision test.
  In-register language: 'the well-keeper,' 'the well-stop,' 'the keeping- book,' 'the verse-counter,' 'the station-log,' 'kept the well,' 'walked the well,' 'the well-keeper's word,' 'the keeper's apprentice,' 'apprentice-keeper,' 'retiring keeper,' 'keeping-book-transfer,' 'trade-useful,' 'working-texture,' 'paid carrier of liability,' 'the corridor knows her name in two seasons.'
  Out-of-register language (forbidden paralleling CH-0016 CF-0044 cadence): 'wise well-keeper,' 'ancient keeper-lineage,' 'the venerable gate- custom,' 'refined / sophisticated / cultured drylands,' 'hereditary verse-lord,' 'the great keeper of the Third Well,' 'keeper-elite,' 'verse-caste,' 'pristine pre-civic tradition,' 'pure reciprocity economy untainted by coin,' 'destined caravan-master,' 'the legendary corridor,' 'chosen well-line,' 'noble caravan-master adjudicating in timeless wisdom,' 'desert warriors / corridor princes / well-lords,' 'the simple honest drylanders.'
