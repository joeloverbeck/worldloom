notes: |
  Direct from briefs/animalia-adventurers.md. The specialty subtype is the highest-mystery-exposure element of the proposal and carries six explicit firewall commitments to preserve M-1, M-2, M-6, and ONT-2: (1) mundane containment only, not chartered artifact work; (2) empirical pattern- knowledge is contested canon, not world-level evidence; (3) specialists are reputational/occupational, not practitioner-magical; (4) bards contracted as agents produce narrative material subordinate to CF-0023's contested-partial-translation frame; (5) specialists encountering possessed artifacts do not "commune with," "communicate with," or "decipher" vessel-hosted agencies; (6) no specialist is framed as uniquely knowing what a Maker artifact is or who made it. The bounded unknown the specialty manufactures (reputation-genealogy of famous specialists) is logged as Mystery Reserve M-7. Adjudication record: adjudications/PA-0002-accept_with_required_updates.md. Modified 2026-04-18 by CH-0005 (CF-0031): post-career pension-absence claim in costs_and_limits narrowed to non-adopting-polity scope. Adopting chartered polities have established the CF-0031 civic-registry contamination-lineage ledger-mark as a voluntary-enrollment welfare instrument providing pension supplement and monastic-clinic priority for CF-0025-eligible lineages across three administrative generations. Firewall preserved and strengthened: the registry records body-injury (contamination-injury empirical signature), NOT knowledge-genealogy; specialist EMPIRICAL pattern-knowledge remains contested canon per M-7, unchanged by registry institutionalization. No civic authority treats registry status as evidence of oracle-reading validity. Post-career widow pension arrangements partially close in the adopting-polity branch; non-adopting polities maintain contract-custom arrangements as before. Adjudication record: adjudications/PA-0004-accept_with_required _updates.md.
prerequisites:
  - veteran experience with artifact-incident response (usually accumulated through ward-breach response or extraction-security gigs)
  - willingness to work contaminated sites
  - civic or guild commission for lawful engagement
  - empirical fallout-containment pattern-knowledge (acquired through apprenticeship and survival)
  - equipment for mundane containment (nets, pens, forced-mask rigs, isolation-zone barriers, suppression weapons)
