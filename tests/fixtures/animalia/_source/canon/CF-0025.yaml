contradiction_risk:
  hard: false
  soft: true
costs_and_limits:
  - contamination-injury accumulates across career (darkened skin patches, tremors, respiratory issues — indistinguishable from extractor-veteran patterns)
  - high mortality from direct fallout exposure and secondary consequences
  - commission-gated work limits volume; opportunistic brokers occasionally bypass the gate, creating friction with containment-wrights
  - specialist empirical knowledge is contested canon, not world-level authority — specialists are NOT oracles on Maker-Age, catastrophic-class, or vessel-agency questions
  - specialists encountering possessed artifacts (CF-0022) do NOT "commune with," "communicate with," or "decipher" vessel-hosted agencies; they contain and hand off to chartered guilds
  - specialists are NOT crafters, grimoire-readers, ward-inscribers, or ceramic-vessel makers — ONT-2 firewall holds
  - post-career widows and contamination-injured retirees have no charter pension in non-adopting polities — arrangements negotiated by contract custom; in adopting chartered polities, voluntary self-enrollment on the CF-0031 ledger-mark registry confers pension supplement and monastic-clinic priority across three administrative generations
  - reputation mythologization via bardic-circuit loop (CF-0017 extension per CF-0024) creates the M-7 bounded unknown
distribution:
  who_can_do_it:
    - seasoned adventurer-veterans willing to take the specialty under commission
    - former extraction-guild apprentices who left before charter completion
    - rare non-human-folk specialists (amphibian-folk canaries sometimes become specialists themselves in fen regions)
  who_cannot_easily_do_it:
    - untrained laypersons
    - principled refusers (CF-0026) by oath or doctrine
    - specialists blacklisted by guild or civic watch for unlicensed response
    - those without commissioning patron (magistrate, ward-inspector, extraction-guild, or opportunistic broker)
  why_not_universal:
    - high mortality through contamination-injury and career-attrition
    - commission-gated access in most polities
    - empirical pattern-knowledge takes years and survival to acquire
    - guild-charter ceiling keeps specialists out of extraction/wards/neutralization (limiting career scope to fallout containment)
    - principled-refuser tradition siphons legitimacy-seekers away from the subtype
domains_affected:
  - magic
  - economy
  - warfare
  - law
  - settlement_life
id: CF-0025
