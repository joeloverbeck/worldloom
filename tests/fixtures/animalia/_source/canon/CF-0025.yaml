statement: |
  A scarce subtype of adventurer-contractor (CF-0024) specializes in mundane containment of artifact-induced fallout consequences: suppression of rage-induced animals (trap, kill, pen), forced isolation of victims producing toxic breath or other bodily manifestations (forced masking, zone quarantine), and perimeter control during chartered guild response. These specialists are reputational and occupational, not practitioner- magical. They do NOT perform artifact extraction, ward inscription, ceramic-vessel containment, or neutralization — those remain chartered under CF-0006, CF-0007, CF-0008. ONT-2 firewall is explicit: what a specialist knows is how to manage fallout empirically, not how to manipulate artifacts. Specialists are engaged under civic magistrate, ward-inspector, or chartered extraction-guild commission in most polities; unlicensed fallout-response carries legal risk. Empirical pattern- knowledge accumulated across careers is contested canon, not world-level authority on Maker-Age origin (M-1), catastrophic-class origin (M-2), or vessel-hosted agency (M-6). Specialist field-lore does NOT constitute evidence at world level for any mystery-reserve position. The subtype's reputational signature — the scarred, quiet specialist whose silences bardic-circuit mythologizes — creates the bounded unknown logged as Mystery Reserve M-7.
status: hard_canon
title: Occult-fallout specialists perform mundane containment under commission
truth_scope:
  diegetic_status: objective
  world_level: true
type: capability
visible_consequences:
  - named occult-fallout specialists accrue quiet-avoid prestige in artisan quarters and canal towns
  - scarred veteran figures with the specialty's characteristic gaze are a recognizable bardic subgenre
  - magistrate commission records of named specialists survive in civic archives (though specialist knowledge itself does not)
  - post-career specialists present to herb-wives and barber-surgeons with contamination injuries in the extractor-veteran empirical register
  - bardic-circuit songs about the specialist who said less and knew more circulate; the reputation-accretion is the M-7 concern
  - civic-registry refuses sectarian attempts to classify dead specialists as "progenitor-touched" or similar supernatural status claims
  - civic prosecution of unlicensed fallout-response in most polities; tavern-vouched public-emergency exceptions in some
  - engineering-guild and extraction-guild contractor-auxiliary rosters name repeat specialists with commission history
  - bardic cycles distinguish "the specialist who said less" (high reputation; M-7 subject) from "the one who wrote pamphlets" (treated as unreliable)
