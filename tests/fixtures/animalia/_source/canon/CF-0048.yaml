statement: |
  In canal-heartland CF-0024 contractor-auxiliary compensation practice on chartered-plus-auxiliary informal cellar-job configurations — a chartered professional (e.g., ceramic-handler per CF-0006, ward-wright per CF-0007, extraction-specialist per CF-0008) accompanied by a contractor-auxiliary performing lantern-hold / door-keep / one-fetch role-scope — the pay-split between the two parties uses a NAMED BIFURCATION: the chartered professional takes the "serious share" and the auxiliary takes the "corner-share", the latter a customary copper-to-lower-silver tier calibrated to the auxiliary's role-scope. The serious-share / corner-share register is canal-heartland oral-register vocabulary (transmitted via CF-0024 tavern-board posting + CF-0017 circuit-bard narrative-custody), distinct from sole-contractor flat-silver pay (CF-0024 sole-contractor configuration) and from fully-rostered chartered-extraction-team pay per guild charter (CF-0008). The register names a previously-implicit pay-tier WITHIN the existing CF-0024 contractor-auxiliary frame; it is NOT a new compensation institution, NOT a new pay-class, NOT a new contractor subtype. Sibling regional registers exist with different vocabulary — highland clan-share under clan-elder-sanction per CF-0024 highland variant; drylands caravan-share per CF-0046 caravan-corridor custom; fenland relay-summoning compensation per CF-0024 fen variant — and the corner-share register does not appear in formal civic-registry contract-template vocabulary in charter-audit-strict polities (Brinewick exemplar per CF-0038 + CF-0043 charter-audit discipline).
