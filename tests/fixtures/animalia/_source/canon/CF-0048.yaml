  - "widow-of-the-job pension-absence sharpness: a corner-share-rank auxiliary's widow operates on a lower income-recovery base than a serious-share-rank chartered-professional's widow; the existing widow-of-the-job framework (CF-0024) becomes more granular at this tier, absorbed as sub-tier per Rule 3 firewall (parallel to CH-0008 widow-of-the-raid → widow-of-the-job and CH-0009 widow-of-the-hunt → widow-of-the-job absorption precedents)"
