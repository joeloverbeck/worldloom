    - "Configuration-gate: the corner-share / serious-share bifurcation requires the chartered-plus-auxiliary asymmetric configuration. Sole-contractor jobs use CF-0024 flat-silver; fully-rostered chartered-extraction-team jobs use team-roster pay per guild charter (CF-0008); neither configuration has the asymmetric pairing the bifurcation names."
    - "Regional-sibling-register-gate: sibling regional contractor-compensation registers exist with different vocabulary (highland clan-share under clan-elder-sanction; drylands caravan-share under caravanserai custom per CF-0046; fenland relay-summoning compensation). Each region's institutional substrate developed its own customary register; canal-heartland is one of several regional registers, not a universal vocabulary."
    - "Vocabulary-travel-limit: the register lives in oral / informal tavern-board / circuit-bard transmission. Charter-audit-strict polities (Brinewick per CF-0038 biannual charter-audit cycle + CF-0043 Ash-Seal civic-charter-strict containment company) maintain civic-registry contract-template vocabulary that does NOT adopt the informal register; the formal-vs-informal vocabulary divide is structurally enforced by civic-magistrate audit and trade-secret contract custody discipline."
