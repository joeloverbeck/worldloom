notes: |
  Direct from worlds/animalia/proposals/PR-0015-corner-share-contractor-auxiliary-compensation.md (BATCH-0003); pre-figured at diegetic level by DA-0001 (Vespera Nightwhisper, "a-season-on-the-circuit", paragraph 7) per Rule 6 audit-trail preservation.

  Phase 12a axis-(c) judgment: CF-0024 is the genuine semantic parent — the corner-share / serious-share register names a previously-implicit pay-tier WITHIN CF-0024 contractor-auxiliary compensation practice; the new CF EXTENDS CF-0024's compensation-practice substrate. A future reader of CF-0024 alone needs the modification_history pointer to read CF-0024 correctly (axis-(c) YES; emit append_modification_history_entry op on CF-0024). CF-0009 (copper-silver denomination with meaningful spreads) is mechanism-reference only, NOT a genuine axis-(a) parent — corner-share applies CF-0009's spread WITHIN a regional named register without extending CF-0009's universal-coverage claim. Per CF-0045 lock-night precedent, mechanism-references move to prerequisites; CF-0009 cited there. No mod_history entry on CF-0009.

  Cross-references (not derived): CF-0017 circuit-bard narrative-custody is the vocabulary transmission channel but is not extended (corner-share idiom absorbs into existing contractor-ballad subgenre register, not a new sub-genre — parallel to CH-0008 widow-of-the-raid + CH-0009 widow-of-the-hunt absorption pattern); CF-0006 / CF-0007 / CF-0008 chartered professionals are configuration-exemplars (chartered-plus-auxiliary pairing) but are not extended; CF-0038 + CF-0043 charter-audit-strict polity maintain the formal-vs-informal vocabulary divide as Rule 4 firewall but are not extended.

  Status soft_canon defensible via partial-support evidence-breadth pathway: CF-0009 + CF-0024 commit underlying mechanics; DA-0001 specifies the NAMING (sole-source-FOR-the-naming caps at soft_canon per Phase 3 narrator-reliability mapping). Vespera's narrator-position is firsthand + professionally-positioned + makes the claim in self-deprecating register (she names herself auxiliary, not chartered) — REDUCES inflation-bias for this specific assertion relative to other travelogue content. Demotion to contested_canon considered and declined: no in-world dispute the proposal points to; the register fits cleanly with existing CF mechanics + DA-0001 deployment + narrator self-deprecating position.

  Rule 3 specialness-inflation firewall: the named register is a sub-tier WITHIN the existing CF-0024 wage-table row "upper copper to upper silver, risk-loaded; reputable veterans at the top, tavern-board new-hires at the bottom" (per SEC-ECR-002), NOT a new wage-row position. Parallel to CF-0034 / CF-0035 / CF-0042 / CF-0043 sub-specialty absorption precedents within CF-0024 wage row, and to CH-0008 widow-of-the-raid / CH-0009 widow-of-the-hunt / CH-0010 silenced-contractor / CH-0014 status-artifact bodyguard / CH-0015 Ash-Seal property-protection sub-specialty / sub-tier absorption precedents. The register is NAMING-OF-EXISTING-PRACTICE, not new stratum.

  In-register language (for CF record and domain-file patches): "took the corner-share," "kept the corner well," "corner-share-reliable," "the serious share," "lantern-hold / door-keep / one-fetch," "tavern-board contractor-auxiliary," "circuit-bard contractor-ballad register." Out-of-register language (forbid): "corner-share guild," "chartered corner-share," "corner-share licensure" (no chartered institution); "the great corner-share of X," "legendary corner-share auxiliary" (chosen-bard pathology; AES-1 violation); "corner-share as the heart of canal-heartland labor" (Rule 3 specialness inflation).

  Phase 6b multi-critic synthesis was N/A: escalation gate's domain-count trigger fired by 1 (4 named in proposal + 2 secondary surfaces in Phase 6) but inline four-lens analysis (Continuity Archivist + Systems-Economy + Theme-Tone + Mystery Curator) was applied in lieu of parallel six-critic dispatch, parallel to CF-0045 lock-night precedent (regional + sub-occasion-within-parent-CF + DA-0001 pre-figured + low novelty profile + low integration_burden score 1).

  No Phase 6f repairs fired. M-7 firewall preserved (corner-share is auxiliary pay-tier vocabulary, not occult-fallout reputation-genealogy). All 16 invariants PASS. M-1 through M-20 all overlap=false confirmed.

  Phase 0 minor imprecision noted from PR-0015: longer_term_consequences cites "CH-0008 / CH-0010" Rule 3 widow-precedent; CH-0010 is silenced-contractor absorption (parallel-but-not-widow). The correct widow-absorption precedents are CH-0008 (widow-of-the-raid) and CH-0009 (widow-of-the-hunt). PR-0015 Risks section gets this right. This adjudication uses CH-0008 / CH-0009 as the correct widow pair; CH-0010 retained as parallel Rule 3 firewall (sub-band absorption pattern) but not as widow-specific precedent.

  Adjudication record: adjudications/PA-0018-accept_with_required_updates.md.
