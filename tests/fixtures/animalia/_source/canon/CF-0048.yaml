distribution:
  who_can_do_it:
    - canal-heartland tavern-keepers and contractor-auxiliaries on chartered-plus-auxiliary cellar-jobs use the corner-share / serious-share register routinely
    - canal-heartland circuit-bards (CF-0017) absorb the idiom into contractor-ballad subgenre material
    - chartered professionals (ceramic-handler per CF-0006 / ward-wright per CF-0007 / extraction-specialist per CF-0008) accept the register in informal cellar-work pay-negotiation
