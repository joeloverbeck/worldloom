statement: |
  A subset of Maker-Age substructures survive as enterable ruin sites — interior volumes with entrances, chambers, and recoverable contents, geographically scattered across ruin-rich zones. Most Maker-Age material residue is encountered piecemeal via foundation digs, canal cuts, and quarry collapses (per DIS-1); enterable ruins are the less common subtype that admits organized multi-professional entry (CF-0028 expeditions). Knowledge recovered from ruin interiors is fragmentary, contested, and contributes only to the CF-0023 empirical/partial/contested register — no accumulated yield resolves Mystery Reserve M-1 (civilization identity / cause of fall) at world level (anti-accumulation firewall). Catastrophic -class artifact origin (M-2) is not within the leaked-corpus or expedition-recoverable domain; catastrophic-class encounters trigger resealing rather than recovery. Enterable ≠ catastrophic.
status: hard_canon
title: Enterable Maker-Age ruin sites exist as a recognized category of Maker substructure
truth_scope:
  diegetic_status: objective
  world_level: true
type: historical_process
visible_consequences:
  - geographically scattered enterable-ruin sites, some under civic seal, some under guild seal, some in jurisdictional dispute
  - bardic cycles narrate specific named expeditions and their outcomes
  - civic-archive records of ruin-discovery events, expedition rosters, and resealing orders
  - ruin-site reputation accretes over generations (a "bad" ruin avoided; a "profitable" ruin contested)
  - pilgrim-site tension between sectarian Maker-mystic movements and civic containment (per GEOGRAPHY §Sacred and Cursed Terrain)
  - '"officially resealed" formulations in civic records signaling enforcement porosity'
