costs_and_limits:
  - ruin interiors may contain guardian constructions (CF-0029) that cause squad-wipes
  - recovered contamination, bleed-through, and ward attrition parallel DIS-1 / CAU-1 costs
  - knowledge yield is fragmentary and partisan — expedition reports are not archival-canonical (CF-0028 anti-propaganda clause)
  - cumulative knowledge-yield does not resolve M-1; no expedition yields civilization-identity answers at world level
  - no complete Maker-Age text is recovered from any ruin; the CF-0023 linguistic-recovery boundary holds
  - catastrophic-class artifact origin (M-2) is NOT within the expedition-recoverable domain; the enterable-ruin scope boundary excludes it
