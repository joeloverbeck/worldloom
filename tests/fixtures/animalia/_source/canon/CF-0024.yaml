notes: |
  Direct from briefs/animalia-adventurers.md. Consolidates and structurally commits the adventurer stratum that kernel line 9 already anticipates ("Adventurers exist but are treated as dangerous laborers, not chosen ones"). Linked CF-0025 bounds the occult-fallout specialty to mundane containment under commission with explicit M-1/M-2/M-6 and ONT-2 firewalls. Linked CF-0026 commits the principled-refuser tradition as an ethical (not metaphysical) moral category. Linked Mystery Reserve M-7 governs the reputation-genealogy of famous occult-fallout specialists. AES-1 guard clause: the adventurer stratum is labor, not vocation- romance; characters must not be framed as chosen, destined, or called. In-register language for writing in this setting: "hired," "contracted," "taken on," "posted at the tavern board," "local warrior," "veteran," "takes the work," "refused the work," "paid on delivery," "hazard pay," "scarred," "handler of fallout," "licensed escort." Out-of-register language to avoid: "adventurer party/band of heroes," "quest," "quest-giver," "monster hunter," "legendary," "chosen," "destined," "calling," "school of," "initiated," "brotherhood of witchers/hunters," "dungeon," "loot," "leveled up," "epic." Four existing CFs qualified by this addition: CF-0017 (bards extended as contracted agents), CF-0020 (veteran capability now named within broader stratum), CF-0008 (contractor-auxiliary boundary), CF-0021 (crafter-hunting niche and mercenary-commission pathway formalized). Adjudication record: adjudications/PA-0002-accept_with_required_updates.md. Modified 2026-04-18 by CH-0005 (CF-0031): widow-of-the-job pension-absence claim in costs_and_limits narrowed to non-adopting-polity scope for CF-0025-eligible lineages. Adopting chartered polities with the CF-0031 ledger-mark registry provide voluntary-enrolled pension supplement for CF-0025 specialists' households; the global negative pension claim is preserved as default for all other CF-0024 contractor-widow subtypes (mundane caravan-escort, wildlife, dredger-escort, mercenary-band contractor widows) and for all contractors in non-adopting polities. SOC-3 coin-contract enforcement unchanged. M-7 firewall holds (registry tracks body-injury, not knowledge-genealogy). Adjudication record: adjudications/PA-0004-accept_with_required_updates.md. Modified 2026-04-18 by CH-0007 (CF-0033): contractor stratum scope is qualified in dragoon-adopting polities. Perimeter enforcement during ward-breach declaration EXITS the contractor-auxiliary niche in adopting polities — the work that would in a non-adopting polity flow to CF-0024 contractor-auxiliary rosters under CF-0008 guild commission now flows to CF-0033 dragoons under civic-charter. Contractor stratum is otherwise PRESERVED: extraction/dredger-escort, caravan and wildlife escort, occult-fallout containment, mercenary-band skirmish work, and CF-0028 ruin-expedition contracting all remain contractor-stratum activities in adopting and non-adopting polities alike. The inter- polity labor-market cannibalization pattern that CF-0028 CH-0004 flagged (expedition demand pulling top-silver veterans from ward- breach response) is extended in dragoon-adopting polities: during 3-7 year dragoon corps buildout, dragoon recruitment cannibalizes the CF-0024 upper-stratum veterans alongside CF-0020 militia reserves; once institution matures, dragoon pension differential creates preferred-marriage tier drawing marriageable veterans from the contractor, fallout-specialist, and mercenary pools (assortative- sorting pattern parallel to CF-0032 placement-right and CF-0031 registered-lineage dynamics). Inter-polity cannibalization reversal: dragoon-adopting polities EXPORT cannibalization pressure to non- adopting polities as veterans emigrate to enlist, thinning the non- adopting polity's contractor pool and raising its ward-breach severity indirectly. Widow-of-the-job pension-absence claim holds for CF-0024 contractor-widow categories in non-adopting polities per CH-0005 narrowing; in adopting polities, retired-dragoon widow receives full civic-treasury pension coverage (categorically distinct from CF-0031 welfare-registry supplement). Adjudication record: adjudications/PA-0006-accept_with_required_updates.md. Modified 2026-04-19 by CH-0008 (CF-0034): bandit-hunter is named fifth contractor subtype alongside caravan-escort, wildlife, extraction-escort, dredger-escort, mercenary-band warfare, and occult-fallout — a CF-0024-stratum activity (NOT a CF-0033 dragoon civic function; NOT a chartered-guild function). Three-tier skirmish- season taxonomy clarified: (i) sanctioned mercenary with clan-elder- sanction per highland tradition; (ii) endemic bandit outside sanction per CF-0034; (iii) patron-backed expedition-war per CF-0028. Widow- of-the-raid absorbed into widow-of-the-job as idiom-extension ("did your kin come back from the raid?" extends the marriage-broker catechism in corridor-exposed districts) — NOT elevated to a new stratum per Rule 3 specialness-inflation firewall. Bandit-hunter reputation-genealogy is subject to the M-7 firewall at fifth-cohort parity with extractor-veteran, expedition-veteran (CF-0028), subsection- master (CF-0032), and retired-dragoon (CF-0033) cohorts. Veteran-pool multi-claim cannibalization now reaches six to nine concurrent claims depending on polity (hunter-contract competes with all prior subtypes plus dragoon-recruitment in adopting polities). Adjudication record: adjudications/PA-0007-accept_with_required_updates.md. Modified 2026-04-19 by CH-0010 (CF-0036): silenced-adventurer- contractor sub-band is ABSORBED INTO the failed-reputation-contractor feeder (Rule 3 specialness-inflation firewall; NOT a new stratum; paralleling widow-of-the-raid → widow-of-the-job per CH-0008 and widow-of-the-hunt → widow-of-the-job per CH-0009). Silenced contractor is ALIVE (not a widow); the bitterness-register qualitatively damages reputation without creating income-stream gap requiring new welfare category. Silenced contractor retains the contract-pension from the job-that-became-sealed (SOC-3 coin-contract sacredness preserved; the job was performed). Silenced-contractor drifts into failed-reputation feeder via civic-watch intake-interview enforcement, charter-restriction on sealed-case public-speech, and penal-consequence for breach; may be recruited by supremacist-doctrine sectarian movements at the margin under sectarian-patronage pressure OR drift toward CF-0034 bandit- recruitment pathway. Reform-current principled-refuser clergy (CF-0026 CH-0010 charter-defense wing) minister to silenced-contractor households under fallout-ministry register paralleling CF-0025/CF-0034 pastoral specialties. Silenced-contractor reputation-genealogy is subject to the M-7 firewall at sub-specialty holding status (NOT a sixth M-7 cohort; absorbed as qualitative-reputation-damage pattern within existing five- cohort register). Marriage-broker catechism extends with kin-of-the- silenced question *"does your kin come back and speak?"* paralleling CF-0031 *"did your grandfather take the mark?"* and CF-0034 *"did your kin come back from the raid?"* — minor idiom-extension, NOT new stratum. Adjudication record: adjudications/PA-0009-accept_with_required_ updates.md.
  Modified 2026-04-20 by CH-0015 (CF-0043): extension — Ash-Seal commercial property-protection guards (perimeter-bounded; Brinewick-specific) are an ELEVENTH CONCURRENT CLAIM on the CF-0024 veteran pool, ABSORBED INTO the extraction-escort subtype as a sub-specialty (NOT a new twelfth CF-0024 subtype; Rule 3 specialness-inflation firewall; parallel to CF-0042 status-artifact bodyguard-commission eleventh-claim absorption into extraction-escort subtype at CH-0014). Ash-Seal-guard sub-specialty pay sits within extraction-escort-sub-bucket (perimeter-bounded commercial property-protection at upper-copper-to-mid-silver depending on guard-experience tier); deployment beyond facility-perimeter triggers CF-0024 civic-watch friction per existing noble-retinue-under-contract pattern. The eleventh-claim counts CF-0043 Ash-Seal-guard alongside the ten-to-eleven existing concurrent claims (caravan-escort, wildlife, extraction-escort, dredger-escort, mercenary-band warfare, occult-fallout per CF-0025, ruin-expedition per CF-0028, dragoon-recruitment per CF-0033 in adopting polities, bandit-hunter per CF-0034, legendary-beast-hunt per CF-0035, status-artifact bodyguard per CF-0042). Veteran-pool multi-claim cannibalization pressure compounds in Brinewick-specific labor market where all prior claims are already at exemplar density per CF-0038 cumulative commitment. Adjudication record: adjudications/PA-0014-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0018 (CF-0046): extension — CF-0024 caravan-rotation social form and caravanserai posting-board infrastructure constitute the substrate CF-0046 extends at drylands-corridor-complex scale. Caravan-master cargo-refusal judgment register (CF-0034 waiting-wolves; CF-0036 mix-sound; CF-0041 sealed-cargo) extends with CORRIDOR-INTERNAL CUSTOMARY-ADJUDICATION scope per CF-0046 — caravan-masters on drylands rotation adjudicate minor rest-stop disputes (intra-caravan labor, supply-share, verse-turn etiquette breach, well-share friction) under reputation-enforced convention; multi-caravan-master reputation-boycott at corridor-network scale is the structural brake against graft/coercion. Runner-reached village militia emergency-response (CF-0046 drylands-specific informal folk-practice) is absorbed alongside CF-0024 caravanserai-posting contractor-auxiliary framework — the village runner is NOT a CF-0024 posted contractor (no posting-wall, no tavern-board hire; village-consensus selection rotating across able villagers); pursuit beyond village jurisdiction defaults to CF-0034 hunter-contractor commission if the corridor justifies bounty-contract. Drylands station-log convention kept in DIS-2 trade-tongue (CF-0046) operates in household register alongside the tea-house-scribe contract-custody tradition (CF-0024/0028/0033/0034/0036/0044) without displacing it; the two literacy conventions coexist. CF-0024 scope, distribution, and stabilizer structure unchanged; CF-0046 extends caravan-rotation institutional-complex superstructure and names the drylands-corridor-specific adjudication scope-firewall. Adjudication record: adjudications/PA-0017-accept_with_required_updates.md.
