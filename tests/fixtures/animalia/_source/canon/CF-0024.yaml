contradiction_risk:
  hard: false
  soft: true
costs_and_limits:
  - reputation-slow-build gates the upper end; tavern-board new-hires accept underpriced hazard work
  - contract-breach cascade in thin-contractor regions compounds losses (rabid livestock uncontained; escort-gap bandit losses; fallout escalating toward ward-breach)
  - off-the-books tavern-board contracts erode civic-registry tax base in polities that levy on ledger-credit trade
  - widows and orphans common after bad jobs; widow-of-the-job is a recognized household category without charter pension protection in non-adopting polities; in adopting chartered polities, CF-0025-eligible lineages may self-register on the CF-0031 ledger-mark registry for voluntary-enrolled pension supplement; non-CF-0025 contractor-widow categories (mundane CF-0024 subtypes, CF-0028 expedition-widows) remain without charter hook
  - hazard-pay asymmetry widens the gap between veteran-negotiators and ordinary wage laborers
  - noble retinues under adventurer-contract language create Charter-Era anti-monopoly-of-force friction
  - mercenary-band licensure varies sharply by polity (license/tolerate/restrict/ban); inter-polity mismatch generates novel extradition cases
  - contracted-bards bypass civic-archive narrative-custody; scribal guilds (corvid-folk disproportionate) resent the competition
  - levy cannibalization pressure in polities with weak chartered-military monopoly
distribution:
  who_can_do_it:
    - veterans of any sentient species seeking hazard-labor income
    - traveling bards extending CF-0017 into contracted agency
    - reformed criminals, refugees from sealed quarters, and other displaced labor seeking legitimate hazard work
    - mercenary-band organizers during skirmish-season
  who_cannot_easily_do_it:
    - children, elders, and injured (physically unfit)
    - those without reputation or tavern-vouch (market access gate)
    - those bound by principled-refuser oath or clan exile (CF-0026 and clan-custom exclusions)
    - residents of tiny fen stilt-villages and tight-knit clan communities that summon rather than post
  why_not_universal:
    - skill and reputation take years to build; SOC-3 coin-contract custom makes oath-breakers economically unhireable
    - high mortality in the specialist subset (CF-0025); moderate in mercenary-band and caravan-escort work
    - levy/militia traditions retain primary defense standing in most polities
    - principled-refuser tradition (CF-0026) siphons legitimacy-seekers from artifact-fallout subsets
    - guild-charter ceiling; contractors cannot perform artifact extraction, ward inscription, ceramic-vessel containment, or neutralization — those remain chartered (CF-0006, CF-0007, CF-0008)
    - regional variation; highland clans require clan-elder sanction; fens summon rather than post; strict sectarian communities reject the stratum on principle
