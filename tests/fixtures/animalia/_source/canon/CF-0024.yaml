statement: |
  Animalia has an organized, publicly visible economy of independent contractors (colloquially "adventurers") drawn from all sentient species, making their living by fulfilling contracts posted publicly in town and city venues or commissioned privately. Internal subtypes include local hardened warriors, traveling bard-agents (extending CF-0017), extraction/ dredger-escort labor, caravan and wildlife-control escort, and mercenary bands formed during inter-community skirmishes. The specialized occult- fallout subtype (CF-0025) and the principled-refuser tradition (CF-0026) are committed as linked CFs. Contract-posting infrastructure (tavern notice-boards, lockmaster posting walls, civic posting walls, and in mid-to-large towns unchartered matchmaking brokers) is ordinary in chartered polities; regional variants exist (highland clan-sanction for outland contracts; fenland relay-summoning via monastic clinic; drylands caravanserai posting). The stratum is treated as ordinary hazard labor, not heroic vocation — the kernel's "dangerous laborers, not chosen ones" framing applies directly.
status: hard_canon
title: Public contractor stratum ("adventurers") with contract-posting infrastructure
truth_scope:
  diegetic_status: objective
  world_level: true
type: institution
visible_consequences:
  - tavern notice-boards and lockmaster posting walls are ordinary sights in mid-to-large towns of chartered polities
  - '"adventurer" is vernacular for an ordinary hazard-labor occupation with visible subtypes'
  - rotating contractors drink in tavern mixed rooms; tavern-keeper vouch is a real social asset
  - magistrate courts build hazard-pay, liability, and extradition precedent across Charter polities
  - artifact-extraction guilds maintain contractor-auxiliary rosters (vetted repeat contractors under commission)
  - mercenary bands form and disband at skirmish-season in inter-community flares; some polities license mercenary companies under tight charter
  - contracted bards (extension of CF-0017) carry hire-notices, gather material, and compose named-veteran reputations that travel inter-polity via the bardic circuit
  - portable contractor reputation accrues as a new value-store object qualitatively different from polity-bounded guild-seal credentialing
  - landholding estates retain named adventurer-retinues on quiet retainer under caravan/wildlife-contract framing; civic watch periodically tests the boundary
  - civic-registry adventurer-contract form templates develop; widows' pension arrangements negotiated through tavern custom rather than chartered-guild protection
  - clergy-contractor hiring for pilgrimage safety and contaminated-site intercession is ordinary; sectarian progenitor-cult lineages recruit veterans for armed lineage-guards
  - herb-wives and barber-surgeons develop contractor-specific empirical triage (deep cuts, bite/claw punctures, fallout exposure, post-battle sepsis)
  - bardic cycles carry named-veteran reputations, widow-pension songs, escort-refusal tales, and contractor-failure ballads as a minor subgenre
  - regional asymmetry in contractor licensing parallels the crafter-tolerance pattern (CF-0021)
