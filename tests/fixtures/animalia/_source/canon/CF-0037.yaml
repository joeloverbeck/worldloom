id: CF-0037
title: Family-handled waystations tradition (heartland, highland, mountain east)
status: hard_canon
type: institution
statement: |
  Across the temperate canal heartland, cold north highland, and mountain east, a multi-generational tradition of family-handled waystations operates along the overland connector roads between settlements. Each waystation is a small household enterprise — roadside building with stable, supply-storage, and traveler-rest space — sited somewhat-close to a feeder settlement for supply-runs. Stations are typically passed kin-to-kin rather than chartered or sold; an inheriting child works at the station from young (often earlier than the canal-town age-ten apprenticeship norm), is encouraged to marry locally and reproduce in turn, and most often remains stationkeeper for life. The tradition is open across species per SOC-1; mixed-species waystations are ordinary in the heartland; clan-affiliated waystations are common in the highland; valley-pass waystations carry the institution into the mountain east. The institution is non-chartered: there is no waystation-keepers' guild, no master-rank progression, no civic-charter beyond ordinary civic-registry recordation of tenancy in chartered polities (clan-elder sanction in highland; estate-steward ledger when the station sits on noble-estate tenant land). A minority of inheritors, unable or unwilling to accept the inheritance burden, walk away — most into settlement artisan-quarter casual labor, some into the CF-0024 contractor entry-tier, a few into CF-0034 endemic-banditry recruitment-feeders. The walking-away pathway is a recognized cultural register, not an exceptional event. Composite institution with historical_process and social_role sub-aspects: the tradition itself is a multi-generational pattern across regions; the stationkeeper-as-inherited-life-path is the named social role.
scope:
  geographic: regional
  temporal: historical
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - economy
  - kinship
  - mobility
  - status_signaling
  - settlement_life
  - architecture
  - language
  - memory_and_myth
prerequisites:
  - existing overland road infrastructure between settlements (heartland connector-routes between canal towns; highland clan-border roads; mountain-east valley-pass approaches)
  - travel volume sufficient to sustain steady commerce (caravans, contractors, bardic-circuit performers, hunters, traders, charter-day pilgrims)
  - land tenure permitting family ownership or stable estate-tenancy of roadside property (freehold or chartered-polity civic-registered or estate-tenant or clan-elder-sanctioned per region)
  - civic-registry recordation capability for chartered-polity tenancy (already covered by existing civic-registry framework per INSTITUTIONS §Family/Clan/Household)
  - regional geographic conduciveness — NOT drylands south (caravan-rotation cistern-management mechanism is the alternative) and NOT wet fenlands west (stilt-village topology and barge-network alternative)
distribution:
  who_can_do_it:
    - heartland connector-route stationkeeper families
    - highland clan-territory stationkeeper families
    - mountain-east valley-pass stationkeeper families
  who_cannot_easily_do_it:
    - drylands caravan-town households (caravan-rotation social form structurally incompatible)
    - fen stilt-village households (no buildable foundation along bog-causeway routes; barge-network handles equivalent function)
  why_not_universal:
    - drylands water-cistern logistics make rotating caravan-train cistern-management economically superior to fixed-station resupply; caravan-rotation IS the cistern-management mechanism (per Systems/Economy critic refinement at Phase 6b synthesis)
    - fen stilt-village topology has no buildable foundation along bog-causeway routes; trade flows are barge-dominant per ECONOMY §Trade Flows; road-network density structurally absent
    - within heartland, canal-corridor parallel infrastructure handles canal-bound trade; waystations populate OVERLAND CONNECTOR ROUTES BETWEEN canal towns where canal traffic does not run, NOT canal-bank parallel infrastructure (charter-inn proprietors in canal towns capture canal-stop hostelry; family waystations operate where they are needed)
    - investment scale per waystation is too small for chartering economics (single household, modest infrastructure, one route-segment); guild formation would impose overhead the family-fragmented sites cannot support — non-chartered status is structurally stable
    - inheritance-burden-versus-walking-away tension is itself a stabilizer; family pressure plus the placement-right value retains most inheritors, while the recognized self-exile pathway prevents suppressed-inheritor pressure from accumulating into broader institutional crisis
costs_and_limits:
  - waystation enterprise income is small but durable; bottom-copper to upper-copper traveler-service revenue per ordinary day, occasional silver from caravan-master long-haul resupply or estate-steward bulk supply contract
  - stationkeeper-child labor begins from young (chore-bound by age 6-7 in many families, earlier than the canal-town age-ten apprentice norm per EVERYDAY_LIFE §(a) line 18); in-kind compensated (room, board, eventual placement-right) rather than wage-paid; this is parallel-but-distinct from chartered apprenticeship and does NOT displace charter-school enrollment in adopting chartered polities, though informal tension is recognized
  - placement-right is HERITABLE and PARTIBLE (multi-heir succession generates inheritance-docket pressure paralleling CF-0032 subsection-apprenticeship placement-right) but FIXED-PHYSICAL-INFRASTRUCTURE-LOCKED — the right cannot be moved like a CF-0032 skill-credential or a CF-0031 ledger-mark; abandoning the station forfeits the right
  - SOC-3 coin-contract sacredness applies to traveler-service contracts but NOT to placement-right transfers themselves
  - bandit-fronting waystation (knowingly provisioning a raid-band or signaling corridor location for kickback) is recognized as a sharper-than-ordinary-fraud scandal and prosecutable under CF-0034 §(f) harboring-and-fencing standards; the failure mode is real where stationkeeper-family or inheritor self-exiles into banditry (Breakage Point sub-exposure)
  - waystation insolvency (corridor-season closure, trade-route reroute, multi-heir inheritance-dispute litigation) is a slow-rolling economic-failure mode parallel to CF-0034 abandoned-settlement feeder cascade at lower acuity
  - bandit-defense-of-waystation deployment by CF-0024 noble-retinue on estate-tenant waystations is CHARTER-SOUND retinue activity per CF-0034 §bandit-defense-of-tenant-land precedent (charter-sound where retinue defends estate-tenant land; magistrate liaison required for pursuit beyond estate-jurisdiction)
visible_consequences:
  - stationkeeper-family as recognizable household type in heartland artisan-quarter and connector-route villages, in highland clan-border settlements, and in mountain-east valley-pass communities
  - stationkeeper-child as recognizable life-stage with chore-from-young cadence; resignation-resentment register is ordinary kinship-friction texture in adopting-region households; "the boy chose his father's road" / "the daughter the road kept" / "kept the stop" / "walked the stop" enter regional idiom rotation paralleling existing CF-0021 kiln-smoke / CF-0024 unvouched-bard / CF-0028 ruin-door / CF-0031 ledger-mark / CF-0033 cordon-post / CF-0034 hollow-road / CF-0035 deep-wood / CF-0036 one-fur catechism extensions
  - 'marriage-broker catechism extensions in adopting-region households: "is the stop kept in the family?" (heartland connector-route cadence) and parallel highland and mountain-east cadences'
  - 'skip-rope rhyme in canal-town heartland charter-school child-register rotation: "one-stop, two-stop, the road runs long / three-stop, four-stop, the boy who walked is gone"'
  - 'tavern-bardic stop-keeper subgenre: oral-storytelling cadence in AES-1 register naming kept-stops and walked-stops without heroic framing; saga-fragment in highland register paralleling but distinct from CF-0034 lean-winter-walker third-person mourning ("his road was given; he gave it back")'
  - "waystation-supply-run bidirectional micro-trade-flow with adjacent settlements (settlement → waystation: grain, ale, fodder, candles, tack-repair; waystation → settlement: modest cash flow, traveler gossip, posted-contract intake, occasional bardic-circuit hosting); augments rather than displaces existing market-feeder networks"
  - "waystation as ordinary architectural type: roadside building, stable-and-supply-storage, traveler-rest space, sited somewhat-close to feeder settlement; fortified register adopted on wildland stretches where bandit-corridor exposure warrants it (paralleling CF-0034 chartered coaching-inn fortification register but at smaller scale — family waystations are NOT the chartered coaching-inn typology CF-0034 names)"
  - estate-steward ledger inclusion of waystation-tenancy entries on noble-estate land; dowager-gossip distinguishes "stations that have kept three generations" from "stations that turned over twice this decade"
  - CF-0034 wildland-road bandit-corridor texture is reframed as GAP-STRETCHES BETWEEN WAYSTATIONS rather than uniform unbroken stretches (clarification-of-meaning in the existing CF-0034 §Predator Zones bullet, NOT a content change to CF-0034's bandit-corridor commitment)
  - self-exiled stationkeeper-child pathway feeds existing precarious- stratum cohorts (urban poor / CF-0024 contractor entry-tier / CF-0034 bandit-recruitment) per Rule 3 absorption-not-elevation; the inheritor-who-stays sub-stratum is settled-resigned-respectable middle-rank, NOT precarious — the dramatic register is frustration/resentment, not destitution
  - "clan-territory waystation under clan-elder sanction: clan-burning of bad-actor stationkeeper paralleling CF-0021 grimoire-burning cadence; cleansing-rite-equivalent for self-exiled child where custom permits return; saga-fragment for the walked-stop child in distinct cadence from CF-0034 lean-winter-walker mourning"
