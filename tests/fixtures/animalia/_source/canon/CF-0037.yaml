notes: |
  Composite institution with historical_process and social_role sub-aspects per proposal-normalization.md §Composite facts. Primary type: institution per the rubric — the family-handled waystation as enterprise form is the primary entity that EXISTS; the multi-generational tradition (heritability) and the stationkeeper-as-inherited-life-path are operational expressions. Sub-types documented in statement and notes per template precedent (CF-0021 / CF-0029 / CF-0034 / CF-0035 composite patterns).
  Phase 11 verdict: ACCEPT_WITH_REQUIRED_UPDATES. Phase 6b multi-critic synthesis surfaced no blocking findings; convergent ACCEPT-with-required- annotations across all six critics (Continuity Archivist, Systems/Economy, Politics/Institution, Everyday-Life, Theme/Tone, Mystery Curator). See adjudications/PA-0011-accept_with_required_updates.md for full Phase 0–11 analysis, the six critic sub-agent reports, and the Phase 14a Validation Checklist.
  Three Mystery Reserve firewall extensions land via this CF and are committed in MR file under CH-0012 attribution:
  - M-7 sub-specialty holding clause: named stationkeeper reputations are
    absorbed within the existing CF-0024-adjacent contractor-veteran
    patterning OR within ordinary tradesperson-reputation register; NOT a
    sixth M-7 reputation-genealogy cohort. Disallowed cheap answer added:
    "Named legendary stationkeeper whose memory resolves road-corridor /
    Maker-Age / progenitor-figure questions — forbidden reveal."

  - M-11 cross-application firewall: waystation multi-generation continuity
    is FAMILY-ECONOMIC PHYSICAL-INFRASTRUCTURE inheritance, mechanistically
    DISTINCT from CF-0031 contamination-lineage three-generation
    administrative interval. Longitudinal stationkeeper-family data MUST
    NOT be reified as parallel contamination-heritability evidence. The
    waystation pattern uses different inheritance vocabulary, different
    custody (no civic-registry contamination-record), and different
    mechanism (physical-infrastructure succession). Disallowed cheap
    answer added: "Stationkeeper-family multi-generation continuity
    reinterpreted as parallel data substrate to CF-0031 three-generation
    contamination-heritability administrative interval — forbidden reveal."

  - M-14 cross-reference clause: named stationkeeper-children-turned-bandit-
    captains accrue mythography WITHIN the existing M-14 antagonist-
    mythography register; NOT a new M-N entry. Self-exile-to-banditry
    biography is corridor-mobility texture, not ontological mystery. The
    "stationkeeper-bandit-captain" register is an enrichment of M-14, not
    a parallel surface; the four contested readings (historical-individuals
    / composite-figures / pure-invention / mixed) apply identically.

  Per Continuity Archivist: the proposal does NOT touch M-1 / M-2 / M-3 / M-4 / M-5 / M-6 / M-8 / M-9 / M-10 / M-12 / M-13 / M-15 / M-16 / M-17 / M-18. Per Mystery Curator: NO new Mystery Reserve entry is recommended. The waystation tradition antiquity question (Charter-Era-consolidated vs older folk practice) lacks the progenitor-cult sectarian entanglement that gives M-12 oversize-saddlery antiquity its productive contestation; it belongs in OPEN_QUESTIONS.md as ordinary author-side deferral, NOT in MYSTERY_RESERVE.md. Rule 7 obligation discharged with documented negative finding.
  MINOR operational docket commitment (paralleling CF-0034 bandit-extradition / CF-0035 trophy-legality / CF-0036 silence-protocol-unsealing minor docket patterns): waystation-succession disputes, estate-vs-family tenancy disputes, bandit-fronting prosecutions, civic-registry tenancy-recordation disputes are MINOR operational magistrate docket items, NOT a sixth Charter-Era polity-asymmetric structural disagreement axis. Uncontested-tradition-consensus and uncontested-suppression-consensus on bandit-fronting hold; polity disagreement is operational-regime variation only. Latent-burden watch: if polities develop structurally divergent CHILD-CONSCRIPTION-PROTECTION conventions (mandatory charter-school-vs-station-labor adjudication), the MINOR docket could harden into a sixth polity-asymmetric axis — tracked per CH-0012, NOT current structural reality. THREE other latent sixth-axis watch-items already tracked (CF-0034 / CF-0035 / CF-0036); this is now the FOURTH watch-item — the cumulative latent-watch register signals approaching saturation but does not yet constitute a Charter-Era rupture.
  Stabilizer set per Phase 7 counterfactual (5 concrete mechanisms): (i) drylands caravan-rotation cistern-management mechanism prevents drylands universalization; (ii) fen stilt-village topology + barge-network alternative prevents fenland universalization; (iii) heartland canal-corridor parallel infrastructure scopes waystation footprint to overland connector-routes between canal towns; (iv) investment-scale + family-fragmented site distribution prevents guild-cartel formation; (v) inheritance-burden-versus-self-exile tension is itself a stabilizer (placement-right value retains most inheritors; self-exile pathway prevents suppressed-pressure accumulation).
  Per Theme/Tone critic: in-register cadence committed — "kept the stop"; "walked the stop"; "took the keys"; "the boy chose his father's road"; "the daughter the road kept". Out-of-register cadence FORBIDDEN — heroic-escape / chosen-one-orphan / child-labor-exploitation / cozy-tavern-sanitization / Hardy-rural-tragedy melodrama. The bardic-circuit tradition withholds heroic-cycle status from stationkeeper material (per WORLD_KERNEL.md What Is Taboo extension); the runaway-stationkeeper bardic figure is named in third-person mourning paralleling CF-0034 lean-winter-walker register, NOT chosen-protagonist register.
  Three new natural story engines added to WORLD_KERNEL.md per Theme/Tone critic recommendation, in established additive cadence.
  Phase 12a modification_history scan results: axis (a) derived_from_cfs empty per pre-scan verification (CF-0024 / CF-0034 / CF-0032 / CF-0031 are cross-references, not derivation parents); axis (b) Phase 8 soft contradictions identified CF-0034 wildland-road bullet annotation as substantive extension; axis (c) Phase 9 substantive extensions: CF-0034 bandit-corridor texture is reframed by waystation presence. CF-0034 receives the only modification_history entry under CH-0012. CF-0024 / CF-0032 / CF-0031 are cross-references with no content extension; no mod_history entries for those CFs.
  Rule 3 dual-disposition for stationkeeper-child stratum (resolved productive Systems/Economy-vs-Politics/Institution Phase 6b critic tension via TWO-POPULATION distinction): inheritor-who-stays NAMED DISTINCTLY in ECONOMY §Inequality Patterns as settled-resigned- respectable middle-stratum (where the dramatic register lives — kinship-frustration register is ordinary household texture, NOT precarity or welfare-record); inheritor-who-walks ABSORBED INTO existing precarious strata (urban poor / CF-0024 contractor entry-tier / CF-0034 banditry recruitment-feeder cohorts; sixth named source-vector for CF-0034 recruitment-feeder pattern, ABSORBED per Rule 3 firewall, NOT elevated to a distinct welfare/precarity category). The two-population distinction is load-bearing — absorbing the staying-inheritor would erase the dramatic register that motivates the institution; naming the walking-inheritor distinctly would specialness-inflate a cohort that structurally feeds existing precarious strata.
  Modified 2026-04-20 by CH-0018 (CF-0047): firewall clause added — CF-0047 drylands well-keeper lineage-inheritable customary-authority role is CATEGORICALLY DISTINCT from CF-0037 family-handled waystation tradition and MUST NOT be conflated. The distinction operates along three load-bearing axes per CF-0047 costs_and_limits: (i) ANCHOR-TYPE — well-stop is WATER-NODE-ANCHORED (the well IS the asset; non-relocatable, drought-volatile in asset-value across cycles); waystation is ROAD-REST-ANCHORED (the road IS the asset; trade-flow-volatile across canal-extension and seasonal-pass cycles); water-node vs road-rest-node is the primary categorical firewall. (ii) CIVIC BACKING — well-stop placement-right is CUSTOMARY-NOT-CIVIC-REGISTRY-BACKED (drylands institutional thinness per CF-0046 substrate precludes civic-registry subsidiary-record capability for well-stop tenancy); waystation placement-right is CIVIC-REGISTRY-BACKED in chartered heartland polities (with clan-elder / estate-steward alternatives). (iii) REGIONAL PRESENCE — well-stop is DRYLANDS-PRESENT-ONLY (CF-0046 geographic substrate); waystation is HEARTLAND / HIGHLAND / MOUNTAIN-EAST-PRESENT and DRYLANDS-STRUCTURALLY-ABSENT per CF-0037 Stabilizer (i) preserved ("drylands water-cistern logistics make rotating caravan-train cistern-management economically superior to fixed-station resupply; caravan-rotation IS the cistern-management mechanism"). CF-0037 drylands-exclusion stabilizer is **PRESERVED** through this categorical distinction, NOT scope-retconned — the well-stop is a categorically different institutional object occupying a categorically different geographic-substrate position; CF-0037 does NOT expand to include well-stops. The idiom pair *"kept the stop"* / *"walked the stop"* (CF-0037, heartland / highland / mountain-east) and *"kept the well"* / *"walked the well"* (CF-0047, drylands) coexist as parallel cadence registers — drylander caravaner's dryly-amused note *"the southern road keeps no stop"* remains intact and now coexists with the CF-0046 complement *"the southern road keeps the corridor"*. CF-0037 scope, distribution, and stabilizer structure unchanged; the well-keeper tradition is a parallel-but-distinct institutional form at drylands scale, not a drylands-extension of family-handled waystation tradition. Per Rule 6 audit-trail preservation: this modification_history entry documents the Phase 8 soft-conflict resolution that preserves CF-0037 drylands-exclusion; a future reader of CF-0037 alone needs to know about CF-0046/CF-0047 to avoid conflating the two institutional objects. Adjudication record: adjudications/PA-0017-accept_with_required_updates.md.
