statement: |
  A visible moral/religious minority of veterans, clergy, clan-elders, and civilians refuse artifact-related contract work on principle. The refusal is ethical rather than metaphysical — it does not imply any world-level claim about artifacts, vessel-agencies, or Maker-Age cosmology. Refusers come from several doctrinal strands: a reform current within common- pantheon clergy that treats refusal as moral witness against hazard- commission traffic; a doctrinal strand in some progenitor-cult lineages (distinct from progenitor-supremacy sectarianism) that treats artifact work as desecration; a Maker-skeptical conviction in certain scholarly and sectarian circles; biographical refusal after witnessing a bad job; personal oath. The tradition carries weight in inheritance disputes, civic advisory roles, and bardic-circuit reputation. It creates theological friction with common-pantheon clergy who accept hazard- commission payment from chartered guilds, and it provides an organized moral stance distinct from sectarian progenitor-supremacy. Refusal is genuine labor-market action — principled refusers often take non- artifact-adjacent contracts (caravan escort, wildlife, mundane skirmish mercenary work) to demonstrate that the refusal is specific and moral, not generic work-avoidance.
status: hard_canon
title: Principled-refuser tradition — ethical refusal of artifact-fallout work
truth_scope:
  diegetic_status: objective
  world_level: true
type: belief
visible_consequences:
  - reform-current common-pantheon clergy publicly witness against fallout-traffic exploitation
  - progenitor-cult lineage-keepers in certain traditions teach refusal as clan or lineage virtue
  - clan-burning of contract-tokens (marked stick or posted leaf) when a contract is refused on principle in highland clans
  - refuser-lineages in highland communities accrue distinct prestige from warrior-lineages; sometimes marry exclusively within refuser-strand families
  - bardic subgenre of the refusal-tale travels as moral witness
  - estate hiring filters track which candidates refuse artifact-adjacent work
  - civic advisory roles disproportionately filled by refuser-reputation figures in some polities
  - common-pantheon clergy who accept hazard-commission payment come under theological pressure from reform currents
  - marriage and inheritance disputes sometimes name refuser status as relevant character evidence
