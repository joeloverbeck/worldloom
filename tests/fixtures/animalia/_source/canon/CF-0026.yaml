contradiction_risk:
  hard: false
  soft: false
costs_and_limits:
  - refusers earn less than comparable non-refuser veterans (opportunity cost is real)
  - refusers are sometimes treated as moral-superior and sometimes as self-righteous — reputation effect is bimodal
  - the tradition creates theological friction with clergy who accept hazard-commission payment
  - sectarian progenitor-supremacy movements sometimes brand refusers as disloyal to progenitor authority
  - refusal is ethical only — it does NOT imply world-level claims about artifacts, vessel-agencies, or Maker-Age (ONT-2 / M-1 / M-6 firewalls)
distribution:
  who_can_do_it:
    - any adventurer-contractor across species and class
    - clergy in both religious systems (though with different doctrinal framings)
    - clan-elders in highland communities
    - civilians in household decisions about hiring and marriage
  who_cannot_easily_do_it:
    - adventurer-contractors who cannot afford to refuse well-paying work (market-position gate)
    - those in dire economic circumstances
  why_not_universal:
    - economic pressure drives many toward fallout work despite doctrinal preference
    - the tradition is genuinely a minority position, not mainstream
    - sectarian progenitor-supremacy movements actively recruit veterans (countervailing pressure)
domains_affected:
  - religion
  - law
  - status_signaling
