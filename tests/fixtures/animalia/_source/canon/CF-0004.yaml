contradiction_risk:
  hard: false
  soft: false
costs_and_limits:
  - Maker-Age artifact supply is finite; modern creation adds a marginal trickle that does not meaningfully replenish the artifact pool
  - knowledge of artifacts is fragmentary and empirical
  - modern crafted artifacts cannot reach catastrophic-class effect (M-2 boundary)
distribution:
  who_can_do_it:
    - the vanished Maker civilization (historical, terminated)
    - modern crafters at marginal volume per CF-0021
  who_cannot_easily_do_it:
    - all living people for catastrophic-class artifacts (no one can make these; M-2 boundary)
    - all living people for Maker-equivalent quality (technique unrecovered at full fidelity)
  why_not_universal:
    - the full Maker technique is lost; whether it could ever be fully relearned remains mystery M-2
    - modern attempts are constrained by the stabilizers in CF-0021
domains_affected:
  - magic
  - religion
  - memory_and_myth
  - settlement_life
