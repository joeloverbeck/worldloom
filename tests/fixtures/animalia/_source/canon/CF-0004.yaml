notes: |
  Anchors mystery reserve M-1, M-2, M-5. The "vanished prior civilization" framing is implied by the brief's reference to ancient artifacts of unknown origin. Modified 2026-04-18 by CH-0002 (CF-0021): qualified to acknowledge the marginal modern crafter stream. Maker Age remains dominant origin by orders of magnitude. The qualification is logged here per Rule 6 (No Silent Retcons). The modern parallel is interpretively suggestive only with respect to Mystery Reserve M-1 — it does NOT constitute evidence at world level for any M-1 hypothesis (in particular, the "they consumed themselves with their own magic" cautionary reading gains diegetic traction without world-level confirmation). Modified 2026-04-18 by CH-0004 (CF-0027): qualified to acknowledge non-guild-primary expedition recovery pathway. Chartered extraction-guild recovery remains the dominant modality for piecemeal Maker-Age finds (DIS-1); patron-funded ruin-expedition ventures (CF-0028) recover from enterable ruin sites (CF-0027) as a parallel channel, operating in polity-asymmetric tension with CF-0008 and disposing via CF-0030 funder-primacy convention through chartered-broker channel in tolerant polities. Maker-Age origin remains dominant by orders of magnitude; expedition-era recovery is episodic and wealth-gated. No expedition yields civilization-identity answers at world level (M-1 anti-accumulation firewall in CF-0027); no catastrophic-class finds are within the recoverable domain (M-2 preserved by CF-0027 / CF-0029 scope boundaries). Modified 2026-04-20 by CH-0014 (CF-0039, CF-0040, CF-0041): Maker-Age attribution extended via three CH-0014 CF commitments — (a) CF-0039 destruction-resistance is a property of Maker-Age artifacts that does NOT transfer to modern crafter outputs (CF-0021 scope boundary preserved); (b) CF-0040 commits the mundane-tier as EXPLICIT NAMING of the DIS-1 "most inert junk" band (most of the Maker corpus is low-tier active, inverse strength-rarity relationship); (c) CF-0041 commits Maker-Age deliberate-burial practice with four firewalls (M-1 anti-evidence, M-8 distinct-origin, M-9 anti-custody-channel, M-10 FOURTH anti-predictor); Maker-sealing technique is LOST (not in CF-0023 leaked corpus; not reproducible by CF-0021 crafters). All three extensions preserve M-1 cause-of-fall as bounded unknown.
