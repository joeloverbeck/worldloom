source_basis:
  derived_from:
    - CF-0003
  direct_user_approval: true
statement: |
  The vast majority of magical artifacts in Animalia were made by a vanished prior civilization (the "Maker Age") in centuries-to-millennia past. The civilization's identity, geographic extent, and cause of fall are unrecovered. Modern crafters can attempt to make new artifacts (CF-0021), but their outputs are marginal in volume, inferior in stability and power, and never reach catastrophic-class effect; the Maker Age remains the dominant artifact source by orders of magnitude.
status: hard_canon
title: Magical artifacts predominantly originate in the Maker Age
truth_scope:
  diegetic_status: objective
  world_level: true
type: historical_process
visible_consequences:
  - Maker substructures are encountered when digging foundations or canal beds
  - artifact-extraction guilds specialize in recovery from Maker sites
  - Maker-skeptical and Maker-mystic sectarian movements both exist
  - cosmologies vary in how they position the Makers (ancestors, demons, failed gods)
  - authentication specialists distinguish Maker-Age artifacts from modern crafted work by craft signature
