  soft: true
notes: |
  Proposed as part of CH-0014 four-CF bundle. Per Phase 6b synthesis, the mundane tier is explicitly committed as a subset within DIS-1's "most inert junk" band, NOT a new distribution tier (Rule 3 firewall per Theme/Tone critic). Per-artifact CAU-1 cost annotation is mandatory (AES-3 preservation) — no useful mundane artifact escapes contamination clause. Per-region ordinary-life signatures committed per Everyday-Life critic (fenlands institutional-absence preserved — marker-reed relay, not drill; highland clan-elder sanction, not drill; drylands caravan-refusal + qanat-cleaning-rite, not drill; canal-heartland dredger protocol and ward-inspector triage IS a drill-register). Authentication-cartel eighth-stream pressure ABSORBED into existing cartel formation (Rule 3 firewall per Economy + Politics critics). Per-polity finder-fee wage-schedule is DEFERRED to OPEN_QUESTIONS (new §Mundane-Tier Finder-Fee Wage Schedule entry). Adjudication record: adjudications/PA-0013-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0015 (CF-0043): extension — Ash-Seal (CF-0043) Brinewick-specific intake-tier handoff-boundary commits that mundane-tier finds in Brinewick stay with the chartered-extraction-guild inspector's office mundane-find intake-tier (license-low-floor regime) and are NOT routed to Ash-Seal — Ash-Seal handoff threshold is at ABOVE-MUNDANE tier. The boundary between mundane-tier (civic-handled per CF-0040) and above-mundane (Ash-Seal-handled per CF-0043) is mostly empirical at the inspector-office classification layer; civic-quarter authentication-specialist classifies findings per CF-0021 cheap-end classification layer. Boundary is Brinewick-local; non-Brinewick polities maintain standard chartered-extraction-guild handling for all tiers. CF-0040 mundane-tier scope categorically unchanged; the handoff-boundary is operational Brinewick-institutional-variant documentation, not a scope revision.
