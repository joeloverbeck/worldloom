costs_and_limits:
  - most bandit bands are small (fewer than a dozen), short-lived (low survival past two winters), and peripheral in civic memory except when they produce a named captain who lasts longer
  - raid-and-enslave subset is geographically LOCAL to isolated / weak-charter / demographically-fragile regions — highland hamlets, drylands oasis-stops, isolated mining hamlets, occasional fen stilt-villages; the subset is NOT continent-wide and MUST NOT be read as such (Rule 4 scope stabilizer)
  - bandit occupation of Maker-Age ruin sites is SHELTER-SCOPE and preferentially occurs in previously-accessed, non-guardian-active, non-catastrophic-class subset per CF-0027 anti-accumulation and CF-0029 guardian-wipe enforcement
  - bandit-survivor folklore about "safe" versus "unsafe" ruins is SELECTION-BIAS FOLKLORE, NOT a world-level guardian-predictor; any institution treating bandit-corridor-lore as guardian-absence empirical data is making a category error — M-10 firewall load-bearing (first cross-application of M-10)
  - bandits cannot wield functional Maker-Age artifacts — CAU-1 requires trained extraction and containment; SOC-4 monopolizes extraction/containment/neutralization/brokerage by guild charter; bandit-trafficked artifacts are dead-weight loot for black-market disposal through CF-0023 grimoire-corridor / CF-0028 ruin-cartography / stolen-goods-fencing channels
  - bandit-custody of recovered ruin-material and trafficked crafted artifacts routes through the EXISTING black-market channels per CF-0023 / CF-0028 — bandit-custody is a ROUTE through established custody channels, NOT a new seventh Maker-knowledge custody channel (M-9 firewall)
  - bandit-survivor tactical observation of guardian-activation circumstances is PROCEDURAL-TACTICAL, NEVER MECHANISTIC — parallels CF-0033 dragoon perimeter-lore firewall exactly (M-8 firewall extension)
  - bandit-hunter veteran reputations are subject to M-7 firewall at FIFTH-COHORT PARITY with extractor-veteran, expedition-veteran (CF-0028), subsection-master (CF-0032), and retired-dragoon (CF-0033) cohorts; hunter field-lore is procedural-tactical survivor-bias competence, not historical authority about pursued captains
  - settlement-hired HUNTER-CONTRACTORS, NOT DRAGOONS, are the civic bandit-response institution; CF-0033 dragoon engagement with bandits occurs ONLY via the narrow ward-breach perimeter or black-market artifact-traffic predicate, and magistrate predicate-declaration is REQUIRED at cross-predicate pursuit — this CF does NOT license dragoon mission creep (M-13 boundary defense)
  - slave-holding by bandit groups is SMALL-SCALE and SHORT-DURATION, limited by logistical capacity (supervision, food, shelter, containment) — no bandit group fields a slave-barony or holds captives beyond a handful and a few months reliably; most captives are ransomed, killed, or escape
  - widow-of-the-raid is ABSORBED into CF-0024 widow-of-the-job category as idiom-extension (*"did your kin come back from the raid?"* is the marriage-broker catechism extension in corridor-exposed districts) — NOT elevated to a seventh widow/retiree stratum (Rule 3 specialness-inflation firewall)
  - stolen-goods fencing is the FIFTH PRODUCT-LINE on the canal-corridor illegitimate-service rail (joining CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0031 registry-scrubber, CF-0033 dragoon-kit counterfeit), materially intensifying the authentication-cartel formation incentive already flagged at CF-0033 as strongest in the Layer-4 stress register
  - bandit-extradition across polity lines is a MINOR operational magistrate docket line, NOT a sixth structural Charter-Era asymmetry axis — every polity agrees bandits should be suppressed; disagreement is only operational; potential sixth-axis development tracked as latent burden in CH-0008 + OPEN_QUESTIONS watch-item
  - register discipline is LOAD-BEARING — FORBIDDEN framings include heroic-outlaw romanticization, rebel / liberator / folk-hero / free-company / brotherhood / code / honor-among / outlaw-king / chosen-one-bandit-hunter / species-coded-victimhood; REQUIRED framings treat bandit-hunting as pensionable dangerous labor in AES-1 register and render rape/enslavement trauma in aftermath-in-household-vocabulary (cleansing-rite refusal, marriage-broker catechism, village-council silence), NEVER event-in-prose
distribution:
  who_can_do_it:
    - desperate or criminal displaced persons of any species
    - clan-exiles and guild-blacklisted
    - survivors of sealed or raid-abandoned settlements
    - debt-dispossessed tenants and brutal-winter household-dissolution survivors
    - failed-reputation CF-0024 contractors and CF-0021 failed-kiln-explosion apprentices
  who_cannot_easily_do_it:
    - civically integrated households with functional civic welfare
    - chartered guild members in good standing
    - tenant households under functional estate stewardship
    - highland clan-welfare recipients absorbing winter shocks through hearth-care
    - adopting-polity ward-resident families with CF-0033 dragoon-adjacent civic ties
  why_not_universal:
    - seasonal winter-kill attrition through exposure, starvation, and internal violence in shelter
    - brutality-gradient is self-limiting because worst bands attract escalated suppression (bounty-premium rises with brutality; militia and contractor response intensifies)
    - geographic corridors are bounded by civic population distribution — most of the world is not under-policed wildland
    - recruitment feeders are finite and partially absorbed by civic welfare (monastic clinic, clan hearth-care, CF-0031 contamination-lineage ledger-mark in adopting polities)
    - internal band-mortality from no-charter-no-enforcement dispute collapse (succession fights, shared-loot disputes, desertion)
    - civic-memory-based suppression priority operates via bardic cycles plus Predator Zones mapping plus reputation-based prioritization
    - logistical slave-holding limits (supervision, food, shelter, containment constraints) prevent slave-barony scale
    - hunter-contractor market is active and paid out of settlement, estate, merchant, and guild treasuries
    - functional Maker-Age artifact power is categorically unavailable to bandits by CAU-1 (artifact effects always cost) plus SOC-4 (artifact extraction is guild-licensed) invariant structure — bandit-trafficked artifacts are dead-weight loot for black-market disposal, not wielded power
    - CF-0029 guardian-wipe selection eliminates bands that occupy catastrophic-class guardian-active ruins
