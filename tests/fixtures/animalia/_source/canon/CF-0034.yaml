statement: |
  Banditry is an endemic, ongoing social pattern in Animalia, as old as the settled continent and as current as last winter. Groups of sentient inhabitants — humans and animal-folk of any cluster — pushed out of civic order by criminal exile, debt collapse, brutal-winter household dissolution, sealed-quarter or raid-abandoned settlement dispossession, guild blacklist, or clan sanction, camp or settle in wilderness beyond popular roads, cities, and well-defended settlements. They use caves and previously-accessed, non-guardian-active, non-catastrophic-class Maker-Age ruin-subset as shelter, and ambush travelers and caravans in customary bandit corridors to rob or to demand ransom. Methods vary along a gradient — some bands refuse to kill (in stated moral principle or to avoid harsher hunting), some kill to eliminate witnesses, and in isolated, weak-charter, or demographically-fragile regions some raid settlements to steal, kill, commit rape, and take prisoners as slave labor or sexual captives, with captive retention limited by logistical capacity. Where activity becomes intolerable, affected settlements, merchant coalitions, chartered-estate tenants, and artifact-extraction guilds commission hunter-contractors via bounty-contract; bandit-hunting is a CF-0024 adventurer-contractor subtype, pensionable dangerous labor, NOT heroic quest work. This CF formalizes the endemic pattern already implicit in GEOGRAPHY.md §Predator Zones "Bandit corridors," in CF-0017 and CF-0024 costs_and_limits references to bandit losses, and in INSTITUTIONS.md §Military/Defense "suppress banditry" function.
status: hard_canon
title: Endemic banditry as historical-process
truth_scope:
  diegetic_status: objective
  world_level: true
type: historical_process
visible_consequences:
  - rural households know which roads are safe and hire escort for wildland travel; caravans join together for defense and refuse rotation into known bandit-hot corridors
  - fortified coaching-inns, walled caravanserai, and village stockades are architectural markers of exposure districts; canal-corridor heartland row-cottages do not themselves fortify because canal travel is relatively bandit-safe
  - settlement-hired bounty-contracts are posted alongside CF-0024 contractor postings on tavern boards and lockmaster walls, typically at a distinct "bounty wall" beside the lockmaster's door in larger heartland canal towns
  - contracted-bard narrative-custody develops a bandit-hunter reputation subgenre alongside ruin-cycle (CF-0028), dragoon three-layer (CF-0033), contracted-veteran (CF-0024), subsection-master (CF-0032), and specialist (CF-0025) subgenres — four named sub-subgenres within the bandit-material register (raid-lament, hunter-return, named-captain cycles, bounty-ethics broadsides)
  - bardic moral-witness-refusal threshold operates — no ballad for a captain whose camp held slaves beyond threshold in mainstream traditions; sectarian-commissioned bards violate this threshold for pro-supremacist recruitment and listeners mark the breach
  - highland cleansing-rite REFUSAL for returned band-members who committed kill-witnesses or raid-and-enslave acts — heavier than standard CF-0024 cleansing-rite and categorically distinct from CF-0028 ruin-silence-oath; returnee remains under permanent exile or undertakes extended atonement few clans offer
  - marriage-broker catechism in heartland and estate households extends to *"did your kin come back from the raid?"* paralleling the CF-0031 ledger-leaf question in corridor-exposed districts
  - recovered-slave reintegration is FRAUGHT — common-pantheon restoration rite is available in some polities, communities vary in acceptance; reform-current clergy minister to raid-widows and raped survivors in fallout-ministry register paralleling CF-0025 pastoral specialty
  - tea-house scribes in some drylands traditions refuse to witness ransom-contracts, treating coerced-negotiation as incompatible with coin-contract witness practice
  - fen stilt-villages maintain silent-rule discipline around bandit-approach alongside amphibian-canary contamination-drift signal; "the raid that sank Low Reed" is a village-memory register category alongside sunken-ruin and drowned-runner cycles
  - children learn warn-rhymes about strangers on empty roads and skip-rope rhymes about hollow camps; children in exposed-district households learn not to speak of household wealth or harvest timing to unvouched travelers
  - reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between bounty-hunting-as-civic-hazard-commission-moral wing and bounty-execution-abolitionist wing campaigning for trial instead of summary killing — paralleling CF-0031 / CF-0033 bifurcation templates
  - progenitor-cult supremacy movements exploit bandit rhetoric for species-specific retinue authority (paralleling CF-0024 recruitment) — *"the clan can defend itself, the charter cannot"* is a standing supremacist refrain in highland and fenland sectarian recruiting
  - noble-retinue deployment for bandit-defense of tenant land is the MOST CHARTER-SOUND retinue deployment available — civic watch does NOT routinely challenge it, and the deployment strengthens the CF-0024 retinue pattern within Charter-Era bounds
  - estate-steward ledger tracks tenant-cottage raid-exposure alongside tenant contamination-registry status (per CF-0031 coordination) and dragoon-charter magistrate-liaison burden (in adopting polities, per CF-0033 coordination)
  - bandit-hunter contract pay-tier is a named CF-0024 subtype — upper copper to mid silver, risk-loaded, with ransom-recovery bonus clauses (partial bimodality paralleling CF-0028 expedition-share but lower volatility); raid-and-enslave-band captures yield both top-tier bounties and the hardest living-retrieval work
  - ransom-broker matchmaking emerges as unchartered role paralleling CF-0024 contract-matchmaker — SOC-3 coin-contract sacredness does NOT apply because transaction counterparts include non-consenting captive and criminal captor; licensing deferred to OPEN_QUESTIONS
  - abandoned-settlement survivors join the EXISTING refugees-from-sealed-quarters precarious stratum per ECONOMY §Inequality Patterns — NOT a new category
  - bandit-corridor trade-flow disruption and abandoned-settlement feeder cascade are named ECONOMY §Breakage Points; veteran-pool multi-claim cannibalization reaches six-to-nine concurrent claims depending on polity
  - named bandit-captains enter bardic memory with a cadence distinct from named-veteran cadence; their historicity is contested per new Mystery Reserve M-14 — the bardic named-captain register is a civic-mobilization propaganda object distinct from M-7 specialist-reputation register
