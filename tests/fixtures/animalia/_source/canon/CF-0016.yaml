id: CF-0016
title: Common Pantheon coexists with Species-Progenitor Cults
status: hard_canon
type: belief
statement: |
  Animalia's religious life is structured by a Common Pantheon of named gods worshipped across species, intersecting with Species-Progenitor Cults that honor mythic species-progenitor figures. The Charter-Era settlement folded most progenitor cults into civic religious life by treating progenitors as aspects of pantheon gods, but this compromise is contested by sectarian progenitor-supremacy movements.
