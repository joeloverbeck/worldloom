notes: |
  Composite regional-institutional-cultural complex CF paralleling CF-0038 (Brinewick composite city) and CF-0033 (dragoon-adoption multi-axis) precedents for bundling multiple institutional strands into one CF rather than fragmenting across many narrow CFs. Primary type `institution` with secondary attachments enumerated per CH-0018 ONTOLOGY composite annotation (institution + route + ecological_system + text_tradition + historical_process + law/custom). Co-proposed with CF-0047 (drylands well-keeper as named customary-authority social role); the two CFs cross-reference tightly — CF-0047 operates within CF-0046's corridor- complex substrate, and CF-0046 names well-keeper as the corridor-node lineage-inheritance role.
  CF-0037 soft-conflict resolution: water-node / road-rest-node firewall PRESERVES CF-0037 drylands-exclusion stabilizer through categorical distinction rather than scope-retcon — CF-0037 remains heartland/highland/ mountain-east-present and drylands-structurally-absent (family-handled waystation tradition); CF-0046/CF-0047 operates at drylands-scope with water-node-anchored household-enterprise as categorically distinct institutional form. CF-0037 receives modification_history entry at CH-0018 under axis (b)/(c) substantive extension — a future reader of CF-0037 alone needs to know about CF-0046/CF-0047 to avoid conflating the two. "The southern road keeps no stop" (CF-0037) remains intact; "the southern road keeps the corridor" (CF-0046 complement) coexists.
  Reading 1 committed on trade-tongue interpretation: existing DIS-2 Animalia cross-community commercial lingua-franca applied in drylands corridor context, NOT a new distinct drylands-specific language. Smaller, more canon-consistent commitment per user confirmation at Phase 0 interpretive question. Reading 2 (distinct caravan-tongue) can be revisited in future canon work if story-demand requires.
  Six CFs receive modification_history entries at CH-0018: CF-0024 (axis a from CF-0046 derived_from; caravan-master adjudication extension to caravan-rotation frame), CF-0031 (axis c; drylands registry-thinness alternative-institutional-substrate reason), CF-0033 (axis c; runner- militia ≠ dragoon-precursor firewall), CF-0034 (axis c; caravan-master corridor-adjudication extends waiting-wolves judgment register), CF-0037 (axis b/c; water-node/road-rest firewall), CF-0044 (axis a from CF-0047 derived_from; well-keeper formalized as verse-book custodian institutional convention).
  CF-0017 is cross-referenced but does NOT receive modification_history — per axis-(c) decision test, CF-0017 is not substantively extended by CF-0046 (station-log convention is parallel cross-regional commitment, does not add content to CF-0017 that a future reader of CF-0017 alone would need to know to read CF-0017 correctly).
  Phase 12a modification_history scan axis-(a) pre-scan verification per SKILL.md discipline: derived_from pared to [CF-0024, DA-0001] — CF-0009 copper/silver currency, CF-0034 caravan-master cargo-refusal, CF-0041 qanat-cleaning-rite, CF-0044 verse-convention, DIS-2 partial- literacy are prerequisite-substrate references (captured in prerequisites field) rather than axis-(a) derivation parents; only CF-0024 genuinely EXTENDS the new CF's content (caravan-rotation frame + caravanserai posting-board substrate that CF-0046 builds institutional- complex superstructure on). DA-0001 is diegetic pre-figuring per Rule 6 audit-trail preservation.
  Critic synthesis: six critics dispatched at escalation gate (13/13 exposition domains touched); all six lean accept-with-revisions with thirteen synthesized commitments integrated across CF costs_and_limits enumeration, invariant clarification annotations, Mystery Reserve firewall extensions, and domain-file patches. Systems/Economy critic contributed the load-bearing geographic non-transportability of canal- infrastructure stabilizer. Mystery Curator confirmed no new Mystery Reserve entries warranted (Rule 7 obligation discharged with documented negative finding; three firewall extensions sufficient).
  In-register language: "the corridor-complex," "the drylands corridor," "the well-stop," "the gate-stop," "the caravanserai," "the runner- reached militia," "caravan-master corridor-adjudication," "keeping-book," "station-log," "verse-counter," "reciprocity-primary economy," "coin-at-edges," "institutional thinness," "the southern road keeps the corridor," "drought-cycle keeping-book audit," "working-texture reputation," "trade-useful."
  Out-of-register language (forbidden paralleling CH-0016 CF-0044 cadence): "refined / sophisticated / cultured drylands," "lyrical drylands," "pristine pre-civic tradition," "pure reciprocity economy untainted by coin," "the drylands that coin had not yet corrupted," "legendary corridor," "the great caravan-master of the Southern Pass," "destined caravan-master," "noble caravan-master adjudicating in timeless wisdom," "corridor princes," "desert warriors," "the simple honest drylanders," "wise well-keeper," "ancient keeper-lineage," "hereditary verse-lord," "the great keeper of the Third Well," "keeper-elite," "verse-caste," "chosen well-line," "the venerable gate-custom."
