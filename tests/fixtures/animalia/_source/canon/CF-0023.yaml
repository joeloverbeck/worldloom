statement: |
  Partial translations of Maker-Age inscription fragments exist in the present world. They were produced over generations by chartered artifact-extraction guild researchers, civic-archive scholars, and a small number of monastic and private translators. No complete translation of any major text exists. The corpus of translated material is fragmentary, inconsistent, and contested; the most operationally useful subset (artifact-creation grimoires per CF-0021) has leaked from chartered custody and circulates on black markets. The full Maker-Age linguistic system remains unrecovered.
status: hard_canon
title: Partial translations of Maker-Age fragments exist, are restricted, and have leaked
truth_scope:
  diegetic_status: objective
  world_level: true
type: text_tradition
visible_consequences:
  - private libraries of partial-translation manuscripts in scholar households
  - black-market trade in leaked grimoire copies
  - sectarian use of fragmentary translations to support doctrinal claims
  - apprentice extractors and ward-wrights study (filtered) translations as part of training
  - civic prosecution of unauthorized translation copying in some polities
  - three-way custody contest (civic archive / artifact-guild / theological authority) intensified by the black-market fourth custodian
