contradiction_risk:
  hard: false
  soft: false
costs_and_limits:
  - translations are partial; meaning of any single fragment is contested
  - leaked grimoires (artifact-creation subset) may be incomplete or corrupted versions
  - no translation of any major Maker-Age text is complete; the linguistic system as a whole is unrecovered
  - Mystery Reserve M-1 / M-2 / M-5 are not resolved by what has been translated; the operationally usable subset (creation grimoires) does NOT contain catastrophic-class instructions
distribution:
  who_can_do_it:
    - chartered artifact-guild senior researchers
    - civic-archive translation scholars in larger polities
    - a small number of monastic translators
    - private scholars with means and access
  who_cannot_easily_do_it:
    - laypersons, illiterate populations, remote communities
  why_not_universal:
    - access to fragments is restricted; the work is slow and contested
    - no institutional tradition holds full custody
