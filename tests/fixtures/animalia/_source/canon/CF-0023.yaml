notes: |
  Forced by CF-0021 — modern crafter activity is impossible without partial translations existing. This commits what was previously deferred under OPEN_QUESTIONS ("Maker-Age Linguistic Recovery") in scoped form. No translation answers Mystery Reserve M-1, M-2, or M-5; the operational artifact-creation subset is the only meaningfully usable corpus, and even it is fragmentary and unreliable.
  Modified 2026-04-20 by CH-0014 (CF-0041): scope boundary clarification — the leaked partial-translation corpus does NOT contain Maker-Age sealing instructions. CF-0041 commits Maker-Age deliberate-burial and sealed-inert-container technique as categorically LOST; the corpus boundary is load-bearing — sealing-technique recovery is NOT a world-achievable goal (M-20 firewall on destruction-resistance mechanism parallels: neither sealing nor destruction techniques are reachable by current-age capability). Operational artifact-creation subset remains the only meaningfully usable content; no sealing instructions admitted.
