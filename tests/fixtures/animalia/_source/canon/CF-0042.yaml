distribution:
  who_can_do_it:
    - nobility, clan-leaders, chartered guild-masters, wealthy merchants, ancestral-estate dowagers (display of declared safe-class artifacts)
    - organized theft-rings and opportunistic burglars (theft)
    - assassination contractors and contract-retaliators targeting notable artifact-handlers (brokers, guild-stampers, extraction-contractors)
    - bardic-circuit transmission, tavern rumor-register, civic-dissident broadside network (state-security concealment rumor circulation)
    - CF-0024 contractor-veterans as bodyguard sub-specialty for famous-owner households (eleventh concurrent veteran-pool claim)
  who_cannot_easily_do_it:
    - commoners rarely hold declared-inventory status-display artifacts; mundane-tier finds (CF-0040) are NOT status-display items
    - polities with weak charter do not maintain effective declared-inventory regimes (highland clans, fen-villages, some drylands caravan-polities) — status-display there operates under convention-register only
    - mundane-tier artifacts do NOT attract assassination (assassination-risk is value-calibrated to chartered safe-class)
  why_not_universal:
    - declared-inventory regime is polity-asymmetric; fifth parallel sixth-axis latent-burden watch-item for Charter-Era stress register (adopt-stringency-of-display-registration axis) per CH-0014
    - state-security concealment rumor is diffuse-register; never specific-incident-confirmed at world-level
    - assassination-risk is calibrated to item value; bodyguard-retinue scale reflects the calibration
