statement: |
  Owning chartered / declared-inventory artifacts is a sign of elite status across Animalia polities; safe-class artifacts are displayed in noble-clan houses, estate halls, guildhall galleries, and civic-registry bureau-ornamental contexts, registered under polity-asymmetric declared-inventory regimes (fifth parallel sixth-axis latent-burden watch-item for the Charter-Era stress register). Persistent artifact-theft economy targets declared-inventory items; assassination attempts on notable owners of high-value artifacts are a recognized pattern rendered in AES-1 laborer-register cadence — the broker, guild-stamper, or extraction-contractor who handled a famous piece is more often the target than a "famous adventurer" chosen-one figure. State-security concealment of specific catastrophic-class discoveries circulates as DIFFUSE RUMOR only — no named-incident is confirmed at world-level; the rumor is diegetic civic-paranoid-dread atmosphere, never world-truth (M-2 anti-evidence firewall per CH-0014 extension).
