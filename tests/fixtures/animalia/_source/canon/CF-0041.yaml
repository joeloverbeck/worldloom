id: CF-0041
title: Maker-Age peoples deliberately buried hazardous artifacts; sealed-artifact containers are mechanically inert until opened; the "unsealing" idiom is a lived cultural convention carrying dread across all regions
status: hard_canon
type: historical_process
statement: |
  The Maker-Age peoples had hazard-awareness and response-capability regarding at least some of their own magical artifacts, and deliberately sealed, entombed, or flooded both individual artifacts and entire buildings containing artifacts, using complex engineering and coordinated labor, to prevent those items from acting on the world. A Maker-Age-sealed container holding an artifact remains mechanically INERT until the container is opened or the seal is broken; opening an unknown sealed container ACTIVATES the artifact within with full CAU-1 cost at the site. "Unsealing" is a feared and dread-laden cultural moment in present Animalia ("the hair goes up when the seal breaks"), with multi-guild civic-response protocols in chartered polities and convention-register response in non-chartered regions. This commitment is Maker-Age hazard-awareness and response-PRACTICE ONLY; it does NOT resolve what the Makers feared, whether burial preceded / accompanied / postdated the fall, or the nature of the Maker fall itself (M-1 firewall preserved per CH-0014 extension). Maker-Age sealing technique is categorically LOST — it is not present in the leaked grimoire corpus (CF-0023) and is not reproducible by modern crafters (CF-0021).
scope:
  geographic: global
  temporal: current
  social: public
truth_scope:
