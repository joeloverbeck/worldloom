notes: |
  Proposed as part of CH-0014 four-CF bundle. FOUR firewalls committed per Mystery Curator critic Phase 6b synthesis: (1) M-1 anti-evidence firewall — Maker-burial-practice is hazard-awareness
      and response-practice ONLY; never cause-of-fall evidence; the Makers'
      deliberate burial neither confirms nor refutes any M-1 hypothesis.
  (2) M-8 distinct-origin firewall — sealed-inert mechanism is CATEGORICALLY
      DISTINCT from guardian-construction activation; the two Maker-origin
      autonomy-adjacent phenomena are NOT identified (parallels CF-0022 ↔
      CF-0029 ↔ CF-0035 three-way firewall extended to four-way with CF-0041).
  (3) M-9 anti-custody-channel firewall — Maker-buried-building archaeology
      yields STRUCTURAL / ENGINEERING / ARTIFACT-DISPOSITION data only; does
      NOT yield Maker-cognitive content, translated texts, civilization-
      identity findings, or cause-of-fall evidence; NOT a seventh Maker-
      knowledge custody channel.
  (4) M-10 anti-predictor firewall (FOURTH cross-application) — buried-
      building presence does NOT empirically predict catastrophic-class or
      guardian-construction presence.
  Maker-sealing technique is committed as LOST (not in CF-0023 leaked corpus; not reproducible by CF-0021 crafters). Maker-deliberate-original-burial is distinguished from civic-administrative resealing of CF-0027 ruins per Continuity Archivist Phase 6b finding. Unsealing bardic register ABSORBED into CF-0036 silenced-contractor subgenre (Rule 3 firewall). Excavation jurisdiction deferred to OPEN_QUESTIONS §Ruin Ownership extended. Adjudication record: adjudications/PA-0013-accept_with_required_updates.md.
  Modified 2026-04-20 by CH-0015 (CF-0043): qualification — CF-0041 Brinewick-specific multi-guild unsealing-triage protocol containment-wright role fulfillment: in Brinewick specifically (CF-0038), the chartered containment-wright role in the unsealing-triage sequence (ward-inspector + civic-watch + containment-wright + excavation-foreman) is fulfilled COMMERCIALLY by Ash-Seal technicians (CF-0043) under the Brinewick non-guild civic-charter anomaly with chartered-extraction-guild concordat. Other heartland polities retain guild-or-civic containment-wright arrangements for the same protocol sequence. CF-0041 unsealing-triage protocol structure, scope, and Maker-sealing-LOST firewall are CATEGORICALLY UNCHANGED; the qualification is Brinewick-operational-fulfillment audit-trail hygiene. The Maker-sealing-technique-LOST firewall parallel for Ash-Seal: Ash-Seal's trade-jargon ('impedance field, embedded geometry, Class-C containment') stays in empirical-craft register (ONT-2 / CF-0006 family); does NOT drift toward Maker-sealing-technique-recovery register; Ash-Seal does NOT reproduce Maker-sealing technique (any more than chartered-containment-wrights elsewhere).
