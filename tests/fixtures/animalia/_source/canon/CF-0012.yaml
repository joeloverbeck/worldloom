id: CF-0012
title: Mythical-species sentients are population-rare and locally clustered
status: hard_canon
type: species
statement: |
  Mythical-species sentients (chimera-folk, basilisk-folk, manticore-folk, gryphon-folk, naga-folk, etc.) exist within the world's species roster but are population-rare per region and tend to be locally clustered. They are conspicuous when present and often legally scrutinized.
scope:
  geographic: global
  temporal: current
  social: public
truth_scope:
  world_level: true
  diegetic_status: objective
domains_affected:
  - settlement_life
  - law
  - status_signaling
  - kinship
prerequisites: []
distribution:
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal:
    - small population pools, regional clustering, biological scarcity
costs_and_limits:
  - small population pools concentrate genetic vulnerabilities
  - conspicuousness undermines anonymity for travelers
  - some polities subject mythic-species to additional legal scrutiny
visible_consequences:
  - mythic-species folk are rare in any given market
  - their presence draws commentary; anonymity is hard for travelers
  - sectarian movements sometimes treat them as omens
required_world_updates:
  - PEOPLES_AND_SPECIES
  - GEOGRAPHY
  - EVERYDAY_LIFE
source_basis:
  direct_user_approval: true
  derived_from:
    - CF-0010
contradiction_risk:
  hard: false
  soft: false
notes: |
  Invariant DIS-3. Prevents specialness inflation. Brief's "exotic bodies draw attention and commentary" is directly served.
