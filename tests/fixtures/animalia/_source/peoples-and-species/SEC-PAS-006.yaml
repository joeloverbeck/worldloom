id: SEC-PAS-006
file_class: PEOPLES_AND_SPECIES
order: 6
heading: Cross-Cluster Notes
heading_level: 2
body: |-
  - **No species hierarchy is world-truth.** Some characters and sects believe one cluster older or finer than another; civic charters explicitly suppress that.
  - **Sentience boundary**: Sentience is broadly distributed across all four clusters and humans. Non-sentient fauna of the same animal type also exists (a hyena-folk magistrate and a non-sentient hyena are both possible; relations between them are quiet and complicated). Defer further detail to OPEN_QUESTIONS.
  - **Cross-species marriage** is legally ordinary and reproductively impossible (ONT-3). Adoption and fostering are the well-established paths to mixed-species households.
  - **Forensic embodiment**: bite-marks, scent-trails, claw-prints, feather-fall, scale-shed, and tail-print are recognized evidence in civic courts. Investigation guilds train multispecies practitioners.
  - <!-- added by CF-0035 --> **Artifact-mutated non-sentient fauna firewall (CH-0009)**: Artifact-contaminated mutated non-sentient beasts (CF-0035) are CATEGORICALLY DISTINCT from sentient animal-folk of any cluster AND from Cluster D mythic-species sentient folk. Specifically: (i) mutated beasts remain categorically non-sentient (ONT-1 / M-5 firewall, fourth cross-application) — no mutated beast acquires sentience, speech, tool-use, or proto-folk status regardless of morphological alteration; (ii) chimeric morphology in a mutated beast is ARTIFACT-EFFECT on an already-contaminated individual, NOT ONT-3 reproductive hybridization — species reproductive boundaries are preserved; (iii) mutated beasts are not a fifth species cluster and do not enter the PEOPLES taxonomy; they are non-sentient fauna with artifact-shaped bodies and attach to `hazard` + `species` (non-sentient fauna sub-category) per ONTOLOGY.md. No civic institution may process a mutated beast as a mythic-species individual, and no mythic-species individual may be treated as a mutated-beast specimen; magistrate-court identification procedure is load-bearing. Sectarian readings that mutated beasts are "proto-animal-folk" or evidence of Maker-seeded sentience cross-apply to Mystery Reserve M-5 and are forbidden as world-truth.
  - <!-- added by CF-0035 --> **Species-progenitor-cult trophy taboo (partial, CH-0009)**: Carnivore-folk households with strong progenitor-cult predator-reverence traditions (wolf-folk, fox-folk, hyena-folk, bear-folk progenitor-cults in specific lineage-keeper currents) refuse trophy-display of cousin-lineage mutated beasts even when the trophy is bounty-clerk certified — a wolf-folk household will not hang a wolf-that-was-not-a-wolf skull on the hearth-wall, however verified. Herbivore-folk households display freely; cross-cluster intermixed households negotiate case-by-case, often under dowager or hearth-elder discretion. This is a minor species-embodiment respect distinction, not a civic-law category; no polity criminalizes display, but the dowager-gossip circuit (and in mixed cities the bardic commentary circuit) marks households whose display-choices show civic tact vs lineage-blind opportunism.
  - <!-- added by CF-0036 --> **Endemic interspecies friction and supremacist-sectarian firewall extension (CH-0010)**: Interspecies friction is an endemic, ongoing social pattern across Animalia — ordinary tavern slur-and-stereotype banter, labor-prejudice distancing, isolated single-species exclusionary settlements, supremacist sectarian doctrine fringe, and a cannibal sub-subset within CF-0034 outlaw bands. The existing Cross-Cluster firewall — *"No species hierarchy is world-truth. Some characters and sects believe one cluster older or finer than another; civic charters explicitly suppress that."* — holds with renewed force: civic charters continue to suppress hierarchy-speech; no chartered polity adopts supremacist doctrine as civic policy; the supremacist-doctrine fringe is CONTESTED-CANON sectarian belief, NEVER world-truth. The supremacist register is categorically DARKER than the Cluster C "older bloods pride" soft-canon sectarianism (line 92 above) — the former asserts violent entitlement against other sentient peoples, the latter asserts genealogical vanity; both are contested, but they are DIFFERENT REGISTERS and must not be collapsed. The CF-0035 carnivore-folk progenitor-cult cousin-lineage trophy taboo (above) and the CF-0036 supremacist-cannibal doctrine are INVERSE-VALENCE sectarian registers within the same carnivore-folk progenitor-cult surface territory — the trophy taboo is a mainstream respect-discipline, the supremacist-cannibal doctrine is a pathological cult-deviation; they MUST NOT be read as ends of a single carnivore-progenitor-cult spectrum. Conflation produces category error. Cluster D firewall re-cite (line 123 Cluster D notes above): mockery of mythic-species embodiment remains a sharp social wrong; the general tavern joke-threshold extension under CF-0036 does NOT license Cluster D curiosity-targeting. The M-5 firewall (sentience-as-artifact-effect forbidden world-level resolution) receives a FIFTH cross-application here: sectarian "mere beasts" register applied to sentient victims by supremacist-cannibal bands is a PATHOLOGICAL CATEGORY ERROR, NOT a revision of the sentience boundary — the category error IS the crime; world-level sentience-status of all peoples is preserved.
  - <!-- added by CF-0038 --> **SOC-1 reaffirmation under Brinewick aquatic-folk occupational-concentration (CH-0013)**: Aquatic-gaited sentient peoples — otter-folk, beaver-folk, frog-folk, salamander-folk, waterfowl-folk, and where present the rare naga-folk bargemaster (Cluster D, DIS-3-constrained) — cluster in Brinewick and adjacent canal-heartland settlements by embodiment-fit for wet-work labor. **The majority of aquatic-folk Brinewick residents work legitimate canal occupations** — port labor, sluice maintenance, barge-handling, fishery, canal-engineering apprenticeship under the beaver-folk-concentrated engineering-guild pipeline, lock-keeping under the lock-keeper guild. A substantial minority is overrepresented (among multiple overrepresentations: corvid-folk in scribal guilds per §(Cross-Cluster Notes) existing commitment; beaver-folk in engineering per existing commitment; raptor-folk in archery per existing commitment) in Brinewick's underworld — the canal-underwater smuggling niche per CF-0038. **This is socioeconomic occupational geography, driven by embodiment-fit advantage in a wet-work labor category, NOT a species-role civic assignment, NOT an SOC-1 hierarchy, and NOT a world-level species-labor pattern.** Non-aquatic-folk (humans, cluster A land-mammalians, cluster B scaled-and-feathered beyond waterfowl, cluster C megafauna, cluster D non-aquatic mythic) remain full participants in Brinewick underworld activity where they can find a role. Aquatic-folk remain full participants in Brinewick legitimate civic life — magistrate courts, chartered guild masterships, civic registry clerkship, estate tenancy, landed nobility, bardic circuit, charter-school enrollment. Sectarian supremacist readings that aquatic-folk are "natural criminals" or "almost beast-like wet-workers" are CATEGORY-ERROR PATHOLOGY (parallel to CF-0036 CH-0010 M-5 fifth cross-application), NOT world-truth; civic charters suppress hierarchy-speech without exception. The canal-underwater smuggling niche is short-career trade (per CF-0038 CAU-1-parallel cost taxonomy: lung-fever from bad canal chemistry, skin-patches from contamination exposure, ~12-season veteran arc before retirement or incapacity) worked by individuals of multiple species who know the sub-lock routes — the otter-folk tunnel-runner is the most numerically visible but the hybrid mixed-species crew is the working pattern, not the monocultural register sectarian supremacist-doctrine attempts to project onto it. M-5 firewall holds with a sixth cross-application now on the ledger (after CH-0002 / CH-0004 / CH-0009 CF-0035 / CH-0010 CF-0036 fifth). Cluster D mythic-species firewall (DIS-3) holds: naga-folk bargemasters where present in Brinewick are rare (per DIS-3 population-rarity constraint), visible, civic-participant, and as individually mixed between legitimate and underworld activity as any other sentient peoples — no world-level hardening of naga-folk-as-smuggler register.

  - <!-- added by CF-0043 --> **SOC-1 reaffirmation under Ash-Seal technician species-composition (CH-0015)**: The Ash-Seal company's Brinewick workforce (technicians, ward-apprentices, in-house scriveners, commercial property-protection guards) is OPEN ACROSS CLUSTERS per SOC-1 — humans and animal-folk of any cluster hold positions at all company ranks (apprentice to senior technician to master-technician to officer). Brinewick's mixed-species civic-core demographic makes the Ash-Seal workforce typical of a heartland commerce-hub employer (cluster A and cluster B overrepresented at base rates matching Brinewick's general labor pool per CF-0038 commitment; humans common; cluster C present in ancestral-adjacent proportion; cluster D mythic-species individuals rare per DIS-3 but present at DIS-3-constrained population-rarity). No company-internal species-exclusion operates at intake, apprenticeship, or rank-advancement; sectarian supremacist-doctrine readings that Ash-Seal is a species-segregated workforce are CONTESTED-SECTARIAN PROJECTION, NOT world-truth (parallel to CF-0036 CH-0010 category-error-pathology; parallel to CF-0038 CH-0013 aquatic-folk smuggling-niche sectarian-misreading). The containment-wright expertise Ash-Seal cultivates is empirical-craft transmission (CF-0006 ONT-2 family); nothing about the craft is species-coded, and defector-specialists who emigrate to chartered-extraction-guild containment-wright roster commissions elsewhere carry the same Brinewick-trained portable reputation regardless of species. Ash-Seal's fed-up-technician plain-speaking register is shared across species in the company's labor pool; the tavern-type "the Ash-Seal technician drinking alone at the Weir" (CF-0036 silenced-contractor subgenre absorption) is mixed-species-typical, not species-marked. M-5 firewall holds; SOC-1 holds without exception.

  - <!-- added by CF-0037 --> **SOC-1 reaffirmation under family-handled waystation tradition (CH-0012)**: The family-handled waystation tradition (CF-0037) operating in heartland (most prevalent), cold north highland, and mountain east is OPEN ACROSS CLUSTERS per SOC-1 — humans and animal-folk of any cluster (Cluster A modern-mammalian, Cluster B avian/reptile/amphibian, Cluster C extinct-species, Cluster D mythic-species) hold waystation tenancies. Mixed-species waystations are ORDINARY in heartland connector-route villages, where multispecies civic frame is dense; clan-affiliated waystations in highland may be species-concentrated by clan demographics (a wolf-folk clan's clan-border waystation will tend to be wolf-folk-staffed because the clan is wolf-folk-populated) but per SOC-1 are NOT species-gated — a non-clan traveler hosted at a clan-territory waystation under clan-elder hospitality sanction is the ordinary case, not the exception. Mountain-east valley-pass waystations follow the heartland mixed-species pattern where multispecies labor is available, the highland species-concentrated pattern where clan demographics dominate the local valley. Stationkeeper-as-life-path social role (CF-0037) carries no species-coding; a Cluster D mythic-species inheritor is the same recognizable life-stage as a Cluster A inheritor, with the same chore-from-young cadence and the same self-exile pathway available. The waystation tradition does NOT validate single-species exclusionary settlement (CF-0036) economics — exclusionary settlements may host informal kin-only roadside hospitality, but the chartered or clan-elder-sanctioned waystation tradition that CF-0037 commits is mixed-species-compatible by SOC-1 firewall and does NOT extend to exclusionary-settlement-internal kin-only stations as a separate sub-category.
