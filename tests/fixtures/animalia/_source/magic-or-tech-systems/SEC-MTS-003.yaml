id: SEC-MTS-003
file_class: MAGIC_OR_TECH_SYSTEMS
order: 3
heading: "Brinewick Commercial Containment (CF-0043): Ash-Seal and the Civic-Charter Anomaly"
heading_level: 2
body: |-
  In Brinewick specifically (CF-0038; canal-heartland commerce-hub city), the chartered-extraction-guild's containment / research / sealed-inert disposal functions are performed COMMERCIALLY by the Ash-Seal company (CF-0043) under a Brinewick-specific civic-charter anomaly concorded with the chartered-extraction-guild. This is a Brinewick-local institutional variant; the standard chartered-extraction-guild containment-wright / neutralizer structure described above holds unchanged in Mossdown, Havenreach, and every other polity (SOC-4 chartered-guild monopoly everywhere-else without exception).

  ### Concordat Boundary

  - **Chartered-extraction-guild retains in Brinewick**: extraction (at the site), ward-inscription, ward-inspection (CAU-3 preserved — Ash-Seal does NOT touch the ward-system), chartered-brokerage (chartered-broker bench unchanged at near-continental density per CF-0038).
  - **Ash-Seal absorbs in Brinewick**: containment (at company facility using CF-0006 ceramic-containment technology and CF-0007 ward-system infrastructure under guild-coordinated handoff), research (trade-secret internal research archive; M-1/M-9 firewall — empirical-containment-craft only, NOT Maker-cognitive content custody channel), sealed-inert disposal (company-facility moderate-tier permanent inventory; catastrophic-tier routed to civic sealed-quarter Ash-Seal-billed per-artifact).

  ### Empirical Containment Craft Register

  Ash-Seal's technical vocabulary ("Standard Class-C containment with moderate environmental spread" and the trade-jargon family around it: impedance field / embedded geometry / safe-class / moderate-tier / catastrophic-tier / render-inert / seal-and-contain) lives squarely within the ONT-2 / CF-0006 empirical-craft register — the craft of PREPARING CONTAINMENT VESSELS AND WARDED CONTAINERS for received artifacts, not the channeling of magic through the crafter. The vocabulary is empirical classification language that Ash-Seal's internal research archive developed over generations; defectors carry the vocabulary with them into chartered-extraction-guild labor markets heartland-wide, and the terminology now travels widely in non-Brinewick containment-wright discussion.

  - **M-1 firewall holds**: Ash-Seal research yields EMPIRICAL CONTAINMENT / CRAFT knowledge ONLY (handling protocols, vessel-design empirical notes, disposal-site selection, incident-response patterns); NOT Maker-cognitive content, NOT civilization-identity findings, NOT cause-of-fall evidence.
  - **M-9 firewall holds**: Ash-Seal trade-secret archive is NOT a seventh (eighth) Maker-knowledge custody channel; it is commercial-empirical-craft custody, structurally parallel to guild-internal craft archives but with civic-charter trade-secret-protection clause as additional barrier.
  - **CF-0041 Maker-sealing-LOST firewall holds**: Ash-Seal's containment technique is current-age empirical craft (CF-0006 family), not recovered Maker-sealing technique; Maker-sealing remains lost and not reproducible by any current-age practitioner (Ash-Seal technicians included).
  - **Sectarian Maker-mystic readings that Ash-Seal's trade-secret archive is "recovered Maker research"** are CONTESTED-SECTARIAN PROJECTION (paralleling CF-0023 grimoire-as-Maker-research sectarian register), NOT world-truth; the archive's contents are post-Charter empirical-craft accumulation, not Maker-Age knowledge recovery.

  ### Destruction-Claim Firewall (CF-0039 / M-20)

  Ash-Seal's corporate-marketing claim of a "patented method to destroy wooden artifacts 100% of the time" is **CORPORATE MYSTIQUE / CONTESTED DIEGETIC CLAIM**, NOT world-truth. Actual practice is CF-0039-compliant specialized render-inert / seal-and-contain warded containment for wooden-substrate artifacts — a Ash-Seal-specialized CF-0008 CH-0014 neutralizer re-scoped work producing sealed-inert storage items, not destroyed artifacts. Wooden Maker-Age artifacts processed by Ash-Seal remain in company-facility permanent inventory (contributing to Brinewick's monotonic-accretion ward-reserve liability per CF-0038 × CF-0039 CH-0014 extension), functionally inert-in-storage. The company's marketing-position reframes this as "destruction" for trade-secrecy mystique and information-asymmetry rent-extraction; fed-up-technician admission ("it's a procedure; there's a checklist; quality control, not a seance") is the in-world revealer of the marketing-as-performance register.

  - **M-20 firewall holds**: Ash-Seal corporate-marketing-reframe preserves M-20 load-bearing unresolvability — the in-world marketing claim does NOT constitute world-level reveal of reliable destruction technique; the "destroys wood but not metal" framing is ADVERTISING COPY, not material-typology backdoor (forbidden per M-20 disallowed-cheap-answer clause on destruction-resistance correlating cleanly with artifact-tier). Ash-Seal does not actually destroy any Maker-Age artifact.

  ### Corporate Mystique as Commercial Surface

  Ash-Seal cultivates trade-jargon, ritual-performance at intake (warded-container placement with finicky ceremony in view of dredger crews), and a cultivated antiquity-claim ("the company has existed for hundreds of years, that is doubtful") as commercial information-asymmetry and mystique-branding strategy. This is NOT secret-organization conspiracy register; it is ordinary commercial marketing performed on an empirical-craft substrate. The fed-up-technician plain-speaking admission is the in-world laborer-register cadence cutting against the mystique surface — the industry is CIVIC-COMMERCIAL CONTAINMENT, not "the Ash-Seal Foundation keeps secrets." Tone discipline: AES-1 laborer-register is DOMINANT; mystique-register is PERFORMED SURFACE.

  ### Defector-Specialist Career Arc

  Disillusioned Ash-Seal technicians defect and become INDIVIDUAL fee-for-service containment specialists across the heartland (chartered-extraction-guild roster commissions in Mossdown, Havenreach, other heartland polities). Their Brinewick-trained portable reputation carries empirical-craft knowledge (CF-0006 family transmission under standard journeyman-migration register); specific procedural-protocol text and trade-secret archive content are covenant-constrained and may not be published under Brinewick civil-penalty risk. Defectors absorb into existing M-7 containment-wright / occult-fallout sub-specialty holding clause (NOT a sixth M-7 cohort per Rule 3). The migration is the primary vector by which Brinewick-developed empirical-containment vocabulary has spread across heartland chartered containment-wright benches over the past 2-4 generations.

