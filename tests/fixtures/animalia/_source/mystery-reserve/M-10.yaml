id: M-10
title: Guardian-Presence Heterogeneity
status: passive
knowns:
  - Some enterable ruin sites (CF-0027) contain guardian constructions (CF-0029); some do not
unknowns:
  - Why some ruins have guardians and some don't
common_interpretations: []
disallowed_cheap_answers:
  - Typology that maps cleanly onto catastrophic-class (would collapse M-2 by making "catastrophic" = "guardian-present")
domains_touched:
  - MAGIC
  - INSTITUTIONS (expedition ventures
  - authentication specialists)
  - ECONOMY (expedition risk-pricing).
future_resolution_safety: low
extensions:
  - originating_cf: CF-0034
    change_id: CH-0008
    date: 2026-04-19
    label: Extension — Bandit-occupation selection-bias firewall
    body: "Endemic bandit groups (CF-0034) that occupy enterable Maker-Age ruin sites as shelter face the guardian-wipe hazard per CF-0029. Bandits who occupy a guardian-active ruin are wiped; bandits who survive long-term ruin-occupation are surviving in guardian-less ruins BY SELECTION BIAS — their survival does not reflect any detection capability they possessed on entry. Bandit-survivor folklore about \"safe\" versus \"unsafe\" ruins, passed through corridor-reputation and captain-to-lieutenant succession, is SELECTION-BIAS FOLKLORE — the folklore is survivor-literate (the surviving bandits know which specific sites they personally have not been killed in), not mechanism-literate (the folklore does not predict guardian-presence at any new site, because the bandits were never able to predict at entry). A civic-watch or chartered extraction-guild investigator who treats a captured-bandit's corridor-lore as guardian-absence empirical data is making a category error; the data has no out-of-sample predictive weight. Extraction-guild authentication specialists do not admit bandit-survivor report as guardian-indicator evidence; civic-watch investigators do not build expedition-routing decisions from bandit-lore; this disposition discipline is load-bearing — any institution that DID take bandit-lore as guardian-predictor would violate M-10's disallowed cheap answer \"any systematic predictor that enables RELIABLE avoidance.\" Added to disallowed cheap answers: *\"Bandit settlement-lore treated as empirical guardian-absence predictor — forbidden reveal.\"* The M-10 firewall holds with this load-bearing cross-application clause; this is the FIRST cross-application firewall M-10 carries, with no prior precedent, and its discipline is the sharpest Mystery-Reserve commitment CF-0034 makes."
  - originating_cf: CF-0035
    change_id: CH-0009
    date: 2026-04-19
    label: Extension — Hunter-survivor wilderness-zone-folklore selection-bias firewall
    body: "Hunter-contractors (CF-0024 wildlife sub-specialty per CF-0035) who pursue mutated beasts in wilderness-distal contaminated-fauna zones face contamination-exposure and beast-predation hazards; most who survive multiple corridor-seasons do so by surviving in zones WHERE THE PHENOMENON'S DISTRIBUTION HAPPENED NOT TO CONCENTRATE IN THEIR LINE OF WORK — selection-bias, directly paralleling the CF-0034 bandit-survivor pattern. Hunter-survivor folklore about \"safe\" versus \"unsafe\" wilderness corridors, about where mutated beasts are rumored versus where they are actually present, about which zones carry \"wrong wind\" vs \"clean ground,\" circulates in hunter-corridor reputation and tavern-transmission networks. This folklore is SELECTION-BIAS FOLKLORE — the surviving hunters know which specific corridors they personally have not died in, NOT which corridors empirically lack mutated-beast presence. A civic-watch investigator, chartered extraction-guild inspector, or noble-estate steward who treats hunter-corridor-lore as empirical contaminated-fauna-zone-absence predictor is making a category error; the data has no out-of-sample predictive weight. Extraction-guild dispatch to suspected upstream zones remains DISCRETIONARY and commission-gated (CF-0035 visible_consequence), explicitly NOT driven by hunter-survivor zone-lore. Sectarian collectors or ideological buyers who treat hunter-lore as zone-predictor face both the category error AND the M-5 firewall prohibition on proto-folk readings of any encounter. This disposition discipline is load-bearing — any institution that takes hunter-lore as zone-predictor violates M-10's disallowed cheap answer \"any systematic predictor that enables RELIABLE avoidance\" (extended here to zones as well as guardian-presence). Added to disallowed cheap answers: *\"Hunter-survivor corridor-folklore treated as empirical contaminated-fauna-zone-absence predictor — forbidden reveal.\"* The M-10 firewall holds with this SECOND cross-application, and its discipline remains the sharpest Mystery-Reserve commitment pattern; the two cross-applications (CF-0034 bandit / CF-0035 hunter) together establish selection-bias folklore discipline as load-bearing for any category of wilderness-survivor lore the world generates."
  - originating_cf: CF-0036
    change_id: CH-0010
    date: 2026-04-19
    label: Extension — Hunter-survivor cannibal-corridor-folklore selection-bias firewall
    body: "Hunter-contractors (CF-0024 CF-0034 bandit-hunter subtype) pursuing interspecies-cannibal-band sub-subset corridor-work face adjacent-outrage-environment hazards AND the same corridor-survival dynamics as CF-0034 bandit-corridor and CF-0035 wilderness-zone patterns. Hunter-survivor folklore about \"safe\" versus \"cannibal-camp\" corridors, about where cannibal-band sub-subset operates versus where ordinary raid-and-enslave sub-subset operates, circulates in hunter-corridor reputation, tavern-transmission, and settlement-bounty-wall networks. This folklore is SELECTION-BIAS FOLKLORE — the surviving hunter-contractors know which specific corridors they personally have not been ambushed in; NOT which corridors empirically lack cannibal-band presence. A civic-magistrate processing sealed-cannibal-case evidence, a civic-watch investigator, a settlement-council hire-committee, a chartered extraction-guild inspector, a reform-current clergy unsealing-campaigner, or a noble-estate steward who treats hunter-corridor-lore as empirical cannibal-band-presence-or-absence predictor is making a category error; the data has no out-of-sample predictive weight. Settlement-bounty posting discipline: bounty-clerk certification requires evidentiary chain (corpse-delivery OR camp-identification-testimony confirmed by two independent witnesses OR sealed-magistrate-docket exhibit-transcript), NOT hunter-corridor-lore alone. Sectarian-supremacist recruiters who treat hunter-lore as cannibal-camp-presence predictor to create martyr-narrative or inter-polity scandal material face both the category error AND the M-5 firewall prohibition on pathological category-error readings. This disposition discipline is load-bearing — any institution that takes hunter-lore as cannibal-band-presence predictor violates M-10's disallowed cheap answer \"any systematic predictor that enables RELIABLE avoidance\" (extended here to cannibal-band-presence as well as guardian-presence and contaminated-fauna-zone-presence). Added to disallowed cheap answers: *\"Hunter-survivor corridor-folklore treated as empirical cannibal-band-presence predictor — forbidden reveal.\"* *\"Sectarian-supremacist recruiter narrative accepted as accurate cannibal-camp-presence evidence — forbidden reveal.\"* The M-10 firewall holds with this THIRD cross-application. The three cross-applications (CF-0034 ruin-folklore / CF-0035 zone-folklore / CF-0036 cannibal-corridor-folklore) now establish selection-bias folklore discipline as load-bearing across THREE CATEGORIES of wilderness-survivor lore the world generates; the M-10 pattern is the sharpest Mystery-Reserve commitment the world carries and its discipline is now mature."
  - originating_cf: CF-0041
    change_id: CH-0014
    date: 2026-04-20
    label: Extension — Buried-building-presence not-a-guardian-predictor firewall
    body: "CF-0041 commits Maker-Age deliberate-burial of entire buildings. The buried-building sub-category of Maker substructures might invite a typology-inference: \"buildings the Makers buried contain what they most wanted buried; therefore buried-building strikes predict catastrophic-class or guardian-construction presence.\" This inference is CATEGORICALLY FORBIDDEN. Buried-building presence does NOT predict catastrophic-class artifact presence (M-2 firewall), does NOT predict guardian-construction presence (M-8/M-10 firewall). The Makers buried MANY things — hazardous artifacts of multiple tiers, inert ceremonial items whose purpose is unrecoverable, storage caches whose contents range the full tier-distribution, buildings whose burial reason is entirely unrecoverable. Buried-building archaeology yields WHAT is in THIS building; it does NOT yield predictive typology that enables reliable pre-entry assessment of NEXT building's contents. The FOURTH M-10 cross-application parallels the established THREE (CF-0034 bandit-ruin-folklore, CF-0035 hunter-zone-folklore, CF-0036 hunter-cannibal-corridor-folklore): selection-bias and non-predictive inference are both failure modes against RELIABLE avoidance. Authentication specialists, expedition scouts, civic-archaeological-license adjudicators, and civic-magistrates processing buried-building strike-notices must categorically treat each buried-building strike as stand-alone risk; hypothesis-formation about \"what kind of buried buildings contain catastrophic\" is out-of-canon and would collapse M-2 / M-8 / M-10 simultaneously. Added to disallowed cheap answers: *\"Buried-building presence treated as reliable catastrophic-class predictor — forbidden reveal.\"* *\"Buried-building typology mapping cleanly onto guardian-construction presence — forbidden reveal.\"* *\"An authentication-specialist method that predicts buried-building contents from excavation surface signatures — forbidden reveal.\"* *\"Accumulated buried-building data across multiple polities yielding predictive typology for Maker-intent-per-burial — forbidden reveal.\"* The M-10 firewall holds with this FOURTH cross-application; the M-10 pattern's discipline-breadth now covers FOUR CATEGORIES of survivor-lore AND ONE CATEGORY of structural-typology-inference, further hardening the Mystery-Reserve commitment."
