id: M-8
title: The Mechanism of Maker-Age Guardian Constructions
status: passive
knowns:
  - A rare subset of enterable Maker-Age ruin sites (CF-0027) contain magically-animated guardian constructions (CF-0029)
unknowns:
  - Mechanism — what operates the guardian? Pre-programmed artifact-instructions baked into the construction's fabric? A residue of Maker-Age technique that modern crafters have not reproduced and could not? An environmental resonance the construction channels? A beastly register of response analogous to but not identical with M-6 crafter outputs? An emergent property of certain Maker-site architectures?
common_interpretations: []
disallowed_cheap_answers:
  - "\"They're sentient Makers\" — violates ONT-1 and M-1"
domains_touched:
  - MAGIC
  - INSTITUTIONS (artifact-guilds
  - authentication specialists
  - expedition ventures)
  - RELIGION (sectarian interpretations)
  - and the M-1 / M-2 / M-5 / M-6 firewall surface.
future_resolution_safety: low
extensions:
  - originating_cf: CF-0033
    change_id: CH-0007
    date: 2026-04-18
    label: Extension — Dragoon perimeter-lore firewall
    body: "Canal-corridor quarantine dragoons (CF-0033) in adopting polities may, through long careers and repeated ward-breach response operations, accumulate empirical perimeter-lore including activation precursors observed at contamination-zone edges, de-activation signatures, and safe-distance calibrations for post-breach cordon positioning. This pattern-lore is OPERATIONAL-TACTICAL, NOT MECHANISTIC. Dragoon perimeter pattern-knowledge does NOT constitute M-8 guardian-construction mechanism evidence even when empirically regular; the craft signature authentication specialists use to recognize guardian constructions is categorically distinct from perimeter-response craft, and dragoon operations are explicitly perimeter-only (not engagement-with-guardian). Added to disallowed cheap answers: *\"Named dragoon commander's perimeter-lore resolves guardian-construction mechanism — forbidden reveal.\"* The M-8 firewall holds with this cross-application clause."
  - originating_cf: CF-0034
    change_id: CH-0008
    date: 2026-04-19
    label: Extension — Bandit-survivor procedural-tactical observation firewall
    body: "Endemic bandit groups (CF-0034) that intrude on enterable Maker-Age ruin sites encountering guardian constructions are wiped at squad-wipe scale per CF-0029. Rare bandit-survivors (the one who hung back at the entrance, the one who fled at first sight of activation) may accrue empirical tactical observation of guardian-activation circumstances — what the approach posture was, what the first sign was, what the survivor did differently. This pattern-lore is PROCEDURAL-TACTICAL, NOT MECHANISTIC — paralleling the CF-0033 dragoon perimeter-lore firewall exactly. Bandit-survivor observation does NOT constitute M-8 guardian-construction mechanism evidence; no authentication-specialist treats bandit-survivor report as craft-signature evidence; civic-watch and magistrate-court do not admit bandit-survivor testimony about guardian-activation as evidentiary for Maker-Age mechanism questions (the testimony's weight is restricted to the captured-bandit's own prosecution proceedings, where it goes to survival-circumstance not to cosmology). Added to disallowed cheap answers: *\"Named bandit-survivor whose observation resolves guardian-construction activation mechanism — forbidden reveal.\"* The M-8 firewall holds with this cross-application clause."
  - originating_cf: CF-0035
    change_id: CH-0009
    date: 2026-04-19
    label: Extension — Mutated-beast distinct-origin firewall (BIDIRECTIONAL with CF-0029)
    body: "Artifact-contaminated mutated non-sentient beasts (CF-0035) are encountered in wilderness-distal sites as a category of Maker-origin hazard SURFACE-SIMILAR to CF-0029 Maker-Age guardian constructions — both are Maker-Age-era phenomena exhibiting apparent-autonomy patterns that challenge the chartered extraction-guild and civic-archive framing — BUT THE TWO ARE CATEGORICALLY DISTINCT IN ORIGIN: guardian constructions are INTENTIONAL MAKER CRAFT with activation logic, pre-baked instruction, and craft-signature recognizable by authentication specialists; mutated beasts are INCIDENTAL BIOLOGICAL EFFECT on untargeted fauna (the beast was not the Maker's target; the beast was exposed in the Maker's absence; the beast's body shows artifact-effect, not Maker-effect). The distinct-origin commitment is LOAD-BEARING and must NOT be conflated by authentication specialists, civic archivists, sectarian interpreters, bardic commentators, or authors. Authentication-specialist craft signatures for CF-0029 guardian constructions are categorically distinct from any future authentication protocol for CF-0035 mutated-beast trophies; the two niches do not cross-validate. The near-consensus distinct-origin commitment parallels the CF-0022 ↔ CF-0029 distinct-origin commitment (three surface-similar Maker-origin apparent-autonomy phenomena must each be held at distinct-origin status). A minority Maker-mystic position treats the three as continuous cosmological phenomena — this is contested canon, NOT world-truth. Added to disallowed cheap answers: *\"Mutated-beast mechanism conflated with guardian-construction craft-signature at authentication level — forbidden reveal.\"* *\"A mutated beast that exhibits guardian-class activation logic (proximity-triggered, targeting-logic-driven, pre-baked instruction execution) — forbidden reveal.\"* The M-8 firewall holds with this cross-application clause; CF-0029 carries a parallel modification_history entry committing the bidirectional firewall."
  - originating_cf: CF-0041
    change_id: CH-0014
    date: 2026-04-20
    label: Extension — Sealed-inert mechanism distinct-origin firewall
    body: "CF-0041 commits Maker-Age deliberate-burial and sealed-inert containers as a fourth Maker-origin phenomenon exhibiting autonomy-adjacent behavior (the container suppresses artifact activation until breach; the unsealing triggers activation as if the container had been \"waiting\"). The sealed-inert mechanism is SURFACE-SIMILAR to M-8 guardian-construction activation — both respond to intrusion/breach with artifact-effect activation — BUT THE TWO ARE CATEGORICALLY DISTINCT IN ORIGIN AND MECHANISM. Sealed-inert is CONTAINER-SUPPRESSION: the Maker-engineered seal or enclosing structure mechanically suppresses the artifact's effect until the seal is broken; no pre-baked instruction executes; no targeting logic; no craft-signature beyond the engineering of the container itself. Guardian-construction activation is PRE-BAKED MAKER-CRAFT WITH ACTIVATION LOGIC: the construction contains targeting, response-pattern, and behavior-sequence embedded in its craft; authentication-specialist craft signatures recognize guardian-construction by its internal instruction-structure, not by external suppression. Authentication-specialist distinction protocols must categorically separate the two: a sealed Maker-container awaiting unsealing is NOT a guardian construction in dormant state, and a guardian construction is NOT a particularly sophisticated sealed container. The distinct-origin commitment now parallels the CF-0022 ↔ CF-0029 ↔ CF-0035 ↔ CF-0041 four-way firewall (four surface-similar Maker-origin autonomy-adjacent phenomena, each held at distinct-origin status). A minority Maker-mystic position treats all four as continuous cosmological phenomena — this is contested canon, NOT world-truth. Added to disallowed cheap answers: *\"Sealed-inert mechanism conflated with guardian-construction craft-signature — forbidden reveal.\"* *\"A sealed Maker-container exhibiting guardian-class targeting logic at activation — forbidden reveal.\"* *\"A guardian construction revealed to be a particularly sophisticated sealed-inert vessel — forbidden reveal.\"* The M-8 firewall holds with this cross-application clause; CF-0029 carries parallel annotation committing the four-way firewall."
