id: M-14
title: Bandit-Captain Mythography Reliability
status: passive
knowns:
  - Endemic banditry (CF-0034) produces named bandit-captain figures in bardic cycles, civic-mobilization broadsides, caravan-corridor reputation networks, and tavern narrative-custody; these figures carry weight in settlement-hire bounty-contract framing, civic-watch investigation posture, and the reform-current clergy bounty-execution-morality register
unknowns:
  - "For any given named bandit-captain in active civic-mobilization register: whether the name corresponds to one historical individual, to a composite of multiple historical captains with similar modus operandi or corridor-territory, to a pure bardic invention serving cautionary-civic-mobilization function, or to a mixed case where some deeds are attributable and others are accreted"
common_interpretations: []
disallowed_cheap_answers:
  - A canonical "Ledger of Captains" archive that definitively settles which named bandit-captains were real individuals, composites, or inventions
domains_touched:
  - INSTITUTIONS (civic-mobilization framing
  - bounty-posting procedure
  - magistrate-court captured-bandit prosecution
  - bardic narrative-custody)
  - RELIGION (sectarian revisionist vs civic-mobilization framing tension)
  - LAW (pursuit-by-name procedure
  - captured-bandit identification case law)
  - MEMORY_AND_MYTH (bardic cycles
  - named-captain cadence in civic register)
  - and the M-7 firewall surface (must remain categorically distinct from professional-specialist reputation reliability).
future_resolution_safety: low
extensions:
  - originating_cf: CF-0035
    change_id: CH-0009
    date: 2026-04-19
    label: Cross-reference — Mutated-beast named-figure mythography parallel register
    body: "Named mutated-beast figures (\"the six-limbed boar the Erren brothers brought back from the Selk drainage,\" \"the Old One of the Cold Valleys,\" \"the Thing in the Deep Selk\") — whose names and deeds circulate through bardic cycles, settlement-bounty-wall verified-beast postings, hunter-corridor reputation networks, and sectarian interpretive commentary — form a PARALLEL BUT DISTINCT mythography register from M-14 bandit-captain mythography. The underlying reliability question is structurally similar (historical / composite / invention / mixed readings), but the epistemic object is categorically different: bandit-captains are ANTAGONIST-MYTHOGRAPHY (named adversaries, civic-mobilization propaganda object, captured-bandit prosecution evidentiary object); mutated-beast named-figures are HAZARD-MYTHOGRAPHY (named wilderness dangers, bounty-posting target, hunter-corridor-reputation currency). The registers must NOT blur — a named mutated-beast is not a civic-mobilization propaganda object in the M-14 sense (there is no sectarian revisionist position arguing the beast was manufactured to justify civic force; the beast-hunt is not a pretext politics in the way bandit-suppression can be), and a named bandit-captain is not a hazard-mythography object (the captain's agency is political, not ecological). The OPEN_QUESTIONS deferral on Bardic Register for Mutated-Beast Cycles vs Bandit-Captain Cycles tracks the distinct-register question as author-side deferral rather than mystery-reserve bounded unknown; register-distinction maintenance is load-bearing for both CF-0034 M-14 discipline and CF-0035 AES-1 hero-drift discipline. A bardic-circuit breach that conflates the two (bard-commissioned legendary-beast cycle written in named-captain mobilization cadence, or named-captain cycle written in hazard-mythography cadence) is marked by listeners as the breach is marked in both CF-0034 pro-supremacist captain-cycle patterns and CF-0035 sectarian Maker-mystic beast-propaganda patterns."
  - originating_cf: CF-0037
    change_id: CH-0012
    date: 2026-04-19
    label: Cross-reference — Stationkeeper-bandit-captain sub-register
    body: "Named stationkeeper-children-turned-bandit-captains — the inheritor who walked the family stop, joined a CF-0034 bandit band, and accrued reputation as a named corridor-captain with the distinctive characteristic of corridor-knowledge-from-the-inside (he knows which stops will hold short, which caravan-masters' rotations are long, which estate-retinue response-windows are slow) — accrue mythography AS A SUB-REGISTER within M-14's existing antagonist-mythography register, NOT a new M-register. The four contested readings (historical-individuals / composite-figures / pure-invention / mixed) apply identically; the same disallowed cheap answers hold. The stationkeeper-bandit-captain sub-register has the qualitative inflection of corridor-mobility-texture rather than ontological-mystery — the captain's biography traces a recognized self-exile pathway (CF-0037 Phase 5 diffusion), and the contested-historicity question is whether any specific named \"Stop-Boy of the Cold Pass\" or \"Halver-Walked-Out\" corresponds to a single historical individual, multiple composites with similar corridor-territory and inheritance-refusal biography, pure bardic invention serving cautionary-civic-mobilization function, or mixed-case accretion. The bardic mainstream WITHHOLDS heroic-cycle status from runaway-stationkeeper-turned-captain material per the WORLD_KERNEL.md What Is Taboo extension and the CF-0037 Oral storytelling stop-keeper subgenre cadence — the walked-the-stop child becomes the bandit-captain in third-person mourning register, NOT chosen-protagonist register; sectarian-commissioned bards who violate the threshold by inflating the runaway-stationkeeper-turned-captain figure into hero-ballad register are marked by listeners as the breach is marked in CF-0034 pro-supremacist captain-cycles, CF-0035 sectarian beast-cycle inflation, and CF-0036 supremacist-recruitment silenced-contractor-as-martyr-witness inflation. The M-14 firewall holds with this sub-register cross-reference clause; the stationkeeper-bandit-captain sub-register is tracked WITHIN M-14, NOT as a separate Mystery Reserve entry. Added to disallowed cheap answers: *\"A canonical 'Ledger of Walked-Stops' settling which named stationkeeper-bandit-captains were real individuals — forbidden reveal.\"* *\"A reveal that a specific stationkeeper-family DELIBERATELY produced a bandit-captain heir for civic-mobilization or sectarian recruitment purposes — forbidden reveal.\"* *\"Stationkeeper-bandit-captain reinterpreted as chosen-protagonist hero-cycle register — forbidden reveal.\"*"
  - originating_cf: CF-0036
    change_id: CH-0010
    date: 2026-04-19
    label: Cross-reference — Interspecies-cannibal-captain mythography sub-register
    body: "Named interspecies-cannibal-band captains (\"the Eater of the Bog-Reach,\" \"the One-Fur Captain of the South Pass\") — whose names and deeds circulate through SEALED-DOCKET magistrate archives and through itinerant-bard-carried silenced-contractor ballad subgenre — accrue mythography AS A SUB-REGISTER within M-14's existing antagonist-mythography register, NOT a new M-register. Structural distinction from the M-14 general-bandit-captain register: (a) scale — cannibal-captain mythography is thinner because the SEALED-DOCKET civic-suppression procedure restricts the bardic-transmission channel (patron-commissioned bards refuse; sectarian-commissioned bards inflate for supremacist-recruitment, marked by listeners as breach; itinerant bards sing within the silenced-contractor ballad subgenre register); (b) charging-tier — cannibal-captain prosecution operates under euphemistic \"grave-violation-of-person\" sealed-docket classification per SOC-1 firewall (see Cross-Species Predation Magistrate Charging-Tier OPEN_QUESTIONS); (c) sectarian-position register — sectarian revisionist reading that a named cannibal-captain was \"manufactured\" by civic authority to justify supremacist-doctrine proscription OR to conceal a scandal IS a live contested-canon reading, paralleling the M-14 civic-mobilization-revisionist reading but around DIFFERENT political object (supremacist-proscription vs civic-force-mobilization). The four contested readings (historical-individual / composite-figures / pure-invention / mixed) apply identically; the same disallowed cheap answers hold. Added to disallowed cheap answers: *\"A canonical 'Ledger of Cannibal-Captains' settling which named figures were real — forbidden reveal.\"* *\"A reveal that sectarian progenitor-supremacy movement DELIBERATELY manufactured invented cannibal-captains as martyr-narrative for recruitment — forbidden reveal.\"* *\"A reveal that civic authority DELIBERATELY manufactured invented cannibal-captains to justify supremacist-movement proscription — forbidden reveal.\"* The M-14 firewall holds with this sub-register cross-reference clause; the cannibal-captain sub-register is tracked WITHIN M-14, NOT as a separate Mystery Reserve entry."
