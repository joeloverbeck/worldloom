common_interpretations: []
disallowed_cheap_answers:
  - A canonical "Ledger of Veterans" that settles which specialists truly knew what
domains_touched:
  - MAGIC
  - INSTITUTIONS (artifact-guilds
  - contractor-auxiliary rosters
  - recordkeeping)
  - RELIGION (sectarian positions)
  - STATUS (specialist reputation economy).
extensions:
  - body: 'The reputation-genealogy dynamics logged in M-7 extend, in parallel form, to veterans of patron-funded ruin expeditions (CF-0028). Named expedition-veterans accrue bardic-circuit reputations via the same narrative-custody channels (CF-0017 extended per CF-0024 contracted-bard dynamic); the same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed); the same disallowed cheap answers hold. Expedition-veteran reputation-genealogy is subject to the SAME firewalls: no specialist is framed as uniquely knowing what a Maker artifact is, who made it (M-1), what a catastrophic-class source looks like (M-2), what a guardian-construction mechanism is (M-8), what accumulated expedition-knowledge amounts to (M-9), or why guardian presence is heterogeneous (M-10). Expedition-veteran field-lore is contested canon, not world-level authority; bardic accretion may outrun case-knowledge, and the "veteran who said less and survived more" is a bardic trope, not a world-level epistemic position.'
    change_id: CH-0004
    date: 2026-04-18
    label: Extension — Expedition-veteran reputation-genealogy
    originating_cf: CF-0028
  - body: The civic-registry contamination-lineage ledger-mark (CF-0031) institutionalizes tracking of specialist FAMILY lineages — extractor, containment-wright, and post-career occult-fallout specialist (CF-0025) households — across three administrative generations in adopting polities. The registry is a body-injury record, NOT a knowledge-genealogy record. No civic authority treats registry status as evidence of oracle-reading validity; the four contested readings logged above (procedural-competence, oracle, bard-accretion, mixed) are NOT adjudicated by the registry's existence. Registered specialist lineages do not acquire world-level epistemic authority about Maker-Age (M-1), catastrophic-class origin (M-2), vessel-hosted agencies (M-6), guardian-construction mechanism (M-8), accumulated expedition-knowledge (M-9), or guardian-presence heterogeneity (M-10) merely by appearing on the civic ledger. The bardic-circuit mythologization that M-7 governs continues in parallel to but independent of registry administrative records. No magistrate, civic archivist, or chartered scholar cites the registry as a knowledge-source about the Maker Age or its artifacts. The M-7 firewall holds.
    change_id: CH-0005
    date: 2026-04-18
    label: Extension — Ledger-mark body-injury vs knowledge-genealogy
    originating_cf: CF-0031
  - body: 'The reputation-genealogy dynamics logged in M-7 extend, in parallel form, to subsection-masters of the oversize-saddlery guild-subsection (CF-0032). Named subsection-masters accrue bardic-circuit reputations through long careers, reciprocal cross-polity journey tradition, and narrative-custody channels analogous to CF-0017 / CF-0024 contracted-bard dynamics; the same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed), and the same disallowed cheap answers hold. Subsection-master reputation-genealogy is subject to the SAME firewalls: no subsection-master is framed as uniquely knowing the historical origin of the craft (M-12), the antiquity of reciprocal tradition (M-12), the true nature of species-progenitor figures (M-4), the origin of Cluster C species (which is outside canon scope but progenitor-cult lineage-keepers sometimes claim), or any Maker-Age question (M-1 / M-2 / M-6 / M-8 / M-9 / M-10 — none of which the subsection touches in practice, but the firewall discipline holds preventatively). Subsection-master field-lore is contested canon, not world-level authority; bardic accretion may outrun case-knowledge, and the "master who said less and completed more circuits" is a bardic trope, not a world-level epistemic position.'
    change_id: CH-0006
    date: 2026-04-18
    label: Extension — Subsection-master reputation-genealogy
    originating_cf: CF-0032
  - body: 'The reputation-genealogy dynamics logged in M-7 extend, in parallel form, to retired dragoons of the canal-corridor quarantine dragoon institution (CF-0033). Named retired dragoons accrue bardic-circuit reputations through pensionable-service career, ward-breach incident survival, and charter-court civic-advisory appointment trails; the same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed), and the same disallowed cheap answers hold. Retired-dragoon reputation-genealogy is subject to the SAME firewalls: no retired dragoon is framed as uniquely knowing the nature of the threats they responded to (Maker-Age origin, M-1; catastrophic-class origin, M-2; vessel-hosted agencies, M-6; guardian-construction mechanism, M-8; accumulated Maker-knowledge yield, M-9; guardian-presence heterogeneity, M-10). The "dragoon commander who understood ward-breach" is a bardic trope, not a world-level epistemic position; dragoon field-lore is operational-tactical procedural competence, not cosmological insight. Retired-dragoon civic-advisory testimony in charter-court hearings is contested canon for the specific polities and cases, never world-level authority. Added to disallowed cheap answers: *"Named retired-dragoon commander whose memory resolves ward-breach ontology — forbidden reveal."* The M-7 firewall holds with this fourth cross-application clause.'
    change_id: CH-0007
    date: 2026-04-18
    label: Extension — Retired-dragoon reputation-genealogy
    originating_cf: CF-0033
  - body: 'The reputation-genealogy dynamics logged in M-7 extend, in parallel form, to named bandit-hunter veterans of the CF-0024 adventurer-contractor stratum specializing in CF-0034 suppression work. This is the FIFTH parallel cohort, joining extractor-veteran / expedition-veteran (CF-0028) / subsection-master (CF-0032) / retired-dragoon (CF-0033) reputation-genealogy patterns. Named hunter-veterans accrue bardic-circuit reputations through long bounty-hunt careers, retrieval of named-bandit-captains, survival of corridor-season ambushes, and contracted-bard narrative-custody channels per CF-0017 / CF-0024 extension. The same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed), and the same disallowed cheap answers hold. Hunter-veteran reputation-genealogy is subject to the SAME firewalls: no hunter-veteran is framed as uniquely knowing the historical origin of named bandit-captains (M-14), the true identity behind composite-captain mythography (M-14), the Maker-Age origin of incidentally-encountered ruin-material (M-1), the nature of any bandit-custody vessel-hosted agency (M-6), or any other bounded-unknown the hunter encountered in field work. The "hunter-veteran who brought in seven captains and remembered every camp" is a bardic trope, not a world-level epistemic position; hunter field-lore is procedural-tactical survivor-bias competence, not historical authority about the captains pursued. Added to disallowed cheap answers: *"Named hunter-veteran whose memory resolves bandit-captain mythography or Maker-Age questions encountered in corridor work — forbidden reveal."* The M-7 firewall holds with this fifth cross-application clause.'
    change_id: CH-0008
    date: 2026-04-19
    label: Extension — Hunter-contractor reputation-genealogy (fifth cohort)
    originating_cf: CF-0034
  - body: 'CF-0035 commits legendary-beast hunt as a NAMED SUB-SPECIALTY within the CF-0024 wildlife contractor subtype (NOT a sixth CF-0024 subtype per Rule 3; NOT a sixth M-7 cohort). Named hunter-veterans of this sub-specialty accrue bardic-circuit reputations through long beast-hunt careers, corridor-named multi-settlement-threat beast retrievals, survival of contamination-haunt exposure, and contracted-bard narrative-custody channels per CF-0017 / CF-0024 extension. The same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed), and the same disallowed cheap answers hold. Legendary-beast-hunter sub-specialty reputation-genealogy is subject to the SAME firewalls as the five existing cohorts, but the sub-specialty status means it is tracked AS PART OF the existing CF-0024 contractor-veteran cohort pattern, NOT as a separate sixth cohort. If and when future canon work names specialist beast-hunter institutions distinct from CF-0024 wildlife sub-specialty (e.g., a chartered beast-hunter guild, a legally-recognized beast-hunter order, or any institutional form that crosses into a structurally distinct stratum), M-7 firewall extension to a sixth cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *"Named legendary-beast-hunter veteran whose memory resolves named-beast mythography questions or Maker-Age origin of the phenomenon — forbidden reveal."* The M-7 firewall holds with this sub-specialty holding clause.'
    change_id: CH-0009
    date: 2026-04-19
    label: Extension — Legendary-beast-hunter sub-specialty holding clause
    originating_cf: CF-0035
  - body: "CF-0036 commits that the silenced-adventurer-contractor stratum is ABSORBED INTO the CF-0024 failed-reputation-contractor feeder (Rule 3 specialness-inflation firewall; NOT a new stratum, NOT a sixth M-7 cohort). Silenced contractors accrue a distinctive bitterness-cadence reputation-register — they are the dredgers who keep singing at the tavern (bardic-circuit silenced-contractor ballad subgenre), the pensioned veterans who drink alone in the winter-rota, the witnesses who kept the coin and kept their mouths. The silenced-contractor ballad subgenre (itinerant-bard carried; patron-commissioned-bard refused; sectarian-commissioned-bard inflation marked-breach) operates within the existing contracted-bard narrative-custody register (CF-0017 / CF-0024 extension), NOT as a new reputation-genealogy cohort. The same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed) to silenced-contractor reputations, with the characteristic inflection that the silenced-contractor's \"oracle reading\" is refuted most sharply by the hero-drift firewall — the silenced witness is NOT the protagonist who exposes the watch; the bitterness is in the AES-1 scarred cadence, not the chosen-truth-teller cadence. Silenced-contractor reputation-genealogy is subject to the SAME firewalls as the five existing cohorts (Maker-Age M-1, catastrophic-class M-2, vessel-agency M-6, guardian-construction M-8, Maker-knowledge-yield M-9, guardian-presence M-10, bandit-captain M-14, cannibal-doctrine-antiquity M-16, cannibal-case-prevalence M-17, civic-suppression-protocol-antiquity M-18) — no silenced contractor is framed as uniquely knowing the sealed-case truth the civic-suppression withheld. If and when future canon work names specialist silenced-witness institutions distinct from CF-0024 failed-reputation-contractor feeder (e.g., an organized silenced-witness mutual-aid society achieving chartered standing, a chartered silenced-witness unsealing-advocacy magistrate-auxiliary, or any institutional form that crosses into a structurally distinct stratum), M-7 firewall extension to a sixth cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *\"Named silenced-contractor whose memory resolves the sealed-cannibal-case civic suppression at world level — forbidden reveal.\"* *\"Silenced-contractor bitterness-cadence reinterpreted as chosen-truth-teller oracle-register — forbidden reveal.\"* The M-7 firewall holds with this sub-specialty holding clause."
    change_id: CH-0010
    date: 2026-04-19
    label: Extension — Silenced-contractor sub-specialty holding clause
    originating_cf: CF-0036
  - body: "CF-0037 commits the family-handled waystation tradition (heartland, highland, mountain east) as a non-chartered household-enterprise institution with stationkeeper as inherited social role. Named stationkeeper reputations accrue through long-tenure family-line continuity and through bardic-circuit hosting (the bard who has stopped at the Halver Family stop for thirty years carries something of its register), but stationkeeper reputation is ABSORBED WITHIN existing tradesperson-reputation register OR within CF-0024-adjacent contractor-veteran patterning where the stationkeeper-family also engages in caravan-master adjacency or hunter-contractor adjacency, NOT a sixth M-7 reputation-genealogy cohort (Rule 3 specialness-inflation firewall; parallel to CF-0035 legendary-beast-hunter and CF-0036 silenced-contractor sub-specialty holding clause precedents). Stationkeeper-reputation accrues qualitatively distinct cadence — the kept-stop pride-and-resignation register (AES-1 scarred-veteran cadence applied to ordinary commerce) and the walked-stop third-person mourning register — but operates within the existing contracted-bard narrative-custody register (CF-0017 / CF-0024 extension), NOT as a new reputation-genealogy cohort. The same four contested readings apply (procedural-competence / oracle / bard-accretion / mixed) to stationkeeper reputations, with the characteristic inflection that the stationkeeper's \"oracle reading\" is firewalled at multiple surfaces — no road-corridor cosmological insight, no Maker-Age archaeology, no progenitor-figure resolution accrues to stationkeeper memory regardless of generations. Stationkeeper reputation-genealogy is subject to the SAME firewalls as the five existing cohorts (Maker-Age M-1, catastrophic-class M-2, vessel-agency M-6, guardian-construction M-8, Maker-knowledge-yield M-9, guardian-presence M-10, bandit-captain M-14, cannibal-doctrine-antiquity M-16, cannibal-case-prevalence M-17, civic-suppression-protocol-antiquity M-18). If and when future canon work names specialist stationkeeper institutions distinct from CF-0037 family-enterprise pattern (e.g., an organized waystation-keepers' guild achieving chartered standing — explicitly forbidden by CF-0037's NON-CHARTERED commitment per INSTITUTIONS §Trade/Guilds CH-0012 reaffirmation, but theoretically possible if a future retcon overrides — or any institutional form that crosses into a structurally distinct stratum), M-7 firewall extension to a sixth cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *\"Named legendary stationkeeper whose memory resolves road-corridor / Maker-Age / progenitor-figure questions — forbidden reveal.\"* *\"Stationkeeper-family multi-generation continuity reinterpreted as oracle-register specialist authority — forbidden reveal.\"* The M-7 firewall holds with this sub-specialty holding clause."
    change_id: CH-0012
    date: 2026-04-19
    label: Extension — Stationkeeper sub-specialty holding clause
    originating_cf: CF-0037
  - body: "CF-0043 commits Ash-Seal technicians and post-Ash-Seal defector-specialists as Brinewick-trained portable-reputation INDIVIDUAL consultants across the heartland chartered-extraction-guild containment-wright labor market. Defector-specialist reputation-genealogy is ABSORBED WITHIN the existing M-7 containment-wright / occult-fallout reputation-genealogy cohorts — they are a SUB-SPECIALTY of the extractor-veteran + containment-wright + occult-fallout-specialist cohort pattern, NOT a sixth M-7 cohort (Rule 3 specialness-inflation firewall; parallel to CF-0035 legendary-beast-hunter, CF-0036 silenced-contractor, CF-0037 stationkeeper sub-specialty holding clause precedents). The \"came out of Brinewick\" idiom anchors the sub-specialty signaling within the broader containment-wright reputation register; the characteristic inflection is an EMPIRICAL-CRAFT-KNOWLEDGE-HEAVY cadence (procedural-competence dominant) with lower oracle-register and moderate bard-accretion. Ash-Seal-trained sub-specialty reputation-genealogy is subject to the SAME firewalls as the five existing cohorts: no defector-specialist is framed as uniquely knowing Maker-Age cause-of-fall (M-1), catastrophic-class origin (M-2), vessel-agency nature (M-6), guardian-construction mechanism (M-8), Maker-knowledge yield beyond empirical-craft (M-9), guardian-presence distribution (M-10), bandit-captain mythography (M-14), sealed-case truth (M-18), or destruction-resistance mechanism (M-20). Defector craft-knowledge is empirical procedural-competence (vessel-preparation, disposal-site selection, incident-response patterns); it is NOT Maker-Age cognitive content custody, NOT destruction-technique recovery (M-20 firewall), NOT sealing-technique recovery (CF-0041 Maker-sealing-LOST firewall). If and when future canon work names specialist Ash-Seal-successor institutions distinct from CF-0043 civic-chartered Brinewick-local commercial-company form (e.g., a chartered Ash-Seal-successor guild achieving chartered standing, a cross-polity Ash-Seal-defector mutual-aid society achieving chartered standing, or any institutional form that crosses into a structurally distinct stratum — currently forbidden by CF-0043's non-transferable civic-charter commitment but theoretically possible if a future retcon overrides), M-7 firewall extension to a sixth cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *\"Named Ash-Seal defector-specialist whose memory resolves Maker-Age containment origin, destruction-resistance mechanism, or sealing-technique recovery — forbidden reveal.\"* *\"Ash-Seal-trained portable reputation reinterpreted as oracle-register specialist authority on bounded unknowns — forbidden reveal.\"* The M-7 firewall holds with this sub-specialty holding clause."
    change_id: CH-0015
    date: 2026-04-20
    label: Extension — Ash-Seal defector-specialist sub-specialty holding clause
    originating_cf: CF-0043
  - body: "CF-0044 commits drylander verse-competence reputation (bards, caravan-masters, well-keepers with deep hospitality-verse repertoires) as a drylands-regional cultural-prestige register absorbed within existing tradesperson / caravan-master / CF-0017 circuit-bard reputation patterns — NOT a sixth M-7 reputation-genealogy cohort (Rule 3 specialness-inflation firewall; parallel to CF-0035 legendary-beast-hunter, CF-0036 silenced-contractor, CF-0037 stationkeeper, CF-0043 Ash-Seal-defector-specialist sub-specialty holding clause precedents). The \"verse-competent drylander\" idiom anchors the sub-specialty signaling within the broader tradesperson and caravan-master reputation registers; the characteristic inflection is CULTURAL-PRESTIGE cadence (non-portable across the drylands-heartland border; evaporates at border; CF-0024 portable-contractor-reputation mechanism does NOT pick it up). Verse-competence reputation is subject to the SAME firewalls as the five existing cohorts: no drylander verse-keeper is framed as uniquely knowing Maker-Age cause-of-fall (M-1), catastrophic-class origin (M-2), progenitor-historicity (M-4; CH-0016 cross-application firewall above), vessel-agency nature (M-6), guardian-construction mechanism (M-8), Maker-knowledge yield (M-9), guardian-presence distribution (M-10), bandit-captain mythography (M-14), sealed-case truth (M-18), or destruction-resistance mechanism (M-20). Verse-repertoire is cultural-hospitality content (stranger-introduction register, genre-register progenitor-or-household-god verse-matter), not oracle-register insight. Circuit-bard (CF-0017) absorption of verse-fragments into bardic-tavern material is EXISTING M-7 cohort activity — the circuit-bard who carries drylands fragments remains a circuit-bard under the existing cohort pattern, not a new \"drylands-absorbed-fragment-specialist\" cohort. If and when future canon work names specialist drylander-verse-keeper institutions distinct from the CF-0044 folk-practice register (e.g., a chartered drylands-verse-keepers' guild achieving chartered standing — explicitly forbidden by CF-0044's non-chartered commitment but theoretically possible if a future retcon overrides, or a monastic verse-archive formation that crosses into a structurally distinct stratum), M-7 firewall extension to a sixth cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *\"Named drylander verse-keeper whose hospitality-repertoire resolves progenitor / Maker-Age / civic-suppression bounded unknowns — forbidden reveal.\"* *\"Drylands verse-competence reputation reinterpreted as oracle-register specialist authority on bounded unknowns — forbidden reveal.\"* *\"A drylands verse-tradition proving content at world-level that the existing M-N cohort firewalls prohibit — forbidden reveal.\"* The M-7 firewall holds with this sub-specialty holding clause."
    change_id: CH-0016
    date: 2026-04-20
    label: Extension — Drylands verse-competence sub-specialty holding clause
    originating_cf: CF-0044
  - body: "CF-0047 commits the drylands well-keeper customary-authority role — lineage-inheritable well-stop office, apprenticeship chore-from-young at 6-7, cross-species hospitality etiquette authority, CF-0044 verse-repertoire custody, station-log keeping in DIS-2 trade-tongue — as a drylands-regional mid-stratum working-texture reputation register absorbed within existing tradesperson / caravan-master / CF-0017 circuit-bard / CF-0044 verse-competent-drylander reputation patterns — NOT a sixth M-7 reputation-genealogy cohort (Rule 3 specialness-inflation firewall; parallel to CF-0035 legendary-beast-hunter, CF-0036 silenced-contractor, CF-0037 stationkeeper, CF-0043 Ash-Seal-defector-specialist, and CF-0044 drylands verse-competence sub-specialty holding clause precedents). The \"well-keeper's word\" idiom anchors the sub-specialty signaling within the broader tradesperson and caravan-master reputation registers at drylands-corridor scale; the characteristic inflection is WORKING-TEXTURE CADENCE paralleling CF-0037 stationkeeper (settled-resigned-respectable middle-stratum, kinship-frustration in AES-1 register applied to ordinary commerce, \"kept the well\" / \"walked the well\" idiom pair paralleling \"kept the stop\" / \"walked the stop\"). Well-keeper reputation is subject to the SAME firewalls as the six existing sub-specialty cohorts: no drylands well-keeper is framed as uniquely knowing Maker-Age cause-of-fall (M-1), catastrophic-class origin (M-2), progenitor-historicity (M-4), vessel-agency nature (M-6), guardian-construction mechanism (M-8), Maker-knowledge yield (M-9), guardian-presence distribution (M-10), bandit-captain mythography (M-14), sealed-case truth (M-18), or destruction-resistance mechanism (M-20). Well-keeper repertoire is cultural-hospitality-and-commerce content (keeping-book arithmetic, station-log manifest, verse-repertoire custody, corridor-reputation literacy), not oracle-register insight. Caravan-master corridor-internal customary-adjudication (CF-0046) is WORKING-TEXTURE authority-judgment analogous to CF-0034 waiting-wolves judgment and CF-0036 mix-sound judgment, not oracle-register authority. Lineage-inheritance is institutional-role continuity (per CH-0018 ONTOLOGY social_role annotation; paralleling CH-0005 M-7 body-injury-vs-knowledge-genealogy discipline), NOT knowledge-genealogy continuity — a well-keeper whose great-grandmother kept the well in a named corridor does NOT thereby uniquely know Maker-Age, progenitor-cult, or civic-suppression bounded unknowns through inheritance channel. If and when future canon work names specialist drylands-well-keeper institutions distinct from the CF-0046/CF-0047 folk-practice register (e.g., a chartered drylands-well-keepers' guild achieving chartered standing — explicitly forbidden by CF-0046/CF-0047 non-chartered commitment but theoretically possible if a future retcon overrides; or a well-keeper-lineage oracle-tradition named at world level that crosses structurally into a distinct stratum), M-7 firewall extension to a seventh cohort becomes warranted; until then, the holding clause applies. Added to disallowed cheap answers: *\"Named drylands well-keeper whose lineage-memory resolves Maker-Age, progenitor, or civic-suppression bounded unknowns — forbidden reveal.\"* *\"A well-keeper's keeping-book containing proto-archaeological Maker-research or Maker-cognitive content — forbidden reveal.\"* *\"Drylands well-keeper customary-authority reinterpreted as oracle-register specialist authority on bounded unknowns — forbidden reveal.\"* *\"Well-keeper lineage-inheritance as Maker-knowledge transmission channel — forbidden reveal.\"* The M-7 firewall holds with this sub-specialty holding clause."
    change_id: CH-0018
    date: 2026-04-20
    label: Extension — Drylands well-keeper sub-specialty holding clause
    originating_cf: CF-0047
