id: M-9
title: The Epistemic Content of Recovered Maker-Knowledge
status: active
knowns:
  - Expeditions yield fragments, objects, partial translations (CF-0023 register), and inscribed shards; the corpus grows
unknowns:
  - Whether accumulated knowledge, over generations of expeditions, will EVER amount to civilization-identity, cause-of-fall, or catastrophic-class-origin answers
common_interpretations: []
disallowed_cheap_answers:
  - Any "decisive find" reveal — a single expedition that cracked M-1 or M-2
domains_touched:
  - MAGIC
  - INSTITUTIONS (archives
  - guilds
  - expedition ventures
  - bardic circuit)
  - RELIGION (sectarian readings of the corpus)
  - POLITICS (custody-contest centralization fights).
future_resolution_safety: low
extensions:
  - originating_cf: CF-0033
    change_id: CH-0007
    date: 2026-04-18
    label: Extension — Dragoon civic-evidence archive firewall
    body: "Canal-corridor quarantine dragoons (CF-0033) in adopting polities pursue black-market artifact traffic and maintain civic-evidence archives documenting confiscated broker-material (INSTITUTIONS §Recordkeeping CH-0007 eighth archival category). These archives do NOT constitute a Maker-knowledge custody channel for M-9 purposes. The five custody channels (civic archive, artifact-guild, theological authority, black-market grimoire-corridor per CF-0023, black-market ruin-cartography per CF-0028) retain their M-9 relevance; dragoon civic-evidence archives are a SIXTH custody category at the institutional-recordkeeping level but NOT a Maker-knowledge custody channel, because confiscated material follows chartered-guild handoff protocols per CF-0008 CH-0004 funder-primacy framework (chartered-broker purchase channel for legal disposition) rather than civic retention. The disposition discipline is load-bearing — civic retention of Maker-Age artifact-material beyond evidentiary-hold is forbidden; failure to maintain the disposition discipline would convert dragoon archives into a sixth Maker-knowledge custody channel and pressure M-9's bounded-unknown-status of accumulated Maker knowledge. Added to disallowed cheap answers: *\"Combining dragoon civic-evidence archives with the five existing custody channels reconstructs Maker-Age knowledge — forbidden reveal.\"* The M-9 firewall holds with this cross-application clause."
  - originating_cf: CF-0034
    change_id: CH-0008
    date: 2026-04-19
    label: Extension — Bandit-custody route-not-channel firewall
    body: 'Endemic bandit groups (CF-0034) incidentally encountering Maker-Age ruin-material through shelter-scope ruin occupation (see M-1 extension) route that material into the existing illegitimate-custody streams — CF-0023 grimoire-corridor for any fragment-material, CF-0028 ruin-cartography for any entrance-knowledge, generic black-market fencing for non-magical ruin-loot (pottery, metal fittings, inscribed shards). Bandit-custody is a ROUTE THROUGH the five (now six including dragoon-archive) established custody channels, NOT a new seventh Maker-knowledge custody channel. Bandit groups do not maintain archives, do not translate, do not authenticate, do not collate — they hold and dispose. The disposition discipline is load-bearing: bandit-aggregated Maker-material is small-scale, incidental, and rapidly offloaded for coin, not curated. Added to disallowed cheap answers: *"A bandit captain built a hidden Maker-archive from decades of corridor-loot, and the archive combined with the other six custody channels reconstructs Maker-Age knowledge — forbidden reveal."* The M-9 firewall holds with this cross-application clause.'
  - originating_cf: CF-0035
    change_id: CH-0009
    date: 2026-04-19
    label: Extension — Mutated-beast remains not-a-custody-channel firewall
    body: "Artifact-contaminated mutated non-sentient beast remains (CF-0035) — trophies, bones, tissue, beast-horn-inlay material, preserved specimens — are NOT a Maker-knowledge custody channel. Hunter-contractors (CF-0024 wildlife sub-specialty) deliver carcasses under bounty-clerk certification for trophy-market disposition and for guild-contamination-protocol handoff where applicable; the material enters trophy / natural-history / curiosity-collector registers, NOT Maker-knowledge registers. Chartered extraction-guild authentication specialists may examine mutated-beast trophies for contamination-adjacency status and craft-signature distinction from modern-crafted vessels (CF-0021) or guardian-construction remains (CF-0029), but this examination does NOT yield Maker-Age cognitive content — the beast's body carries artifact-effect on untargeted fauna, not Maker intent encoded in craft. The six established Maker-knowledge custody channels (civic archive, artifact-guild, theological authority, CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0033 dragoon civic-evidence archive) retain their M-9 relevance; mutated-beast remains do NOT form a SEVENTH Maker-knowledge custody channel. Natural-history scholarly access to preserved specimens is governed by the OPEN_QUESTIONS deferral on Hunter-Contractor Beast-Trophy Custody (CH-0009); any such access must firewall against Maker-archive slippage. Added to disallowed cheap answers: *\"Accumulated mutated-beast remains combined with Maker-knowledge custody channels reconstructs Maker-Age civilization — forbidden reveal.\"* *\"A natural-history archive of mutated-beast trophies treated as a Maker-knowledge repository — forbidden reveal.\"* The M-9 firewall holds with this cross-application clause."
  - originating_cf: CF-0041
    change_id: CH-0014
    date: 2026-04-20
    label: Extension — Maker-deliberately-buried-building archaeology not-a-custody-channel firewall
    body: 'CF-0041 commits Maker-Age deliberately-buried buildings as a distinct substructure sub-category struck periodically by foundation-digs, canal cuts, estate-cellar excavations, qanat-cleaning rites, and peat-cuttings. Archaeology of Maker-buried buildings yields STRUCTURAL DATA (chamber layout, engineering method of burial, sealed-container disposition within the building), ENGINEERING DATA (earth-fill depth, hydrological flooding technique, reinforced-masonry pattern), and ARTIFACT-DISPOSITION DATA (which artifacts were sealed, how they were contained). It does NOT yield MAKER-COGNITIVE CONTENT — translated texts, civilization-identity findings, cause-of-fall evidence, Maker-intent-behind-burial attribution. Buried-building archaeology is a SITE-TYPE EXTENSION within the CF-0027 enterable-ruin category (annotated in CANON_LEDGER), NOT a seventh Maker-knowledge custody channel. The six established Maker-knowledge custody channels (civic archive, artifact-guild, theological authority, CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0033 dragoon civic-evidence archive) retain their M-9 relevance; Maker-buried-building archaeology does NOT form a SEVENTH custody channel. Civic-archaeological-license frameworks (pressed by civic-reformists per OPEN_QUESTIONS §Ruin Ownership and Jurisdiction CH-0014 extension) debate excavation jurisdiction but do NOT elevate buried-building archaeology to Maker-knowledge custody status; the excavated engineering/structural data flows back into CF-0027 / CF-0028 expedition-artifact-pipeline registers without Maker-cognitive-content elevation. Added to disallowed cheap answers: *"Excavation of a Maker-buried building reconstructs Maker civilization identity or cause-of-fall — forbidden reveal."* *"A Maker-buried-building inscription directly revealing Maker cognitive intent behind the burial — forbidden reveal."* *"A civic-archaeological-license archive of buried-building excavation records treated as seventh Maker-knowledge custody channel — forbidden reveal."* *"Accumulated buried-building engineering data combined with the six existing custody channels reconstructs Maker Age — forbidden reveal."* The M-9 firewall holds with this cross-application clause.'
  - originating_cf: CF-0043
    change_id: CH-0015
    date: 2026-04-20
    label: Extension — Ash-Seal commercial-trade-secret archive not-a-custody-channel firewall
    body: "CF-0043 commits Ash-Seal's Brinewick-local internal research archive as an ELEVENTH civic-archive category (commercial trade-secret research custody; see INSTITUTIONS §Recordkeeping CH-0015 extension), categorically distinct from the ten prior civic-held archival categories and from guild-internal craft archives. Ash-Seal's archive contains EMPIRICAL CONTAINMENT/CRAFT knowledge (handling protocols, vessel-design empirical notes, disposal-site selection logs, incident-response case files, trade-jargon classification vocabulary); it does NOT contain MAKER-COGNITIVE CONTENT (translated texts, civilization-identity findings, cause-of-fall evidence, Maker-intent attribution). Ash-Seal's archive is a COMMERCIAL-EMPIRICAL-CRAFT custody channel structurally parallel to chartered-extraction-guild's internal containment-wright training archive, NOT a seventh (now eighth, counting CF-0041 buried-building-archaeology parallel) Maker-knowledge custody channel. The six established Maker-knowledge custody channels (civic archive, artifact-guild, theological authority, CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0033 dragoon civic-evidence archive) retain their M-9 relevance; Ash-Seal's commercial-trade-secret archive does NOT form a seventh Maker-knowledge custody channel regardless of the civic-charter trade-secret-protection clause that renders it opaque to civic-registry subpoena except under charter-audit predicate. Sectarian Maker-mystic claims that Ash-Seal's civic-legally-protected trade-secret research archive is \"the concealed Maker-knowledge custody channel\" are CONTESTED-SECTARIAN PROJECTION (paralleling CF-0023 grimoire-as-Maker-research projection), NOT world-truth. Reform-current clergy (CF-0026) standing charter-audit-access campaign seeking civic-registry subpoena access operates on SCANDAL-CONTAINMENT-and-commercial-corruption PREDICATE (audit of backchannel-sale activity and trade-secret facility-location compliance), NOT on Maker-knowledge-custody predicate — the campaign does NOT claim that Ash-Seal holds Maker-knowledge and seeks civic subpoena to recover it. Added to disallowed cheap answers: *\"Ash-Seal's commercial-trade-secret archive revealed to contain Maker-cognitive content — forbidden reveal at world level.\"* *\"Ash-Seal internal research archive reconstructs Maker civilization identity — forbidden reveal.\"* *\"A defector-specialist publishes archive content revealing Maker-Age knowledge recovery — forbidden reveal at world level.\"* *\"Ash-Seal's archive combined with the six prior Maker-knowledge custody channels reconstructs Maker Age — forbidden reveal.\"* *\"Civic charter-audit subpoena of Ash-Seal archive yielding Maker-Age cognitive content — forbidden reveal at world level.\"* The M-9 firewall holds with this cross-application clause."
  - originating_cf: CF-0046
    change_id: CH-0018
    date: 2026-04-20
    label: Extension — Drylands corridor station-log not-a-custody-channel firewall
    body: 'CF-0046 commits the drylands caravan-corridor station-log as a household-held informal corridor-commercial record kept by well-keepers (CF-0047) in DIS-2 trade-tongue (a cross-community commercial lingua franca; see DIS-2 examples). Station-logs contain TRAVELER-COUNT MANIFEST DATA (arrivals, departures, caravan-rotation timing, overnight hosting counts), SUPPLY-RUN LEDGER DATA (deliveries from supply-villages, keeping-book water-share balanced, hospitality-due tallies), and CONTRACT-SUMMARY DATA (brief notes paralleling tea-house-scribe witness records, household-internal register). They do NOT contain MAKER-COGNITIVE CONTENT (translated texts, civilization-identity findings, cause-of-fall evidence, Maker-intent attribution) — even when station-log entries incidentally describe qanat-cleaning-rite unsealing finds (per CF-0041 drylands convention-register unsealing response), the entries record find-and-disposition as civic-procedural manifest data, NOT as Maker-research material. The drylands corridor station-log tradition is a COMMERCIAL-MUNDANE CORRIDOR-HOUSEHOLD record-keeping channel categorically distinct from the six Maker-knowledge custody channels (civic archive, artifact-guild, theological authority, CF-0023 grimoire-corridor, CF-0028 ruin-cartography, CF-0033 dragoon civic-evidence archive) and structurally parallel to CF-0037 waystation household-ledger NON-ARCHIVAL posture. The station-log is NOT a twelfth archival category in the expanded taxonomy (per CH-0018 INSTITUTIONS §Recordkeeping), and it is NOT a seventh Maker-knowledge custody channel. Household-custody ceiling (each station-log is family-property at a specific well-stop; no aggregation institution exists; no civic-registry subsidiary-record capability under drylands institutional thinness per CF-0046) structurally prevents cross-lineage aggregation into civilization-identity-findings at world level — a single station-log cannot approach civilization-identity reconstruction, and there is no institutional mechanism to federate station-logs across the corridor into such a corpus. Sectarian Maker-mystic claims that drylands station-log tradition preserves proto-archaeological Maker-knowledge are CONTESTED-SECTARIAN PROJECTION (paralleling CF-0023 grimoire-as-Maker-research projection, CF-0028 ruin-cartography-as-Maker-knowledge projection, and CF-0043 Ash-Seal-research-as-Maker-recovery projection), NOT world-truth. Trade-tongue corridor-application is DIS-2-convergence mundane commercial lingua-franca subset (per CH-0018 INVARIANTS DIS-2 clarification; per CH-0018 OPEN_QUESTIONS §Maker-Age Linguistic Recovery DIS-2-convergence discharge), NOT evidence for or against Maker-Age linguistic survival — station-log entries in trade-tongue do NOT carry linguistic-genealogy weight. Added to disallowed cheap answers: *"A drylands well-keeper station-log revealed to contain proto-archaeological Maker-knowledge — forbidden reveal."* *"Accumulated drylands corridor station-logs combined with the six existing Maker-knowledge custody channels reconstructs Maker civilization — forbidden reveal."* *"A station-log entry in trade-tongue revealed to encode Maker-Age linguistic content — forbidden reveal."* *"A drylands well-keeper lineage-inheritance of station-logs treated as multi-generational Maker-knowledge transmission channel — forbidden reveal."* The M-9 firewall holds with this cross-application clause.'
