knowns:
  - Maker-Age artifacts resist destruction by means available to current-age capability (CF-0039). Attempts to smash, burn, dissolve, or otherwise unmake a Maker-Age artifact do not destroy the effect; they bind it more deeply into the vessel and elevate the material resistance of the substrate
status: passive
title: The Mechanism of Maker-Age Artifact Destruction-Resistance
