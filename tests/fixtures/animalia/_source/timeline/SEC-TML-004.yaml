id: SEC-TML-004
file_class: TIMELINE
order: 4
heading: Layer 4 — Current Unstable Present
heading_level: 2
body: |-
  The Incident Wave continues. Several pressures are converging:

  - **Canal expansion vs ward economy**: New canal cuts mean more digging, more discoveries, more containment costs. Polities argue over who pays.
  - **Centralization fights**: Some polities push to nationalize artifact custody under crown or city-council authority; the guilds resist.
  - **Black market**: Demand for unregistered artifacts has risen — collectors, would-be tyrants, foreign agents. Smugglers thrive.
  - **Two bad winter-fever years in the heartland**: Demographic shock; widows and orphans increase; herb-wives and barber-surgeons stretched thin.
  - **Rising progenitor-cult tension in mixed cities**: Sectarian movements pressing for species-specific civic privileges, tugging against the Charter-Era settlement.
  - **Bardic-circuit politicization**: Some bards now pointedly perform Maker-skeptical or guild-skeptical material; others are quietly hired to perform comfort.
  - <!-- added by CF-0021 --> **Crafter-tolerance debate**: Polities argue whether to treat modern artifact-crafters (CF-0021) as smugglers, scholars, heretics, or legitimate artisans. Some accept and license; some tolerate untaxed; some impose fines; some criminalize possession of creation knowledge outright. Crafter-mobility raises novel extradition cases the Charter Era never anticipated. Sectarian movements take positions for and against; Maker-mystic fringe celebrates the practice as recovery of sacred craft, common-pantheon clergy mostly condemn, progenitor-cult lineage-keepers split.
  - <!-- added by CF-0024 --> **Contractor-stratum politics**: Polities argue over licensing, taxation, and liability of adventurer-contractors and mercenary companies. Civic licensing debates parallel the crafter-tolerance pattern — some polities license mercenary companies under tight charter, some tolerate ad-hoc band formation, some restrict, some ban. Named reputable contractors travel inter-polity and generate novel extradition case law the Charter Era has no schema for. Noble-retinue formation under adventurer-contract language frictions with Charter anti-monopoly-of-force norms; civic watch periodically tests the boundary. Principled-refuser clergy (CF-0026) gain civic standing in reform currents within the common pantheon and in some progenitor-cult lineages, while sectarian progenitor-supremacy movements recruit veterans for armed lineage-guard roles.
  - <!-- added by CF-0028 --> **Expedition-competition regional armed conflict**: An acute Charter-Era anti-monopoly-of-force stress emerging from inter-group ruin-expedition competition. When two or more patron-funded expeditions (CF-0028) contest the same enterable ruin site (CF-0027), escalation has proceeded in documented recent cases from skirmish between contractor bands, to mercenary-band engagement, to polity-levy mobilization, to regional armed conflict between chartered polities. This exceeds the CF-0024 "strains rarely breaks" framing of noble-retinue friction; it is the first current-layer pressure to approach Charter-Era rupture in regions of weak charter. Funder-primacy disputes (CF-0030) under polity-asymmetric statutes compound the friction: the sponsor-polity's legal theory is often unrecognized in the ruin-site polity's courts. Civic magistrates build precedent with visible anxiety.
  - <!-- added by CF-0031 --> **Contamination-lineage ledger-mark adoption debate**: Chartered polities argue over whether and how to adopt the civic-registry contamination-lineage ledger-mark (CF-0031). Larger chartered heartland polities with robust civic-registry infrastructure and extraction-guild taxation streams have adopted; containment-wright-dominated polities decline on surveillance-wedge grounds; highland clans and fen-villages lack civic-registry infrastructure to adopt. The welfare-vs-surveillance tension is live: reform-current common-pantheon clergy (CF-0026 alignment) bifurcate between mandatory-enrollment-with-protection campaigns and three-generation-mark abolition campaigns; sectarian progenitor-supremacy movements oppose the registry on species-lineage-occlusion grounds. Registry-scrubber underground appears in punitive polities (sharing canal-corridor infrastructure with CF-0023 grimoire and CF-0028 ruin-cartography black-market streams); inter-polity migration-gap extradition cases appear on magistrate dockets as a fourth axis of Charter-Era regional-variation friction alongside CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, and CF-0028/CF-0030 funder-primacy. Four parallel polity-asymmetries now constitute a recognizable Charter-Era stress register. <!-- clarified by CH-0011 (inherited CH-0005 counting-drift; original prose omitted CF-0028/CF-0030) -->
  - <!-- added by CF-0033 --> **Canal-corridor quarantine dragoon adoption debate**: Chartered polities argue over whether to adopt canal-corridor quarantine dragoons (CF-0033) as civic-chartered ward-breach perimeter force. Larger heartland polities with canal-choke-point revenue, strong central-council authority, chartered extraction guild consent or override, and acute Incident Wave exposure adopt; polities with strong principled-refuser clergy (CF-0026) influence or sectarian progenitor-cult refusal decline on charter grounds; smaller polities without funding-stream access cannot stand up a corps; highland clans, fen-villages, and drylands caravan polities lack civic infrastructure. Dragoon-adoption joins CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028/CF-0030 funder-primacy, and CF-0031 contamination-registry as a FIFTH polity-asymmetric disagreement axis in the Charter-Era stress register — the register formerly counted as three or four now stands at five, and the cumulative asymmetric-friction load on inter-polity extradition dockets and magistrate-court Charter-Era precedent-building is recognizably concentrated. Charter-Era anti-monopoly-of-force tension receives bidirectional stress in adopting polities: CF-0024 noble-retinue friction stresses the norm from ABOVE (private force accreting); CF-0033 dragoons invert the stress direction, accreting civic-chartered force from BELOW. Mission-creep pressure toward routine policing or external-conflict deployment is blocked by charter-court challenge brought primarily by principled-refuser clergy (CF-0026). Black-market artifact brokers re-route away from dragoon-active canal corridors toward non-adopting polities, intensifying adoption-asymmetric concentration and generating reactive-adoption pressure on non-adopting polities that may partially defeat Stabilizer-1 (anti-monopoly political cost). Kit-counterfeit black market (retired-dragoon uniform, crest, escutcheon) joins the canal-corridor illegitimate-service infrastructure as a fourth product-line alongside CF-0023 grimoire-corridor, CF-0028 ruin-cartography, and CF-0031 registry-scrubber streams, compounding the authentication-cartel formation pressure already flagged under CF-0028 and CF-0031.

  - <!-- added by CF-0034 --> **Endemic-banditry current pressures**: convergent Layer-3 recruitment feeders (bad-winter-fever cohorts, canal-displaced labor, sealed-quarter refugees, CF-0021 failed-apprentice stratum, CF-0024 failed-reputation contractors) feed a recognizable recent bandit-recruitment uptick; hunter-contractor bounty-contract volume on tavern boards rises in affected corridors; raid-and-enslave subset (CF-0034 distribution) concentrates in isolated / weak-charter / demographically-fragile regions; mission-creep pressure on CF-0033 dragoon scope is blocked by explicit hunter-contractor ≠ dragoon civic-doctrine per M-13 boundary defense; worst-band self-suppression stabilizer remains economically fragile in poor peripheries where settlement-hire capacity is thin.

  - <!-- added by CF-0035 --> **Wildland mutated-beast current pressures**: settlement-bounty wall verified-beast column rising in wildland-adjacent heartland, highland, drylands-corridor, and dry-edge-fen polities; hunter-contractor wildland sub-specialty (CF-0024 wildlife subtype extension; NOT a sixth CF-0024 subtype) bounty-contract volume rising; bardic legendary-beast cycle politicization (sectarian Maker-mystic readings and reform-current ethical-framing broadsides circulating in parallel to CF-0034 bounty-ethics material); deep-wilderness expeditionary restraint increasing as survivor rumors of gargantuan-underground phenomena (M-15) accumulate. NOT a sixth Charter-Era polity-asymmetric axis — uncontested-suppression-consensus holds (every polity wants the beast dealt with), paralleling CF-0034 bandit-extradition MINOR operational docket status. Latent-burden watch: if polities develop structurally divergent trophy-legality conventions (trophy-legal vs contamination-prosecuted), the current MINOR status could harden into a sixth structural asymmetry axis — tracked per CH-0009, not a current structural reality. Veteran-pool multi-claim cannibalization (CF-0034 Breakage Points §Veteran-pool) extends to include wildland-hunter-sub-specialty as a seventh-to-tenth concurrent claim on the CF-0024 veteran pool, depending on polity.

  - <!-- added by CF-0036 --> **Interspecies-friction civic-suppression current pressures**: magistrate-court sealed-cannibal-case docket volume rising in mixed-species canal-heartland and walled-estate polities with exposed-corridor adjacency; hate-speech and exclusionary-settlement-extradition magistrate precedent accumulating across adopting polities; silenced-contractor bitterness-reservoir (ABSORBED into CF-0024 failed-reputation-contractor feeder per Rule 3 firewall) feeds sectarian-doctrine recruitment at the margin and may drift some silenced contractors toward CF-0034 bandit-recruitment feeders under sectarian-patronage pressure; CF-0026 principled-refuser clergy bifurcation (THIRD instance, after CH-0005 contamination-lineage and CH-0007 dragoon-scope) into charter-defense-anti-supremacism vs civic-restraint-pragmatic wings under accumulating silenced-witness evidentiary load; bardic-circuit silenced-contractor ballad subgenre proliferating (itinerant bards sing; patron-commissioned bards refuse; sectarian-commissioned bards who inflate supremacist recruitment register are marked-breach by listeners); settlement bounty-wall cannibal-band verified-bounty column at triple standard premium with authentication discipline extending the CF-0035 trophy-provenance precedent; false-cannibal bounty-certification seventh product-line on canal-corridor illegitimate-service rail compounding authentication-cartel pressure beyond CF-0035 six-stream posture. NOT a sixth Charter-Era polity-asymmetric axis — uncontested-suppression-consensus holds at PROSECUTION level (every chartered polity agrees cannibalism is prosecutable and hate-speech is magistrate-reachable); polity disagreement is operational only (silence-protocol-unsealing convention variation, exclusionary-settlement extradition precedent), paralleling CF-0034 bandit-extradition and CF-0035 trophy-legality MINOR operational docket status. Three parallel sixth-axis latent-burden watch-items now tracked (CF-0034 bandit-extradition + CF-0035 trophy-legality + CF-0036 suppression-unsealing-convention); if polities develop STRUCTURALLY divergent conventions, any of the three could harden into a sixth axis — tracked per CH-0010, not a current structural reality. Charter-Era settlement STRAINS, does not break.

  - <!-- added by CF-0039 --> **Artifact-permanence-as-civic-liability current pressures (CH-0014)**: CF-0039 commits that Maker-Age artifacts cannot be destroyed by current-age capability; destruction-attempts BIND the effect more deeply. Civic ward-reserve budget lines (Brinewick exemplar per CF-0038) shift from amortizable cyclic expense to monotonic-accretion liability: every uncontained catastrophic-class find surfaced by canal expansion / deep foundation work / ruin-expedition (CF-0028) yields a permanent sealed-quarter footprint. Civic-advisory-council ward-reserve argument cycles intensify; containment-wright faction pressure for larger sealed-quarter allocation strengthens; centralization-fight proponents argue this increases the case for crown-or-city-council artifact-custody nationalization. Principled-refuser clergy (CF-0026) reform-current splits along "Maker-debt permanence acceptance" vs "burial-technique recovery advocacy" (the latter is categorically forbidden under M-20 firewall — technique is lost and not recoverable; the advocacy is diegetic position, not world-achievable goal).

  - <!-- added by CF-0041 --> **Maker-buried-building excavation current pressures (CH-0014)**: CF-0041 commits Maker-Age deliberate-burial of entire buildings containing hazardous artifacts. As canal-expansion and deep-foundation work intensifies, strike-rates on the tops of deliberately-buried Maker-buildings rise; each find triggers multi-guild unsealing-triage protocol convergence at a scale that strains chartered extraction-guild inspector capacity. Excavation jurisdiction is contested between chartered extraction-guild (SOC-4), CF-0028 patron-funded expedition syndicates, and civic-archaeological-license frameworks; OPEN_QUESTIONS §Ruin Ownership and Jurisdiction is pressured but not resolved. Sectarian register bifurcates: Maker-mystic sectarians advocate pilgrimage-to-unsealed-site (civic containment strains); progenitor-cult sectarians split between penitent-Makers reading (reform-current-adjacent) and calculating-Makers reading (heritage-partisan) — neither world-truth. Common-pantheon clergy offer aspectualization (civic-ritual-of-witness at unsealing) as pressure-release valve.

  - <!-- added by CF-0040 --> **Mundane-tier registration-regime debate current pressures (CH-0014)**: CF-0040 commits the mundane-tier as ordinary routine; polities diverge on finder-fee wage-schedule, de-minimis exemption for below-threshold mundane finds, civic-registry caseload absorption vs confiscation-enforcement, and status of child-finders under charter-school offense-tier lists. Display-registration stringency axis (CF-0042) compounds: larger heartland polities with robust civic-registry infrastructure and extraction-guild taxation streams standardize declared-inventory display-registration; smaller polities and highland / fen / drylands-caravan contexts lack infrastructure and operate under convention-register only. Display-registration stringency joins the Charter-Era stress register as FIFTH parallel sixth-axis watch-item (alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing, CF-0037 child-conscription-protection); if polities develop structurally divergent stringency conventions (punitive-undeclared-display vs permissive-registration vs full-exemption), the watch-item could harden into a sixth Charter-Era structural axis — tracked per CH-0014, NOT current structural reality. Charter-Era settlement STRAINS, does not break.

  - <!-- added by CF-0042 --> **Status-artifact theft-economy and assassination-risk current pressures (CH-0014)**: CF-0042 commits persistent artifact-theft economy and assassination-risk on notable owners as Layer-4 present pressure. Organized theft rings specialize in declared-inventory target identification via dowager-gossip and authentication-cartel-adjacent reconnaissance; magistrate dockets register artifact-adjacent homicide (assassination tier) as a distinguishable class. Bodyguard-contractor commissions attach to famous-owner households as ELEVENTH concurrent claim on CF-0024 veteran pool (Breakage Points §Veteran-pool multi-claim cannibalization extension, absorbed into extraction-escort sub-specialty per Rule 3 firewall — NOT a new CF-0024 subtype). Stolen-status-artifact fencing is a higher-margin niche within CF-0034 bandit-stolen-goods rail (authenticated-provenance requirement; NOT new 8th illegitimate-service product-line per Rule 3 firewall). State-security-concealment rumor-register feeds dissident-publishing and blackmail-kit economies, generating pressure on civic-scandal-containment discipline paralleling CF-0036 sealed-docket procedure; the rumor remains DIFFUSE — named-incident attribution crosses into M-2 forbidden territory. Charter-Era settlement STRAINS under compounding latent-burden load but does not break.

  - <!-- added by CF-0043 --> **Ash-Seal current pressures (CH-0015)**: Ash-Seal civic-commercial monopoly in Brinewick (CF-0043) carries Layer-4 pressure load: ward-reserve allocation compound-exposure (Ash-Seal company-facility moderate-tier containment billed to civic-treasury + civic sealed-quarter catastrophic-tier dual-funding per CF-0038 (b) Breakage Points worsened); reform-current clergy (CF-0026) standing charter-audit-access campaign as ELEVENTH audit-pressure target (alongside CF-0031 welfare-access, CF-0033 mission-creep, CF-0038 biannual-cycle, existing seven from Layers 2-3); defector-specialist diffusion wage-compression pattern continues heartland-wide (Brinewick-trained upper-silver fee-for-service rate anchors ceiling on chartered-containment-wright wages elsewhere; ECONOMY §Breakage Points slow-rolling pressure); civic-magistrate jurisdictional case-law on Ash-Seal-guild concordat disputes and trade-secret facility-location litigation accumulates as slow-rolling genre (not acute rupture register); civic-backchannel-purchase leakage of safe-class / moderate-tier artifacts to wealthy Brinewick parties generates magistrate-docket corruption-prosecution caseload distinct from ward-inspector integrity (CF-0038 C6 firewall preserved — catastrophic-tier NEVER flows through backchannel; Brinewick ward-inspector integrity under CAU-3/SOC-4 intact); Brinewick eighth dowager-gossip axis tracks display-inventory-routing through Ash-Seal disposition channel; ELEVENTH CF-0024 concurrent veteran-pool claim (Ash-Seal commercial property-protection guards, perimeter-bounded sub-specialty within extraction-escort per Rule 3 firewall). Charter-Era settlement STRAINS — continuous-but-procedural at Brinewick exemplar density; does not break.

  - <!-- added by CF-0038 --> **Brinewick-specific Layer-4 stress-register cumulative footprint**: Brinewick (CF-0038) as a committed adopting-polity on all five Charter-Era asymmetric axes (CF-0021 crafter-tolerance punitive-with-licensing-experiment, CF-0024 mercenary-licensure-under-tight-charter, CF-0028 syndicate-licensing-with-civic-audit, CF-0031 contamination-registry adopting, CF-0033 dragoon-adoption adopting — full commitment per GEOGRAPHY §Regional Asymmetry on Brinewick's Adopting-Polity Status, CH-0013) carries the full accumulated Layer-4 stress register at exemplar density. Canal-corridor illegitimate-service rail traffic (seven product-lines per ECONOMY §Trade Flows CF-0023/28/31/33/34/35/36) converges on Brinewick canal infrastructure; authentication-cartel formation pressure is maximally intensified here. Canal-underwater aquatic-folk-guided smuggling is a TRANSPORT-LAYER capability serving the existing seven product-lines per CF-0038 firewall — NOT a new product-line. Brinewick's commerce-hub scale + migration-attractor role + canal-geometry singularity produce a dense charter-audit caseload, a large civic-advisory council with recurring mission-creep-challenge dockets, and a dowager-gossip circuit of near-continental density. Ward-breach-in-commercial-core risk (per MAGIC §Long-Term Consequences CF-0038 extension) makes Brinewick's civic dread materially heavier than smaller heartland polities. Brinewick's sixth-axis latent-burden watch-items align with world-aggregate (CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing, CF-0037 child-conscription-protection) without currently-structural sixth-axis status.

  - <!-- added by CF-0037 --> **Stationkeeper-inheritance-refusal current pressures**: family-handled waystation tradition (CF-0037) faces Layer-4 demographic pressure as inheritor-children unwilling to accept the burden walk away — most into urban artisan-quarter casual labor, some into CF-0024 contractor entry-tier, a few into CF-0034 endemic-banditry recruitment-feeders (now tracked as a sixth named source-vector for CF-0034 recruitment, ABSORBED into existing recruitment-feeder cohort per Rule 3 firewall, NOT elevated to a distinct stratum). The stationkeeper-inheritor-who-stays remains a recognizable middle-stratum cohort carrying resignation-resentment register in AES-1 cadence applied to ordinary commerce; the inheritor-who-walks contributes to ordinary precarious-stratum texture without forming its own welfare/precarity category. Bardic-circuit silenced-runaway register paralleling CF-0036 silenced-contractor ballad subgenre operates at lower acuity (no civic-suppression silence-protocol involved; the silence is voluntary kin-distance, not chartered scandal-containment). NOT a sixth Charter-Era polity-asymmetric axis — uncontested-tradition-consensus on waystation legitimacy and uncontested-suppression-consensus on bandit-fronting hold; polity disagreement is operational only (per-polity tenancy/licensing regime variation deferred to OPEN_QUESTIONS). FOURTH parallel sixth-axis latent-burden watch-item now tracked (alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing): if polities develop structurally divergent CHILD-CONSCRIPTION-PROTECTION conventions (mandatory charter-school-vs-station-labor adjudication), the MINOR docket could harden into a sixth axis — tracked per CH-0012, NOT current structural reality. Cumulative latent-watch register signals approaching saturation but does not yet constitute Charter-Era rupture.

  **The world the present generation inherits**: a Charter Era running into the limits of its founding logic; a Maker Age still dictating where you can dig; a wilderness holding the camps of the pushed-out; and a winter that does not care about any of it.
