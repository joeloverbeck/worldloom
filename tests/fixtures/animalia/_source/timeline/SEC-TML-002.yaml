id: SEC-TML-002
file_class: TIMELINE
order: 2
heading: "Layer 2 — Remembered Past: The Charter Era (~200–400 years ago)"
heading_level: 2
body: |-
  Modern polities were formed during a long convergence of fragmentary local customs into chartered civic life. The defining institutional achievement of the Charter Era was the **Civic Registry** — a multispecies legal framework that recognized animal-folk and human persons as equal civic participants and arbitrated disputes that older species-specific custom-courts could not.

  The Charter Era was not a single event but a slow institutional convergence over generations, with regional variations. It is named in retrospect by the chronicles of the era's archivists.

  **Material residue**:
  - Surviving Charter Halls in older cities — often the architectural anchor of the civic quarter.
  - Charter Stones at the gate of charter-towns, inscribed with founding clauses and species-progenitor witnesses.
  - The civic-registry archive system itself: continuous wax-tablet and parchment lineages going back to the era.

  **Institutional residue**:
  - The civic registry as default arbiter of cross-species disputes.
  - Multispecies courts and civic offices.
  - Charter-Day festivals (regional variations) commemorating local charter signings.
  - Anti-monopoly clauses in many guild charters, descending from Charter-Era resistance to consolidation.
  - <!-- added by CF-0031 --> The civic-registry's *subsidiary-record* capability — the charter-frame that allows civic archives to host distinct sub-ledgers for particular categories — is a Charter-Era archival practice that later Layer-4 institutional innovations exploit. The contamination-lineage ledger-mark (CF-0031) is the most recent such exploit: Charter-Era structure supplies the archival capability; Layer-4 civic-centralization advocacy supplies the motivation.
  - <!-- added by CF-0032 --> The oversize-saddlery guild-subsection's reciprocal cross-polity journeyman circuit (CF-0032) consolidated during the Charter Era under the multispecies guild-continuity frame — Charter-Era institutional convergence produced the conditions under which wainwright and saddlery guilds in separate Cluster C ancestral polities could recognize one another's apprenticeship and master-rank progression. Pre-Charter origin of the craft itself is deliberately unresolved (Mystery Reserve M-12 governs: the subsection may be Charter-Era-consolidated rationalization, pre-Charter-inherited regional tradition, or recent-innovation responding to canal-integration, with each reading carrying distinct political implications for progenitor-cult integration and "older bloods" self-conception firewalls).

  **Symbolic residue**:
  - Bardic cycles mythologize the First Mixed Magistrates as cunning and patient figures who outlasted older custom-court factions through procedure and feast-throwing.
  - Place-names and street-names commemorate Charter-Era figures.
  - Phrase: *"under charter."* — meaning protected by civic law, not species custom.

  **Who benefits**: animal-folk in mixed cities (formal civic standing); merchants and guilds (predictable contract enforcement); polities themselves (durable legitimacy).
  **Who loses**: older species-custom courts (displaced); conservative sectarians who consider the charter-compromise a dilution of progenitor authority. <!-- added by CF-0036 --> Pre-Charter single-species custom-court factions and exclusionary-community authorities whose pre-Charter standing was displaced by the multispecies civic-registry convergence — these displaced constituencies supply the historical recruitment ground that current supremacist sectarian doctrine (CF-0036) draws on; the Charter Era DID NOT resolve interspecies friction, it institutionalized a civic-registry compromise that friction persists beneath.

  **Scars**: in some highland and fenland communities, charter-tradition remains thin or contested; civic registry is sometimes ignored in favor of clan custom. Inheritance disputes still reach civic courts where the parties claim incompatible custom.

  <!-- added by CF-0034 --> **Banditry pushed to wilderness margins (Charter-Era annotation)**: Charter-Era institutional consolidation pushed endemic banditry (CF-0034) out of the tolerated shadow of pre-Charter clan-custom informality and into wilderness margin status — "under charter" came to mean *civilly settled within chartered jurisdiction*, and its opposite-register ("outside the charter," "off the road," "gone to the hollow") carried the weight of criminal outlawry rather than the older register of simple kinless-wanderer. Bandit corridors (GEOGRAPHY §Predator Zones) stabilized in the geographic seams that Charter-Era civic jurisdiction did not reach — drylands caravan passes, bog causeways, mountain chokepoints, highland cold-passes, under-walked heartland wildland roads between canal towns. The pattern has held through all subsequent layers.

  <!-- added by CF-0037 --> **Family-handled waystations consolidated under multispecies civic frame (Charter-Era annotation)**: The family-handled waystation tradition (CF-0037), already present as informal kin-handed roadside hospitality before the Charter Era (per Layer 1 annotation above), consolidated during the Charter Era as recognized civic-adjacent tenancy in heartland connector-route polities and partially in highland and mountain-east polities. The civic-registry's tenancy-recordation capability (per INSTITUTIONS §Family/Clan/Household) extended to waystation tenancy in chartered polities; clan-elder sanction governs in highland; estate-steward ledger governs where the station sits on noble-estate tenant land. The institution remains NON-CHARTERED — no waystation-keepers' guild, no master-rank progression, no SOC-4-class chartered monopoly — paralleling the structural distinction between chartered trade-guilds and ordinary household-enterprise commerce. Per Layer-1 annotation, the consolidation organized pre-existing folk-tradition rather than instituting it from nothing; Charter-Era's contribution was civic-recognition, not invention.

  <!-- added by CF-0041 --> **Unsealing-coordination consolidation (Charter-Era annotation, CH-0014)**: The multi-guild coordination protocol for suspected sealed-artifact findings — chartered extraction-guild ward-inspector + civic-watch + dredger-crew foreman + chartered containment-wright, acting in a prescribed sequence at the site — consolidated during the Charter-Era multispecies guild-continuity frame. Pre-Charter unsealing-response was ad-hoc and frequently lethal; Charter-Era civic-registry chartering of extraction-guilds (SOC-4) produced the conditions under which unsealing-triage became a civic protocol with defined role-boundaries. The "unsealing" idiom itself is older than the protocol — the hair-on-arms dread-register predates the civic scaffolding — but the institutional response-pattern is Charter-Era consolidation. The protocol holds across adopting polities with regional variation: canal-heartland formal ward-inspector triage; estate-outskirts steward-coordinated ward-inspection; highland clan-elder sanction (no formal civic escalation, paralleling the CF-0021 highland pattern); drylands caravan-master sealed-cargo-refusal (no formal protocol, convention-register only); fenland marker-reed red-bound summons (fenland institutional-absence-acknowledged-in-silence preserved per CF-0037 register). M-9 anti-custody-channel firewall holds: unsealing-coordination is artifact-disposition work, NOT Maker-knowledge archive work.

  <!-- added by CF-0043 --> **Ash-Seal civic-charter anomaly grant (Charter-Era annotation, CH-0015)**: The Ash-Seal company (CF-0043) received its Brinewick-specific NON-GUILD CIVIC CHARTER during the late Charter-Era consolidation period in response to a local competence-precedent event — a specific artifact-containment incident (grant-event details deferred to OPEN_QUESTIONS §Ash-Seal Civic-Charter Terms) the chartered-extraction-guild of the period could not handle at scale required. The civic-council's grant structured Ash-Seal as a civic-chartered non-guild commercial company under concordat with the chartered-extraction-guild: guild retains extraction / ward-inscription / ward-inspection / chartered-brokerage (SOC-4 preserved); company absorbs containment / research / sealed-inert disposal downstream of extraction. The concordat is Brinewick-specific and NON-TRANSFERABLE; SOC-4 chartered-guild-monopoly holds everywhere else. Ash-Seal's own "hundreds of years" antiquity claim is CORPORATE MYTHMAKING in-world-contested-register (paralleling M-19 canal-age contested register); world-level institutional age is post-Charter-Era-consolidation. The grant-event established the concordat structure — guild broker-faction opportunistic-accommodationist, containment-wright-faction bifurcated (master-level defection into Ash-Seal + in-guild remainder resentful), inspector-faction handling concordat-interface — that has held across subsequent layers.

  <!-- added by CF-0038 --> **Brinewick as Charter-Era commercial-convergence center (Charter-Era annotation, CH-0013)**: Brinewick (CF-0038) as a canal-heartland commerce hub consolidated its world-renowned status during the Charter-Era institutional convergence — the pre-existing trunk-canal confluence geography plus ancestral engineering legacy provided the geographic base, and the Charter-Era civic-registry convergence provided the institutional frame. Brinewick's Charter-Era-depth chartered-broker bench, multispecies magistrate court, civic canal-warden corps (chartered watch subtype institutionally decomposed from extraction-guild ward-inspector function per CF-0038 INSTITUTIONS extension), and civic-registry archive (near-continental density) all emerged as consolidation outputs. The Brinewick civic-registry archive is particularly notable — immigration-driven enrollment volume + commerce-driven contract-registration density + scandal-driven subsidiary-record capability created an archival capacity that later Layer-3 / Layer-4 institutional innovations (CF-0031 contamination-lineage ledger-mark subsidiary archive; CF-0033 dragoon civic-evidence archive; CF-0036 sealed-docket subsidiary archive; CF-0038 canal-warden inspection-log archive) exploit. Brinewick's Charter-Era depth underwrites its Layer-4 polity-asymmetric adopting status on all five axes (GEOGRAPHY §Regional Asymmetry on Brinewick's Adopting-Polity Status, CH-0013). Estate-outskirts landholding consolidation during the Charter Era produced the ancestral-estate cluster whose accumulated wealth and civic-adjacent influence constitute Brinewick's lateral-power geometry (economic/social/backchannel accretion within the Charter-Era civic frame, NOT vertical displacement of civic authority — firewall load-bearing per CF-0038 Phase 6b Politics/Institution critic finding).

  <!-- added by CF-0044 --> **Drylands hospitality-poetry persists as non-chartered folk-practice (Charter-Era annotation, CH-0016)**: The drylands short-poetry stranger-hospitality convention (CF-0044), already present as informal oral-hospitality register before the Charter Era (per Layer 1 annotation above), was neither chartered nor displaced during the Charter-Era institutional convergence. The Charter-Era's multispecies civic-registry convergence in heartland polities produced institutional analogs (tavern-vouch + coin-contract hospitality per CF-0024 / CF-0009) without displacing the drylands folk-practice — the two regional-cultural hospitality registers coexist, each adapted to its regional sociality. Drylands caravan polities, which did not consolidate Charter-Era standing civic-force infrastructure (per CF-0033 GEOGRAPHY non-adoption commitment), likewise did not consolidate Charter-Era chartered-hospitality infrastructure for the verse-convention; it remained non-chartered folk-practice paralleling CF-0037 waystation-tradition non-chartered status. Circuit-bard (CF-0017) absorption of drylands verse-fragments into bardic-tavern material via the Charter-Era-stabilized bardic circuit (CF-0017 / CF-0024 extension) established the one-way cultural-borrowing pathway as current texture. M-4 firewall (CH-0016 cross-application) holds across the Charter-Era frame: the verse-convention's religious-adjacent verse-matter does NOT validate sectarian progenitor-historicity readings at world level regardless of how widely the register circulates.

  <!-- added by CF-0046 --> **Drylands caravan-corridor institutional-cultural complex persists as non-chartered regional pattern (Charter-Era annotation, CH-0018)**: The drylands caravan-corridor institutional-cultural complex (CF-0046) and the drylands well-keeper customary-authority role (CF-0047), already present as pre-Charter folk-tradition residue (per Layer 1 annotation above), were NEITHER CHARTERED NOR DISPLACED during the Charter-Era institutional convergence — paralleling CF-0037 waystation-tradition and CF-0044 verse-convention non-chartered persistence patterns. The Charter-Era's multispecies civic-registry convergence in heartland polities did not export chartered-civic infrastructure into drylands corridors because the geographic-non-transportability of canal-based institutional-export mechanisms physically precluded canal-heartland institutional extension (drylands lacks water to float barges; CF-0046 Phase 4 load-bearing stabilizer). The Charter-Era frame instead COEXISTED with pre-existing drylands regional patterns: (i) caravan-master corridor-internal customary-adjudication stabilized as the operational-convergence form for minor corridor-disputes (NOT a Charter-Era institutional founding; Charter-Era frame provided implicit cross-polity character-evidence recognition per CH-0018 INSTITUTIONS §Law extension); (ii) well-keeper customary-authority lineages continued operation under pre-Charter inheritance-patterns with Charter-Era civic-adjacent character-evidence recognition where cross-polity migration or heartland-border disputes arose; (iii) runner-reached village militia emergency-response continued as ordinary civilian self-defense convention paralleling fenland amphibian-folk canary vigilance relay pattern (CF-0025 frame); (iv) station-log convention in trade-tongue stabilized under Charter-Era DIS-2-convergence mundane commercial lingua-franca expansion (trade-tongue cross-community use broadened during Charter-Era commercial-integration, facilitating corridor-internal record-keeping at the light-notation scale CF-0046 commits); (v) reciprocity-primary regional economy continued uninterrupted under SOC-3 coin-contract sacredness preservation at coin-at-edges contact surface (coin-at-edges heartland cross-subsidy emerged during Charter-Era commercial-integration — the market-caravan border trade expanded during Charter-Era grain-and-ceramic-export flows, providing the coin inflow that stabilizes reciprocity-primary economy per CH-0018 ECONOMY §Trade Flows extension). Drylands polities did NOT consolidate Charter-Era standing civic-force infrastructure (per CF-0033 GEOGRAPHY non-adoption commitment), civic-registry subsidiary-record capability (per CF-0031 GEOGRAPHY non-adoption posture), or chartered-trade-guild infrastructure for caravan-corridor operations; the institutional-thinness equilibrium that CF-0046 commits is the stabilized-Charter-Era form of pre-Charter folk-practice, neither displaced nor absorbed. The five-axis Charter-Era polity-asymmetric structural-disagreement pattern (per GEOGRAPHY Regional Asymmetries) does NOT extend to include a sixth drylands-corridor axis because drylands polities AGREE on the thin-institution equilibrium — the drylands pattern is uncontested regional-consensus, not polity-asymmetric disagreement. M-19 scoped-distinct firewall (CH-0018 cross-application) holds across the Charter-Era frame: drylands caravan-corridor institutional-antiquity is categorically distinct from Brinewick canal-and-underground-network bounded-unknown; no parallel M-19-like bounded-unknown at drylands scale. AES-1 register-discipline (CH-0018 cross-application) holds: the Charter-Era drylands stabilization is working-texture regional-pattern, NOT a heritage-register or noble-primitive pastoral romanticization — forbidden registers are named per CH-0018 INVARIANTS AES-1 extension and CF-0046/CF-0047 costs_and_limits.

  ---
