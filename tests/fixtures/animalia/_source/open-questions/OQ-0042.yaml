id: OQ-0042
topic: Settlement Anti-Incursion Drills and Militia Standing
body: |-
  - CF-0035 commits that wildland-adjacent settlements fortify livestock-pens with night-watch rotation and ward-of-the-flock heightening; that highland clans extend cleansing-rite discipline for contamination-haunt returnees; that fen-villages extend marker-reed relay-summoning for beast-specialist response. Whether local militias develop NAMED INCIDENT-RESPONSE PROCEDURES (analogous to ward-breach dragoon turnout-call per CF-0033 or ward-inspector walk-through per CAU-3), whether chartered-watch training in wildland-adjacent towns includes beast-response curricula, whether specific polities institutionalize a wildland-watch subtype distinct from routine civic watch and from dragoon perimeter (WITHOUT crossing the hunter-contractor ≠ dragoon boundary or the civic-chartered-monopoly-of-force concern), and whether children's charter-school drills include beast-approach procedures alongside ward-breach drills remain deferred per polity.

when_to_resolve: when a story foregrounds a specific polity's wildland-watch institutional form, a settlement drill-procedure magistrate testimony, or a charter-court challenge to a wildland-watch scope expansion.
caution: interacts with CF-0033 dragoon mission-scope firewall (any civic-chartered wildland-response force risks mission-creep pressure; hunter-contractor sub-specialty under CF-0024 is the canonical response institution per CF-0035); with CF-0034 hunter-contractor ≠ dragoon boundary (wildland-beast-response is contractor stratum, not dragoon stratum); with SOC-4 chartered-guild monopoly (any wildland-watch that performs extraction-adjacent handling at a mutated-beast kill-site risks guild-jurisdictional friction).
extensions: []
