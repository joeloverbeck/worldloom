id: OQ-0050
topic: Waystation Tradition Antiquity (Charter-Era-Consolidated vs Older Folk Practice)
body: |-
  - CF-0037 commits the family-handled waystation tradition as predating Charter-Era institutional consolidation (per TIMELINE.md Layer 1 annotation under CH-0012) — informal kin-handed roadside hospitality whose Charter-Era contribution was civic-recognition rather than invention. Whether the institution's reciprocal-recognition across regions traces continuous descent to a specific pre-Charter origin (the heritage reading), whether the Charter-Era consolidation amounts to substantive institutional creation rather than mere recognition (the reformist reading), or whether the tradition's antiquity is genuinely uneven across regions (the skeptical reading: heartland tradition is ancient, mountain-east tradition is Charter-Era-recent, highland tradition is pre-Charter clan-custom organized only locally) remains deferred.

when_to_resolve: when a story foregrounds the antiquity question (a charter-court case turns on it; a clan-elder testifies to ancestral waystation tradition; a civic archive produces a fragment that dates the local pattern). Region-level commitment is acceptable (a specific heartland polity may date its connector-route waystation tradition to a specific pre-Charter or Charter-Era century without implication for highland or mountain-east traditions).
caution: "this is an ORDINARY AUTHOR-SIDE DEFERRAL, NOT a Mystery Reserve entry. The waystation antiquity question lacks the progenitor-cult sectarian entanglement that gives M-12 oversize-saddlery antiquity its productive contestation; no sectarian movement instrumentalizes waystation-antiquity for political purposes, no civic-reformist faction needs the question resolved to advance an institutional agenda, and no Maker-mystic reading attaches. The question can be resolved at any time without destabilizing existing canon — it is a deferral of convenience, not of bounded-unknown discipline. Per Mystery Curator Phase 6b finding (PA-0011): Rule 7 obligation discharged with documented negative finding (no new MR entry warranted)."
