id: OQ-0044
topic: Civic-Suppression Unsealing Convention (per polity)
body: |-
  - CF-0036 commits that chartered polities apply euphemistic "grave-violation-of-person" sealed-magistrate-docket procedure to interspecies-cannibal-case prosecutions as scandal-containment (NOT prosecutorial refusal). Specific per-polity conventions on UNSEALING — whether sealed dockets permit magistrate-review unsealing under named predicates (retaliation-complaint, estate-boundary-dispute, inter-polity extradition), whether reform-current clergy (CF-0026 CH-0010 charter-defense wing) civic-review campaigns have succeeded in instituting unsealing-petition procedure, whether generation-after-case sealed-docket records are routinely destroyed or archived — remain deferred and polity-asymmetric.

when_to_resolve: when a story features a specific adopting polity's unsealing-petition magistrate case; a reform-current clergy unsealing campaign reaching legislative adoption; an inter-polity extradition dispute requiring sealed-case cross-border disclosure resolution; or a named sealed-case surviving as archival material at generation-three-expiry.
caution: "this is the primary LATENT SIXTH-AXIS CANDIDATE (LB-1 per CH-0010) — if polities develop structurally divergent unsealing conventions (never-unseal vs reform-unsealing-on-petition vs automatic-generation-later-unseal), the current MINOR operational-docket status could harden into a sixth Charter-Era polity-asymmetric structural disagreement axis alongside CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028/CF-0030 funder-primacy, CF-0031 contamination-registry, CF-0033 dragoon-adoption. Three parallel sixth-axis watch-items now tracked: this one, CF-0034 bandit-extradition convention, CF-0035 trophy-legality convention."
