id: OQ-0055
topic: Mundane-Tier Finder-Fee Wage Schedule (per polity)
body: |-
  - CF-0040 commits mundane-tier Maker-Age artifacts (near-imperceptible-effect breeze-dolls, tick-mirrors, weak coin-sorters, scar-rubbers) as ordinary-life routine in canal-heartland, estate-outskirts, drylands caravan-stop, and fenland peat-harvest contexts. Polity-asymmetric treatment of mundane finds produces four distinct regime-types: (a) **license-low-floor**: finder registers the item at chartered extraction-guild mundane-find intake-tier, receives a flat finder-fee (canal-heartland exemplar Brinewick-register; fee-schedule varies per polity and per item-category); (b) **register-and-ignore**: finder brings item to inspector-office, is logged, retains informal custody with polity-sanctioned possession; (c) **de-minimis exemption**: finder keeps item below charter-threshold without registry obligation, transfer through curiosity-markets legal; (d) **punitive-confiscation**: finder is subject to capital-penalty registry regime with mundane carve-out varying by polity and item-category.
   Per-polity finder-fee schedule, child-finder coin-split discipline, estate-tenant-finder estate-steward-ledger claim vs individual-finder claim, and authentication-specialist cheap-end classification fee structure all remain deferred.

when_to_resolve: when a story features a specific mundane-find scenario, a named polity's mundane-intake charter-terms, or a child-finder case raising coin-split magistrate-precedent.
caution: interacts with CF-0008 chartered-guild monopoly, SOC-4 declared-inventory regime, CF-0038 Brinewick dredge-find registry volume, and CF-0042 declared-inventory display-registration (FIFTH parallel sixth-axis watch-item).
extensions:
  - originating_cf: CF-0043
    change_id: CH-0015
    date: 2026-04-20
    label: Brinewick mundane-tier / Ash-Seal handoff-boundary annotation
    body: CF-0043 commits Ash-Seal's concordat-downstream containment / research / disposal monopoly for above-mundane artifact finds in Brinewick. Mundane-tier finds in Brinewick stay with the chartered-extraction-guild inspector's office mundane-find intake-tier (license-low-floor regime per regime-type (a) above) and are NOT routed to Ash-Seal — the Ash-Seal handoff threshold is at ABOVE-MUNDANE tier. The boundary between mundane-tier (civic-handled) and above-mundane (Ash-Seal-handled) is mostly empirical at the inspector-office classification layer — the civic-quarter authentication-specialist classifies findings per CF-0021 cheap-end classification layer, and above-mundane findings are routed to Ash-Seal for containment while mundane findings clear civic-handling at the lock-master-office level. The boundary is Brinewick-local and does NOT affect non-Brinewick polity mundane-tier handling (other heartland polities maintain standard chartered-extraction-guild handling for all tiers). Specific Brinewick finder-fee figures per mundane-tier item remain deferred consistent with parent deferral.
