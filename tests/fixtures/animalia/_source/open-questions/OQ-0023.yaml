id: OQ-0023
topic: Post-Career Contractor Pension and Stigma
body: |-
  - CF-0025 establishes that post-career occult-fallout specialists form a contamination-injured stratum analogous to extractor-veteran families. Pension arrangements (where any exist), guild-commission continuity for widows, and the social management of contamination-stigma specifically for non-guild contractors (as opposed to chartered extractors) are deferred.

when_to_resolve: when a story features a retired/injured fallout-specialist, a widow of one, or a clergy-driven pension-reform campaign.
caution: interacts with CF-0005 (artifact effects always cost) and Inequality Patterns in ECONOMY_AND_RESOURCES.md. A formal pension schema would integrate contractors into chartered-welfare structures; its absence leaves widows and injured specialists exposed. Reform-current clergy (CF-0026 principled-refusers) sometimes campaign for better contractor-widow arrangements as a matter of moral witness.
extensions:
  - originating_cf: CF-0031
    change_id: CH-0005
    date: 2026-04-18
    label: Partial closure
    body: "In adopting chartered polities, CF-0031 commits the civic-registry contamination-lineage ledger-mark as a voluntary-enrollment welfare instrument providing pension supplement and monastic-clinic priority for CF-0025-eligible lineages. The open question partially closes in the adopting-polity branch: the pension mechanism is named (civic-registry subsidiary record coordinated with chartered extraction-guild pension-committee formula), the stigma management is institutionalized (three-generation administrative interval with charter-clause welfare-purpose protection), and the reform-current clergy (CF-0026) campaign posture is bifurcated explicitly (mandatory-with-protection wing vs abolitionist wing). Residual openness: non-adopting polities (highland clans, fen-villages, polities declining civic centralization) maintain informal / contract-custom arrangements as before; non-CF-0025 contractor widows (mundane CF-0024 subtypes) and expedition-widows (CF-0028) remain without charter hook; registry-purge conventions at generation-three expiry are unresolved across adopting polities; inter-polity registry-transfer protocol for migrating registered households is undeveloped; civic-watch surveillance-repurposing precedent has no established magistrate jurisprudence. Residual items defer until story calls or until a specific adopting polity's registry economics needs concrete texture."
  - originating_cf: CF-0036
    change_id: CH-0010
    date: 2026-04-19
    label: Silenced-contractor sub-band annotation
    body: CF-0036 commits that the silenced-adventurer-contractor stratum is ABSORBED INTO the CF-0024 failed-reputation-contractor feeder (Rule 3 specialness-inflation firewall; NOT a new stratum). The silenced contractor is ALIVE — not a widow — and retains the contract-pension from the job-that-became-sealed (SOC-3 coin-contract sacredness preserved). Civic-registry has NO silenced-contractor ledger-mark analog (sealed-docket procedure preserves silence at evidentiary level, not welfare level). Bitterness-register qualitatively damages reputation without creating an income-gap requiring new welfare category. Reform-current principled-refuser clergy (CF-0026 CH-0010 charter-defense wing) fallout-ministry extends to silenced-contractor households paralleling CF-0025/CF-0034 pastoral specialties; civic-restraint wing ministers to cannibal-camp survivor households. The open question partially closes on this sub-band — the stigma-management is absorption-into-failed-reputation (bitterness cadence in AES-1), the pension is preserved SOC-3-contract-based, the pastoral-ministry register is aligned — but the latent-burden of silenced-witness retaliation/reprisal complaint magistrate jurisprudence remains (see CF-0036 adjudication record PA-0009 LB-4).
  - originating_cf: CF-0043
    change_id: CH-0015
    date: 2026-04-20
    label: Ash-Seal technician fourth lineage-source annotation
    body: "CF-0043 commits Ash-Seal technicians as a FOURTH lineage-source category eligible for CF-0031 ledger-mark enrollment in Brinewick-adopting polity under containment-wright-specialist clause (alongside extractor, chartered containment-wright, and CF-0025 occult-fallout specialist as the three prior eligible categories). Long-career Ash-Seal technicians carry AES-3 contamination-signature (scrapers' shake, long cough, ward-rot, wasting) at rates comparable to chartered-containment-wright families; Ash-Seal family-lineage density is MODERATE rather than the dense multi-generational pattern of chartered-guild lineages (company is Charter-Era-consolidated rather than pre-Charter, and defector-migration churn is historically continuous). Brinewick-specific: Ash-Seal-technician ledger-mark eligibility is an institutional-anomaly lineage-source category — the mark operates under CF-0031 civic-registry subsidiary archive (paralleling chartered-containment-wright eligibility) even though Ash-Seal itself is civic-chartered non-guild commercial form rather than chartered-guild. Guild-pension-supplement formula coordination (civic-registry subsidiary side with chartered-extraction-guild pension-committee formula) extends to include Ash-Seal commercial-pension formula in Brinewick (Ash-Seal-side provides commercial-equivalent-of-guild-pension; civic-registry-supplement coordinates on top per standard CF-0031 mechanism). The residual openness of CF-0031 (registry-purge conventions at generation-three expiry; inter-polity registry-transfer protocol for migrating registered households; civic-watch surveillance-repurposing precedent) applies identically to Ash-Seal-technician lineages; non-Brinewick polities not adopting Brinewick's concordat variant handle Ash-Seal-defector households under ordinary chartered-containment-wright eligibility if the defector enlists on a chartered-extraction-guild roster (the defector's prior Ash-Seal service does not automatically confer ledger-mark eligibility — eligibility attaches to chartered-containment-wright enrollment or CF-0025 specialist practice in the post-defection career)."
