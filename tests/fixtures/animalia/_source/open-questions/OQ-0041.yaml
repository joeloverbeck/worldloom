id: OQ-0041
topic: Wilderness-Zone Hazard-Mapping Convention
body: |-
  - CF-0035 commits that contaminated-fauna zone location-knowledge travels as hunter-corridor reputation informal rather than cartographer-recorded; no polity maintains a systematic zone-ledger. Whether any polity attempts systematic wildland-contamination hazard-mapping (parallel to CF-0028 ruin-cartography black-market pattern or to civic ward-inspection chartered-schedule), whether chartered extraction-guild field-forensics burden extends to zone-documentation, whether bardic-circuit corridor-reputation transmission rises to informal mapping, and what the civic-refusal posture looks like for polities that DO attempt mapping (given the load-bearing "no zone-ledger" commitment) remain deferred and regionally asymmetric.

when_to_resolve: when a story features a specific polity attempting formal zone-mapping, a hunter-contractor dispute over unmapped zone-intelligence as property, or a civic-watch investigation of suspected zone-map black-market traffic.
caution: interacts with CF-0028 ruin-cartography lethal-contraband pattern (if zone-maps become killing-enforced like ruin-cartography, the CF-0034 stolen-goods / CF-0028 cartography infrastructure extends to a seventh product-line; if zone-maps stay informal, the hunter-corridor reputation system is load-bearing); with CF-0033 dragoon perimeter-lore firewall (any polity that treats zone-knowledge as civic-chartered operational intelligence risks mission-creep pressure); with M-10 selection-bias folklore firewall (any systematized zone-map based on hunter-survivor lore would violate M-10's "no systematic predictor that enables reliable avoidance" disallowed cheap answer).
extensions: []
