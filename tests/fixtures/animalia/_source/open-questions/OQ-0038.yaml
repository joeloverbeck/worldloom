id: OQ-0038
topic: Liberated-Slave Reintegration Civic Procedure
body: |-
  - CF-0034 commits that the raid-and-enslave distribution subset produces kidnapped captives, some of whom are recovered by bounty-hunter-contractor retrieval; recovered captives face fraught reintegration. The CF does NOT commit specific civic-registry reintegration procedure, restoration-rite canonical form, marriage-market standing for returned-raped women or returned-enslaved men, civic-registry standing for children-born-in-captivity, or standardized reform-clergy ministry. These remain per-polity-asymmetric and per-community-asymmetric.

when_to_resolve: when a story foregrounds a recovered captive's reintegration; when a children-born-in-captivity civic-registry case reaches magistrate decision; when a community reintegration-rite variant needs concrete texture.
caution: interacts with SOC-1 (no species-coded harm; recovered captives of all species face reintegration); with SOC-3 (coin-contract does NOT govern coerced captive-negotiation); with CF-0026 reform-current clergy pastoral responsibilities (fallout-ministry register already extends, but civic-procedure commitment is broader); with Rule 3 specialness-inflation (must not elevate recovered-captive-stratum into a 7th welfare category — absorbed into existing precarious stratum per ECONOMY Inequality Patterns).
extensions: []
