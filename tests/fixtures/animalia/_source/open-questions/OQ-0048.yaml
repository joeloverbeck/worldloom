id: OQ-0048
topic: Cross-Species Predation Magistrate Charging-Tier
body: |-
  - CF-0036 commits that sealed-docket cannibal-case prosecutions use standard-homicide evidentiary standards with sealed-register classification overlay. Specific per-polity magistrate precedent on CHARGING-TIER ASYMMETRY — whether interspecies-cannibal prosecution carries aggravated-homicide tier reflecting the sectarian "mere beasts" category error as aggravating factor, same-tier-as-ordinary-homicide reflecting SOC-1 no-species-distinction civic-law category, or specialized sealed-register tier — remains deferred and polity-asymmetric.

when_to_resolve: when a story features a specific aggravated-tier charging decision reaching appellate review; a SOC-1 firewall charter-court challenge against aggravated-tier convention; or a reform-current clergy campaign addressing charging-tier asymmetry at legislative level.
caution: charging-tier asymmetry would FLIRT WITH recognizing a species-distinction civic-law category, which SOC-1 firewall FORBIDS. The disciplined answer is same-tier-as-ordinary-homicide with sealed-register classification overlay; aggravated-tier formulation risks species-distinction category even when the aggravation is framed as "sectarian-pathology" aggravating factor. Most polities currently follow same-tier-with-sealed-classification; aggravated-tier experiments are charter-audit-exposure-adjacent. Interacts with M-5 firewall FIFTH cross-application — aggravated-tier prosecution must not imply the sentience-boundary was at issue; the sectarian category error is the aggravating factor, not the sentience-status of the victim.
