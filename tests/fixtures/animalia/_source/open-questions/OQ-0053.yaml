id: OQ-0053
topic: Brinewick Supremacist-Movement Licensure / Proscription Status
body: |-
  - Per CF-0036 §Supremacist-Movement Licensure / Proscription Status (per polity) existing deferral, Brinewick's specific civic-charter posture on sectarian progenitor-supremacist-doctrine recruitment remains deferred under CF-0038. Brinewick's mixed-species commerce-hub density argues for PROSCRIPTION (SOC-1 firewall load-bearing at this density; reform-current clergy charter-defense-wing influence strong); commerce-hub toleration of heterogeneous opinion argues for LICENSING-UNDER-SCRUTINY (magistrate-court sealed-docket already handling CF-0036 cannibal-case procedure; additional supremacist-movement proscription would compound civic-watch caseload). The civic-advisory council reviews the question in standing session without yet issuing a charter-court ruling per CF-0038 GEOGRAPHY §Regional Asymmetry on Brinewick's Adopting-Polity Status commitment.

when_to_resolve: when a story features a specific Brinewick sectarian-supremacist-doctrine recruitment case reaching magistrate docket; a reform-current clergy charter-court challenge against toleration; or a specific scandal exposing supremacist-doctrine penetration of an estate retinue that forces civic-advisory-council ruling.
