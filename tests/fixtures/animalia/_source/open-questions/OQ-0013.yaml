id: OQ-0013
topic: Maker-Age Linguistic Recovery
body: "- Fragmentary inscriptions exist. The genesis world commits that they are never fully translated. Whether partial translations exist, who controls them, and what they say is deferred."
when_to_resolve: with extreme care.
caution: interacts with M-1, M-2, M-5.
extensions:
  - originating_cf: CF-0023
    change_id: CH-0002
    date: 2026-04-18
    label: Partial commitment
    body: Partial translations DO exist, are restricted, and have leaked (CF-0023). The operationally usable subset (artifact-creation grimoires) circulates on black markets. The full linguistic system remains unrecovered; no complete translation of any major Maker-Age text exists. The leaked corpus does NOT contain catastrophic-class instructions (preserves M-2). Specific authorial communities, contested-translation claims, and which civic archives hold what fragments remain deferred.
  - originating_cf: CF-0027
    change_id: CH-0004
    date: 2026-04-18
    label: Reaffirmation under expedition pressure
    body: "CF-0027 and CF-0028 commit enterable-ruin recovery of inscription material. The CH-0002 boundary holds: no complete translation emerges from any expedition; the leaked corpus does not contain catastrophic-class or guardian-construction (CF-0029 / M-8) instructions; expedition-recovered inscriptions enter CF-0023's partial/contested/fragmentary register, not a new comprehensive-translation register. Mystery Reserve M-9 (Epistemic Content of Recovered Maker-Knowledge) governs the bounded-unknown status of cumulative yield."
  - originating_cf: CF-0046
    change_id: CH-0018
    date: 2026-04-20
    label: DIS-2-convergence discharge on trade-tongue
    body: CF-0046 drylands caravan-corridor institutional-cultural complex commits the existing DIS-2 trade-tongue (a cross-community commercial lingua franca; see DIS-2 examples "a tavern bard who can read trade-tongue") as the drylands corridor-language substrate used in household-held station-logs at well-stops. The trade-tongue is DIS-2-CONVERGENCE MUNDANE COMMERCIAL CONVERGENCE — a pragmatic lingua franca that emerged from cross-community commercial trade needs, NOT evidence for or against Maker-Age linguistic survival, reconstruction, or descent. Station-log entries in trade-tongue are civic-procedural manifest records of traveler-counts, supply-runs, and water-share allocations; they do NOT constitute a Maker-knowledge custody channel (per CH-0018 INSTITUTIONS §Recordkeeping M-9 extension). Trade-tongue corridor-application does NOT resolve this open question — the Maker-Age linguistic system remains unrecovered (CH-0002 commitment preserved); trade-tongue is not a candidate descendant, fragment, or reconstruction of Maker-Age language. Sectarian Maker-mystic readings that trade-tongue preserves a Maker-linguistic substratum are CONTESTED-SECTARIAN PROJECTION paralleling the CF-0023/CF-0028/CF-0043 Maker-research-sectarian-register pattern, NOT world-truth.
