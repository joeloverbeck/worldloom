id: OQ-0012
topic: Sex and Kinship Across Species in Detail
body: "- The brief specifies adult barter is publicly visible and treated as pragmatic by many. The genesis world commits to legal visibility and character-dependent scandal. Cross-species erotic norms beyond this — courtship customs, intimacy taboos in mixed households, regional sectarian variation — are sketched but not enumerated."
when_to_resolve: when a story foregrounds intimacy as a plot driver.
caution: ""
extensions:
  - originating_cf: CF-0036
    change_id: CH-0010
    date: 2026-04-19
    label: Live diegetic-pressure annotation
    body: 'CF-0036 commits that interspecies-friction prejudice is endemic and that mixed-species households face external prejudice exposure (dowager-gossip mix-sound-vs-single-species estate-positioning axis; marriage-broker catechism extension *"does your mother sit at a mixed hearth?"*). Mixed-household intimacy becomes a diegetic pressure point the open-question deferral can no longer cleanly abstract from — supremacist-doctrine sectarian movements name cross-species intimacy as civic-order breach, and civic charter-firewall refutes the framing while individual prejudice persists. Future canon work resolving this open question must address: (a) how mixed-species courtship survives in adopting-polity vs non-adopting-polity social fabrics; (b) how cross-species adoption-and-fostering navigates prejudice-adjacent charter-school peer cohorts; (c) how CF-0032 reciprocal-journey cross-polity mobility interacts with mixed-species marriage portability. Resolution remains deferred but the pressure is active.'
