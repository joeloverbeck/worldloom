id: OQ-0049
topic: Per-Polity Waystation Tenancy and Licensing Regimes
body: |-
  - CF-0037 commits the family-handled waystation tradition as operating across heartland, highland, and mountain east under a tenure-mix (freehold / chartered-polity civic-registered / estate-tenant lease / clan-elder-sanctioned customary). Specific per-polity conventions on (a) civic-registry tenancy-recordation procedure for chartered-polity waystation tenancy renewal, (b) estate-steward-ledger entry-class formalization for estate-tenant waystations including supply-quota and renewal-cycle terms, (c) clan-elder-sanction protocol for clan-territory waystations including non-kin hospitality terms and outland-contractor passage, (d) mountain-east valley-pass waystation pass-season opening/closing administrative interface with civic-registry, (e) inheritance-dispute magistrate-court precedent on partible placement-right when multi-heir succession reaches civic-court (uneven across adopting polities; some treat under existing testamentary-or-by-custom framework, others develop waystation-specific precedent), (f) child-labor-vs-charter-school adjudication where stationkeeper-children's chore-from-young pattern conflicts with charter-school enrollment expectation in adopting chartered polities — remain deferred and polity-asymmetric.

when_to_resolve: when a specific adopting polity's waystation-tenancy regime appears in story; when an inheritance-dispute magistrate case reaches appellate decision; when a child-labor-vs-charter-school adjudication forces a charter-court ruling.
caution: interacts with INSTITUTIONS §Family/Clan/Household existing succession framework, with §Landholding tenant-cottage register, with §Education/Apprenticeship charter-school enrollment expectation, and with the CF-0037 latent-burden watch-item on child-conscription-protection convention divergence (FOURTH parallel sixth-axis watch-item alongside CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing). Per-polity child-conscription-protection convention divergence is the primary sixth-axis-drift risk for CF-0037 and warrants firewall awareness in future canon work touching the child-labor-vs-charter-school surface.
