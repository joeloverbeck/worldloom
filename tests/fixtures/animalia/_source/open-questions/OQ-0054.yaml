id: OQ-0054
topic: Mountain-East Everyday-Life Subsection (Currently Deferred)
body: |-
  - EVERYDAY_LIFE.md currently ends at subsection (e) Fenlands West and does not include a (f) Mountain East subsection. CF-0037 commits family-handled waystation presence in mountain-east valley-pass approaches as part of the institution's three-region scope; per Phase 6b Everyday-Life critic recommendation, a brief deferral annotation has been added to subsection (c) Highland under CF-0037 commit rather than a new (f) section drafted now. The full mountain-east subsection (f) — addressing food, water, sanitation, housing, clothing, heating, childbirth, childrearing, aging, courtship, labor rhythm, leisure, intoxication, prayer/ritual, cleanliness, common injuries, medicine, death disposal, oral storytelling, common fears, common aspirations on the established subsection-template pattern — remains deferred to future canon work.

when_to_resolve: when a story features a mountain-east everyday-life setting that requires the subsection-template detail; when accumulated CF cross-references in mountain-east territory (currently CF-0021 / CF-0024 / CF-0028 / CF-0032 / CF-0033 / CF-0034 / CF-0035 / CF-0036 / CF-0037 = nine CF surfaces) reaches a coherence threshold demanding consolidation into a proper subsection.
caution: any future canon work that adds the mountain-east subsection should preserve the CF-0037 valley-pass waystation register already prefigured under (c) Highland (clan-territory waystation cadence with mountain-east valley-pass annotation) — the new (f) subsection should expand on that base rather than replace it. Mountain-east interactions with CF-0021 mountain-pass grimoire-transit, CF-0024 valley-mining-estate adventurer-contractor patterns, CF-0028 mountain-ruin expedition seasonal-pass-gating, CF-0032 mountain-east subsection-presence (thin), CF-0033 dragoon sparse-adoption pattern, CF-0034 mountain cold-pass bandit corridors, CF-0035 wildland mutated-beast in valley territories, and CF-0036 isolated-mountain-valley exclusionary-settlement pattern are the primary cross-CF surfaces a future (f) subsection must integrate.
