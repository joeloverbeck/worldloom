id: OQ-0045
topic: Single-Species Enclave Civic-Registry Polity-Status
body: |-
  - CF-0036 commits that isolated single-species exclusionary settlements exist but hold NO civic-registry polity-status recognition — they are marginal holdouts participating in chartered-polity trade under individual-household contracts, not recognized polities. Specific per-polity conventions on (a) whether exclusionary-settlement households hold civic-registry standing in chartered-polity courts for extradition purposes; (b) whether chartered polities recognize exclusionary-settlement elder-council adjudications in inheritance or marriage disputes involving mixed-polity-origin parties; (c) whether charter-polity magistrate precedent on exclusionary-settlement refusal-of-admission (spurned-migrant magistrate docket) treats exclusionary-settlement as refusable or as chartered-private-property-equivalent; (d) whether exclusionary-settlement tenancy-management contracts carry charter-scandal-adjacency in the charter-polity estate-steward register — remain deferred and polity-asymmetric.

when_to_resolve: when a story features a specific spurned-migrant magistrate docket case reaching appellate-court; an exclusionary-settlement elder-council decision crossing into charter-polity magistrate recognition; a named estate revealed to derive rental-income from exclusionary-settlement tenancy-management intermediary; or a sectarian-supremacist-movement attempt to convert an exclusionary-settlement into a chartered polity.
caution: 'interacts with SOC-1 firewall (no species-coded hierarchy world-truth; exclusionary-settlement is weak-charter sociological phenomenon, NOT civic category); interacts with the CF-0032 "older bloods" firewall (ancestral-polity Cluster C communities are DIFFERENT in kind from exclusionary single-species enclaves — the former are chartered mixed-polity resident minorities, the latter are unchartered exclusionary holdouts; firewall-conflation produces category error); interacts with CF-0034 bandit-extradition latent sixth-axis (exclusionary-settlement-adjacent tenancy-management sometimes overlaps with bandit-corridor adjacency). Rule 3 risk: too much civic-registry recognition would inflate exclusionary-settlements into polity-category, eroding their self-limiting structural instability.'
extensions: []
