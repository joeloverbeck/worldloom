id: OQ-0008
topic: Cross-Species Reproductive Edge Cases
body: "- ONT-3 declares no cross-species reproduction. The world has not committed on whether closely-related species (e.g., wolf-folk and dog-folk, or distinct cat-folk subspecies) might be exceptions. Genesis commits to **no exceptions** for invariant clarity."
when_to_resolve: only with deliberate user revision; treat as high-difficulty change because it touches kinship structure.
