id: OQ-0003
topic: Common Pantheon Roster
body: "- The genesis world commits to a common pantheon with approximate roles (hearth, harvest, water, road, judgment, the dead, and others) but has not named or fully cataloged its gods."
when_to_resolve: when a story needs specific divine reference, or when a sectarian conflict requires named divine partisanship.
