id: OQ-0056
topic: Ash-Seal Civic-Charter Terms (Brinewick)
body: |-
  - CF-0043 commits Ash-Seal as a Brinewick-specific NON-GUILD CIVIC-CHARTERED COMMERCIAL-COMPANY anomaly with concordat-arranged monopoly on containment / research / sealed-inert disposal in Brinewick and its carriage-distance heartland radius. The specific CIVIC-CHARTER TERMS — original grant-event (the specific competence-precedent incident that led Brinewick civic-council to charter the company in late Charter-Era / Incident-Wave-era consolidation period), charter-duration terms (perpetual / renewable / conditional-on-audit-compliance), civic-treasury payment rate-schedule for chartered-party intake (dragoon / dredger / canal-warden / magistrate handoffs), private-client rate-schedule for estate backchannel (safe-class moderate-tier non-catastrophic), trade-secret facility-location civic-legal protection statute text, charter-revocation-triggering-offense enumeration, biannual charter-audit access scope and limits, concordat boundary text (extraction / ward-inscription / ward-inspection / chartered-brokerage retained SOC-4; containment / research / disposal absorbed by company), chartered-extraction-guild concurrence-withdrawal trigger conditions, magistrate-docket jurisdictional-boundary between commercial corruption (Ash-Seal backchannel) and civic-watch corruption (CF-0038 C6 ward-inspector firewall preserved) — all remain deferred.

when_to_resolve: when a story features a specific Ash-Seal civic-charter-audit reaching magistrate-docket; a specific civic-council debate over charter-revocation or charter-renewal; a specific reform-current clergy charter-court challenge campaign reaching judgment; or a named grant-event in the Charter-Era / Incident-Wave-era historical register requiring concrete foundation-text.
caution: civic-charter resolution interacts with SOC-4 chartered-guild-monopoly scope-qualification (CF-0008 CH-0015), CF-0038 Brinewick institutional-decomposition firewall (C6), CF-0039 destruction-resistance corporate-marketing-reframe firewall (M-20 extension), and reform-current clergy (CF-0026) standing charter-audit-access campaign pressure (ELEVENTH audit-pressure target). The charter-terms specification must preserve the non-transferability of the Brinewick civic charter — any resolution that makes the terms LOOK LIKE a replicable institutional template would re-open Rule 4 globalization-by-accident risk. Charter-terms specification should name concrete Brinewick-geographic path-dependence mechanisms (four-stabilizer CF-0038 primacy compound; century-plus precedent-lock with chartered-extraction-guild concurrence; Incident-Wave-era grant-event details) that make the arrangement Brinewick-unique-by-construction.
