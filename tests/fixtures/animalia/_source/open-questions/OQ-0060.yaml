id: OQ-0060
topic: Well-Stop Succession Case Law
body: |-
  - CF-0047 commits well-stop placement-right as a FOURTH multi-generational tenancy asset-class (per ECONOMY §Value Stores CH-0018 addition) with partible-at-multi-heir-succession, forfeited-at-inheritor-self-exile, and customary-NOT-civic-registry-backed properties. The operational-docket for well-stop succession disputes is CAR​AVAN-MASTER CORRIDOR-INTERNAL CUSTOMARY-ADJUDICATION per CF-0046 (not magistrate-reachable unless the dispute migrates to chartered-polity court at the heartland border). Several case-law questions remain deferred for when stories require them:
    - **Multi-heir inheritance adjudication procedure**: what is the customary protocol when two or more inheritor-children claim placement-right at a retiring well-keeper's keeping-book-transfer moment? Caravan-master adjudication may award to a single heir, partition the well-stop across heirs (rare — well-stop partition is economically fragile because water-node is not divisible), award to a composite household formed by the disputing heirs, or defer to the retiring keeper's verse-counter-attestation of preferred inheritor. Specific per-corridor convention is deferred.
    - **Walked-the-well return-and-reclaim**: can a walked-the-well exile who returns after a sibling's death attempt to reclaim placement-right? CF-0047 commits self-exile FORFEITS placement-right; the question is whether caravan-master adjudication permits exceptional re-award at sibling-death succession-crisis (where no other inheritor is available). Specific case-law conventions are deferred; some corridors may permit exceptional re-award with a seasons-long provisional period, others may refuse the re-claim absolutely.
    - **Lineage-extinction protocol**: when a well-keeper lineage extinguishes without inheritor (no children surviving, no return-claim from exile, no extended-kin adjacent claim), how is the well-stop placement-right handled? Options include caravan-master-network collective custody with apprentice-placement from adjacent lineages, well-stop abandonment with corridor-rerouting, or adjacent-lineage-annexation under caravan-master award. Per-corridor convention is deferred.
    - **Cross-corridor inheritance (rare)**: when a well-keeper lineage produces multiple adult children who marry into distinct corridor-adjacent lineages and the retiring keeper's death produces competing claims from two different corridor caravan-master-networks, how is the dispute resolved? Cross-corridor caravan-master coordination is thin; this edge-case is genuinely ambiguous. Specific convention is deferred.
    - **Estate-tenant well-stop** (rare in drylands but exists where a drylands polity has nominal landholder claim over corridor territory): what happens when a nominal-estate landholder asserts title against well-keeper customary family-property claim? CF-0046 institutional-thinness suggests the customary claim prevails absent formal civic-magistrate contest; the specific estate-tenant vs customary-property adjudication cadence is deferred.
when_to_resolve: when a story foregrounds well-stop succession (the drylands protagonist returning to claim a dead sibling's well-stop; the drylands magistrate case reaching canal-heartland court on a cross-polity well-stop boundary dispute; the lineage-extinction mid-drought producing corridor-scale caravan-master adjudication precedent; the estate-tenant well-stop reaching formal civic-magistrate contest at a border polity).
caution: ordinary-author-side deferral, NOT a Mystery Reserve entry. No sectarian entanglement; no Maker-mystic reading; no doctrinal firewall required. These are operational-docket questions waiting for story-demand to resolve per-corridor or per-sub-region.
