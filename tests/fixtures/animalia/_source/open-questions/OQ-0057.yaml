id: OQ-0057
topic: Ash-Seal Institutional Antiquity
body: |-
  - CF-0043 commits Ash-Seal's actual institutional age as POST-CHARTER-ERA-CONSOLIDATION (late Charter-Era grant / early Incident-Wave-era consolidation most likely; NOT pre-Charter) per M-19 CH-0015 antiquity-as-corporate-mythmaking firewall. The company's CULTIVATED "hundreds of years" antiquity claim is CORPORATE MYTHMAKING in-world-contested-register paralleling the M-19 canal-age contested register; in-world discussion of Ash-Seal antiquity runs from the company's mystique-surface claim ("the company has existed since the founding of the city" as marketing-register boast) through civic-archive senior-clerk contested-correction ("the charter-grant document dates from fifty-to-one-hundred-years-ago depending on which Charter-archive copy is consulted") to reform-current clergy skeptical-register ("the company's 'hundreds of years' claim is not attested in any civic-registry chronicle prior to the Incident Wave") and Maker-mystic sectarian reading ("the company has ancient roots that the civic-registry does not record" — contested-sectarian projection, not world-truth). The specific grant-year, the specific founding-incident, the specific first-master-technician or first-officer, and the lineage of senior officers from the founding generation to present are all deferred.

when_to_resolve: when a story requires concrete Ash-Seal founding-date texture; when a named historical-chronicle citation forces specification; when a specific civic-archive scholar-character investigates Ash-Seal origins as plot-driver; when a reform-current clergy charter-audit campaign specifically targets the antiquity-claim-as-misleading-mystique aspect.
caution: 'antiquity-resolution interacts with M-19 Brinewick canal/tunnel-origin antiquity firewall, TIMELINE Layer 2 Charter-Era and Layer 3 Incident-Wave annotations, and CF-0038 century-plus precedent-lock stabilizer language (the "century-plus" figure implies Charter-Era grant). Any resolution must preserve: (a) post-Charter institutional age (not pre-Charter; M-19 CH-0015 firewall); (b) the "hundreds of years" claim as CORPORATE MYTHMAKING (not world-truth); (c) compatibility with the chartered-extraction-guild concordat timing (concordat was arranged at grant, so guild must have been professionalizing at grant-time — fits Incident-Wave-era professionalization alongside CF-0021 schism dynamics); (d) century-plus-minimum duration (required by CF-0038 four-stabilizer primacy compound non-transferability logic). Specific antiquity resolution narrow per-site: a specific story can commit to a specific grant-year and specific founding-incident without foreclosing wider Brinewick institutional-chronology detail.'
