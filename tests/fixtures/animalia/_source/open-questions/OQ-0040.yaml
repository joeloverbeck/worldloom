id: OQ-0040
topic: Hunter-Contractor Beast-Trophy Custody and Natural-History Register
body: |-
  - CF-0035 commits that mutated-beast trophies enter polity-asymmetric markets under bounty-clerk certification and travel the canal-corridor illegitimate-service rail as a sixth authentication-cartel product-line where trophy-legality is contested. The SPECIFIC civic-registry recognition of "verified-mutated-beast trophy" status, the standardized bounty-clerk certification procedure per polity, the chartered-broker involvement (if any) in trophy-authentication, and the natural-history scholarly access to mutated-beast specimens (do civic-adjacent archives maintain reference collections? are living specimens ever retained for study? what institutional check prevents sectarian collectors from acquiring specimens?) remain polity-asymmetric and deferred.

when_to_resolve: when a story foregrounds a specific polity's trophy-market regulation, a named hunter-contractor trophy-provenance dispute reaching magistrate decision, a natural-history scholar requesting institutional specimen access, or a sectarian collector acquisition scandal.
caution: interacts with CF-0008 chartered-guild artifact-monopoly (mutated-beast remains are NOT a Maker-knowledge custody channel per M-9 firewall; natural-history register must firewall against Maker-archive slippage); with CF-0021 authentication-specialist niche (extension creates cartel-formation pressure; cartel-chartering tilts toward regulated oligopoly, prohibition tilts toward driving authentication underground); with the carnivore-folk progenitor-cult trophy taboo (PEOPLES_AND_SPECIES CH-0009 extension — specific civic-registry recognition of the taboo as a named complaint-category is deferred).
