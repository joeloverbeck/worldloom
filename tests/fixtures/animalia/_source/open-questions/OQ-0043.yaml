id: OQ-0043
topic: Bardic Register for Mutated-Beast Cycles vs Bandit-Captain Cycles (M-14 parallel)
body: |-
  - CF-0035 commits that bardic mainstream withholds heroic ballad-status from beast-hunt material and that named-beast figures accrue corridor-reputation in AES-1 tavern-veteran register. Whether named mutated-beast figures ("the six-limbed boar of the Selk drainage," "the Old One of the Cold Valleys") accrue the SAME mythography-reliability contestation pattern as M-14 named bandit-captains (historical-individuals / composite-figures / pure-invention / mixed readings), and whether the bardic-circuit develops a distinct MUTATED-BEAST MYTHOGRAPHY register paralleling but categorically separate from bandit-captain mythography, remain deferred.

when_to_resolve: when a story features a specific named-beast bardic cycle reaching magistrate-court evidentiary dispute, a reform-current clergy campaign against inflated beast-cycle propaganda, or a hunter-contractor professional challenge to a named-beast bardic-fabrication claim.
caution: interacts with M-14 bandit-captain mythography reliability (parallel register question, distinct epistemic object — bandits are antagonist-mythography, mutated beasts are hazard-mythography, and conflating the two risks collapsing both registers); with the AES-1 hero-drift firewall (any bardic inflation toward named-beast-as-hero cycle is register-collapse — the disciplined answer is that mutated beasts stay named-by-corridor not named-as-antagonist); with M-7 specialist reputation-genealogy (hunter-veteran reputations accrue parallel to extractor / expedition / subsection / dragoon / bandit-hunter five-cohort register, as sub-specialty within CF-0024 wildlife subtype; named-beast mythography is the HAZARD side of this, hunter-veteran mythography is the SPECIALIST side, and the two should not blur).
