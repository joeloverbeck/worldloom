id: OQ-0058
topic: Drylands Short-Poetry Convention Antiquity and Scope
body: |-
  - CF-0044 commits the drylands short-poetry stranger-hospitality protocol as a regional cultural convention operating at caravanserai, wayhouse, and well-side stranger encounters. Per TIMELINE.md Layer 1 annotation under CH-0016 (parallel to CF-0037 waystation-antiquity precedent), the convention plausibly predates Charter-Era institutional consolidation as informal oral-hospitality register, and per Layer 2 annotation remains non-chartered folk-practice post-Charter. Two scope-and-antiquity questions remain deferred:
    - **Antiquity question**: whether the convention traces continuous descent to a specific pre-Charter origin (the heritage reading), whether the Charter-Era's multispecies civic convergence quietly consolidated a looser older practice into its current recognizable form (the consolidation reading), or whether antiquity is uneven across drylands sub-regions (the skeptical reading: caravan-corridor caravanserai practice is ancient; oasis-hamlet-resident practice is more recent; fringe-drylands practice may be Charter-Era-imported).
    - **Scope question**: whether the convention is pan-drylands (all stranger-encounters in drylands hospitality-register regardless of caravan-route adjacency), caravan-route-specific (caravanserai / wayhouse / well-side only, with off-route oasis-hamlets and pastoral-camps operating on different register), or caravanserai-only (the tighter reading — wayhouse and well-side inherit the register by institutional adjacency rather than independent derivation). CF-0044 provisionally commits pan-drylands scope with three site-types as exemplar-not-exhaustive contexts; Vespera Nightwhisper's three-week caravan exposure (per DA-0001 source-basis) underdetermines the range and the deferral preserves future narrowing without ledger retcon.

when_to_resolve: when a story foregrounds the antiquity question (a drylands charter-court case where verse-convention-antiquity bears on custom-recognition; a tea-house scribe produces a pre-Charter fragment that attests the convention; a drylands progenitor-cult lineage-keeper testifies to ancestral verse-tradition); when a story foregrounds the scope-refinement question (a drylands protagonist traveling off-corridor encounters inconsistent application of the register; an oasis-hamlet newcomer discovers the caravanserai-gate turn does or does not operate in that local setting). Sub-regional commitment is acceptable (a specific drylands sub-region may date its convention to a specific pre-Charter or Charter-Era origin, or commit a specific scope limitation, without implication for other drylands sub-regions).
caution: 'this is an ORDINARY AUTHOR-SIDE DEFERRAL, NOT a Mystery Reserve entry (parallel to CF-0037 "Waystation Tradition Antiquity" precedent above). The convention antiquity question lacks progenitor-cult sectarian entanglement giving M-4 or M-12 their productive contestation; no sectarian movement instrumentalizes verse-convention-antiquity for political purposes beyond the bounded M-4 genre-vs-doctrine firewall (MYSTERY_RESERVE CH-0016); no Maker-mystic reading attaches. The question can be resolved at any time without destabilizing existing canon — it is a deferral of convenience, not of bounded-unknown discipline. Per Mystery Curator Phase 6b finding (PA-0015): Rule 7 obligation discharged with documented negative finding (no new MR entry warranted).'
extensions:
