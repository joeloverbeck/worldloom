    change_id: CH-0018
    date: 2026-04-20
    label: Pressure annotation
    body: "CF-0047 drylands well-keeper lineage-inheritable customary-authority role commits verse-repertoire custody as a well-keeper competence (retiring-keeper-verse-book heirloom convention formalized) and apprenticeship pedagogy from age 6-7 as the verse-transmission vector — anchoring verse-transmission concretely in well-stop lineage-inheritance. The scope question narrows slightly under this concretization but is NOT resolved: well-keeper lineages operate at well-stop corridor-nodes (caravanserai, wayhouse, well-side site-types) and verse-repertoire inheritance follows well-stop inheritance; whether the verse-convention itself also operates at caravan-rotation rest-stops, drylands pastoral-camps, oasis-hamlet household-receptions, or other off-corridor site-types remains the scope question CF-0044 deferred and CF-0046/CF-0047 does not close. Preserve deferral explicitly: the well-keeper as verse-book custodian is one anchor of the convention, not its exhaustive institutional form; a drylands protagonist off-corridor may encounter verse-turn application in non-well-stop contexts that CF-0047 does not predetermine. The antiquity question is NOT resolved by CF-0046 either — CF-0046 operates under existing CF-0044 antiquity deferral (per TIMELINE Layer 1 / Layer 2 annotations under CH-0018); drylands caravan-corridor institutional-cultural complex antiquity is co-deferred (see §Drylands Caravan-Corridor Infrastructure Antiquity below)."
