topic: Bird-Folk Civic Migration Mechanics
body: "- Some bird-folk migrate seasonally between summer and winter ranges. Multi-polity reciprocity arrangements exist for some communities; for others, civic-registry status is contested annually. Specific mechanics (which polities, which reciprocities, which compromises) are deferred."
when_to_resolve: when a story features a migrating bird-folk character or community.
