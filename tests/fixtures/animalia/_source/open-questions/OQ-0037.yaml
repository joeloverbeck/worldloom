id: OQ-0037
topic: Inter-Polity Bandit-Extradition Convention (latent sixth-axis watch-item)
body: |-
  - CF-0034 treats bandit-extradition as a MINOR operational magistrate docket-line, NOT a sixth Charter-Era structural disagreement axis joining CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028/CF-0030 funder-primacy, CF-0031 contamination-registry, and CF-0033 dragoon-adoption. The reasoning is that every polity agrees bandits should be suppressed; disagreement is only operational (pursuit-cooperation procedure, captured-bandit jurisdiction, extradition of reformed-bandit-kin claiming sanctuary). This reading was convergent between the Continuity Archivist and Politics/Institution critics during CH-0008 adjudication.

when_to_resolve: when a specific adopting polity's bandit-extradition conviction appears in story; when an inter-polity pursuit-cooperation dispute reaches magistrate decision across incompatible bandit-extradition conventions; when a reformed-bandit-sanctuary petition forces a charter-court adjudication.
caution: if polities develop structurally divergent bandit-extradition conventions — e.g., one polity offering safe-harbor to reformed bandits who complete atonement, another automatically executing extradited bandits regardless of reform claim, with neither polity's magistrates willing to cooperate across the jurisdictional line — the current MINOR status could harden into a sixth polity-asymmetric structural axis. This is a latent burden per CH-0008, not a current structural reality. Future canon work that commits a specific adopting polity's safe-harbor or automatic-execution conviction should flag the Charter-Era stress-register implication.
extensions: []
