id: OQ-0034
topic: Dragoon Cross-Polity Pursuit Extradition Framework
body: |-
  - CF-0033 commits that dragoons have NO chartered authority outside their home polity, and cross-polity pursuit of black-market artifact traffic across charter lines is legally fraught. Inter-polity extradition case docket is a named new magistrate docket class (INSTITUTIONS §Law CH-0007 addition), but specific procedural frameworks — whether adopting polities negotiate reciprocal-pursuit treaties, whether non-adopting polities permit dragoon transit under escort, whether magistrate-court precedent on a captured-in-pursuit trafficker prosecution follows home-polity or destination-polity charter, whether a dragoon exceeding authority in a non-adopting polity faces criminal prosecution on return — remain undeveloped.

when_to_resolve: when a story features a specific dragoon cross-border pursuit magistrate case, a reciprocal-pursuit treaty negotiation, or an inter-polity extradition ruling for a dragoon-captured trafficker.
caution: interacts with CF-0021, CF-0024, CF-0028/CF-0030, and CF-0031 existing no-schema extradition-gap patterns. A formal reciprocal-pursuit treaty network would narrow the five-axis stress register toward settled practice (partially defusing Charter-Era regional-variation pressure); absence of framework preserves the productive inter-polity friction that characterizes the current Charter Era. Reactive-adoption pressure under smuggler counter-force escalation (CF-0033 costs_and_limits) is a structural driver pushing non-adopting polities toward adoption, and reciprocal-pursuit treaty framework would either alleviate that pressure (by permitting controlled cross-border pursuit) or intensify it (by failing to resolve cross-border incidents).
extensions: []
