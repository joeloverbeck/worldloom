id: OQ-0036
topic: Hunter-Contractor Licensing and Bounty Framework (per polity)
body: |-
  - CF-0034 commits endemic banditry as a historical_process and commits bandit-hunting as a named CF-0024 adventurer-contractor subtype. It does NOT commit any specific polity's licensing framework for hunter-contractor companies, any specific bounty-schedule convention, any no-body-no-pay precedent, any kill-vs-capture bounty differential, any captured-bandit-disposition procedure (summary-killing-under-warrant vs trial), any ransom-broker chartering, or any specific bounty-hunter liability case law. These remain per-polity-asymmetric and deferred.

when_to_resolve: when a story foregrounds a specific adopting polity's hunter-contractor licensing regime, when a named bounty-company appears as an institutional form in story, when a magistrate case turns on no-body-no-pay or kill-vs-capture bounty-differential precedent, or when a charter-court challenge to summary-killing-under-warrant reaches decision.
caution: interacts with CF-0024 mercenary-company licensing asymmetry precedent (which CF-0034 parallels operationally but does NOT replicate as a Charter-Era structural disagreement axis — bandit-hunter licensure is a minor extradition docket-line per INSTITUTIONS §Law CH-0008 annotation). Interacts with M-13 dragoon institutional contingency via the load-bearing hunter-contractor ≠ dragoon boundary — any polity that blurs the boundary by licensing hunter-contractors with civic-chartered authority risks dragoon-mission-creep pressure compounding. Interacts with CF-0026 principled-refuser clergy bifurcation between bounty-commission-accepting and bounty-execution-abolitionist wings — charter-court challenges to summary-killing-under-warrant are evolving magistrate jurisprudence in some polities.
extensions: []
