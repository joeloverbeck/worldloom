id: OQ-0035
topic: Subsection-Seal Fraud Precedent
body: |-
  - CF-0032 commits the oversize-saddlery guild-subsection's seal as a visible trade-signal of Cluster C regional authenticity and body-plan-variant competence. Authentication (genuine subsection-seal vs imitation) emerges as a minor sub-specialty with cartel-formation pressure flagged parallel to CF-0028 authentication-specialists. Specific magistrate precedent on subsection-seal forgery, counterfeit-seal civic prosecution, competing-polity seal-recognition disputes (two ancestral polities issuing seals; a third polity asked to recognize an estate-commission), and the liability of authentication-specialists who certify falsely remains undeveloped.

when_to_resolve: when a story features a specific subsection-seal forgery dispute, a competing-polity seal-recognition magistrate case, or an authentication-specialist cartel scandal.
caution: interacts with CF-0028 authentication-specialist cartel-formation pressure and with the CF-0032 craft-liability register (an estate-commissioned oversize wagon-bed failing structurally raises liability questions that subsection-seal authentication intersects). Hardening seal-fraud prosecution tilts toward civic-registry chartering of authentication; softening tilts toward killing-enforced-by-rival informal discipline (parallel to CF-0028 entrance-knowledge patterns, unexpectedly). The balance is load-bearing for whether the authentication market develops as chartered niche or cartel-adjacent informal register.
