id: OQ-0032
topic: Dragoon Mission-Scope Case Law
body: |-
  - CF-0033 commits that mission-creep pressure toward routine policing or external-conflict deployment is blocked by charter-court challenge brought primarily by principled-refuser clergy (CF-0026). Specific magistrate precedent on mission-scope breach adjudication — what constitutes "extraction-adjacent act under perimeter cover" versus legitimate ward-breach response; what levels of pursuit-of-traffickers remain within charter scope; what civic-watch tasks (riot suppression, banditry response, demonstration control) qualify as Charter-Era-breaching mission creep versus permissible-adjacent perimeter function; what sanctions follow from mission-creep findings — remains undeveloped.

when_to_resolve: when a story features a specific dragoon mission-creep challenge reaching magistrate decision, when a council-authority backlash triggers institutional-dismantling narrative, or when a specific polity's dragoon-scope case law requires concrete text.
caution: interacts with CF-0026 principled-refuser standing role (CH-0007 extension) and with the CF-0033 load-bearing perimeter/extraction boundary. Hardening mission-scope precedent toward narrow perimeter-only tips toward CF-0028-style Charter-Era rupture risk in polities where dragoon institutional momentum is strong; softening mission-scope precedent toward permissive-adjacent functions tips toward the mission-creep-adoption-rollback breakage flagged in ECONOMY §Breakage Points. The balance is load-bearing.
extensions: []
