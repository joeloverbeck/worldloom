id: OQ-0046
topic: Supremacist-Movement Licensure / Proscription Status (per polity)
body: |-
  - CF-0036 commits that supremacist sectarian doctrine is CONTESTED-CANON sectarian belief held by a fringe and that no chartered polity adopts the doctrine as civic policy. Specific per-polity conventions on MOVEMENT LICENSURE vs PROSCRIPTION vs TOLERATED-SPEECH — whether specific polities have formally proscribed named supremacist-sectarian movements as criminal conspiracies, whether others tolerate supremacist speech within charter-firewall hierarchy-speech-suppression limits, whether clergy bifurcation (CF-0026 CH-0010) affects specific polity licensure debate — remain deferred and polity-asymmetric.

when_to_resolve: when a story features a specific polity's supremacist-movement proscription debate reaching legislative adoption; a charter-court challenge to a proscription-decree; a sectarian-movement trial reaching appellate register; or a specific named supremacist-movement's cross-polity extradition dispute.
caution: interacts with Charter-Era hierarchy-speech firewall (civic charters suppress hierarchy-speech; proscription of a movement as civic-criminal extends firewall into prohibition territory; toleration keeps firewall at speech-refutation territory). Interacts with CF-0026 principled-refuser clergy charter-defense campaign focus (reform-current clergy campaign for proscription against adopting polity; civic-restraint wing campaigns for speech-refutation without proscription). Interacts with CF-0033 dragoon mission-scope firewall (if a polity proscribes a supremacist movement, enforcement is civic-watch/magistrate, NEVER dragoon — CF-0033 firewall preserved).
extensions: []
