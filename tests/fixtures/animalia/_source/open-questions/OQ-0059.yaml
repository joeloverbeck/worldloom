id: OQ-0059
topic: Drylands Caravan-Corridor Infrastructure Antiquity
body: |-
  - CF-0046 commits the drylands caravan-corridor institutional-cultural complex (wells, gate-stops, villages, caravanserais, caravan-master corridor-internal customary adjudication, runner-reached village militia, reciprocity-primary economy, oral-primary DIS-2 partial literacy with trade-tongue station-log, well-keeper lineage-inheritable customary-authority role per CF-0047) as current-era regional institutional pattern. Per TIMELINE Layer 1 / Layer 2 annotations under CH-0018 (parallel to CF-0037 waystation-antiquity and CF-0044 verse-convention-antiquity precedents), the complex plausibly traces to pre-Charter folk-tradition residue with Charter-Era neither-chartered-nor-displaced stabilization. The antiquity-and-origin questions remain deferred:
    - **Well-keeper lineage antiquity**: whether specific well-keeper lineages trace continuous descent to pre-Charter origin (the heritage reading), whether Charter-Era multispecies civic convergence quietly consolidated looser-older water-authority practices into the current named-role form (the consolidation reading), or whether antiquity is uneven across drylands sub-regions (the skeptical reading: coastal-south caravan-corridor well-keeping is ancient; interior-drylands well-keeping is more recent; fringe-drylands well-keeping may be Charter-Era-imported from caravan-rotation cultural contact).
    - **Caravan-master adjudication antiquity**: whether corridor-internal customary-adjudication traces continuous descent from pre-Charter caravan-merchant arbitration, whether Charter-Era Charter-Day framework provided the implicit legitimacy the adjudication now carries, or whether the practice emerged in the Incident-Wave-era operational-consolidation alongside CF-0024 caravanserai posting-board and CF-0028 tea-house-scribe witness traditions.
    - **Runner-reached village militia antiquity**: whether runner-militia tradition traces continuous descent from pre-Charter village-self-defense, whether Charter-Era civic-military doctrine adjacency shaped its current form (CF-0020 militia-standing substrate), or whether the practice is Charter-Era-era operational-consolidation response to corridor bandit-risk post-Incident-Wave (CF-0034 endemic banditry context).
    - **Station-log convention antiquity**: whether household-held station-log keeping in DIS-2 trade-tongue traces continuous descent from pre-Charter household-trade ledger convention, whether Charter-Era commercial-literacy expansion enabled the DIS-2 convergence commercial lingua-franca use in corridor contexts, or whether the convention is sufficiently recent that individual well-keeper lineages' station-log traditions are generationally traceable.
    - **Reciprocity-primary regional economy antiquity**: structurally the oldest feature (water-scarcity geography predates Charter-Era by geological scale); what is deferred is the specific question of how Charter-Era coin-at-edges monetization interacted with pre-existing reciprocity — did Charter-Era introduce coin-at-edges where no coin had reached before, or did coin-at-edges consolidate pre-Charter commercial-fringe patterns?

when_to_resolve: when a story foregrounds corridor-institutional antiquity (a drylands charter-court case where well-keeper-lineage antiquity bears on custom-recognition; a drylands tea-house scribe produces a pre-Charter fragment attesting corridor-internal adjudication; a drylands progenitor-cult lineage-keeper testifies to ancestral water-authority tradition); when a story foregrounds institutional-emergence-specific origins (a narrator traces caravan-master adjudication back to a specific pre-Charter merchant-guild fragment; a runner-militia convention is attested in a specific Charter-Era-era village-council record). Sub-regional commitment is acceptable (a specific drylands sub-region may date its well-keeper-lineage to a specific pre-Charter generation, or commit a specific caravan-master adjudication formalization date, without implication for other drylands sub-regions).
caution: 'this is an ORDINARY AUTHOR-SIDE DEFERRAL, NOT a Mystery Reserve entry (parallel to CF-0037 "Waystation Tradition Antiquity" and CF-0044 "Drylands Short-Poetry Convention Antiquity and Scope" precedents above). The antiquity questions lack progenitor-cult sectarian entanglement giving M-4 or M-12 their productive contestation; no sectarian movement instrumentalizes drylands infrastructure-antiquity for political purposes beyond the bounded M-4 genre-vs-doctrine firewall (MYSTERY_RESERVE CH-0016); no Maker-mystic reading attaches (per CH-0018 MYSTERY_RESERVE M-19 drylands-infrastructure-scoped-distinct firewall — drylands qanat/corridor antiquity is categorically distinct from Brinewick bounded-unknown M-19; no Maker-substrate sectarian reading). The questions can be resolved at any time without destabilizing existing canon — deferral of convenience, not of bounded-unknown discipline. Per Phase 6b Mystery Curator finding: Rule 7 obligation discharged with documented negative finding (no new MR entry warranted).'
