id: OQ-0030
topic: Reciprocal-Travel Case Law (Subsection Guild-Internal Discipline)
body: |-
  - CF-0032 commits the oversize-saddlery subsection's reciprocal cross-polity journeyman circuit as a master-rank-progression requirement. A journeyman abandoning reciprocity mid-circuit, violating a reciprocal-polity master's terms, or breaking reciprocal-polity apprenticeship bond is a guild-disciplinary matter with civic-watch handoff only where charter monopoly is invoked. This is a FOURTH docket class categorically distinct from the three polity-asymmetric extradition patterns (CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0031 contamination-registry). Specific magistrate precedent on subsection-discipline adjudication, cross-polity guild-internal discipline vs civic-watch jurisdictional handoff, reciprocal-polity master's authority to invoke civic sanction across polity lines, and extradition for seal-denial-after-reciprocity-breach remains undeveloped.

when_to_resolve: when a story features a specific reciprocal-journey abandonment magistrate case, a cross-polity subsection-discipline dispute, or an extradition question tied to a named subsection-master's claim.
caution: interacts with SOC-4 (artifact-trade guild-licensing framework precedent) and SOC-3 (coin-contract sacredness applies to commission-contracts but NOT to placement-right transfers or reciprocal-journey bonds themselves). Treating the reciprocal circuit as chartered-guild-discipline tilts toward civic-enforcement; treating it as pure guild-internal matter tilts toward informal enforcement. The balance is load-bearing.
