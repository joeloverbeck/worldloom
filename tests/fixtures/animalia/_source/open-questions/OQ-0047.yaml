id: OQ-0047
topic: Clergy Bifurcation Case Law (CF-0026 CH-0010)
body: |-
  - CF-0036 commits that CF-0026 principled-refuser clergy bifurcate along charter-defense-anti-supremacism vs civic-restraint-pragmatic lines (THIRD CF-0026 bifurcation instance after CH-0005 contamination-registry and CH-0007 dragoon-scope). Specific per-polity conventions on magistrate-court treatment of the two wings — whether charter-defense-wing petitions for unsealing are treated as charter-court challenges or as reform-current advisory input; whether civic-restraint-wing pastoral specialty in silenced-contractor-household and cannibal-camp-survivor ministry receives charter-adjacent recognition for fallout-ministry parallel to CF-0025 arrangements; whether CF-0031 welfare-purpose witness-access protocol extends to CF-0036 sealed-docket unsealing-advocacy — remain deferred and polity-asymmetric.

when_to_resolve: when a story features a specific clergy-bifurcation magistrate advisory-panel dispute; a charter-court case in which the two wings advocate opposing positions; or a named clergy-figure whose ministry spans or moves between the two wings.
caution: interacts with CF-0031 CH-0005 bifurcation template and CF-0033 CH-0007 bifurcation template — the three CF-0026 bifurcations track similar structural patterns but operate over distinct doctrinal territories; future canon work must preserve the bifurcation distinctions rather than collapsing them into a single reform-current clergy position. Interacts with Rule 3 risk (too much schism-recognition could inflate CF-0026 bifurcations into formal denominational split; the disciplined answer is that bifurcations hold within reform-current without schism).
extensions: []
