id: OQ-0031
topic: Dragoon Charter Terms (per polity)
body: |-
  - CF-0033 commits canal-corridor quarantine dragoons as a chartered-civic perimeter force in some larger heartland polities, with four named adoption-gates (anti-monopoly political cost, chartered extraction guild consent/override, dedicated funding stream, principled-refuser clergy influence). Specific per-polity charter terms — declared mission scope, sunset or recharter requirement, magistrate chain-of-command structure, civic-audit schedule, council-authority override protocols for guild opposition, retirement-pension vesting thresholds, minimum corps size for institutional viability — remain deferred.

when_to_resolve: when a story foregrounds a specific adopting polity's dragoon institutional texture, when a charter-court challenge to specific mission scope requires concrete text, or when an adoption-debate narrative requires a named polity's specific charter-adoption resolution.
caution: interacts with SOC-4 (artifact-trade guild-licensing framework precedent) via the load-bearing perimeter/extraction jurisdictional boundary, with CF-0008 scope narrowing (CH-0007) via extraction-guild consent mechanism, and with the CF-0031 welfare-purpose charter-clause protection precedent. Per-polity charter-term variation compounds the CF-0021 / CF-0024 / CF-0028 / CF-0031 / CF-0033 five-axis polity-asymmetric stress register; any single polity's dragoon-charter resolution sets precedent for neighboring polities' adoption-debate framing.
extensions: []
