id: SEC-ECR-007
file_class: ECONOMY_AND_RESOURCES
order: 7
heading: Inequality Patterns
heading_level: 2
body: |-
  - Estate-owning families (mixed species, no species-coded predominance) hold the top stratum of durable wealth. <!-- added by CF-0036 --> The "no species-coded predominance" line holds at world-aggregate level; individual estates exhibit tenant-species composition variation, and a sectarian-ermine-noble labor-prejudice register (ermine-folk nobility distancing canal-mud work to beaver-folk / river-cat-folk tenants) is an ideological posture of particular estate-class households, NOT a species-composition fact of the estate stratum.
  - Guild masters — especially in artifact-extraction, ceramic, and engineering guilds — hold concentrated coin wealth.
  - Town artisans hold competence and small workshops; lifetime mobility is real but bounded.
  - Rural tenants hold use-rights and stock; mobility is hardest from this stratum.
  - Urban poor — day laborers, dock-hands, casual workers — hold the bottom; mobility through guild apprenticeship is the rare path.
  - The poor of contaminated quarter-towns, and refugees from sealed quarters, occupy a particularly precarious stratum: they often cannot return to ancestral lands.
  - <!-- added by CF-0021 --> Surviving assistants of failed crafters (CF-0021) form a precarious sub-stratum — often maimed by kiln explosions, blacklisted from chartered guild apprenticeship, marked socially in artisan quarters; some find work as authentication-specialist apprentices on the strength of their hard-earned empirical knowledge, but most do not.
  - <!-- added by CF-0025 --> Post-career occult-fallout specialists (CF-0025) form a stratum analogous to extractor-veteran families: contamination-injured (darkened skin patches, tremors, respiratory issues akin to extractors), eligible for some guild pensions via commission-basis work, but generally less institutionally integrated than guild-chartered retirees. Widows of dead specialists may receive partial hazard-pay continuation by contract custom but have no charter guarantee; post-career pension arrangements are deferred to OPEN_QUESTIONS.
  - <!-- added by CF-0028 --> Ruin-rich regions develop uneven wealth concentration — polities hosting productive ruins accumulate chartered-broker disposition revenues, patron-syndicate capital inflows, and authentication-specialist fees; ruin-poor regions export veteran labor and scholar-researcher expertise, experiencing hazard-pay wage inflation that pressures ordinary-labor markets. This deepens the CF-0021 and CF-0024 regional asymmetries into a third axis. Expedition-widow stratum is distinct from CF-0024 widow-of-the-job and CF-0025 fallout-specialist widow: full-expedition squad-wipes produce CLUSTERED widow-hoods in single towns, overwhelming contract-custom mutual-aid and leaving households precarious. The expedition-widow pension gap is logged as OPEN_QUESTIONS pressure.
  - <!-- added by CF-0031 --> The widow-and-contamination-injured-retiree stratum stratifies further in adopting polities: registered CF-0025-eligible households (CF-0031 ledger-mark) receive pension supplement and monastic-clinic priority at the cost of three-generation marriage-market stigma; unregistered-but-eligible households carry no stigma but no income; a visible registered/unregistered sub-stratum forms in artisan quarters. Over generations, the mark interacts with marriage-market assortative sorting — registered-lineage households tend to inter-marry registered, compounding both stigma concentration and pension-stream concentration into a visible cluster-adjacent pattern. The cluster-adjacent drift is a Rule 3 specialness-inflation pressure that Mystery Reserve M-11 (Empirical Basis of the Three-Generation Contamination-Lineage Marker) tracks as bounded unknown. Unregistered extractor/containment-wright families become preferentially cheaper hires for unchartered patrons and brokers — a perverse labor-market incentive the voluntary stabilizer does not contain. Expedition-triage injury (CF-0028 per Healing/Medicine extension) has NO registry hook; CF-0031 covers CF-0025 specialist lineages only, and expedition-contractors suffering guardian-construction trauma or ruin-field sepsis remain outside its welfare reach. The expedition-widow pension gap compounded by registry-absence-for-expedition-contractors is a four-axis inequality pattern now — ruin-rich-region concentration, CF-0025 adopting-polity stratum, non-adopting-polity residual, expedition-contractor gap.
  - <!-- added by CF-0032 --> Intra-Cluster-C stratification in ancestral polities (CF-0032): subsection-adjacent Cluster C households (those with master-craft placement-rights, journeyman-circuit reputation, or active commission-stream) form a higher-prestige stratum within Cluster C than haulage-concentrated Cluster C households; subsection placement-right inheritance and dowry-asset negotiation compound over generations into a placement-right concentration pattern (see Value Stores). Most Cluster C community members in ancestral polities remain in haulage; the subsection is a minority upward-mobility path, not a class-wide uplift. A second axis of intra-Cluster-C stratification: Cluster C members OUTSIDE ancestral polities (diaspora households) lack both subsection-access AND haulage-tradition coordination, bearing universalization-pressure reputational costs without rent-access. Rule 3 specialness-inflation pressure is concentrated at the progenitor-supremacist-reading interface (see PEOPLES_AND_SPECIES.md and INSTITUTIONS.md §Religion firewalls under CF-0032); the firewall is load-bearing.
  - <!-- added by CF-0034 --> Endemic-banditry inequality-pattern extensions (CF-0034): (a) abandoned-settlement-survivors from bandit-raid-caused dispossession JOIN the existing "refugees from sealed quarter-towns" precarious stratum — NOT a new category; the refugees-from-sealed-quarters stratum simply picks up an additional push-vector source. (b) Widow-of-the-raid is **absorbed into CF-0024 widow-of-the-job** as an idiom-extension ("did your kin come back from the raid?") — NOT elevated to a 7th widow/retiree sub-stratum (Rule 3 specialness-inflation firewall per CH-0008). (c) Recovered-captive-from-raid stratum exists within households that receive back an enslaved kin; reintegration is fraught, civic-registry schema is uneven, common-pantheon restoration rite variants exist in some polities; this stratum is latent-burden per CH-0008, committed as a fraught kinship pattern but NOT formalized as a civic-registry-welfare stratum. (d) Compounding effect: the CF-0034 raid-abandoned-settlement feeder overlaps with the CF-0021 sealed-quarter-contamination feeder, CF-0031 unregistered-lineage desperate-labor feeder, CF-0024 failed-reputation-contractor feeder, and CF-0026 refuser-stratum-that-runs-out-of-hearth-care — these share partial populations at the periphery and compound the precarious-stratum texture rather than producing clean separate strata.
  - <!-- added by CF-0035 --> Legendary-beast-hunt inequality-pattern extensions (CF-0035): (a) **Widow-of-the-hunt is absorbed into CF-0024 widow-of-the-job** as idiom-extension (*"did your kin come back from the wilds?"*) — NOT elevated to any additional widow/retiree sub-stratum per Rule 3 firewall; tavern-veteran accounts sort by hunt-corridor rather than by separate widow-category. (b) **Distributional regression**: settlement-treasury pays bounty from thin village treasuries while the curiosity-collector tier (noble estates, civic-advisory households, cabinet-of-curiosities merchants where legal) captures trophy surplus via the thin trophy-authentication market; wealth flows from rural-tenant tax base to urban curiosity-collector mediated by hunter-contractor — a mild distributional regression paralleling but distinct from CF-0028 ruin-rich-region concentration. (c) **Compounding effect** on the existing precarious-stratum texture: wildland-adjacent settlements exposed to repeated mutated-beast incursion may experience bounty-treasury exhaustion in compound-Breakage years, and settlement-abandonment follows the CF-0034 raid-abandonment pattern at lower acuity (the beast does not raze; it bleeds livestock until the tenant walks). (d) **Hunter-contractor legend-inflation failure mode**: tavern-board new-hires attempting legendary-beast-hunts on unverified corridor-intelligence (often at underpriced rates, often pre-captured by sectarian patrons or ideological buyers) experience mortality rates approaching CF-0028 expedition-new-hire pattern; the failed-hunter stratum accumulates within the CF-0024 failed-reputation-contractor feeder and compounds the CF-0034 bandit-recruitment pathway for survivors who return alive but debt-spiral-broken.
  - <!-- added by CF-0033 --> Dragoon widow / retired-dragoon stratum (CF-0033): in adopting polities, dragoon charter-backed pension creates a SIXTH named widow / retiree sub-stratum alongside extractor-veteran families, CF-0024 contractor-widow households, CF-0025 occult-fallout-specialist widow/retiree households, CF-0028 expedition-widow households, and CF-0031 registered-lineage households. The dragoon stratum is distinctive in having full civic-treasury pension coverage (not welfare-registry supplement like CF-0031; not contract-custom enforcement like CF-0024 widow-of-the-job; not shadow-equity like CF-0028 expedition-widow). Dragoon-widow households carry charter-sound prestige in adopting polities paralleling civic-advisory retired-dragoon positioning. The pension-differential between dragoon households and other contractor-widow categories is a visible political lever for reform-current clergy (CF-0026) campaigns — *"if dragoons' widows eat, why not extractors'?"* is a named reform-register formulation that has appeared in adopting-polity magistrate-advisory panels. In non-adopting polities, the dragoon stratum does not exist; emigrant dragoon-widow returning to non-adopting kin faces the CF-0024 widow-of-the-job environment with pension income treated by some kin-groups as external-polity taint and by others as welcome outlier resource.
  - <!-- added by CF-0038 --> **Brinewick as regional migrant-collector** (CF-0038): the "chewed up and spat out" migrant-attractor register commits Brinewick as heartland REGIONAL COLLECTOR of the precarious-immigrant stratum — provincial-born young craftsmen and craftswomen arriving at canal-open with letters of vouch, seasonal-labor cohorts arriving at harvest-end for winter work, refugees displaced from sealed quarter-towns in adjacent heartland polities, CF-0037 stationkeeper-self-exile inheritors, CF-0024 failed-reputation contractors drifting toward canal-city casual labor, CF-0026 refuser-stratum households that ran out of hearth-care in the home polity. These vectors converge on Brinewick and intersect with the existing refugees-from-sealed-quarters precarious stratum without forming a new welfare category (Rule 3 firewall; ABSORBED into the existing stratum per the CF-0034 / CF-0037 absorption template). The migrant-churn texture — many "chewed up and spat out" per user-stated dramatic intent — produces the canonical **coin-for-shame return idiom** (paralleling CF-0036 *"took the coin-for-service"* cadence): the migrant who walks back to the home-village tavern with worn boots, empty purse, and no story is named in third-person mourning register. A substantial stable migrant-stratum makes it (establishes Brinewick residence, takes guild placement, marries into artisan-quarter household, contributes to urban-poor-upward-mobility trickle); the churn is not universal. Population-ceiling pressure per GEOGRAPHY §Settlement Limits is acute at Brinewick's scale — ward-maintenance funding-crisis recurs when commercial-core growth collides with sealed-quarter artifact-exclusion footprint (one Brinewick sealed-quarter from Incident Wave aftermath per CF-0038 AES-3 commitment; specific quarter-name deferred to story-demand).
  - <!-- added by CF-0037 --> Stationkeeper-inheritor stratum dual-disposition (CF-0037): the family-handled waystation tradition (CF-0037) produces TWO populations with categorically distinct dispositions per Rule 3 specialness-inflation firewall — (a) **Inheritor-who-stays NAMED DISTINCTLY** as a SETTLED-RESIGNED-RESPECTABLE MIDDLE-STRATUM cohort distinct from CF-0021 failed-apprentice, CF-0024 failed-reputation-contractor, CF-0025/CF-0031 contamination-injured, CF-0028 expedition-veteran, CF-0033 dragoon-pensioner, CF-0036 silenced-contractor strata. The dramatic register lives here (kinship-frustration, resignation, resentment in AES-1 cadence applied to ordinary commerce); the cohort is comparable to "town artisans hold competence and small workshops" — middle-rank, route-anchored, inheritance-locked. Kinship-frustration is ordinary household texture, NOT precarity or welfare-record. Marriage-broker catechism *"is the stop kept in the family?"* enters the inheritance-context catechism rotation alongside CF-0031 mark-inquiry, CF-0032 placement-right-inquiry, CF-0034 raid-widow-inquiry. (b) **Inheritor-who-walks ABSORBED INTO existing precarious strata** — most into urban poor / artisan-quarter casual labor, some into CF-0024 contractor entry-tier, a few into CF-0034 endemic-banditry recruitment-feeder cohorts (now a SIXTH named source-vector for CF-0034 recruitment alongside CF-0021 sealed-quarter-contamination + CF-0031 unregistered-lineage + CF-0024 failed-reputation + CF-0026 refuser-stratum + abandoned-settlement-survivor + stationkeeper-self-exile, ABSORBED into the existing recruitment-feeder cohort per Rule 3 firewall, NOT elevated to a distinct welfare/precarity category). The walking-away cohort carries route-knowledge and stationkeeping-skills but NO portable-reputation asset (parallel to CF-0021 failed-apprentice gap), and forfeits placement-right at exile. The dual-disposition is load-bearing — absorbing the staying-inheritor would erase the dramatic register that motivates the institution; naming the walking-inheritor distinctly would specialness-inflate a cohort that structurally feeds existing precarious strata. The two-population distinction is the resolved form of the productive Systems/Economy-vs-Politics/Institution critic tension at PA-0011 Phase 6b synthesis.
  - <!-- added by CF-0036 --> Silenced-adventurer-contractor sub-stratum (CF-0036) is **ABSORBED INTO CF-0024 FAILED-REPUTATION-CONTRACTOR FEEDER** — NOT elevated to any separate welfare / precarity / widow stratum (Rule 3 specialness-inflation firewall; parallel to CF-0034 widow-of-the-raid → widow-of-the-job absorption and CF-0035 widow-of-the-hunt → widow-of-the-job absorption). The silenced-contractor is ALIVE (not a widow); the bitterness-register qualitatively damages reputation without creating an income-stream gap requiring new welfare category. Concrete pattern: contractor who witnesses cannibal-case evidence and is pressured into silence through civic-watch intake-interview, charter-restriction on public-speech, and penal-consequence-for-breach retains his contract-pension from the job-that-became-sealed (SOC-3 coin-contract sacredness preserved; the job was performed) but drinks alone in the winter-rota, drifts into the failed-reputation feeder (CF-0024), and may be recruited by sectarian-doctrine movements or drift into CF-0034 bandit-recruitment at the margin under sectarian-patronage pressure. Reform-current principled-refuser clergy (CF-0026 CH-0010 charter-defense wing) minister to silenced-contractor households under fallout-ministry register paralleling CF-0025/CF-0034 specialties; civic-restraint wing ministers to cannibal-camp survivor households. Kin-of-the-silenced register enters marriage-broker catechism in adopting-polity exposed-district households (*"does your kin come back and speak?"*) — a minor idiom-extension paralleling the CF-0031 *"did your grandfather take the mark?"* and CF-0034 *"did your kin come back from the raid?"* questions. NOT a new civic-registry welfare category; civic-registry has no silenced-contractor ledger-mark analog (the sealed-docket procedure preserves the silence at the evidentiary level, not the welfare level).
  - <!-- added by CF-0046 --> **Drylands obligation-denominated stratification register** (CF-0046 / CF-0047) — drylands regional wealth-stratification is **obligation-denominated** at the corridor-internal scale (hospitality-due held, water-share-balanced in the keeping-book, supply-run reciprocity owed across generations) rather than coin-denominated. A mid-stratum well-keeper household whose keeping-book carries substantial obligation-capital (inter-generational hospitality-due from caravan-master rotation and village-supply networks) is wealthier than a comparable mid-stratum canal-heartland artisan whose workshop carries coin-wealth equivalent — yet the well-keeper's visible-coin-wealth on any ordinary-day measure is modest by heartland comparison. This is NOT a CF-0031-style positive/negative signaling value-store; it is a DIFFERENT ACCOUNTING LEDGER on which drylands stratification is plotted. **Visible-coin-wealth misreads of drylands stratification** are ordinary heartland-migrant misperception and occasionally produce magistrate-court character-evidence confusion when a drylands-origin migrant's financial situation is assessed under heartland coin-denomination default (the well-keeper's cousin with a thin purse but deep well-stop reputation is not poor by drylands measure; the heartland magistrate's clerk does not see the keeping-book). Cross-generation obligation-capital consolidates at well-keeper lineages and caravan-master reputation-network hubs — a parallel concentration pattern to CF-0032 subsection-placement-right assortative sorting and CF-0037 waystation-placement-right inheritance compounding (fourth parallel asset-class concentration register now on the inequality-pattern map). Rule 3 firewall: drylands obligation-denominated stratification is NOT a new civic-registry welfare category and has NO civic-registry ledger-mark analog (drylands institutional thinness per CF-0046 precludes civic subsidiary-record capability for obligation-accounting); the keeping-book IS the ledger, household-held, customary-only. Drought-cycle affects asset-value symmetrically across the stratification: drought-year obligation-capital depreciates (hospitality-due deferred; supply-run flow thins; caravan-master rotation-authority narrows); drought-break concentrates obligation-capital (deferred obligations consolidate; the keeping-book is read aloud). The stratification is stable across generations under normal drought-cycle operation; catastrophic drought (multi-cycle failure per CF-0046 Breakage Points extension below) produces lineage-collapse that cannot be ledger-backed replaced — obligation-capital evaporates with the keeping-book's closing, unlike coin-capital which survives its holder's death as transferable asset.

