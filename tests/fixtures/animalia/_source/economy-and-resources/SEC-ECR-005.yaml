id: SEC-ECR-005
file_class: ECONOMY_AND_RESOURCES
order: 5
heading: Value Stores
heading_level: 2
body: |-
  - **Land with title** — primary durable wealth; civic registry confirms.
  - **Coin and bullion** — held in households, guildhalls, temple vaults; theft risk is real.
  - **Livestock** — durable, productive, partible at need.
  - **Tools and workshop equipment** — held by craft households; valued and inheritable.
  - **Charters and licenses** — guild charters, broker licenses, extractor permits — valuable rights, sometimes traded informally.
  - **Reputation** — coin-contract sacredness (SOC-3) makes reputation a tangible asset; oath-breakers find work hard to come by.
  - <!-- added by CF-0023 --> **Grimoire fragments** — concealable, high-density, partible value store; superior to livestock for fugitive wealth; price thinness and volatility make them poor for ordinary saving; possession can carry capital penalty in punitive polities.
  - <!-- added by CF-0024 --> **Portable contractor reputation** — reputable adventurer-contractors hold a value-store object qualitatively different from guild-seal credentialing: reputation travels inter-polity via the bardic circuit, whereas guild-seal reputation is polity-bounded. Portable reputation is slow to build, expensive to replace after breach, and tradeable informally (a reputable veteran's introduction opens doors across polities that her letters-patent would not). Contracted bards (CF-0017 extension per CF-0024) materially shape whose reputation travels.
  - <!-- added by CF-0028 --> **Expedition-syndicate share** — capital-pooling patron-syndicates issue shares against expedition outcomes; shares are volatile (ranging from total loss on squad-wipe to retirement-level payouts on magical-find expeditions), partible, and informally tradeable among syndicate members. This is shadow-equity without civic-registry recognition — no SOC-3 enforcement mechanism, high fraud exposure, and no chartered wage-table recognition. The volatility erodes the CF-0028 wealth-gate over time as syndication lowers per-patron capital threshold. Some chartered-expedition-venture polities have begun registering syndicate-shares as a regulatory experiment; most have not.
  - <!-- added by CF-0028 --> **Ruin-cartography** — concealable, killing-enforced, high-density fugitive-wealth analog to CF-0023 grimoire fragments. Valuation is thin and volatile; possession is dangerous (killing-by-rival enforcement primary, civic prosecution secondary). Bardic-oral deniability operates as a workaround parallel to CF-0023.
  - <!-- added by CF-0043 --> **Ash-Seal-trained specialist portable reputation** (CF-0043) — TWELFTH value-store; non-polity-bounded fee-for-service signaling analogous to CF-0024 portable contractor reputation but with higher authentication-specialist cachet (Ash-Seal's Brinewick training is recognized across heartland chartered-extraction-guild containment-wright rosters; the "came out of Brinewick" idiom anchors upper-silver fee-for-service rates). Slow to build (typical Ash-Seal career arc before defection is 5-15 years), expensive to replace after breach, and tradeable informally via chartered-extraction-guild labor-market introductions. Distinct from CF-0024 portable contractor reputation (which covers hazard-labor skills) in two ways: Ash-Seal-trained signaling is containment-craft-empirical-expertise-specific (narrower skill-domain), and it is TRADE-SECRET-COVENANT-CONSTRAINED (defector may publish craft-know-how under journeyman-migration register but may NOT publish specific procedural-protocol text / trade-secret archive content under Brinewick civil-penalty risk — the asset is slightly discounted by covenant-risk compared to unencumbered portable reputation).
  - <!-- added by CF-0031 --> **Contamination-lineage ledger-mark** — a negative-signaling civic-registry record held by adopting-polity extractor, containment-wright, and CF-0025 lineages. Not a conventional value-store: the mark is simultaneously a pension-eligibility asset (future supplement income coordinated through chartered extraction-guilds) and a marriage-market liability (three-generation stigma across the artisan-quarter register). Non-tradeable and non-partible between households, but durable (scrivener's ink across three administrative generations) and hereditary-visible. A registered household carries predictable future supplement income that ledger-credit lenders in some polities have begun pricing against — an emergent informal foreclosure-adjacent market that the charter-clause welfare-purpose protection does not cleanly cover. The mark is a value-store of novel type: an asset whose negative-signaling-component (stigma) and positive-signaling-component (pension-eligibility) cannot be unbundled without household-level dispute.
  - <!-- added by CF-0032 --> **Oversize-saddlery subsection-apprenticeship placement-right** (CF-0032) — an informal, cross-polity-reciprocal, heritable placement-right distinct from Charters and Licenses (which are polity-bounded and civic-registered). Placement is negotiable in inheritance and dowry among Cluster C families in ancestral polities; partible across heirs when multiple claim successor status at a master-craftsman's death (generating inheritance-docket pressure); informally tradeable as a daughter's or son's introduction-letter to a reciprocal-polity master. Value derives from bespoke-pricing commission-stream access and cross-polity mobility. Assortative sorting within placement-holder lineages compounds over three generations into a placement-right concentration pattern (Rule 3 specialness-inflation pressure; mirrors the CF-0031 registered-lineage intermarriage pattern but with positive rather than negative signaling). Non-civic-registry-backed; SOC-3 coin-contract sacredness applies to commission-contracts but not to placement-right transfers themselves.
  - <!-- added by CF-0034 --> **Ransom-broker matchmaking relationships** (CF-0034) — an unchartered, reputationally-accrued, informally-tradeable value-store held by operators who facilitate ransom-negotiation and captive-recovery transactions between bandit-held-captives' kin and bandit-camp intermediaries. Parallels CF-0024 contract-matchmaker broker role but with categorical distinction: SOC-3 coin-contract sacredness does NOT apply (ransom brokerage sits structurally outside the coin-contract order because the transaction counterparts include a non-consenting captive and a criminal captor); enforcement is reputational and informal; some polities have begun debating ransom-broker chartering per OPEN_QUESTIONS, most have not. Value derives from cross-corridor relationship-capital (knowing which bandit-camps accept proxy negotiation, which fences will vouch for proof-of-life, which kin can deliver coin without civic-watch interference); non-civic-registry-backed; highly volatile; sometimes absorbed into the same CF-0024 contract-matchmaker operatives who already serve the five-product-line canal-corridor illegitimate-service rail (sixth informal service on the same roster).
  - <!-- added by CF-0033 --> **Dragoon charter-backed pension** (CF-0033) — a pensionable-service civic-treasury asset held by retired dragoons in adopting polities. Distinct from guild pension (chartered-guild-internal) and from civic-registry CF-0031 ledger-mark pension supplement (welfare-purpose registry subsidiary): the dragoon pension is CHARTERED CIVIC SERVICE PAYOUT, not welfare-supplement or guild-internal benefit. Non-tradeable; non-heritable in the pension-capital sense (but widow and minor-dependent supplement follows civic-treasury schedule, partial coverage only); hereditary-visible in the sense that "retired-dragoon household" carries positive social signaling in adopting polities (reform-aligned prestige among civic-adjacent households; charter-court-litigious reputation among refuser-aligned households). Pension provides predictable retirement income that creates preferred-marriage tier among hazard-labor families — dragoon veterans' marriage-market position is notably higher than CF-0024 contractor veterans, CF-0025 occult-fallout specialist veterans, or CF-0028 expedition veterans without charter-pension coverage. Pension reform-current clergy (CF-0026 alignment) campaign uses the dragoon pension-differential as wedge to argue for extended charter-pension coverage to other contractor-widow categories, paralleling the CF-0031 welfare-registry reform dynamic.
  - <!-- added by CF-0037 --> **Waystation tenancy / placement-right** (CF-0037) — heritable, partible-with-inheritance-dispute, informally-tradeable but FIXED-PHYSICAL-INFRASTRUCTURE-LOCKED (cannot be moved like CF-0032 placement-right or CF-0031 ledger-mark). Civic-registry-backed where chartered-polity tenancy recognizes the station; clan-elder-sanctioned customary in highland; estate-steward-ledger entry-class on noble-estate land. Partible at multi-heir succession (generates inheritance-docket pressure paralleling CF-0032 placement-right inheritance). SOC-3 coin-contract sacredness applies to traveler-service contracts but NOT to placement-right transfers themselves (paralleling CF-0032). Forfeited at inheritor self-exile (the walking-away child carries route-knowledge and stationkeeping-skills but NO retained placement-right). Distinct from Land-with-title (more durable, less liquid; the title attaches to land while the placement-right attaches to the route-anchored enterprise on the land); distinct from Charters/Licenses (polity-bounded; waystation placement is route-bounded and carries through estate-tenant lease where applicable); distinct from CF-0032 oversize-saddlery placement-right (skill-credential, mobile across reciprocal polities) and from CF-0031 contamination-lineage ledger-mark (welfare/contamination administrative record, body-state-attached). The waystation placement-right is the THIRD multi-generational tenancy/asset-class now in the register; intra-class assortative-marriage and dowry-negotiation case law accumulates as latent-burden per CH-0012.
  - <!-- added by CF-0047 --> **Well-stop tenancy / placement-right** (CF-0047) — heritable, partible-with-inheritance-dispute, informally-tradeable, FIXED-WATER-NODE-ANCHORED-PHYSICAL-INFRASTRUCTURE-LOCKED. **FOURTH multi-generational tenancy / asset-class now in the register** joining CF-0031 contamination-lineage ledger-mark, CF-0032 subsection placement-right, and CF-0037 waystation placement-right. Categorically distinct from CF-0037 waystation placement-right along three load-bearing axes: (i) **anchor-type** — well-stop is water-node-anchored (the well IS the asset); waystation is route-anchored (the road IS the asset); water-node anchoring makes the well-stop non-relocatable and drought-volatile in asset-value across cycles, whereas route-anchored waystation is trade-flow-volatile across canal-extension and seasonal-pass cycles; (ii) **civic backing** — well-stop placement-right is CUSTOMARY-NOT-CIVIC-REGISTRY-BACKED (drylands institutional thinness per CF-0046 substrate precludes civic-registry subsidiary-record capability for well-stop tenancy); waystation placement-right is civic-registry-backed in chartered heartland polities with clan-elder / estate-steward alternatives elsewhere; (iii) **regional presence** — well-stop is DRYLANDS-PRESENT-ONLY (CF-0046 geographic substrate); waystation is heartland/highland/mountain-east-present and drylands-STRUCTURALLY-ABSENT (CF-0037 §(d) stabilizer preserved per CH-0018 modification_history). The water-node vs road-rest-node firewall is load-bearing: conflating the two would silently retcon CF-0037 drylands structural-absence into a universalized family-station tradition, violating Rule 6. Asset-value volatility: drought-cycle pulse produces drought-year asset-value depression (caravans reroute, traffic thins, reciprocity-primary revenue compresses) and drought-break asset-value spike (caravan flow restores, keeping-book owed-obligations concentrate — though SOC-3 coin-contract sacredness preserves the honoring at SOC-3 contact surface per CH-0018 INVARIANTS clarification); asset inheritance disputes are handled under caravan-master corridor-internal customary-adjudication per CF-0046 (NOT civic-magistrate reach unless the dispute migrates to chartered-polity court at the heartland border). Partible at multi-heir succession (generates inheritance-docket pressure paralleling CF-0032 and CF-0037 precedents). Forfeited at inheritor self-exile (the walking-away child carries route-knowledge, station-log-keeping skill, and partial verse-repertoire but NO retained placement-right; parallel to CF-0037 walking-away gap). Inter-corridor caravan-master reputation-boycott (CF-0046 §caravan-master adjudication stabilizer) is the structural brake against well-keeper-lineage drought-year rent-extraction: a lineage that prices drought-year water as pure coin-commerce outside customary hospitality protocol loses the well-stop at the caravan-master-network level (rotation stops routing through the well-stop; the keeping-book closes on that lineage across the corridor), which in turn collapses asset-value to near-zero. Intra-class assortative-marriage and dowry-negotiation case law accumulates as latent-burden paralleling CH-0012 CF-0037 pattern (now a FOURTH parallel latent-burden on the asset-class register).
  - <!-- added by CF-0042 --> **Chartered safe-class artifact (status-display)** (CF-0042) — declared-inventory artifact held by elite households (noble-estate, wealthy-merchant, chartered-guild-master, civic-registry bureau-ornamental holdings), displayed at guest-receptions under ward-inspection seal. Value: provenance-authentication-dependent (eighth authentication-cartel vector per Trade Flows); liquidity thin (chartered-broker-mediated sales; per-polity declared-inventory transfer discipline); partible across heirs under estate inheritance (dowager-gossip circuit tracks the transfers). Bodyguard-commission expense is the principal offsetting cost (CF-0024 eleventh-claim sub-specialty). Theft-risk is continuously priced via insurance and retainer structures; assassination-risk on notable owners is recognized magistrate-docket predicate (CF-0042 Law extension). NOT a new asset-class tier per Rule 3 firewall — absorbed into the existing asset register as chartered safe-class artifact sub-category. Polity-asymmetric declared-inventory registration stringency (FIFTH parallel sixth-axis watch-item) affects asset liquidity across polity lines: a declared-inventory item from a punitive-registration polity sells at discount in a permissive-registration polity and vice-versa.

  - <!-- added by CF-0035 --> **Legendary-beast trophy** (CF-0035) — a curiosity-collector asset held primarily by noble estates, wealthy civic-advisory households, and (in polities where legal) cabinet-of-curiosities merchants. Value derives from bounty-clerk-certified provenance and species-corridor particularity (proper-noun trophies — "the six-limbed boar the Erren brothers brought back from the Selk drainage" — command premium over unnamed trophies). Distinct from natural-history specimen (mundane predator-trophy) and from ruin-artifact (CF-0027/CF-0028 funder-primacy framework governed); the trophy IS the beast's remains, not an object recovered from the beast, and is subject to contamination-adjacency handling rather than extraction-broker channels. Thin authentication market with cartel-formation pressure compounding (sixth product-line per Trade Flows extension). Polity-asymmetric legality: trophy-legal in some polities under bounty-clerk certification, contamination-prosecuted in others, ambiguous in most (handled via caravan-master trophy-cargo refusal register and civic-refusal-of-uncertified-import). NOT a new asset-class tier per Rule 3 firewall; absorbed into the existing curiosity-collector-asset category alongside mundane hunt-trophy. Dowager-gossip circuit tracks which estates display verified trophies (civic-tact, dowager-acceptable) and which display unverified or cousin-lineage-taboo-breaching trophies (charter-risk-adjacent, dowager-censure). Carnivore-folk progenitor-cult households with predator-reverence traditions refuse cousin-lineage trophy display even when certified (PEOPLES_AND_SPECIES CF-0035 extension).
  - <!-- added by CF-0044 --> **Drylands verse-competence (hospitality-prestige register)** (CF-0044) — NOT a conventional value-store, and NOT a new addition to the existing value-store list in the market-structure sense: drylander verse-competence reputation (bards, caravan-masters, well-keepers with deep hospitality-verse repertoires) is drylands-LOCAL cultural-prestige register only. Evaporates at the drylands-heartland border; CF-0024 portable-contractor-reputation mechanism does NOT pick it up (the mechanism operates on hazard-labor-skill reputation signaling, not on cultural-register signaling). Non-tradeable; non-partible; non-heritable in the asset sense (skill passes through apprenticeship-observation cadence per EVERYDAY_LIFE §(d) CF-0044 Childrearing extension, but no "verse-repertoire-as-asset" transfer convention exists). This entry is logged explicitly to DOCUMENT THE NEGATIVE — Rule 3 specialness-inflation firewall requires that verse-competence NOT be silently absorbed into the existing portable-contractor-reputation or Charters-and-Licenses or Ash-Seal-trained-portable-reputation categories; it is a cultural-prestige register that is adjacent to but categorically distinct from those value-stores. Forbidden registers: "verse-repertoire-as-dowry-asset," "verse-keeper-lineage-placement-right," "verse-competence as civic-registry subsidiary-record category." The verse-convention is ordinary cultural-linguistic texture, not an economic asset-class.

