id: SEC-ECR-004
file_class: ECONOMY_AND_RESOURCES
order: 4
heading: Trade Flows
heading_level: 2
body: |-
  - **Canal heartland → coast**: grain, livestock, timber, ceramic ware, woven goods, salt-cured fish.
  - **Coast → heartland**: dried sea-fish, kelp products, foreign cloth, foreign cargoes from coastal trade.
  - **Mountain east → heartland**: copper, iron, silver, wool, distilled spirits.
  - **Drylands south → heartland**: barley (in surplus years), lentils, dates, leather, fermented dairy, certain dyes. <!-- added by CF-0046 --> The commercial flow is substantially **reciprocity-primary at corridor-internal hops** (in-kind exchange at well-stops and caravanserai; hospitality-due balanced in well-keeper keeping-books; supply-run in-kind reciprocity within the drylands corridor proper) and **coin-at-heartland-border** (copper and silver enter the exchange at market-caravan borders where drylands caravans complete northward flow; heartland grain, ceramic ware, chartered-manufactured goods, and silver return southward). SOC-3 coin-contract sacredness holds at the coin-at-edges contact surface per CH-0018 INVARIANTS clarification; reciprocity obligations are customary-reputation-enforced within the corridor, NOT a separate sacred tier. The **coin-at-edges heartland cross-subsidy** is the monetary anchor preventing collapse into pure barter: heartland coin inflow at the market-caravan border enables well-keepers, caravan-masters, and supply-village economies to sustain limited coin-transactions for practical needs (containment-grade equipment, specialized tools, iron, imported medicine) without domestic coin-production capacity; this flow is **structurally load-bearing** for the corridor's reciprocity-primary equilibrium and should be named in any commerce-cycle analysis of the drylands. NOT on any illegitimate-service rail (Rule 3 firewall per CH-0018 INSTITUTIONS §Trade/Guilds reaffirmation); the drylands corridor institutional complex itself adds no new authentication-cartel product-line; station-log custody is household-held and non-authenticable per CH-0018 INSTITUTIONS §Recordkeeping M-9 firewall.
  - **Fenlands west → heartland**: peat, smoked eel, waterfowl, certain medicinal herbs.
  - **Heartland → all peripheries**: chartered manufactured goods, registered artifacts (legal trade), tools, books and fragments under license.
  - <!-- added by CF-0038 --> **Canal-confluence convergence hub** (CF-0038 Brinewick): Brinewick as named commercial clearinghouse at the trunk-canal confluence concentrates the heartland canal spine's highest throughput — in an ordinary week, canal-clearing volume exceeds three heartland market-towns' fair-season volume combined (pragmatic-scale commitment per CF-0038 Phase 6b Theme/Tone critic finding; NOT "#1 in the world" ordinal). Grain, cured fish, bulk copper, ceramic ware, woven goods, and (under charter license) registered artifact-adjacent materials move through Brinewick lock-clearing at exemplar intensity. Primacy stabilized by four compounding mechanisms per CF-0038: canal-geometry singularity (the trunk-confluence geography is not replicable in adjacent polities at scale), path-dependence of Charter-Era-depth accumulated commercial capital, migration-gravity flywheel (labor-pool self-reinforces), and chartered-broker bench density (authentication-specialist concentration compounds across the seven-product-line canal-corridor illegitimate-service rail). Brinewick's trunk-canal-count specifics and river-mouth-connection details deferred per OPEN_QUESTIONS §Brinewick Trunk-Canal-Count Specifics.

  - <!-- added by CF-0037 --> **Waystation-supply-run bidirectional micro-flow** (CF-0037): in heartland connector-route villages, highland clan-border settlements, and mountain-east valley-pass approach-towns, family-handled waystations (CF-0037) maintain a small-but-steady bidirectional supply-flow with their feeder settlement — settlement → waystation: grain, ale, fodder, candles, tack-repair materials, occasional bulk-cargo for resupply caravan stops; waystation → settlement: modest cash flow from traveler-service revenue, traveler gossip and posted-contract intake (informal hire-relay paralleling CF-0024 tavern-board function but at lower volume and in family-vouch register), occasional bardic-circuit hosting that carries narrative-custody back to settlement-tavern circuit. AUGMENTS rather than displaces existing market-feeder networks; in heartland connects canal-town markets to overland-trunk traveler infrastructure that canal-bound trade-flows do not directly serve. Charter-inn proprietors in canal-towns occasionally invoke charter-monopoly framing against waystation revenue but no chartered polity has upheld the claim — the geometry is structurally cooperative (chartered inns serve canal-bound traveler stops; family waystations serve overland-connector traveler stops; markets are complementary).
  - **Black market overlay**: unregistered artifacts, forbidden fragments, contraband contained-but-unregistered cargo. <!-- added by CF-0021 --> Operational artifact-creation grimoires (CF-0023), modern crafted artifacts (CF-0021), and (rarely) diverted vessel-preparation knowledge from defected guild researchers. Polity-asymmetric criminalization (accept/tolerate/fine/jail) drives canal-corridor arbitrage: crafters and grimoire-fragments move from punitive polities toward tolerant ones; finished crafted artifacts move the other direction toward higher-priced markets. <!-- added by CF-0028 --> Ruin-cartography and entrance-knowledge circulate as a distinct lethal-contraband subcategory (CF-0019 qualification CH-0004); enforcement is primarily killing-by-rival. Non-magical ruin treasure (precious metals, Maker-Age pottery, inscribed shards) flows in LEGAL channels under funder-title after broker processing — this is a new legitimate trade-flow category added by expedition activity. Magical ruin-finds flow through the chartered-broker purchase channel (CF-0030 funder-primacy mechanism) in tolerant polities; diverted magical ruin-finds add to the existing black-market overlay in punitive polities and under funder-to-funder arbitrage. <!-- added by CF-0031 --> Registry-scrubber underground services emerge in polities that punish registry-evasion or where adopting-polity emigrants seek to scrub a household's ledger-mark before cross-border settlement (CF-0031). Scrubbers share canal-corridor transit infrastructure, unchartered broker matchmakers (often the same CF-0024 operatives already serving grimoire and cartography streams), and customer-acquisition channels with the existing CF-0023 grimoire-corridor and CF-0028 ruin-cartography trade — this is not a separate underground but a third product-line on an existing illegitimate-service rail. The shared infrastructure lowers marginal cost of all three services and sharpens the authentication-cartel formation pressure already flagged under CF-0028 (a cartel can authenticate contamination-lineage claims on top of magical-find claims, doubling revenue footprint and compounding regulatory-capture incentive). <!-- added by CF-0033 --> Dragoon-kit counterfeit market emerges in adopting polities as a FOURTH product-line on the same canal-corridor illegitimate-service infrastructure rail: retired-dragoon uniform, crest, escutcheon, turnout-boots, and cordon-marker gear are partible, concealable, and valuable for the impersonation-of-dragoon offense (CF-0033). Counterfeit kit comes from three sources — genuine retired-dragoon disposal via unscrupulous intermediary (dragon sells his own kit under cover of "lost in service"), theft from dragoon quartermaster stores (rare but documented), and workshop-forged imitations (the growing volume-segment). Kit-counterfeit shares the CF-0023 grimoire-corridor / CF-0028 ruin-cartography / CF-0031 registry-scrubber canal-corridor transit infrastructure and the same unchartered broker matchmakers (same CF-0024 operatives serving four product-lines now). Black-market artifact brokers also re-route around dragoon-active corridors in adopting polities, concentrating artifact-trade flow through non-adopting canal segments and intensifying the existing polity-asymmetric arbitrage pattern. Authentication-cartel formation pressure compounds: a cartel that authenticates contamination-lineage claims, magical-find claims, ruin-cartography provenance, AND dragoon-kit authenticity covers four revenue streams on overlapping infrastructure, and the regulatory-capture incentive is now the strongest in the current Layer-4 stress register. <!-- added by CF-0034 --> Stolen-goods fencing from endemic bandit raids and ambushes constitutes a FIFTH product-line on the same canal-corridor illegitimate-service infrastructure rail, alongside CF-0023 grimoire, CF-0028 ruin-cartography, CF-0031 registry-scrubber, and CF-0033 dragoon-kit counterfeit. Same unchartered broker matchmakers (same CF-0024 operatives) now serve five product-lines; stolen-goods provenance-washing and loot-resale into legitimate markets is the fifth revenue stream. Ransom-cash flows through the same illegitimate-service rail for cross-border ransom-delivery, intermediary-vouching, and captive-proof-of-life transfer. Ransom-cash flow-back through fences into bandit-corridor hinterland communities distorts local prices in corridor villages where bandits spend (modest scale but recognized in herb-wife and tavern-keeper complaint registers). Authentication-cartel formation pressure compounds to five revenue streams — contamination-lineage, magical-find, ruin-cartography, dragoon-kit, AND stolen-goods-provenance-washing cover five overlapping streams on shared infrastructure, and the regulatory-capture incentive is materially intensified beyond the CF-0033 reading (five-product-line cartel is more capital-attractive than four-product-line).

  <!-- added by CF-0035 --> Legendary-beast-parts fencing — trophy-provenance-washing, uncertified-trophy transit across polity-asymmetric legality lines, and sectarian-premium buyer routing (Maker-mystic and progenitor-supremacist cult-use buyers at thin niche premium) — constitutes a SIXTH product-line on the same canal-corridor illegitimate-service infrastructure rail (CF-0023 grimoire / CF-0028 ruin-cartography / CF-0031 registry-scrubber / CF-0033 dragoon-kit / CF-0034 stolen-goods / CF-0035 beast-parts). Same unchartered broker matchmakers (same CF-0024 operatives) now serve six product-lines. Trophy-provenance authentication joins contamination-lineage, magical-find, ruin-cartography, dragoon-kit, and stolen-goods-provenance as a SIXTH authentication-cartel revenue stream on shared infrastructure; the regulatory-capture incentive is the strongest in the current Layer-4 stress register (six-product-line cartel is materially more capital-attractive than five-product-line, and overlapping-infrastructure marginal-cost reduction across all six streams compounds). Polity-asymmetric arbitrage: beast-parts trophy-legal in some polities travels to premium markets in other polities where trophy-import is tolerated; contamination-prosecution in punitive polities drives crafter-corridor parallel traffic pattern. Sectarian-buyer demand (Maker-mystic cult-use, progenitor-supremacist lineage-assertion) is thin but durable — the one market segment the CF-0035 stabilizers least contain; watched by civic magistrates in mixed polities.

  <!-- added by CF-0036 --> False-cannibal-bounty certification fraud — producing, selling, or brokering forged bounty-clerk certification for triple-premium interspecies-cannibal-band bounty claims (CF-0036) — constitutes a SEVENTH product-line on the same canal-corridor illegitimate-service infrastructure rail (CF-0023 grimoire / CF-0028 ruin-cartography / CF-0031 registry-scrubber / CF-0033 dragoon-kit / CF-0034 stolen-goods / CF-0035 beast-parts / CF-0036 cannibal-bounty-certification). Same unchartered broker matchmakers (same CF-0024 operatives) now serve SEVEN product-lines. False-cannibal certification joins contamination-lineage, magical-find, ruin-cartography, dragoon-kit, stolen-goods-provenance, and trophy-provenance as a SEVENTH authentication-cartel revenue stream on shared infrastructure; the regulatory-capture incentive reaches its strongest Layer-4 stress-register posture to date (seven-product-line cartel is materially more capital-attractive than six-product-line, and overlapping-infrastructure marginal-cost reduction across all seven streams compounds). Bounty-clerk certification discipline parallel to CF-0035 trophy-provenance is the primary authentication stabilizer (settlement-bounty-payout gated by certified chain-of-evidence: corpse-delivery OR camp-identification-testimony confirmed by two independent witnesses OR sealed-magistrate-docket exhibit-transcript); civic-watch flags certification-fraud investigation as new evidentiary category. Sectarian-supremacist-patronage buyer-segment distortion: the perverse sub-market paying PREMIUM for false-cannibal-bounty certification of INNOCENT mixed-band bandit-captains (seeking to elevate sectarian-recruited-bandit prestige via false cannibal-fringe association) is the single market segment the CF-0036 stabilizers least contain; civic magistrates in mixed polities watch closely, and reform-current principled-refuser clergy (CF-0026 charter-defense wing) campaign against this stratum as primary moral-witness focus. **Interspecies-predation information market** — silenced-contractor testimony about sealed-cannibal-cases acquires black-market value (buyer demand from reform-current clergy seeking unsealing, sectarian-supremacist recruiters seeking martyr-narrative, and rival polities seeking inter-polity scandal material); information-arbitrage vector distinct from all six prior product-lines; silence-protocol-breach penal-consequence is civic enforcement-stabilizer.

  <!-- added by CF-0044 --> **Drylands short-poetry cultural-flow annotation** (CF-0044): drylands short-poetry stranger-hospitality verse (CF-0044) is absorbed by circuit-bards (CF-0017) traversing drylands corridors and transported one-way into canal-heartland taverns as bardic-performance material — canal-heartland audiences recognize "drylands cadence" without knowing the source stranger-exchange protocol. This is a NON-COMMERCIAL cultural-flow on the same drylands → heartland geographic substrate that carries the commercial flows listed above (barley, lentils, dates, leather, fermented dairy, certain dyes), running parallel to existing cross-regional cultural-borrowing pathways (highland clan-song into canal-heartland via highland migrants; fen-marker-reed semantic register via monastic communication). Explicitly NOT a commercial product-line, NOT on any illegitimate-service rail, NOT a trade-infrastructure category. No authentication-cartel vector (verse-fragments are ephemeral performance material, not authenticable objects); no inter-polity arbitrage (verse-fragments are culturally recognized, not economically traded). Rule 3 firewall: the one-way flow does NOT produce a "drylands-absorbed-fragment-specialist" circuit-bard sub-stratum — existing CF-0017 cohort absorbs the material within the existing narrative-custody register.

