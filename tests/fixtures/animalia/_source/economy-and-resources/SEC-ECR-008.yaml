id: SEC-ECR-008
file_class: ECONOMY_AND_RESOURCES
order: 8
heading: Breakage Points (where the economy fails)
heading_level: 2
body: |-
  - **Ward breach** — closes a quarter, blocks a canal, cascades into commerce. Insurance is informal and rarely complete.
  - <!-- added by CF-0021 --> **Rogue-kiln detonation in residential quarter** (CF-0021) — adjacent row-cottages damaged or destroyed; civic fire-watch evacuates the block; ward-inspector confirms whether contamination escaped; legal disposition of the crafter (if alive) and assistants depends on polity; informal mutual-aid premiums in artisan quarters rise after such events.
  - <!-- added by CF-0024 --> **Contract-breach cascade** (CF-0024) — abandoned hazard contracts compound losses: rabid livestock left uncontained ravage further; caravan routes with sudden escort-gap yield bandit-opportunity losses; fallout incidents without responders escalate toward ward-breach. Civic registry SOC-3 enforcement tries to compensate; reputational damage to defaulters is durable; but the compounding itself is a real economic exposure in polities with thin contractor markets, in regions where posted-contract infrastructure is vestigial, or in years when winter fever or a bad harvest thins the usual veteran pool.
  - <!-- added by CF-0028 --> **Squad-wipe cascade** (CF-0028) — a full expedition lost to guardian-construction activation (CF-0029) produces concentrated household losses (dozens of contractors from a single town or region dying simultaneously), artifact-disposition chaos (recovered material left at ruin-mouth without survivors to process), civic-sealing costs (polity funds the reseal), and inheritance docket congestion (patron may have died separately; artifact-claim succession disputes back up magistrate courts). Insurance is impossible at this scale; informal mutual-aid syndicates partially absorb but cannot cover catastrophic events. Ruin-rich regions that host multiple simultaneous expedition ventures face systemic exposure.
  - <!-- added by CF-0028 --> **Inter-patron armed conflict** (CF-0028) — when two or more patron-funded expeditions contest the same ruin and escalation reaches levy mobilization, regional economic disruption follows: canal-corridor toll disputes, caravan-route interdiction, ruin-adjacent tenant displacement, and civic-watch reallocation from ordinary enforcement. The Charter-Era anti-monopoly-of-force strain is an acute economic exposure that exceeds CF-0024's noble-retinue pattern.
  - <!-- added by CF-0028 --> **Authentication-fraud market collapse** (CF-0028) — the authentication-specialist niche sits at a cartel-formation pressure point. A fraud-wave or cartel-rupture would collapse the magical-find secondary market, freezing chartered-broker disposition and patron-syndicate settlement simultaneously. Regulatory-capture risk is real.
  - <!-- added by CF-0031 --> **Registry-capture breakage** (CF-0031) — if civic-watch or contractor-vetting institutions repurpose the ledger-mark registry for surveillance uses beyond welfare-purpose, voluntary-enrollment collapses and the welfare function evaporates, leaving the stigma residual. This is a slow-rolling breakage rather than an acute one, but the equilibrium is fragile: a single well-publicized case of civic-watch misuse can trigger mass registration-purge petitions, pension-supplement delivery crises, and reform-current clergy mobilization simultaneously. The charter-clause welfare-purpose protection is continuously contested; its failure would take the pension-supplement funding-stream with it.
  - <!-- added by CF-0033 --> **Dragoon-containment funding squeeze** (CF-0033) — where a dragoon-adopting polity draws dragoon funding from the same canal-transit levy already earmarked for ward-maintenance containment upkeep (TIMELINE Layer 3), the two functions compete zero-sum. Polities that prioritize dragoon payroll may reduce containment upkeep and thereby RAISE breach frequency — the exact problem dragoons were adopted to address. Feedback loop is particularly severe in small adopting polities during buildout-phase. Funding-stream specificity (whether levy is additive, creating a new tariff tier, or displacing, reallocating from existing containment) is deferred to OPEN_QUESTIONS per-polity; where displacing, this breakage point is a structural exposure.
  - <!-- added by CF-0033 --> **Dragoon-guild jurisdictional-conflict cascade** (CF-0033) — the load-bearing perimeter/extraction boundary is preserved only by continuous guild cooperation. A single incident where a dragoon unit performs an extraction-adjacent act under perimeter cover (confiscating a black-market artifact mid-evacuation; entering a contained-artifact vicinity without chartered guild-protocol handoff) converts chartered extraction guild consent into guild opposition. Once opposition forms, the stabilizer-2 adoption-gate collapses retroactively: the polity faces guild withdrawal from ward-breach coordination, dragoon authority is contested at the next incident, mid-incident command failure produces cascade failure of the ward-breach response itself, and magistrate-court jurisdictional adjudication takes months while incidents continue. This is an acute rather than slow-rolling breakage; documented recent cases in two or three adopting heartland polities have approached this cascade without reaching full collapse.
  - <!-- added by CF-0034 --> **Bandit-corridor trade-flow disruption** (CF-0034) — endemic banditry imposes standing exposure on wildland-road, drylands-caravan, bog-causeway, mountain-pass, and highland-cold-pass routes; hazard-pay wage inflation in affected corridors, periodic rerouting, caravan-master refusals, and contractor demand spikes are recurring economic drag rather than cascade-trigger events. Under heavy recruitment-feeder cohort years (bad winter-fever, sealed-quarter dispossession, CF-0021 failed-apprentice surplus), disruption intensifies measurably and spills toward the next Breakage Point.
  - <!-- added by CF-0034 --> **Abandoned-settlement feeder cascade** (CF-0034) — in isolated / weak-charter / demographically-fragile regions where raid-and-enslave bands reach a small settlement, the subsequent abandonment can be permanent. Survivors join the existing refugees-from-sealed-quarters precarious stratum (Inequality Patterns above); some walk into outland bands (including the same band that raided them in the darker variants of the pattern); civic-response capacity is thin in these regions because settlement-hire bounty-budgets are thin — the worst-band self-suppression stabilizer is economically fragile here. The cascade is slow-rolling (multi-generation in some regions) rather than acute, but its cumulative impact on regional population-ceiling (GEOGRAPHY §Settlement Limits) is real and compounds the CF-0028 ruin-rich-region exposure for polities that carry both stressors.
  - <!-- added by CF-0034 --> **Veteran-pool multi-claim cannibalization** (CF-0034) — hunter-contractor demand competes with caravan-escort, wildlife-control, extraction-escort, dredger-escort, mercenary-band warfare, occult-fallout (CF-0025), ruin-expedition (CF-0028), and dragoon-recruitment (CF-0033) for the same CF-0024 veteran pool. Six to nine concurrent claims depending on polity; during bad-recruitment-feeder cohort years, bounty-premiums spike but so does hunter-mortality as tavern-board new-hires take hazard-loaded work at underpriced rates. The cumulative pressure is a standing exposure, not a specific cascade — but at the point where multiple Breakage Points compound simultaneously (e.g., a ward-breach wave coincident with a severe bandit-corridor season coincident with an expedition squad-wipe cluster), veteran supply fails catastrophically and several civic response streams degrade at once. <!-- added by CF-0035 --> Legendary-beast-hunt sub-specialty demand extends the multi-claim pattern by a SEVENTH to TENTH concurrent claim depending on polity; pressure compounds during wildland-corridor beast-activity seasons coincident with bandit-corridor seasons or ruin-expedition seasons.
  - <!-- added by CF-0035 --> **Contaminated-fauna zone near settlement** (CF-0035) — slow-rolling standing exposure paralleling CF-0034 bandit-corridor trade-flow disruption, at lower acuity than bandit corridors. Hazard-pay wage inflation in affected corridors; periodic livestock-loss; occasional settlement-treasury drain from repeated bounty-contract volume on the same corridor; escort-contractor premium spikes during named-beast seasons. NOT a cascade-trigger event — the beast does not raze settlements — but cumulative regional-ceiling pressure on wildland-adjacent settlements (see GEOGRAPHY §Settlement Limits compounding-driver note) is real. Under compound-Breakage years (bad winter-fever + bandit-corridor season + beast-activity + ward-breach wave), the combined labor-market pressure compounds CF-0034 exposure. Contamination-adjacency of trophy market creates a latent Breakage-Point sub-exposure: a polity-asymmetric trophy-legality hardening into incompatible-extradition postures could tip the MINOR docket status into structural sixth-axis risk (latent-burden watch per CH-0009).
  - <!-- added by CF-0033 --> **Mission-creep adoption rollback** (CF-0033) — where a dragoon corps expands scope beyond ward-breach perimeter and sealed-quarter evacuation into routine policing or external-conflict deployment, principled-refuser clergy (CF-0026) charter-court challenges generate a named scope-creep scandal. Scandal-triggered council-authority backlash can produce institutional dismantling of the dragoon corps, leaving the adopting polity with a capability-gap WORSE than pre-adoption (veteran pool depleted by dragoon service, militia tradition atrophied, contractor infrastructure hollowed-out). The rollback risk is heaviest in polities where central-council authority is narrow-based or where the refuser-clergy bloc is strong enough to force institutional dismantling but not strong enough to have blocked initial adoption. M-13 tracks the underlying institutional-contingency question as bounded-unknown; the rollback risk is one manifestation of its operational uncertainty.
  - <!-- added by CF-0037 --> **Waystation insolvency / inheritance-dispute / bandit-front conversion** (CF-0037) — three failure modes for the family-handled waystation tradition: (a) **insolvency** — corridor-season closure (mountain-east winter pass-closure, drylands-border drought rerouting, heartland canal-extension diverting traveler traffic) or trade-route reroute leaves a station insolvent, the family disperses, station fabric decays into roadside ruin (slow-rolling); (b) **multi-heir inheritance-dispute closure** — succession dispute among multiple claiming heirs closes the station mid-litigation, traveler-service gap exposes the corridor for the duration of magistrate adjudication or clan-elder mediation (slow-rolling, can extend for years where placement-right is partible across heirs); (c) **bandit-front conversion** — stationkeeper-family or inheritor self-exiles into CF-0034 banditry and the station turns to corridor-betrayal (provisioning a raid-band, signaling traveler arrival for kickback, providing ambush-staging infrastructure or information-asset for raid planning). Acute and rare; once detected, prosecuted under CF-0034 §(f) harboring-and-fencing standards with sharper-than-ordinary evidentiary register because the fronting station weaponizes ordinary commerce against the travelers it is meant to serve. Compounds CF-0034 bandit-corridor exposure where (c) materializes — a converted waystation makes the gap-stretch hazard absolute rather than merely permissive, and corridor severity rises measurably until civic-watch / hunter-contractor commission resolves the conversion. NOT a cascade-trigger event at scale (a single converted station does not propagate across corridors); standing exposure paralleling CF-0034 bandit-corridor disruption at lower base rate.
  - <!-- added by CF-0039 --> **Permanent-containment monotonic-accretion liability** (CF-0039) — CH-0014 commits Maker-Age artifact destruction-resistance. Sealed-quarter footprint in polities with accumulated Incident-Wave history grows monotonically across generations because catastrophic-class finds cannot be destroyed, only contained. Civic ward-reserve budget lines shift from cyclic-amortizable to monotonic-accretion liability; the containment-funding curve for Brinewick (CF-0038 exemplar) exceeds the pre-CH-0014 projection at compound rate. This is a SLOW-ROLLING breakage point (measured in generations, not seasons), but under compound-Breakage-year conditions (multiple ward-breach events coincident with CF-0041 Maker-buried-building strike clusters) ward-reserve funding can fail abruptly; centralization-fight advocates press hardest in the aftermath of such compound events. Compounds CF-0033 dragoon-containment-funding-squeeze and CF-0038 Brinewick compound-exposure (b) materially.
  - <!-- added by CF-0041 --> **Maker-buried-building strike-cluster funding-crisis** (CF-0041) — CH-0014 commits Maker-Age deliberate-burial. Strike-rates rise with Layer-4 canal expansion and deep-foundation work; each strike triggers multi-guild unsealing-triage protocol with ward-inspector + civic-watch + containment-wright + excavation-foreman convergence. A cluster of strikes in a single season (particularly in Brinewick-scale commerce hubs) can exhaust chartered extraction-guild inspector capacity and force emergency chartering of additional inspectors (lowering quality threshold) or delaying lower-priority inspections (raising breach risk elsewhere). Compounds existing CF-0038 Brinewick compound-exposure pattern; recovery timeline is cluster-size-dependent and can approach trunk-lock-failure recovery scale in the worst Brinewick-exemplar case.
  - <!-- added by CF-0042 --> **Authentication-cartel eighth-vector compounding** (CF-0042) — CH-0014 commits artifact-as-status-object economy. Status-display-provenance authentication demand joins the existing SEVEN authentication-cartel revenue streams (contamination-lineage / magical-find / ruin-cartography / dragoon-kit / stolen-goods-provenance / trophy-provenance / cannibal-bounty-certification) as an EIGHTH revenue stream on shared canal-corridor illegitimate-service infrastructure. Cartel-formation regulatory-capture incentive reaches the strongest Layer-4 stress-register posture to date (eight-product-line cartel is materially more capital-attractive than seven-product-line, and overlapping-infrastructure marginal-cost reduction across all eight streams compounds). Chartered-broker bench regulatory-capture at Brinewick exemplar density is acutely exposed; civic-advisory council biannual charter-audit cycle focus on this vector is confirmed. A cartel-rupture or fraud-wave on the status-display-provenance leg would collapse the declared-inventory display market simultaneously with the magical-find secondary market (CF-0028 Authentication-fraud breakage), producing a compound-Breakage magnitude beyond any single-vector fraud exposure to date.
  - <!-- added by CF-0042 --> **Assassination-cascade on artifact-broker bench** (CF-0042) — CH-0014 commits assassination-risk on notable artifact-owners in the AES-1 laborer-register cadence (the chartered-broker, guild-stamper, or extraction-contractor is the common target, NOT the "famous adventurer"). In a named Brinewick chartered-broker district with the bench's geometric concentration, a rapid series of broker assassinations (3-5 in a single season) produces bench-wide freeze on high-value artifact disposition, chartered-broker guild-retainer commission spike, migration of broker work to non-targeted polities, and civic-advisory-council emergency restructuring. Rare event — but the structural exposure is real once theft-ring specialization reaches critical mass.

  - <!-- added by CF-0036 --> **Mixed-species crew walkout** (CF-0036) — slow-rolling workplace-texture breakage, not acute. Where a canal-barge, dredger, caravan, or extraction-escort crew fails species-compatibility (foreman mix-sound judgment absent or overridden by patron cost-optimization), the crew walks mid-haul after a slur-escalation, joke-threshold breach, or labor-prejudice flashpoint. Cargo delay, escort-gap exposure, and re-hiring premium follow; hazard-pay wage inflation in thin-crew-market polities follows recurring walkout incidents. Crew-composition premium on mixed-crew hire (modest; rare explicit pricing-variable in contract, common tacit foreman-judgment) emerges as market-response stabilizer. NOT a cascade-trigger event — the walkout does not propagate across corridors — but recurring walkouts in specific regional labor markets (exclusionary-settlement-adjacent, supremacist-doctrine-recruited, silenced-contractor-concentrated) compound the CF-0034 bandit-corridor trade-flow disruption and CF-0035 beast-corridor exposure by thinning the CF-0024 veteran pool responsiveness. Single-species-labor non-catchment arbitrage: employers seeking to avoid charter-mandated multispecies integration route contracts through exclusionary-settlement intermediaries, pressing single-species-enclave labor at below-mixed-market rates; regulatory-capture vector into SOC-1 firewall that civic-charter audit is expected to catch and that reform-current clergy (CF-0026 CH-0010) charter-defense wing campaigns against. **Silenced-contractor information-arbitrage vector**: silenced-contractor testimony about sealed-cannibal-cases acquires black-market value (buyer demand from reform-current clergy seeking unsealing, sectarian-supremacist recruiters seeking martyr-narrative, rival polities seeking inter-polity scandal material); silence-protocol-breach penal-consequence is civic enforcement-stabilizer but is not absolute.
  - <!-- added by CF-0043 --> **Ash-Seal-backchannel-cascade (commercial corruption)** (CF-0043) — slow-rolling Brinewick-specific Breakage-Points vector: Ash-Seal's commercial-company practice of selling safe-class / moderate-tier declared-inventory artifacts discreetly to wealthy Brinewick parties (estate-dowagers, civic-council members acting in private capacity) in contravention of official hold-for-study / disposal mandate accrues magistrate-docket corruption-prosecution caseload over years; a sufficiently exposed leak can trigger charter-audit crisis, civic-advisory restructuring, AND authentication-cartel rupture simultaneously (compound-Breakage vector beyond the (a)+(b)+(d) Brinewick canonical-planning envelope; reaches the compound intensity of Brinewick (c) estate-scandal cascade and may couple with it). **CF-0038 C6 firewall preserved**: backchannel is COMMERCIAL CORRUPTION targeting Ash-Seal personnel and existing canal-warden backchannel pattern, NOT civic-watch corruption — ward-inspector integrity under CAU-3/SOC-4 is UNAFFECTED. **Catastrophic-tier NEVER flows through backchannel** — company concordat restricts backchannel to safe-class / moderate-tier only; catastrophic-tier routes to civic sealed-quarter (Ash-Seal-billed per-artifact); M-2 state-security-concealment specific-named-incident firewall preserved (diffuse-rumor register on commercial corruption is distinct from M-2 rumor register on state-security-incident concealment). Enforcement stabilizer: magistrate-docket prosecution, charter-audit-cycle reform-current clergy (CF-0026) pressure, reform-current civic-watch investigation under warrant predicate.
  - <!-- added by CF-0043 --> **Ash-Seal monopoly-rupture cascade** (CF-0043) — slow-rolling Brinewick-specific Breakage-Points vector: massed defector-exit (a veteran-cohort defection wave following company-internal crisis, charter-audit-scandal rupture, or compound event with Brinewick (c) estate-scandal cascade) or civic charter-revocation (following substantial Ash-Seal-backchannel-cascade exposure) produces multi-year containment-capacity gap in Brinewick; chartered-extraction-guild containment-wright bench (currently stunted per Brinewick-specific bifurcation per INSTITUTIONS §Trade/Guilds subtype CH-0015) cannot absorb the gap at short timescale — Brinewick in-guild remainder containment-wright roster is relatively thin compared to other heartland polities, and capacity recovery requires generational relearning of containment-wright roster through guild apprenticeship. Interim coverage options are poor: emergency-importing chartered-containment-wright masters from other heartland polities (Mossdown, Havenreach, etc.) requires cross-polity guild-concurrence and generates inter-polity-guild politics; re-chartering a successor non-guild institution faces century-plus precedent-lock problem. Ward-breach severity rises during the gap (CF-0038 (b) commercial-core ward-breach anxiety deepens materially). Compounds CF-0038 (a)+(b)+(c)+(d) quadruple-Breakage scenario; addition of (e) Ash-Seal-rupture to the canonical concurrent-activation envelope is a new worst-case Brinewick contingency-planning expansion.
  - <!-- added by CF-0043 --> **Defector-specialist wage-compression heartland-wide** (CF-0043) — slow-rolling Breakage-Points vector on chartered-containment-wright labor markets OUTSIDE Brinewick: Ash-Seal-trained defector-specialists commanding upper-silver fee-for-service rates in chartered-extraction-guild roster commissions across Mossdown, Havenreach, and other heartland polities anchor a CEILING on chartered-containment-wright wages; the chartered-wage floor elsewhere prices below Brinewick-trained portable-reputation ceiling; chartered-guild master-craft progression in containment-wright track is materially DEVALUED by the wage-compression — fewer apprentices complete chartered master-rank progression in heartland polities exposed to high defector-consultant traffic, preferring to take Brinewick-roster positions OR to seek defector-consultant status themselves via Ash-Seal apprenticeship migration. The wage-compression is slow-rolling (measured in generational chartered-guild apprenticeship pipelines, not acute crisis); compounds CF-0031 marriage-market stigma pressure on chartered-containment-wright families (pension supplement reduced-value relative to defector-consultant fee-for-service; assortative-sorting pattern per CF-0033 CH-0007 parallel applies). Regulatory stabilizer: chartered-extraction-guild charter-audit adjustments, reform-current clergy (CF-0026) wage-floor advocacy, civic-registry chartered-wage-minimum statutes in some heartland polities.
  - <!-- added by CF-0046 --> **Drylands well-lineage failure / drought-corridor collapse** (CF-0046 / CF-0047) — acute-to-slow-rolling Breakage-Points vector specific to the drylands caravan-corridor institutional-cultural complex. Three failure modes: (a) **Well-lineage failure** — a well-keeper lineage extinction (no inheritor qualified; no inheritor available; multi-heir dispute unresolved at caravan-master-network adjudication; a walked-the-well exile with no sibling-return) leaves a corridor-node well-stop unstaffed; caravan-rotation must reroute or short-hold; water-pressure at neighbor well-stops rises measurably; multi-lineage rotation-disruption compounds if several adjacent well-stops face simultaneous succession-crisis. The failure mode is slow-rolling in normal operation (lineages tend to produce inheritors across generations) but acute when compounded with drought-cycle rotation-compression or bandit-corridor pressure. Unlike CF-0037 waystation-insolvency (where the road-rest function is substitutable by alternative inn-supply), well-stop function is **water-non-substitutable** — there is no alternative well-node, and corridor-rerouting may add days to a caravan-rotation or require altering the entire trunk route across a drought cycle. (b) **Drought-corridor collapse** — catastrophic multi-cycle drought (two or three compounded drought-years in sequence) produces corridor-wide traffic collapse, cistern-depletion cascade, well-stop abandonment-pressure, caravan-rotation regional-reroute or dissolution, and supply-village insolvency. This is the drylands analog of heartland canal-extension displacement or highland cold-pass failure, but at regional scale and without civic-institutional response capacity (drylands institutional thinness per CF-0046 leaves the response to caravan-master reputation-network, well-keeper customary-authority, and village-level mutual aid; no chartered polity can mobilize treasury or dragoon-equivalent intervention at drylands scale). Under extreme multi-cycle drought, **regional-ceiling pressure on drylands caravan-polity population** approaches collapse — supply-villages empty, caravan-rotation collapses, well-stops abandon, and displaced drylanders walk north into heartland canal-polity refugee-migration per existing refugees-from-sealed-quarters precarious-stratum (Inequality Patterns above); the refugee wave is DISTINCT from canal-heartland refugees-from-sealed-quarters (different source, different skills, different social signaling) but absorbed into the same urban-poor / Brinewick migrant-collector feeder per Rule 3 firewall (NOT a new precarious stratum). (c) **Caravan-master reputation-network rupture** — the multi-caravan-master reputation-boycott stabilizer (per CF-0046 §caravan-master adjudication) depends on continuous multi-master coordination; if a regional cartel of caravan-masters colludes to sell rulings in bulk, or if a sectarian-supremacy patronage penetrates the reputation-network and redirects boycott-authority for ideological ends, the stabilizer fails and well-keeper extraction-rent becomes extractable without corridor-level counter-pressure. The rupture would produce a drylands-localized equivalent of the CF-0028 authentication-cartel regulatory-capture vector but at customary-authority rather than chartered-guild scale; NO civic-charter audit-cycle mechanism exists to surface and break such a cartel in drylands per CF-0046 institutional thinness. Recovery timeline: generational (multi-caravan-master reputation-rebuilding across successive drought-cycles; OR a single corridor-extinction event displacing the cartel into obsolescence). The three failure modes compound: a drought-corridor collapse produces concentrated well-lineage failure (no caravan-rotation → no keeper-revenue → no inheritor-placement) which weakens caravan-master reputation-network at its peak-stress moment; under compound-Breakage years (multi-cycle drought + bandit-corridor activation + CF-0034 refugee-feeder compounding from canal-heartland spillover), the drylands corridor approaches civilization-level regional-collapse risk — a slow-rolling but structurally-exposed vector. Compounds CF-0034 bandit-corridor disruption (drought corridors attract raid-and-enslave bands opportunistically) and the existing refugees-from-sealed-quarters and CF-0038 Brinewick migrant-collector patterns.
  - **Plague year** — labor shortage, debt cascade, child mortality, pension strain on guilds.
  - **Bad harvest** — heartland: tolerable; periphery: catastrophic.
  - **Canal-system disruption** — a major lock failure, a key weir collapse, or a contaminated-water incident can isolate towns and starve trade.
  - <!-- added by CF-0038 --> **Brinewick-specific compound exposure** (CF-0038): Brinewick carries four named compound-Breakage exposures at exemplar density beyond the generic canal-system-disruption register. (a) **Trunk-lock failure at a Brinewick confluence lock** is the sharpest single-event exposure — a single major trunk-lock collapse or long-duration contaminated-water incident at Brinewick's convergence geometry could collapse Brinewick's primacy and cascade the heartland commercial clearinghouse function to emergency reroute (ECONOMY §Breakage Points existing canal-system-disruption pattern applies with amplified severity). Recovery timeline: 3-7 years for full clearing-volume restoration, per heartland chartered-engineering-guild standing-estimate convention. (b) **Commercial-core ward-breach** — a live Maker-artifact surface during warehouse foundation excavation, lock-rebuild, or deep-channel dredge quarantines a commercial-core district; Brinewick's dense canal-quarter means sealed-quarter footprint collides with commercial-district continuity in ways smaller heartland cities' ward-breaches do not. (c) **Estate-scandal charter-audit cascade** — estate-outskirts "constant tug-of-war to catch each other in scandals" (CF-0038 dramatic-intent commitment) means any scandal that escalates to charter-audit crisis can expose the estate-canal-warden-backchannel regulatory-capture pattern (NOT ward-inspector — backchannels target canal-wardens only per CF-0038 institutional-decomposition firewall; CAU-3/SOC-4 ward-inspector integrity preserved); a sufficiently large cascade could trigger civic-advisory-council restructuring and authentication-cartel rupture (ECONOMY §Breakage Points existing authentication-fraud market-collapse pattern applies at compounded scale). (d) **Migrant-cohort overflow** — a severe migration-driven influx (heartland plague year; adjacent-polity sealed-quarter wave; highland clan-exile cohort; bad-winter-fever cohort arriving at canal-open) exceeding urban-poor infrastructure produces standing-exposure precarious-stratum overflow; ward-maintenance funding-stream diversion to migrant-relief deepens (b) risk via reduced containment upkeep (CF-0033 dragoon-containment-funding-squeeze parallel pattern applies with adopting-polity CF-0038 commitment). Concurrent combination of (a) + (b) + (d) is the worst-case Brinewick compound-Breakage scenario — canonical civic-contingency planning under chartered-watch convention addresses up to but not including concurrent activation of all four.
  - **Guild-charter dispute** — when extraction-guild jurisdiction is challenged by civic centralization or by competing brokerage, work stops; black market grows.
  - **Inter-polity trade war** — toll wars on canal traffic; embargo of certain goods; periodic.
  - **Seasonal closure of mountain passes** — predictable, planned for, but punishing when unusually long.

