body: |-
  Meaningful spreads exist between petty tasks and higher-risk work, per the brief. Illustrative ordering (not absolute scale):

  | Work | Pay tier |
  |---|---|
  | Petty errand, message-running, tavern fetch | bottom copper |
  | Canal-side day labor (loading, towing) | mid copper |
  | Skilled craft journey-work (tannery, smithing) | upper copper / lower silver |
  | Master-craft commissions, registry scribe work | mid silver |
  | Hired guard for inter-town caravan | upper silver |
  | Veteran-for-hire on artifact-extraction security | top silver and above |
  | Containment-wright master engagement | top silver and above, often via guild contract |
  | <!-- added by CF-0021 --> Rogue-crafter assistant (kiln-side) | high-variance: bottom copper to silver, hazard-discounted because cannot be openly negotiated; many earn nothing because their crafter died before payday |
  | <!-- added by CF-0024 --> Posted-contract adventurer work (caravan escort, wildlife, extraction-escort, dredger-escort, mercenary-band warfare) | upper copper to upper silver, risk-loaded; reputable veterans at the top, tavern-board new-hires at the bottom |
  | <!-- added by CF-0025; annotated by CF-0031 --> Occult-fallout specialist (mundane containment under civic/guild commission) | top silver and above, hazard-loaded, commission-gated; comparable to containment-wright master engagement but without the chartered pension in non-adopting polities; in adopting chartered polities, voluntary self-enrollment on the CF-0031 ledger-mark registry confers pension supplement and monastic-clinic priority |
  | <!-- added by CF-0028 --> Ruin-expedition contractor (patron-funded, multi-week, multi-professional) | high-variance share-based: partial-coin advance + expedition-share on surviving return; reputable veterans negotiate full-share positions (top silver equivalent on successful hauls, jackpot-level on magical-find expeditions), tavern-board new-hires take fractional shares with coin-advance only and absorb most of the mortality risk; most successful expeditions yield middling purses, catastrophic sites yield widows |
  | <!-- added by CF-0028 --> Scholar-contractor on ruin expedition (CF-0023 literate, authentication-specialist, or Maker-archaeology) | upper silver to top silver, fee-for-service plus expedition-share in some contracts; non-martial role, lower direct mortality but not zero |
  | <!-- added by CF-0032 --> Bespoke body-plan craft commission (oversize-saddlery subsection master engagement, CF-0032) | mid to upper silver (non-hazard, long-lead-time, commission-priced by body-plan-variant difficulty); ordinary-commission tier (tenant-cottage oversize loft-ladder, market-stall chair for aurochs-folk vendor, tradesman's reinforced work-bench) at lower end; estate-class chair-for-estate and reinforced wagon-bed work at upper end; extra-regional long-lead-time export contracts carry waiting-list premium; failed-apprentice returning with partial skills earns lower-copper rates at general wainwright/saddlery work |
  | <!-- added by CF-0033 --> Canal-corridor quarantine dragoon chartered-civic service (CF-0033) | top silver and above (pensionable-service cadence; civic-treasury pay, NOT contract retainer; hazard-stipend layered on base pay for active ward-breach turnout); comparable to chartered extraction-guild master engagement but with distinct career structure — rank-by-service rather than master-craft progression; unit-captain silver-tier with magistrate appointment; retired dragoons on charter-backed pension form a new pensioner stratum distinct from CF-0025 occult-fallout specialists, CF-0024 contractor widows, and extractor-veteran families. Buildout-phase pay in small adopting polities runs below equilibrium as veteran recruitment draws from militia and CF-0024 contractor pools; equilibrium reached at 3-7 year mark in most adopting polities. Dragoons cannot be hired out; NO private-retainer tier, NO mercenary-band option. |
  | <!-- added by CF-0034 --> Bandit-hunter posted-contract (CF-0034; named CF-0024 subtype) | upper copper to mid silver, risk-loaded, bimodal partial-parallel to CF-0028 — coin-advance plus ransom-recovery bonus clauses for live-captive retrieval; kill-bounty and head-bounty variants exist per polity with differential magistrate-case-law on no-body-no-pay precedent (OPEN_QUESTIONS deferral); reputable hunter-veterans negotiate full-share positions with retinue-size multipliers, tavern-board new-hires take fractional bounties and absorb most of the mortality risk; most successful hunts yield middling purses, raid-and-enslave-band captures yield both top-tier bounties and the hardest living-retrieval work (freed captives add to purse in some polities, reduce it in others where captive-care costs are charged against the bounty) |
  | <!-- added by CF-0035 --> Legendary-beast hunt (CF-0035; wildlife sub-specialty within CF-0024 wildlife subtype — NOT a sixth CF-0024 subtype per Rule 3) | mid-copper to upper-silver; wildlife sub-bucket discriminator separates routine-wildlife (wolf/bear/lynx predator-control, mid-copper to lower-silver, preventive) from legendary-beast-hunt (rare, higher-mortality, contamination-risk-gated, upper-silver on successful return with bounty-clerk-certified trophy; highest single payouts on corridor-named beasts that threatened multiple settlements); kill-bounty standard, body-delivery-required in most polities with trophy-provenance clause; reputable hunter-veterans negotiate corridor-named premium rates, tavern-board new-hires take fractional bounties on unverified sightings and absorb most mortality; most successful hunts yield middling purses, corridor-named multi-settlement-threat beasts yield top-tier bounties AND the hardest work (contamination exposure during pursuit, trophy-provenance disputes after). Widow-of-the-hunt absorbed into CF-0024 widow-of-the-job per Rule 3 firewall. |
  | <!-- added by CF-0037 --> Stationkeeper-child labor (waystation chores, supply-run errand, animal-tending, traveler-service; CF-0037) | bottom-copper to mid-copper, IN-KIND-DOMINANT (room and board credited against wage; eventual placement-right inheritance is the load-bearing compensation form rather than coin-wage). Chore-bound from age 6-7 (earlier than the canal-town age-ten apprentice norm per EVERYDAY_LIFE §(a)). Inheritor at journeyman-equivalent age receives no separate wage but accrues placement-right value-store (see Value Stores below). Failed-stationkeeper exile carries no portable-reputation asset (parallel to CF-0021 failed-apprentice gap; distinct from CF-0024 portable contractor reputation). NON-ANOMALOUS wage-row: low-hazard in normal operation; does NOT join the four anomalous wage-positions register (CF-0021 / CF-0024 / CF-0028 / CF-0033) — pay sits cleanly at bottom-copper without hazard-loading. The chore-from-young pattern is HOUSEHOLD-TRADE labor-onboarding (per INSTITUTIONS §Education/Apprenticeship CH-0012 extension), parallel-but-distinct from chartered apprenticeship and not a clandestine track. |
  | <!-- added by CF-0037 --> Stationkeeper-master household-enterprise income (CF-0037) | bottom-copper to upper-copper traveler-service revenue per ordinary day; occasional silver from caravan-master long-haul resupply, hunter-contractor seasonal corridor-work resupply, or estate-steward bulk supply contract; in-kind contractual payment ordinary (livestock for board, ale-cask for traveler-stop hosting). Comparable to "town artisans hold competence and small workshops" stratum (per Inequality Patterns) but route-anchored rather than market-anchored. Multi-generational placement-right value compounds across generations as durable-but-illiquid asset; estate-tenant waystations carry estate-steward-ledger renewal-cycle obligations. NON-CHARTERED household-enterprise per INSTITUTIONS §Trade/Guilds CH-0012 reaffirmation. |
  | <!-- added by CF-0043 --> Ash-Seal technician (Brinewick-specific; CF-0043) | upper silver and above (monopoly-rent-supported; civic-chartered non-guild commercial-company employment; trade-secret covenant); comparable to chartered containment-wright master engagement in pay-tier but structurally distinct (commercial employment, not guild chartered; no chartered-guild pension — CF-0031 ledger-mark supplement eligible for long-career technicians under containment-wright-specialist clause in Brinewick-adopting polity). Ash-Seal senior-technician / master-technician tier carries information-asymmetry rent premium via trade-jargon classification vocabulary the civic cannot independently evaluate. Ash-Seal in-house scrivener (trade-secret covenant clerkship) at mid-silver; ward-apprentice at upper-copper-to-lower-silver; commercial property-protection guard (perimeter-bounded) at upper-copper-to-mid-silver depending on guard-experience tier. **Defector-specialist emigration pay anchor (heartland-wide wage-compression)**: Brinewick-trained defector-specialists command upper-silver fee-for-service rates in non-Brinewick chartered-extraction-guild roster commissions, anchoring a CEILING on chartered-containment-wright wages heartland-wide — the chartered-wage floor elsewhere now prices below Brinewick-trained portable-reputation ceiling; wage-compression is slow-rolling pressure on chartered-containment-wright labor markets (see Breakage Points below). NOT a new anomalous wage-table position beyond the existing four (CF-0021 rogue-crafter, CF-0024 posted-contract adventurer, CF-0028 ruin-expedition share, CF-0033 dragoon pensionable-service) — Ash-Seal technician pay sits cleanly in the monopoly-rent-supported upper-silver tier without expedition-share volatility or pensionable-service civic-treasury structure. |
  | <!-- added by CF-0047 --> Drylands well-keeper household-enterprise income (CF-0046/CF-0047) | bottom-copper to upper-copper traveler-service revenue per ordinary day (reciprocity-primary; IN-KIND-DOMINANT with occasional coin-at-edges from caravan-rotation resupply or heartland-border market-caravan through-traffic); occasional mid-copper silver from caravan-master long-haul provisioning contract or estate-steward supply contract at drylands-border estates (rare). Comparable pay-tier to CF-0037 stationkeeper-master household-enterprise — middle-stratum route-anchored household — but structurally distinct (water-node-anchored vs road-rest-anchored; customary-NOT-civic-registry-backed per CF-0046 institutional thinness; reciprocity-primary vs traveler-service coin economy per CH-0018 ECONOMY §Trade Flows reciprocity clarification). Well-keeper inheritor-child chore-from-young at 6-7 paralleling CF-0037 (in-kind-dominant room-and-board against household revenue; placement-right inheritance as load-bearing multi-generational compensation; no separate coin wage at journeyman-equivalent age). NON-ANOMALOUS wage-row: low-hazard in normal operation; does NOT join the four anomalous wage-positions register (CF-0021 / CF-0024 / CF-0028 / CF-0033); pay sits cleanly in the household-enterprise middle-stratum without hazard-loading. Drought-cycle volatility: drought-year compression (traffic thins; keeping-book obligations deferred; coin-at-edges revenue drops measurably) and drought-break expansion (caravan flow restores; deferred obligations concentrate under reciprocity-primary customary accounting; SOC-3 coin-contract preserved at coin-at-edges contact surface per CH-0018 INVARIANTS clarification). NOT a new anomalous wage-table position per Rule 3 firewall — absorbed into existing household-enterprise middle-stratum register paralleling CF-0037 stationkeeper-master row; Rule 3 absorption applies per CF-0044 / CF-0037 precedent. |

  Hazard pay is a real and contested category. Veterans and guild specialists negotiate; ordinary laborers often do not. <!-- added by CF-0021 --> Rogue-crafter assistants occupy an anomalous position: simultaneously poor (no guild contract) and potentially high-earning (one successful artifact); the volatility is not modelled in chartered wage tables and distorts apprentice retention in ceramic and metalwork guilds. <!-- added by CF-0024 --> Adventurer-contractors occupy a parallel anomalous position: their hazard-pay is explicit and contested by profession, but their negotiation capacity varies sharply with reputation. Portable inter-polity reputation (see Value Stores) accrues slowly and makes veterans genuinely bargaining partners; tavern-board new-hires have little leverage and often accept underpriced hazard work, feeding contract-breach cascades in regions with thin contractor markets. <!-- added by CF-0044 --> Drylands hospitality-poetry verse-competence (CF-0044) adds NO new wage-table row, NO new labor-role sub-stratum, NO new anomalous wage-class — the convention is cultural-prestige register only, absorbed within existing service-work and caravan-master texture (Rule 3 specialness-inflation firewall; parallel to CF-0037 stationkeeper chore-labor and CF-0035 legendary-beast-hunt sub-specialty absorption precedents). Caravan-masters with verse-competence gain tacit foreman-judgment preference in caravanserai rotation-hire (paralleling CF-0036 mix-sound judgment), reputation-softening rather than hire-blocking — outland caravan-masters without verse take rotation with reputation-damage that amortizes over successful trips. No "drylands hospitality-bard" stratum emerges parallel to CF-0017 circuit-bards.

  <!-- added by CF-0034 --> Bandit-hunter posted-contract work occupies a named CF-0024 subtype position rather than a separate anomalous wage-class: hazard-pay is structured on bounty-recovery rather than time-rate, ransom-recovery bonus introduces a partial bimodality paralleling CF-0028 expedition-share but at lower volatility (most hunts yield middling purses; raid-and-enslave-band captures yield higher bounties with harder living-retrieval work). Labor-market cannibalization is multi-way and recognized: hunter-contract demand competes with caravan-escort, wildlife-control, extraction-escort, dredger-escort, mercenary-band warfare, occult-fallout-specialist (CF-0025), ruin-expedition (CF-0028), and (in adopting polities) dragoon-recruitment (CF-0033) for the same CF-0024 veteran pool — six to nine concurrent claims depending on polity, and the cumulative pressure is a standing Breakage-Points exposure (below). The widow-of-the-raid is **absorbed into CF-0024 widow-of-the-job** (NOT elevated to a 7th widow-stratum per Rule 3 specialness-inflation firewall); the marriage-broker catechism *"did your kin come back from the raid?"* is the in-register idiom-extension.

  <!-- added by CF-0042 --> Status-artifact bodyguard-commission posted-contract work occupies a SUB-SPECIALTY WITHIN THE CF-0024 EXTRACTION-ESCORT SUBTYPE (NOT a separate wage-class, NOT a sixth CF-0024 subtype): the extraction-escort-sub-bucket discriminator separates extraction-site security (mid-copper to lower-silver, dig-site and transit) from display-protection bodyguard work (mid-silver to upper-silver, household-retainer + transit-escort + guest-reception perimeter for declared-inventory safe-class owners; magistrate-docket-recognized assassination-risk predicate). Bodyguard-commission demand is the ELEVENTH CONCURRENT CLAIM on the CF-0024 veteran pool, compounding the cumulative CF-0034/CF-0035 Breakage-Points exposure (below). Widow-of-the-detail is **absorbed into CF-0024 widow-of-the-job** (NOT elevated to a new widow-stratum per Rule 3 firewall); marriage-broker catechism extension *"did your kin come back from the estate?"* joins the CF-0034 idiom. Distributional effect: bodyguard-commission wealth flows from status-owner household (noble-estate, wealthy-merchant, chartered-guild-master) to veteran-contractor household, routing a share of elite-artifact-display capital into ordinary-labor circulation — modestly progressive within the overall CF-0042 wealth-concentration pattern. **Authentication-cartel pressure compounds** to an eighth vector via status-display provenance verification demand (see Market Structure Risks below).

  <!-- added by CF-0035 --> Legendary-beast-hunt posted-contract work occupies a SUB-SPECIALTY WITHIN THE CF-0024 WILDLIFE SUBTYPE (NOT a separate wage-class, NOT a sixth CF-0024 subtype): the wildlife-sub-bucket discriminator separates routine-wildlife pay (mid-copper to lower-silver, preventive predator-control) from legendary-beast-hunt pay (upper-silver on successful bounty-clerk-certified return, contamination-risk-gated, corridor-named-premium on multi-settlement-threat beasts). Labor-market cannibalization extends the CF-0034 multi-claim pattern by a SEVENTH to TENTH concurrent claim depending on polity — legendary-beast-hunt demand draws from the same CF-0024 veteran pool as caravan-escort, routine-wildlife-control, extraction-escort, dredger-escort, mercenary-band warfare, CF-0025 occult-fallout, CF-0028 ruin-expedition, CF-0033 dragoon-recruitment (in adopting polities), and CF-0034 bandit-hunter. The cumulative pressure compounds the CF-0034 standing Breakage-Points exposure (below). Widow-of-the-hunt is **absorbed into CF-0024 widow-of-the-job** (NOT elevated to a 7th widow-stratum per Rule 3 firewall); marriage-broker catechism extension *"did your kin come back from the wilds?"* joins the CF-0034 idiom. Distributional effect: settlement-treasury pays the hunter-bounty from thin village treasuries while curiosity-collectors (noble-estate, civic-advisory-household) capture trophy surplus via the thin trophy-authentication market — wealth flows from rural-tenant tax base to urban curiosity-collector mediated by hunter-contractor, a mild distributional regression paralleling but distinct from the CF-0028 ruin-rich-region concentration pattern. <!-- added by CF-0028 --> Ruin-expedition contractors occupy a THIRD anomalous wage-table position: expedition-share contracts price hazard differently from both chartered wage scales and CF-0024 posted-contract hazard-pay tiers. A successful full-share position on a magical-find expedition can retire a contractor; a squad-wipe leaves family with contract-custom enforcement only (no charter framework). The "last job / retire-or-die" framing is not marketing — the expected-value distribution is genuinely bimodal, with most outcomes middling but tail-risk in both directions. Labor-market cannibalization is real: expedition demand pulls top-silver veterans from chartered ward-breach response, raising systemic ward-breach severity in polities with thin veteran pools. <!-- added by CF-0033 --> Canal-corridor quarantine dragoons occupy a FOURTH anomalous wage-table position, distinct from all three of the above: dragoon pay is pensionable-service civic-treasury salary (not contract retainer, not posted-contract hazard-pay, not expedition-share), and dragoon service cannot be refused mid-rota for higher-paying private hire. Dragoon charter-backed pension is a new pensioner asset-class that creates preferred-marriage tier among hazard-labor families in adopting polities, drawing marriageable veterans from contractor, fallout-specialist, and mercenary pools — a dowry/widow-asset bifurcation pattern parallel to CF-0032 placement-right and CF-0031 registered-lineage assortative sorting. Inter-polity labor-market effect operates in TWO directions simultaneously: within adopting polities, dragoon recruitment cannibalizes the CF-0020 militia and CF-0024 contractor pools during buildout (transition-cost), but once the institution matures it INSTITUTIONALIZES ward-breach response and reduces ad hoc contractor demand; across polity lines, adopting polities EXPORT cannibalization pressure to non-adopting polities — veterans in non-adopting polities emigrate to enlist in dragoon service, thinning the non-adopting polity's contractor pool and raising its ward-breach severity indirectly. The two-direction effect means dragoon adoption is not a simple labor-market win for the adopting polity's contractor stratum and not a simple labor-market loss for the non-adopting polity's either — the effects compound across the regional asymmetry.

  ---
extensions:
  - body: "**Corner-share / serious-share canal-heartland sub-tier within CF-0024 wage row (CF-0048)**: The existing CF-0024 wage row (\"Posted-contract adventurer work … upper copper to upper silver, risk-loaded; reputable veterans at the top, tavern-board new-hires at the bottom\") gains a NAMED REGIONAL SUB-TIER for canal-heartland chartered-plus-auxiliary informal cellar-job configurations: the corner-share / serious-share bifurcation. The chartered professional (per CF-0006 ceramic-handler / CF-0007 ward-wright / CF-0008 extraction-specialist) takes the \"serious share\"; the contractor-auxiliary performing lantern-hold / door-keep / one-fetch role-scope takes the \"corner-share\" (customary copper-to-lower-silver tier — sitting at the lower-end of the existing CF-0024 wage row, calibrated to role-scope rather than reputation). NOT a new anomalous wage-table position — the four anomalous wage-table positions (CF-0021 rogue-crafter, CF-0024 posted-contract adventurer, CF-0028 ruin-expedition share, CF-0033 dragoon pensionable-service) are unchanged; corner-share is sub-tier discriminator WITHIN CF-0024's existing posted-contract row. Rule 3 specialness-inflation firewall — parallel to CF-0034 bandit-hunter named-CF-0024-subtype-not-separate-wage-class precedent, CF-0035 legendary-beast-hunt sub-specialty-within-wildlife-subtype precedent, CF-0042 status-artifact-bodyguard sub-specialty-within-extraction-escort precedent, CF-0043 Ash-Seal property-protection sub-specialty-within-extraction-escort precedent. Income-ceiling for chartered-adjacent contractor-auxiliary tier becomes EXPLICIT and separable from sole-contractor flat-silver (CF-0024 sole-contractor configuration) and from fully-rostered chartered-extraction-team pay (CF-0008). Widow-of-the-job framework gains tier-granularity: corner-share-rank widow's household income-recovery base is lower than serious-share-rank chartered-professional's widow's; absorbed into existing widow-of-the-job register per Rule 3 firewall (parallel to CH-0008 widow-of-the-raid and CH-0009 widow-of-the-hunt absorption precedents). Sibling regional registers (highland clan-share; drylands caravan-share per CF-0046; fenland relay-summoning compensation) are stipulated as Rule 4 firewall — different vocabulary, different institutional substrate, no universal corner-share idiom across all CF-0024 regional variants. Status soft_canon (partial-support pathway; DA-0001 sole pre-figuring source for the naming)."
