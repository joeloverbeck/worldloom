id: SEC-ECR-006
file_class: ECONOMY_AND_RESOURCES
order: 6
heading: Wealth Creation
heading_level: 2
body: |-
  - **Agricultural productivity** — heartland surpluses, especially where canal logistics enable export.
  - **Craft mastery** — tannery, smithing, textiles, ceramic ware, wagon-building, boat-building, ward-inscription.
  - **Trade arbitrage** — moving goods along canal and caravan corridors; chartered merchant houses dominate, free-traders work the margins.
  - **Mineral extraction** — mountain mines under various tenancy arrangements.
  - **Artifact-related labor** — extraction, containment, neutralization, brokerage; high pay and high risk; concentrates wealth in guild masters and licensed brokers.
  - <!-- added by CF-0021 --> **Clandestine artifact crafting** (CF-0021) — high-variance, high-mortality wealth path distinct from chartered extraction; most attempts kill the crafter and assistants; the few successful crafters command premium prices for inferior-but-real artifacts; authentication specialists distinguish modern from Maker-Age work and earn fees on both sides of the market.
  - <!-- added by CF-0024 --> **Posted-contract gig labor** (CF-0024) — variable-income life path for adventurer-contractors; includes caravan escort, wildlife work, extraction/dredger-escort, mercenary-band warfare, and (for the scarce specialist subset) occult-fallout containment under commission. Reputation is portable across polities via the bardic circuit; coin-contract sacredness (SOC-3) makes oath-breakers economically unhireable. Hazard-pay asymmetry widens the gap between veteran-negotiators and ordinary laborers, and off-the-books tavern-board contracts erode the civic-registry tax base in polities that levy on ledger-credit trade.
  - <!-- added by CF-0028 --> **Patron-syndicate capital-formation** (CF-0028) — a new wealth-creation path for estate-owners, nobility, and prosperous communities: pooling capital into ruin-expedition ventures, with expected-value distribution bimodal (most expeditions middling-return; rare magical-find expeditions retirement-level; squad-wipes total loss). Chartered-broker disposition fees compound chartered-guild revenue on the processing side. Authentication-specialist fees compound on both sides of magical-find disposition. Non-magical ruin treasure (precious metals, Maker-Age pottery, inscribed shards) creates a secondary legal-trade market. The path is distinct from chartered-extraction wealth-creation (chartered-guild-master compensation for direct recovery) because the patron's coin, not extraction expertise, is the primary input.
  - <!-- added by CF-0032 --> **Oversize-saddlery subsection mastery** (CF-0032) — a region-locked Cluster-C-ancestral-polity sub-specialty within the broader Craft mastery path. Subsection masters command bespoke-commission pricing (mid-to-upper silver) on body-plan-verified fitments with guild-seal; extra-regional export contracts add a waiting-list premium but require long lead times. Cross-polity reciprocal-journey verification gates master-rank progression, producing a genuine supply-constraint rather than a chartered monopoly. Barge-deck modification work in canal-corridor ancestral polities constitutes a secondary commission stream for barge-builders. Wealth concentration is modest per-master relative to chartered-extraction guild-masters, but placement-right inheritance compounds over generations (see Value Stores); subsection-seal authentication is a minor sub-specialty with cartel-formation pressure parallel to CF-0028 authentication-specialists.
  - <!-- added by CF-0033 --> **Chartered civic perimeter-force service** (CF-0033) — a new chartered-civic wealth path available ONLY to adopting polities. Dragoon service provides predictable pensionable-service civic-treasury salary plus hazard-stipend, with retirement yielding charter-backed pension (see Value Stores). The wealth-creation mechanism is categorically distinct from existing paths: NOT agricultural productivity, NOT craft mastery, NOT trade arbitrage, NOT mineral extraction, NOT chartered artifact-labor, NOT clandestine artifact crafting, NOT posted-contract gig labor, NOT patron-syndicate capital-formation, NOT subsection mastery. It is CIVIC-CHARTERED HAZARD-WAGE WITH PENSION — the first institutional wealth-creation path in Animalia that combines state-employer structure with hazard-labor compensation. The path is not a general labor-market path; entry requires civic-registry citizenship, ward-resident status in an adopting polity, and survival of initial buildout-phase rotation. In mature adopting polities the institution becomes a stable if modestly-paid career option; in buildout-phase polities the institution cannibalizes the CF-0020 militia and CF-0024 contractor pools during its first 3-7 years. Dragoon-kit counterfeit and impersonation black-market (see Trade Flows) is a shadow wealth path attached to this institution, operating in the same canal-corridor illegitimate-service infrastructure that CF-0023 / CF-0028 / CF-0031 already use.
  - **Service work** — taverns, bardic-circuit performance, posted adult barter, transport-for-hire.
  - <!-- added by CF-0045 --> **Canal-corridor lock-night performer-income subtype** (CF-0045) — a subtype within service-work bardic-circuit performance in canal-heartland towns. Lock-night is a named performance occasion (see INSTITUTIONS §Trade/Guilds CF-0045 extension) carrying customary silver-differential pay above ordinary tavern-night rate; canal-circuit bards working the corridor take lock-night bookings as a recognized circuit-subtype. Performer-income volatility under this subtype tracks canal-infrastructure rhythms — canal-season opening/closing, lock-repair windows, seasonal barge-traffic density — not just tavern-regular patronage cycles. A frozen or under-maintenance canal stretch closes lock-night in that stretch for the duration; lock-repair labor redirects the canal-labor audience elsewhere and collapses lock-night pay below tavern-night floor. NOT a new wealth-stratum per Rule 3 firewall — absorbed into existing CF-0017 bardic-circuit performer-income texture as a canal-corridor subtype. The aspirational register *"took silver enough to drink for a week"* is lock-night cadence in circuit-bard working-talk (DA-0001 register).
  - **Estate income** — tenant rents, mill dues, market fees, in-kind levies.
  - <!-- added by CF-0038 --> **Chartered-broker bench concentration** (CF-0038 Brinewick exemplar): Brinewick's density of chartered artifact-brokers, authentication specialists, and ledger-credit clearinghouse factors creates a concentrated intermediary-fee wealth stream distinct from single-guild chartered-extraction wealth concentration, from patron-syndicate capital-pooling, and from single-polity merchant-house arbitrage. The bench's geometric concentration — where dozens of chartered-broker houses share canal-quarter street frontage with authentication-specialist fees available on both sides of every magical-find disposition — makes Brinewick the heartland node where CF-0028 authentication-cartel formation pressure is maximally compounded. Cartel-formation risk is offset by civic-advisory council charter-audit cycles (Brinewick-specific biannual rather than standard decennial); reform-current clergy (CF-0026) charter-defense wing campaigns against regulatory-capture concentration; chartered-broker schism between containment-wright-aligned and broker-aligned factions (CF-0008 CH-0002 / CH-0004 extension template) plays out at Brinewick's density with visible magistrate-docket friction.
  - <!-- added by CF-0040 --> **Mundane-find surface-intake economy** (CF-0040) — CH-0014 commits the mundane-tier as ordinary routine. Finders (dredgers, canal-crews, farmers, peat-cutters, children, estate-tenant households) surface mundane-tier artifacts at high volume under polity-asymmetric exemption and registration regimes. A bottom-copper tier wealth-creation path exists for reliable finders, coordinated through chartered extraction-guild mundane-find intake-tier (Trade/Guilds extension, CH-0014). Finder-fee wage-schedule per polity is DEFERRED to OPEN_QUESTIONS §Mundane-Tier Finder-Fee Wage Schedule. Authentication-specialist cheap-end classification layer earns fees on high intake-volume rather than per-item depth. NOT a new wealth-stratum per Rule 3 firewall — absorbed into existing rural-tenant and urban-poor supplementary-income texture.
  - <!-- added by CF-0042 --> **Status-display asset-class expansion** (CF-0042) — CH-0014 commits artifact-as-status-object economy. Declared-inventory safe-class artifacts become a recognized durable asset-class for elite households, tracked in dowager-gossip circuits and estate-steward inventory ledgers. Distinct from Land-with-title (partible; ward-inspected; authentication-dependent); distinct from CF-0035 legendary-beast-trophy curiosity-collector asset (chartered-broker-mediated vs trophy-bounty-clerk-mediated); distinct from CF-0023 grimoire fragments (legal-display vs illegal-possession). NOT a new asset-class tier per Rule 3 firewall — absorbed into existing coin/bullion/tools/charters/reputation asset register as "chartered safe-class artifact" sub-category. Dowager-gossip visibility makes the asset dual-purpose — wealth store AND status signal. Bodyguard-commission expense partially offsets the status revenue.
  - <!-- added by CF-0043 --> **Ash-Seal civic-subsidized hazard-wage path (Brinewick-specific)** (CF-0043) — CH-0015 commits Ash-Seal as Brinewick-specific civic-chartered non-guild commercial-company employment path. Distinct wealth-creation path: NOT agricultural productivity, NOT craft mastery directly, NOT trade arbitrage, NOT mineral extraction, NOT chartered artifact-labor (CF-0008 chartered-guild extraction path — Ash-Seal absorbs containment/research/disposal downstream under concordat), NOT clandestine artifact crafting (CF-0021), NOT posted-contract gig labor (CF-0024), NOT patron-syndicate capital-formation (CF-0028), NOT subsection mastery (CF-0032), NOT chartered civic perimeter-force service (CF-0033 dragoon-adoption polity-asymmetric pension path). It is CIVIC-CHARTERED NON-GUILD COMMERCIAL EMPLOYMENT WITH TRADE-SECRET COVENANT AND MONOPOLY-RENT-SUPPORTED UPPER-SILVER WAGES — structurally parallel to CF-0033 dragoon in being chartered-civic hazard-wage but categorically DISTINCT in being COMMERCIAL (not state-employer) and TRADE-SECRET-COVENANT-CONSTRAINED (not public-chartered-service). The path is Brinewick-local; entry requires civic-registry Brinewick-citizenship or resident-status adequate to Ash-Seal intake vetting; apprenticeship-to-master progression over 5-15 years; master-rank technicians command upper-silver tier with information-asymmetry rent premium. Defector emigration into chartered-extraction-guild labor markets elsewhere produces the TWELFTH value-store (Brinewick-trained portable reputation; see Value Stores) — a secondary wealth-creation leg for post-Ash-Seal INDIVIDUAL-consultant career arc. **Civic-subsidy regulatory-capture exposure**: Brinewick civic-treasury payment to Ash-Seal is a hidden subsidy entrenching monopoly-pricing; biannual charter-audit cycle (CF-0038) nominally covers but company-resistance is reliable; reform-current clergy (CF-0026) standing charter-audit-access campaign is ELEVENTH audit-pressure target. Distributional effect: civic-treasury tax base → Ash-Seal monopoly-rent → upper-silver technician wages + company-facility-rent + shareholder-equivalent internal distribution; wealthy backchannel-purchase channel to elite parties extracts ADDITIONAL economic value at moderate-tier on top of civic-subsidized baseline. The path is narrow (Brinewick-local, not a general labor-market path) but concentrates materially more wealth per technician than chartered-containment-wright master engagement elsewhere; defector-consultant emigration spreads the wage-compression pattern heartland-wide (see Breakage Points).
  - <!-- added by CF-0046 --> **Drylands caravan-corridor reciprocity-primary regional wealth-creation** (CF-0046 / CF-0047) — a regional wealth-creation pathway categorically distinct from the coin-denominated chartered paths above: drylands well-keeping household-enterprise revenue (CF-0047; bottom-copper to upper-copper traveler-service); drylands caravan-master rotation-revenue (CF-0024 extension at CF-0046 corridor scale; middling copper with occasional silver on long-haul contracts); drylands village-supply-run flow (tenant-supplier to corridor-node, in-kind-dominant with coin-at-edges); drylands corridor-contractor caravan-escort work (CF-0024 wildland-escort sub-specialty under heat-discipline and waiting-wolves-vigilance premium). The composite path is **reciprocity-dominant with coin-at-edges cross-subsidy from heartland-border market-caravan flow**; wealth is obligation-denominated at the corridor-internal scale and coin-denominated at the heartland-border contact surface. The path is NOT agricultural productivity (drylands barley/lentil/date agriculture is a distinct sub-path within this composite); NOT craft mastery (no chartered craft-guild infrastructure in drylands per CF-0046 institutional-thinness); NOT chartered artifact-labor (drylands rarely touches chartered-extraction-guild per CF-0041 convention-register framing); NOT clandestine artifact crafting (rare in drylands; CF-0021 drylands caravan-rotation cover is route-incident-only, not resident-crafter pattern at regional scale); NOT posted-contract gig labor beyond the caravan-escort sub-specialty; NOT patron-syndicate capital-formation; NOT subsection mastery; NOT chartered civic perimeter-force service (dragoon non-adoption); NOT Ash-Seal civic-subsidized (Brinewick-local only). The reciprocity-primary wealth-creation pattern is **regionally structural**, not a shadow wealth path — the drylands corridor operates at scale without coin-dominant market texture, producing a genuinely distinct regional economy stabilized by geographic non-transportability of canal-infrastructure (heartland coin-market export mechanism cannot propagate along dry corridors; reciprocity-equilibrium persists indefinitely per CF-0046 Phase 4 stabilizer). Distributional effect: obligation-capital accumulates disproportionately at well-keeper lineages (water-node natural monopoly) and at caravan-master reputation-network hubs (adjudication-and-rotation authority); coin-capital is thin at the regional-internal surface and concentrates only at heartland-border market-caravan intermediaries. Reform-current clergy, sectarian doctrine, and chartered-polity civic-registry expansion have NO institutional leverage into this economy (no civic-registry hook; no doctrinal crisis; no authentication-cartel insertion point per Rule 3 firewall). NOT a new anomalous wealth-stratum per Rule 3 firewall — regional wealth-creation pattern absorbed into existing regional-distribution register (alongside heartland canal-commerce, highland clan-custom economy, fen peat-bog economy, mountain-east seasonal-extraction economy) as drylands caravan-corridor reciprocity-primary economy.

