id: SEC-ECR-001
file_class: ECONOMY_AND_RESOURCES
order: 1
heading: Currency
heading_level: 2
body: |-
  - **Copper** — petty transactions, day-labor wages, market purchases, tavern bills, tolls.
  - **Silver** — substantial transactions, monthly wages of skilled tradesfolk, contracts, taxes, larger guild dues.
  - **Higher denominations** — gold and special-issue coinage exist in major polities and for cross-polity trade and noble accounts; they are rare in ordinary life.
  - **In-kind contractual payment** — livestock (cattle, sheep, goats by region), grain, salt, peat, timber, ceramic ware, woven cloth. Large rural contracts often stipulate in-kind delivery; this can impose logistical burdens on the recipient (transport, housing, resale).
  - **Bills and ledger-credit** — chartered guilds and large estates use ledger-credit and written bills for inter-city accounts; the civic registry archives standard contract forms.

  The brief specifies that compensation can be coin or in-kind and that payment can impose logistical burdens. This is honored in ordinary practice: a wagon-driver paid in two yearling calves must arrange transport and pasture; a tavern-musician paid in casks of ale must arrange resale.

