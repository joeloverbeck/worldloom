id: SEC-ELF-004
file_class: EVERYDAY_LIFE
order: 4
heading: (d) Drylands South — Caravan and Town Households
heading_level: 2
body: |-
  Hot-summer, mild-winter region of adobe courtyard houses, qanat-fed villages, caravan towns swelling and shrinking with rotation.

  - **Food**: barley, lentils, dates where they grow, lamb, goat, fermented dairy, fermented date wine, flatbreads. Carnivore-folk trade for fresh meat from herders.
  - **Water**: cistern, well, qanat-style aqueduct; scarcity dominates summer planning; water-rights are serious legal matters.
  - **Sanitation**: composting, careful water husbandry, dry latrines.
  - **Housing**: thick-walled adobe or stone, courtyard plan, flat roofs for summer sleeping, shaded loggia.
  - **Clothing**: light cloth, head-cover, loose for fur-bearers (otherwise heatstroke), bright colors in town, plain for caravan.
  - **Heating**: minimal indoor heating; cool desert nights handled with blankets.
  - **Childbirth**: midwife and matron, communal courtyard tradition.
  - **Childrearing**: communal courtyard rearing, early apprenticeship in caravans, songs and riddles.
  - **Aging**: revered storyteller role; old caravaners advise rotation timing.
  - **Courtship and marriage**: family-arranged often, matrilocal in some clans.
  - **Labor rhythm**: dawn-and-dusk work, midday rest, caravan rotation, market days.
  - **Leisure**: poetry, music, evening feasts, tea-houses, evening promenades on cooler nights.
  - **Intoxication**: fermented date wine, some distilled spirits, herbal teas.
  - **Prayer and ritual**: progenitor cults distinctly southern in flavor (sun-honoring), charter-day procession in chartered towns, water-rites at qanat cleaning.
  - **Cleanliness**: ritual washing, bath-houses where water permits, sand-cleaning for some species.
  - **Common injuries**: dehydration, snakebite, sunstroke, caravan accident, scorpion sting.
  - **Medicine**: herb-doctor, traveling physician, caravan-master with first-aid skill.
  - **Death disposal**: dry-burial in family tombs, pyre rare (water for the rite is too costly).
  - **Oral storytelling**: long memorized poems, riddles, caravan-tale traditions.
  - **Common fears**: drought, raid, marsh-ague when rare wet seasons strike, lost caravan, well-failure. <!-- added by CF-0021 --> Occult firing in caravan-town kilns; well drawn down by an unlicensed crafter; cargo concealing grimoire fragments arriving in the town caravan.
  - **Common aspirations**: reliable water, a place in caravan rotation, sons for harvest, daughters well-married, a tomb in the family compound.
  - <!-- added by CF-0021 --> **Prayer and ritual (extended)**: water-rite officiants speak against occult firing at qanat-cleaning ceremonies; some communities add a brief invocation against artifact-creation hubris.
  - <!-- added by CF-0021 --> **Labor rhythm (extended)**: caravan-master cargo refusals — quiet, reputation-driven; some routes have a known refusal for any cargo bearing the marks of grimoire transit.
  - <!-- added by CF-0021 --> **Childrearing (extended)**: caravan-children warned which cargo not to touch; riddles encode the warning ("what hums in the box that has no honey?").
  - <!-- added by CF-0024 --> **Labor rhythm (extended — caravanserai posting)**: caravan-masters contract escort-warriors at rotation turn; posting-boards at caravanserai and tea-house are ordinary sights. Contracts are witnessed at the tea-house or caravanserai scribe's stall; coin-contract sacredness is the primary enforcement mechanism.
  - <!-- added by CF-0024 --> **Childrearing (extended — escort recognition)**: caravan-children learn to recognize a fallout-specialist's marks alongside the existing cargo-riddles. "What hums in the box that has no honey? — and the one who carries it has a scar like this."
  - <!-- added by CF-0024 --> **Common fears (extended — escort risk)**: an escort-warrior who vanishes at the well stop; cargo concealing what the escort refused to name; caravan-master cargo-refusal traveling ahead as reputation-damage.
  - <!-- added by CF-0024 --> **Oral storytelling (extended — named-escort subgenre)**: caravan-tale traditions now include a named-escort subgenre alongside the existing caravaner-memorials; escort-refusal tales travel as moral witness, and the tale of the specialist who turned back before the well-stop is a standing lesson.
  - <!-- added by CF-0028 --> **Labor rhythm (extended — expedition route-disruption)**: caravan routes have been disrupted in recent years by armed expedition groups contesting ruin-adjacent passes; caravan-masters occasionally reroute during active expedition-conflict. Tea-house scribes in some drylands traditions refuse to witness ruin-contracts (treating the entrance-knowledge contraband as a SOC-3 carve-out that cannot be legitimated by any witness-signature); a scribe's refusal is a distinct caravan-reputation marker. Water-rights tribunals have added expedition-caused damages to their docket.
  - <!-- added by CF-0028 --> **Childrearing (extended — ruin-coin riddle)**: the cargo-riddle tradition expands — "what coin burns the hand? — the ruin-coin, and the payer's name is never given." Caravan-children are warned specifically against strangers offering "a last job south" (a specific recruitment-phrase for ruin-expedition contractors in drylands tradition). Children learn to recognize the ruin-brand on fallout-specialist cheeks — the CF-0025 specialist who has also worked ruin-fallout jobs acquires an additional mark-visible distinction.
  - <!-- added by CF-0028 --> **Common fears (extended — caravan-refusal and expedition shadow)**: a caravan passing a resealed ruin-mouth at dusk (sealed perimeter is supposed to hold; "at least officially" has its own dread register); the fallout-specialist now bearing the ruin-brand instead of only the fallout-scar; a caravan-master's cargo-refusal reputation traveling ahead of the wagon and ending an escort-warrior's rotation career before arrival.
  - <!-- added by CF-0031 --> **Labor rhythm (extended — tea-house ledger-mark witnessing)**: in larger caravan-towns of adopting polities, tea-house scribes witness registry declarations (CF-0031) at the same stalls that already handle adventurer-contract signings and other civic records. Smaller oasis hamlets and caravan-stops outside adopting-polity reach maintain informal solidarity arrangements for contamination-injured caravan-kin without civic-registry coordination. Desert-kin at oasis hamlets carry the registry as a distant heartland institution regarded with muted contempt.
  - <!-- added by CF-0031 --> **Common fears (extended — coin-for-shame)**: drylands idiom for a relative who registered in a larger caravan-town — *"he took the coin-for-shame"* — carries pity and rebuke compound, characteristic of drylands moral vocabulary. The phrase applies most often to a cousin or uncle who emigrated from oasis-hamlet community solidarity into adopting-polity ledger-mark enrollment; the speaker's tone distinguishes resigned pity from sharper rebuke.
  - <!-- added by CF-0033 --> **Labor rhythm (extended — caravan-master route-refusal and witnessing taboo)**: drylands caravan polities do not adopt dragoon institutional form (CF-0033) — caravan-rotation social form is incompatible with ward-resident dragoon recruitment, and caravan polities lack standing-civic-force civic-registry infrastructure. Caravan-master cargo-refusal extends to include certain goods not carried into dragoon-active canal-heartland corridors (the refusal is rotation-bounded and travels by reputation). Tea-house scribes in some drylands traditions refuse to witness any contract that names a dragoon-adopting polity as jurisdiction, treating the charter-court register as incompatible with caravan-rotation witness-practice — a scribal refusal paralleling the CF-0028 entrance-knowledge-contract refusal pattern but on different grounds (jurisdictional-register incompatibility rather than lethal-contraband). A caravan-master's refusal of a dragoon-jurisdiction cargo is reputation-damage-adjacent to the escort-warrior who turns back before the well-stop.
  - <!-- added by CF-0033 --> **Common fears (extended — coin-for-service)**: drylands idiom for a relative who emigrated to a heartland adopting polity and enlisted in dragoon service — *"he took the coin-for-service"* — carries the characteristic drylands moral compound of pity and rebuke, parallel to the CF-0031 *"coin-for-shame"* idiom but with distinct tone: less resigned, more sharp-edged, acknowledging civic-chartered employment as a durable break from caravan-rotation social form rather than a temporary welfare desperation. The phrase applies most often to a nephew or nieces who emigrated from caravan-rotation life into adopting-polity dragoon service; elders use the phrase with the particular cadence of the cousin-who-won't-return. A caravan-town emigrant who took both the coin-for-shame AND the coin-for-service is spoken of in saga-fragment with a pity-compound that has no name yet.
  - <!-- added by CF-0033 --> **Oral storytelling (extended — cargo-riddle register)**: cargo-riddle tradition extends — *"what door does the cordon hold closed? — the door where the ward failed; and the one who stands the perimeter does not speak what's inside."* Caravan-children are warned specifically against strangers offering "fast work north in the sealed quarters" (a specific recruitment-phrase for dragoon-adopting polity service observed in drylands caravan towns). The riddle register preserves the civic-chartered-service-as-break-from-caravan-life cultural anxiety in the same cadence as the CF-0028 ruin-coin and CF-0024 named-specialist riddles.
  - <!-- added by CF-0034 --> **Common fears (extended — waiting-wolves at the water-stop)**: drylands-specific idiom for bandits who ambush caravans at obligatory water-stops between long dry stretches: *"waiting-wolves"* — named because their timing is dictated by thirst-geography, not by opportunity. A caravan-master who smells the wrong wind at the well-approach, who counts the caravanserai's usual touts and finds the count off, who hears the absence of the usual birds — he holds the rotation short of the well and loses a day of water discipline to bandit-risk. The register is attentive, not heroic; a caravan-master's waiting-wolves-instinct is a reputational asset on par with his cargo-refusal judgment. Distinct cadence from the CF-0028 *"last job south"* recruitment-phrase: waiting-wolves is ambient hazard; last-job-south is transactional lure.
  - <!-- added by CF-0034 --> **Labor rhythm (extended — escort vigilance at well-approach)**: caravan-master escort hires on wildland caravan routes now include waiting-wolves-vigilance as a named capability alongside the existing escort-specialties (caravan-escort, wildlife, dredger-escort, fallout-response). A reputable escort-veteran who has walked the drylands corridors long enough to read the well-approach signals is worth more than a tavern-board-new-hire of equivalent martial skill; the distinction is noted in caravanserai hire-negotiation. Tea-house scribe witness tradition extended: some drylands tea-house scribes refuse to witness ransom-contracts, treating the coerced-negotiation register as incompatible with coin-contract witness practice (paralleling the CF-0028 ruin-contract witnessing refusal but on distinct grounds — SOC-3 non-application rather than lethal-contraband).
  - <!-- added by CF-0034 --> **Childrearing (extended — cargo-riddle extension and waiting-wolves)**: cargo-riddle tradition extends — *"what waits at the water when the wind is wrong? — the waiting-wolves; and the caravan-master who does not hold short does not come home."* Caravan-children learn to recognize the waiting-wolves-silence (the absence of usual touts at a well-approach) alongside the CF-0028 ruin-coin marking and the CF-0024 fallout-scar marking; the three marks belong to three different threats but share the same riddle-form. Children in caravan-families learn to read a reputable escort's signaling posture; the apprentice caravan-scribe catechism includes waiting-wolves history for each named corridor.
  - <!-- added by CF-0034 --> **Oral storytelling (extended — lost-caravan and ransom-kin lament)**: caravan-tale traditions now include lost-caravan cycles for wildland-route disasters (distinct from lost-cargo tales; the lost-caravan is a complete party-and-cargo loss, kin-grief register dominates) and ransom-kin lament songs for families whose traveling kin were taken by waiting-wolves and ransomed back (sometimes returning traumatized, sometimes not returning at all). The register is in-family-idiom, not heroic; named-specialist bardic subgenre (CF-0024) picks up the hunter-veteran who retrieved-or-didn't-retrieve side of the story, and the two registers (family lament / hunter return) travel in parallel through the caravanserai circuit.
  - <!-- added by CF-0034 --> **Common aspirations (extended — reliable water and safe return)**: the existing drylands aspirations (reliable water, a place in caravan rotation, sons for harvest, daughters well-married, a tomb in the family compound) extend — *"the caravan that held the rotation and came home whole"* — registering safe return as an achievement rather than a default. The aspirations are register-quiet; no heroic frame, no chosen-caravan register — the well-walked corridor held, the waiting-wolves did not come that season, the caravan-master's judgment was sound.
  - <!-- added by CF-0035 --> **Labor rhythm (extended — caravan-master beast-cargo refusal)**: caravan-master cargo-refusal extends to include unvouched legendary-beast trophy cargo (CF-0035) alongside the existing CF-0021 grimoire-transit refusal, CF-0028 ruin-cartography refusal, CF-0033 dragoon-jurisdiction refusal, and CF-0034 stolen-goods refusal. Trophy-cargo bearing a bounty-clerk certification from a polity whose trophy-legality is recognized along the caravan-corridor can be carried under standard fee; uncertified trophy-cargo, certified from a polity whose trophy-legality is NOT recognized along the route, or trophy-cargo whose provenance cannot be voiced openly — these travel only on disreputable caravan-strings. A caravan-master's beast-cargo refusal reputation travels ahead of the wagon the way his grimoire-cargo refusal reputation does.
  - <!-- added by CF-0035 --> **Common fears (extended — beast-sign at the water-stop)**: drylands-specific extension of the CF-0034 waiting-wolves vigilance: beast-sign at water-stops — tracks too wide for any known predator, livestock-loss with wrong predation-pattern, a well where the usual night-insects have fallen silent. The caravan-master who smells the wrong wind at a well-approach already holds the rotation short for waiting-wolves; beast-sign adds a second category of hold. Distinct cadence from waiting-wolves (which are human bandits exploiting thirst-geography) — beast-sign is non-human and does not negotiate.
  - <!-- added by CF-0035 --> **Childrearing (extended — cargo-riddle extension for beast-sign)**: cargo-riddle tradition extends — *"what paces outside the ring of wagons in the third watch? — the thing whose tracks do not match, and the caravan-master who does not hold short does not come home."* Caravan-children learn to recognize the beast-sign-silence (insects fallen silent; night-birds absent; livestock restless at the tether) alongside the waiting-wolves-silence, the CF-0028 ruin-coin marking, and the CF-0024 fallout-scar marking. The four marks belong to four different threats (bandit, ruin-contract, fallout, beast) but share the same riddle-form; caravan-children learn to discriminate.
  - <!-- added by CF-0035 --> **Oral storytelling (extended — lost-corridor register and hunter-return)**: caravan-tale tradition gains a lost-corridor register for wildland-caravan-route disasters where a beast-sign season required rotation-abandonment or cost a caravan entire; the register is distinct from the CF-0034 lost-caravan (bandit-disaster) and the CF-0028 failed-expedition cycles. Named-specialist bardic subgenre (CF-0024) extends with hunter-return accounts specific to drylands corridor beast-hunts, in dry-numerical register: *"we worked the south pass in the month of wind; the water-hold was short but held; the thing did not come home with us, and neither did two of the six."*
  - <!-- added by CF-0036 --> **Structural-absence annotation (exclusionary-settlement formation)**: caravan-rotation social form STRUCTURALLY RESISTS single-species exclusionary settlement formation — species-mixed rotation is baseline economic reality across the drylands corridor, and caravan-master mix-sound rotation-crew judgment is on par with waiting-wolves judgment and cargo-refusal judgment. An exclusionary settlement in a drylands oasis-stop is a rare, self-limiting holdout category; caravan-rotation does not resume with such stops after the second refused rotation, and the settlement's economic decline is rapid. Caravan-master mix-sound judgment at rotation-crew hire is integrated with existing waiting-wolves and cargo-refusal judgments: a mix-sound caravan composition holds under heat-stress embodiment and under wildland-corridor pressure; the foreman earns his coin by the three-way judgment.
  - <!-- added by CF-0036 --> **Common fears (extended — one-fur talk and cannibal-corridor rumor)**: drylands idiom for a nephew or niece who returned from a northern single-species highland enclave speaking in new cadence — *"he came back with the one-fur talk now"* — carries the characteristic drylands pity-rebuke compound, parallel to the *"coin-for-shame"* and *"coin-for-service"* idioms (CF-0031/CF-0033) but directed at interspecies-friction register rather than welfare or service cadence; less resigned than coin-for-shame, sharper-edged than coin-for-service, acknowledging single-species enclave exposure as cultural-break from caravan-rotation mix-sound norm. Wildland-corridor cannibal-camp rumor traffic travels the tea-house scribe circuit with circumspect cadence: rumor-level mention to scribes who refuse-to-witness such contracts; magistrate-docket actual cases are SEALED and do not travel the scribe register; the register-gap between rumor and docket is the source of drylands caravan unease. Waiting-wolves vigilance extends to include cannibal-band corridor-folklore recognition (parallel to CF-0034 waiting-wolves and CF-0035 beast-sign — now a fourth water-stop hold category; *"three holds before the well: waiting-wolves, beast-sign, and the camp that eats its catch"*).

  - <!-- added by CF-0041 --> **Labor rhythm (extended — caravan-master sealed-cargo-refusal and qanat-cleaning-rite unsealing-discovery, CH-0014)**: caravan-master cargo-refusal extends to include UNVOUCHED SEALED CARGO — any container showing Maker-Age construction signature and an intact seal refused on the grounds that seal-breach liability travels with the cargo. Caravan-master judgment on sealed-cargo joins the existing cargo-refusal judgment register (mix-sound crew, waiting-wolves, beast-sign, now sealed-provenance). Cargo-riddle tradition extends: *"what sleeps in the coin-box until the lid is lifted? — the thing the old world buried; and the one who carries it pays seal-breach if the wax parts in the heat."* Qanat-cleaning rite is the specific drylands encounter context — qanat-maintenance crews (who clean cistern-aqueducts at the dry season's low-water window) occasionally breach a Maker-deliberately-buried container in the qanat-bed; the rite-register holds the response in place of a formal civic protocol (the caravan-polity has no ward-inspector office to dispatch). Rite-witnessing elder and water-chartered steward convene; the container is reburied deeper, the qanat-section is diverted for a cleaning-cycle, and the qanat-worker who broke the seal carries a temporary ritual-contamination mark until the next seasonal water-rite closes the breach. NO drill; the response is convention-register, not institution-register.
  - <!-- added by CF-0040 --> **Common fears (extended — dune-find and cistern-find register, CH-0014)**: drylands-specific mundane-tier artifact encounter-contexts — a herd-child digging into dune-face finds a stone plate that sorts grains by size; a cistern-cleaner pulls a weak-tick mirror from the cistern-bottom; a caravan-passing trader receives a breeze-doll from a desert-kin in payment and must decide whether to carry it north. Mundane-tier handling convention: buried-back-under-dune-marker (the most common; paralleling highland cairn-burial) or carried-with-tea-house-scribe-witness into the next adopting-polity ward-inspector office (rare; only when the item's ongoing effect exceeds desert-kin tolerance). Cargo-riddle extends — *"what ticks in the cistern that holds no bell? — the old world's mirror; leave it where the water cleans it."* Caravan-children learn the refrain alongside waiting-wolves, beast-sign, sealed-cargo, and ruin-coin riddles.
  - <!-- added by CF-0039 --> **Common fears (extended — attempted-destruction corridor rumor, CH-0014)**: drylands caravan corridor carries saga-fragment for the caravan-master who tried to smash a Maker-Age stone-plate with a sledge at a rest-stop and discovered the stone took the blow and held while the sledge-head sheared off; the rumor-register preserves the consequence (the caravan-master's wrist injury; the replacement-sledge-fee; the plate reburied) without valorizing the attempt. Desert-kin children are taught the destruction-prohibition through the refrain *"what does not break is not for the breaking"* alongside the existing water-conservation and cargo-refusal teachings.
  - <!-- added by CF-0036 --> **Labor rhythm (extended — tea-house scribe witnessing-refusal)**: tea-house scribes in some drylands traditions extend the CF-0028 ruin-contract and CF-0034 ransom-contract witnessing-refusal to include supremacist-doctrine-movement contracts and cannibal-band-bounty-contracts — treating interspecies-predation-adjacent contracts as incompatible with rotation-witness practice. The refusal travels ahead of the scribe; a caravan-master whose preferred scribe refuses such a contract adjusts the contract or abandons it; the refusal is charter-adjacent but not legally binding.
  - <!-- added by CF-0037 --> **Structural-absence annotation (family-handled waystation tradition)**: drylands south does NOT host the family-handled waystation tradition (CF-0037). The drylands water-cistern logistics make rotating caravan-train cistern-management economically superior to fixed-station resupply; caravan-rotation IS the cistern-management mechanism, and a fixed family-station could not carry rotating-train water capacity. Drylands oasis-stops are caravanserai (typically merchant-association-managed under caravan-rotation custom per CF-0024 framing), NOT family-inheritance waystations. Caravaners' dryly-amused note when northern hires describe the institution: *"the southern road keeps no stop"* — the phrase carries the characteristic drylands moral compound of pity-and-superiority (the northern road is rich enough to support family-stations precisely because the northern road has water everywhere; the southern road is ours because we keep it moving). A drylands caravaner who emigrates to a heartland connector-route village and marries into a stationkeeper-family is spoken of in tea-house gossip with a milder version of the *"took the coin-for-shame"* / *"took the coin-for-service"* register — the *"settled at a stop"* idiom carries acknowledgment of the cultural-break from caravan-rotation life. Caravan-rotation social form is structurally incompatible with ward-resident family-station household pattern; the drylands absence is permanent rather than gap-filled-by-future-development.
  - <!-- added by CF-0044 --> **Oral storytelling (extended — short-form hospitality register, CH-0016)**: alongside long memorized poems, riddles, and caravan-tale traditions, drylands carries a fourth named oral register — short-form hospitality-verse (CF-0044) traded at caravanserai-gate, wayhouse-threshold, and well-approach in host-and-guest configuration. Distinct from long-memorized-poem performance and from caravan-tale storytelling; brief verse-turns as stranger-introduction register. Ephemeral by design — performance-moment only, no scribe-transcription convention, no tea-house-scribe witnessing. Circuit-bards (CF-0017) traversing drylands corridors absorb verse-fragments and transport them to canal-heartland taverns as bardic-performance material; canal-heartland audiences recognize "drylands cadence" without knowing the source stranger-exchange protocol. The protocol itself stays drylands-scoped; the fragments travel.
  - <!-- added by CF-0044 --> **Leisure (extended — hospitality-verse distinction, CH-0016)**: the existing §(d) Leisure poetry-and-music register covers domestic and social leisure — evening feasts, tea-houses, cooler-night promenades. Hospitality-verse (CF-0044) operates at a distinct cultural register — stranger-encounter register, not leisure register. The two do not substitute: a drylands family that sings at hearth does not discharge the caravanserai-gate verse-turn, and a verse-turn at the gate is not a performance in the tavern sense. Register-discipline is load-bearing — conflation is what circuit-bards (CF-0017) who absorb drylands fragments into bardic-tavern material must avoid when performing in canal-heartland (the fragment survives; the stranger-exchange register does not travel).
  - <!-- added by CF-0044 --> **Childrearing (extended — verse-apprenticeship cadence, CH-0016)**: drylander children pick up the verse-turn register by observation at household caravanserai-guesting before apprenticeship age; formal drilling occurs at caravan-apprenticeship stage (*"recite your grandfather's verse-turn for the well-stop"*) alongside the existing cargo-riddle pedagogy (CF-0021 / CF-0024 / CF-0028 / CF-0034 / CF-0035 cargo-riddle tradition). The apprentice caravan-scribe catechism extends — a verse-turn repertoire for each major corridor-caravanserai joins waiting-wolves history, fallout-scar recognition, and cargo-refusal pedagogy. Per-cluster accommodation: beak-folk (corvid/raptor) apprentices are taught the mammalian-caravan-partner vouching-cadence alongside their own short-line prose-turn form; movement-constrained Cluster D travelers (naga-folk serpentine) are taught the host-waiver-plus-gesture convention — no child of any cluster is raised without a register-appropriate participation-path.
  - <!-- added by CF-0044 --> **Courtship and marriage (extended — verse-competence, CH-0016)**: verse-competence factors into match-maker evaluation alongside caravanserai-rotation mix-sound judgment (CF-0036) — a match-maker's notebook records verse-turns heard at courtship-visits (*"she turned a verse at her cousin's wedding-caravanserai that kept the host quiet"*); the reverse (*"he could not turn and the caravan-master covered for him"*) is a quiet mark against a match. Modest weight, not determinative; SOC-1 multispecies frame held without species-coding; beak-folk and movement-constrained-species suitors are evaluated on the accommodation-convention form they present, not on absence of the mammalian-mouth verse-turn.
  - <!-- added by CF-0044 --> **Labor rhythm (extended — caravanserai-gate verse-turn, CH-0016)**: verse-turn at caravanserai-gate, wayhouse-threshold, or well-approach is part of the ordinary hospitality-transaction register alongside SOC-3 coin-contract for lodging/meal. Host-initiated; guest responds or is vouched-for. Caravan-masters with verse-competence gain tacit foreman-judgment preference in caravanserai rotation-hire (paralleling CF-0036 mix-sound judgment; not a charter-level or roster-level hiring criterion — outland caravan-masters without verse take rotation with reputation-softening that amortizes over successful trips). Caravan-master covers for verse-inept guests with a vouching-cadence paralleling CF-0038 provincial-migrant-with-letter-of-vouch handling; the guest is slower-hosted, seated at the back of the receiving-hall, introduction-phase takes longer. Well-keepers hosting well-approach verse-turns accumulate informal verse-repertoires over a keeping-career; a retiring well-keeper's verse-book passed to an apprentice is a minor ordinary-life inheritance. NON-CHARTERED folk-practice — no civic-procedural gate, no chartered verse-keeper register, no magistrate-adjudicated verse-competence.
  - <!-- added by CF-0044 --> **Common fears (extended — "dumb at the gate" idiom, CH-0016)**: drylands idiom for a drylands-emigrant returning unable to turn the home verse-register, or a drylander so long in canal-heartland that the register has faded — *"he came in dumb at the gate"* — pity-rebuke compound characteristic of drylands moral vocabulary, paralleling CF-0031 *"coin-for-shame"* / CF-0033 *"coin-for-service"* / CF-0036 *"one-fur talk now"* idiom cadence. A canal-heartland migrant arriving at drylands caravanserai-gate without the register: caravan-master covers with vouching-cadence, six-week adaptation period expected (paralleling CF-0038 provincial-migrant-at-Brinewick adaptation cadence), slower-hosted but not denied-hospitality; SOC-3 lodging coin-contract honored throughout.

  - <!-- added by CF-0046 --> **Housing (extended — corridor-node typology, CH-0018)**: beyond the adobe courtyard town-house already named, drylands housing forms a four-node-type corridor-network pattern (CF-0046): **well-stops** (single-household well-keeper compound or multi-household well-complex at a corridor water-node; adobe with reinforced cistern-room; the well-head inside the courtyard or directly outside the gate-wall; the keeping-book-and-station-log shelf in the receiving-hall; the verse-counter hanging at the gate under the lintel-carving); **gate-stops** (corridor-boundary transition structures at the approach to a caravan-stop, light-staffed in drought years and fuller-staffed in drought-break years — the gate-warden is typically a well-keeper apprentice or a village-elder-delegated tenant, not a chartered official); **caravan-corridor villages** (settlement-adjacent supply-run origins with adobe households clustered around a central cistern and meeting-hall; the runner's-house is typically close to the meeting-hall; the village-council meets at the hall to adjudicate supply-share and militia-roster); **caravanserai** (merchant-association-managed overnight-hosting structures at corridor nodes per CF-0037 drylands-structural-absence on family-handled waystation — these are NOT family-inheritance structures but rotating-management multi-family institutions under caravan-rotation custom). The four-node network is the drylands regional-architecture signature as the canal-quarter row-cottage is the heartland signature (CF-0038) and the stilt-village is the fen signature.

  - <!-- added by CF-0047 --> **Childrearing (extended — well-keeper apprenticeship from young, CH-0018)**: well-keeper lineage inheritor-children begin chore-work at age 6-7 — drawing water for household, sweeping the courtyard, tallying travelers in the station-log under the mother's or father's eye, feeding caravan draft-beasts at overnight hosting, running the verse-counter through daily household practice until the verse-turn cadence is muscle memory before formal apprenticeship age. The pattern parallels CF-0037 stationkeeper chore-from-young at the heartland-cadence; drylands-specific children additionally drill on (i) drought-cycle water-discipline (conservation, cistern-measure, boiled-well-water protocol); (ii) trade-tongue fluency pedagogy (oral first, then station-log literacy at apprentice age); (iii) cross-species hospitality etiquette at well-approach (scent-aversion handling, mix-sound crew accommodation, movement-constrained Cluster D traveler host-waiver-plus-gesture convention per CF-0044 existing register); (iv) keeping-book arithmetic (water-share-balanced, hospitality-due tally, supply-run reciprocity register); (v) caravan-master corridor-reputation literacy (which masters rotate through regularly, which waiting-wolves-corridors are active, which supply-villages have recent raid-or-drought history). Formal apprenticeship at 10-12 deepens instruction; master-level keeping at the keeping-book-transfer moment (typically when the inheritor is 25-40 depending on the retiring keeper's health) completes the onboarding. The chore-from-young register is load-bearing: the walked-the-well child (who leaves before apprenticeship-completion; forfeits placement-right per CF-0047) carries partial skills — station-log literacy, verse-repertoire fragments, cross-species etiquette competence — but no corridor-reputation asset (the keeping-book inheritance is the reputation vector). Children in non-well-keeper drylands households (caravan-rotation member families, supply-village households, caravanserai-managing merchant families) observe the well-keeper childhood pattern from proximity but undergo different chore-onboarding specific to their family trade.

  - <!-- added by CF-0046 --> **Labor rhythm (extended — caravan-master corridor adjudication + runner-militia emergency response, CH-0018)**: drylands caravan-master corridor-internal customary-adjudication (CF-0046) handles minor rest-stop disputes during rotation — intra-caravan labor grievance, supply-share allocation, verse-turn etiquette breach at a wayhouse, well-share friction between simultaneously-rotating caravans at a compound well-complex. The adjudication happens at the caravan-master's tent after the evening meal, with tea-house-scribe (where one is present) taking brief notes for contract-witnessing purposes; the caravan-master's word is reputation-backed rather than charter-backed; multi-caravan-master reputation-boycott at corridor scale is the structural brake against graft. Runner-reached village militia (CF-0046) is the drylands corridor equivalent to fenland amphibian-folk canary vigilance (CF-0025) and heartland canal-watchman patrol — the village-designated runner (a tenant with good-leg reputation, rotating across able villagers, NOT a chartered militiaman) is dispatched on bandit-sighting at the well-approach or at a corridor-node where travelers report sign; the runner carries the sighting-call to the nearest neighbor-village or gate-stop within a half-day's run; receiving village mobilizes informal militia (able-bodied tenant volunteers, often the same rotation that provides caravan-escort contractors at CF-0024 scale) under village-council direction. The militia convergent-response is ad hoc village emergency-response, not posted-contract labor; pursuit beyond village jurisdiction defaults to CF-0034 hunter-contractor commission if the corridor justifies bounty-contract. Drought-year traffic-compression narrows the militia response-capacity (thin drought-year villages have thinner able-bodied rotation); under compound-pressure years the runner-militia response-capacity sometimes fails acutely, and the corridor segment it served falls under expanded bandit-corridor pressure until drought-break restores capacity.

  - <!-- added by CF-0046 --> **Common fears (extended — drought-cycle corridor-collapse + well-lineage failure, CH-0018)**: drylands common fears extend with drought-cycle-specific anxieties beyond the named drought / raid / marsh-ague-when-rare / lost-caravan / well-failure: **multi-cycle drought** (two or three compounded drought-years in sequence; drought-corridor collapse exposure per CF-0046 ECONOMY §Breakage Points; refugee-migration northward into canal-heartland urban-poor feeder); **well-lineage failure** (no inheritor qualified at succession; multi-heir dispute unresolved at caravan-master adjudication; a walked-the-well child with no sibling-return; the well-stop closes mid-season and the corridor reroutes); **reciprocity-default at drought-break** (a caravan that cannot honor hospitality-owed at keeping-book audit; a well-keeper who prices drought-year water as pure coin-commerce and loses the lineage at the caravan-master-network); **keeping-book burning** (the rare catastrophe where a well-stop burns and the keeping-book is lost — the lineage's obligation-capital evaporates with the book; the corridor-wide hospitality-due ledger cannot be reconstructed from memory; recovery is multi-generational); **trade-tongue fluency erosion** (the apprentice who cannot read the station-log in the trade-tongue; the grandfather knew three trade-tongues, the granddaughter knows one; generational literacy-decline threatens corridor-commercial viability at lineage scale); **the sectarian supremacy recruiter at the caravanserai** (CF-0036 pressure at CF-0044 verse-register reaches well-stop hospitality at a minor recruitment-margin vector; caravan-master reputation-network refusal is the primary stabilizer).

  - <!-- added by CF-0046 --> **Common aspirations (extended — the keeping-book passed whole, CH-0018)**: drylands common aspirations extend with drought-cycle-and-lineage-specific aspirations beyond the named reliable-water / caravan-rotation-placement / harvest-sons / well-married-daughters / family-tomb: **"the keeping-book passed whole"** (the well-stop inheritance completed cleanly across a generation without multi-heir dispute, without drought-cycle rotation-collapse, without walked-the-well exile; the phrase is recited at well-keeper wedding-feasts and at the keeping-book-transfer moment); **"the corridor knows her name in two seasons"** (CF-0037 cadence paralleling — the young well-keeper whose reputation has accrued at caravan-master-network scale within two drought-break caravan rotations; fast-but-unglamorous recognition, working-texture register); **"the well held its reciprocity through the drought year"** (a well-lineage that honored hospitality-due at keeping-book audit despite drought-year compression; charter-sound drylands cadence); **"the rotation came home whole"** (CF-0034 existing paralleling at CF-0046 scale — caravan-rotation completed without waiting-wolves raid, without beast-sign disruption, without sealed-cargo exposure, without well-stop default).

  - <!-- added by CF-0047 --> **Courtship and marriage (extended — well-keeper lineage catechism, CH-0018)**: drylands match-maker notebooks extend the existing inheritance-context catechism with a FIFTH named lineage-inquiry question — *"whose well does your family keep?"* — joining CF-0031 mark-inquiry, CF-0032 placement-right-inquiry, CF-0034 raid-widow-inquiry, and CF-0037 "is the stop kept in the family?" (with drylands-specific scope: the stop-kept question does NOT apply in drylands per CF-0037 structural-absence; the well-keeping question REPLACES it at drylands-scope). The match-maker records the household's well-stop lineage (which corridor, which keeping-book generation, which caravan-master rotation the stop serves, what the keeping-book inheritance looks like across the next generation) alongside the existing verse-turn evaluation per CF-0044. SOC-1 multispecies frame preserved: no species-coding in the catechism; cross-species well-keeper lineages are ordinary. A match between two well-keeper lineages from different corridors is notable — corridor-reputation exchange and keeping-book integration is a multi-generational project the match-maker tracks carefully. A match between a well-keeper inheritor-who-stays and a walked-the-well former exile from another lineage is also notable — the exile-returning side carries route-knowledge but no placement-right, paralleling CF-0037 walking-inheritor register; SOC-3 marriage-contract sacredness applies as ordinary.

  - <!-- added by CF-0046 --> **Oral storytelling (extended — station-log as FIFTH drylands literacy register, CH-0018)**: drylands oral storytelling already carries four named registers per §(d) existing annotations (long memorized poems, riddles, caravan-tale traditions, CF-0044 short-form hospitality-verse). CF-0046 commits a FIFTH drylands literacy/transmission register — the **station-log** kept at well-stops in DIS-2 trade-tongue. The station-log is NOT a new archival institution (per CH-0018 INSTITUTIONS §Recordkeeping M-9 station-log-not-a-custody-channel firewall) and NOT an eleventh/twelfth archival category; it is a household-held informal corridor-commercial record that coexists with the oral-primary dominant-transmission register. Station-log entries record traveler-counts, supply-run deliveries, caravan-rotation timing, water-share balanced allocations, occasional contract-summary paralleling tea-house-scribe witness tradition but at household-internal register. The station-log is the primary drylands literacy pedagogy substrate for apprentice-keepers (learning trade-tongue alphabet through station-log readings; learning corridor-commerce arithmetic through water-share tallies; learning keeping-book discipline through the precedent of prior-generation entries). The station-log is household-heirloom: a retiring well-keeper's station-log bundle passes to the apprentice-keeper alongside the keeping-book and the verse-counter (the three constitute the household-office-heirloom set). Station-log entries are NOT sung, NOT performed, NOT transcribed into bardic material (CF-0044 hospitality-verse is oral-ephemeral; station-log is written-but-private; the two literacy registers coexist without crossover). Children in well-keeper lineages learn to read station-log entries before they learn to turn a verse-gate — the literacy order is station-log first (household-internal skill), verse-turn second (public-protocol skill).

  - <!-- added by CF-0046 --> **Labor rhythm (extended — drought-cycle calendar-marker register, CH-0018)**: drylands labor rhythm's existing dawn-and-dusk-work / midday-rest / caravan-rotation / market-day calendar extends with drought-cycle calendar-markers that reshape ordinary-life planning beyond seasonal work-rhythm: **drought-year marriage postponement** (betrothals held from drought-year into drought-break; dowry-exchange deferred; marriage-ceremony held at drought-break when water-discipline relaxes); **drought-year apprentice-placement deferral** (apprentice-age children stay in household chore-work through drought-year; formal apprenticeship placement waits for drought-break when caravan-rotation flows can support apprentice-travel); **drought-year keeping-book audit** (drought-year reciprocity obligations compound at well-stops; the keeping-book is read aloud at drought-break — who-owes-whom the water-share, who carried hospitality-due through the dry season, who defaulted; the audit is witnessed by caravan-master and village-elder; the audit-recitation is distinct from ordinary keeping-book maintenance); **drought-year village-council militia compression** (the runner-militia rotation thins under drought-year population-pressure; able-bodied volunteers are redirected to cistern-maintenance and caravan-escort work; emergency-response capacity is acknowledged-reduced); **drought-break caravan-rotation swell** (the first rotation of drought-break is over-subscribed; caravan-masters triage supply-run priorities; well-stops experience water-pressure spikes and hospitality-obligation concentration simultaneously). The drought-cycle calendar-marker register is ordinary life-rhythm, NOT a crisis-management mode — the drylands lives across drought cycles as a structural feature rather than a cascade-failure; compound-Breakage per CF-0046 ECONOMY framework is the pathological case, not the ordinary case.

