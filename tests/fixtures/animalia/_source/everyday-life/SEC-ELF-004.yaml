    body: "drylands match-maker notebooks extend the existing inheritance-context catechism with a FIFTH named lineage-inquiry question — *\"whose well does your family keep?\"* — joining CF-0031 mark-inquiry, CF-0032 placement-right-inquiry, CF-0034 raid-widow-inquiry, and CF-0037 \"is the stop kept in the family?\" (with drylands-specific scope: the stop-kept question does NOT apply in drylands per CF-0037 structural-absence; the well-keeping question REPLACES it at drylands-scope). The match-maker records the household's well-stop lineage (which corridor, which keeping-book generation, which caravan-master rotation the stop serves, what the keeping-book inheritance looks like across the next generation) alongside the existing verse-turn evaluation per CF-0044. SOC-1 multispecies frame preserved: no species-coding in the catechism; cross-species well-keeper lineages are ordinary. A match between two well-keeper lineages from different corridors is notable — corridor-reputation exchange and keeping-book integration is a multi-generational project the match-maker tracks carefully. A match between a well-keeper inheritor-who-stays and a walked-the-well former exile from another lineage is also notable — the exile-returning side carries route-knowledge but no placement-right, paralleling CF-0037 walking-inheritor register; SOC-3 marriage-contract sacredness applies as ordinary."
  - originating_cf: CF-0046
    change_id: CH-0018
    date: 2026-04-20
    label: Oral storytelling (extended — station-log as FIFTH drylands literacy register,
    body: "drylands oral storytelling already carries four named registers per §(d) existing annotations (long memorized poems, riddles, caravan-tale traditions, CF-0044 short-form hospitality-verse). CF-0046 commits a FIFTH drylands literacy/transmission register — the **station-log** kept at well-stops in DIS-2 trade-tongue. The station-log is NOT a new archival institution (per CH-0018 INSTITUTIONS §Recordkeeping M-9 station-log-not-a-custody-channel firewall) and NOT an eleventh/twelfth archival category; it is a household-held informal corridor-commercial record that coexists with the oral-primary dominant-transmission register. Station-log entries record traveler-counts, supply-run deliveries, caravan-rotation timing, water-share balanced allocations, occasional contract-summary paralleling tea-house-scribe witness tradition but at household-internal register. The station-log is the primary drylands literacy pedagogy substrate for apprentice-keepers (learning trade-tongue alphabet through station-log readings; learning corridor-commerce arithmetic through water-share tallies; learning keeping-book discipline through the precedent of prior-generation entries). The station-log is household-heirloom: a retiring well-keeper's station-log bundle passes to the apprentice-keeper alongside the keeping-book and the verse-counter (the three constitute the household-office-heirloom set). Station-log entries are NOT sung, NOT performed, NOT transcribed into bardic material (CF-0044 hospitality-verse is oral-ephemeral; station-log is written-but-private; the two literacy registers coexist without crossover). Children in well-keeper lineages learn to read station-log entries before they learn to turn a verse-gate — the literacy order is station-log first (household-internal skill), verse-turn second (public-protocol skill)."
  - originating_cf: CF-0046
    change_id: CH-0018
    date: 2026-04-20
    label: Labor rhythm (extended — drought-cycle calendar-marker register,
    body: "drylands labor rhythm's existing dawn-and-dusk-work / midday-rest / caravan-rotation / market-day calendar extends with drought-cycle calendar-markers that reshape ordinary-life planning beyond seasonal work-rhythm: **drought-year marriage postponement** (betrothals held from drought-year into drought-break; dowry-exchange deferred; marriage-ceremony held at drought-break when water-discipline relaxes); **drought-year apprentice-placement deferral** (apprentice-age children stay in household chore-work through drought-year; formal apprenticeship placement waits for drought-break when caravan-rotation flows can support apprentice-travel); **drought-year keeping-book audit** (drought-year reciprocity obligations compound at well-stops; the keeping-book is read aloud at drought-break — who-owes-whom the water-share, who carried hospitality-due through the dry season, who defaulted; the audit is witnessed by caravan-master and village-elder; the audit-recitation is distinct from ordinary keeping-book maintenance); **drought-year village-council militia compression** (the runner-militia rotation thins under drought-year population-pressure; able-bodied volunteers are redirected to cistern-maintenance and caravan-escort work; emergency-response capacity is acknowledged-reduced); **drought-break caravan-rotation swell** (the first rotation of drought-break is over-subscribed; caravan-masters triage supply-run priorities; well-stops experience water-pressure spikes and hospitality-obligation concentration simultaneously). The drought-cycle calendar-marker register is ordinary life-rhythm, NOT a crisis-management mode — the drylands lives across drought cycles as a structural feature rather than a cascade-failure; compound-Breakage per CF-0046 ECONOMY framework is the pathological case, not the ordinary case."
