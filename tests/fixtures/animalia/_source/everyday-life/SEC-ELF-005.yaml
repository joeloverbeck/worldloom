id: SEC-ELF-005
file_class: EVERYDAY_LIFE
order: 5
heading: (e) Fenlands West — Stilt-Village Households
heading_level: 2
body: |-
  Cool, wet, marshy region. Small stilt-villages, peat-cutters, eel-fishers, waterfowl-hunters. Demographically fragile.

  - **Food**: eel, waterfowl, root vegetables, peat-smoked everything, ale, fenland mushroom in season.
  - **Water**: springs where available, boiled fen-water otherwise, careful avoidance of contaminated zones — fen-folk are sensitive to contamination signals (amphibian-folk especially, who serve as canaries for their human and mammalian neighbors).
  - **Sanitation**: difficult; raised privies; strict water-handling taboos enforced by custom.
  - **Housing**: stilt-houses, raised platforms, wattle and daub on stilt-frame, oilcloth roofs in some pockets.
  - **Clothing**: oilcloth, waterproofing oils, layered, boots near-universal.
  - **Heating**: peat hearths; smoke-management is daily craft.
  - **Childbirth**: midwife on the stilt-platform; high mortality; some travel to monastic infirmary on the dry edge.
  - **Childrearing**: early swimming, early boat-handling, early oar-craft.
  - **Aging**: small elder population — fenland life is hard on the body.
  - **Courtship and marriage**: pair-bonded in small fen-villages, exogamous traveling between villages on canal-corridor visits.
  - **Labor rhythm**: tide and season; eel-runs, waterfowl-seasons, peat-cutting season.
  - **Leisure**: long oral stories, songs about lost villages, fen-music with reed and drum.
  - **Intoxication**: peat-spirits, ale.
  - **Prayer and ritual**: water-rites, mourning songs, fen-bathing rites for some traditions.
  - **Cleanliness**: ritual fen-bathing in clean pools; oilcloth maintenance is daily.
  - **Common injuries**: drowning, marsh-ague, ague-fever, cuts on reed and rope, occasional waterfowl-hunting accident.
  - **Medicine**: herb-wife, monastic clinic on the dry edge (infrequent), travel physician rare.
  - **Death disposal**: river-release, fen-sinking in special pools (for those who consent in life), burial rare due to water table.
  - **Oral storytelling**: ghost stories about contaminated villages and ward-breaches; deep songs about ancestor-villages now sealed.
  - **Common fears**: ward-breach, contaminated artifact under the silt, plague, drowning, lost child, the village itself sinking. <!-- added by CF-0021 --> The dry-edge potter making artifacts whose contamination drifts to us first; the singing-pot whose maker died in his own kiln upstream.
  - **Common aspirations**: a sound stilt-house, a son who can swim well, escape to a canal town, a peaceful sinking-rite at the end.
  - <!-- added by CF-0021 --> **Oral storytelling (extended)**: ghost stories now include the singing-pot — a possessed dry-edge potter's vessel that hums in the dark and is said to speak names; the village burned the cottage and the pot itself was sunk in deep water under three witnesses.
  - <!-- added by CF-0021 --> **Medicine (extended)**: amphibian-folk neighbors serve as canaries for distant firings — sensitivity to artifact bleed-through allows early warning of contamination drifting from a botched dry-edge crafter attempt miles away. Herb-wives note the change in fish behavior or amphibian-folk vigilance and report to the village council.
  - <!-- added by CF-0024 --> **Labor rhythm and Medicine (extended — relay-summoning)**: fen-villages do not post contracts; they summon. When amphibian-folk vigilance detects artifact-bleed-through drifting from a botched dry-edge firing (CF-0021 consequence) or a silt-buried anomaly, the village council sends dry-edge word via monastic clinic relay to an occult-fallout specialist. Marker-reeds raised at the stilt-landing guide the inbound contractor.
  - <!-- added by CF-0024 --> **Common fears (extended — awaited specialist)**: the specialist who never arrived; the drowned contract-runner who never reached dry edge; an outland mercenary band taking the fen-path and demanding hospitality the villages cannot afford.
  - <!-- added by CF-0024 --> **Oral storytelling (extended — drowned-runner ghost stories)**: ghost-stories of fen-villages whose contract-runner drowned before reaching dry edge; songs about amphibian-neighbors who first flagged a drift and the specialist who responded too late; the fen-specialist who answered only with silence when asked what he found.
  - <!-- added by CF-0028 --> **Oral storytelling (extended — sunken-ruin cycle)**: ghost-story cycle about "sunken ruins" — partially submerged Maker-Age ruin-entrances under fen silt whose discoverers vanish. Attempted entry is treated as near-suicide; any dry-edge expedition that tried and failed becomes a generational warning. Amphibian-folk upstream-warning is the primary early-detection system for contamination drifting from attempted-reseal expedition-failures upstream; amphibian-folk specialists who correlate drift with distant expedition activity hold a specific informal authority in fen communities.
  - <!-- added by CF-0028 --> **Common fears (extended — expedition-bleed anxieties)**: a dry-edge patron-funded expedition failure bleeding contamination down the waterway; the stilt-village suspected of harboring a ruin-knowledge refugee (the survivor of a distant expedition hiding here without charter); the drowned contract-runner who never reached dry edge after being sent to summon a specialist; a sunken-ruin suspected under silt and the slow-dawning recognition that the village might be sitting over something.
  - <!-- added by CF-0031 --> **Medicine (extended — dry-edge ledger-mark queue asymmetry)**: fen-villages do not adopt the contamination-lineage ledger-mark (CF-0031) — civic-registry infrastructure is absent and demographic fragility precludes tax-funded pension streams. Fen-folk seeking monastic-clinic care at dry-edge houses adjacent to adopting heartland polities find registered heartlanders ahead of them in the queue; the asymmetry is a quiet new frustration audible in herb-wife complaint and rural-guest testimony. Amphibian-folk canaries whose contamination-detection labor has saved heartland villages occasionally face the same queue asymmetry when they themselves fall sick, which breeds a low-grade resentment the fen-village council does not resolve.
  - <!-- added by CF-0031 --> **Oral storytelling (extended — fen-widow and the mark)**: the fen-widow who walked to dry-edge for the mark (CF-0031) and came back with nothing is a ghost-story fragment in the fen register — she had no chartered standing, no civic-registry infrastructure, and the walk itself was her only welfare. The fragment circulates alongside the drowned-contract-runner and the sunken-ruin cycles as one of the fen's three ghost-story categories; the fen-widow story is the one about institutional absence rather than active harm, and fen-storytellers treat the distinction as important.
  - <!-- added by CF-0033 --> **Institutional absence (extended — dragoon non-adoption)**: fen stilt-villages do not adopt dragoon institutional form (CF-0033) — civic-registry infrastructure is absent, demographic fragility precludes standing-force, and fen ward-breach response remains in the amphibian-folk-canary-plus-monastic-clinic-relay-plus-occult-fallout-specialist frame established under CF-0024 / CF-0025. Fen-village reaction to dragoon presence at dry-edge is not-spoken-of — following the fen posture already established for CF-0028 sunken-ruin cycles and the CF-0031 ledger-mark absence. A fen emigrant who enlisted in dragoon service in a dry-edge adopting polity is spoken of only in the third person, in the past tense, and only after confirmation that no one in the current fen-village intends to follow. The fen discipline is institutional-absence-acknowledged-in-silence rather than named-idiom; this is the fen's characteristic mode of registering adjacency to institutions the fen-village cannot sustain.
  - <!-- added by CF-0034 --> **Oral storytelling (extended — the raid that sank Low Reed)**: fen-storytelling tradition carries a named village-memory category alongside sunken-ruin, drowned-runner, and fen-widow cycles: **the raid-that-sank-Low-Reed** register — for the rare-but-catastrophic bandit-raid on a stilt-village demographically-fragile enough that the raid itself ends the village. Named places — Low Reed, Bent Willow, Still Water — mark the kind of loss that fen institutional-absence-acknowledged-in-silence discipline processes rather than petitions against. The register preserves specifics (the number of stilt-platforms burned, the name of the amphibian-folk canary who gave no warning because upstream of the raid there was nothing to warn of, the fen-widow who walked dry-edge). Raid-on-fen is rarer than raid-on-oasis-hamlet or raid-on-highland-hamlet because stilt-villages are genuinely hard for outland bands to reach; but when it happens, it is catastrophic. The fen posture is not-spoken-of in the fen but is spoken of at dry-edge monastic-clinics and heartland-canal tea-houses where fen-emigrants sometimes tell the story once and then never again. Bog-causeway ambush stories are a separate subgenre — ambushes of travelers crossing the fen margins by bandit bands sheltered on peat-islands; these are routine-hazard-register rather than village-memory register.
  - <!-- added by CF-0034 --> **Common fears (extended — the silent approach and the lost contract-runner)**: silent-rule discipline, already operative for amphibian-folk canary contamination warning (CF-0021) and for bandit-approach vigilance generally, extends to include the human-approach pattern distinct from amphibian-folk signals. A village-council that sees a stranger-figure at the bog-causeway approach in the wrong season holds the stilt-platforms silent; the council does not shout, does not light signal-fires, does not summon outside — the fen calculation is that shouting draws the raid, silence may let the strangers pass. The calculation is sometimes wrong. The drowned-contract-runner (CF-0024) extends to include the specialist-runner sent to bring in a bounty-hunter during a marginal raid-alert; the runner may or may not reach dry-edge; the alert may or may not have been a real raid.
  - <!-- added by CF-0034 --> **Institutional absence (extended — fen non-participation in hunter-contractor market)**: fen stilt-villages do not fund hunter-contractor bounty-commissions — no civic-treasury, no merchant-coalition capacity, no estate-landholding structure. Fen raid-response is the monastic-clinic-relay-summoning pathway established under CF-0024: the village sends dry-edge word via monastic clinic relay; an occult-fallout specialist (CF-0025) or hunter-contractor responds if one can be summoned in time; the marker-reeds raised at the stilt-landing extend to bandit-approach signaling alongside the contamination-drift signaling. The pattern is in-register with the fen institutional-absence discipline — raid-response is another thing the fen receives from dry-edge-or-not, rather than organizes for itself. The fen-widow who walked dry-edge for the bounty (CF-0031 parallel) is a ghost-story fragment: she walked to ask for a hunter; the hunter could not be summoned in time; she walked back alone.
  - <!-- added by CF-0033 --> **Medicine (extended — dry-edge dragoon-casualty queue asymmetry)**: fen-folk seeking monastic-clinic care at dry-edge houses adjacent to adopting polities now find dragoon-casualty intake ahead of them in the queue during post-ward-breach response periods, alongside the registered-heartlander priority already flagged under CF-0031. The cumulative queue asymmetry has compounded: fen-folk face simultaneously CF-0031 registered-household priority and CF-0033 dragoon-casualty priority at adopting-polity clinic intake, and fen-folk casualty — especially amphibian-folk canary neighbors whose contamination-detection labor saved heartland villages — receive common-bench treatment unless specifically referred by an adopting-polity herb-wife. The asymmetry is a deepening frustration audible in herb-wife complaint and rural-guest testimony, though no formal magistrate-doctrine addresses it. Fen-village council does not petition redress; the fen discipline of institutional-absence-acknowledged-in-silence extends to queue-asymmetry as well.
  - <!-- added by CF-0035 --> **Labor rhythm and Medicine (extended — beast-specialist relay-summoning distinct from fallout-specialist)**: fen-village relay-summoning tradition (CF-0024 frame) extends with a distinct marker-reed sequence for inbound BEAST-SPECIALIST summons (CF-0035 hunter-contractor wildlife sub-specialty) versus the existing artifact-bleed-through fallout-specialist summon. Amphibian-folk canary vigilance distinguishes artifact-bleed signal (which triggers CF-0025 fallout-specialist summon) from large-animal-wrongness signal (which triggers CF-0035 beast-specialist summon) — a distinction that accrues amphibian-folk canary informal authority further, because the two categories require different response-specialists and the canary's discrimination gates which dry-edge relay-message goes out. The marker-reed sequence at the stilt-landing differs: a green-bound reed-bundle signals fallout-summon, a black-bound bundle signals beast-summon; a mixed bundle signals both (rare, dreaded).
  - <!-- added by CF-0035 --> **Oral storytelling (extended — fourth fen ghost-story category)**: fen-storytelling tradition gains a fourth named ghost-story category alongside sunken-ruin (CF-0028), drowned-runner (CF-0024), fen-widow-and-the-mark (CF-0031), and the-raid-that-sank-Low-Reed (CF-0034): **the fen-beast seen once at dusk** — the ghost-story of the reed-cutter or eel-fisher who saw something at the water-edge in dim light once and never again, whose tracks elders mapped without naming, whose presence may or may not have been the upstream-drift signature of a distant contamination event. Register is in-register with the fen institutional-absence discipline — the story is told once and then held in silence; specific names circulate within villages but are not spoken at dry-edge. Distinct from the CF-0021 singing-pot (which is a crafter-attempt artifact) and from the sunken-ruin (which is a Maker-substructure); the fen-beast is a creature of the waterway itself, not an object.
  - <!-- added by CF-0035 --> **Common fears (extended — upstream wrongness and the canary silence)**: fen-folk common fears extend — the upstream-current carrying a wrongness the amphibian-folk canary has not yet named; the eel-run thinning in a season when the water should have been rich; the silent night when the usual reed-insects have stopped and the amphibian-folk neighbor has withdrawn from the stilt-deck without explanation. The fen register does not name these fears aloud at first; the institutional-absence-acknowledged-in-silence discipline extends — the council does not shout, does not send out relay-summons until the pattern becomes unmistakable. Sometimes the pattern is mistaken; sometimes the beast-specialist who arrives finds nothing; sometimes the canary was right and the delay was costly.
  - <!-- added by CF-0036 --> **Structural-absence annotation (exclusionary-settlement and supremacist-doctrine presence)**: fen stilt-village demographic fragility and species-integrated fen-economy (amphibian-folk canaries serving mammalian neighbors; mammalian-folk reed-cutters protecting amphibian-folk canary-deck; the fen is multispecies-cooperative by survival-geometry) STRUCTURALLY RESIST both exclusionary single-species settlement formation AND sustained supremacist-doctrine presence. A fen stilt-village that accepted supremacist doctrine from a dry-edge preacher would lose its canary-neighbors and would be ended by the next contamination-drift it could no longer detect — the doctrine is existentially incompatible with fen survival-discipline. The fen posture is institutional-absence-acknowledged-in-silence: supremacist-doctrine preacher at dry-edge is not-spoken-of in the fen; fen-village reception of such a preacher does not rise to named-idiom rebuke, only silent-rule refusal-of-witness and village-council-not-shouting.
  - <!-- added by CF-0036 --> **Oral storytelling (extended — fifth fen ghost-story category: the village that turned one-fur and sank)**: fen-storytelling tradition gains a fifth named ghost-story category alongside sunken-ruin, drowned-runner, fen-widow-and-the-mark, the-raid-that-sank-Low-Reed, and fen-beast-seen-once-at-dusk: **the village that turned one-fur and sank** — the ghost-story of the stilt-village that accepted supremacist doctrine from a dry-edge preacher, drove its amphibian-folk canary-neighbors off the decks, and was ended by the next contamination-drift its surviving mammalian-folk inhabitants could no longer detect. Register is in-register with the fen institutional-absence discipline — the story is told once and then held in silence; specific named-places (*"Kellifen," "Marsh-Under-Three-Reeds"*) circulate within villages but are not spoken at dry-edge. The register is categorically distinct from the CF-0034 raid-that-sank-Low-Reed (which is external-raid-catastrophe) and from the CF-0021 sealed-quarter-crafter-attempt (which is contamination-catastrophe-by-artifact): the one-fur-sank register is MORAL CATASTROPHE — the village ended itself by breaking the canary-neighbor compact. The fen-storyteller distinction between "external loss" (CF-0034), "contamination loss" (CF-0021, CF-0035), and "self-inflicted moral loss" (CF-0036) is important and preserved in oral tradition. No pity-cadence; the story ends without closing-register, in-register with fen-discipline of things-not-petitioned-against.
  - <!-- added by CF-0036 --> **Institutional absence (extended — cannibal-band dry-edge rumor)**: fen stilt-villages do not participate in interspecies-cannibal-band bounty-contract-market (no civic-treasury; no capacity to hire); fen encounter with cannibal-band presence is via dry-edge rumor only, and the rumor travels to fen as to any other fen-adjacent civic-institutional category — not-spoken-of, held in silence, acknowledged only in the specific village-memory register when a fen-resident has received confirmation from a trusted monastic-clinic relay. Fen stilt-village reception of the rumor does not result in collective-action but in individual-flight or individual-endurance; the fen discipline of things-not-petitioned-against extends here as elsewhere. A fen emigrant who reported confirmed cannibal-band presence at the heartland-canal magistrate-docket is spoken of (in the fen) only in the third person, after confirmation that no one in the current fen-village intends to follow — paralleling the CF-0033 dragoon-emigrant register.
  - <!-- added by CF-0037 --> **Structural-absence annotation (family-handled waystation tradition)**: wet fenlands west does NOT host the family-handled waystation tradition (CF-0037). Stilt-village topology has no buildable foundation along bog-causeway routes for fixed roadside infrastructure; fenland trade is barge-dominant per ECONOMY §Trade Flows (peat barge, smoked-eel barge); the equivalent rest-stop function for the limited overland fen-margin travel is provided by village-tied moorages and dry-edge monastic-clinic relay points (CF-0024 / CF-0025 framing). The fen institutional-absence-acknowledged-in-silence discipline already established for CF-0028 sunken-ruin cycles, CF-0031 ledger-mark, CF-0033 dragoon-adoption, and CF-0036 cannibal-band-dry-edge-rumor extends to waystation-absence as the fen's characteristic mode of registering adjacency to institutions the fen-village topology cannot sustain. A fen emigrant who walked dry-edge and inherited or married into a stationkeeper-family is spoken of (in the fen) only in the third person, in the past tense, after confirmation that no one in the current fen-village intends to follow — paralleling the CF-0033 dragoon-emigrant register and the CF-0031 ledger-mark southern-emigrant register. No idiom needed; fen discipline of institutional-absence-acknowledged-in-silence is the register itself.

  - <!-- added by CF-0041 --> **Labor rhythm and Medicine (extended — marker-reed red-bound sealed-artifact relay-summons, CH-0014)**: fen stilt-village marker-reed relay-summoning tradition (CF-0024 frame, CF-0035 extension with green-bound fallout-summon and black-bound beast-summon) extends with a THIRD marker-reed sequence — **red-bound reed-bundle for sealed-artifact-suspected** response. When a peat-cutter's bog-harvest, amphibian-folk canary-neighbor bog-diagnosis, reed-fisher haul, or flood-erosion exposure surfaces a sealed container with Maker-Age signature (stone, ceramic, sealed metal), the fen-village convention is: do NOT break seal, do NOT attempt to open, carry the container to the stilt-landing on a double-reed mat wrapped in three layers of oiled cloth, raise the red-bound marker-reed sequence at the landing, and wait. Red-bound summons to dry-edge ward-inspector office (via monastic-clinic relay); inbound chartered containment-wright arrives by punt with the ward-inspector's stamp; the container leaves the fen-village with civic-registry disposition record. Amphibian-folk canary-neighbor bog-diagnosis is the primary early-detection system — amphibian-folk sensitivity to sealed-artifact pre-breach bleed-through precedes visible symptoms by hours or days, and canary-neighbor withdrawal from the stilt-deck or refusal to enter particular bog-pools is the fen's first sealed-find signal. NO DRILL — fen discipline preserved; the response is convention-register through marker-reed, not institutional response.
  - <!-- added by CF-0041 --> **Oral storytelling (extended — SIXTH fen ghost-story category: the seal the peat gave up, CH-0014)**: fen-storytelling tradition gains a SIXTH named ghost-story category alongside sunken-ruin (CF-0028), drowned-runner (CF-0024), fen-widow-and-the-mark (CF-0031), the-raid-that-sank-Low-Reed (CF-0034), fen-beast-seen-once-at-dusk (CF-0035), and the-village-that-turned-one-fur-and-sank (CF-0036): **the seal the peat gave up** — the ghost-story of the peat-cutter or reed-fisher who surfaced a sealed Maker-Age container from bog-depth and raised the red-bound reed-bundle at the landing, or who broke seal by mistake and took the activation cost. Register is in-register with the fen institutional-absence discipline — the story is told once at hearth-side in the winter months, not sung in public; the activation-cost-carrier is named with the fen mourning-register (drowned-runner-adjacent cadence) when the cost was lethal, named with the contamination-injured register (CF-0025/CF-0031 adjacency) when the cost was survived but disabling. No heroic register; no bardic inflation; the seal was the old world's word and the fen did not answer until it had to.
  - <!-- added by CF-0039 --> **Common fears (extended — the seal that will not let go, CH-0014)**: fen-folk common fears extend — the sealed container that the peat-cutter has been trying to remove from the bog-bottom for three mornings and that will not lift; the amphibian-folk canary-neighbor who has withdrawn from the canary-deck for reasons the herb-wife cannot identify; the peat-harvest site that the reed-cutter will not return to in a second season because the stone there "did not take the blade." The destruction-prohibition teaching reaches fen-children through the canary-neighbor register: *"what the bog gives up, the bog takes back; what the bog keeps, let the bog keep."* No attempt to destroy in the fen — the register is wait-it-out, let-the-bog-reseal, or raise-the-red-bundle.

  - <!-- added by CF-0046 --> **Institutional absence (extended — drylands corridor-complex non-participation, CH-0018)**: wet fenlands west does NOT host the drylands caravan-corridor institutional-cultural complex (CF-0046) or the drylands well-keeper customary-authority role (CF-0047). Stilt-village topology precludes corridor-node well-stop infrastructure; fenland abundant-water ecology makes water-node-anchored well-keeping economically impossible (the canary-neighbor's bog-diagnosis warns against water-contamination, not water-scarcity); fenland barge-dominant trade per ECONOMY §Trade Flows does not reproduce the caravan-rotation social substrate CF-0024 provides for CF-0046. Drylands-cadence verse-fragments do NOT travel through fen because fen register is silence-discipline (fen-village does not host stranger-exchange hospitality protocol of any kind; the fen-village receives from dry-edge-or-not per institutional-absence-acknowledged-in-silence discipline). The fen-emigrant who walked dry-edge, worked a drylands caravan-rotation, became a drylands-corridor-contractor or well-keeper-apprentice under a drylands lineage is spoken of (in the fen) only in the third person, in the past tense, after confirmation that no one in the current fen-village intends to follow — paralleling the CF-0031 ledger-mark southern-emigrant register, the CF-0033 dragoon-emigrant register, the CF-0037 waystation-emigrant register, and the CF-0043 Ash-Seal-defector register. No idiom needed; fen discipline of institutional-absence-acknowledged-in-silence is the register itself. Drylands-cadence verse-fragments carried back by a returning fen-emigrant stay within private-hearth register; public fen-village gatherings do not host drylands verse-turn.
