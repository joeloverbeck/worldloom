body: |-
  The textbook setting: small-to-mid canal-side town in the temperate heartland, mixed-species, three-storey row-cottages along the canal. Working households of artisans, canal-laborers, fishers, journey-craft.

  - **Food**: river fish, oats, rye bread, greens, mutton on feast days, cheap ale, soft cheese, dried fruit in winter. Carnivore-folk households order butchery weekly; herbivore-folk eat richly of greens and grains.
  - **Water**: canal-drawn for washing and cooking (boiled in winter and after any incident); wells in higher streets. Periodic guild testing for "wrongness."
  - **Sanitation**: night-soil collected by haulers on a route; canal-bank latrines forbidden in town center; canal-water testing posted at the lock-master's office.
  - **Housing**: row-cottages, three storeys — workshop ground floor, family middle floor, sleeping loft above. A stable for one or two animals at the back. Tail-and-ear adapted door-frames where the household requires.
  - **Clothing**: practical wool, linen, oilcloth in wet seasons. Tail-and-ear tailoring is everyday craft; off-the-rack tailors keep species-typed cuts. Fur-bearers wear less in summer; reptile-folk are rare here but where present have warming-stone arrangements at workplace.
  - **Heating and cooling**: peat or wood stove, communal bath houses, shutters and oilcloth drapes for cooling.
  - **Childbirth**: midwife, often the local herb-wife; species-specific midwives travel to towns where the population warrants. Multiple-birth species (some Cluster A) have community traditions for child-naming.
  - **Childrearing**: children apprenticed early (8–10) to family craft or guild placement; some attend charter-school for letters and figures; play on the canalside; learn to swim early in the heartland.
  - **Aging**: elders kept in household; pensioner traditions in some guilds; "settled in the loft" describes a respected old craftsman who oversees but no longer works.
  - **Courtship and marriage**: civic registry, religious blessing (common pantheon, often progenitor blessing in addition); cross-species marriage common; adoption of fostered child-of-record arranged by registry where the household wants a named heir.
  - **Labor rhythm**: dawn-to-dusk, canal traffic peaking midday, market day weekly, seasonal fairs, slack days in midwinter.
  - **Leisure**: tavern songs, dice games, seasonal fairs, bard nights, occasional contests (fishing, dog-walking, swimming).
  - **Intoxication**: ale, mead, fruit-wines in season; some carnivore-folk prefer fermented blood-broths in their own quarter (legal, niche, not advertised in mixed taverns).
  - **Prayer and ritual**: hearth prayer morning and evening; weekly temple visit; species-progenitor feast days for those whose tradition keeps them; charter-day procession yearly.
  - **Cleanliness**: bathhouse weekly (more for some species); species-typical grooming (cat-folk groom selves; beaver-folk waterproof oils; reptile-folk shed-care).
  - **Common injuries**: cuts from canal work, drownings, bites in fights, frostbite in winter, peat-stove burns.
  - **Medicine**: barber-surgeon (multispecies practice in mid-towns), herb-wife, monastic infirmary on travel circuit.
  - **Death disposal**: civic cemetery with multispecies sections; river-release accepted for some otter-folk and waterfowl-folk; cremation for hyena-folk traditions; cairn for some bird-folk.
  - **Oral storytelling**: bardic-circuit nights at the tavern; work-song lineages; family story-trades on long evenings.
  - **Common fears**: winter fever, ward breach, canal contamination, debt, child-by-the-water-too-long. <!-- added by CF-0021 --> Kiln-explosion next door; the neighbor's private workshop with shuttered windows on firing-day; apprenticing a child into a workshop without guild stamp.
  - **Common aspirations**: own one's house, raise apprentice to journeyman, retire to a small holding, see one's child placed in good guild.
  - <!-- added by CF-0021 --> **Common injuries (extended)**: burns and shrapnel from neighborhood kiln incidents added to the standard list.
  - <!-- added by CF-0021 --> **Childrearing (extended)**: warning rhymes about kiln-smoke that smells "wrong"; rule against entering a neighbor's workshop uninvited; charter-school may name the legal categories of artifact-creation offense.
  - <!-- added by CF-0021 --> **Labor rhythm (extended)**: ward-inspector walk-throughs of artisan quarters added to the inspection schedule; town fire-watch trained to evacuate adjacent row-cottages on suspected artifact-firing.
  - <!-- added by CF-0024 --> **Leisure (extended)**: tavern notice-boards and lockmaster posting walls carry adventurer-contractor postings — caravan escort, wildlife, dredger-escort, and occasionally the dreaded occult-fallout calls. Rotating contractors drink in the mixed room; locals know which returning veteran came back from a fallout job this month. Tavern-keeper vouch is a real social asset — an unvouched stranger signing at the wall is watched closely.
  - <!-- added by CF-0024 --> **Common fears (extended)**: a posted contract taken by a stranger with no tavern-vouch; a household business overheard by a drinking bard who turns out to be contracted; a contractor who takes a down-payment and does not return.
  - <!-- added by CF-0024 --> **Childrearing (extended — contract norms)**: rhyme warning children not to repeat household business near a bard until the bard is known by someone local; tavern-keepers teach children to recognize the ward-inspector's call signs so posted "livestock rage" or "breath that stings" contracts can be routed properly; charter-school may name the categories of contract breach.
  - <!-- added by CF-0024 --> **Oral storytelling (extended)**: named-veteran reputations circulate as a minor bardic subgenre — the contractor who survived; the contractor who refused; the contractor who did not come back. Widows' pensions negotiated through tavern custom rather than chartered guild protections; widow-of-the-job is a recognized household category.
  - <!-- added by CF-0026 --> **Common aspirations (extended for refusers)**: a small reform current within common-pantheon households takes pride in refusing artifact-fallout work on principle, treating the refusal as moral witness; this is neither mainstream nor fringe but a recognizable cultural thread.
  - <!-- added by CF-0028 --> **Leisure (extended — ruin-expedition scouts)**: patron-agent scouts lodge upstairs for weeks at a time, recruiting at bard-nights for multi-week expeditions; the sign-on is distinct from day-posting wall work — longer commitment, higher hazard, coin advance plus expedition-share contract. Fresh-minted "ruin-coin" (an informal term for expedition-advance payment) circulates visibly in the market till and is regarded with suspicion by tavern-keepers who prefer coin with known provenance.
  - <!-- added by CF-0028 --> **Common fears (extended — ruin-job register)**: a neighbor's son signing a ruin-expedition contract and not returning in time for harvest; a patron-agent lodging upstairs whose intentions the household cannot read; ruin-coin arriving in the household without explanation; a widow-hood that arrives clustered (whole expedition lost means whole street mourning at once).
  - <!-- added by CF-0028 --> **Childrearing (extended — ruin-offense register)**: skip-rope rhyme about ruin-doors ("one-two-three, don't go down; four-five-six, the door stays shut"); charter-school in larger towns names "ruin-knowledge possession" and "expedition-breach" as offense tiers alongside the existing ward-related offense categories; children learn early that some questions about ruins are not asked.
  - <!-- added by CF-0028 --> **Oral storytelling (extended — ruin-cycle vs tavern-veteran accounts)**: bardic "ruin-cycles" — showier, more inflated, more fictional than CF-0024's contracted-veteran subgenre — circulate as a distinct subcategory. Townsfolk learn to tell the difference between a ruin-cycle bard (patron-commissioned, narratively embellished) and a tavern-veteran account (scarred, dryly mocking of glory). Both are real cultural goods; the distinction is part of cultural literacy.
  - <!-- added by CF-0031 --> **Aging (extended — the mark)**: in adopting polities, household deliberation over taking the ledger-mark (CF-0031) for an aging extractor or containment-wright patriarch — register for widow-supplement and monastic-clinic priority, or decline to preserve marriage prospects for grandchildren. "Did your grandfather take the mark?" enters marriage-broker catechism. The elder is consulted but the household decides.
  - <!-- added by CF-0031 --> **Medicine (extended — ledger-mark intake)**: barber-surgeon and herb-wife in artisan quarters route empirical contamination-diagnosis into registry-eligibility adjudication; monastic-clinic intake-scribe asks "have you or your people taken the mark?" at admission in flatly procedural cadence — the absence of pity is itself a tonal register. Priority line to the left; common bench to the right. The barber-surgeon's note on the ledger is field-empirical notation the civic scrivener later reconciles into the registry record.
  - <!-- added by CF-0031 --> **Childrearing (extended — the mark and the scrivener)**: skip-rope rhyme — *"one-mark, two-mark, three-mark gone / grandfather's ledger, don't read on."* Charter-school in larger heartland towns names registry-fraud and fraudulent-registration as offense tiers alongside ward-related offenses. Children in registered households learn not to mention the family's ledger-mark at playmate houses; children in unregistered-but-eligible households learn not to ask.
  - <!-- added by CF-0031 --> **Common fears (extended — the mark and the scrubber)**: the neighbor who took the mark and the neighbor who didn't; the marriage-broker asking to see the ledger-leaf; the registry-scrubber's knock at dusk in punitive polities; the clinic-scribe asking the question in the flat procedural voice; the civic-watch clerk whose visit is always "routine."
  - <!-- added by CF-0031 --> **Oral storytelling (extended — registered-widow subgenre)**: tavern-veteran account now sorts by "registered widow" vs "unregistered widow" — the widow who took the supplement and raised her children on stigma's coin, vs the widow who refused and raised them in debt. Magistrate-court docket-clerk tavern gossip carries registry-fraud tales as a recurring supper subgenre; type-sample circulates: "the Thurrow widow tried to scrub her father-in-law's mark and got caught at it." Both the widow and the clerk are treated as ordinary, not heroic.
  - <!-- added by CF-0032 --> **Housing (extended — subsection shop presence)**: in canal-corridor ancestral Cluster C polities, the artisan-quarter includes a recognizable oversize-saddlery subsection shop — taller than ordinary workshops, with a wide double-door for reinforced wagon-beds, a street-side barge-refit yard in canal-lock towns, and the characteristic smell of oversize-hide curing. The subsection-apprentice tenant-cottage is a recognizable household category in these quarters: a family where one son or daughter has been placed with the subsection and returns between reciprocal-journey segments with a dusty pack and a journeyman's hand-tool roll.
  - <!-- added by CF-0032 --> **Labor rhythm (extended — subsection apprenticeship and commission)**: in ancestral-polity canal-corridor towns, subsection-commission visits by estate stewards (ordering a mammoth-folk civic official's chair or a ground-sloth-folk tenant cottage's reinforced loft-ladder) are ordinary artisan-quarter texture. Reciprocal-journey travel schedules are posted on the guild-house wall; departures and returns punctuate the year like caravan rotations punctuate drylands time.
  - <!-- added by CF-0032 --> **Common aspirations (extended — subsection placement)**: for Cluster C families in ancestral polities, subsection-apprenticeship placement for a child is a recognized aspiration alongside ordinary guild placement and haulage-work placement; declining a subsection offer is a recognized life-decision ("the boy chose his father's teams"), and accepting one that fails (returned to haulage with partial skills) is a recognized disappointment, neither tragic nor prestige-scandal.
  - <!-- added by CF-0032 --> **Common fears (extended — subsection register)**: the journeyman who did not return from reciprocal travel; the subsection-master's death with multiple heirs claiming placement-right; a subsection-seal forgery scandal uncovered in an estate-commission chair; the tenant-cottage apprentice who failed the reciprocal circuit and came home with partial skills and no seal.
  - <!-- added by CF-0032 --> **Childrearing (extended — subsection rhymes and seals)**: skip-rope rhyme about the three reciprocal-polity masters ("north for the horn, south for the hide, east for the fit") teachable to children in ancestral-polity artisan quarters; children in ancestral polities learn to recognize the subsection-seal alongside the ward-inspector call signs (CF-0024) as civic literacy; charter-school in larger ancestral-polity towns names subsection-seal forgery among offense categories.
  - <!-- added by CF-0032 --> **Oral storytelling (extended — subsection work-song and reciprocal-travel lineage)**: a bardic subgenre of subsection-master reputation tales accretes alongside the CF-0024 contracted-veteran subgenre and the CF-0028 ruin-cycle subgenre; kept in AES-1 register (work-song of the journey — the tedium of the road, the missed harvest, the homesick apprentice-note — rather than heroic cycle), though patron-commissioned bards sometimes inflate. M-7 reputation-genealogy firewall extension (CH-0006) applies: subsection-master reputations are subject to the same procedural-competence / oracle / bard-accretion / mixed contested readings; no subsection-master holds world-level authority on Cluster C ancestry or Maker-Age questions.
  - <!-- added by CF-0033 --> **Housing (extended — adopting-polity dragoon presence)**: in adopting heartland canal-towns, artisan-quarter row-cottages carry a chalked sigil at the lintel when the household has deliberately registered a dragoon-cooperation preference (a reform-aligned civic signal: "evacuation-walk starts here"); other households leave the lintel plain, which carries no stigma but is noticed. Dragoon barracks occupy civic-quarter ground, typically converted from an older chartered-watch station or new-built on canal-levied land; turnout-call (a characteristic three-note whistle cadence) is recognizable across the town's working-household rhythm.
  - <!-- added by CF-0033 --> **Labor rhythm (extended — ward-inspector walk-through)**: in adopting polities, the weekly ward-inspector walk-through now coordinates with dragoon drill-day rota; inspectors and dragoon corporals meet at canal-post stations to coordinate coverage. Residents notice when the inspector's walk is accompanied by a dragoon in plain turnout — this signals either active ward-breach declaration review or a council-audit of dragoon conduct, and the household falls quieter when the pair passes.
  - <!-- added by CF-0033 --> **Childrearing (extended — cordon-drill and the three-note whistle)**: skip-rope rhyme in adopting polities — *"one-post, two-post, three-post hold / four-post, five-post, the seal's too cold."* Charter-school in larger adopting towns names "impersonation-of-dragoon" and "mission-breach" as offense tiers alongside ward-related and ruin-related offenses. Children learn the three-note dragoon whistle-cadence and the cordon-marker hand-signal as part of ward-breach drill, distinct from but coordinated with the older evacuation-route drill their grandparents learned.
  - <!-- added by CF-0033 --> **Aging (extended — the retired dragoon)**: retired dragoons in adopting polities are a recognizable neighborhood category — pensioner households where the old dragoon sits by the stove with the turnout-boots oiled and hanging on the hook, called on by civic-advisory panels for ward-breach contingency input and by magistrate court as character witness in charter-court mission-creep hearings. The retired dragoon is NOT a veteran-storyteller figure (that's CF-0020 / CF-0024 / CF-0028); he is more often the dry witness who corrects the ballad-bard's inflation and the civic-advisory body that slow-walks council overreach. A retired dragoon who takes up clergy-adjacent advocacy against mission creep is a recognized CF-0026 alignment pattern.
  - <!-- added by CF-0033 --> **Leisure (extended — three-layer dragoon bardic register)**: tavern bardry in adopting polities now stratifies dragoon material into three recognizable layers: (i) patron-commissioned ward-saved-the-quarter ballads (institution-competence inflated; sung at civic-feast; inflated about the INSTITUTION not the INDIVIDUAL — never a named lieutenant's charge, always "the perimeter held"); (ii) tavern-veteran dragoon accounts (dry, numerical, pensionable-service register — *"we pulled sixty out of that tenement; the registry says forty-three"*); (iii) anti-dragoon charter-court opposition broadsides (procedural-litigious register; cited precedent; named concession breached; NOT revolutionary pulp — litigious not insurrectionary). Working-household listeners discriminate between the three registers; that discrimination is part of adopting-polity cultural literacy.
  - <!-- added by CF-0033 --> **Common fears (extended — adopting and non-adopting)**: in adopting polities — the dragoon whistle in the small hours that means your neighbor's ward just broke; the impersonator caught at the cordon and the quarter-town embarrassment that follows; the retired dragoon speaking for council-authority during a contested civic-advisory hearing; the charter-court challenge that names the household's street as mission-creep evidence. In non-adopting heartland polities — the old ad hoc chartered-watch-plus-guild coordination arriving too slowly; the named idiom *"we still run the old-walk"* carries pride with a quiet undercurrent of exposure when a neighboring adopting polity posts faster breach-response times in the civic-register broadsheet.
  - <!-- added by CF-0033 --> **Oral storytelling (extended — funerary)**: dragoons killed in the line of ward-breach duty receive a civic funerary with dragoon-unit escort and civic-treasury coffin-allowance, distinct from extractor-funerary (guild-paid, containment-wright attendance) and from CF-0024 contractor-funerary (family-and-tavern, no civic coverage). The dragoon-killed-at-cordon ballad is a specific subcategory of the tavern-veteran dragoon account register — scarred, numerical, named by street not by officer, and ending in pension-coverage arithmetic rather than eulogy. Children remember the name of the street where the dragoon fell, not the name of the dragoon.
  - <!-- added by CF-0034 --> **Common fears (extended — the road and the empty door)**: the road that runs between canal towns where canal traffic does not and the bargeman will not take you after dark; the tavern-stranger with road-dust still on him who asks too many questions about the household's harvest; the neighbor's door left open on a market morning; the kin who walked south after the lean winter and whose name came back in a bounty-posting three seasons later. Skip-rope rhyme: *"one-mile, two-mile, don't walk alone / three-mile, four-mile, the hollow takes its own."*
  - <!-- added by CF-0034 --> **Leisure (extended — bounty-wall and hunter-return)**: tavern notice-boards in heartland canal towns now stratify postings by type — the CF-0024 contractor-board on the left (caravan-escort, wildlife, dredger-escort, occult-fallout), the CF-0028 expedition-scout postings in the back corner (patron-agent recruitment), and the **settlement-bounty wall** beside the lockmaster's door where bounty-contracts for specific bandit-captains or camps are posted with coin-amount and conditions. Locals watch the wall the way their grandparents watched the weather-post. Returning hunter-contractors drink in the mixed room alongside returning extractor-contractors and expedition-veterans; the register-discrimination for listeners is fine-grained (a hunter-veteran's account has a different cadence than an expedition-veteran's, and both differ from an extractor's). Tavern-keeper vouch extended — an unvouched stranger signing at the bounty-wall is watched more closely than one signing at the contractor-board.
  - <!-- added by CF-0034 --> **Childrearing (extended — warn-rhymes and the bounty-wall)**: warning rhyme about strangers on empty roads added to the existing rotation (alongside CF-0021 kiln-smoke rhyme, CF-0024 unvouched-bard rhyme, CF-0028 ruin-door rhyme, CF-0031 ledger-mark rhyme, CF-0033 cordon-post rhyme); children learn to recognize the bounty-posting cadence on the lockmaster-door wall and the civic-watch offense tiers for harboring, fencing, and ransom-proxy. Children in exposed-district households are taught not to speak of the household's wealth or harvest timing to any traveler whose vouch the family cannot place. Raid-widow-idiom within CF-0024 widow-of-the-job catechism: *"did your kin come back from the raid?"* is a marriage-broker question in districts near known corridors.
  - <!-- added by CF-0034 --> **Housing (extended — fortified coaching-inn register)**: on wildland stretches between canal towns where the lockmaster-post does not reach, chartered coaching-inns carry a recognizable fortified register — walled yard, gatehouse with bar, stables inside the wall, upper-storey shutters the innkeeper latches at dusk. Canal-corridor heartland artisan-quarter row-cottages do not themselves fortify — the corridor is canal-bound and thus relatively bandit-safe; the fortification register migrates to the overland connector-routes. The village palisade in small heartland settlements between canal towns is a recognized architectural type, distinct from the canal-town stone-wall register and from the highland-hamlet stockade pattern.
  - <!-- added by CF-0034 --> **Common aspirations (extended — retrieval and return)**: small and specific — the retrieval of a kidnapped kin alive; the bounty paid out without argument; the hunter-veteran who came home with the purse intact; the tenant-cottage child who did not walk south in a lean winter. The aspirations are in-register — survival, recovery, continuation — not glory.
  - <!-- added by CF-0034 --> **Oral storytelling (extended — raid-lament and hunter-return)**: tavern bardry in heartland canal towns now includes four recognizable bandit-related subgenres discriminable by working-household listeners — (i) raid-lament songs about named destroyed settlements and their widow-counts (scarred, aftermath-register, AES-1 cadence); (ii) hunter-contractor return accounts (dry, numerical, pensionable-cadence — *"we hunted the corridor in the wet month; two of four came back, one won't say"*); (iii) named-bandit-captain bardic cycles (civic-mobilization register whose historicity is contested per Mystery Reserve M-14; listeners know to read them as propaganda); (iv) bounty-ethics reform broadsides (litigious register, cited precedent, arguing trial-not-summary; sung in reform-current neighborhoods, less in refuser-aligned ones). Bardic moral-witness-refusal: no ballad for a captain whose camp held slaves beyond threshold in mainstream traditions — sectarian-commissioned bards violate this threshold for pro-supremacist recruitment, and listeners mark the breach.
  - <!-- added by CF-0035 --> **Leisure (extended — bounty-wall fourth column)**: the settlement-bounty wall beside the lockmaster's door (CF-0034 innovation) gains a fourth posting column for **verified-beast bounties** — specific wildland-corridor sightings of mutated non-sentient beasts (CF-0035), coin-per-carcass-part, bounty-clerk-certification conditions on where the carcass may be delivered, trophy-provenance clause. Locals watch the beast-column less than the bandit-column but the postings hold the same cadence. Unvouched strangers signing at the beast-column are watched more closely than those signing at the routine-wildlife (CF-0024) column; tavern-keeper vouch extends accordingly.
  - <!-- added by CF-0035 --> **Common fears (extended — the carcass at the pasture-edge)**: the carcass at the pasture-edge in a lean season with too many limbs; the track the old trapper will not name; the bear that is not a bear, met twice by the same drover and not the same size either time; the beast-horn inlay commissioned by a neighbor whose provenance the carpenter will not voucher; the verified-trophy in the dock-market whose bounty-clerk stamp is weeks old.
  - <!-- added by CF-0035 --> **Oral storytelling (extended — fifth tavern-bardic subgenre: beast-hunter return)**: tavern-veteran bardry now includes a fifth recognizable hunter-related subgenre alongside CF-0034's four bandit-related subgenres: **beast-hunter return accounts** — dry-numerical, corridor-named-not-hunter-named, in AES-1 scarred register (*"we walked the deep wood three days; we brought back the head; the bounty-clerk paid; one of the four stayed in the wood"*). Working-household listeners discriminate beast-hunter cadence from expedition-veteran (CF-0028), contractor-veteran (CF-0024), fallout-specialist (CF-0025), dragoon-veteran (CF-0033), and bandit-hunter (CF-0034) cadences; the discrimination is part of adopting-polity cultural literacy. Bardic mainstream withholds heroic ballad-status from beast-hunt material — no chosen-one cadence, no witcher-school register, no kingdom-threatening-quarry framing; sectarian-commissioned bards (Maker-mystic cult-recruitment; progenitor-supremacist lineage-assertion) who violate the threshold for propagandistic ends are marked by listeners as the breach is marked in CF-0034 pro-supremacist captain-cycles.
  - <!-- added by CF-0035 --> **Childrearing (extended — skip-rope rhyme and beast-offense tiers)**: skip-rope rhyme joining the existing rotation (CF-0021 kiln-smoke, CF-0024 unvouched-bard, CF-0028 ruin-door, CF-0031 ledger-mark, CF-0033 cordon-post, CF-0034 hollow-road): *"one-step, two-step, don't cross the ring / three-step, four-step, the deep wood has a thing."* Charter-school in larger heartland towns names as offense tiers (i) unvouched trophy-sale, (ii) hunting in a sanctioned-haunt without civic permit, (iii) harboring a beast-part of unverified provenance. Children learn to recognize the bounty-clerk stamp on a certified trophy alongside the ward-inspector call signs and the dragoon cordon-marker.
  - <!-- added by CF-0035 --> **Market posture (extended — bounty-clerk stamp before the price)**: heartland market-workshops (ceramic, wood-inlay, leather, bone-carving) ordering beast-parts for craft-work require the bounty-clerk's mark before negotiating price — the workshop standard response to a customer offering beast-horn inlay is *"the clerk's mark, then the price."* Uncertified beast-parts are civic-refusal category in most heartland polities; the workshop loses charter standing if caught working uncertified material. The refusal register parallels the CF-0021 grimoire-transit refusal among workshop-masters.
  - <!-- added by CF-0036 --> **Leisure (extended — tavern joke-threshold)**: mixed-species tavern banter holds a codified joke-threshold enforced by tavern-keeper vouch-withdrawal. In-register dry-tavern species-humor is ordinary ("the beaver foreman dryly told the toad-folk hire to go deal with the slimy matters, and the toad-folk hire dryly went"); the threshold rules are *"never about the mother species; never about bodily needs in mixed company; never the mother's-mother rhyme after the third drink."* Tavern-keeper pulls the vouch on patrons who cross; repeat-breach patrons face civic-watch hate-speech docket under charter. Sectarian supremacist-doctrine preacher at the tavern-edge is run off the porch by closing time in mainstream heartland taverns; the pamphlet is taken to the magistrate's docket-stove. The joke-threshold pedagogy is taught early in mixed-species households ("good-joke / bad-joke distinction") and reinforced at the workshop floor by masters correcting journeymen and apprentices.
  - <!-- added by CF-0036 --> **Labor rhythm (extended — crew-master mix-sound hire-catechism)**: canal-barge, dredger, caravan-escort, extraction-escort, and mixed-workshop hiring includes the crew-master's hire-catechism — *"mix-sound crew?"* — asked at the posting-wall or lockmaster-wall before coin-exchange. Foreman mix-sound judgment (predicting which species-composition will hold under job pressure) is a recognized labor-skill on par with waiting-wolves judgment and cargo-refusal judgment; foremen earn their coin by knowing when to let the joke pass, when to pull a crew member off a shift, when to refuse a crew-composition the patron pressed. Crew-composition premium on documented mix-sound-functioning crews is modest but present; single-species-default crews from exclusionary-settlement intermediaries carry silent discount. A canal-mud-refusal harassment incident (ermine-folk ledger-clerk pressing beaver-folk canal-laborer to accept lower rate on canal-dredging contract citing "what you're meant for") reaches civic-watch hate-speech docket under CF-0036 charter.
  - <!-- added by CF-0036 --> **Courtship and marriage (extended — mix-hearth catechism)**: marriage-broker catechism in exposed-district heartland households includes *"does your mother sit at a mixed hearth?"* — a quiet question about in-law species-tolerance, paralleling the CF-0031 ledger-mark catechism and CF-0034 raid-widow catechism. Charter-sound mixed-species households answer quietly and at length; single-species-leaning households answer tersely. Cross-species marriage remains reproductively impossible (ONT-3) and legally ordinary (SOC-1); the catechism tests the household's social reception of cross-species marriage, not its legal availability.
  - <!-- added by CF-0036 --> **Childrearing (extended — good-joke / bad-joke pedagogy and one-fur rhyme)**: mixed heartland households teach the good-joke / bad-joke distinction from early years — *"you can tell a tortoise-folk he's slow-on-the-road to his face; you cannot tell him his mother laid dim eggs. You can say slimy matters to a toad-folk about canal mud; you cannot say slimy matters in his grandmother's hearing about her child."* Skip-rope rhyme joining the existing rotation (CF-0021 kiln-smoke, CF-0024 unvouched-bard, CF-0028 ruin-door, CF-0031 ledger-mark, CF-0033 cordon-post, CF-0034 hollow-road, CF-0035 deep-wood): *"one-fur, two-fur, don't stop at the hold / three-fur, four-fur, all the rows look the same."* Charter-school in larger heartland towns names as offense tiers (alongside existing tiers): (i) **progenitor-supremacist solicitation of minor students**, (ii) **canal-mud-refusal harassment among apprentices**, (iii) **mother-species-mockery among pupils in mixed cohort**. Children learn the tavern joke-threshold implicitly through workshop-floor correction. Cannibal material is categorically excluded from child-register content (no skip-rope rhyme; aftermath-household-vocabulary only, overheard adult conversation that children learn not to ask about).
  - <!-- added by CF-0036 --> **Medicine (extended — barber-surgeon cross-species practice register)**: herb-wife registry includes reputation-entries on which practitioners refuse or poorly-serve particular species ("he won't treat a toad-folk cut proper") — the refusal is malpractice-adjacent; repeat-refusal practitioners lose charter-adjacent reputation; civic-watch hate-speech docket admits complaints where the refusal crosses into refusal-of-emergency-care. Barber-surgeon cross-species training is an informal apprentice-pipeline practice ("walk the wards with three species before you take your own knife") that civic-charter does not mandate but mixed-town practice expects.
  - <!-- added by CF-0036 --> **Prayer and ritual (extended — hearth-prayer in mixed households)**: mixed-species households practice hearth-elder arbitration when a progenitor-cult enthusiast's supremacist-cadence rhyme crosses the joke-threshold in the marriage-home ("the First Beaver set the canal; the mother-species sits at this hearth"). Lineage-supremacist hearth cadence is contested-sectarian, not world-truth; aspectualizing progenitor-cult lineage-keepers who married into mixed households discourage the cadence in family setting, reserving it for progenitor-cult shrine visits.
  - <!-- added by CF-0036 --> **Death disposal (extended — mixed-cemetery sectional tensions and sealed-case burial)**: ermine-folk dowager contesting plot-proximity to beaver-folk canal-labor section reaches cemetery-master; cemetery-master generally refuses species-separation requests as charter-adjacent hierarchy-speech; dowager-gossip circuit tracks refusals as reputation-signal. Sealed-cannibal-case victim-remains receive SEALED-DOCKET BURIAL — magistrate-warrant-gated record, burial-officiant civic-oath to preserve silence-protocol, public ceremony absent, family-only rites permitted, cemetery-master notes euphemistic *"grave-violation-of-person victim"* on plot-ledger. The neighborhood grieves at the silence; the household buries without speaking; the winter passes and the plot-marker carries no name.
  - <!-- added by CF-0036 --> **Oral storytelling (extended — silenced-contractor ballad subgenre)**: tavern bardry in mixed heartland canal towns now includes a recognizable **silenced-contractor ballad subgenre** — witness-refusal songs in AES-1 scarred-veteran cadence sung by itinerant bards (*"he brought back the coin and the scar and the silence; he drank the silence alone in the winter-rota; the widow kept the farm and did not ask twice"*). Patron-commissioned bards refuse the subgenre (charter-position risk); reform-current clergy-commissioned bards perform refutation broadsides in litigious-procedural register under hearth-god and judgment-god pairings; sectarian-commissioned bards who inflate the subgenre for supremacist recruitment (framing the silenced contractor as martyr-witness for cult-doctrine) are marked by listeners as the breach is marked in CF-0034 pro-supremacist captain-cycles. The silenced contractor is the dredger who keeps singing at the tavern, NOT the protagonist who exposes the watch — hero-drift firewall.
  - <!-- added by CF-0036 --> **Common fears (extended — returning-enclave idiom, civic-watch-overwhelmed register, sealed-case-upstream-dread)**: the tavern-joke that crossed the line and the vouch that was pulled; the returning kin from a single-species highland enclave speaking in new cadence his mother marks (*"he's got the one-fur talk now"*) — paralleling *"took the coin-for-shame"* / *"took the coin-for-service"*; the bounty-poster at the lockmaster's wall that names a cannibal-camp upstream and the civic-watch that cannot reach it fast enough (civic-watch-overwhelmed register — exasperated-household-talk, not conspiracy-thriller cadence; *"the inspector was reassigned; the case was re-classified; the winter came and the camp moved"*); the foreman who accepted a patron-pressed single-species crew and lost the second-day job to a walkout.
  - <!-- added by CF-0037 --> **Housing (extended — connector-route waystation register)**: in heartland canal-towns whose overland connector-roads lead to settlements canal traffic does not reach, family-handled waystation households (CF-0037) on the road-edge a half-day's wagon-haul out are ordinary-and-recognizable. Smaller than CF-0034 chartered coaching-inns (which are walled, gatehouse-bar, fortified register); the waystation is a roadside building with stable, supply-storage, and traveler-rest space, often partially fortified on wildland stretches but never the chartered coaching-inn typology. Passed kin-to-kin; supply-tied to the nearest canal-town artisan-quarter for grain, ale, fodder, candles, tack-repair. The waystation-tenant cottage and the canal-town artisan-quarter are paired in supply-and-gossip flow; the stationkeeper-family children come into town with the supply-cart on market day and are recognizable.
  - <!-- added by CF-0037 --> **Childrearing (extended — stationkeeper-child register and skip-rope rhyme)**: stationkeeper-children (CF-0037) are a recognizable life-stage category in connector-route villages and adjacent canal-town artisan-quarters — chore-bound from age 6-7 (earlier than the canal-town age-ten apprentice norm), encouraged to marry locally, expected to remain stationkeeper for life unless they walk away. Skip-rope rhyme joining the existing rotation (CF-0021 kiln-smoke, CF-0024 unvouched-bard, CF-0028 ruin-door, CF-0031 ledger-mark, CF-0033 cordon-post, CF-0034 hollow-road, CF-0035 deep-wood, CF-0036 one-fur): *"one-stop, two-stop, the road runs long / three-stop, four-stop, the boy who walked is gone."* Charter-school in larger heartland towns informally tolerates stationkeeper-children's chore-from-young pattern where charter-school enrollment is maintained; the tension between household-trade labor and chartered-school enrollment is unevenly adjudicated where enrollment lapses (per INSTITUTIONS §Law CH-0012 (g) child-labor-vs-charter-school friction docket).
  - <!-- added by CF-0037 --> **Courtship and marriage (extended — local-marriage catechism)**: marriage-broker catechism in heartland connector-route households extends with a fourth named inheritance-context question alongside CF-0031 ledger-mark inquiry, CF-0032 placement-right inquiry, and CF-0034 raid-widow inquiry: *"is the stop kept in the family?"* The question tests for stationkeeper-inheritance pattern as a kinship-asset-class adjacent to other inheritance-asset classes. Stationkeeper-family households answer at length about which heir is staying and which has walked, which is part of the dramatic kinship-frustration register the marriage-broker reads for in-law compatibility planning. The encouraged-marriage-locally expectation in CF-0037 means stationkeeper-families often inter-marry within the connector-route radius; placement-right partition at multi-heir succession is a recognized dowry-negotiation complication.
  - <!-- added by CF-0037 --> **Common fears (extended — the boy who walked the stop and the bandit-fronting station)**: the stationkeeper-child who self-exiled and whose name came back in a CF-0034 bounty-posting three seasons later (paralleling the lean-winter-walker grief register); the multi-heir succession that closed the family stop mid-litigation while travelers piled up at the next stop two days down the road; the bandit-fronting waystation that turned to corridor-betrayal (provisioning a raid-band, signaling traveler arrival for kickback) and brought civic-watch and hunter-contractor commission down on the family — the sharpest of waystation scandals; the stationkeeper-cousin who walked, joined a band, and is rumored to be the one who taught the band the corridor's stops.
  - <!-- added by CF-0037 --> **Oral storytelling (extended — stop-keeper subgenre)**: tavern bardry in heartland canal-towns whose connector-roads host family-handled waystations now includes a recognizable **stop-keeper subgenre** — kept-stop and walked-stop accounts in AES-1 scarred-veteran cadence applied to ordinary commerce. *"He kept the stop"* (the inheritor who stayed; settled-resigned-respectable; the cadence carries pride and resignation in equal measure); *"he walked the stop"* (the inheritor who left; named in third-person mourning paralleling CF-0034 lean-winter-walker register, NOT chosen-protagonist register); *"the boy chose his father's road"* (the staying choice, in-register with the existing CF-0032 *"the boy chose his father's teams"* idiom); *"the daughter the road kept"* (the inheritor-by-default-when-eldest-walked). Bardic mainstream WITHHOLDS heroic-cycle status from runaway-stationkeeper material per the WORLD_KERNEL.md What Is Taboo extension — no chosen-one cadence, no destined-adventurer register, no tragic-romantic-runaway framing; the walked-the-stop child is the third-person mourned, NOT the protagonist. Sectarian-commissioned bards who violate the threshold by inflating runaway-stationkeeper material into hero-ballad register are marked by listeners as the breach is marked in CF-0034 pro-supremacist captain-cycles and CF-0035 sectarian beast-cycle inflation patterns.
  - <!-- added by CF-0038 --> **Housing (extended — Brinewick canal-bend address idiom and fog-shutter register)**: in Brinewick (CF-0038) artisan-quarter row-cottages are addressed by canal-bend and lock-number (*"Third Bend, Lock Four, above the ropewalk"*; Fourth Bend at Lock Four is prestige, Seventh is journeyman-affordable) rather than by street-name; artisan-quarter registration follows canal-guild ledger alongside civic ward. Fog-shutter design is distinctive — heavier oilcloth, inner-slat, dawn-opened-by-the-eldest-awake as an ordinary household rhythm. Three-storey row-cottages face canal-side with workshop-ground / family-middle / sleeping-loft layout common to the heartland. Downtown-civic-core cottages are distinct from outskirts-estate register per §(b) — the walk between them is a recognized civic-literacy boundary ordinary Brinewick children learn before age twelve.
  - <!-- added by CF-0038 --> **Labor rhythm (extended — Brinewick fog, lamp-lighter, and foghorn rota)**: dawn-fog delays barge loading at the saltwater-freshwater confluence bends until the lock-master's bell, ordinary canal-quarter rhythm. The lamp-lighter guild's evening route from the Copper Weir quarter outward is the audible town-clock after vespers; the three-tone foghorn at Lock One signals barge-traffic hold. The briny smell hits the market-walker specifically at Fourth Bend where saltwater-marsh-fed lock meets freshwater canal — locals call this *"the briny line."* The weekly ward-inspector walk-through in Brinewick coordinates with canal-warden inspection-log cycles (INSTITUTIONS Military/Defense §canal-warden extension) and with dragoon drill-day rota in the adopting-polity commitment (CF-0038 CH-0013 five-axis commitment) — tripled civic-presence rhythm in the canal-quarter on a standing weekly cadence. Canal-circuit tavern rotation (see Leisure extension below) punctuates the artisan-quarter week by quarter-year; bardic sign-on at posting-walls follows the CF-0024 tavern-board cadence with four named anchor subtypes (CF-0024 contractor-board left, CF-0028 expedition-scout back corner, CF-0034 settlement-bounty wall beside lockmaster's door, CF-0035 wildland-beast fourth column) already committed plus Brinewick's fifth named subtype: the **canal-circuit bard-posting board** beside the lockmaster's interior lintel, posted at quarter-year turn.
  - <!-- added by CF-0038 --> **Leisure (extended — canal circuit and the named taverns)**: the bardic **canal circuit** is a six-tavern quarter-year seasonal rotation (four unnamed venues rotate alongside the two named anchors; other venues deferred to story-demand per OPEN_QUESTIONS). The anchors are **The Copper Weir** (founded decades back; serves *lock-cordial* and keeps a resident otter-folk keeper; the highest heartland bardic aspiration short of chartered Reach-cycle is to "play the Copper Weir"; the tavern-keeper's hearth-board names bards who "walked the circuit clean" — completed one full quarter-year rotation retaining tavern-keeper vouch, a named regional-bardic-status distinct from CF-0017 regional-hub bards) and **The Lock-Keeper's Cat** (founded similarly old; serves *weir-ale* — house-brewed, hopped with marsh-herb; named for a historical lock-keeper's cat whose lineage of working mousers still prowl the grain-stores). Bards who "fell at the Weir" (failed to complete the circuit; lost vouch mid-rotation) carry a named failure-idiom. The canal-circuit interacts with CF-0017 regional-hub circuit and CF-0024 contracted-bard roster as Brinewick-specific subgenre; contracted-bard narrative-custody discipline applies with Brinewick-specific contested-canon firewall on specific-estate-scandal content (bards who name specific estate-rival scandal material face defamation-docket risk; dowager-gossip as source is contested-canon ballad register, NOT world-truth-claim).
  - <!-- added by CF-0038 --> **Childrearing (extended — Brinewick-specific fears and canal-drill)**: canal-drowning drill is ordinary — every Brinewick artisan-quarter child learns the lock-ladder, the fog-bell response, and the three-tone foghorn cadence by age seven. The downtown-to-outskirts walk is forbidden alone before age twelve because estate-grounds admit no uninvited child (per §(b) estate-outskirts register). Brinewick children's play includes *lock-tag* (chase-game using lock-ladders as safe-zones) and *fog-hide* (seek-game exploiting dawn-fog cover). Skip-rope rhyme joining the existing rotation (9th entry; CF-0021 kiln-smoke / CF-0024 unvouched-bard / CF-0028 ruin-door / CF-0031 ledger-mark / CF-0033 cordon-post / CF-0034 hollow-road / CF-0035 deep-wood / CF-0036 one-fur / CF-0037 stop-kept): *"one-bend, two-bend, don't stay past the fog / three-bend, four-bend, the city keeps the dog."* The *"keeps the dog"* is the migrant-chewed-up register — ordinary children in Brinewick artisan-quarter households grow up with the migrant-churn as a named civic hazard adjacent to ward-breach and canal-drowning. Charter-school in larger Brinewick artisan-quarter districts names as offense tiers: (i) **canal-ward tampering** (lock-bed-manifest forgery), (ii) **unvouched-migrant-harboring beyond charter-school enrollment-period grace** (overlap with CF-0037 child-labor-vs-charter-school friction docket per §(a) CF-0037 childrearing extension line 83), (iii) **impersonation-of-canal-warden** paralleling CF-0033 impersonation-of-dragoon tier.
  - <!-- added by CF-0038 --> **Common fears (extended — Brinewick-specific migrant, inspector, and underworld registers)**: the provincial migrant arriving at canal-open who can't afford month-two rent; the returning kin with *"the Brinewick shame"* (worn boots, empty purse, no story — the coin-for-shame return-idiom paralleling CF-0036 *"took the coin-for-service"* / CF-0031 *"took the coin-for-shame"* cadences at ECONOMY §Inequality Patterns CF-0038 extension); the canal-barge-hand neighbor who moonlights for aquatic-folk underworld (not a stranger — the household knows the rumor and says nothing; short-career tunnel-runner work per CAU-1-parallel cost taxonomy committed per CF-0038); the estate-recruiter in the Copper Weir offering work to a craftsman's daughter that the household cannot place and the tavern-keeper cannot vouch; the canal-warden walking the Fourth Bend in fog whose manifest-check on a cargo-barge the neighbor-household's employer ships means a charter-audit is about to break; the quarter-town sealed after a commercial-core ward-breach the ward-inspector could not catch in time (one Brinewick sealed-quarter from Incident Wave aftermath is canonical per CF-0038 AES-3 commitment; specific quarter-name deferred). The fog that the household grows up in is ordinary, not gothic; winter fever moves through the canal-quarter at recognized seasonal rhythm and someone on every row-cottage block is named at the year-end hearth-prayer count.
  - <!-- added by CF-0038 --> **Common aspirations and Oral storytelling (extended — Brinewick-specific)**: aspirations — own a shop on a named canal-bend (Fourth Bend prestige; Seventh journeyman-affordable per Housing extension); play the Copper Weir once (the highest heartland bardic aspiration short of chartered Reach-cycle); apprentice to the canal-engineering guild or lock-keeper guild (INSTITUTIONS Trade/Guilds §Brinewick canal-engineering extension); send a child inland from Brinewick with letter-of-vouch to escape the city's churn (the *"coin-for-shame"* reverse — the household that successfully vouches a child back out to a smaller heartland polity before the churn catches them). Oral storytelling — the *"came back from Brinewick with the coin-for-shame"* idiom is a recognized tavern-veteran cadence for the migrant-churned-returned; circuit-walker bard as named cultural category; Copper Weir and Lock-Keeper's Cat named in bardic work-songs; canal-warden-who-cleared-the-Fourth-Bend is a named dowager-register scandal-idiom; the quarter-sealed ballad at year-anniversary hearth-prayer names the dead at the sealed-quarter without register-inflation; silenced-contractor subgenre (CF-0036 extension line 80 parallel) operates in Brinewick at higher density because Brinewick's CF-0036 adopting-polity status compounds with commerce-hub density — itinerant bards sing the silenced-contractor ballad, patron-commissioned bards refuse, reform-current-commissioned bards refute in litigious register.

  - <!-- added by CF-0040 --> **Dredger silt-find protocol and mundane-artifact registry (CH-0014)**: Canal-heartland working households (Brinewick exemplary) carry a routine for mundane-tier Maker-Age artifact finds. Dredger crews hauling Fourth-Bend silt, lock-bed silt, and canal-confluence sand bring suspect items to the lock-master's office before midshift-end; the lock-master logs, the ward-inspector signs off during quarterly triage at the canal-quarter office; finder-fee wage-schedule is per-polity variable (OPEN_QUESTIONS deferred). Children are taught across all Cluster-A households: *do not pocket anything that hums, ticks, breathes wrong, or sits too cold in the hand*. The canonical mundane-tier finds a Brinewick dredger might log in one working week: a doll that emits a weak breeze in no wind, a mirror that makes a soft tick at random intervals, a stone plate that groups coins by denomination when placed on them, a smooth palm-stone that rubs shallow scars (useful for a season, then contaminates the household water by harvest; the herb-wife notes the off-flavor and the household buries the stone under the towpath marker). Skip-rope rhyme joining the existing rotation (10th entry): *"one-seal, two-seal, don't lift the lid / three-seal, four-seal, the old world hid."* Charter-school offense-tier: pocketing a mundane-tier find without registry is a named minor tier paralleling canal-ward tampering.

  - <!-- added by CF-0041 --> **Unsealing-triage protocol (CH-0014)**: Canal-heartland working households know the protocol. When an excavation, foundation-dig, or deep-dredge strikes a sealed container or the top of a Maker-buried-building, work stops on the spot. The multi-guild unsealing-triage (ward-inspector + civic-watch + containment-wright + excavation-foreman) arrives by sundown. Ordinary householders carry sealed cellar-finds wrapped in three cloths to the lock-master's office — the eldest-awake adult takes the container; the mother teaches the child never to open; the father carries it without speaking of it until the inspector signs. The canal-heartland household knows the hair-on-arms idiom *"the hair goes up when the seal breaks"* as an ordinary cautionary register, not as an adventure hook. Housewives, dredgers, estate-tenants, and canal-crew all share the idiom; bardic-circuit silenced-contractor subgenre (CF-0036 absorption per CH-0014) carries the dread-material, not a new fifth bardic register.

  - <!-- added by CF-0039 --> **Destruction-prohibition household register (CH-0014)**: Canal-heartland working households know the rule: never try to smash, burn, or dissolve a Maker-Age artifact yourself. The stories circulate at tavern-register and at the guildhall notice-wall — the smith who lost his hand trying to split the humming disc, the foundation-crew who built a bonfire around the stone-plate and the plate took the fire as polish, the widow who threw her dead husband's contamination-injured tool into the canal and found it the next morning on her doorstep. The civic-watch handles disposal-request intake at the inspector-office; the guild-stamped containment disposition is the legal close. Destruction is not an option the household considers; containment is.

  - <!-- added by CF-0042 --> **Status-display adjacent visibility (CH-0014)**: Canal-heartland working households rarely own declared-inventory safe-class artifacts themselves — the household-scale register is mundane-tier finds. What they see of CF-0042 status-display is through Brinewick estate-outskirts dowager-gossip (who displayed what at the quarterly reception), chartered-broker-bench news (which broker handled which sale), and the occasional assassination scandal that reaches the artisan-quarter tavern-rumor register (the broker who drank at the Weir and did not see dawn; the coroner logged theft, not duel). Household relationship to status-economy is secondary but culturally-literate: the tavern jokes about "upstairs artifact," the widow who inherited a mid-tier and cannot sell it without broker-fee, the craftsman's daughter invited to a display-reception at an outskirts estate where the dowager watches what she says to whom.

  - <!-- added by CF-0043 --> **Ash-Seal technician routine (Brinewick-specific; CH-0015)**: In Brinewick specifically (NOT other heartland canal cities — the Ash-Seal civic-charter is Brinewick-local), the working household knows the Ash-Seal technician as a weekly-to-monthly civic-texture figure — she arrives at dredger silt-bar handoffs when a find registers above mundane-tier (breeze-dolls and tick-mirrors stay with the lock-master; anything that sits cold in the hand or hums too steady gets routed to Ash-Seal via the chartered extraction-guild inspector); she arrives at canal-warden routings; she arrives at estate cellar-find dispatch (the dowager-gossip circuit will know before the ward-inspector does); she arrives at CF-0041 multi-guild unsealing-triage protocol as the commercial containment-wright slot in the sequence. The tavern-recognition idiom *"Here's the Ash-Seal technician"* parallels *"Here's the canal-warden"* — a weekly-to-monthly ordinary-life event, not a dramatic arrival. Technicians wear the company-mystique surface at intake (warded-container placement with finicky ceremony in view of the dredger crew, corporate trade-jargon "Standard Class-C containment with moderate environmental spread") and drop the surface in the tavern afterward — the fed-up-technician register ("It's a procedure. There's a checklist. Quality control, not a seance") is the artisan-quarter's in-register cadence when the dredger crew buys the technician a drink at The Copper Weir or The Lock-Keeper's Cat after shift, absorbed into CF-0036 silenced-contractor subgenre (NOT a new bardic register per Rule 3). Household stories circulate about the technician who "came out of Brinewick" — the defector-specialist who emigrated to take chartered-extraction-guild roster commission work in another heartland polity and returned home the following year to visit family.

  - <!-- added by CF-0043 --> **Ash-Seal trade-secret facility register (CH-0015)**: The canal-heartland working household in Brinewick knows where the Ash-Seal company office is — it stands in the civic-core artisan-quarter-adjacent addressing region — but the household does NOT know where the company's warehouses, research laboratories, or permanent-containment facility are. Facility locations are civic-legally protected trade secrets; unauthorized entry or observation is prosecutable under Brinewick sedition-libel-adjacent statute. Children are told the obvious (don't try to follow the wagon; don't lift the lid on any box; call the lock-master) and the quieter (don't ask neighbors who work there where they work during the day). 10th skip-rope rhyme slot: *"one-box, two-box, don't lift the lid / three-box, four-box, Ash-Seal knows what the old world hid"* — rotates through the canal-heartland rhyme cycle alongside the CF-0040 *"one-seal, two-seal"* dredge-find rhyme in Brinewick specifically.

  - <!-- added by CF-0043 --> **Ash-Seal employment as household-occupation register (CH-0015)**: Canal-heartland working households in Brinewick treat Ash-Seal employment as a copper-plus-stable occupation with distinctive texture: upper-silver master-technician tier after 5-15 years is the aspirational arc; mid-silver technician tier is the working-adult ordinary; apprentice wages are upper-copper-to-lower-silver like any chartered apprenticeship. Long-career technicians carry the AES-3 contamination-signature (scrapers' shake, the long cough, ward-rot, wasting) as a recognizable workplace-injury pattern the artisan-quarter barber-surgeons know empirically paralleling extractor-veteran patterns (CF-0031 ledger-mark eligibility in Brinewick-adopting polity under containment-wright-specialist clause — fourth lineage-source category alongside extractor, chartered containment-wright, CF-0025 occult-fallout specialist). Marriage-broker catechism in Brinewick canal-heartland exposed artisan-quarter households extends with the kin-of-Ash-Seal question: *"does your kin take the work at the company?"* — the question marks both the household's copper-plus-stable prospect (good marriage-market signal in the short term) and the contamination-lineage risk (CF-0031 ledger-mark stigma compounding over three administrative generations). The washing-woman whose husband came home after shift and could not say what he did is a named tavern-type; the barmaid at The Lock-Keeper's Cat who serves the Ash-Seal technician drinking alone in the winter-rota knows the cadence and does not ask.

  - <!-- added by CF-0043 --> **Ash-Seal backchannel-gossip register (CH-0015)**: Canal-heartland working households in Brinewick hear the Ash-Seal backchannel-purchase economy through dowager-gossip circuit drift downward into the artisan-quarter tavern-rumor register — the tenant-cottage child overhearing adult neighbors at the stovepot talking about the Mellivers' cellar-find; the washing-woman whose estate-outskirts employer-dowager called Ash-Seal at dusk three times in a season; the craftsman's daughter invited to a display-reception where the host's declared-inventory piece has a provenance-stamp the household quietly suspects was Ash-Seal-disposition-routed rather than chartered-broker-bench-sold. The register is ordinary commercial-corruption gossip, not conspiracy-thriller — the household knows that wealthy Brinewick parties sometimes buy safe-class / moderate-tier artifacts through Ash-Seal backchannel in contravention of official hold-for-study / disposal mandate, and the magistrate-docket corruption-prosecution register handles the occasional exposed case with sealed-docket classification paralleling CF-0036 procedure. Household register firewall: catastrophic-tier NEVER flows through backchannel (Ash-Seal concordat routes catastrophic-tier to civic sealed-quarter, Ash-Seal-billed per-artifact); the household does NOT imagine Ash-Seal backchannel as a vector for catastrophic-class concealment (M-2 diffuse-rumor register operates as a DISTINCT civic-paranoid-dread vector targeting state-security concealment of specific catastrophic-class finds, not commercial-corruption at moderate-tier).

  - <!-- added by CF-0045 --> **Leisure and Labor rhythm (extended — lock-night as canal-corridor performance occasion, CF-0045)**: in canal-heartland and selected canal-adjacent heartland working towns, "lock-night" is a named bardic-performance occasion distinct from ordinary tavern-night. Performance starts around lock-closure hour at the nearest tavern to the lock; the audience is canal-labor-heavy (lockmaster-crew coming off shift, barge-layover travelers whose craft is locked-through for the night, wharf-traders finishing the day's cargo-count), with fewer tavern-regulars than the ordinary bard-night crowd. Customary pay is silver above a middling tavern-night rate — the bardic-circuit aspirational idiom *"took silver enough to drink for a week"* is lock-night cadence. The lockmaster's end-of-shift is the informal scheduler; tavern-keeper coordinates the occasion with posting-wall or word-of-mouth advertising (CF-0024 mechanism). Song-selection skews short-form and work-song — canal-route ballads, lockside-labor songs, barge-traveler goodbyes — rather than the long narrative cycles of ordinary tavern-night. Canal-circuit bards distinguish lock-night bookings from ordinary tavern-night bookings in their scheduling vocabulary; the circuit-bard register *"I played the lock-night at [town]"* is ordinary speech. In Brinewick specifically the canal-circuit quarter-year rotation's weekly cadence includes lock-nights at the rotation taverns in proportion to each tavern's canal-labor audience draw, without collapsing the rotation's cross-year scheduling into the night-type (the two are orthogonal dimensions). Non-canal heartland market-towns without lock infrastructure have ordinary tavern-night but no lock-night.

  - <!-- added by CF-0046 --> **Leisure and Oral storytelling (extended — inbound drylands-cadence tavern-fragments, CH-0018)**: canal-heartland tavern-bards occasionally perform verse-fragments in recognizable "drylands cadence" absorbed from the drylands caravan-corridor (CF-0044 one-way bardic-flow circuit-bard mechanism; now contextualized within CF-0046 corridor-infrastructure substrate). The heartland tavern-audience recognizes the cadence without knowing the source stranger-exchange protocol — the verse-fragment travels, the hospitality-register does NOT travel (a heartland tavern-keeper does NOT perform gate-turn-with-drylands-cadence at an incoming migrant; the register is caravanserai/wayhouse/well-side-and-resident-drylander-host-bound per CF-0044 stabilizer). Heartland migrants returning from drylands caravan-rotation work sometimes attempt verse-turns at inappropriate heartland registers (at a heartland tavern-gate instead of a drylands caravanserai-gate; at a heartland household-threshold where the host is not a resident-drylander) and are gently corrected by heartland tavern-keepers or bardic-circuit bards with a dry smile — *"you're not at the gate any more"* is a named heartland register for the corrective, absorbed into existing tavern-vouch / bardic-circuit-vouch conversational texture without becoming a distinct idiom-category per Rule 3 firewall. Mixed-species households with drylands-migrant members may retain the drylands-cadence verse-turn within family-and-hearth leisure register (NOT in public-hospitality register; the protocol does NOT transplant to heartland venues). The inbound register is ordinary cultural-leisure texture, not a new institutional form.

