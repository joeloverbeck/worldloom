    label: Dredger silt-find protocol and mundane-artifact registry
    originating_cf: CF-0040
  - body: Canal-heartland working households know the protocol. When an excavation, foundation-dig, or deep-dredge strikes a sealed container or the top of a Maker-buried-building, work stops on the spot. The multi-guild unsealing-triage (ward-inspector + civic-watch + containment-wright + excavation-foreman) arrives by sundown. Ordinary householders carry sealed cellar-finds wrapped in three cloths to the lock-master's office — the eldest-awake adult takes the container; the mother teaches the child never to open; the father carries it without speaking of it until the inspector signs. The canal-heartland household knows the hair-on-arms idiom *"the hair goes up when the seal breaks"* as an ordinary cautionary register, not as an adventure hook. Housewives, dredgers, estate-tenants, and canal-crew all share the idiom; bardic-circuit silenced-contractor subgenre (CF-0036 absorption per CH-0014) carries the dread-material, not a new fifth bardic register.
    change_id: CH-0014
    date: 2026-04-20
    label: Unsealing-triage protocol
    originating_cf: CF-0041
  - body: "Canal-heartland working households know the rule: never try to smash, burn, or dissolve a Maker-Age artifact yourself. The stories circulate at tavern-register and at the guildhall notice-wall — the smith who lost his hand trying to split the humming disc, the foundation-crew who built a bonfire around the stone-plate and the plate took the fire as polish, the widow who threw her dead husband's contamination-injured tool into the canal and found it the next morning on her doorstep. The civic-watch handles disposal-request intake at the inspector-office; the guild-stamped containment disposition is the legal close. Destruction is not an option the household considers; containment is."
    change_id: CH-0014
    date: 2026-04-20
    label: Destruction-prohibition household register
    originating_cf: CF-0039
  - body: "Canal-heartland working households rarely own declared-inventory safe-class artifacts themselves — the household-scale register is mundane-tier finds. What they see of CF-0042 status-display is through Brinewick estate-outskirts dowager-gossip (who displayed what at the quarterly reception), chartered-broker-bench news (which broker handled which sale), and the occasional assassination scandal that reaches the artisan-quarter tavern-rumor register (the broker who drank at the Weir and did not see dawn; the coroner logged theft, not duel). Household relationship to status-economy is secondary but culturally-literate: the tavern jokes about \"upstairs artifact,\" the widow who inherited a mid-tier and cannot sell it without broker-fee, the craftsman's daughter invited to a display-reception at an outskirts estate where the dowager watches what she says to whom."
    change_id: CH-0014
    date: 2026-04-20
    label: Status-display adjacent visibility
    originating_cf: CF-0042
  - body: In Brinewick specifically (NOT other heartland canal cities — the Ash-Seal civic-charter is Brinewick-local), the working household knows the Ash-Seal technician as a weekly-to-monthly civic-texture figure — she arrives at dredger silt-bar handoffs when a find registers above mundane-tier (breeze-dolls and tick-mirrors stay with the lock-master; anything that sits cold in the hand or hums too steady gets routed to Ash-Seal via the chartered extraction-guild inspector); she arrives at canal-warden routings; she arrives at estate cellar-find dispatch (the dowager-gossip circuit will know before the ward-inspector does); she arrives at CF-0041 multi-guild unsealing-triage protocol as the commercial containment-wright slot in the sequence. The tavern-recognition idiom *"Here's the Ash-Seal technician"* parallels *"Here's the canal-warden"* — a weekly-to-monthly ordinary-life event, not a dramatic arrival. Technicians wear the company-mystique surface at intake (warded-container placement with finicky ceremony in view of the dredger crew, corporate trade-jargon "Standard Class-C containment with moderate environmental spread") and drop the surface in the tavern afterward — the fed-up-technician register ("It's a procedure. There's a checklist. Quality control, not a seance") is the artisan-quarter's in-register cadence when the dredger crew buys the technician a drink at The Copper Weir or The Lock-Keeper's Cat after shift, absorbed into CF-0036 silenced-contractor subgenre (NOT a new bardic register per Rule 3). Household stories circulate about the technician who "came out of Brinewick" — the defector-specialist who emigrated to take chartered-extraction-guild roster commission work in another heartland polity and returned home the following year to visit family.
    change_id: CH-0015
    date: 2026-04-20
    label: Ash-Seal technician routine (Brinewick-specific;
    originating_cf: CF-0043
  - body: "The canal-heartland working household in Brinewick knows where the Ash-Seal company office is — it stands in the civic-core artisan-quarter-adjacent addressing region — but the household does NOT know where the company's warehouses, research laboratories, or permanent-containment facility are. Facility locations are civic-legally protected trade secrets; unauthorized entry or observation is prosecutable under Brinewick sedition-libel-adjacent statute. Children are told the obvious (don't try to follow the wagon; don't lift the lid on any box; call the lock-master) and the quieter (don't ask neighbors who work there where they work during the day). 10th skip-rope rhyme slot: *\"one-box, two-box, don't lift the lid / three-box, four-box, Ash-Seal knows what the old world hid\"* — rotates through the canal-heartland rhyme cycle alongside the CF-0040 *\"one-seal, two-seal\"* dredge-find rhyme in Brinewick specifically."
    change_id: CH-0015
    date: 2026-04-20
    label: Ash-Seal trade-secret facility register
    originating_cf: CF-0043
  - body: "Canal-heartland working households in Brinewick treat Ash-Seal employment as a copper-plus-stable occupation with distinctive texture: upper-silver master-technician tier after 5-15 years is the aspirational arc; mid-silver technician tier is the working-adult ordinary; apprentice wages are upper-copper-to-lower-silver like any chartered apprenticeship. Long-career technicians carry the AES-3 contamination-signature (scrapers' shake, the long cough, ward-rot, wasting) as a recognizable workplace-injury pattern the artisan-quarter barber-surgeons know empirically paralleling extractor-veteran patterns (CF-0031 ledger-mark eligibility in Brinewick-adopting polity under containment-wright-specialist clause — fourth lineage-source category alongside extractor, chartered containment-wright, CF-0025 occult-fallout specialist). Marriage-broker catechism in Brinewick canal-heartland exposed artisan-quarter households extends with the kin-of-Ash-Seal question: *\"does your kin take the work at the company?\"* — the question marks both the household's copper-plus-stable prospect (good marriage-market signal in the short term) and the contamination-lineage risk (CF-0031 ledger-mark stigma compounding over three administrative generations). The washing-woman whose husband came home after shift and could not say what he did is a named tavern-type; the barmaid at The Lock-Keeper's Cat who serves the Ash-Seal technician drinking alone in the winter-rota knows the cadence and does not ask."
    change_id: CH-0015
    date: 2026-04-20
    label: Ash-Seal employment as household-occupation register
    originating_cf: CF-0043
  - body: "Canal-heartland working households in Brinewick hear the Ash-Seal backchannel-purchase economy through dowager-gossip circuit drift downward into the artisan-quarter tavern-rumor register — the tenant-cottage child overhearing adult neighbors at the stovepot talking about the Mellivers' cellar-find; the washing-woman whose estate-outskirts employer-dowager called Ash-Seal at dusk three times in a season; the craftsman's daughter invited to a display-reception where the host's declared-inventory piece has a provenance-stamp the household quietly suspects was Ash-Seal-disposition-routed rather than chartered-broker-bench-sold. The register is ordinary commercial-corruption gossip, not conspiracy-thriller — the household knows that wealthy Brinewick parties sometimes buy safe-class / moderate-tier artifacts through Ash-Seal backchannel in contravention of official hold-for-study / disposal mandate, and the magistrate-docket corruption-prosecution register handles the occasional exposed case with sealed-docket classification paralleling CF-0036 procedure. Household register firewall: catastrophic-tier NEVER flows through backchannel (Ash-Seal concordat routes catastrophic-tier to civic sealed-quarter, Ash-Seal-billed per-artifact); the household does NOT imagine Ash-Seal backchannel as a vector for catastrophic-class concealment (M-2 diffuse-rumor register operates as a DISTINCT civic-paranoid-dread vector targeting state-security concealment of specific catastrophic-class finds, not commercial-corruption at moderate-tier)."
    change_id: CH-0015
    date: 2026-04-20
    label: Ash-Seal backchannel-gossip register
    originating_cf: CF-0043
  - body: canal-heartland tavern-bards occasionally perform verse-fragments in recognizable "drylands cadence" absorbed from the drylands caravan-corridor (CF-0044 one-way bardic-flow circuit-bard mechanism; now contextualized within CF-0046 corridor-infrastructure substrate). The heartland tavern-audience recognizes the cadence without knowing the source stranger-exchange protocol — the verse-fragment travels, the hospitality-register does NOT travel (a heartland tavern-keeper does NOT perform gate-turn-with-drylands-cadence at an incoming migrant; the register is caravanserai/wayhouse/well-side-and-resident-drylander-host-bound per CF-0044 stabilizer). Heartland migrants returning from drylands caravan-rotation work sometimes attempt verse-turns at inappropriate heartland registers (at a heartland tavern-gate instead of a drylands caravanserai-gate; at a heartland household-threshold where the host is not a resident-drylander) and are gently corrected by heartland tavern-keepers or bardic-circuit bards with a dry smile — *"you're not at the gate any more"* is a named heartland register for the corrective, absorbed into existing tavern-vouch / bardic-circuit-vouch conversational texture without becoming a distinct idiom-category per Rule 3 firewall. Mixed-species households with drylands-migrant members may retain the drylands-cadence verse-turn within family-and-hearth leisure register (NOT in public-hospitality register; the protocol does NOT transplant to heartland venues). The inbound register is ordinary cultural-leisure texture, not a new institutional form.
    change_id: CH-0018
    date: 2026-04-20
    label: Leisure and Oral storytelling (extended — inbound drylands-cadence tavern-fragments,
    originating_cf: CF-0046
  - body: "**Tavern-keeper vouch register extension — \"corner-share-reliable\" competence register (CF-0048)**: Canal-heartland tavern-keepers' contractor-auxiliary vouch register (the CF-0024 tavern-keeper-vouch social asset, exercised at canal-town tavern-board contractor-auxiliary posting venues) extends with a named competence register: \"corner-share-reliable.\" A canal-heartland working-household tavern conversation distinguishes a contractor-auxiliary who \"kept the corner well\" on a chartered-plus-auxiliary informal cellar-job (chartered professional + auxiliary in lantern-hold / door-keep / one-fetch role-scope, paid on the corner-share / serious-share bifurcation) from a generic-job-completion vouch. The register is conversational ordinary-life texture — \"she's corner-share-reliable on Aldous's cellar-runs,\" \"the corner-share she took last winter cleared her debt at the inn\" — not a chartered competence rating. Tavern-keepers accrue informal records of corner-share-reliable auxiliaries for repeat chartered-professional engagement; the register travels via CF-0017 circuit-bard contractor-ballad subgenre absorption (no new sub-genre per Rule 3 — the idiom enters existing contractor-ballad register). \"Took the corner-share\" enters self-deprecating self-description vocabulary in canal-town household conversation (AES-1 cadence: an auxiliary names herself auxiliary, not chartered). Sibling registers in highland (clan-share), drylands (caravan-share per CF-0046), fenland (relay-summoning compensation) are different-vocabulary regional equivalents — tavern conversations in those regions use their own register, not corner-share. In Brinewick (CF-0038 + CF-0043 charter-audit-strict), the \"corner-share-reliable\" register is canal-quarter informal-conversation texture only — civic-registry contract-template vocabulary maintains the formal-vs-informal divide and the register does not appear in magistrate-court contract-language."
    change_id: CH-0021
    date: 2026-04-26
    label: "Corner-share-reliable: tavern-keeper vouch competence register (canal-heartland)"
    originating_cf: CF-0048
