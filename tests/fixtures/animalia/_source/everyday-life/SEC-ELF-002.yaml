id: SEC-ELF-002
file_class: EVERYDAY_LIFE
order: 2
heading: (b) Big-City Outskirts Estate — Landholding Family
heading_level: 2
body: |-
  A walled estate on the outskirts of a sprawling city — manor hall, tenant cottages, stables, chapel, garden, walled orchard. Mixed-species household possible (and ordinary).

  - **Food**: fresh meats (carnivore household members supplied through estate butchery), seasonal vegetables, wines, pastries, imported delicacies on occasion.
  - **Water**: piped or carried by servants; cistern supplemented in summer; estate well periodically tested by guild contract.
  - **Sanitation**: privies, night-soil hauling; some newer estates have plumbing in service wings.
  - **Housing**: walled estate — manor hall, tenant cottages, stables, chapel, kitchen yard. Architectural accommodation for any species in the family (bespoke).
  - **Clothing**: better cloth, embroidery, species-tailored fashion, seasonal display, formal mourning and feast garments.
  - **Heating and cooling**: hearths in many rooms; coal where available; ice-house in wealthy estates.
  - **Childbirth**: in-house midwife or city physician on retainer; species-specific consultant brought in.
  - **Childrearing**: tutored at home, sometimes sent to monastery school or city charter-school, civic-registry rituals attended.
  - **Aging**: dowager's wing tradition; old estate-masters often retain ledger-oversight long after handing over field operations.
  - **Courtship and marriage**: matchmaking by family or via civic register; alliances across estates and species; reproductive impossibility of cross-species union shapes succession planning (adoption is anticipated, not improvised).
  - **Labor rhythm**: oversight and ledger work, hosted gatherings, seasonal travel, hunting in season; tenants do field labor.
  - **Leisure**: hunts (carnivore-folk family members often lead these), salons, hired bards, garden assemblies.
  - **Intoxication**: wine, brandy, herbal infusions, occasional foreign cordial.
  - **Prayer and ritual**: family chapel, public temple appearances, charter-day display, progenitor feast for the household's traditions.
  - **Cleanliness**: daily wash, attendants, bathhouse on the estate.
  - **Common injuries**: hunt accidents, riding falls, duel scars (rare, often hushed), occasional ward-incident exposure when a buried artifact is found in the orchard or cellar — handled by guild contract.
  - **Medicine**: physician on retainer; species specialist consulted as needed; convalescent wing in larger estates.
  - **Death disposal**: family vault, family pyre-field, sometimes family river-burial wharf for water-folk lineages.
  - **Oral storytelling**: hosted bards, library readings, family history-keepers.
  - **Common fears**: succession failure, scandal, ward-breach near the estate, cousin's debt, loss of charter standing. <!-- added by CF-0021 --> Tenant or cousin caught with grimoire fragments; tenant-cottage kiln-yard scandal exposing the family to civic prosecution and charter risk.
  - **Common aspirations**: title elevation, advantageous marriage for heir, civic office, charter recognition for a family achievement.
  - <!-- added by CF-0021 --> **Aging (extended)**: dowager-gossip circuit tracks which estates had kiln-yard scandals on tenant land; estate-master oversight of outlying tenant workshops becomes more attentive in this generation.
  - <!-- added by CF-0021 --> **Common injuries (extended)**: extends "occasional ward-incident exposure" to include kiln-explosion injury when a tenant cottage workshop fails — handled by guild contract where possible, by family discretion where not.
  - <!-- added by CF-0024 --> **Labor rhythm (extended — contractor vetting)**: estate-steward vets contractors through factor or guild before any hire touches tenant land; contracts signed in the estate's name pass through a ledger-check; charter risk attaches to any hire not vetted.
  - <!-- added by CF-0024 --> **Common fears (extended — contract exposure)**: a cousin signing an adventuring contract in the estate's name without ledger approval; a tenant-cottage retinue formed quietly and discovered by civic watch as unauthorized private retinue; a fallout-specialist hired after a cellar find becoming a bardic story the estate cannot disavow.
  - <!-- added by CF-0024 --> **Aging (extended — retinue gossip)**: dowager-gossip circuit tracks which estates quietly hired occult-fallout specialists after a cellar find and which estates maintain named adventurer-retinues on standing retainer; the distinction between "caravan contractor" and "private retinue" is often a matter of dowager-definition before it becomes a magistrate's concern.
  - <!-- added by CF-0028 --> **Labor rhythm (extended — patron-liability steward work)**: estate-steward ledger makes an explicit distinction between caravan-contractor hires (low charter risk, routine) and ruin-expedition patronage (high charter risk, artifact-keep clause, civic-audit exposure). Steward vets expedition-contracts before any family seal is committed; a ledger-check is required for every ruin-expedition contract to prevent cousin-or-heir scandal.
  - <!-- added by CF-0028 --> **Common fears (extended — expedition-patron exposure)**: an heir patronizing a ruin-expedition under family seal without steward approval; a magical artifact delivered to the servants' gate in broad daylight while the civic audit is due; a squad-wipe returning a partial expedition and the family's expedition-share liability spiking; a tenant cottage workshop serving as expedition-contractor lodging without ledger-tracking; a bardic ruin-cycle naming the estate among its "funders who lost the venture."
  - <!-- added by CF-0028 --> **Aging (extended — expedition dowager-ledger)**: dowager-gossip circuit now tracks which estates funded the last three expeditions and which squad-wiped, who is recovering from charter-audit scrutiny, and which named adventurer-retinues are quietly extending toward expedition-scale sponsorship. The gossip-circuit distinguishes "caravan patronage" from "retinue patronage" from "expedition patronage" — three escalating scales of charter exposure.
  - <!-- added by CF-0028 --> **Common aspirations (extended)**: funding a successful expedition whose haul enters the family artifact-vault is a prestige asset alongside charter-achievement; funding one that squad-wipes is a durable scandal that a dowager remembers for decades.
  - <!-- added by CF-0031 --> **Aging (extended — tenant ledger-mark gossip)**: in adopting polities, dowager-gossip circuit tracks which tenant-cottage lineages registered for the contamination-lineage ledger-mark (CF-0031) and which resisted. The distinction between "charter-sound registration" and "desperate registration" becomes dowager idiom — named dowager observation: *"the Coreys registered three tenants last quarter — charter-sound or desperate?"* Older noble houses prize tenant-discretion and frown on tenant-registration as an estate reflecting poorly; newer merchant-adjacent houses see vetting value in registry-coordinated tenant records.
  - <!-- added by CF-0031 --> **Labor rhythm (extended — tenant-registration ledger-check)**: estate-steward ledger-check now includes tenant-cottage lineages' registry status before tenancy renewal in adopting polities; a registered tenant patriarch gains monastic-clinic priority that affects household service-rota planning (the steward must factor priority-visit days into canal-barge supply runs). Stewards treat tenant-registration as charter-risk-adjacent data without formal civic-audit weight — a gray zone the guild inspectors have not yet pressed.
  - <!-- added by CF-0032 --> **Housing (extended — subsection fitments)**: in Cluster C ancestral polities, estate halls carry guild-seal subsection fitments (CF-0032) for resident Cluster C family members — oversize chairs for mammoth-folk dowagers, reinforced-floor wings for ground-sloth-folk heirs, stair-ramps fitted to body-plan-variant specification, barge-deck upper quarters on estate barges for cross-polity travel. The subsection-seal is a durable mark on the back of the chair or the frame of the ramp. Over generations, ancestral-polity estate architecture migrates toward subsection-informed default sizing — furniture and room dimensions become less ad-hoc retrofit and more planned-from-construction; non-Cluster-C heirs inheriting such estates maintain the oversized spaces as heirlooms-in-place.
  - <!-- added by CF-0032 --> **Labor rhythm (extended — patron-commission steward work)**: estate-steward ledger distinguishes routine wainwright/saddlery commissions (general guild work) from subsection commissions (body-plan-variant, higher price, long lead time); steward vets subsection commissions before family seal is committed because long-lead-time export contracts carry waiting-list premium and placement-right inheritance complications.
  - <!-- added by CF-0032 --> **Aging (extended — subsection dowager-gossip)**: in Cluster C ancestral polities, dowager-gossip circuit tracks which estates commissioned subsection work last quarter and which house a visiting reciprocal-journey master in residence. Commissioning subsection fitments is a durable status asset — NOT a scandal like a kiln-yard incident or a squad-wipe expedition — and the pricing is known ("chair-guild pricing" as idiom for any quote outrageously high but correctly specified). "Did the Coreys retain the northern master this season?" is ordinary dowager-register in ancestral polities; the answer carries charter-sound-or-parvenu nuance.
  - <!-- added by CF-0032 --> **Common aspirations (extended — subsection patronage)**: commissioning subsection fitments for a Cluster C family member's milestone (coming-of-age chair, dowry carriage, heir's reinforced study-desk) is an established aspiration in ancestral-polity estate households; placing a tenant-cottage child with the subsection as apprentice is a minor-but-real prestige asset alongside general guild placement.
  - <!-- added by CF-0032 --> **Common fears (extended — subsection exposure)**: a subsection-seal forgery uncovered in an inherited family chair (dowager scandal); a dispute over subsection placement-right among multiple heirs of a master-craftsman patron-obligated to the estate; an estate-commissioned oversize wagon-bed failing structurally and raising craft-liability questions.
  - <!-- added by CF-0033 --> **Labor rhythm (extended — dragoon-charter magistrate liaison)**: in adopting-polity estates, estate-steward correspondence now includes dragoon-charter magistrate liaison for ward-breach declarations that cross estate tenant land. A dragoon unit entering tenant-cottage territory under ward-breach declaration requires immediate steward ledger-check (confirming which tenant cottages are known-contamination-lineage-registered per CF-0031 coordination) and magistrate notification within the civic-registry reporting window. Estate-steward ledger distinguishes three charter-risk tiers for estate engagement with the dragoon institution: (i) low risk — estate tenant-cottage passively evacuated under routine dragoon perimeter operation; (ii) moderate risk — estate patron sits on the dragoon-funding council or provides civic-advisory input; (iii) high risk — estate heir or cousin enlisted in dragoon service under family seal without steward approval (treated as charter-scandal equivalent to undisclosed ruin-expedition patronage).
  - <!-- added by CF-0033 --> **Aging (extended — dragoon-funding dowager-gossip)**: dowager-gossip circuit in adopting-polity estates tracks two new categories: (a) estates whose patrons sit on the dragoon-funding council (civic-adjacent, reform-aligned, often merchant-adjacent newer houses prizing vetting-value) vs estates that have never had a dragoon posting cross their tenant line (charter-sound, refuser-aligned, often older-house). Dowager-observation idiom: *"the Corlyhaughs seated on the dragoon council this quarter — charter-sound or parvenu?"* Charter-court mission-creep challenges that name estate-patron involvement as evidence are tracked as a recurring dowager-scandal category, distinct from squad-wipe gossip (CF-0028) and tenant-registration gossip (CF-0031).
  - <!-- added by CF-0033 --> **Common fears (extended — dragoon-adjacent estate exposure)**: an heir enlisting in dragoon service under family seal without steward approval (charter-scandal paralleling cousin-signing-expedition-contract patterns); a dragoon unit crossing estate tenant land during ward-breach declaration with a contaminated-lineage tenant-cottage household discovered mid-evacuation (CF-0031 registry-exposure compounded by dragoon civic-evidence archive entry); a charter-court mission-creep challenge naming the estate as dragoon-funding-council beneficiary; a dragoon-kit counterfeit found in the servants' gate lost-and-found (implicating the estate in black-market dragoon-kit circulation); a retired dragoon retained as civic-advisory and providing council testimony inconvenient to the estate's charter position.
  - <!-- added by CF-0033 --> **Common aspirations (extended — civic-adjacent positioning)**: in adopting-polity estates with reform-aligned positioning, retaining a retired-dragoon as civic-advisory attaché is a durable prestige asset paralleling civic-office appointment; in non-adopting-polity estates, preserving the CF-0024 noble-retinue pattern without any dragoon-council adjacency is a durable charter-sound asset. The distinction between the two postures is now a named estate-positioning axis in dowager-register.
  - <!-- added by CF-0034 --> **Aging (extended — exposed-district dowager-gossip)**: dowager-gossip circuit tracks which estates lost tenant-cottage households to bandit-raid in the past three seasons, which retinue-deployment arrived in time, and which did not. Distinction: *"estates whose tenants walked south"* (exposed-district, demographically bleeding, charter-risk-adjacent) vs *"estates whose walls held"* (fortified-tenant-cottage-cluster investment, charter-sound retinue pattern). Dowager observation idiom: *"the Corlyhaughs have lost three tenant-rolls to the hollow this year — exposed-district or ill-managed?"* — paralleling the CF-0031 tenant-registration gossip pattern but with distinct weight (registration is voluntary; raid-dispossession is not).
  - <!-- added by CF-0034 --> **Labor rhythm (extended — steward-ledger raid-exposure register)**: estate-steward ledger-check now includes tenant-cottage raid-exposure assessment before tenancy renewal in exposed-district estates, alongside CF-0031 tenant-registration status and CF-0033 dragoon-charter magistrate-liaison tracking. Three-tier charter-risk assessment for estate engagement with the CF-0034 pattern: (i) low risk — routine retinue-deployment in response to a tenant-cottage raid on estate land (charter-sound per Landholding extension); (ii) moderate risk — retinue pursuit of raiders beyond the estate's chartered jurisdiction, magistrate liaison required; (iii) high risk — retinue deployed against rival-estate tenants under bandit-pretext, charter-audit-scandal exposure. Exposed-district tenancy agreements in some estates now carry an informal raid-response clause (the steward summons retinue within a named response-window; failure to arrive is breach).
  - <!-- added by CF-0034 --> **Common fears (extended — ransom-demand at the servants' gate)**: a cousin or heir taking a bounty-commission under family seal without steward approval (charter-scandal paralleling CF-0028 undisclosed expedition patronage); a ransom-demand delivered at the servants' gate for a kidnapped tenant-child, forcing a negotiation the estate cannot disavow; a raid-retinue-deployment crossing into a neighbor's estate tenant land and provoking charter-audit; a dowager-register scandal naming the estate among those that "lost tenants to the hollow" during a severe corridor season. Heir enlisting in a bounty-company under family seal is a charter-scandal equivalent to undisclosed ruin-expedition patronage (CF-0028) or undisclosed mercenary-band adventuring (CF-0024).
  - <!-- added by CF-0034 --> **Common aspirations (extended — retrieval of tenant-kin)**: in exposed-district estates, the retrieval of a kidnapped tenant-kin alive (via bounty-commissioned hunter-contractor or ransom-broker matchmaking) is a durable charter-sound prestige asset alongside the civic-office and charter-achievement aspirations already named. The dowager-register distinguishes clean retrievals (coin paid, captive alive, ledger closed) from fraught ones (captive-returned-traumatized, household-unable-to-reintegrate, reform-clergy-ministry-required) — the distinction matters for charter-sound-vs-parvenu positioning.
  - <!-- added by CF-0035 --> **Aging (extended — manor-hall trophy dowager-discrimination)**: in wildland-adjacent estates, the dowager circuit tracks which estates display verified beast-trophies (CF-0035) in the manor hall — the provenance-verified trophy is prestige-adjacent display (bounty-clerk certified, corridor-named, old hunter-contractor's mark on the brass plate at the base); the uncertified or suspect-provenance trophy is charter-risk-adjacent (dowager-censure, audit-exposure if the trophy's story doesn't hold). Dowager-distinction extends further: estates that commissioned a cousin's hunt and received a verified trophy sit higher than estates that commissioned and received nothing (the cousin either did not return or returned empty-handed); estates that display a cousin-lineage-taboo-breaching trophy in a mixed-species household (a wolf-folk estate displaying a wolf-that-was-not-a-wolf skull) face species-embodiment-tact gossip distinct from provenance-gossip.
  - <!-- added by CF-0035 --> **Common fears (extended — cousin-hunt charter-risk)**: a cousin or heir signing a legendary-beast-hunt contract under family seal without steward approval — charter-scandal equivalent to undisclosed ruin-expedition patronage (CF-0028) or undisclosed mercenary-band adventuring (CF-0024) or undisclosed bandit-bounty-commission (CF-0034). The distinction: legendary-beast-hunt cousin-scandals carry a minor additional weight because the register-contamination question (was the trophy truly legendary-beast or ordinary-predator misattributed) compounds the charter-risk. A cousin returning without the carcass but with ledger-coin missing is a named dowager-scandal pattern.
  - <!-- added by CF-0035 --> **Common fears (extended — habitat-cultivation charter-scandal)**: a named estate-owner discovered to have DELIBERATELY cultivated or preserved mutated-beast habitat near tenant land for prestige-hunt tourism (CF-0035 habitat-cultivation charter-scandal per INSTITUTIONS extension) — charter-audit exposure parallel to retinue-against-rival-tenants-under-bandit-pretext (CF-0034). The dowager-register has no pity for this kind of scandal; it is not about cousin-judgment or steward-oversight failure but about deliberate indifference to tenant welfare. Estates so named take years to recover charter-standing.
  - <!-- added by CF-0035 --> **Common aspirations (extended — the verified trophy and the corridor held)**: in wildland-adjacent estates, a verified trophy displayed in the manor hall (bounty-clerk-certified, corridor-named, provenance-documented) joins the civic-office and charter-achievement aspirations already named. Register-note: the aspiration is charter-sound prestige, NOT heroic register — the trophy is prestige because the corridor no longer has the beast, not because a hero mastered it. The hunter-contractor gets the bounty; the estate gets the trophy; neither gets the ballad.
  - <!-- added by CF-0036 --> **Aging (extended — mix-sound-vs-single-species estate dowager-discrimination)**: the dowager circuit tracks estate tenant-composition as a new category axis alongside CF-0031 charter-sound-vs-parvenu, CF-0033 dragoon-funding-council adjacency, and CF-0034 exposed-district tenancy status. Distinction: *"mix-sound house"* (tenant-cottages at or above local mixed-species baseline; reform-aligned, charter-sound; the steward has kept the hearing open) vs *"quietly single-species house"* (tenant-composition drifted toward sorting; charter-risk-adjacent; the steward may claim coincidence but the dowagers count). Exclusionary-settlement-adjacent estates (those deriving rental-income-flow from single-species-enclave intermediaries, or kin-linked to ermine-noble-labor-prejudice households) face compounded dowager-scrutiny; the charter-position becomes tenure-of-hearing at the magistrate-advisory panel if scandal breaks.
  - <!-- added by CF-0036 --> **Labor rhythm (extended — steward mix-compatibility vetting and charter-risk tiers)**: estate-steward correspondence in adopting-polity estates now includes crew-species-composition vetting before hired work-crews are permitted to cross tenant land (caravan-escort passing through, contracted dredger-crew on estate canal, extraction-escort crossing tenant-cottage cluster). Charter-risk tiers: (i) low — mix-sound crew with charter-sound foreman and standard hire-catechism documentation; (ii) moderate — patron-pressed single-species crew where the steward disclaims crew-composition responsibility on the ledger; (iii) high — crew-master publicly-aligned with supremacist-doctrine circle or known to have hired through exclusionary-settlement intermediary (seal-review risk for the crew-master's guild; charter-risk for the estate permitting transit). Harboring-or-provisioning-supremacist-band scandal-tier is the sharpest charter-audit exposure — charter-scandal parallel to habitat-cultivation (CF-0035) or rival-tenant-action-under-bandit-pretext (CF-0034); civic-watch action expected; dowager-gossip generations-remembered.
  - <!-- added by CF-0036 --> **Common fears (extended — exclusionary-settlement contract disclosure and sealed-case tenant attribution)**: a cousin who accepted an exclusionary-settlement tenancy-management contract without steward disclosure; a tenant-cottage abandonment register with interspecies-predation attribution filed under sealed-docket classification (the estate's civic-registry notice carries only the euphemistic "grave-violation-of-person victim" marker, and the dowager-circle speculates behind closed parlor doors without public speech); a supremacist-doctrine pamphlet circulating among estate apprentices or journeymen traced back to a named retainer; a retinue pursuit of a cannibal-band crossing into sealed-case-jurisdictional territory without civic-magistrate liaison (CF-0033 dragoon-scope firewall reminds — dragoons do NOT acquire cannibal-case role; the retinue and civic-watch handle).
  - <!-- added by CF-0036 --> **Common aspirations (extended — mix-sound house positioning)**: the charter-sound-positioned estate in adopting-polity context increasingly aspires to explicit mix-sound-house dowager-register recognition as durable prestige asset alongside civic-office appointment, verified-trophy display (CF-0035), retinue-retention (CF-0024), and dragoon-funding-council seating (CF-0033). The aspiration is NOT heroic — *"the Corlyhaughs have kept the hearing open these three generations"* is the register, NOT *"the Corlyhaughs stood against the supremacist tide"*.
  - <!-- added by CF-0037 --> **Housing and Labor rhythm (extended — estate-tenant waystation register)**: where an estate's tenant land includes overland connector-routes (common pattern in heartland outskirts, mountain-east valley-pass approaches, and selected highland clan-border estates), the estate hosts a family-handled waystation (CF-0037) on tenant lease as a recognized estate-tenancy asset class. Estate-steward ledger inclusion of waystation-tenancy carries supply-quota obligations to the feeder settlement, traveler-service stipulations, and renewal-cycle terms reflecting the multi-generational household-enterprise pattern. Bandit-defense-of-waystation by CF-0024 noble-retinue against bandit-raid is charter-sound retinue activity per CF-0034 §bandit-defense-of-tenant-land precedent (Landholding extension under CH-0012). The stationkeeper-family is treated as ordinary tenant-cottage household with an enterprise-overlay; estate-steward correspondence with the family includes the renewal-cycle ledger-check, the supply-quota tracking, and (where the corridor is exposed) the raid-response retinue-deployment record.
  - <!-- added by CF-0037 --> **Aging (extended — waystation-tenancy dowager-discrimination)**: the dowager circuit in heartland estates whose tenant land includes connector-route waystations tracks waystation-tenancy as a new estate-positioning category axis alongside CF-0031 charter-sound-vs-parvenu, CF-0033 dragoon-funding-council adjacency, CF-0034 exposed-district tenancy status, and CF-0036 mix-sound-vs-single-species. Dowager-distinction: *"the Corlyhaugh waystation has kept three generations"* (charter-sound estate-tenancy, multi-generational stability, supply-quota reliable, retinue-defense effective) vs *"the Thurrow station turned over twice this decade"* (charter-risk-adjacent if turnover exceeds estate-steward tolerance; suggests estate-steward management failure or exposed-district pressure). Bandit-fronting station scandal (CF-0037 §Breakage Point) is the sharpest waystation-related dowager-scandal — a stationkeeper-family on estate land that turned to corridor-betrayal exposes the estate to charter-audit equivalent to retinue-against-rival-tenants-under-bandit-pretext (CF-0034) or habitat-cultivation (CF-0035) scandals.
  - <!-- added by CF-0037 --> **Common fears (extended — waystation charter-risk and cousin-sponsorship scandal)**: a cousin or heir signing a waystation-tenancy patronage contract for a non-estate-land waystation under family seal without steward approval (charter-scandal paralleling CF-0028 undisclosed expedition patronage and CF-0034 undisclosed bounty-commission); a tenant-stationkeeper-family discovered to have turned to corridor-betrayal mid-renewal-cycle (CF-0037 bandit-fronting Breakage Point — the estate's reputation suffers from association even if the steward had no advance knowledge); a multi-heir succession dispute closing an estate-tenant waystation mid-litigation while estate-steward ledger reflects an unfilled supply-quota; a dowager-register entry naming the estate among those whose tenant-stations "turned over twice this decade" during a corridor-pressure season.
  - <!-- added by CF-0038 --> **Labor rhythm (extended — Brinewick estate canal-warden backchannel ledger-risk)**: in Brinewick (CF-0038) outskirts ancestral estates, estate-steward correspondence navigates canal-warden backchannel ledger-risk at exemplar density per INSTITUTIONS §Landholding CF-0038 extension. The canal-warden's "quiet word" before a barge-audit is a recognized pre-scandal signal — stewards receive word from kin-network intermediaries rather than from the warden directly (continuous-but-incomplete audit stabilizer per CF-0038 mechanism); steward ledger distinguishes **charter-sound inspection-fee** (ordinary civic-tariff paid at manifested rate; low risk) from **backchannel-provisioning** (estate coin routed through inspector-kin intermediary to ensure a favorable manifest-reading; sharp charter-risk, magistrate-liability if the kin-network channel is exposed in a charter-audit cycle). Brinewick's biannual charter-audit cycle (CF-0038 commitment per INSTITUTIONS §Landholding extension) means the backchannel-ledger-risk exposure window is shorter than in standard-decennial-audit polities; estate-stewards accordingly maintain a smaller active-backchannel roster and a larger rotating-kin-network intermediary pool. Scandal-tug-of-war among Brinewick estates is the ordinary estate rhythm per CF-0038 dramatic-intent commitment, NOT a crisis register — estates trade advisory-notes through the civic-advisory council, file magistrate-clerk docket-material through dowager-gossip proxies, and run charter-audit subpoenas against rivals in procedural register (slow, legally consequential, paid out in ledger-corrections and canal-license revocations). Ward-inspector jurisdiction (artifact-hazard; SOC-4/CAU-3 preserved) is categorically OUTSIDE the backchannel-ledger-risk register — Brinewick estates do NOT maintain backchannel relations with ward-inspectors because corrupting ward-inspectors would trigger extraction-guild response and the authentication-cartel cascade.
  - <!-- added by CF-0038 --> **Aging (extended — Brinewick-specific dowager-gossip idioms)**: the dowager-gossip circuit in Brinewick outskirts estates tracks a Brinewick-specific charter-sound-vs-canal-patronage axis alongside the CF-0031 charter-sound-vs-parvenu, CF-0033 dragoon-funding-council, CF-0034 exposed-district, CF-0036 mix-sound-vs-single-species, and CF-0037 kept-stop-vs-turned-over axes already committed. Named Brinewick dowager idioms: *"the Mellivers took the canal-warden's daughter to lunch last week — charter-sound or canal-patronage?"* (tests the distinction between ordinary civic-adjacent hospitality and backchannel-provisioning-via-kin-network); *"the Corlyhaughs' barge cleared audit at Fourth Bend — who did they see?"* (tests backchannel-ledger-exposure); *"the Thurrow heir played the Copper Weir last circuit — slumming or serious?"* (tests estate-heir-civic-engagement posture; a Thurrow heir who seriously aspires to bardic-circuit recognition is reform-aligned and civic-adjacent in dowager-register); *"he cleared the Fourth Bend"* (a rival estate's associate passed canal-warden audit via backchannel — pejorative, charter-risk-adjacent); *"she walked the Weir"* (completed bardic-circuit rotation — prestige-adjacent, reform-aligned). The Brinewick dowager-register is MAXIMAL at exemplar density — canal-warden-daughter-lunches, barge-audit-clearings, underworld-adjacent-retainer rumors, estate-recruiter-at-tavern incidents, mixed-crew-foreman-mix-sound-judgment incidents, charter-school apprentice-recruitment incidents all track as distinct scandal-axes.
  - <!-- added by CF-0038 --> **Common fears (extended — Brinewick estate-specific scandal register)**: a cousin caught patronizing underworld-aquatic-folk contractor at the Lock-Keeper's Cat (the informal twelve-season tunnel-runner pool per CF-0038 CAU-1-parallel cost commitment; the estate's canal-warden-backchannel-exposure-risk is compounded when an individual underworld contractor with specific route-knowledge is traced back); a canal-warden backchannel exposed mid-biannual-charter-audit-cycle (the cycle's shorter exposure window per CF-0038 commitment is a double-edged stabilizer — cleaner in theory, sharper when exposure lands); an estate-recruiter's Copper Weir tavern offer to a craftsman's daughter escalating into a charter-scandal when the journeyman's family files magistrate complaint (charter-school apprentice-recruitment tier is a named Brinewick offense tier per §(a) CF-0038 extension line 5); a migrant-quarter uprising that names the estate's canal-frontage warehouse in a broadside (the migrant-churn register per ECONOMY §Inequality Patterns CF-0038 extension has a reform-current-clergy reform-campaign pressure-valve that occasionally reaches broadside publication); a heir enlisting in dragoon service (CF-0033 adopting-polity commitment; charter-risk parallel to cousin-signing-expedition-contract per CF-0028/CF-0033 existing patterns); a canal-warden funeral — the ward-resident civic-treasury coffin-allowance pattern per CF-0033 dragoon-killed-at-cordon precedent — at a Fourth Bend public ceremony the estate that runs the backchannel is now expected to attend.
  - <!-- added by CF-0038 --> **Common aspirations and Courtship/marriage (extended — Brinewick estate-specific positioning)**: aspirations — civic-advisory council seating (a retired-patron-of-the-chartered-broker-bench appointment or a dowager-advisory-witness appointment are both charter-sound Brinewick positioning); charter-sound reform-alignment (estate-funding-council seat on the canal-warden charter-audit oversight committee is the Brinewick analog of CF-0033 dragoon-funding-council positioning — civic-adjacent, reform-aligned); mix-sound-house tenant-composition posture per CF-0036 (particularly visible in Brinewick's mixed-species commerce-hub density); the hosting of a Copper Weir bard at the estate's salon (patron-commission record for reform-aligned bardic material is a named prestige asset, paralleling CF-0028 expedition-funding-council positioning). Courtship/marriage catechism extends with a Brinewick-specific sixth inheritance-context question alongside CF-0031 ledger-mark inquiry, CF-0032 placement-right inquiry, CF-0034 raid-widow inquiry, CF-0036 mix-hearth inquiry, CF-0037 stop-kept inquiry: *"does your family's name come up in the Fourth-Bend docket?"* — a quiet marriage-broker test for estate canal-warden-backchannel-exposure history; charter-sound households answer at length; backchannel-exposed households answer tersely.

  - <!-- added by CF-0042 --> **Aging (extended — status-artifact display SEVENTH dowager-axis, CH-0014)**: the Brinewick outskirts estate dowager-gossip circuit extends with a SEVENTH distinct charter-sound-vs-parvenu axis alongside CF-0031 ledger-mark, CF-0033 dragoon-funding, CF-0034 exposed-district, CF-0036 mix-sound-vs-single-species, CF-0037 kept-stop, and CF-0038 Fourth-Bend-backchannel axes. Named Brinewick dowager-register on status-display: *"the Mellivers have a declared-inventory mirror in the salon — is the provenance-stamp current?"* (tests authentication-provenance currency and declared-inventory compliance); *"the Corlyhaughs' cellar-find cleared ward-inspection — sealed-inert or already opened before they logged it?"* (tests unsealing-protocol adherence per CF-0041; sealed-inert is charter-sound, late-log is charter-risk); *"the Thurrow heir wears a chartered pendant at reception — is it declared or just 'old family'?"* (tests the decisive distinction between registered-inventory display and undeclared-hoarding tolerance that polity-asymmetry permits variably); *"the new chartered-broker who moved into Seventh Bend handled the sale — bodyguard on retainer already?"* (tests theft-ring exposure awareness; a bench-broker without bodyguard has not priced the risk). Display-registration stringency awareness is now a charter-sound-estate fluency; naive households accept guest-reception displays without asking for provenance and are marked parvenu for the gap.
  - <!-- added by CF-0042 --> **Common fears (extended — status-display scandal register, CH-0014)**: a cousin who purchased an undeclared-inventory artifact from a chartered-broker-bench-adjacent intermediary in a permissive-polity corridor and brought it home to a punitive-registration polity (extradition-friction exposure; magistrate-docket material if discovered); a bodyguard-contractor killed at the Fourth-Bend estate gate during an attempted theft (charter-audit exposure of retinue-response-posture; dowager-gossip generations-remembered); a broadside naming the estate among those concealing catastrophic-class discoveries from civic-council audit (state-security concealment rumor-register touching the estate's name — M-2 anti-evidence firewall means the broadside cannot NAME a specific incident, but naming the estate still carries reputational risk); a chartered-broker bench assassination-wave reaching a family-patron broker (wealth-exposure to bench-freeze and chartered-broker-guild-retainer commission spike).
  - <!-- added by CF-0041 --> **Common fears (extended — Maker-buried-building strike on outskirts estate land, CH-0014)**: an outskirts estate whose tenant-cottage foundation-dig, qanat-cleaning rite, orchard-tilling, or cellar-rebuild strikes the top of a Maker-deliberately-buried building — the strike closes the excavation, the multi-guild unsealing-triage protocol convenes (ward-inspector + civic-watch + containment-wright + excavation-foreman), and the estate's tenant-cottage household is evacuated pending disposition. Sectarian Maker-mystic pilgrimage-pressure arrives at the site; the estate-steward must navigate between civic-containment obligation and pilgrimage-control pressure; civic-magistrate docket opens for jurisdiction (chartered extraction-guild vs CF-0028 patron-funded expedition vs civic-archaeological-license). Recovery timeline uncertain; tenant-cottage household displacement may be permanent if the strike proves catastrophic-class-adjacent. NOT a fear in every Brinewick outskirts estate — strike-rates remain low per capita — but sharpened in outskirts estates whose land includes known substructure-adjacent bedrock. Dowager-gossip idiom *"the Mellivers struck the old world in the east orchard"* is recognizable register.

  - <!-- added by CF-0043 --> **Aging (extended — Ash-Seal EIGHTH dowager-gossip axis, Brinewick-specific, CH-0015)**: the Brinewick outskirts estate dowager-gossip circuit extends with an EIGHTH distinct axis alongside CF-0031 ledger-mark, CF-0033 dragoon-funding, CF-0034 exposed-district, CF-0036 mix-sound-vs-single-species, CF-0037 kept-stop, CF-0038 Fourth-Bend-backchannel, and CF-0042 status-display-provenance-currency. Named Brinewick dowager-register on Ash-Seal disposition-routing: *"the Mellivers called Ash-Seal at dusk — quiet disposition or late-log scandal?"* (tests whether the dispatch-call was a charter-sound timely response to an ordinary cellar-find or a quiet cover of a find the household had held unlogged past the legal window); *"the Corlyhaughs have a kitchen-plate that came out of Ash-Seal last spring — registered or backchannel?"* (tests whether the displayed safe-class artifact traveled through the chartered-broker-bench sale channel or through Ash-Seal's commercial backchannel to wealthy-private-party routing — compounding with CF-0042 SEVENTH dowager axis on provenance-currency); *"the Thurrow steward's cousin signed on at Ash-Seal last winter — charter-sound or leak-risk?"* (tests whether a kin-link to Ash-Seal personnel is an ordinary civic-adjacent employment placement or a potential conduit for backchannel-purchase arrangement the estate could be implicated in); *"the Weir regulars say the Ash-Seal technician tonight is the defector who was at Havenreach last winter"* (tests whether a defector-specialist returning to Brinewick on consultant commission is politically sensitive — a defector hired back by chartered-extraction-guild roster in another polity carries information the Ash-Seal covenant would have restricted). The Ash-Seal-routing axis is Brinewick-specific and does NOT apply in other heartland outskirts-estate dowager circles; non-Brinewick outskirts estates handle containment-disposition through ordinary chartered-extraction-guild channels and do not have an analog dowager register.

  - <!-- added by CF-0043 --> **Labor rhythm (extended — Ash-Seal estate cellar-find private-fee dispatch, Brinewick-specific, CH-0015)**: Brinewick outskirts ancestral estates navigate Ash-Seal private-fee dispatch for estate cellar-finds, qanat-cleaning-rite discoveries, foundation-dig strikes, and other household-scale artifact encounters. Estate-steward protocol: (1) on discovery, steward notifies estate-owner; (2) steward determines whether find is ordinary mundane-tier (routed to civic lock-master's office per CF-0040 household-scale register) or above-mundane (routed to Ash-Seal private-fee dispatch through chartered-adjacent intermediary — typically the estate's house-scrivener with Ash-Seal-office contact or a civic-advisory-council member's aide); (3) Ash-Seal sends liaison-technician within 24-72 hours for estate-cellar pickup; (4) invoice settles in silver-tier private-fee rates (higher than civic-treasury public rates); (5) estate-steward logs the pickup in ledger under Ash-Seal invoice-number reference. Scandal-risk comes from two directions: estate-steward logging the find AFTER significant delay (late-log scandal — household may have examined, opened, or attempted disposition itself before Ash-Seal arrival); and estate-steward NOT logging the pickup at all, accepting Ash-Seal backchannel-purchase offer at intake rather than paying for disposal-only (commercial-corruption exposure — estate becomes complicit in the Ash-Seal-backchannel-cascade ECONOMY §Breakage Points vector). Charter-sound estates maintain transparent Ash-Seal dispatch protocol; charter-risk estates develop covert arrangements. Dowager-gossip circuit tracks which estates have which reputation.

  - <!-- added by CF-0043 --> **Common fears (extended — Ash-Seal-backchannel scandal reaching estate name, Brinewick-specific, CH-0015)**: a cousin or estate-heir exposed as backchannel-buyer in an Ash-Seal commercial-corruption magistrate-docket case (sealed-docket classification paralleling CF-0036 procedure does NOT protect the family name from dowager-gossip circuit even when the sealed-record protects the specific case facts); an estate-steward caught routing a known-moderate-tier cellar-find through Ash-Seal backchannel rather than chartered disposition (the steward's kin-network ties to Ash-Seal personnel become charter-audit material in the next biannual cycle); an estate-outskirts brick wall damaged during an attempted facility-location observation by an outsider (the civic-watch sedition-libel-adjacent prosecution reaches the estate on whose perimeter the observation attempt originated, implicating the household in indirect facility-breach exposure); an Ash-Seal defector-specialist hired by the estate for post-retirement consultant work who publishes specific procedural-protocol text in a scholarly circle, drawing Brinewick civil-penalty action against the defector AND reputational risk against the estate that employed them after defection.

  - <!-- added by CF-0046 --> **Aging and Trade (extended — NINTH dowager-gossip axis: drylands-trade-factor reciprocity-standing, CH-0018)**: the outskirts-estate dowager-gossip circuit extends with a NINTH distinct axis alongside the eight already tracked (CF-0031 ledger-mark, CF-0033 dragoon-funding, CF-0034 exposed-district, CF-0036 mix-sound-vs-single-species, CF-0037 kept-stop, CF-0038 Fourth-Bend-backchannel, CF-0042 status-display-provenance-currency, CF-0043 Ash-Seal-routing). Named outskirts-estate dowager-register on drylands-trade-factor reciprocity-standing: *"the Corlyhaughs' trade-factor kept the well-keeper's book at Mahrash-Gate through the drought year — charter-sound or parvenu?"* (tests whether the estate's drylands-trade-factor maintained corridor-reputation by honoring reciprocity-obligations at a drylands well-stop across a drought-cycle; the charter-sound estate is one whose factor's keeping-book entries hold across generations as drylands-recognized reliable drylands-trade partner; the parvenu estate is one whose factor cut corners on reciprocity to optimize coin-flow and now cannot route caravans through that corridor); *"the Thurrow factor's rotation was cut from the southern road last season — what did he do at the well?"* (tests whether the factor's corridor-reputation failure stems from reciprocity-breach at a specific well-stop, caravan-master adjudication ruling against him, or sectarian-supremacy co-option the caravan-master-network refused to accept); *"the Mellivers' cousin took the coin-for-shame after the southern factor post failed"* (tests whether a cousin of the estate has emigrated from failed drylands-trade-factor work into Brinewick casual labor, paralleling the CF-0031 coin-for-shame idiom — now applied to cross-regional corridor-reputation failure). Estate-factor households whose drylands-trade-factor maintains reliable reciprocity-standing carry a distinctive charter-sound reputation signal the dowager circuit recognizes and transmits; estate-factors whose corridor-reputation has failed carry a charter-risk signal that pressures estate-owner to reassign or terminate the factor. The register is visible in small Brinewick artisan-quarter commerce (estate-factor household rents tenant-cottage; craftsman's daughter invited to estate's quarterly reception hears which corridor-name the factor is barred from). NON-STRATUM: drylands-trade-factor household is an estate-retainer employment sub-category within ordinary CF-0024 contractor stratum absorption — NOT a new welfare or precarity stratum.

