id: SEC-ELF-003
file_class: EVERYDAY_LIFE
order: 3
heading: (c) Cold North Highland — Rural Clan Households
heading_level: 2
body: |-
  Small-population, hard-living clan settlements in the cold north. Stone cottages, longhouses, byres, peat roof. Progenitor cult often strong here.

  - **Food**: oats, rye, dried fish, mutton, hard cheese, dried berries, mead. Salt meat through the winter. Carnivore-folk households trade with herders for fresh meat.
  - **Water**: snow-melt, stream, well; frozen lines a recurring problem in deep winter.
  - **Sanitation**: outdoor privies, midden pits.
  - **Housing**: stone cottages, longhouses, byre attached for stock-warmth, peat or sod roof.
  - **Clothing**: heavy wool, fur-lined; layered for fur-bearers; reptile-folk almost absent here.
  - **Heating**: peat hearths, communal long-hall hearths; stone construction holds heat.
  - **Childbirth**: village midwife; high mortality; some families travel to a monastic infirmary in serious cases.
  - **Childrearing**: chore-bound early; literacy rare (clan elder may read); craft passed in family.
  - **Aging**: elders revered; "winter death" euphemism for the dignified ending of an old clan-elder who chooses not to take food during a hard season.
  - **Courtship and marriage**: clan-arranged often; cross-clan marriage carries political weight; cross-species marriage rarer here than in heartland but accepted.
  - **Labor rhythm**: short summer of intensive work, long winter of indoor crafts and storytelling; herding and trapping year-round in milder pockets.
  - **Leisure**: sagas, music, drinking, weaving, dice in winter halls.
  - **Intoxication**: mead, distilled spirits in some pockets, fermented dairy in others.
  - **Prayer and ritual**: progenitor cults dominant; harvest-rite, snow-rite, sky-bury rite for raptor-folk clans, cairn-raise for others.
  - **Cleanliness**: sauna where wood permits; cold-stream washing in summer.
  - **Common injuries**: frostbite, falls on ice, livestock injury, raid wounds (raids periodic between clans).
  - **Medicine**: herb-wives, traveling physician once or twice a season, monastic infirmary in distant town.
  - **Death disposal**: cairn, pyre, sky-bury for raptor-folk clans, river-release where streams permit.
  - **Oral storytelling**: long winter sagas, lineage chants, ancestor-keeping.
  - **Common fears**: winter fever, raid, starvation, lost child in snow, wolf-strike on flock. <!-- added by CF-0021 --> Outsider tinker selling "useful charms"; clan-member found reading a bound book brought in from the trade road; the grimoire-leaf folded into traded cloth.
  - **Common aspirations**: a strong herd, sons placed well in marriage or apprenticeship, peaceful old age, a good death.
  - <!-- added by CF-0021 --> **Prayer and ritual (extended)**: clan-burning of suspect occult texts as a quiet ritual; a clan-elder may burn a found grimoire-leaf rather than read it; exile of a clan-member who reads them is faster than any charter-court process.
  - <!-- added by CF-0024 --> **Labor rhythm (extended — skirmish season)**: skirmish-season brings outland mercenary bands to clan borders; clan hospitality laws govern quartering and the permission required to take contracts within clan territory. A clan-member who joins an outland mercenary band is changed by it and must be re-admitted formally on return.
  - <!-- added by CF-0024 --> **Common fears (extended — outland contractors)**: mercenary band camped over the ridge at skirmish-season; a fallout-scarred outlander asking after a cairn (the mystery-specialist looking for a contamination source); a clansman returning from outland band with contracted-bard in tow who sings the clan's business in distant taverns.
  - <!-- added by CF-0024 --> **Prayer and ritual (extended — cleansing rites)**: cleansing rites before a returned fighter re-enters the hearth; clan-elder sanction required before any outland contract can be taken within clan territory; clan-burning of the contract-token (a marked stick or posted leaf) when a contract is refused on principle.
  - <!-- added by CF-0026 --> **Common aspirations (extended for refusers)**: some clan-elders treat refusal of artifact-adjacent work as a mark of proper clan-pride; refuser-lineages accrue prestige distinct from warrior-lineages and sometimes marry exclusively within refuser-strand families.
  - <!-- added by CF-0028 --> **Labor rhythm (extended — expedition-war skirmish season)**: what was skirmish-season (CF-0024 framing) has in recent years escalated in contested regions to outright armed conflict between patron-backed expedition groups. Clan territory sometimes straddles the ruin-adjacent ground where mercenary bands and polity levies clash; clan hospitality laws strain to govern bands who will not honor them.
  - <!-- added by CF-0028 --> **Common fears (extended — ruin-hills and silent warriors)**: a ruin-entrance suspected in clan hills — knowledge so lethal that clan-elders forbid discussion among themselves; a clan-fighter who took the ruin-job on an outland expedition and returns refusing cleansing-rite because he "owes ruin-silence" (a contract-secrecy oath that clan custom does not recognize and cannot absorb); a fallout-scarred outlander asking after a specific cairn (searching for a guardian-construction contamination source).
  - <!-- added by CF-0028 --> **Prayer and ritual (extended — ruin-silence and cairn-raise for the last-job dead)**: silence-oath as a clan-specific response to ruin-knowledge — the clan-member who learned a ruin-location takes the oath with the clan-elder as witness, and the community treats the oath as binding for life. Cairn-raise for the last-job contractor who chose the expedition and did not come back: a distinct cairn-ritual separate from the war-cairn and the clan-death cairn; sometimes raised for a body, sometimes raised empty.
  - <!-- added by CF-0028 --> **Childrearing (extended — ruin-fear register)**: saga-fragments about the clan-fighter who took silence-oath; children forbidden to ask where a returned clansman went; the warning that "down-south the dirt bites with teeth" (a phrase specific to highland clan-talk about heartland ruin activity).
  - <!-- added by CF-0031 --> **Prayer and ritual (extended — southern-mark emigration)**: highland clans do not adopt the contamination-lineage ledger-mark (CF-0031) — civic-registry infrastructure is absent, and clan-custom welfare handles fallout-injured elders through hearth-care and the cairn-field tradition. A clan-member who emigrated to a heartland adopting polity and registered on the southern ledger is recalled at cairn-day with muted grief — the saga-fragment *"the one who took the southern mark"* names but does not honor. Clan-elders treat the mark as a kind of ongoing severance: the emigrant is still of the clan but no longer only of the clan; some clans permit re-admission on return through the existing cleansing-rite (CF-0024 framing), others do not.
  - <!-- added by CF-0033 --> **Prayer and ritual (extended — southern-cordon emigration)**: highland clans do not adopt dragoon institutional form (CF-0033) — civic-registry infrastructure is absent, and clan ward-breach and contamination-injury response remain in the pre-institutional chartered-watch-plus-militia frame appropriate to small-population settlements. A clan-member who emigrated to a heartland adopting polity and enlisted in dragoon service under civic charter is named in saga-fragment with a cadence distinct from the CF-0031 southern-mark naming — *"the one who walks the southern cordon"* — acknowledging civic-chartered service rather than registry-welfare enrollment. The two fragments sometimes attach to the same emigrant (the cousin who enlisted and registered); clan-elder discrimination between them is thin because both readings converge on the same pattern: the clansman who chose civic-chartered southern institution over clan-custom. A second named idiom covers the clan-member who refuses winter travel into dragoon-active heartland polities: *"does not walk the southern cordon"* — carrying charter-sound pride distinct from the CF-0031 refusal-register.
  - <!-- added by CF-0033 --> **Labor rhythm (extended — skirmish season and dragoon presence)**: in clan-borders territories where skirmish-season mercenary bands (CF-0024) formerly camped over the ridge, adjacent dragoon-adopting polities now post dragoon perimeter-patrol along charter-line approaches during ward-breach incidents. Clan hospitality laws do not apply to dragoon-chartered civic forces — dragoons are neither hospitality-seekers (they do not quarter in clan territory) nor outland contract-takers (they do not seek clan-elder sanction). The categorical mismatch is itself a clan-border tension: a dragoon unit posting along the clan approach during a ward-breach declaration across the charter line is experienced as neither enemy nor guest, and clan-elders have no established protocol for the encounter. Emerging clan response is to withdraw families upland from charter-line approaches during dragoon posting periods; this pattern is too recent for named saga.
  - <!-- added by CF-0034 --> **Labor rhythm (extended — lean-winter push-out pathway)**: brutal-winter survival-failure is a recognized pathway out of the clan toward outland banditry (CF-0034). A clan-member who cannot endure the lean winter — kinless after plague, in debt to no-kin-willing-to-absorb, refused apprenticeship-placement after clan-elder sanction — may walk south in the thaw rather than stay for another hard year. Clan-saga preserves the pathway without sanctioning it: the saga-fragment *"he walked south after the lean winter"* names the departure with a cadence distinct from winter-death (which is honored) and exile-for-grimoire-possession (which is categorically censured per CF-0021 highland clan-burning). The lean-winter-walker is a category apart — neither dead, nor shamed, nor honored; the clan loses him, and the loss is mourned in the third person.
  - <!-- added by CF-0034 --> **Prayer and ritual (extended — cleansing-rite refusal for enslave-band returnees)**: the standard CF-0024 cleansing-rite for a returned outland-band member does NOT cover the CF-0034 raid-and-enslave distribution subset. A clan-member who returns from an outland band that committed kill-witnesses acts faces a heavier variant of the cleansing-rite in most clans (extended vigil, longer atonement, sometimes denied); a clan-member who returns from an outland band that committed RAID-AND-ENSLAVE acts faces CLEANSING-RITE REFUSAL — the rite is categorically unavailable in most highland clans. The returnee remains under permanent exile, or must undertake extended atonement that few clans offer and fewer complete. The refusal is the sharpest moral commitment the highland-clan register carries; it is categorically distinct from the CF-0028 ruin-silence-oath (which governs ruin-knowledge contraband) and from the CF-0021 clan-burning of grimoire-leaves (which governs occult-text exile). Saga-fragment preserves named refusals: *"the clan did not close the circle for him."*
  - <!-- added by CF-0034 --> **Common fears (extended — the clan-son who walked south, the outland-band at the ridge)**: an outland band wintering over the ridge at the edge of clan territory; kin-idiom *"his name came back in a bounty-posting"* (a clan-son walked south, joined a band, became a named captain or a named hunt-target); a fallout-scarred outlander asking after cairns may now mean a ruin-searcher (CF-0028), a contamination-tracer (CF-0025), or a bounty-hunter tracing a captain's trail — the clan-elder vetting question now includes all three predicates. Clan-daughter taken from the outer-byre by a raid-band is named in the saga-fragment of household grief that parallels winter-death and marsh-ague grief; her return, if it comes, forces the cleansing-rite question in the household before the clan.
  - <!-- added by CF-0034 --> **Common aspirations (extended — the clan that held its winter)**: a strong herd and sons-placed-well already named; extension: *"the clan that held its winter without losing a son to the south."* The idiom is quiet pride — not heroism — in having absorbed the hard season through hearth-care and clan-welfare without pushing kin out toward outland banditry. Refuser-lineages (CF-0026 highland strand) sometimes prize this phrase as moral-witness evidence of clan-pride distinct from warrior-lineage or lineage-keeper claims.
  - <!-- added by CF-0035 --> **Prayer and ritual (extended — cleansing-rite extension for contamination-haunt returnee)**: highland clans extend the CF-0024 cleansing-rite for a returned outland-band fighter to cover a clansman who killed in a known contamination-haunt (CF-0035 mutated-beast zone). The returnee is not refused the rite (unlike the CF-0034 raid-and-enslave return, where the rite is categorically withheld), but the rite is longer, witnessed by the clan-elder AND by a herb-wife to judge contamination-injury status, and followed by a span of hearth-adjacent work rather than immediate return to herd-duty. The register is in-clan-moral: a contamination-haunt kill is hazardous labor the clan recognizes, not heroic act the clan celebrates. A clansman who accepted an outland bounty-contract for a named legendary-beast AND accepted the contamination-haunt risk faces a doubled rite — one for the outland-band work (CF-0024 frame), one for the contamination-kill (CF-0035 frame).
  - <!-- added by CF-0035 --> **Labor rhythm (extended — ward-of-the-flock heightening)**: highland herding ward-of-the-flock vigilance (already operative for wolf-strike and raid-risk) heightens in corridors where mutated-beast activity has been recognized. Night-watch rotation extends; byre-door construction receives stone-reinforcement in exposed clan-pockets; clan-elder sanction is required before venturing into a named beast-haunt ridge, paralleling the CF-0021 sanction on grimoire-leaf-reading and the CF-0024 sanction on outland-contract-taking. Clan-border outland hunter-contractors seeking passage through clan territory to reach beast-haunts request elder-sanction like outland mercenary bands (CF-0024); refusal is more common for beast-hunt passage than for simple skirmish-band passage, because the clan does not want the outland contractor's kill-contamination returning through clan-ground.
  - <!-- added by CF-0035 --> **Oral storytelling (extended — saga-fragment for the contamination-haunt clansman)**: highland saga-fragment register gains a named category for the clansman who crossed into a known contamination-haunt for hunt or pursuit, distinct from the CF-0024 outland-contract saga-fragment and the CF-0028 ruin-silence-oath saga-fragment. The contamination-haunt fragment preserves corridor-name-rather-than-beast-name cadence (*"the one who walked the upper Selk ridge in the cold moon; he brought back the head and the cough; he did not herd again"*) — in-register with AES-1 scarred cadence. No bardic inflation; no hero-ballad. The fragment is recited at hearth-side in the winter hall, not sung in public feast.
  - <!-- added by CF-0035 --> **Common fears (extended — up-ridge idiom)**: named highland idiom for mutated-beast presence in the corridor above the clan: *"up-ridge the beast wears the wrong coat"* — a warning phrase elders use to children and to outland hunter-contractors seeking passage. The idiom distinguishes contamination-haunt-indication (wrong coat, wrong proportion, wrong track) from ordinary wolf-or-bear-strike fear. A clansman who dismisses the idiom when it is first voiced is a figure in several clan-saga fragments; the fragments end without ballad.
  - <!-- added by CF-0035 --> **Common aspirations (extended — the ridge that stayed quiet)**: clan-aspirations already named extend: *"the ridge that stayed quiet this season"* — acknowledging the rare year in which no contamination-haunt signal came down the high pastures. Register is in-kind with the existing *"clan that held its winter"* aspiration: quiet pride, not heroism.
  - <!-- added by CF-0036 --> **Prayer and ritual (extended — cleansing-rite refusal for cannibal-band returnees; clan-elder sanction against supremacist-doctrine importation)**: the CF-0034 raid-and-enslave cleansing-rite refusal extends to a CATEGORICALLY WORLD-WIDE refusal for any clan-member returning from a band that committed interspecies-cannibal acts. The refusal is sharper even than CF-0034's raid-and-enslave refusal (which was previously the heaviest precedent); no atonement path in any highland clan; the returnee remains under permanent exile with no saga-fragment closing the circle. Clan-elder sanction against outland sectarian preachers who carry supremacist-doctrine pamphlets extends CF-0021 highland grimoire-leaf-burning ritual cadence: the pamphlet is burned ritually rather than archived; the preacher is run down-valley before the next hearth-meal; a clansman who argued the doctrine at the elder-hearing faces clan-sanction parallel to grimoire-possession exposure.
  - <!-- added by CF-0036 --> **Oral storytelling (extended — saga-fragment for the supremacist-doctrine-camp returnee)**: highland saga-fragment register names the clansman who walked south to a supremacist-doctrine camp with a cadence reserved for doctrine-camp-returnees — distinct from the CF-0034 lean-winter-walker cadence (which the clan mourns in the third person), the CF-0028 ruin-silence-oath cadence (which the clan preserves), and the CF-0021 grimoire-exile cadence (which the clan censures). Doctrine-camp-return cadence combines grimoire-censure with lean-winter-mourning: *"he took the pamphlet and walked; the south claimed him; the clan does not close the circle."* Saga-fragments name but do not honor.
  - <!-- added by CF-0036 --> **Common fears (extended — outland doctrine-preacher at the ridge)**: an outland supremacist-doctrine preacher at the clan-border ridge seeking hospitality; a clansman who began speaking the doctrine at the winter hall and whose kin could not talk him out of it; a clan-daughter taken by a band whose cleansing-rite-refusal register now includes cannibal-act classification (the saga-fragment of household grief becomes unspeakably heavy). The fears are in-register with existing clan-border fears, not novel.
  - <!-- added by CF-0036 --> **Common aspirations (extended — the clan that refused the pamphlet)**: clan-aspirations already named extend: *"the clan that refused the pamphlet and kept the circle closed"* — acknowledging the rare and valued moral-witness of hearth-elders who ran the doctrine-preacher down-valley before the winter hall could hear him. Register is in-kind with *"clan that held its winter"* and *"ridge that stayed quiet"* — quiet pride, not heroism.

  - <!-- added by CF-0041 --> **Prayer and ritual (extended — clan-elder sanction on sealed finds and unsealing-refusal idiom, CH-0014)**: highland clan households encountering sealed Maker-Age containers in pastures, byre-foundations, peat-cuts, or old-hall cellars handle the find through clan-elder sanction rather than civic institution (paralleling CF-0021 grimoire-leaf-burning and CF-0035 beast-trophy protocol). Clan-elder decides disposition: buried-back-under-cairn at the closest cairn-field with a witness-knot marking (the most common outcome), or sent-south under escort to the nearest charter-polity ward-inspector (the rare outcome when the elder judges the find beyond clan-custom containment). The canonical unsealing-refusal idiom is *"the seal is the old world's word; we do not answer"* — taught to children alongside the grimoire-leaf refusal and the raid-widow silence. The clan does not drill; the elder signs and the kin carry. A clansman who breaks seal on a find without elder sanction faces clan-sanction parallel to grimoire-possession exposure; a clansman who survives an accidental unsealing and returns with contamination injury is absorbed into the existing CF-0025/CF-0031 contamination-injured hearth-care register (NOT a new stratum per Rule 3 firewall). Saga-fragment for the clansman who opened the sealed box he found in the upper byre is recited at hearth-side in the winter hall, not sung in public feast; cadence parallels the CF-0035 contamination-haunt-clansman fragment.

  - <!-- added by CF-0039 --> **Oral storytelling (extended — Maker-debt-binding saga cadence, CH-0014)**: highland saga-fragment register gains cadence for the clansman who tried to unmake a Maker-Age find and found it stronger afterward — *"he took the axe to the old-world coin; the coin kept the edge, the axe broke, his arm with it; the coin is under the cairn now and the cairn keeps the word."* Cadence is Maker-debt-binding register (per WORLD_KERNEL CH-0014 extension), NOT heroic-relic register. The fragment names the attempt-and-consequence without inflating; the clan does not valorize the attempt. Bardic mainstream withholds hero-cycle from unsealer and destruction-attempter material across all regions; the withhold-discipline parallels CF-0034 lean-winter-walker, CF-0035 beast-hunter, CF-0037 walked-stop, and CF-0036 silenced-contractor firewalls.
  - <!-- added by CF-0037 --> **Labor rhythm (extended — clan-territory waystation under elder-sanction)**: highland clans whose territory includes a clan-border road or a heartland-approach route host family-handled waystations (CF-0037) under clan-elder sanction. The waystation operates as ordinary kin-handed roadside hospitality in the pre-Charter cadence the Charter-Era civic frame later organized in chartered-polity contexts (per TIMELINE.md Layer 1 / Layer 2 annotations) — clan-elder sanction governs which non-kin travelers are received, which trade goods may be carried through, and which outland contractors may rest under hospitality without formal contract. Mountain-east valley-pass waystations operate parallel-but-distinct: pass-season open / winter-closed cadence dictates the household-enterprise rhythm; high-pass stations close half the year and the family migrates downward to the approach-town for the closed season.
  - <!-- added by CF-0037 --> **Prayer and ritual (extended — clan-burning of bad-actor stationkeeper and saga-fragment for the walked-stop child)**: where a clan-territory waystation turns to corridor-betrayal (the rare bandit-fronting station per CF-0037 Breakage Point), clan-elder sanction mobilizes — clan-burning of the station-fabric paralleling CF-0021 grimoire-burning ritual cadence; the family is exiled from the clan-circle in a refusal-register heavier than the routine CF-0024 outland-band returnee cleansing-rite. Saga-fragment for the stationkeeper-child who walked: *"his road was given; he gave it back"* — distinct cadence from the CF-0034 lean-winter-walker third-person mourning (*"he walked south after the lean winter"*) and from the CF-0028 ruin-silence-oath cadence; the walked-stop register acknowledges the gift-and-refusal of the inheritance specifically. Mountain-east deferral annotation: the mountain-east everyday-life subsection (currently absent from this file; see OPEN_QUESTIONS.md CH-0012) is prefigured by valley-pass waystation patterns described here under clan-territory waystation cadence; full mountain-east subsection (f) deferred to future canon work.

  - <!-- added by CF-0043 --> **Oral storytelling (extended — Brinewick defector-returnee thin saga-fragment, CH-0015)**: highland saga-fragment register carries a thin annotation for the clansman who walked south, took Ash-Seal work in Brinewick, defected from the company into chartered-extraction-guild roster commission on the heartland containment-wright circuit, and returned to the clan as an individual fee-for-service containment specialist carrying Brinewick-trained portable reputation. The saga-fragment is named WITHIN the existing southern-emigrant register — parallels the CF-0031 *"the one who took the southern mark"* and CF-0033 *"the one who walks the southern cordon"* cadences — rather than as a new distinct saga category (Rule 3 firewall; no new southern-emigrant cadence for Ash-Seal specifically). Saga-fragment idiom: *"the one who came out of Brinewick"* — acknowledges civic-commercial-company origin and the subsequent defector-specialist independent status. Clan-elder treats the returnee as of-the-clan-but-not-only; re-admission through CF-0024 cleansing-rite is available where the clan judges the southern-commercial work hazard-labor-adjacent; refusal is rare because the work is craft-empirical rather than occult-adjacent. Mountain-east valley-pass clan households follow the same pattern; other regions (drylands, fenlands) do NOT carry an Ash-Seal-returnee register because Ash-Seal's defector-diffusion is heartland-bounded.

  - <!-- added by CF-0046 --> **Oral storytelling (extended — clansman-learned-the-gate-turn saga-fragment, CH-0018)**: highland saga-fragment register carries a thin annotation for the clansman who walked south into drylands caravan-rotation work and learned the drylands hospitality-verse gate-turn (CF-0044) over successive caravan-apprentice seasons — parallels the CF-0031 *"the one who took the southern mark"* and CF-0033 *"the one who walks the southern cordon"* cadences rather than as a new distinct saga category (Rule 3 firewall; no new highland-emigrant cadence for drylands specifically). Saga-fragment idiom: *"the one who took the gate"* — acknowledges drylands-corridor cultural-passage without honoring. The clansman returning carries drylands verse-cadence (CF-0044 register faded partially at clan-return but audible) and corridor-reputation at drylands-caravan-rotation scale (NOT portable to clan-internal reputation per CF-0044 non-portable-cultural-prestige stabilizer); re-admission through CF-0024 cleansing-rite is available at clan-elder discretion; refusal is rare because the drylands work is hospitality-and-supply-labor, not hazard-labor. Mountain-east valley-pass clan households follow the same pattern where drylands-corridor access exists via seasonal-pass routing. Other regions do NOT carry a drylands-returnee highland-saga register (fenlands fen-village-discipline absorbs through silence; heartland canal-migrant traffic in the other direction does not produce this specific saga-fragment). The saga-fragment is RECITED at hearth-side in the winter hall paralleling CF-0041 sealed-find saga-register, NOT sung in public feast — the private-hearth cadence holds the cultural-passage acknowledgment without elevating the returnee to hero-cycle.

  ---
