id: SEC-GEO-001
file_class: GEOGRAPHY
order: 1
heading: Continental Shape
heading_level: 2
body: |-
  A temperate-to-cold continent oriented roughly north-south, with:
  - a long coastline broken by river-mouth ports;
  - a major interior river system feeding a network of natural and constructed canals;
  - a mountain range to the east that arrests warm winds and shapes the rain shadow;
  - a fenland-and-bog complex along parts of the western lowlands;
  - a warm-dry south transitioning toward semi-arid drylands at its margins.

  ---
