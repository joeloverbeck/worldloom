id: SEC-GEO-015
file_class: GEOGRAPHY
order: 15
heading: Regional Coordination on Cluster C Subsection Presence
heading_level: 2
body: |-
  The oversize-saddlery guild-subsection (CF-0032) is geographically bounded to ancestral Cluster C polities — it is NOT a fourth instance of the three polity-asymmetric stress-register patterns (CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0031 contamination-registry are all DISAGREEMENT patterns where polities diverge in their institutional response). The subsection circuit is the mirror image: an AGREEMENT pattern, a cross-polity Cluster C guild-network requiring coordinated recognition of master-rank progression across ancestral polities. The two should not be conflated in Charter-Era register.

  Regional distribution:

  - **Temperate canal heartland**: subsection presence is substantial where Cluster C ancestral range overlaps the canal corridor — mammoth-folk and ground-sloth-folk heartland communities support the densest subsection shops, with barge-refit yards at canal-lock towns providing secondary commission-work. Guild-subsection shops are visible in artisan quarters; reciprocal-journey scheduling posts at guild-house walls.
  - **Cold north highland**: subsection presence in aurochs-folk and woolly-rhinoceros-folk highland pockets is smaller, clan-forge-adjacent rather than guild-shop-adjacent; clan-elder sanction governs outland reciprocal-journey travel; reciprocal-journey saga-fragments appear in longhouse oral tradition.
  - **Mountain east**: valley-mining estates with resident mammoth-folk or ground-sloth-folk workers sometimes commission subsection work for oversize mine-cart and ore-wagon fittings; subsection shop presence is thin but seasonal-pass-connected to heartland masters.
  - **Drylands south**: essentially absent. Cluster C large-body-plan heat-vulnerability precludes ancestral-range presence; rare Cluster C caravan transits commission bespoke-import fitments from ancestral-polity journeymen on long-lead-time contracts.
  - **Wet fenlands west**: absent. Stilt-village embodiment-incompatibility precludes Cluster C large-body-plan ancestral presence.

  Cross-polity reciprocal-journey circulation along canal corridors and caravan routes is ordinary mobility in ancestral-polity regions. Extra-regional long-lead-time export contracts flow from ancestral-polity masters to estate-class customers in non-ancestral polities; the customer base there is thin but durable. Estate-sizing norm migration to non-ancestral polities is a recognized generational drift — ancestral-polity Cluster C residents mobile to non-ancestral polities commission subsection work under export contract, and their inherited estates maintain the oversized architectural scaling after their departure. This is a named Rule-4 partial concession (per CF-0032 notes): consumption-locality does not fully track production-locality, though the *craft* (production) remains ancestral-region-gated by guild continuity.

