id: SEC-GEO-007
file_class: GEOGRAPHY
order: 7
heading: Disease Ecologies
heading_level: 2
body: |-
  - **Winter fever** — heartland and north; respiratory; kills heavily; recurs in cycles.
  - **Marsh ague** — fens and lowlands; recurring fever; debilitating more than fatal.
  - **Livestock plagues** — seasonal; can devastate a tenant's stock and trigger debt cascades.
  - **Drylands sun-sickness and dehydration** — work-season hazard.
  - **Contamination injury** — slow chronic effects in artifact-laboring families; recognized but poorly characterized.

