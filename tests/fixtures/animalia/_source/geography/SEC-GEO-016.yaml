id: SEC-GEO-016
file_class: GEOGRAPHY
order: 16
heading: Extractive Zones
heading_level: 2
body: |-
  - **Stone quarries** — heartland and mountain.
  - **Iron, copper, and silver mines** — primarily mountain east; some fen-edge bog-iron.
  - **Salt evaporation flats** — coastal south.
  - **Peat bogs** — fenlands west; primary fuel source there.
  - **Forest lots** — managed coppice and timber stands across the heartland.
  - **Kelp shores** — coastal; food and fertilizer.
  - **Ruin-rich zones** — geographically scattered; identified by Maker substructures or surface-finds; here the artifact-extraction guilds operate. Local towns vary from prosperous-because-of-the-guild to wary-because-of-the-guild.

