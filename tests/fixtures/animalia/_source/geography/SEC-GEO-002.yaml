id: SEC-GEO-002
file_class: GEOGRAPHY
order: 2
heading: Climate Bands
heading_level: 2
body: |-
  | Band | Character | Tempo |
  |---|---|---|
  | **Cold North Highland** | Snowbound 4–5 months, short summer, cold rain, wind off the heights | Long winters, compressed work-season, raid-risk |
  | **Temperate Canal Heartland** | Mild winters, warm summers, abundant freshwater, the agricultural and commercial core | Year-round canal traffic outside hard freeze; market rhythm dominant |
  | **Warm-Dry South / Drylands** | Hot summers, mild winters, drought cycles, water-scarcity culture | Dawn-and-dusk labor, midday rest, caravan rhythm |
  | **Wet Fenlands West** | Cool, wet, marshy, ague-prone, peat-rich | Tide and season; hard living, sparse population |
  | **Mountain East** | Hard winters, sparse arable, mining and pastoralism, isolated valleys | Pass-season opens trade for half the year |

