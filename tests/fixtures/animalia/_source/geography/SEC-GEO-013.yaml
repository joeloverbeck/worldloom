id: SEC-GEO-013
file_class: GEOGRAPHY
order: 13
heading: Regional Asymmetry on Brinewick's Adopting-Polity Status (Cumulative Five-Axis)
heading_level: 2
body: |-
  Brinewick (CF-0038) is one of the larger heartland canal-choke-point polities and is explicitly committed as an ADOPTING polity on all five Charter-Era polity-asymmetric disagreement axes. This is load-bearing per its scale — silence at Brinewick's weight would constitute consequence evasion (CF-0038 Phase 6b Politics/Institution critic finding). Specific commitments:

  - **CF-0021 crafter-tolerance (CH-0002)**: PUNITIVE-WITH-LICENSING-EXPERIMENT. Civic watch and artifact-extraction guild coordinate prosecution in the downtown civic core and artisan quarters; estate-outskirts tenant cottages provide effective cover (GEOGRAPHY existing Regional Asymmetry pattern for big-city outskirts); a limited crafter-guild licensing experiment is under contested charter review in the civic-advisory council, driven by the punitive-enforcement revenue plateau and the capture-rather-than-drive-underground argument common in large heartland polities per CF-0021 GEOGRAPHY commitment.
  - **CF-0024 mercenary-licensure (CH-0003)**: LICENSING UNDER TIGHT CHARTER for companies; ad-hoc band formation restricted within the civic core; outskirts-estate noble-retinue formation tolerated-with-friction, with periodic civic-watch testing of the Charter-Era anti-monopoly-of-force boundary. Contractor-auxiliary rosters in chartered extraction-guild chapter-houses are among the heartland's largest.
  - **CF-0028 funder-primacy (CH-0004)**: SYNDICATE-LICENSING WITH CIVIC-AUDIT OF ARTIFACT VAULTS. Commerce-hub scale favors syndicate participation over estate-patronage monopoly; estate-patron funder-primacy claims are contested in magistrate docket; civic-audit of outskirts estate vaults is a recurring flashpoint. Chartered-broker disposition fees from expedition recoveries flowing through Brinewick brokers constitute a material civic-revenue stream.
  - **CF-0031 contamination-registry (CH-0005)**: ADOPTING. Commerce-hub immigration + canal-network artifact-turnup volume demands it; civic-registry subsidiary-record capability is near-continental density. Registered / unregistered household distinction is visible in artisan-quarter marriage-broker register; three-generation mark interval is fully institutionalized.
  - **CF-0033 dragoon-adoption (CH-0007)**: ADOPTING. Canal-choke-point revenue funds a canal-transit levy dedicated to dragoon payroll (additive, not displacing containment upkeep per OPEN_QUESTIONS §Dragoon Funding-Stream Specificity per-polity — Brinewick committed as additive); dragoon barracks and drill yards visible in the civic quarter; chartered extraction-guild consent secured via the load-bearing perimeter/extraction boundary; principled-refuser-clergy (CF-0026) charter-court challenges against mission creep are a standing docket line.
  - <!-- added by CF-0043 --> **CF-0043 Ash-Seal civic-charter anomaly (CH-0015)**: committed NON-GUILD CIVIC-CHARTERED COMMERCIAL-COMPANY MONOPOLY on containment / research / sealed-inert disposal in Brinewick and its carriage-distance heartland radius, under concordat with chartered-extraction-guild (guild retains extraction / ward-inscription / ward-inspection / chartered-brokerage per SOC-4). Ash-Seal's known company building-existence in the civic-core artisan-quarter-adjacent addressed region is public; facility-locations (warehouses, research laboratories, catastrophic-tier pass-through holding, moderate-tier permanent inventory facility) are CIVIC-LEGALLY PROTECTED TRADE SECRETS — the specific addresses are not entered on the civic-registry's normal real-property ledger under the trade-secret-protection clause of the Ash-Seal civic charter; the civic-watch knows the locations under sealed-docket procedure paralleling CF-0036 sealed-docket civic-scandal category. Trade-secret-facility-breach (unauthorized entry or observation) is prosecutable under sedition-libel-adjacent Brinewick statute. Ash-Seal's commercial property-protection guards are bounded to facility-perimeter; beyond-perimeter deployment triggers CF-0024 civic-watch friction. The carriage-distance radius Ash-Seal dispatches into — heartland canal-towns and estate-outskirts villages within roughly a day's wagon-trip from Brinewick — is not formally boundaried on the civic map; the reach is demand-calibrated and customary rather than chartered. Ash-Seal civic-charter is NON-TRANSFERABLE; other canal-heartland polities maintain full-power SOC-4 chartered-guild-monopoly over containment / neutralization (Mossdown, Havenreach, and other heartland commerce hubs have chartered-extraction-guild-containment-wright benches at standard guild-wage scales; the Brinewick anomaly is unique to its Charter-Era grant and four-stabilizer primacy compound).

  The five-axis cumulative commitment makes Brinewick a Layer-4 stress-register exemplar — every accumulated asymmetric-friction pressure that exists in the Charter-Era regional-variation register maps onto Brinewick's civic docket, canal-corridor illegitimate-service rail traffic, reform-current clergy organizing, and estate dowager-gossip circuit. Charter-risk at Brinewick's scale is proportionally high and proportionally visible; civic-advisory council and magistrate-court caseload accordingly among the densest in the heartland.

  Brinewick's SIXTH-axis latent-burden posture aligns with world-aggregate: tracks CF-0034 bandit-extradition, CF-0035 trophy-legality, CF-0036 silence-protocol-unsealing, CF-0037 child-conscription-protection as latent watch-items WITHOUT currently-structural sixth-axis status. Brinewick's supremacist-movement licensure / proscription status per CF-0036 §Supremacist-Movement Licensure (OPEN_QUESTIONS) specifically deferred — Brinewick's mixed-species density would argue for PROSCRIPTION, but commerce-hub toleration of heterogeneous opinion argues for LICENSING-UNDER-SCRUTINY; the civic-advisory council reviews the question in standing session without yet issuing a charter-court ruling.

