id: SEC-GEO-017
file_class: GEOGRAPHY
order: 17
heading: Food Baselines
heading_level: 2
body: |-
  - **Heartland**: oats, rye, wheat (in better land), root vegetables, freshwater fish (extensive fishery), poultry, mutton, cattle, dairy, ale, mead.
  - **Cold north**: oats, rye, dried fish, mutton, hard cheese, dried berries, mead.
  - **Drylands south**: barley, lentils, dates (regional), lamb, goat, fermented dairy, fermented date wine.
  - **Fenlands west**: eel, waterfowl, root vegetables, peat-smoked everything, ale.
  - **Mountain east**: oats, root vegetables, mutton, hard cheese, traded grain, distilled spirits where wood and wherewithal exist.

  Carnivore-folk have organized butchery and hunting access in all regions. Herbivore-folk dominate certain agrarian sectors (notably bovine-folk in heartland dairy and beaver-folk in canal engineering, neither of which is purely diet-driven but both of which are species-clustered).

