id: SEC-GEO-012
file_class: GEOGRAPHY
order: 12
heading: Regional Asymmetry on Dragoon-Adoption
heading_level: 2
body: |-
  Canal-corridor quarantine dragoons (CF-0033) are geographically uniform in proposed institutional form — the chartered civic perimeter force concept is known across the heartland and debated in non-heartland polities — but sharply uneven in actual adoption, constituting a **fifth Charter-Era polity-asymmetric disagreement axis** joining CF-0021 crafter-tolerance, CF-0024 mercenary-licensure, CF-0028/CF-0030 funder-primacy, and CF-0031 contamination-registry. Four adoption-gates (anti-monopoly political cost, chartered extraction guild consent/override, dedicated funding stream, principled-refuser clergy influence) produce the asymmetric pattern:

  - **Canal heartland charter towns**: larger polities with canal-choke-point revenue, strong central-council authority, and chartered extraction guild consent have adopted over the past decade. Dragoon barracks and drill yards are visible in civic quarters; muster rolls at civic-registry archive; sealed-quarter perimeter maintenance and ward-breach rapid response are dragoon-chartered functions; charter-court challenges by principled-refuser clergy (CF-0026) against mission creep are an evolving magistrate docket. Smaller charter towns in the same region decline adoption due to funding-stream absence or absorb the transition-cost spike of buildout with visible ward-breach severity impact for 3-7 years before institutions mature. Black-market artifact traffic flow has re-routed away from dragoon-active corridors toward non-adopting polities, intensifying adoption-asymmetric concentration.
  - **Big-city outskirts estates**: officially aligned with parent polity; in adopting-polity estates, steward correspondence now includes dragoon-charter magistrate liaison for ward-breach declarations crossing estate tenant land. Dowager-gossip distinguishes "estates whose patrons sit on the dragoon-funding council" (civic-adjacent, reform-aligned) from "estates that have never had a dragoon posting cross their tenant line" (charter-sound, refuser-aligned, often older-house). In non-adopting-polity estates, CF-0024 noble-retinue patterns persist unchanged; the estate retinue remains the local answer to ward-breach and cellar-find incidents.
  - **Cold north highland clans**: do not adopt. Civic-registry infrastructure is absent; clan-custom welfare handles ward-breach and contamination-injury response through hearth-care and cleansing-rite tradition (CF-0024 framing). A clan-member who emigrated to a heartland adopting polity and enlisted in dragoon service is named in saga-fragment with the particular cadence reserved for kin who took civic-chartered work under an outland charter — the saga names but does not honor. Named idiom for the clan-member who refuses winter travel into adopting-polity sealed-quarter towns: *"does not walk the southern cordon."*
  - **Drylands south caravan towns**: do not adopt. Caravan polities lack civic-registry infrastructure for standing civic force, and caravan-rotation social form is incompatible with ward-resident dragoon recruitment. Caravan-master cargo refusals extend to include certain goods not carried into dragoon-active canal-heartland corridors (the refusal is rotation-bounded and travels by reputation). Drylands idiom for a cousin who emigrated to a heartland adopting polity and enlisted: *"took the coin-for-service"* — the phrase carries the characteristic drylands moral compound of pity and rebuke, parallel to but distinct from the CF-0031 *"coin-for-shame"* idiom. Tea-house scribes in some traditions refuse to witness any contract that names a dragoon-adopting polity as jurisdiction, treating the charter-court register as incompatible with caravan-rotation witness-practice.
  - **Wet fenlands west**: do not adopt. Civic infrastructure is absent; demographic fragility precludes standing force. Fen-village reaction to dragoon presence at dry-edge is not-spoken-of — following the fen-village discipline pattern already established for CF-0028 sunken-ruin cycles and the CF-0031 ledger-mark, the fen posture is institutional-absence-acknowledged-in-silence rather than named-idiom. A fen emigrant who enlisted in dragoon service in a dry-edge adopting polity is spoken of only in the third person, in the past tense, and only after confirmation that no one in the current fen-village intends to follow. Amphibian-folk canary vigilance continues to detect contamination-drift from distant firings regardless of dragoon adoption upstream; fen communities do not benefit from the dragoon institutional response and occasionally face asymmetric resource allocation at dry-edge monastic clinics when dragoon-casualty intake crowds the common bench.
  - **Mountain east**: sparse adoption. Seasonal isolation and small civic-infrastructure base preclude standing force in most mountain polities; some valley polities with mining-revenue funding-stream and pass-season artifact-trade exposure experimented with limited seasonal dragoon charter, with uneven results. Pass-closure renders a standing force unsustainable for half the year, and the mountain polities that attempted seasonal dragoon charter have largely reverted to traditional chartered-watch-plus-militia response.

  Dragoon cross-polity pursuit of black-market artifact traffic across charter lines generates recurring legal friction; a dragoon unit lawfully acting in its home polity has NO chartered authority in a non-adopting polity and pursuit across the charter line is legally fraught. Civic registry has no schema for "lawful dragoon standing" recognized across polities. This is the same no-schema gap that CF-0021 exposed for crafters, CF-0024 for mercenary-companies, CF-0028/CF-0030 for expedition-sponsors, and CF-0031 for registered households — five parallel asymmetries now constitute the Charter-Era regional-variation pattern, and the inter-polity extradition docket accumulates at each.

