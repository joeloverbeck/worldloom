id: SEC-GEO-003
file_class: GEOGRAPHY
order: 3
heading: Choke Points
heading_level: 2
body: |-
  - **River-mouth ports** — funnel coastal trade into interior canals; politically valuable, often disputed.
  - **Canal locks and weirs** — single points of control on commercial flow; small towns grow around them.
  - **Mountain passes** (eastern range) — open in summer, closed in winter; toll-rich.
  - **Ferry crossings** where bridges have not been built; some predate the Charter Era.
  - **Bog causeways** in the fens — narrow, slow, easily blocked by accident or design.

