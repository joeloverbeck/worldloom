summary: |
  ACCEPT_WITH_REQUIRED_UPDATES verdict on proposal PR-0003-canal-corridor- quarantine-dragoons.md. CF-0033 committed as soft_canon institution at regional / current / public scope, documenting canal-corridor quarantine dragoons as chartered civic perimeter force in some larger heartland polities, instituted in the past decade as contested Charter-Era anti- monopoly-of-force concession. Load-bearing perimeter/extraction jurisdictional boundary inscribed normatively in CF statement: dragoons enforce perimeter only; chartered extraction guilds retain extraction, containment, neutralization, inscription, and brokerage. Mission-scope commitment enumerated: dragoons do NOT extract, inscribe, contain, neutralize, police routinely, or deploy in external conflict. Adoption contested asymmetric: some polities adopt, some refuse on principle, some lack infrastructure. Dragoon-adoption becomes a fifth polity- asymmetric disagreement axis joining CF-0021 (crafter-tolerance), CF-0024 (mercenary-licensure), CF-0028/CF-0030 (funder-primacy/ expedition-tolerance), and CF-0031 (contamination-registry adoption). Five existing CFs qualified by CH-0007 modification_history entries: CF-0008 (scope narrowing), CF-0020 (qualification), CF-0024 (qualification), CF-0026 (extension), CF-0028 (clarification). Mystery Reserve firewall extensions added to M-6 (confiscation-custody), M-7 (retired-dragoon reputation-genealogy), M-8 (perimeter-lore tactical not mechanistic), M-9 (civic-evidence archive disposition discipline), M-11 (pensioner-health occupational-epidemiological); new M-13 entry (institutional contingency of dragoon form) added per Rule 7 obligation. Downstream updates applied to INSTITUTIONS.md (Military new §Subtype subsection; Law, Landholding, Trade/Guilds, Religion, Recordkeeping internal-contradictions annotations), TIMELINE.md (Layer 3 institutional-residue late-Incident-Wave founding; Layer 4 fifth-axis convergent-pressure bullet), GEOGRAPHY.md (new Regional Asymmetry on Dragoon-Adoption section; Sealed-Quarter-Towns annotation), ECONOMY_AND_RESOURCES.md (Wage Spreads dragoon tier; Value Stores dragoon charter-pension; Wealth Creation civic-payroll; Inequality Patterns dragoon-widow stratum; three new Breakage Points — dragoon-containment funding squeeze, dragoon-guild jurisdictional- conflict cascade, mission-creep adoption rollback; Trade Flows kit- counterfeit as fourth illegitimate-service product-line; Hazard-pay paragraph extension), EVERYDAY_LIFE.md (all five clusters: adopting heartland household texture with lintel-marker, child-drill skip-rope rhyme, ward-inspector walkthrough change, retired-dragoon neighborhood role, funerary treatment, three-layer bardic stratification; big-city estate dowager-gossip layer, patron- liability ledger, tenant-cottage pattern; highland silent-absence + "walks the southern cordon" enlistment idiom + "does not walk the southern cordon" refusal idiom; drylands silent-absence + caravan- master route-refusal + "coin-for-service" emigration idiom + cargo- riddle; fens silent-absence + not-spoken-of posture + dry-edge dragoon-casualty queue asymmetry), OPEN_QUESTIONS.md (four new deferred items: dragoon charter terms per polity, mission-scope case law, funding-stream specificity, cross-polity pursuit extradition framework), MYSTERY_RESERVE.md (M-6 / M-7 / M-8 / M-9 / M-11 extensions + new M-13). Six critic sub-agents dispatched at escalation gate (approximately 10 of 13 FOUNDATIONS domains touched): Continuity Archivist, Systems/Economy, Politics/ Institution, Everyday-Life, Theme/Tone, Mystery Curator. All six accept-with-repair; no dissent from acceptance. Four explicit latent burdens logged plus four additional monitored exposures. Adjudication record: adjudications/PA-0006-accept_with_required_updates.md.
reason:
  - Commits institutional form for a convergent response to the Incident Wave (TIMELINE Layer 3) that the canon names but does not institutionally resolve — INSTITUTIONS.md §Law already flags ward-breach response as blurred between religious and artifact-guild jurisdiction; CF-0024 adds contractor auxiliary labor; CF-0025 adds post-breach containment specialists. There was no dedicated rapid-response perimeter force; dragoons fill that gap with polity-asymmetric adoption preserving canonical Charter-Era regional variation.
  - Activates the dormant Charter-Era anti-monopoly-of-force tension that INSTITUTIONS.md names across Landholding, Military, and Trade without until now having had a clean test case. The existing CF-0024 noble-retinue friction strains the norm from ABOVE (private-force accreting); dragoons invert the direction, stressing from BELOW (civic-chartered force accreting). Bidirectional anti-monopoly pressure is productive Charter-Era tension rather than Charter-Era rupture.
  - Extends the polity-asymmetric disagreement register from four axes (CF-0021, CF-0024, CF-0028/CF-0030, CF-0031) to five, maintaining the Charter-Era regional-variation pattern characteristic of the current Incident Wave.
  - "Generates story engines in Animalia's natural registers: jurisdictional refusal during ward-breach, cross-border pursuit, retired-dragoon civic-advisory roles, charter-court mission-creep challenges, ruin-mouth three-force convergence, impersonation trials, dragoon-widow charter-pension navigation, mission-creep-scandal rollback."
