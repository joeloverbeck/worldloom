  Phase 14a validation: all 9 tests PASS with rationale recorded in adjudication record's Phase 14a Validation Checklist section. The split-option was considered and declined per Phase 9 split rubric: sub-facts share type (institution), Mystery Reserve exposure profile (M-6, M-7, M-8, M-9, M-11, new M-13), distribution shape (polity- asymmetric heartland-adoption-gated), and domains_affected set. Splitting would fragment integrity. The kit-counterfeit black-market commitment is structurally bound to the dragoon institution itself rather than splitting into its own CF.
