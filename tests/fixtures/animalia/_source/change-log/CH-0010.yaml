summary: |
  Formalizes interspecies-friction spectrum already implicit in WORLD_KERNEL §What Is Ordinary (species instinct-jokes) and §What Is Taboo (bodily- mocking in mixed company), extending the pattern into labor-prejudice, exclusionary settlements, supremacist doctrine (contested-canon sectarian belief, NEVER world-truth), cannibal-fringe (CF-0034 raid-and-enslave cannibal-edge sub-subset with distinct stabilizer set), and civic-silencing strata. Rule 6 anti-silent-retcon framing: formalization not retcon, parallel to CF-0034's formalization of implicit banditry mentions. SOC-1 preserved without exception (friction is individual/sectarian, NOT world-truth hierarchy); INVARIANTS SOC-1 CH-0010 clarification added. Six modification_history entries on CF-0017 / CF-0024 / CF-0026 / CF-0033 / CF-0034 / CF-0035. M-5 FIFTH firewall cross-application (sectarian "mere beasts" is PATHOLOGICAL CATEGORY ERROR, NOT sentience-boundary blur); M-4 supremacist-reading firewall extension; M-7 sub-specialty holding clause (silenced-contractor absorbed into CF-0024 failed- reputation feeder per Rule 3); M-14 sub-register cross-reference (cannibal-captain mythography WITHIN M-14); M-2 anti-supremacist- catastrophic-custody extension; M-10 THIRD cross-application (hunter/ bandit-survivor corridor-folklore as selection-bias). Three NEW MR entries per Rule 7 obligation: M-16 (supremacist-cannibal doctrine antiquity — ancient vs recent vs perennial contested register); M-17 (demographic scope and prevalence of interspecies-cannibal cases — civic-suppression-generated bounded unknown); M-18 (antiquity of civic-suppression protocol — Charter-Era founding vs Layer-3 Incident Wave response vs Layer-4 politicization consolidation, paralleling M-13 structure). Six-critic synthesis; Systems/Economy divergence on sixth-axis candidacy resolved via Politics/Institution CF-0034 precedent to latent-burden-watched status. Charter-Era settlement STRAINS, does not break; five-axis polity-asymmetric stress register preserved; three parallel sixth-axis latent-burden watch-items now tracked (CF-0034 bandit-extradition / CF-0035 trophy-legality / CF-0036 suppression- unsealing-convention). Adjudication record: adjudications/PA-0009- accept_with_required_updates.md. Key critic convergences: Rule 6 formalization framing (Continuity Archivist); Rule 3 silenced-contractor absorption into CF-0024 feeder (Systems/Economy + Mystery Curator); euphemistic "grave-violation-of-person" sealed-magistrate-docket specification (Politics/Institution); per-cluster EVERYDAY_LIFE patches with structural-absence annotations for drylands and fenlands clusters (Everyday-Life); species-embodiment-biological allegory-collapse firewall and aftermath-household-vocabulary cannibal-material template (Theme/ Tone); M-5 fifth cross-application + M-4 extension + three new MR entries (Mystery Curator).
