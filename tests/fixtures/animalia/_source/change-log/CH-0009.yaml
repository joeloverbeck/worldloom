summary: |
  Canon-addition of CF-0035: artifact-contaminated mutated non-sentient beasts as wilderness hazard, with scale-tail rumor-only gargantuan- underground subcategory (new Mystery Reserve M-15). Composite fact (primary type hazard; sub-types species / local_anomaly / historical_process) committed with six primary firewalls (M-2 scale cap; M-5 non-sentience fourth cross-application after CF-0022 / CF-0029 / CF-0031; M-8 distinct-origin from CF-0029 bidirectional; AES-1 hero-drift taboo list with full forbidden-framings inventory; Rule 3 wildlife-sub-specialty-not-cohort; not-a-sixth-Charter-Era-axis with MINOR operational docket parallel to CF-0034) and three additional cross-application firewalls (M-1 no-Maker-cause-of-fall from mutated- beast evidence or gargantuan-underground rumor; M-9 not-a-Maker- knowledge-custody-channel for mutated-beast remains; M-10 second cross-application of selection-bias folklore firewall for hunter- survivor wilderness-zone-folklore paralleling CF-0034 bandit-survivor ruin-folklore firewall). Six qualifications to existing CFs (CF-0005 / CF-0006 / CF-0017 / CF-0024 / CF-0029 / CF-0034) extend taxonomies without falsifying any existing commitment. Twelve domain files receive patches covering ordinary-life signatures across all five EVERYDAY_LIFE clusters, new Mystery Reserve entry M-15, four new OPEN_QUESTIONS items, and consequence-propagation across the 13-domain surface. Verdict: ACCEPT_WITH_REQUIRED_UPDATES. Adjudication record: worlds/animalia/adjudications/PA-0008-accept_with_required_updates.md.
reason:
  - "User intention: make world more dangerous, strange, and wondrous; broaden diversity of animal life"
  - "Dramatic effect: dread of venturing into the wilds; 'what may be out there'; legends via rumors and bards"
  - "Deepens Primary Difference #2 (artifact-magic-as-vanished-hazard texture) by extending CAU-1 cost taxonomy into the faunal ecology — Maker debt is now paid by the biosphere, not only by sentient civic orders"
  - Strengthens AES-3 (magical and contaminated are aesthetically allied) — the mutated-beast carcass is wonder and contamination in one body
