summary: |
  Adds four new Canon Fact Records (CF-0027 enterable Maker-Age ruin sites as recognized category; CF-0028 patron-funded ruin-expedition venture as institution; CF-0029 magically-animated Maker-Age guardian constructions with seven explicit firewall commitments; CF-0030 funder-primacy convention operating polity-asymmetric as Charter-Era stress-fracture repair to SOC-4) and qualifies four existing CFs (CF-0004 non-guild-primary recovery pathway; CF-0008 funder-primacy via chartered-broker channel with polity asymmetry; CF-0019 entrance-knowledge as new lethal-contraband subcategory distinct from grimoire-fragments; CF-0024 expedition-contractor scale-up subtype with scholar-contractor extension and ordinary-trades naming). Adds three new Mystery Reserve entries (M-8 Guardian-Construction Mechanism; M-9 Epistemic Content of Recovered Maker-Knowledge; M-10 Guardian-Presence Heterogeneity) and extends M-7 to cover expedition-veteran reputation-genealogy as parallel class to occult-fallout specialists. Updates 10 world files (INVARIANTS, TIMELINE, GEOGRAPHY, INSTITUTIONS, ECONOMY_AND_RESOURCES, MAGIC_OR_TECH_SYSTEMS, EVERYDAY_LIFE, MYSTERY_RESERVE, OPEN_QUESTIONS, CANON_LEDGER). Source: briefs/animalia-ruin-expeditions.md, processed via canon-addition skill with full multi-critic synthesis (Phase 6b) using six parallel sub-agents (Continuity Archivist, Systems/Economy, Politics/Institution, Everyday-Life, Theme/Tone, Mystery Curator). Phase 11 verdict: ACCEPT_WITH_REQUIRED_UPDATES.
