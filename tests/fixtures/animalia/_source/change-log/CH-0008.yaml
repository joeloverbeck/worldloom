notes: |
  Phase 9 repair options considered and DECLINED: (a) split into multiple CFs (banditry-as-historical-process + bandit-hunting-as-institution + raid-and- enslave-hazard) — kept single per Phase 0 tie-break rubric; sub-facts share the same underlying world-change and splitting fragments integrity plus produces redundant derived_from chains; (b) move into Mystery Reserve — banditry is open-known phenomenon, not bounded-unknown material, wrong category; (c) contested_canon — banditry is world-level objective (civic orders treat it as real, not belief-only); (d) reduce to rumor — inconsistent with bounty-contract practice and civic-watch pursuit. Phase 9 repair options ADOPTED: single CF with distribution-clause scope stabilizer localizing the worst-bandit subset (Rule 4); modification_history entries on CF-0017 / CF-0024 / CF-0026 / CF-0028 / CF-0033 (Rule 6); NEW M-14 MR entry (Rule 7); ten Phase 7 stabilizers (Rule 3); Theme/Tone register discipline committed to CF notes (forbidden/required vocabulary lists) and governing EVERYDAY_LIFE patch drafting; widow-of-the-raid ABSORBED into CF-0024 widow-of-the-job as idiom-extension (Rule 3 specialness-inflation firewall — Systems/Economy and Everyday-Life critics both independently rejected elevation to a seventh stratum); bandit- extradition committed as MINOR operational docket line NOT sixth structural asymmetry axis (Politics/Institution reading prevailed over Systems/ Economy's potential-sixth-axis flag, with the potential axis tracked as latent burden and OPEN_QUESTIONS watch-item). Register-discipline exemplar CF-language cadence: *"Raiders took the Haldfen steading in the third week of Blackfrost; four dead on the threshold, nine carried off, the byre burned for warmth. The hunter- company from Ostrey charged forty silver and retrieved six. Two never spoke of it. The widow kept the farm."* Forbidden cadence: lyrical dwelling on atrocity; any sentence whose grammar invites the reader to admire a bandit; heroic-outlaw romanticization; exploitation-register rendering of rape or enslavement; chosen-one bandit-hunter framing; species-coded victimhood. M-10 selection-bias firewall is the novel-and-load-bearing commitment in this CH — first cross-application M-10 has ever carried; the disallowed cheap answer *"Bandit settlement-lore treated as empirical guardian- absence predictor — forbidden reveal"* is the primary Mystery Reserve commitment of CH-0008 and the commitment future canon work must preserve when extending bandit-corridor geography, ruin-expedition contingency, or any lore-registry artifact. Critic convergences summary: Rule 6 silent-retcon exposure via prior implicit mentions (Continuity Archivist, Politics/Institution); CF-0033 dragoon mission-scope firewall load-bearing (Continuity Archivist, Politics/Institution, Mystery Curator, Theme/Tone); hero-drift HIGH per user intent (Everyday-Life, Theme/Tone); Rule 4 globalization-by- accident on raid+slavery subset (Continuity Archivist, Politics/ Institution, Everyday-Life); Rule 3 widow-of-the-raid absorption (Systems/Economy, Everyday-Life converged independently); bandit-hunter CF-0024 subtype not new wage row (Systems/Economy); mod_history entries on five CFs (Continuity Archivist, Politics/Institution, Everyday-Life); Mystery Reserve firewalls including novel M-10 (Mystery Curator). Critic productive tension resolved: Systems/Economy MEDIUM-risk potential sixth-axis bandit-tolerance vs Politics/Institution MINOR docket line — resolved in favor of MINOR, with sixth-axis watch tracked as latent burden.
