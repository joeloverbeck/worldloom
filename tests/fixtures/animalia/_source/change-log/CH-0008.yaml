summary: |
  ACCEPT_WITH_REQUIRED_UPDATES verdict per adjudication PA-0007 (2026-04-19). CF-0034 formalizes endemic banditry as a historical_process already implicit in GEOGRAPHY.md §Predator Zones "Bandit corridors," in CF-0017 and CF-0024 costs_and_limits references to bandit losses, and in INSTITUTIONS.md §Military/Defense "suppress banditry" function. The formalization-of-implicit framing is load-bearing per Rule 6 anti-silent-retcon and is explicit in the CF statement. Five dependent qualifications extend: CF-0017 bardic-circuit narrative-custody subgenres (raid-lament, hunter-return, named-captain cycles, bounty-ethics broadsides) plus performer-martyr class plus bardic moral- witness-refusal threshold; CF-0024 bandit-hunter as named fifth contractor subtype alongside caravan-escort/wildlife/extraction-escort/dredger-escort/ mercenary-band/occult-fallout, plus three-tier skirmish-season taxonomy (sanctioned mercenary / endemic bandit / patron-backed expedition-war), plus widow-of-the-raid absorbed as idiom-extension of widow-of-the-job per Rule 3 specialness-inflation firewall; CF-0026 bounty-execution morality bifurcation (bounty-commission-accepting vs execution-abolitionist) within the principled-refuser tradition following the CF-0031 / CF-0033 reform- with-protection-vs-abolition template, plus highland cleansing-rite REFUSAL for returned band-members who committed kill-witnesses or raid-and-enslave acts (heavier than standard CF-0024 rite); CF-0028 two-threat expedition security model (guardian-wipe plus bandit-resistance in non-guardian occupied subsets) plus M-10 selection-bias deepening; CF-0033 mission-scope NEGATIVE-CLAUSE committing that dragoons do NOT pursue bandits qua-banditry (cross-predicate pursuit requires magistrate predicate-declaration; M-13 boundary defense preserved). Mystery Reserve firewall extensions applied under CH-0008: M-1 shelter- scope; M-2 anti-bandit-catastrophic-custody; M-6 partisan-reportage; M-7 fifth reputation-genealogy cohort; M-8 procedural-tactical observation (parallel to CF-0033 CH-0007 dragoon perimeter-lore); M-9 bandit-custody- is-a-route-not-channel; M-10 LOAD-BEARING selection-bias firewall with added disallowed cheap answer (this is M-10's FIRST cross-application extension — no prior precedent); M-13 cross-reference acknowledging hunter-contractor ≠ dragoon commitment. NEW Mystery Reserve entry M-14 (Bandit-Captain Mythography Reliability) manufactured per Phase 9 Rule 7 obligation to bound the bardic-named-captain historicity unknown the CF creates. New OPEN_QUESTIONS.md items: Hunter-Contractor Licensing and Bounty Framework (per polity); Inter-Polity Bandit-Extradition Convention (latent sixth-axis watch-item); Liberated-Slave Reintegration Civic Procedure; Ransom-Prisoner Civic-Registry Status. Eight downstream files patched: WORLD_KERNEL, TIMELINE, GEOGRAPHY, INSTITUTIONS, ECONOMY_AND_RESOURCES, EVERYDAY_LIFE, OPEN_QUESTIONS, MYSTERY_RESERVE. INVARIANTS, ONTOLOGY, PEOPLES_AND_SPECIES, and MAGIC_OR_TECH_SYSTEMS unchanged. Escalation Gate fired (13/13 domains); six critic sub-agents dispatched and synthesis integrated. Adjudication record: adjudications/PA-0007-accept_with_required_updates.md.
