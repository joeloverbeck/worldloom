ht-corridor collapse entry), EVERYDAY_LIFE.md (§(a) heartland inbound drylands-cadence tavern-fragment annotation; §(b) outskirts-estate NINTH dowager-gossip axis on drylands-trade-factor reciprocity-standing; §(c) highland clansman-learned-the-gate-turn saga-fragment; §(d) drylands EXTENSIVE extensions covering corridor-node typology housing, well-keeper apprenticeship childrearing, caravan-master + runner-militia labor rhythm, drought-cycle-specific common fears and aspirations, well- keeper catechism courtship, station-log as fifth drylands literacy register, drought-cycle calendar-markers; §(e) fenland non-participation via silence-discipline), OPEN_QUESTIONS.md (NEW §Drylands Caravan- Corridor Infrastructure Antiquity; NEW §Well-Stop Succession Case Law; pressured annotation on §Drylands Short-Poetry Convention Antiquity and Scope; DIS-2-convergence discharge on §Maker-Age Linguistic Recovery), MYSTERY_RESERVE.md (THREE extensions: M-7 well-keeper sub-specialty holding clause; M-9 drylands corridor station-log not-a-custody-channel firewall; M-19 drylands corridor-infrastructure scoped-distinct firewall), TIMELINE.md (Layer 1 Pre-Charter annotation; Layer 2 Charter-Era annotation — neither chartered nor displaced).
