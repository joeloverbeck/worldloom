summary: |
  Addition of CF-0031 (Chartered-polity contamination-lineage ledger-mark), a soft_canon institutional form: voluntary civic-registry subsidiary record that inscribes extractor, containment-wright, and post-career occult-fallout specialist (CF-0025) lineages for pension supplement and monastic-clinic alms-priority across three administrative generations in adopting chartered polities. Dominant action is addition. Embedded scope-narrowing of CF-0024 and CF-0025 pension-absence claims ("widow-of-the-job without charter pension protection"; "no charter pension") documented in their respective notes-field and modification_history entries: both pension-absence claims narrowed to non-adopting-polity scope for CF-0025-eligible lineages; other contractor-widow categories (mundane CF-0024 subtypes, CF-0028 expedition-widows) remain without charter hook. The global negative claim is preserved as default and narrowed explicitly, not silently replaced. Six critic sub-agents dispatched at escalation gate (>3 of 13 domains touched) and converged on accept with specific repair requirements. Phase 9 repairs adopted: title rename from "Heritable Contamination Registry" to "Chartered-polity contamination-lineage ledger-mark" (Theme/Tone critic); charter-clause civic-watch subpoena restriction stabilizer added (Politics critic); M-5 / M-7 / M-3 firewall language committed to CF statement (Mystery Curator); new Mystery Reserve entry M-11 created (Empirical Basis of the Three-Generation Contamination-Lineage Marker); per-cluster EVERYDAY_LIFE texture for all 5 clusters including explicit non-adoption textures for (c) highland and (e) fenlands (Everyday-Life critic); historical-motivation commitment in CF notes + INSTITUTIONS (Politics critic). Verdict: ACCEPT_WITH_REQUIRED_UPDATES. Adjudication record: adjudications/PA-0004-accept_with_required_updates.md.
reason:
  - closes Phase-0/Phase-6 institutional gap in widow-and-contamination-injured welfare for CF-0025-eligible households in adopting polities, filling the OPEN_QUESTIONS Post-Career Contractor Pension and Stigma open question with an explicitly Charter-Era-native instrument
  - deepens the polity-asymmetric Charter-Era stress register by adding a third axis alongside CF-0021 crafter-tolerance and CF-0024 mercenary-licensure
  - makes the CAU-1 artifact-cost invariant bureaucratically visible, strengthening AES-2 ordinary-life discipline by giving contamination-injury an administrative ordinary-life signature
  - activates rich story engines (registered/unregistered succession disputes, registry-scrubber underground, reform-current clergy registry-reform campaigns, civic-watch misuse confrontations, inter-polity migration gap disputes) that map cleanly to kernel-native engines per Theme/Tone critic
