summary: |
  Commits Animalia's first named city-state landmark — Brinewick, a canal-fed charter-polity in the Temperate Canal Heartland band, world-renowned as among the foremost centers of commerce and among the most populated heartland cities. Partial-resolves OPEN_QUESTIONS §Place and Polity Naming per regional-not-continent-wide discipline. Commits Brinewick as ADOPTING-POLITY on all five Charter-Era polity-asymmetric disagreement axes (CF-0021 / CF-0024 / CF-0028 / CF-0031 / CF-0033). Commits institutional decomposition of canal-inspection authority into civic canal-wardens (chartered-watch subtype, tariff-and-traffic) vs ward- inspectors (extraction-guild, artifact-hazard under SOC-4/CAU-3; integrity preserved). Commits named anchor taverns The Copper Weir and The Lock- Keeper's Cat of the six-tavern canal-circuit bardic subgenre (four other rotation venues deferred). Commits aquatic-folk MAJORITY in legitimate canal labor + MINORITY overrepresentation in canal-underwater smuggling underworld (socioeconomic occupational-geography, NOT species-coding; M-5 sixth cross-application firewall). Commits migrant-attractor regional-collector integration with refugees-from-sealed-quarters precarious-stratum pattern (coin-for-shame return-idiom). Commits canal-warden backchannel mechanism as continuous-but-incomplete audit + shadow-wage + inspector-turnover stabilizer (ward-inspector integrity firewalled). Adds M-1 extension firewall (pre-Charter-infrastructure- attribution) and creates new M-19 bounded unknown (Brinewick canal and underground network origin, merged). Expands WORLD_KERNEL.md Natural Story Engines with 6 Brinewick-specific engines; commits EVERYDAY_LIFE.md §(a) 7-clause + §(b) 4-clause Brinewick extensions (9th skip-rope rhyme slot + named Brinewick dowager idioms). Adds three new OPEN_QUESTIONS deferrals (§Identity of the Most-Populated Heartland City; §Brinewick Trunk-Canal-Count Specifics; §Brinewick Supremacist-Movement Licensure / Proscription Status). Applies 17 firewall clauses from Phase 6b multi- critic synthesis (C1-C17). Critical Continuity Archivist discovery: DA-0001 (`a-season-on-the-circuit.md`) already named Brinewick at diegetic level; CF-0038 cites DA-0001 in source_basis.derived_from per Rule 6 audit-trail preservation.
reason:
  - Commits Animalia's first named city-state landmark and partial-resolves OPEN_QUESTIONS §Place and Polity Naming without globalizing the commitment beyond a single canal-heartland polity.
  - Instantiates Brinewick across the five Charter-Era polity-asymmetric axes and formalizes the canal-warden versus ward-inspector split while preserving the existing institutional firewalls.
  - Records the required Mystery Reserve work by extending M-1 and adding bounded unknown M-19 for the canal and underground network origin.
