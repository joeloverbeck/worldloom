summary: |
  ACCEPT_WITH_REQUIRED_UPDATES verdict on proposal PR-0007-oversize-saddlery- subsection-cluster-c.md. CF-0032 committed as soft_canon institution at regional / current / public scope, documenting an oversize-saddlery guild- subsection within wainwright and saddlery guilds of ancestral Cluster C polities, with reciprocal cross-polity journeyman circuit gating master-rank progression. The subsection adds a third named Cluster C labor specialty alongside haulage and anchor-infantry/tradition-keeping, functioning as a minority upward-mobility path while most Cluster C community members remain in haulage. The change also qualifies three existing CFs: CF-0010 (Cluster C architectural accommodation partially institutionalized via the subsection; species distinctness now includes trans-regional professional vector); CF-0011 (concrete Cluster C upward-mobility mechanism committed; global class-mobility scope preserved, mechanism regional-specific, apprenticeship not species-gated); CF-0018 (subsection guild-seal as narrow named exception to "socially legible without explicit guild branding" default; seal located in charter-and-apprenticeship register, not bloodline). Downstream updates applied to PEOPLES_AND_SPECIES.md (Cluster C labor catalogue extension + "older bloods" firewall cross-reference), INSTITUTIONS.md (Trade/Guilds, Law/Custom, Religion, Education/Apprenticeship, Recordkeeping annotations), ECONOMY_AND_RESOURCES.md (Wage Spreads, Value Stores, Wealth Creation, Inequality Patterns), EVERYDAY_LIFE.md (canal-town heartland + big-city estate clusters; silent absences in highland/drylands/fens), GEOGRAPHY.md (new "Regional Coordination on Cluster C Subsection Presence" section framed as agreement pattern, mirror image of the three disagreement- asymmetries CF-0021/CF-0024/CF-0031), TIMELINE.md (Layer 2 institutional- residue annotation), MYSTERY_RESERVE.md (M-4 firewall extension, M-7 firewall cross-application, new M-12 for craft antiquity), OPEN_QUESTIONS.md (Specific Guild Naming extension, Species Population Ratios annotation, two new deferred-question items). Six critic sub-agents dispatched at escalation gate (11 of 13 domains touched); convergent concerns around Rule 3 "older bloods" specialness-inflation, M-4 absent firewall, M-7 cross-application absent, Rule 4 architectural-sizing-drift leak, and AES-2 hero-drift risk all addressed in Phase 9 repair via three notes- field firewalls on CF-0032, Rule 4 partial concession clause, and MYSTERY_ RESERVE.md M-4/M-7 extensions + new M-12. Adjudication record: adjudications/PA-0005-accept_with_required_updates.md.
reason:
  - Commits institutional form for the Cluster C architectural-accommodation need already named in PEOPLES_AND_SPECIES.md Cluster C — filling a canon gap where the need is committed but the economic institutional form is thin.
  - Adds a third named Cluster C labor specialty to balance the existing haulage and anchor-infantry/tradition-keeping options — creates concrete upward-mobility without displacing the haulage majority.
  - Extends CF-0011 class-mobility from distribution claim to concrete Cluster C upward-mobility mechanism — Cluster A modern mammalian animal-folk have specialty-labor visibility across many crafts; Cluster C deserves a parallel concrete mechanism.
  - Generates story engines in Animalia's natural registers (artisan-coalition, mixed-species-estate-succession, bardic-circuit) without activating cosmological battleground dynamics.
