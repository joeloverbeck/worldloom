name: CI - world-index

on:
  push:
    branches: [main]
    paths:
      - 'tools/world-index/**'
      - 'tests/fixtures/animalia/**'
      - '.github/workflows/ci-world-index.yml'
  pull_request:
    paths:
      - 'tools/world-index/**'
      - 'tests/fixtures/animalia/**'
      - '.github/workflows/ci-world-index.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: tools/world-index
        run: npm install
      - name: Build
        working-directory: tools/world-index
        run: npm run build
      - name: Test
        working-directory: tools/world-index
        run: npm test
