name: CI - patch-engine

on:
  push:
    branches: [main]
    paths:
      - 'tools/patch-engine/**'
      - 'tools/world-index/**'
      - 'tests/fixtures/animalia/**'
      - '.github/workflows/ci-patch-engine.yml'
  pull_request:
    paths:
      - 'tools/patch-engine/**'
      - 'tools/world-index/**'
      - 'tests/fixtures/animalia/**'
      - '.github/workflows/ci-patch-engine.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build world-index (file dependency)
        working-directory: tools/world-index
        run: npm install && npm run build
      - name: Install
        working-directory: tools/patch-engine
        run: npm install
      - name: Test
        working-directory: tools/patch-engine
        run: npm test
