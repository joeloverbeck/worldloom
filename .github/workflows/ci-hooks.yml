name: CI - hooks

on:
  push:
    branches: [main]
    paths:
      - 'tools/hooks/**'
      - 'tools/world-index/**'
      - '.github/workflows/ci-hooks.yml'
  pull_request:
    paths:
      - 'tools/hooks/**'
      - 'tools/world-index/**'
      - '.github/workflows/ci-hooks.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: tools/hooks
        run: npm install
      - name: Test
        working-directory: tools/hooks
        run: npm test
