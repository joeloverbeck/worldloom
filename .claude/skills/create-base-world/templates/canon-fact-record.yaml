# Canon Fact Record — template
#
# Matches docs/FOUNDATIONS.md §"Canon Fact Record Schema" and the patch-engine
# CanonFactRecord type (@worldloom/world-index/public/types).
#
# SYNC DISCIPLINE: the FIELD STRUCTURE of this template must remain aligned
# with the canon-addition output contract and the patch-engine CF schema.
# Comments and example values may differ per skill context. When adding,
# removing, or reshaping any field — including extending the `type:` enum —
# update every CF producer/validator surface in the same change so the
# `record_schema_compliance` validator continues to pass.
#
# Post-SPEC-13, create-base-world emits CF-0001 as the genesis primary-difference
# fact via mcp__worldloom__submit_patch_plan's create_cf_record op. The record
# lands at worlds/<world-slug>/_source/canon/CF-0001.yaml as a single atomic file.
# No monolithic CANON_LEDGER.md exists post-SPEC-13.
#
# Trim fields that do not apply to the fact's type (e.g., a pure-law fact
# may omit distribution.who_cannot_easily_do_it).
#
# Do NOT remove required-structural fields:
#   id, title, status, type, statement, scope, truth_scope,
#   domains_affected, source_basis, required_world_updates
#
# A record missing any of those violates Rule 1 (No Floating Facts).

id: CF-0000                                # canonical fact ID, monotonic within this world
title: ""                                  # short human label
status: hard_canon                         # hard_canon | soft_canon | contested_canon | mystery_reserve
type: ""                                   # common enum: capability | artifact | law | belief | event | institution | species | ritual | taboo | technology | resource_distribution | hidden_truth | local_anomaly | metaphysical_rule
                                           # additional values from FOUNDATIONS.md §Ontology Categories are permitted: historical_process | text_tradition | hazard | craft
                                           # (draw verbatim from FOUNDATIONS so ledger-wide grep discovery works uniformly)
statement: >
  Natural-language statement of the fact. One paragraph maximum.
  Must be unambiguous enough to be cited in later adjudication.

scope:
  geographic: local                        # local | regional | global | cosmic
  temporal: current                        # ancient | historical | current | future | cyclical
  social: public                           # restricted_group | public | elite | secret | rumor

truth_scope:
  world_level: true                        # true | false | uncertain
  diegetic_status: objective               # objective | believed | disputed | propagandistic | legendary

domains_affected:                          # at least one — Rule 2 (No Pure Cosmetics)
                                           # CANONICAL ENUM (from FOUNDATIONS §Rule 2, normalized to snake_case):
                                           #   labor | embodiment | social_norms | architecture | mobility | law
                                           #   trade | war | kinship | religion | language | status_signaling
                                           #   ecology | daily_routine
                                           # ESTABLISHED LEDGER EXTENSIONS (in active use; acceptable):
                                           #   economy (alias for trade) | settlement_life | memory_and_myth
                                           #   magic | medicine | status_order (alias for status_signaling)
                                           #   warfare (alias for war) | taboo_and_pollution
                                           # Prefer canonical labels where applicable; use established extensions
                                           # only when the canonical list does not cover the fact's attachment
                                           # surface. Labels outside canonical + extensions pass the non-empty
                                           # test but degrade grep-discoverability across CFs.
  - labor
  # - warfare
  # - economy
  # - settlement_life
  # - kinship
  # - religion
  # - language
  # - law

prerequisites: []                          # knowledge / tools / materials / conditions needed for fact to manifest

distribution:                              # required whenever scope.geographic is non-`global` OR scope.social is non-`public` — Rule 4 (No Globalization by Accident); type-independent
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal: []

costs_and_limits: []                       # stabilizers preventing universalization — Rule 3 (No Specialness Inflation)

visible_consequences: []                   # ordinary-life signals this fact produces — Rule 5 (No Consequence Evasion)

required_world_updates: []                 # canonical file-class names of every prose concern whose
                                           # initial SEC must cite this CF in `touched_by_cf` (bidirectional
                                           # CF ↔ SEC pointer enforced by `touched_by_cf_completeness`).
                                           # Use UPPER_SNAKE without `.md`: GEOGRAPHY | PEOPLES_AND_SPECIES |
                                           # INSTITUTIONS | ECONOMY_AND_RESOURCES | MAGIC_OR_TECH_SYSTEMS |
                                           # EVERYDAY_LIFE | TIMELINE.
  # - INSTITUTIONS
  # - ECONOMY_AND_RESOURCES
  # - EVERYDAY_LIFE
  # - TIMELINE

source_basis:
  direct_user_approval: false              # set true once user explicitly accepts this fact at the Phase 10 HARD-GATE
  derived_from: []                         # list of parent CF ids if this is derived canon

contradiction_risk:
  hard: false
  soft: false

notes: >
  Free-form notes: adjudication reasoning, scope-narrowing decisions,
  stabilizers added during equilibrium explanation, mystery-reserve interactions.
  Future canon-addition runs may preserve or extend free-form notes when
  the new CF itself needs cross-reference prose, but they do not append a
  parallel notes paragraph solely to mirror audit history.

# Genesis-world conditionally mandatory blocks (per SPEC-09).
# New worlds adopt the full CF schema from CF-0001 onward. Use the
# source-module helpers in tools/validators/src/structural/record-schema-compliance.ts:
#   requiresEpistemicProfile(cf.type)
#   requiresExceptionGovernance(cf.type)
# to decide whether each block requires a populated form. If the helper does
# not require a block, emit the n_a form with a fact-type rationale containing
# a keyword from FOUNDATIONS.md §Ontology Categories. If the decision is
# ambiguous, surface it to the user at the Phase 10 HARD-GATE rather than
# defaulting to n_a.
epistemic_profile:                         # required when knowability is non-trivial
  directly_observable_by: []
  inferable_by: []
  recorded_by: []
  suppressed_by: []
  distortion_vectors: []
  propagation_channels: []
  evidence_left: []
  knowledge_exclusions: []
# OR, only when the fact type does not require a populated epistemic axis:
# epistemic_profile:
#   n_a: "Pure geography fact; no knowability axis."

exception_governance:                      # required when CF introduces or depends on high-leverage exception
  activation_conditions: []
  rate_limits: []
  mobility_limits: []
  diffusion_barriers: []
  countermeasures: []
  nondeployment_reasons: []
# OR, only when the fact type does not require a populated exception axis:
# exception_governance:
#   n_a: "Structural-institutional fact; no exception axis."

# CONDITIONALLY MANDATORY: structured modification trace.
# create-base-world ALWAYS leaves this empty at genesis — the genesis set has
# no prior modifications to record. Post-SPEC-13 / SPEC-17 Track C1,
# modification_history[] is the canonical structured audit surface for future
# canon-addition runs that modify this CF. The patch engine's
# append_modification_history_entry op writes only to this field; future
# modifications do NOT also append a parallel notes paragraph.
modification_history: []
