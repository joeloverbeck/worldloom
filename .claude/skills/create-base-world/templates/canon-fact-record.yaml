# Canon Fact Record — template
#
# Matches docs/FOUNDATIONS.md §"Canon Fact Record Schema".
#
# SYNC DISCIPLINE: the FIELD STRUCTURE of this template must remain identical
# to canon-addition/templates/canon-fact-record.yaml. Comments and example
# values may differ per skill context. When adding, removing, or reshaping any
# field — including extending the `type:` enum — update BOTH templates in the
# same change so grep-based ledger discovery works uniformly.
#
# create-base-world emits one record of this shape per accepted hard canon
# fact at Phase 14. The full set is concatenated into
# worlds/<world-slug>/CANON_LEDGER.md.
#
# Trim fields that do not apply to the fact's type (e.g., a pure-law fact
# may omit distribution.who_cannot_easily_do_it).
#
# Do NOT remove required-structural fields:
#   id, title, status, type, statement, scope, truth_scope,
#   domains_affected, source_basis, required_world_updates
#
# A record missing any of those violates Rule 1 (No Floating Facts).

id: CF-0000                                # canonical fact ID, monotonic within this world
title: ""                                  # short human label
status: hard_canon                         # hard_canon | soft_canon | contested_canon | mystery_reserve
type: ""                                   # common enum: capability | artifact | law | belief | event | institution | species | ritual | taboo | technology | resource_distribution | hidden_truth | local_anomaly | metaphysical_rule
                                           # additional values from FOUNDATIONS.md §Ontology Categories are permitted: historical_process | text_tradition | hazard | craft
                                           # (draw verbatim from FOUNDATIONS so ledger-wide grep discovery works uniformly)
statement: >
  Natural-language statement of the fact. One paragraph maximum.
  Must be unambiguous enough to be cited in later adjudication.

scope:
  geographic: local                        # local | regional | global | cosmic
  temporal: current                        # ancient | historical | current | future | cyclical
  social: public                           # restricted_group | public | elite | secret | rumor

truth_scope:
  world_level: true                        # true | false | uncertain
  diegetic_status: objective               # objective | believed | disputed | propagandistic | legendary

domains_affected:                          # at least one — Rule 2 (No Pure Cosmetics)
  - labor
  # - warfare
  # - economy
  # - settlement_life
  # - kinship
  # - religion
  # - language
  # - law

prerequisites: []                          # knowledge / tools / materials / conditions needed for fact to manifest

distribution:                              # required for capability/artifact facts — Rule 4 (No Globalization by Accident)
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal: []

costs_and_limits: []                       # stabilizers preventing universalization — Rule 3 (No Specialness Inflation)

visible_consequences: []                   # ordinary-life signals this fact produces — Rule 5 (No Consequence Evasion)

required_world_updates: []                 # world files that reflect this fact
  # - INSTITUTIONS.md
  # - ECONOMY_AND_RESOURCES.md
  # - EVERYDAY_LIFE.md
  # - TIMELINE.md

source_basis:
  direct_user_approval: false              # set true once user explicitly accepts this fact at Phase 16
  derived_from: []                         # list of parent CF ids if this is derived canon

contradiction_risk:
  hard: false
  soft: false

notes: >
  Free-form notes: adjudication reasoning, scope-narrowing decisions,
  stabilizers added during equilibrium explanation, mystery-reserve interactions.
  When a future canon-addition run modifies this CF, that run is responsible
  for appending a standardized line:
    Modified YYYY-MM-DD by CH-NNNN (CF-NNNN): <one-sentence summary>.
  create-base-world does not modify CFs (it only creates the genesis set);
  this guidance is preserved here for schema uniformity with the
  canon-addition skill.

# OPTIONAL: structured modification trace. Empty for the genesis CF set
# produced by create-base-world; populated by future canon-addition runs
# when the CF is qualified or extended. Schema-uniform with
# canon-addition/templates/canon-fact-record.yaml.
modification_history: []
