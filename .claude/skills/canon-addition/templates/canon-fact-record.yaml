# Canon Fact Record — template
#
# Matches docs/FOUNDATIONS.md §"Canon Fact Record Schema". Structurally identical
# to create-base-world/templates/canon-fact-record.yaml so that ledger entries
# across skills remain uniform.
#
# SYNC DISCIPLINE: the FIELD STRUCTURE of this template must remain identical
# to create-base-world/templates/canon-fact-record.yaml. Comments and example
# values may differ per skill context. When adding, removing, or reshaping any
# field — including extending the `type:` enum — update BOTH templates in the
# same change so grep-based ledger discovery works uniformly.
#
# canon-addition emits one record of this shape per accepted fact at Phase 13a.
# The record is appended to worlds/<world-slug>/CANON_LEDGER.md at Phase 15a
# after HARD-GATE approval. For repair-split verdicts (multiple narrower facts),
# multiple records are emitted, linked via source_basis.derived_from.
#
# Trim fields that do not apply to the fact's type (e.g., a pure-law fact
# may omit distribution.who_cannot_easily_do_it).
#
# Do NOT remove required-structural fields:
#   id, title, status, type, statement, scope, truth_scope,
#   domains_affected, source_basis, required_world_updates
#
# A record missing any of those violates Rule 1 (No Floating Facts) and will
# halt Phase 14a validation.

id: CF-0000                                # allocated at pre-flight via scan-and-increment of existing CANON_LEDGER.md
title: ""                                  # short human label
status: hard_canon                         # hard_canon | soft_canon | contested_canon | mystery_reserve
type: ""                                   # common enum: capability | artifact | law | belief | event | institution | species | ritual | taboo | technology | resource_distribution | hidden_truth | local_anomaly | metaphysical_rule
                                           # additional values from FOUNDATIONS.md §Ontology Categories are permitted and in active ledger use: historical_process | text_tradition | hazard | craft | place | polity | route | person | faction | entity | region | resource | magic_practice | social_role | ecological_system | bodily_condition
                                           # FOUNDATIONS §Ontology Categories is the authoritative list (25 categories); the common + additional above cover the most-used values but are NOT exhaustive — when in doubt, consult FOUNDATIONS directly.
                                           # For composite-type facts (e.g., a named city is place + polity + institution + historical_process + route; see proposal-normalization.md §Place-type / Polity Composite Handling for the named-landmark worked example), set type: to the PRIMARY category (the one that most determines the CF's stabilizer chain and required_world_updates footprint) and enumerate secondary categories in notes.
                                           # (draw verbatim from FOUNDATIONS so ledger-wide grep discovery works uniformly)
statement: >
  Natural-language statement of the fact. One paragraph maximum.
  Must be unambiguous enough to be cited in later adjudication.

scope:
  geographic: local                        # local | regional | global | cosmic
  temporal: current                        # ancient | historical | current | future | cyclical
  social: public                           # restricted_group | public | elite | secret | rumor

truth_scope:
  world_level: true                        # true | false | uncertain
  diegetic_status: objective               # objective | believed | disputed | propagandistic | legendary

domains_affected:                          # at least one — Rule 2 (No Pure Cosmetics); Phase 14a rejects empty lists
                                           # CANONICAL ENUM (from FOUNDATIONS §Rule 2, normalized to snake_case):
                                           #   labor | embodiment | social_norms | architecture | mobility | law
                                           #   trade | war | kinship | religion | language | status_signaling
                                           #   ecology | daily_routine
                                           # ESTABLISHED LEDGER EXTENSIONS (in active use; acceptable):
                                           #   economy (alias for trade) | settlement_life | memory_and_myth
                                           #   magic | medicine | status_order (alias for status_signaling)
                                           #   warfare (alias for war) | taboo_and_pollution
                                           # Prefer canonical labels where applicable; use established extensions
                                           # only when the canonical list does not cover the fact's attachment
                                           # surface. Labels outside canonical + extensions pass the Phase 14a
                                           # non-empty test but degrade grep-discoverability across CFs.
  - labor
  # - warfare
  # - economy
  # - settlement_life
  # - kinship
  # - religion
  # - language
  # - law

prerequisites: []                          # knowledge / tools / materials / conditions needed for fact to manifest — Rule 1

distribution:                              # required whenever scope.geographic is non-`global` OR scope.social is non-`public` — Rule 4 (No Globalization by Accident); type-independent
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal: []                    # Phase 14a rejects empty list when scope is regional/local/restricted_group/elite/secret/rumor, regardless of type

costs_and_limits: []                       # stabilizers preventing universalization — Rule 3 (No Specialness Inflation)

visible_consequences: []                   # ordinary-life signals this fact produces — Rule 5 (No Consequence Evasion)

required_world_updates: []                 # world files that reflect this fact; every entry must have a concrete Phase 12a patch
                                           # Do NOT list CANON_LEDGER.md here — the CF record IS the patch to
                                           # the ledger, and self-reference is redundant. required_world_updates
                                           # is the list of DOMAIN files the Phase 15a patches must touch,
                                           # parallel to downstream_updates in the change-log-entry template.
                                           # Rule of thumb: if the entry is a domain-texture file (WORLD_KERNEL,
                                           # INVARIANTS, PEOPLES_AND_SPECIES, INSTITUTIONS, ECONOMY, EVERYDAY_LIFE,
                                           # GEOGRAPHY, TIMELINE, ONTOLOGY, OPEN_QUESTIONS, MYSTERY_RESERVE,
                                           # MAGIC_OR_TECH_SYSTEMS), list it. If it's CANON_LEDGER.md itself,
                                           # skip it — Phase 15a sub-step 3 handles ledger mutation directly.
  # - INSTITUTIONS.md
  # - ECONOMY_AND_RESOURCES.md
  # - EVERYDAY_LIFE.md
  # - TIMELINE.md

source_basis:
  direct_user_approval: false              # set true at Phase 15a on user approval, immediately before atomic write
  derived_from: []                         # list of parent CF ids if this is derived canon or a repair-split from a broader proposal

contradiction_risk:
  hard: false
  soft: false

notes: >
  Free-form notes: adjudication reasoning, scope-narrowing decisions,
  stabilizers added during Phase 9 repair pass, Mystery Reserve interactions,
  any latent burdens flagged by Phase 8 classification.
  When this CF is modified by a subsequent canon-addition run, append a
  standardized line of the form:
    Modified YYYY-MM-DD by CH-NNNN (CF-NNNN): <one-sentence summary>.
  Do NOT use HTML-comment attribution (<!-- ... -->) inside YAML — that
  syntax is invalid here and is reserved for markdown prose patches in
  domain files.

# CONDITIONALLY MANDATORY: structured modification trace. Required for
# every CF identified by the Phase 12a modification_history scan (see
# SKILL.md Procedure step 5) — i.e., every CF that appears in the
# proposal's derived_from_cfs, in Phase 8 soft-contradiction findings,
# OR whose stabilizer / scope / consequence / standing role is
# substantively extended by the new CF per Phase 9 repairs. The
# notes-field "Modified YYYY-MM-DD by CH-NNNN (CF-NNNN): ..." line above
# carries the human-readable trace; modification_history is the
# machine-readable complement, and BOTH are required together whenever
# the scan identifies the CF (per Rule 6 / No Silent Retcons and ledger
# convention). Each entry records the change_id (CH-NNNN), originating
# CF id (the new CF that prompted the modification), date, and summary.
# The array stays empty (`[]`) only until the first qualifying
# modification — genesis CFs begin empty.
#
# Retrofit rule: when modifying a CF that previously had notes-field
# modification traces but no `modification_history` array, retrofit all
# prior notes-documented modifications into `modification_history`
# alongside the new one, so the machine-readable trace is complete. A
# partially-populated `modification_history` (listing only the current
# modification while the notes field references earlier ones) is an
# audit-trail gap.
modification_history: []
  # - change_id: CH-0002
  #   originating_cf: CF-0021
  #   date: 2026-04-18
  #   summary: "qualification: marginal modern crafter stream acknowledged"
