# Canon Fact Record — template
#
# Matches docs/FOUNDATIONS.md §"Canon Fact Record Schema". Structurally identical
# to create-base-world/templates/canon-fact-record.yaml so that ledger entries
# across skills remain uniform.
#
# canon-addition emits one record of this shape per accepted fact at Phase 13a.
# The record is appended to worlds/<world-slug>/CANON_LEDGER.md at Phase 15a
# after HARD-GATE approval. For repair-split verdicts (multiple narrower facts),
# multiple records are emitted, linked via source_basis.derived_from.
#
# Trim fields that do not apply to the fact's type (e.g., a pure-law fact
# may omit distribution.who_cannot_easily_do_it).
#
# Do NOT remove required-structural fields:
#   id, title, status, type, statement, scope, truth_scope,
#   domains_affected, source_basis, required_world_updates
#
# A record missing any of those violates Rule 1 (No Floating Facts) and will
# halt Phase 14a validation.

id: CF-0000                                # allocated at pre-flight via scan-and-increment of existing CANON_LEDGER.md
title: ""                                  # short human label
status: hard_canon                         # hard_canon | soft_canon | contested_canon | mystery_reserve
type: ""                                   # capability | artifact | law | belief | event | institution | species | ritual | taboo | technology | resource_distribution | hidden_truth | local_anomaly | metaphysical_rule
statement: >
  Natural-language statement of the fact. One paragraph maximum.
  Must be unambiguous enough to be cited in later adjudication.

scope:
  geographic: local                        # local | regional | global | cosmic
  temporal: current                        # ancient | historical | current | future | cyclical
  social: public                           # restricted_group | public | elite | secret | rumor

truth_scope:
  world_level: true                        # true | false | uncertain
  diegetic_status: objective               # objective | believed | disputed | propagandistic | legendary

domains_affected:                          # at least one — Rule 2 (No Pure Cosmetics); Phase 14a rejects empty lists
  - labor
  # - warfare
  # - economy
  # - settlement_life
  # - kinship
  # - religion
  # - language
  # - law

prerequisites: []                          # knowledge / tools / materials / conditions needed for fact to manifest — Rule 1

distribution:                              # required for capability/artifact facts — Rule 4 (No Globalization by Accident)
  who_can_do_it: []
  who_cannot_easily_do_it: []
  why_not_universal: []                    # Phase 14a rejects empty list for capability/artifact facts

costs_and_limits: []                       # stabilizers preventing universalization — Rule 3 (No Specialness Inflation)

visible_consequences: []                   # ordinary-life signals this fact produces — Rule 5 (No Consequence Evasion)

required_world_updates: []                 # world files that reflect this fact; every entry must have a concrete Phase 12a patch
  # - INSTITUTIONS.md
  # - ECONOMY_AND_RESOURCES.md
  # - EVERYDAY_LIFE.md
  # - TIMELINE.md

source_basis:
  direct_user_approval: false              # set true at Phase 15a on user approval, immediately before atomic write
  derived_from: []                         # list of parent CF ids if this is derived canon or a repair-split from a broader proposal

contradiction_risk:
  hard: false
  soft: false

notes: >
  Free-form notes: adjudication reasoning, scope-narrowing decisions,
  stabilizers added during Phase 9 repair pass, Mystery Reserve interactions,
  any latent burdens flagged by Phase 8 classification.
