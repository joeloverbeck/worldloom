# Change Log Entry — reference template (CONSUMED, not emitted, by continuity-audit)
#
# Enforces FOUNDATIONS.md §"Change Control Policy" and Rule 6 (No Silent Retcons).
#
# This skill READS existing CH entries in CANON_LEDGER.md's change log section
# during Phase 2 (Change Log Delta Analysis). It does NOT emit new CH entries —
# canon-addition emits a CH entry when an RP-NNNN retcon-proposal card is accepted.
#
# This template is bundled for two structural purposes:
#   1. Phase 2 delta interpretation: the skill reads CH entries to build per-change
#      risk profiles (affected_fact_ids, invariants_touched, mystery_reserve_interactions,
#      required_world_updates, patch_attribution_status).
#   2. Phase 8 retcon-card body: the Retcon Policy Checklist in each retcon-proposal-card.md
#      body mirrors the retcon_policy_checks field below — canon-addition re-verifies
#      the same checks at acceptance time and writes them into a new CH entry.
#
# Continuity-audit never writes CH entries directly. The chain is:
#   continuity-audit produces RP-NNNN card (with Retcon Policy checklist in body)
#     → canon-addition accepts the card → canon-addition emits a CH entry
#       whose retcon_policy_checks field is the canonical form of the checklist.

change_id: CH-0000                         # canonical change ID, monotonic
date: ""                                   # ISO date, e.g. 2026-04-19

change_type: addition                      # addition | scope_retcon | cost_retcon | perspective_retcon | chronology_retcon | ontology_retcon | clarification | de_canonization
                                           # Continuity-audit's retcon-proposal-card.md carries a retcon_type field
                                           # (A/B/C/D/E/F) that maps to this change_type when canon-addition emits
                                           # the resulting CH entry.

affected_fact_ids: []                      # list of CF ids touched by this change
  # - CF-0102

summary: >
  One-paragraph natural-language summary of what changed.
  Must be legible without reading the full fact records.

reason:                                    # why the change is being made
  - ""                                     # e.g., "continuity audit AU-0003 flagged scope drift; see finding F-02"

scope:
  local_or_global: local                   # local | global
  changes_ordinary_life: false             # does this visibly alter daily life per FOUNDATIONS §Change Control Policy
  creates_new_story_engines: false
  mystery_reserve_effect: none             # none | narrows | expands

downstream_updates: []                     # files that must be updated as part of this change
  # - INSTITUTIONS.md
  # - GEOGRAPHY.md
  # - DIEGETIC_TEXTS/relic_manuals.md

impact_on_existing_texts: []               # any diegetic artifacts now re-contextualized
  # - "travelogue DA-0014 now treated as regional overgeneralization"

severity_before_fix: 0                     # 0-5 (see continuity-audit Phase 5 Severity Classification)
severity_after_fix: 0

retcon_policy_checks:                      # must all be true for acceptance (FOUNDATIONS Rule 6)
                                           # Continuity-audit's retcon-proposal-card.md carries these same fields
                                           # in its body as a checklist with one-line justifications.
  no_silent_edit: true
  replacement_noted: true                  # if anything was deleted, note what replaces it
  no_stealth_diegetic_rewrite: true        # world-level truth is not being changed via diegetic text alone
  net_contradictions_not_increased: true
  world_identity_preserved: true

audit_origin: ""                           # optional: AU-NNNN id if this CH originated from a continuity-audit
                                           # retcon-proposal card that canon-addition subsequently accepted.
                                           # Populated by canon-addition at acceptance time; empty for non-audit-origin changes.

notes: >
  Optional free-form notes: adjudication trace, repair-pass reasoning,
  flagged downstream risks that will require future audit passes.
